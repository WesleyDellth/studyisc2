<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISC2 CC Cert Guide — Study Quiz</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0e1a;
  --surface: #121828;
  --surface-hover: #1a2238;
  --border: #253050;
  --text: #e0e4f0;
  --text-dim: #7c84a0;
  --accent: #3b82f6;
  --accent-glow: rgba(59,130,246,0.15);
  --correct: #10b981;
  --correct-bg: rgba(16,185,129,0.1);
  --correct-border: rgba(16,185,129,0.4);
  --wrong: #f43f5e;
  --wrong-bg: rgba(244,63,94,0.1);
  --wrong-border: rgba(244,63,94,0.4);
  --gold: #f59e0b;
  --ch-tag: #818cf8;
}

body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.app { max-width: 760px; margin: 0 auto; padding: 20px; }

.start-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 90vh; text-align: center;
}

.badge {
  display: inline-block; padding: 6px 14px;
  background: var(--accent-glow); border: 1px solid rgba(59,130,246,0.3);
  border-radius: 20px; font-size: 12px; font-weight: 600;
  color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase;
  margin-bottom: 20px;
}

.start-screen h1 { font-size: 30px; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
.start-screen .sub { color: var(--text-dim); font-size: 15px; margin-bottom: 36px; }

.config-section { width: 100%; max-width: 500px; margin-bottom: 20px; text-align: left; }
.config-section label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 8px; font-weight: 500; }

.config-row { display: flex; gap: 12px; margin-bottom: 20px; }

.mode-card {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px; cursor: pointer; transition: all 0.2s; text-align: center;
}
.mode-card:hover { border-color: var(--accent); }
.mode-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.mode-card h3 { font-size: 15px; margin-bottom: 3px; }
.mode-card span { font-size: 12px; color: var(--text-dim); }

select, .num-input {
  width: 100%; padding: 10px 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px; color: var(--text);
  font-size: 14px; font-family: 'Inter', sans-serif; appearance: auto;
}
select:focus, .num-input:focus { outline: none; border-color: var(--accent); }

.btn {
  padding: 13px 36px; font-size: 15px; font-weight: 600; border: none;
  border-radius: 10px; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { filter: brightness(1.15); }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); }

.start-btn-row { margin-top: 12px; }

/* Quiz */
.quiz-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 0; border-bottom: 1px solid var(--border); margin-bottom: 28px;
}
.progress-info { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-dim); }
.score-live { display: flex; gap: 16px; font-size: 13px; font-family: 'JetBrains Mono', monospace; }
.score-correct { color: var(--correct); }
.score-wrong { color: var(--wrong); }

.progress-bar-track { width: 100%; height: 4px; background: var(--surface); border-radius: 2px; margin-bottom: 28px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

.ch-tag {
  display: inline-block; padding: 3px 10px; background: rgba(129,140,248,0.1);
  border: 1px solid rgba(129,140,248,0.25); border-radius: 6px;
  font-size: 12px; color: var(--ch-tag); margin-bottom: 10px;
}

.question-text { font-size: 19px; font-weight: 600; line-height: 1.5; margin-bottom: 24px; }

.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

.option-btn {
  display: flex; align-items: flex-start; gap: 12px; padding: 14px 18px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  cursor: pointer; transition: all 0.15s; text-align: left; font-size: 14px;
  color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.5;
}
.option-btn:hover:not(.disabled) { border-color: var(--accent); background: var(--surface-hover); }

.option-letter {
  font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 12px;
  min-width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
  border-radius: 6px; background: var(--bg); flex-shrink: 0; margin-top: 1px;
}

.option-btn.correct-sel { border-color: var(--correct-border); background: var(--correct-bg); }
.option-btn.correct-sel .option-letter { background: var(--correct); color: #fff; }
.option-btn.wrong-sel { border-color: var(--wrong-border); background: var(--wrong-bg); }
.option-btn.wrong-sel .option-letter { background: var(--wrong); color: #fff; }
.option-btn.correct-rev { border-color: var(--correct-border); background: var(--correct-bg); }
.option-btn.correct-rev .option-letter { background: var(--correct); color: #fff; }
.option-btn.disabled { cursor: default; opacity: 0.55; }
.option-btn.disabled:hover { border-color: var(--border); background: var(--surface); }

.explanation-box {
  margin-top: 16px; padding: 16px 18px; background: var(--surface);
  border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0;
  font-size: 13px; line-height: 1.6; color: var(--text-dim); animation: fadeIn 0.3s ease;
}
.explanation-box strong { color: var(--text); display: block; margin-bottom: 4px; font-size: 12px; letter-spacing: 0.5px; text-transform: uppercase; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.nav-row { display: flex; justify-content: flex-end; margin-top: 24px; }

/* Results */
.results { text-align: center; padding: 50px 0; animation: fadeIn 0.5s ease; }
.results-circle { width: 170px; height: 170px; margin: 0 auto 28px; position: relative; }
.results-circle svg { transform: rotate(-90deg); }
.results-circle .pct-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.pct-number { font-size: 44px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.pct-label { font-size: 13px; color: var(--text-dim); }

.results h2 { font-size: 26px; margin-bottom: 6px; }
.results .subtitle { color: var(--text-dim); font-size: 15px; margin-bottom: 36px; }

.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 36px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
.stat-card .val { font-size: 26px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.stat-card .lbl { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
.stat-card.green .val { color: var(--correct); }
.stat-card.red .val { color: var(--wrong); }
.stat-card.gold .val { color: var(--gold); }

.results-actions { display: flex; gap: 12px; justify-content: center; }

.review-section { margin-top: 40px; text-align: left; }
.review-section h3 { font-size: 17px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.review-item { padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; border-left: 3px solid var(--wrong); }
.review-q { font-weight: 600; margin-bottom: 6px; font-size: 14px; }
.review-meta { font-size: 12px; color: var(--text-dim); display: flex; gap: 14px; flex-wrap: wrap; }
.review-your { color: var(--wrong); }
.review-correct-label { color: var(--correct); }

@media (max-width: 600px) {
  .config-row { flex-direction: column; }
  .stat-grid { grid-template-columns: 1fr; }
  .question-text { font-size: 17px; }
  .start-screen h1 { font-size: 24px; }
}
</style>
</head>

nation":"Source: Ch2: Risk Management, Quiz Question 10"},{"id":18,"chapter":"Ch2: Risk Management","options":{"A":"Mitigate, remediate, ameliorate, reduce","B":"Avoid, accept, reduce, transfer","C":"Deny, transfer, reduce, ignore","D":"Tolerate, treat, transfer, accept"},"correct":"B","question":"What are the four types of responses to risks?","explanation":"Source: Ch2: Risk Management, Quiz Question 11"},{"id":19,"chapter":"Ch2: Risk Management","options":{"A":"How risk-averse an organization is","B":"The measuring stick by which we choose our risk responses","C":"The result of a variety of factors, such as organization type and leadership","D":"All of these answers are correct."},"correct":"D","question":"What is risk tolerance?","explanation":"Source: Ch2: Risk Management, Quiz Question 12"},{"id":20,"chapter":"Ch2: Risk Management","options":{"A":"Mitigated risk","B":"Risk tolerance","C":"Business risk","D":"Residual risk"},"correct":"D","question":"Which of the following is the risk that will remain after a treatment plan is implemented?","explanation":"Source: Ch2: Risk Management, Quiz Question 13"},{"id":21,"chapter":"Ch2: Risk Management","options":{"A":"Mapping out a plan, assigning a control owner, and regular monitoring and review","B":"Assigning ratings, assessing the organization, and regular monitoring and review","C":"Mapping out a plan, planning a meeting, and holding said meeting","D":"One part: deciding how risk will be treated"},"correct":"A","question":"What are the three parts to risk treatment?","explanation":"Source: Ch2: Risk Management, Quiz Question 14"},{"id":22,"chapter":"Ch2: Risk Management","options":{"A":"They are not related.","B":"Each control addresses a risk, whether directly defined or not.","C":"They are a type of risk management.","D":"They are the defined and documented risk treatment plans."},"correct":"B","question":"How are security controls related to risk management?","explanation":"Source: Ch2: Risk Management, Quiz Q oS attack is executed remotely."},"correct":"A","question":"What is the main difference between a DDoS attack and a regular DoS attack?","explanation":"Source: Ch3: Threats to Security, Quiz Question 6"},{"id":31,"chapter":"Ch3: Threats to Security","options":{"A":"Secure and encrypted networks","B":"Government organizations and military networks","C":"In places with insecure Wi-Fi, such as coffee shops or hotels","D":"Internal networks within an organization"},"correct":"C","question":"Where are man-in-the-middle (MITM) attacks typically executed?","explanation":"Source: Ch3: Threats to Security, Quiz Question 7"},{"id":32,"chapter":"Ch3: Threats to Security","options":{"A":"By intercepting and altering data between communicating parties","B":"By flooding a system with traffic through coordinated efforts","C":"By analyzing unintended information leaked by a system\u2019s physical implementation","D":"By gaining physical access to a system\u2019s hardware components"},"correct":"C","question":"How do side-channel attacks exploit system vulnerabilities?","explanation":"Source: Ch3: Threats to Security, Quiz Question 8"},{"id":33,"chapter":"Ch3: Threats to Security","options":{"A":"Stateful and stateless","B":"Network-based and host-based","C":"Proxy and packet filtering","D":"Next-generation and web application"},"correct":"B","question":"What are the two categories of firewalls?","explanation":"Source: Ch3: Threats to Security, Quiz Question 9"},{"id":34,"chapter":"Ch3: Threats to Security","options":{"A":"Packet filtering firewalls inspect data packets based on payload content, while web application firewalls monitor IP information.","B":"Packet filtering firewalls authenticate clients and forward requests to servers, while web application firewalls authenticate servers and forward requests to clients.","C":"Packet filtering firewalls analyze surface-level data such as IP addresses and ports, while web application firewalls inspect HTTP traffic and protect against const CHAPTERS = [...new Set(ALL_QUESTIONS.map(q => q.chapter))];

let state = {
  screen:'start', mode:'all', chapter:'all', count:20,
  questions:[], current:0, answered:null, score:0, wrong:0, answers:[]
};

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function startQuiz(){
  let pool = state.chapter === 'all' ? [...ALL_QUESTIONS] : ALL_QUESTIONS.filter(q => q.chapter === state.chapter);
  if(state.mode==='random') pool = shuffle(pool);
  const n = Math.min(Math.max(1, state.count), pool.length);
  state.questions = pool.slice(0, n);
  state.current = 0; state.answered = null;
  state.score = 0; state.wrong = 0; state.answers = [];
  state.screen = 'quiz'; render();
}

function selectAnswer(l){
  if(state.answered) return;
  const q = state.questions[state.current];
  const ok = l === q.correct; state.answered = l;
  if(ok) state.score++; else state.wrong++;
  state.answers.push({qIndex:state.current, selected:l, correct:q.correct, isCorrect:ok});
  render();
}

function nextQuestion(){
  state.current++; state.answered = null;
  if(state.current >= state.questions.length) state.screen = 'results';
  render(); window.scrollTo({top:0,behavior:'smooth'});
}

function render(){
  const app = document.getElementById('app');
  if(state.screen==='start') renderStart(app);
  else if(state.screen==='quiz') renderQuiz(app);
  else renderResults(app);
}

function renderStart(app){
  const chOpts = CHAPTERS.map(c => `<option value="${c}" ${state.chapter===c?'selected':''}>${c}</option>`).join('');
  const poolSize = state.chapter === 'all' ? ALL_QUESTIONS.length : ALL_QUESTIONS.filter(q=>q.chapter===state.chapter).length;
  app.innerHTML = `
    <div class="start-screen">
      <div class="badge">Pearson Cert Guide</div>
      <h1>ISC2 Certified in<br>Cybersecurity</h1>
      <p class="sub">${ALL_QUESTIONS.length} quiz questions across ${CHAPTERS.length} chapters</p>
      <div class="config-section">
        <label>Study mode</label>
        <div class="config-row">
          <div class="mode-card ${state.mode==='all'?'selected':''}" onclick="state.mode='all';render()">
            <h3>Sequential</h3><span>In order</span>
          </div>
          <div class="mode-card ${state.mode==='random'?'selected':''}" onclick="state.mode='random';render()">
            <h3>Random</h3><span>Shuffled</span>
          </div>
        </div>
        <label>Chapter</label>
        <select onchange="state.chapter=this.value;render()" style="margin-bottom:16px">
          <option value="all" ${state.chapter==='all'?'selected':''}>All Chapters (${ALL_QUESTIONS.length})</option>
          ${chOpts}
        </select>
        <label>Number of questions (${poolSize} available)</label>
        <input type="number" class="num-input" min="1" max="${poolSize}" value="${Math.min(state.count, poolSize)}" onchange="state.count=parseInt(this.value)||20">
      </div>
      <div class="start-btn-row"><button class="btn btn-primary" onclick="startQuiz()">Start Quiz</button></div>
    </div>`;
}

function renderQuiz(app){
  const q=state.questions[state.current], total=state.questions.length;
  const pct=((state.current+(state.answered?1:0))/total*100).toFixed(0);
  const letters=Object.keys(q.options).sort();
  let opts='';
  letters.forEach(l=>{
    let c='option-btn';
    if(state.answered){
      c+=' disabled';
      if(l===state.answered&&l===q.correct)c+=' correct-sel';
      else if(l===state.answered&&l!==q.correct)c+=' wrong-sel';
      else if(l===q.correct)c+=' correct-rev';
    }
    opts+=`<button class="${c}" onclick="selectAnswer('${l}')"><span class="option-letter">${l}</span><span>${q.options[l]}</span></button>`;
  });
  let exp='';
  if(state.answered) exp=`<div class="explanation-box"><strong>Answer</strong>Correct answer: ${q.correct}. ${q.options[q.correct]}<br><small>${q.explanation}</small></div>`;
  let nav='';
  if(state.answered){
    const last=state.current>=total-1;
    nav=`<div class="nav-row"><button class="btn btn-primary" onclick="nextQuestion()">${last?'View Results':'Next →'}</button></div>`;
  }
  app.innerHTML=`
    <div class="quiz-header">
      <span class="progress-info">${state.current+1} / ${total}</span>
      <div class="score-live"><span class="score-correct">✓${state.score}</span><span class="score-wrong">✗${state.wrong}</span></div>
    </div>
    <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="ch-tag">${q.chapter}</div>
    <div class="question-text">${q.question}</div>
    <div class="options">${opts}</div>${exp}${nav}`;
}

function renderResults(app){
  const total=state.questions.length, pct=Math.round(state.score/total*100);
  const passed=pct>=70, circ=2*Math.PI*75, off=circ-(pct/100)*circ;
  const col=passed?'var(--correct)':'var(--wrong)';
  let grade='';
  if(pct>=90)grade='Outstanding!';else if(pct>=80)grade='Great job!';
  else if(pct>=70)grade='You passed!';else if(pct>=60)grade='Almost there';
  else grade='Keep studying';
  const wrongs=state.answers.filter(a=>!a.isCorrect);
  let rev='';
  if(wrongs.length>0){
    rev=`<div class="review-section"><h3>Review Incorrect (${wrongs.length})</h3>`;
    wrongs.forEach(a=>{
      const q=state.questions[a.qIndex];
      rev+=`<div class="review-item"><div class="review-q">${q.question}</div><div class="review-meta"><span class="review-your">Yours: ${a.selected}. ${q.options[a.selected]}</span><span class="review-correct-label">Correct: ${a.correct}. ${q.options[a.correct]}</span></div></div>`;
    });
    rev+='</div>';
  }
  app.innerHTML=`
    <div class="results">
      <div class="results-circle">
        <svg width="170" height="170" viewBox="0 0 170 170">
          <circle cx="85" cy="85" r="75" stroke="var(--border)" stroke-width="7" fill="none"/>
          <circle cx="85" cy="85" r="75" stroke="${col}" stroke-width="7" fill="none" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" style="transition:stroke-dashoffset 1s ease"/>
        </svg>
        <div class="pct-text"><span class="pct-number" style="color:${col}">${pct}%</span><span class="pct-label">${passed?'PASS':'FAIL'}</span></div>
      </div>
      <h2>${grade}</h2>
      <p class="subtitle">${state.score} of ${total} correct</p>
      <div class="stat-grid">
        <div class="stat-card green"><div class="val">${state.score}</div><div class="lbl">Correct</div></div>
        <div class="stat-card red"><div class="val">${state.wrong}</div><div class="lbl">Incorrect</div></div>
        <div class="stat-card gold"><div class="val">${pct}%</div><div class="lbl">Score</div></div>
      </div>
      <div class="results-actions">
        <button class="btn btn-secondary" onclick="state.screen='start';render()">New Quiz</button>
        <button class="btn btn-primary" onclick="startQuiz()">Retry</button>
      </div>${rev}
    </div>`;
}

render();
</script>

</html>
