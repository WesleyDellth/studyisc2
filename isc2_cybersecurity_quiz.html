ssphrases","C":"Biometric authentication","D":"Two-factor authentication"},"correct":"A","explanation":"Self-service password reset is a measure that can decrease the number of help desk cases related to password changes. With self-service password reset, users can reset their passwords without a help desk agent's assistance, reducing the help desk's workload and increasing user autonomy. The remaining options are not measures that directly address the issue of help desk cases related to password changes. Two-factor and biometric authentication are authentication measures that enhance security, bu"},{"id":333,"question":"Which of the following is NOT considered an insider threat?","options":{"A":"An external hacker breaching the company's firewall","B":"An employee accidentally downloading malware","C":"A vendor misusing company data","D":"An employee knowingly stealing sensitive data"},"correct":"A","explanation":"Insider threats are defined as malicious activities that originate from within an organization, such as an employee or contractor with authorized access to the organization's systems and data (see ISC2 Study Guide, Module 2, under Types of Threats). Examples of insider threats include an employee knowingly stealing sensitive data, an employee accidentally downloading malware, or a vendor misusing company data. An external hacker breaching the company's firewall is not considered an insider threa"},{"id":334,"question":"In the context of physical access controls, what is the purpose of implementing a mantrap?","options":{"A":"To enable unrestricted access to secure areas","B":"To eliminate the need for security personnel","C":"To prevent tailgating by requiring authentication at two separate points before granting access","D":"To provide a comfortable waiting area for visitors"},"correct":"C","explanation":"Mantraps are physical security measures that consist of a small, secured space with two sets of access-controlled doors, ensuring that only one person can pass through at a time and helping to prevent unauthorized access (see ISC2 Study Guide, Module 2, under Types of Physical Access Controls). Monitoring employee activity is not the primary purpose of a mantrap. Allowing multiple people to enter simultaneously is the opposite of what a mantrap is designed for. Providing a comfortable waiting ar"},{"id":335,"question":"What network security device allows remote users to securely connect to a private network over the public Internet by encrypting their communications?","options":{"A":"Intrusion Detection System (IDS)","B":"Virtual Private Network (VPN)","C":"Firewall","D":"Proxy Server"},"correct":"B","explanation":"A Virtual Private Network (VPN) is a network security device that allows remote users to securely connect to a private network over the public Internet by encrypting their communication (see ISC2 Study Guide, Module 3, under Virtual Private Network). A VPN creates a secure tunnel between the remote user and the private network, allowing users to access resources on the private network without exposing their identity. A firewall is a network security device that protects a network from malicious "},{"id":336,"question":"Which one of the following security tools would be in the best position to detect malicious behavior in a device (e.g., your personal computer)?","options":{"A":"DLP","B":"HIDS","C":"Firewall","D":"NIDS"},"correct":"B","explanation":"HIDS. Host-based Intrusion Detection Systems (HIDS) are designed to monitor and detect malicious behavior on a single device, such as a personal computer (see ISC2 Study Guide, Chapter4, Module 2, under Intrusion Detection System). Network-based Intrusion Detection Systems (NIDS) are designed to monitor and detect malicious behavior on a network, while firewalls are designed to prevent malicious traffic from entering a network. Data Loss Prevention (DLP) systems are designed to detect and preven"},{"id":337,"question":"When developing a banking website, what is the advised method to confirm user identities?","options":{"A":"Requiring password and username","B":"Requiring password and pin code","C":"Requiring password and personal answers","D":"Requiring password and sms token"},"correct":"D","explanation":"Requiring password and sms token. When developing a banking website, it is crucial to implement robust methods for confirming user identities to prevent unauthorized access and protect sensitive financial data (see ISC2 Study Guide, Chapter 3, Module 1). A combination of different identity verification methods is often recommended to ensure optimal security, and requiring a password and an SMS token is the most advisable method among the options as it provides an additional layer of protection."},{"id":338,"question":"What type of physical access control mechanism involves the use of electronic cards or key fobs that contain unique identifying information?","options":{"A":"Biometric access control","B":"Tailgating prevention","C":"Electronic access control","D":"Mechanical locks and keys"},"correct":"C","explanation":"154 | P a g e Electronic access control systems (see ISC2 Study Guide, Module 2, under Types of Physical Access Controls) utilize electronic cards or key fobs containing unique identifying information to grant or deny access to specific areas. These systems often provide enhanced security and audit capabilities compared to traditional mechanical locks and keys. Biometric access control is a type of physical access control that uses biometric data such as fingerprints or retinal scans to authenti"},{"id":339,"question":"Which of the following principle states that individuals should be held to a standard of doing what a reasonable person would do under similar circumstances?","options":{"A":"Separation of duties","B":"Due diligence","C":"Least privilege","D":"Due care"},"correct":"D","explanation":"Due care dictates that individuals should adhere to a standard of doing what a reasonable person does in comparable conditions (see ISC2 Study Guide, Chapter 3, Module 1). On the other hand, due diligence is taking necessary precautions and ensuring that due care is implemented. Separation of duties is a control mechanism to prevent fraud. At the same time, least privilege is the principle of providing users with the minimum access necessary to perform their job functions. Due care is the primar"},{"id":340,"question":"To which OSI layer does a MAC address belong to?","options":{"A":"The Application layer","B":"The Session layer","C":"The Data Link layer","D":"The Physical layer"},"correct":"C","explanation":"A MAC address belongs to the Data Link layer of the OSI model. The Data Link layer is responsible for providing error-free transfer of data between nodes on the same local 155 | P a g e network, and it is where network interface cards (NICs) and MAC addresses are defined. The MAC address is a unique identifier assigned to a network interface card, and it is used for communication within the local network. In forensic investigations, MAC addresses can be used to track the physical location of dev"},{"id":341,"question":"What is the term for the random value added to a password to prevent rainbow table attacks? (\u2605)","options":{"A":"MD5","B":"Extender","C":"Hash","D":"Salt"},"correct":"D","explanation":"Salt is a random value added to a password before it is hashed. It is used to prevent attacks such as rainbow tables, which can be used to crack passwords by precomputing hash values for common passwords. By adding a unique salt to each password, even if two users have the same password, their hashed passwords will be different. This strategy makes it much more difficult for an attacker to crack the passwords using a precomputed table (see ISC2 Study Guide, Chapter 5, Module 3). Hashing is a one"},{"id":342,"question":"What is the PRIMARY purpose of using an intrusion detection and prevention system?","options":{"A":"To stop malicious code","B":"To detect and block malicious attacks","C":"To prevent existing threats","D":"To detect attempts to connect to a system"},"correct":"B","explanation":"The primary purpose of using an intrusion detection and prevention system is to detect and block malicious attacks (see ISC2 Study Guide, Module 2, under Intrusion Detection System). An IDS can detect attempts to connect to a system, but its primary purpose is to detect and block malicious attacks. It can also prevent existing threats, but its primary focus 156 | P a g e is on detecting and blocking malicious attacks. An IDS can also be used to stop malicious code, but it is not its primary purp"},{"id":343,"question":"What type of malware is designed to replicate itself and spread to other devices without any user intervention?","options":{"A":"Trojan","B":"Worm","C":"Virus","D":"Ransomware"},"correct":"B","explanation":"A worm is a type of malware that is designed to replicate itself and spread to other devices without any user intervention (see ISC2 Study Guide, Module 2, under Types of Threats). A virus is a type of malicious software designed to damage or disrupt a system, while a Trojan is a type of malware masquerading as a legitimate program. Ransomware is malware that encrypts data on a system and demands a ransom in exchange for the decryption key."},{"id":344,"question":"To ensure cybersecurity practices remain effective, which documents should be regularly updated and reviewed?","options":{"A":"Standards","B":"Procedures","C":"Regulations","D":"Policies"},"correct":"D","explanation":"Policies should be regularly reviewed and updated to ensure that an organization's cybersecurity practices remain effective and current. As the threat landscape and an organization's environment evolve, policies should be revised to reflect those changes and maintain the organization's security posture (see ISC2 Study Guide, Module 4, under Governance Elements). The remaining options are not typically reviewed and updated regularly to ensure that an organization's cybersecurity practices remain "},{"id":345,"question":"Which of the following is a logical access control method that verifies the identity of a user before granting access to a system?","options":{"A":"Authentication","B":"Firewall","C":"Intrusion detection system","D":"Encryption"},"correct":"A","explanation":"Authentication is the process of verifying the identity of a user, device, or system before granting access to information systems and data. Authentication is an important part of logical access control, as it ensures that only authorized users can access a system or data. Other options are related to securing data and networks but do not specifically verify user identity for access control purposes. Encryption protects data confidentiality, firewalls control traffic between networks, and intrus"},{"id":346,"question":"Which is the second phase of the data handling life cycle?","options":{"A":"Destruction phase","B":"Creation phase","C":"Storage phase","D":"Sharing phase"},"correct":"C","explanation":"The second data handling life cycle phase is Storage (see ISC2 Study Guide, Module 1, under Data Handling). In this phase, data is securely stored in servers and databases. The Creation phase is the first phase in the data handling life cycle. In this phase, data is created by internal users or received from external sources. The Sharing phase is the fourth phase of the data handling life cycle. In this phase, data is shared with external users or organizations. The Destruction phase is the last"},{"id":347,"question":"What term refers to the primary problem with granting access to a system that is beyond the requirements of the user's job?","options":{"A":"Least privilege","B":"Privilege creep","C":"Excessive privileges","D":"Rights collision"},"correct":"B","explanation":"Privilege creep is the primary problem with granting system access that exceeds a user's job requirements (see ISC2 Study Guide, Chapter 3, Module 1). Rights collision refers to conflicts between access control policies. At the same time, least privilege is the principle of providing users with only the minimum access required to perform their job functions. Excessive privileges is a general term for any situation where users can access more resources or data than they need to perform their job "},{"id":348,"question":"What is the PRIMARY objective of baselines?","options":{"A":"To establish a minimum level of protection that can be used as a reference point","B":"To monitor and detect security events","C":"To protect data from unauthorized access","D":"To identify potential threats"},"correct":"A","explanation":"The primary objective of baselines is to establish a minimum level of protection that can be used as a reference point (see ISC2 Study Guide, Chapter 5, under Module 2). Baselines provide a basis for comparison and establish standard operating conditions within a system. Baselines provide a way to measure against past events and can be used to detect anomalies that could indicate a security incident. Additionally, baselines can be used to identify potential threats, monitor and detect security e"},{"id":349,"question":"Which of the following is a best practice to support regulatory and contractual obligations?","options":{"A":"Defining appropriate data usage within the organization","B":"Complying with legal definitions and regulations","C":"Ensuring simplicity for user understanding","D":"Encompassing all requirements in a single policy"},"correct":"B","explanation":"Complying with legal definitions and regulations is a best practice to support regulatory and contractual obligations (see ISC2 Study Guide, Chapter 5, Module 3). By understanding and adhering to legal requirements, the organization can ensure that it meets its obligations and avoids penalties, legal disputes, and reputational damage. Ensuring simplicity for user understanding is important for ensuring that users understand and follow the policies, but it does not necessarily ensure compliance w"},{"id":350,"question":"Which of the following types of information is considered PII?","options":{"A":"A public blog post","B":"A network topology diagram","C":"A user's date of birth","D":"A corporate policy document"},"correct":"C","explanation":"Personally Identifiable Information, includes any data that can be used to identify a specific individual (see ISC2 Study Guide, Module 1, under Privacy). Examples of PII include names, social security numbers, and dates of birth. Therfores, in this list, a user's date of birth is PII. A public blog post is not considered PII, it is public information. Corporate policy and network diagrams are examples of confidential documents but not PII. In general, neither contains any information that can b"},{"id":351,"question":"160 | P a g e Which technology is BEST for port-based authentication to ensure that network clients authenticate before use?","options":{"A":"802.1x","B":"802.15.1","C":"802.3","D":"802.11g"},"correct":"A","explanation":"The best technology for port-based authentication to ensure network clients authenticate before use is 802.1x. 802.1x is a standard for port-based network access control that provides a mechanism for authenticating devices before granting them access to the network. This technology is commonly used to secure wired and wireless networks. It ensures that only authenticated devices are allowed to access the network (see ISC2 Study Guide, Module 3, under Network Access Control). While 802.11g is a w"},{"id":352,"question":"How does encryption contribute to system hardening? (\u2605)","options":{"A":"By reducing the attack surface of the system","B":"By implementing strong password policies","C":"By protecting data at rest and in transit from unauthorized access","D":"By managing user permissions and access controls"},"correct":"C","explanation":"Encryption helps secure sensitive data, ensuring it remains confidential and inaccessible to unauthorized users, even if other security measures are compromised. Encryption helps harden a system by protecting data at rest and in transit from unauthorized access, making it more difficult for attackers to access and exploit sensitive data (see ISC2 Study Guide, Chapter 5, under Module 2). Encryption does not reduce the attack surface of the system, manage user permissions and access controls, or i"},{"id":353,"question":"Which attacks involve an attacker using a list of pre-computed hashes to find a matching hash value for a user's password? (\u2605)","options":{"A":"Dictionary Attack","B":"Brute Force Attack","C":"Spoofing Attack","D":"Rainbow Table Attack"},"correct":"D","explanation":"A rainbow table attack uses precomputed hashes to find a matching hash value for a user's password (see ISC2 Study Guide, Module 2, under Types of Threats). A dictionary attack is a type of attack that uses a list of common words to guess a user's password. In contrast, a brute force attack uses a combination of letters, numbers, and symbols to guess a user's password. Spoofing is an attack involving an attacker impersonating another user to gain access to a system."},{"id":354,"question":"Which type of network attack involves an attacker intercepting and potentially altering the communication between two parties without their knowledge?","options":{"A":"Man-in-the-Middle Attack","B":"Phishing Attack","C":"Distributed Denial-of-Service Attack","D":"SQL Injection Attack"},"correct":"A","explanation":"In a Man-in-the-Middle (MitM) attack, an attacker intercepts and potentially alters the communication between two parties without their knowledge (see ISC2 Study Guide, Module 2, under Types of Threats). This attack is used to access sensitive information, such as passwords and financial data. The other options are not related to a MitM attack. Distributed Denial-of-Service (DDoS) attack is an attack in which an attacker attempts to make a service or network resource unavailable by flooding it w"},{"id":355,"question":"What access control model allows the owner of a file to grant access to others via an access control list?","options":{"A":"Role based","B":"Rule based","C":"Non discretionary","D":"Discretionary"},"correct":"D","explanation":"Discretionary access controls (DAC) (see ISC2 Study Guide, Module 3) enables the owner of a file to grant access to others through an access control list. In DAC, the owner or administrator of an object or resource decides who can access it and what actions they can 162 | P a g e perform. Other access control models, such as non-discretionary, rule-based, and role- based, may not allow such granular control. DAC is the only option that allows the owner of a file to grant access to others through"},{"id":356,"question":"Which of the following is not a physical control?","options":{"A":"Bollards","B":"Stop Sign in a Parking Lot","C":"Door lock","D":"Turnstile"},"correct":"B","explanation":"Stop Sign in a Parking Lot is not a physical control. Physical controls are tangible objects that can be used to restrict access to physical resources (see ISC2 Study Guide, Module 1, under Physical Security). Examples of physical controls include bollards, door locks, and turnstiles. In contrast, a stop sign in a parking lot is an administrative control since it provides constraints and standards for human behavior. Administrative controls are policies, procedures, and guidelines that are used "},{"id":357,"question":"What is the main difference between symmetric and asymmetric encryption?","options":{"A":"A symmetric encryption is commonly more secure than asymmetric encryption","B":"Asymmetric encryption uses the same key for encryption and decryption, while asymmetric encryption uses the same keys for encryption and decryption","C":"A symmetric encryption is slower than asymmetric encryption","D":"Symmetric encryption uses the same key for encryption and decryption, while asymmetric encryption uses different keys for encryption and decryption"},"correct":"D","explanation":"Symmetric encryption uses the same key for encryption and decryption. In contrast, asymmetric encryption uses different keys for encryption and decryption (see ISC2 Study Guide, Module 1, under Encryption Overview). In symmetric encryption, the same key is used for both encrypting and decrypting data. This makes symmetric encryption faster than asymmetric encryption. Asymmetric encryption uses two different keys for encrypting and decrypting data. Using two different keys increases the security "},{"id":358,"question":"Which category of cloud services does a ready-to-use email service fall into?","options":{"A":"CaaS","B":"IaaS","C":"SaaS","D":"PaaS"},"correct":"C","explanation":"SaaS. Software as a Service (SaaS) is a cloud service that provides users access to a ready- to-use application or service over the Internet (see ISC2 Study Guide, Module 4, under Cloud Service Models). SaaS is typically used for email, office suites, customer relationship management (CRM), and enterprise resource planning (ERP) applications. Infrastructure as a Service (IaaS) provides users access to virtualized computing resources such as servers, storage, and networks. In contrast, Platform a"},{"id":359,"question":"Which principle of the ISC2 Code of Ethics Canons obliges to prioritize public interest and protect critical infrastructure over personal or organizational interests?","options":{"A":"Act honorably, honestly, justly, responsibly, and legally","B":"Advance and protect the profession","C":"Protect society, the common good, necessary public trust and confidence, and the infrastructure","D":"Provide diligent and competent service to principals"},"correct":"C","explanation":"Protect society, the common good, necessary public trust and confidence, and the infrastructure (see ISC2 Study Guide, Module 5, under Professional Code of Conduct). This principle emphasizes the importance of protecting the public interest and requires prioritizing public interest and protecting critical infrastructure over personal or organizational interests. The remaining options are not related to this principle. Acting honourably, honestly, justly, responsibly, and legally is associated wi"},{"id":360,"question":"What technology is used to ensure authorized software is used within an organization? (\u2605)","options":{"A":"Blacklisting","B":"Whitelisting","C":"Configuration management","D":"Greylisting"},"correct":"B","explanation":"Whitelisting is a security technique that only allows authorized applications or software to run on a system or network while blocking all other software. In practice, this authorization requires creating a list of approved applications and blocking all other software. This technique provides greater control over software usage and helps prevent malware and unauthorized applications from being installed on a system or network. Blacklisting, on the other hand, blocks known malicious software but "},{"id":361,"question":"Which type of network attack involves an attacker sending specially crafted malicious data to an application or system, causing it to crash or become unresponsive? (\u2605)","options":{"A":"SQL Injection Attack","B":"Man-in-the-Middle Attack","C":"Buffer Overflow Attack","D":"Distributed Denial-of-Service Attack"},"correct":"C","explanation":"A Buffer Overflow attack is a type of attack that involves sending malicious data to an application or system, causing it to crash or become unresponsive. This type of attack takes advantage of programming errors in applications or systems that allow attackers to send malicious data that exceeds the size of the allocated memory buffer, causing the application or system to crash or become unresponsive. The other options are not related to a Buffer Overflow attack. A Man-in-the-Middle attack is a "},{"id":362,"question":"Which U.S. government agency within the Department of Commerce publishes and makes available for free download a wide variety of technical standards, including those for information technology and information security?","options":{"A":"International Organization for Standardization (ISO)","B":"Institute of Electrical and Electronics Engineers (IEEE)","C":"National Institute of Standards and Technology (NIST)","D":"Internet Engineering Task Force (IETF)"},"correct":"C","explanation":"National Institute of Standards and Technology (NIST). NIST is a U.S. government agency within the Department of Commerce that publishes a wide variety of technical standards, including those for information technology and information security. For example, NIST Special Publication 800-53 provides a catalog of security and privacy controls for federal information systems and organizations (ISC2 Study Guide, Module 4, under Governance Elements). The International Organization for Standardization "},{"id":363,"question":"What security principle can help detect fraudulent behavior, such as employees transferring funds to their personal accounts?","options":{"A":"Separation of duties","B":"Least privilege","C":"Zero Trust","D":"Mandatory vacation"},"correct":"D","explanation":"Mandatory vacation would be the primary measure to identify employees transferring funds to a personal account (see ISC2 Study Guide, Chapter 3, Module 1). Separation of duties ensures that no single individual has complete control over a process. 166 | P a g e At the same time, least privilege restricts user access to only necessary functions. Zero Trust is a security concept or framework that assumes no trust for any entity, regardless of whether it's inside or outside of an organization's net"},{"id":364,"question":"Which policy will outline if personally owned equipment is permitted for business purposes?","options":{"A":"Acceptable Use Policy (AUP)","B":"Password Policy (PP)","C":"Data Handling Policy (DHP)","D":"Bring Your Own Device (BYOD) Policy"},"correct":"D","explanation":"The Bring Your Own Device (BYOD) Policy outlines if personally owned equipment is allowed for business purposes (see ISC2 Study Guide, Chapter 5, Module 3). This policy outlines the rules and regulations for using personally owned equipment for business purposes, such as the types of devices that are allowed, the security requirements for the devices, and the acceptable use of the devices. Data Handling Policy outlines how data should be handled within an organization. Password Policy outlines t"},{"id":365,"question":"Which of the following incident response team roles is responsible for coordinating communication between the incident response team and external stakeholders, such as law enforcement or media?","options":{"A":"Incident lead","B":"Public relations coordinator","C":"Legal advisor","D":"Technical lead"},"correct":"B","explanation":"During an incident, the public relations coordinator manages communication with external stakeholders, including law enforcement, media, and other relevant parties (ISC2 Study Guide, Module 7, under Incident Response Team). They are responsible for ensuring that all communication is consistent and accurate and that the incident response team is aware of any relevant external developments. The incident lead, technical lead, and legal advisor 167 | P a g e are all important roles in an incident re"},{"id":366,"question":"Which of the following best describes non-repudiation in the context of digital signatures?","options":{"A":"Verifying the identity of a user attempting to access a system","B":"Providing proof that a specific sender sent a specific message","C":"Guaranteeing that a message has not been tampered with during transmission","D":"Ensuring that a message cannot be read by unauthorized parties"},"correct":"B","explanation":"Non-repudiation, in the context of digital signatures, refers to the ability to provide proof that a particular sender sent a specific message (see ISC2 Study Guide, Module 1, under Non-repudiation). Ensuring that unauthorized parties cannot read a message is a measure used to protect the confidentiality aspect of the CIA Triad. Guaranteeing that a message has not been tampered with during transmission is a measure used to protect integrity. Verifying the identity of a user attempting to access "},{"id":367,"question":"Which of the following is a key component of the risk assessment process?","options":{"A":"Avoiding the use of risk assessment methodologies or frameworks","B":"Ignoring potential threats and vulnerabilities","C":"Identifying and evaluating potential risks based on their likelihood and impact","D":"Focusing solely on risks with minimal impact"},"correct":"C","explanation":"Identifying and evaluating potential risks based on their likelihood and impact is a key component of the risk assessment process (see ISC2 Study Guide, Module 2, under Risk Assessment). Risk assessment is a crucial step in the risk management process, as it allows organizations to understand better the potential risks they face and prioritize their efforts to address the most significant threats and vulnerabilities."},{"id":368,"question":"What network security device filters incoming and outgoing network traffic based on predefined rules and is designed to prevent unauthorized access to or from a protected network?","options":{"A":"Proxy Server","B":"Firewall","C":"Virtual Private Network (VPN) Gateway 168 | P a g e","D":"Intrusion Prevention System (IPS)"},"correct":"B","explanation":"A firewall is a network security device that filters incoming and outgoing network traffic based on predefined rules and is designed to prevent unauthorized access to or from a protected network (see ISC2 Study Guide, Module 3, under Network Design). Firewalls can be configured to allow or deny traffic based on the source and destination IP addresses, port numbers, and protocols. An Intrusion Prevention System (IPS) is a network security device that monitors and detects malicious activity and bl"},{"id":369,"question":"Which type of token-based authentication generates codes at fixed intervals without a server challenge?","options":{"A":"Synchronous","B":"Smart card","C":"RFID","D":"Asynchronous"},"correct":"A","explanation":"Synchronous token-based authentication generates codes at fixed intervals without a server challenge. For instance, a security token might be programmed to generate a new, valid code every 30 seconds. The server and the token stay synchronized so that the server knows what code to expect and when. In contrast, Asynchronous does not generate codes at fixed intervals and instead requires a server challenge for each code. Smart cards, while a form of token-based authentication, typically require a "},{"id":371,"question":"What is the primary goal of an Advanced Persistent Threat (APT) attack?","options":{"A":"To spread quickly and infect as many systems as possible","B":"To exploit vulnerabilities in web applications for financial gain","C":"To disrupt network services and cause downtime","D":"To gain unauthorized access to sensitive data and maintain a long-term presence in the target network"},"correct":"D","explanation":"The primary goal of an Advanced Persistent Threat (APT) attack is to gain unauthorized access to sensitive data and maintain a long-term presence in the target network (see ISC2 Study Guide, Module 2, under Types of Threats). APT attacks are usually conducted by a group of skilled hackers who can gain access to the target network and remain undetected for an extended period. The other options are not the primary goals of an APT attack. Disrupting network services and causing downtime is a type o"},{"id":372,"question":"In the context of the risk management process, what does the term 'residual risk' refer to?","options":{"A":"The risk associated with an organization's assets before any controls are implemented","B":"The risks that are considered irrelevant or insignificant","C":"The total elimination of risk within an organization","D":"The risk that remains after all possible controls and countermeasures have been applied"},"correct":"D","explanation":"Residual risk is the risk that remains after all possible controls and countermeasures have been applied (see ISC2 Study Guide, Module 2, under Risk Treatment). Residual risk is an important concept in risk management, as it helps organizations understand the remaining level of risk they face after implementing their chosen controls and countermeasures, enabling them to make informed decisions about whether additional actions are necessary or if the remaining risk is acceptable. The risk associa"},{"id":373,"question":"Which of the following is a technical control?","options":{"A":"Acceptable use policy","B":"Stop Sign in a Parking Lot","C":"Emergency operation procedure","D":"Access control list (ACL)"},"correct":"D","explanation":"An ACL is a set of rules that specify which users or systems can access specific resources, such as files, directories, and network traffic. An emergency operation procedure, a stop sign in a parking, and acceptable use policy are administrative controls since they provide frameworks, constraints, and standards for human behavior."},{"id":374,"question":"Defence in depth is a strategy that \u2026:?","options":{"A":"Emphasizes physical security over digital security","B":"That focuses on incident response rather than prevention 171 | P a g e","C":"That employs multiple layers of security measures for comprehensive protection","D":"Relies on a single layer of security measures for protection"},"correct":"C","explanation":"Defense in depth is a strategy that employs multiple layers of security measures for comprehensive protection (see ISC2 Study Guide, Module 3, under Defense in Depth). This strategy is designed to protect the system from various threats by using multiple layers of security measures, such as physical security, access control, and encryption. It does not rely on a single layer of security measures or emphasize physical security over digital security. Defense in Depth does not focus on incident res"},{"id":375,"question":"What is the primary purpose of using a mantrap in physical access control?","options":{"A":"To prevent tailgating or piggybacking","B":"To allow multiple people to enter a secured area simultaneously","C":"To monitor employee activity","D":"To serve as a secondary authentication method"},"correct":"A","explanation":"A mantrap is a small, secured space with two sets of interlocking doors that only allows one person to pass through at a time (see ISC2 Study Guide, Module 2, under Types of Physical Access Controls). This setup prevents unauthorized individuals from following an authorized person into a secure area (tailgating or piggybacking). Monitoring employee activity is not the primary purpose of a mantrap. Allowing multiple people to enter simultaneously is the opposite of what a mantrap is designed for."},{"id":376,"question":"Which of the following is a primary objective of implementing physical access controls in an organization?","options":{"A":"To avoid the need for technical security controls","B":"To prevent unauthorized access to facilities and protect sensitive information and resources","C":"To ensure all employees have unrestricted access to all areas","D":"To allow public access to sensitive areas for increased transparency"},"correct":"B","explanation":"Physical access controls (see ISC2 Study Guide, Chapter 2, Module 2) are designed to limit access to an organization's premises and specific areas within, helping to safeguard sensitive data, critical systems, and valuable assets from unauthorized access or tampering. The remaining options are not primary objectives of physical access controls. Ensuring all employees have unrestricted access to all areas is not a primary objective of physical access controls, as they are designed to limit access"},{"id":377,"question":"What is the PRIMARY identity and access management function you use when providing a user ID and password?","options":{"A":"Validation","B":"Authorization","C":"Login","D":"Authentication"},"correct":"D","explanation":"When a user provides a user ID and password, the system checks that information to confirm the user's identity, which is the authentication process (see ISC Study Guide, Module 1, under Control Overview). Authorization is the process of granting access to resources or actions based on the authenticated user's permissions. Validation refers to the process of ensuring that the provided data is correct and meets specific requirements. Login refers to the process of gaining access to a system or app"},{"id":378,"question":"What is created when permissions are listed for individual users on a Unix file system?","options":{"A":"An access control list","B":"Mandatory access control","C":"Role-based access control","D":"An access control entry"},"correct":"D","explanation":"When individual permissions are listed for users on a Unix file system, it creates an access control entry (ACE) for each user (see ISC2 Study Guide, Module 3, under Discretionary Access Control (DAC)). An access control list (ACL) is a list of access control entries that define access permissions 173 | P a g e for multiple users or groups. Role-based access control (RBAC) and mandatory access control (MAC) are other access control models that govern how access is granted to resources (see ISC2 "},{"id":379,"question":"What type of network attack involves an attacker creating a malicious email that appears to come from a legitimate source to trick recipients into revealing sensitive information or downloading malware?","options":{"A":"Spear Phishing Attack","B":"Cross-Site Scripting Attack","C":"Distributed Denial-of-Service Attack","D":"Man-in-the-Middle Attack"},"correct":"A","explanation":"A Spear Phishing Attack is a type of social engineering attack in which an attacker sends emails that appear to come from a legitimate source to trick recipients into revealing sensitive information or downloading malware (see ISC2 Study Guide, Module 2, under Types of Threats). Spear phishing attacks are typically more targeted than other Phishing attacks, making them more effective and harder to detect. The other options are not related to a Spear Phishing Attack. A Man-in-the-Middle Attack is"},{"id":380,"question":"A security analyst discovers a vulnerability in a client's system but decides to withhold the information, fearing negative publicity for the client. Which ISC2 Code of Ethics Canon has the analyst potentially violated?","options":{"A":"Advance and protect the profession","B":"Act honorably, honestly, justly, responsibly, and legally","C":"Provide diligent and competent service to principals","D":"Protect society, the common good, necessary public trust and confidence, and the infrastructure"},"correct":"C","explanation":"The analyst may have violated the (ISC)\u00b2 Code of Ethics canon that requires members to \"render diligent and competent service to principals\" (see ISC2 Study Guide, Module 5, under Professional 174 | P a g e Code of Conduct). By withholding information about a vulnerability, the analyst is not providing diligent service to the client, as it is the analyst's responsibility to inform the client of any vulnerabilities discovered, regardless of potential negative publicity."},{"id":381,"question":"Which ISC2 Code of Ethics Canon is being enacted when an employee refuses a bribe by a vendor to recommend their product and reports the incident?","options":{"A":"Advance and protect the profession","B":"Act honorably, honestly, justly, responsibly, and legally","C":"Protect society, the common good, necessary public trust and confidence, and the infrastructure","D":"Provide diligent and competent service to principals"},"correct":"B","explanation":"Act honorably, honestly, justly, responsibly, and legally (see ISC2 Study Guide, Module 5, under Professional Code of Conduct). This principle emphasizes the importance of acting with integrity and requires security analysts to act honestly and responsibly. Refusing the bribe and reporting the incident is an example of acting honorably, honestly, justly, responsibly, and legally."},{"id":382,"question":"Which of the following is an example of a measure to protect confidentiality?","options":{"A":"Digital signatures and checksums","B":"Access controls and encryption","C":"Backup systems and fault tolerance","D":"Routers and VLANs (Virtual Local Area Network)"},"correct":"B","explanation":"Access controls and encryption are examples of measures that can be implemented to protect the confidentiality aspect of the CIA Triad. These measures help ensure that sensitive information is accessible only to authorized users (see ISC2 Study Guide, Module 3, under What are Security Controls). Backup systems and fault tolerance protect the availability aspect of the CIA Triad, as they contribute to ensure that systems remain operational in case of a system failure. Digital signatures and check"},{"id":383,"question":"is the primary purpose of a forensic investigation during the analysis phase of an incident response?","options":{"A":"To collect evidence and maintain its chain of custody for potential legal proceedings","B":"To identify the attacker and their motivation 175 | P a g e","C":"To document lessons learned and develop an incident response plan","D":"To update the risk registry and minimize the impact of an incident"},"correct":"A","explanation":"The primary purpose of a forensic investigation during the analysis phase of an incident response is to collect and preserve evidence for potential legal proceedings. This involves careful data collection and handling to ensure that the evidence remains admissible in court (ISC2 Study Guide, Module 1, under Incident Response Team)."},{"id":384,"question":"Which of the following security measures is most effective in protecting PII stored on a laptop in case of theft?","options":{"A":"Using strong passwords","B":"Regularly updating antivirus software","C":"Enabling a firewall","D":"Full-disk encryption"},"correct":"D","explanation":"Full-disk encryption ensures that the data on the laptop is encrypted and unreadable without the appropriate decryption key, preventing unauthorized access to the stored PII. This is the most effective security measure for protecting PII stored on a laptop in case of theft (see ISC2 Study Guide, Module 3, under What are Security Controls). The remaining options are not as effective in protecting PII stored on a laptop in case of theft. Using strong passwords is important, but it does not provide"},{"id":385,"question":"What is the primary purpose of a password policy?","options":{"A":"To allow users to share passwords for convenience","B":"To require users to write down their passwords for easy retrieval","C":"To ensure users have a unique password for every system","D":"To enforce the use of strong, complex passwords and periodic password changes"},"correct":"D","explanation":"A password policy helps ensure that users follow the best password creation and management practices, reducing the risk of unauthorized access due to weak or compromised passwords (see ISC2 Study Guide, Chapter 5, Module 3). A password policy's primary purpose is to enforce strong, complex passwords and periodic password changes. Ensuring users have a unique password for every system is an important security measure, but it is not the primary purpose of a password policy. Allowing users to share"},{"id":386,"question":"Which of the following is the MOST effective method to destroy a data tape disk?","options":{"A":"Degaussing","B":"Disk zeroing","C":"Disk encryption","D":"Disk formatting"},"correct":"A","explanation":"Degaussing is the most effective method to destroy data tapes or disks. Degaussing uses a strong magnetic field to erase all data on a disk or tape permanently. This process is irreversible and ensures that the data cannot be recovered. Disk formatting does not erase all data from the disk and can be easily reversed using specialized data recovery tools. Disk encryption does not destroy media but scrambles data into an unreadable state. Disk zeroing involves writing zeros or one overall data on "},{"id":387,"question":"Which aspect ensures that authorized users have timely and reliable access to information and resources?","options":{"A":"Availability","B":"Integrity","C":"Confidentiality","D":"Authentication"},"correct":"A","explanation":"The availability aspect of the CIA Triad aims to ensure that authorized users have timely and reliable access to information and resources (see ISC2 Study Guide, Module 1, under The CIA Triad). This can be achieved through redundancy, backup systems, and fault tolerance. By contrast, the remaining options do not focus on timely and reliable access to information. Confidentiality focuses on protecting information from unauthorized access, integrity focuses on ensuring that information is accurate"},{"id":389,"question":"Which network security device is PRIMARILY responsible for monitoring network traffic and detecting potential threats based on predefined rules or signatures?","options":{"A":"Firewall","B":"Proxy Server","C":"Intrusion Detection System (IDS)","D":"Virtual Private Network (VPN) Gateway"},"correct":"C","explanation":"An Intrusion Detection System (IDS) is a network security device that is primarily responsible for monitoring network traffic and detecting potential threats based on predefined rules or signatures (see ISC2 Study Guide, Module 2). An IDS can detect malicious activity such as unauthorized access attempts, malicious code, and denial of service attacks. A firewall is a device used to control traffic flow between networks, while a Virtual Private Network (VPN) Gateway creates secure connections bet"},{"id":390,"question":"Which of the following is a key component of a Business Continuity Plan (BCP)?","options":{"A":"Avoiding the use of offsite facilities or alternative work locations","B":"Developing strategies to maintain essential operations during and after a major incident","C":"Focusing solely on the prevention of incidents, rather than maintaining operations during a disruption","D":"Ignoring the need for an incident response plan"},"correct":"B","explanation":"A key component of a business continuity plan (BCP) is developing strategies to maintain essential operations during and after a major incident (see the ISC2 Study Guide, Module 2, under The Importance of Business Continuity). This includes identifying critical business functions, determining acceptable downtime for each, and establishing procedures to restore operations within that timeframe. For example, a BCP might include a strategy for shifting operations to a secondary 178 | P a g e site o"},{"id":391,"question":"Which principle of the ISC2 Code of Ethics Canons highlights the importance of providing quality service to clients or employers?","options":{"A":"Provide diligent and competent service to principals","B":"Protect society, the common good, necessary public trust and confidence, and the infrastructure","C":"Act honorably, honestly, justly, responsibly, and legally","D":"Advance and protect the profession"},"correct":"A","explanation":"Provide diligent and competent service to principals (see ISC2 Study Guide, Module 5, under Professional Code of Conduct). This principle emphasizes the importance of providing quality service to clients or employers and fulfilling professional responsibilities with due care and expertise. The remaining options are not related to this principle. Protecting society, the common good, necessary public trust and confidence, and the infrastructure is related to protecting the public interest. Acting "},{"id":392,"question":"What technology prioritizes critical network traffic over browsing and social media? (\u2605)","options":{"A":"VPN","B":"TLS","C":"VLANs","D":"QoS"},"correct":"D","explanation":"179 | P a g e Quality of Service (QoS) refers to the technology that allows the network to prioritize certain types of traffic over others. This prioritization can be beneficial when critical traffic, such as VoIP or video conferencing, needs to take priority over less critical traffic, like browsing and social media. QoS can be implemented using various mechanisms, such as setting up different classes of service (CoS), packet classification, and traffic shaping."},{"id":393,"question":"In an organization, which document provides step-by-step guidance in implementing a security measure?","options":{"A":"Standards","B":"Procedures","C":"Regulations","D":"Policies"},"correct":"B","explanation":"Procedures are typically the most detailed documents in cybersecurity, providing the granular steps required to implement a specific security measure or process. They ensure consistency and help reduce the likelihood of errors in the execution of security tasks (ISC2 Study Guide, Module 4, under Governance Elements). The remaining options are not typically the most detailed documents in the context of cybersecurity and do not provide the granular steps required to implement a specific security m"},{"id":394,"question":"Which of the following controls safeguards an organization during a blackout power outage?","options":{"A":"Uninterruptible power supply (UPS)","B":"Generator","C":"RAID","D":"Redundant servers"},"correct":"A","explanation":"An uninterruptible power supply (UPS) is a device that provides backup power when the primary power source fails (see ISC2 Study Guide, Module 3, under Disaster Recovery). It protects against power outages, surges, and spikes by providing a continuous power supply. Redundant servers, a generator, and RAID are all critical for overall system availability and resilience, but they do not directly address power outages. 180 | P a g e"},{"id":395,"question":"Which principle is primarily concerned with preventing unauthorized data alteration or destruction?","options":{"A":"Availability","B":"Authentication","C":"Integrity","D":"Confidentiality"},"correct":"C","explanation":"Within the CIA Triad, integrity refers to ensuring that data remains accurate, consistent, and trustworthy throughout its lifecycle and, by implication, also preventing unauthorized alteration or destruction (see ISC2 Study Guide, Module 1, under The CIA Triad). Integrity is guaranteed by implementing measures such as using digital signatures, checksums, and version control. Authentication is primarily concerned with verifying the identity of users and ensuring that only authorized users can acc"},{"id":396,"question":"Which of the following is NOT a common system hardening practice?","options":{"A":"Regularly updating antivirus software","B":"Regularly performing backups","C":"Implementing strong-password policies","D":"Disabling unnecessary services and protocols"},"correct":"B","explanation":"While performing regular backups is a critical part of the overall cybersecurity strategy, it is not a practice directly related to system hardening. System hardening refers to securing a system by reducing its attack surface, typically achieved by turning off unnecessary services and protocols, using secure configurations, and implementing strong password policies. For example, imagine a junior cybersecurity engineer tasked with hardening a newly installed server in an organization. They would "},{"id":397,"question":"In the context of risk management, what is the purpose of risk mitigation?","options":{"A":"To focus solely on reactive measures","B":"To avoid the need for a risk management process","C":"To implement controls and countermeasures that reduce the likelihood or impact of identified risks","D":"To disregard potential risks and their impacts"},"correct":"C","explanation":"Implementing controls and countermeasures that reduce the likelihood or impact of identified risks (see ISC2 Study Guide, Module 2, under Risk Treatment). Risk mitigation is an essential aspect of the risk management process, as it involves taking proactive steps to address identified risks and minimize their potential impact on the organization's information and assets. Disregarding potential risks and their impacts, focusing solely on reactive measures, and avoiding the need for a risk managem"},{"id":398,"question":"In the risk management process, which of the following best describes the concept of 'risk acceptance'?","options":{"A":"Implementing controls and countermeasures to eliminate all risks","B":"Ignoring potential risks and their impacts","C":"Acknowledging that certain risks are too costly or impractical to mitigate and accepting the potential consequences","D":"Avoiding the need for a risk management process"},"correct":"C","explanation":"Risk acceptance is a component of the risk management process that involves recognizing when it may be more practical or cost-effective to accept a certain level of risk rather than attempting to eliminate it entirely (see ISC2 Study Guide, Module 2, under Risk Treatment). This decision is an informed choice typically based on the organization's risk appetite and on carefully analyzing the 182 | P a g e potential costs and benefits of implementing additional controls or countermeasures. By contr"},{"id":399,"question":"What is the primary difference between a threat and a vulnerability?","options":{"A":"A threat is a potential source of harm, while a vulnerability is a weakness in a system","B":"A threat is a type of attacker, while a vulnerability is an attack method","C":"A threat is an attack method, while a vulnerability is a type of threat actor","D":"A threat is a weakness in a system, while a vulnerability is a potential source of harm"},"correct":"A","explanation":"A threat is a potential source of harm, while a vulnerability is a weakness in a system (see ISC2 Study Guide, Module 2, under Threats and Vulnerabilities). A threat represents any event or situation that has the potential to cause harm. Regarding the remaining options, a vulnerability is a specific weakness or flaw in a system that an attacker can exploit. A threat is not a weakness in a system, nor is it an attack method. A vulnerability is not a potential source of harm or a type of threat ac"},{"id":400,"question":"Which of the following cloud models puts MOST responsibility on the cloud provider?","options":{"A":"SaaS","B":"IaaS","C":"On-premises","D":"PaaS"},"correct":"A","explanation":"Software as a Service (SaaS) is the model that places the most responsibility on the cloud provider, including managing the application, data, runtime, middleware, operating system, virtualization, servers, storage, and networking. For example, an organization using a SaaS application such as Google Workspace or Microsoft 365 doesn't have to worry about maintaining the servers or updating the software in the underlying infrastructure. The cloud provider takes care of all these aspects, allowing "},{"id":401,"question":"Which of the following is a law with multinational implications?","options":{"A":"NIST 803","B":"ISO 27001","C":"ISO 27002","D":"GDPR"},"correct":"D","explanation":"The General Data Protection Regulation (GDPR) is an example of a law with multinational implications because it applies to all EU member states and sets a minimum standard for data protection across the European Union (see ISC2 Study Guide, Chapter 1, Module 1). The other options are incorrect, as ISO 27001 and ISO 27002 are international standards for information security management. NIST 803 is also a standard (for the secure disposal of media containing sensitive information) ."},{"id":402,"question":"We can say that Mandatory Access Control (MAC) is:","options":{"A":"A type of access control that only exists in physical security systems","B":"A policy that allows all users to access any information in the system","C":"A policy uniformly enforced across all subjects and objects within the system boundary","D":"A policy where subjects have complete control over access to information"},"correct":"C","explanation":"Mandatory access control (MAC) is an access policy that is uniformly enforced for all subjects and objects within the system boundary. This policy manages access rights by assigning classification labels to information and clearance labels to users, and then restricting access based on these labels (ISC2 Study Guide, Chapter 3, Module 3, MAC). The other options are misconceptions about MAC. A policy that gives individuals total control over access to information would not be viable because it wo"},{"id":403,"question":"In change management, what is the purpose of a rollback plan?","options":{"A":"Recovery of the system to the state it was in before the change was made 184 | P a g e","B":"Test new patches and system updates","C":"Introduction of new changes to the environment","D":"Usage on third-party vendor testing"},"correct":"A","explanation":"In change management, a rollback plan aims to restore the system to the state it was in before the change was made (see ISC2 Study Guide, Chapter 5, Module 2). For example, if a software update causes unexpected problems, a rollback plan would be used to restore the system to its previous state, effectively undoing the update. As for the options, they do not accurately represent the purpose of a rollback plan in change management. While introducing new changes to the environment is part of the c"},{"id":404,"question":"Which of the following documents is developed by governments or industry regulators to enforce specific requirements for cybersecurity?","options":{"A":"Standards","B":"Procedures","C":"Policies","D":"Regulations"},"correct":"D","explanation":"Regulations are documents developed by governments or industry regulators to enforce specific cybersecurity requirements (ISC2 Study Guide, Chapter 1, Module 4). They are legally binding and must be followed. In contrast, policies, procedures, and standards are typically internal documents developed by organizations to guide their operations, enforce consistency, and ensure compliance with both internal objectives and external regulations."},{"id":405,"question":"Which of the following options BEST describes the concept of a network?","options":{"A":"A group of computers with no connection to one another","B":"A group of computers sharing data, information or resources","C":"A single computer that exchanges data with itself","D":"A single computer"},"correct":"B","explanation":"185 | P a g e The most accurate description of a network is a group of computers that share data, information, or resources (see ISC2 Study Guide, Chapter 4, Module 1). A network facilitates communication between devices, allowing them to share resources and information efficiently. For example, in an office environment, computers are networked together to share files, printers, and Internet access. The other options do not properly define a network. A single computer, or a single computer shari"},{"id":406,"question":"What is a definition for cloud computing?","options":{"A":"A set of computing resources used for data storage only","B":"A set of computing resources sold as a service","C":"A set of computing resources used only for data analysis","D":"A set of computing resources sold as a product"},"correct":"B","explanation":"Cloud computing is defined as a set of computing resources sold as a service (see ISC2 Study Guide, Chapter 4, Module 3). This means that users can access and use these resources, such as storage, processing power, and applications, over the Internet on a pay-as-you-go basis. This eliminates the need for users to invest in and maintain their own physical computing infrastructure. The other options do not accurately define cloud computing. A set of computing resources sold as a product is incorre"},{"id":407,"question":"What is the difference between a Business Continuity Plan (BCP) and a Disaster Recovery Plan (DRP)?","options":{"A":"Business Continuity Plan is about restoring IT and communications back to full operations, while Disaster Recovery Plan is about maintaining critical business functions","B":"Business Continuity Plan is about providing a high-level overview of the plan, while Disaster Recovery Plan is about maintaining critical business functions","C":"Business Continuity Plan is about maintaining critical business functions, while Disaster Recovery Plan is about restoring IT and communications back to full operations","D":"Business Continuity Plan is about restoring IT and communications back to full operations, while Disaster Recovery Plan is about providing a high-level overview of the plan"},"correct":"C","explanation":""},{"id":408,"question":"What is the European Union's General Data Protection Regulation (GDPR)?","options":{"A":"A regulation that applies to all organizations, foreign or domestic, doing business in the EU or any persons in the EU","B":"A law that defines privacy and data protection concepts","C":"A law that regulates the collection and use of public data","D":"A law that puts HIPPA regulation into practice with more stringent requirements"},"correct":"A","explanation":"GDPR is a comprehensive data protection regulation that applies to all organizations that process the personal data of individuals residing in the European Union, regardless of their location. This regulation aims to protect the fundamental rights and freedoms of individuals by regulating the collection, use, and processing of personal data (see ISC2 Study Guide, Chapter 1, Module 1). While the GDPR regulates the collection and use of public data, the GDPR defines privacy and data protection, bu"},{"id":409,"question":"In terms of social engineering tactics, what does 'vishing' refer to?","options":{"A":"Following an authorized user into a restricted area","B":"Using a rogue interactive voice response system","C":"Impersonating an authority figure or trusted individual","D":"Requesting password or login credentials in exchange for compensation"},"correct":"B","explanation":"Vishing refers to the social engineering tactic of using a fraudulent interactive voice response system to trick victims into divulging sensitive information (see ISC2 Study Guide, Chapter 5, Module 4). For example, a fraudster might set up an automated call system that mimics a bank's phone service and ask the victim to enter his or her account number and PIN for \"verification purposes\". Although the remaining options are social engineering tactics, they do not define vishing. In particular, im"},{"id":411,"question":"To protect sensitive information, when is sanitization or destruction required?","options":{"A":"When new data is added to the system","B":"When new software is upgraded to the system","C":"When elements of the system are to be removed and replaced","D":"When elements of the system are to be added"},"correct":"C","explanation":"Sanitization or destruction of sensitive information is required when system elements are to be removed and replaced (see ISC2 Study Guide, Chapter 5, Module 1). This ensures that sensitive information does not fall into the wrong hands. For example, before disposing of an old hard drive, it should be properly sanitized or destroyed to prevent unauthorized access to the data it once held. The other options do not accurately describe when sanitization or destruction of sensitive information is re"},{"id":412,"question":"The first step in the risk management process is:","options":{"A":"Analyze risks","B":"Identify risks","C":"Mitigate risks","D":"Assess risks"},"correct":"B","explanation":"The first step in the risk management process is to identify risks (see ISC2 Study Guide, Chapter 1, Module 2). Identifying risks involves understanding the potential threats and vulnerabilities that could affect an organization's information systems and data. Analyzing risks involves assessing the probability and impact of the identified risks. Assessing risks involves determining the likelihood of a risk occurring and the potential impact of the risk. Mitigating risks involves taking steps to "},{"id":413,"question":"What is the term used to describe the combination of the likelihood of a threat and the potential impact of the threat?","options":{"A":"Vulnerability","B":"Zero-Day","C":"Breach","D":"Risk"},"correct":"D","explanation":"In cybersecurity, risk is defined as the potential for loss or damage if a threat exploits a vulnerability. Risk is calculated as a function of the likelihood that a particular threat will trigger or exploit a particular vulnerability and the resulting impact on the organization. This concept is a cornerstone of risk management and is often used to determine the appropriate level of security controls and measures (see ISC2 Study Guide Chapter 2, Module 1). 189 | P a g e For example, consider a s"},{"id":414,"question":"Physical access controls are employed to:","options":{"A":"Ensure everyone has access to the facility","B":"Protect the assets of a company, including its personnel","C":"Keep track of employee's movements","D":"Enable easy and efficient entry and exit of personnel"},"correct":"B","explanation":"Physical access controls are designed to protect an organization's assets, including its personnel, by preventing unauthorized access to facilities. These controls may include locks, guards, biometric access controls, and surveillance systems (see the ISC2 Study Guide, Chapter 3, Module 2). For example, an organization might use card readers at all entrances to ensure that only authorized personnel can enter the building. It might also use surveillance cameras to monitor the premises and securit"},{"id":415,"question":"The term \"defense in depth\" refers to:","options":{"A":"The use of only one strong barrier to prevent cyber attacks","B":"The use of only technological measures for defense","C":"A strategy that uses multiple security measures to protect an organization's systems","D":"Using only the most sophisticated technology to protect the system"},"correct":"C","explanation":"Defense in depth refers to a strategy that uses multiple security measures to protect an organization's information (see ISC2 Study Guide Chapter 3, Module 1). This strategy is based on the military principle that it is more difficult for an adversary to defeat a complex and layered defense system than it is to penetrate a single strong barrier. For example, an organization might use a combination of firewalls, intrusion detection systems, encryption, and user authentication to protect its netwo"},{"id":416,"question":"What is a common method for an access control system to authenticate an individual?","options":{"A":"Compares the individual's badge against a verified database","B":"Compares the individual's clothing against a dress code","C":"Compares the individual's biometric data with others in the vicinity","D":"Compares the individual's previous and current access times"},"correct":"A","explanation":"A common method for an access control system to authenticate an individual is to compare the individual's credential to a verified database. In this process, the information on the badge (such as a unique identifier) is checked against a database of authorized individuals (see the ISC2 Study Guide, Chapter 3, Module 2). For example, an employee might swipe his or her badge at a card reader to gain access to a secure area. The access control system would compare the information on the badge to th"},{"id":417,"question":"In a network environment, which of the following is an example of a security control?","options":{"A":"A criminal evidence","B":"User credentials","C":"A firewall","D":"An access log"},"correct":"C","explanation":"A firewall is an example of a control in a network environment. A firewall is a network security device that creates a barrier between a trusted internal network and untrusted external networks, such as the Internet (see ISC2 Study Guide Chapter 3, Module 1). For example, an organization might deploy a firewall to prevent unauthorized access to its internal network by monitoring all incoming and outgoing traffic and blocking or allowing it based on the organization's security policies."},{"id":419,"question":"How many classifications are typically considered difficult to manage for an organization?","options":{"A":"Two or three","B":"More than four","C":"Two","D":"Less than four"},"correct":"B","explanation":"While the exact number may vary depending on the organization's specific needs and capabilities, in general, having more than four classifications is considered difficult to manage due to the increased complexity and resources required (see the ISC2 Study Guide, Chapter 5, Module 1). For example, an organization that has five classifications, such as Public, Internal, Confidential, Secret, and Top Secret, would need to establish and maintain different access controls and handling procedures for "},{"id":421,"question":"Which of the following is an example of a technical security control?","options":{"A":"Bollards","B":"IDS","C":"Fences","D":"Turnstiles"},"correct":"B","explanation":"An Intrusion detection system (IDS) is a type of technical security control. Bollards, fences and turnstiles control access to physical facilities, and thus are types of physical security controls. (ISC2 Study Guide, Chapter 1, Module 3)."},{"id":422,"question":"Which of the following is an example of biometric authentication?","options":{"A":"An email address and password","B":"A physical key and a password","C":"Voiceprint","D":"OTP and pin"},"correct":"C","explanation":"A voiceprint, which is a digital representation of the sound, rhythm, physical characteristics, and patterns in a person's voice, is an example of biometric authentication. Biometric authentication is a security process that relies on a person's unique biological characteristics to verify his or her identity (see the ISC2 Study Guide, Chapter 3, Module 2). For example, a company might use voiceprint authentication for its telephone banking services. When a customer calls, the system would compar"},{"id":423,"question":"In the event of a disaster, which of the following designates a location to where an organization can relocate and that is fully equipped to resume operations immediately?","options":{"A":"Warm site","B":"Cold site","C":"Hot site","D":"Cool site"},"correct":"C","explanation":"A hot site is a location that is fully equipped to immediately resume operations in the event of a disaster (see ISC2 Study Guide Chapter 2, Module 3). A hot site typically includes all the necessary hardware, software, telecommunications, and data backups to restore critical business functions. A warm site, on the other hand, is partially equipped with hardware and connectivity solutions, but may not have up-to-date data and systems, so it may take longer to resume operations. A cold site is a "},{"id":424,"question":"What is the most critical factor when implementing access controls for a physical site?","options":{"A":"The cost of implementing the controls to the value of what is being protected","B":"The number of doors and gates that need to be secured","C":"The time of enforcing the controls","D":"The technology used in the controls"},"correct":"A","explanation":"Access controls are designed to protect valuable assets, but the cost of implementing these controls should not exceed the value of the assets they protect (see ISC2 Study Guide Chapter 3, Module 1). For example, suppose an organization is considering implementing a high-tech biometric access control system to protect a storage room full of low-value items. In this case, the cost of the system may outweigh the value of the items it protects. A less expensive access control system may be more app"},{"id":425,"question":"What is one of the challenges presented by a Bring Your Own Device (BYOD) policy?","options":{"A":"Decrease in employee morale","B":"Ensuring that the device is configured securely","C":"Increasing the need for forensic audits","D":"Ensuring privacy control"},"correct":"B","explanation":"Ensuring that the device is securely configured is one of the challenges of a Bring Your Own Device (BYOD) policy (see ISC2 Study Guide, Chapter 5, Module 3). With a BYOD policy, employees use their personal devices for work purposes. Implementing this policy is challenging because the organization has no control over these devices and therefore cannot ensure that they are securely configured. For example, an employee may use a personal smartphone to access company email. If this smartphone is n"},{"id":426,"question":"What is the primary purpose of the ISC2 Code of Ethics?","options":{"A":"To ensure members adhere to the highest standards of ethical conduct","B":"To provide guidance on how to resolve conflicts of interests","C":"To protect individuals and organizations from harm","D":"To promote the understanding and acceptance of prudent information security measures"},"correct":"A","explanation":"The ISC2 Code of Ethics is a set of principles designed to ensure that ISC2 members adhere to the highest standards of ethical conduct (see ISC2 Study Guide Chapter 1, Module 5). The other options are consequences of the ethical principles of the Code of Ethics."},{"id":428,"question":"What is the purpose of non-repudiation?","options":{"A":"Ensure people are held responsible for transactions they conducted","B":"Interpret privacy regulations and laws","C":"Protect a company from incurring penalties from misuse of private information","D":"Protect personal and sensitive data"},"correct":"A","explanation":"Non-repudiation is a security principle that ensures that people are held accountable for their transactions(see ISC2 Study Guide, Chapter 1, Module 1). Non-repudiation is used to protect the integrity of digital transactions and to ensure that the sender of a message or transaction cannot later deny having sent it. The other options are not related to the purpose of non-repudiation. Protection of personal and sensitive data is a security measure used to protect the confidentiality of data. Prot"},{"id":429,"question":"Which of the following is an example of collusion?","options":{"A":"When two or more individuals divide a task equally among themselves","B":"When two or more individuals take over the duties of another employee for fraudulent purposes","C":"When two or more individuals collaborate to circumvent segregation of duties for fraudulent purposes","D":"When two or more individuals collectively decide not to perform their duties"},"correct":"C","explanation":"Collusion occurs when two or more individuals work together to circumvent the segregation of duties for fraudulent purposes. Segregation of duties is based on dividing the responsibility for critical functions of key processes among more than one person or department to prevent fraud and error. Without this separation, the risks of fraud and error are much less manageable (see the ISC2 Study Guide, Chapter 3, Module 1). For example, in a company's finance department, one employee may be responsi"},{"id":430,"question":"Which of these is a type of detective access control?","options":{"A":"Firewalls","B":"Turnstiles","C":"IPS","D":"IDS"},"correct":"D","explanation":"Intrusion detection systems (IDS) are a type of detective access control. They monitor network traffic and system activity for malicious or policy-violating activity and report to a management station. An IDS can detect various attacks and probes, such as buffer overflows, stealth port scans, CGI attacks, SMB probes, and OS fingerprinting attempts (see ISC2 Study Guide, Chapter 1, Module 3). The other options are wrong. Intrusion prevention systems (IPS) are preventive controls that detect poten"},{"id":432,"question":"What is the concept of redundancy in system design?","options":{"A":"Usage of complex components to ensure security","B":"Duplicate components as a backup in case of failure","C":"Usage of minimal components to save costs","D":"Duplicate components to ensure diversity of suppliers"},"correct":"B","explanation":"The concept of redundancy in system design refers to the inclusion of duplicate components as a backup in case of failure (see ISC2 Study Guide, Chapter 4, Module 3). For example, a data center may have multiple power supplies so that if one fails, the others can continue to provide power and prevent downtime. The remaining options do not accurately represent the concept of redundancy in system design. In particular, duplicating components to ensure diversity of suppliers is not the primary purp"},{"id":433,"question":"What does a well-designed security policy aim to achieve?","options":{"A":"Reduce the complexity of the system","B":"Reduce the cost of system operations","C":"Increase the potential of security breaches","D":"Reduce the potential of security breaches to an acceptable level"},"correct":"D","explanation":"The primary goal of a well-designed security policy is to reduce the potential for security breaches to an acceptable level (see ISC2 Study Guide, Chapter 5, Module 3). A security policy outlines an organization's rules, procedures, and practices for protecting its systems and data. For example, an organization might have a security policy that requires all employees to use complex passwords and change them every 60 days. This policy would help reduce the risk of unauthorized access to the compa"},{"id":434,"question":"Which factor should be considered when choosing an access control system?","options":{"A":"Simplicity","B":"Aesthetics","C":"Efficiency","D":"Performance"},"correct":"D","explanation":"The performance of an access control system includes its ability to effectively control access, reliability, scalability and compatibility with other systems (see ISC2 Study Guide Chapter 3, Module 1). The ability of the system to perform its intended function effectively and reliably is paramount. For example, an organization may be considering a biometric access control system. While this system may be more complex and less efficient than a simple keycard system, its overall security performan"},{"id":435,"question":"For a rack in a data center, how many temperature sensors are recommended?","options":{"A":"One","B":"Four","C":"Two","D":"Three"},"correct":"D","explanation":"It is recommended to have three temperature sensors for a rack in a data center (see ISC2 Study Guide, Chapter 4, Module 3). These sensors should be placed at the top, middle, and bottom of the rack to accurately monitor the temperature throughout the rack. This helps ensure that all equipment in the rack is operating within the recommended temperature range and can help identify potential problems before they lead to hardware failure. Having only one or two sensors would not provide a comprehen"},{"id":436,"question":"Members of a data protection team in an organization are typically NOT required to \u2026: (\u2605)","options":{"A":"\u2026 Ensure protective security measures are in place","B":"\u2026 Interpret global privacy laws","C":"\u2026 Meet local legislation that regulate the collection and use of consumer data and privacy","D":"\u2026 Understand how local laws apply to their organization"},"correct":"B","explanation":"Interpreting global privacy laws is not always a requirement for members of a privacy team, especially if the organization only operates in a domestic market (see the ISC2 Study Guide, Chapter 1, Module 1). While understanding how local laws apply to their organization and ensuring protective security measures are critical tasks for a data protection team, interpreting international privacy laws is only necessary for organizations that operate internationally or handle data from individuals in m"},{"id":437,"question":"Why is it a best practice to have a documented incident response plan? (\u2605)","options":{"A":"To eliminate the need for security training for employees","B"
