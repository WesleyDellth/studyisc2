, and URL spoofing. Such attacks are used to gain unauthorized access to systems or networks, steal sens"},{"id":118,"question":"Which of these is NOT a characteristic of an MSP implementation?","options":{"A":"Manage all in-house company infrastructure","B":"Utilize expertise for the implementation of a product or service","C":"Monitor and respond to security incidents","D":"Mediate, execute and decide top-level decisions"},"correct":"A","explanation":"Manage all-in-house company infrastructure is not a characteristic of an MSP (Managed Service Provider) implementation. MSPs provide an outsourced IT service to manage a company's IT infrastructure and endpoints, rather than managing it all in- house. Some characteristics of an MSP implementation include the following (see ISC2 Study Guide, chapter 4, module 3): Utilizing expertise for the implementation of a product or service Monitoring and responding to security incidents Mediating, executing"},{"id":120,"question":"Which of these is NOT a type of malware?","options":{"A":"Worm","B":"Rootkit","C":"Spoofing","D":"Trojan"},"correct":"C","explanation":"Spoofing is not a type of malware. Spoofing is an attack whose primary goal is to gain access to a target system through a falsified identity (see ISC2 Study Guide, chapter 4, module 2). Trojans, rootkits and worms are all different types of malware. A Trojan is a type of malware that disguises itself as a legitimate program or file. A Rootkit is a type of malware that hides itself to go unnoticed in the compromised system, or in the victim's computer. A Worm is a type of malware designed to rep"},{"id":121,"question":"Which of these is a COMMON mistake made when implementing record retention policies?","options":{"A":"Applying the longest retention periods to the information","B":"Applying shorter retention periods to the information","C":"Not labeling the type of information to be retained","D":"Not categorizing the type of information to be retained"},"correct":"A","explanation":"A common mistake in record retention is applying the longest retention period without taking into account the sensitivity or importance of the corresponding information. Retaining unnecessary data has considerable costs in terms of storage and management. Less important or sensitive information can have shorter retention periods, thereby allowing longer retention periods for more important or sensitive information (see ISC2 Study Guide, chapter 5, module 1)."},{"id":122,"question":"54 | P a g e Which of these types of documents is usually THE LEAST formal?","options":{"A":"Policies","B":"Regulations","C":"Guidelines","D":"Standards"},"correct":"C","explanation":"Of the document types listed above, guidelines are generally the least formal. Guidelines provide recommendations or suggestions for achieving a particular goal or objective. They are often less formal than standards and policies, and are used to specify best practices or recommended approaches. Standards are generally more formal than guidelines, and describe the requirements, specifications or characteristics that a product, service or system should possess. Policies are usually more formal th"},{"id":123,"question":"During the investigation of an incident, which security policies are more likely to cause difficulties?","options":{"A":"Retention policies","B":"Communication policies","C":"Incident response policies","D":"Configuration standards"},"correct":"A","explanation":"For many organizations, retention policies entail keeping data only for a limited time. Because of the high costs of data storage capacity, organizations maintain specific logs only for a short period of time (a few hours to several days), and keep other data records for more extended periods (months to years). Because of this, not all data regarding an incident may be available. Communication and incident response policies can provide valuable help to an incident investigation. Finally, configu"},{"id":124,"question":"Which of these is NOT a typical component of a comprehensive Business Continuity Plan (BCP)? 55 | P a g e","options":{"A":"Notification systems and call trees for alerting personnel","B":"A cost prediction of the immediate response procedures","C":"A list of the BCP team members","D":"Immediate response procedures and checklists"},"correct":"B","explanation":"Cost predictions of response procedures are not typical components of business continuity plans (BCP). A BCP typically includes the following elements: A list of BCP team members, who will be responsible for implementing the BCP and coordinating the response to an incident; Immediate response procedures and checklists, with step-by-step instructions for responding to an incident and restoring operations; Notification systems and call trees for alerting personnel, the purpose of which is to effec"},{"id":125,"question":"Which of the following is NOT a part of 'Risk assessment'?","options":{"A":"Risk mitigation","B":"Risk evaluation","C":"Risk prioritization","D":"Risk identification"},"correct":"A","explanation":"Risk mitigation is not part of risk assessment. Risk mitigation is a process that follows risk assessment. It involves developing strategies and actions to reduce and control the risk to the organization's data or IT infrastructure. For example, a cybersecurity engineer might identify a risk in a financial organization, such as potential phishing attacks. The engineer would then assess this risk, evaluate its potential impact, and prioritize it among other identified risks. However, the process "},{"id":126,"question":"Which of these techniques will ensure the property of 'non-repudiation'?","options":{"A":"Passwords","B":"Digital signatures","C":"Using a VPN","D":"Encryption"},"correct":"B","explanation":"Non-repudiation means ensuring that the sender cannot later deny having sent the message. Digital signatures provide an undeniable match between sender and digital signature. We can think of a digital signature as a Message Digest encrypted with an asymmetric key: first, the message hash is encrypted using the sender's private key; then, the message (possibly encrypted) previously encrypted message hash; finally, the recipient decrypts the signature with the sender's public key, and transfers th"},{"id":127,"question":"When a company collects PII, which policy is required?","options":{"A":"Remote Access Policy","B":"GDPR","C":"Acceptable Use Policy","D":"Privacy Policy"},"correct":"D","explanation":"A Privacy Policy outlines the data security mechanisms which ensure that customer data is protected; namely, how Personal Identifiable Information (PII) is collected, stored and processed (see ISC2 Study Guide, chapter 5, module 3). The General Data Protection Regulation (GDPR) is a data protection and privacy regulation for the European Union and 57 | P a g e the European Economic Area (not a policy). An Acceptable Use Policy (AUP) defines the guidelines and limitations that users must agree on"},{"id":128,"question":"Which type of attack PRIMARILY aims to consume all the available resources, thereby making an organization's service inaccessible to its intended users?","options":{"A":"Phishing","B":"Trojans","C":"Denial of Service","D":"Cross-Site Scripting"},"correct":"C","explanation":"A denial of service attack (DoS) compromises the availability of a system or service through a malicious overload of requests, thereby activating safety mechanisms that delay or limit the availability of that system or service. As a result, systems or services become temporarily inaccessible to their intended users (see ISC2 Study Guide, chapter 4, module 2). Trojans, phishing and cross-site scripting attacks try to gain access to the system or data covertly, and therefore do not primarily aim a"},{"id":129,"question":"An organization that uses a layered approach when designing its security architecture is using which of these security approaches?","options":{"A":"Defense in depth","B":"Network Access Control","C":"Network Layers","D":"Zero trust"},"correct":"A","explanation":"An organization that uses a layered approach when designing its security architecture is using a defense in-depth approach. In a defense in-depth approach, different layers of security controls may be implemented at different levels of the organization, such as at the network, application and user levels (see ISC2 Study Guide, chapter 4, module 3). Network Access Control refers to the process of controlling access to a network. Network layers refer to the different levels of a computer network, "},{"id":130,"question":"Which of these terms refers to threats with unusually high technical and operational sophistication, spanning months or even years?","options":{"A":"Side-channel","B":"Rootkit","C":"APT","D":"Ping of death"},"correct":"C","explanation":"An Advanced Persistent Threat is a threat with unusually high technical and operational sophistication. APTs can be difficult to detect and defend against, as the attackers often use sophisticated techniques to evade detection, and to remain stealthy for extended periods of time. APTs are typically carried out by highly skilled and well-funded attackers (such as nation-state actors or well-organized criminal groups), and often target specific organizations or individuals with the goal of stealin"},{"id":131,"question":"A USB pen with data passed around the office is an example of: (\u2605)","options":{"A":"Data in use","B":"Data in transit","C":"Data at rest","D":"Data in motion"},"correct":"C","explanation":"Data at rest is stored data that resides on hard drives, on tapes, in the cloud, or on other storage media like (in this case) a USB pen. Data in processing (also called data in use) is actively used by a computer system. Data sent over a network is called data in motion. Data in transit is a term that does not usually apply to such a situation."},{"id":132,"question":"Which of these addresses is commonly reserved specifically for broadcasting?","options":{"A":"192.255.121.254","B":"192.255.121.0","C":"192.255.121.14","D":"192.255.121.255"},"correct":"D","explanation":"59 | P a g e IPv4 addresses are 32-bits represented as a sequence of four 8-bit integers separated by a dot. Addresses ending with 0 are reserved to specifically signify the network itself (and not a specific device on that network). In contrast, addresses ending in 255 are generally reserved for broadcasting to all devices on that network (see ISC2 Study Guide, chapter 4, module 1)."},{"id":133,"question":"Which of these is NOT a characteristic of the cloud?","options":{"A":"Measured Service","B":"Broad Network Access","C":"Zero Customer Responsibility","D":"Rapid Elasticity"},"correct":"C","explanation":"The characteristics of the cloud, also known as the \"five essential characteristics\" of cloud computing, are (see ISC2 Study Guide, chapter 4, module 3): Broad network access: Cloud resources, such as the internet, can be accessed over a network; Rapid elasticity: Cloud resources can be scaled up or down quickly and automatically to meet changing demand; Measured service: Cloud providers track and measure the use of resources, and users are typically charged based on their usage; Resource poolin"},{"id":134,"question":"Which of these is an example of a privacy breach?","options":{"A":"Access of private information by an unauthorized person","B":"Unavailability of critical systems","C":"Any observable occurrence in a network or system","D":"Being exposed to the possibility of attack"},"correct":"A","explanation":"A privacy breach is a compromise of confidentiality (see ISC2 Study Guide, chapter 2, module 1). The NIST defines privacy breach as \"the loss of control, compromise, unauthorized disclosure, unauthorized acquisition, or any similar occurrence where a person other than an authorized user accesses (or potentially accesses) personally identifiable information, or uses it for anything other than its authorized purpose\". The unavailability of a critical system is a compromise of availability (not of "},{"id":135,"question":"As an (ISC)\u00b2 member, you are expected to perform with due care. What does 'due care' specifically mean?","options":{"A":"Do what is right in each situation you encounter on the job","B":"Apply patches annually","C":"Researching and acquiring the knowledge to do your job right","D":"Give continuity to the legacy of security practices of your company"},"correct":"A","explanation":"The concept of 'due Care' (also known as 'the prudent person rule') refers to what a prudent person would do in a given situation. In cybersecurity, 'due care' means taking reasonable steps to secure and protect the organization's assets, reputation and finances. The concept is holistic and includes, among other things: implementing the appropriate security standards, policies and procedures; ensuring proper cybersecurity awareness training; and promoting the continuous improvement of monitoring"},{"id":136,"question":"What is the primary goal of a Change Management Policy?","options":{"A":"To guarantee that systems are up to date with the latest security patch","B":"To standardize the creation of the organization's network and computer systems","C":"To standardize the usage of the organization's network and computer systems","D":"To guarantee that system changes are performed without negatively affecting business operations"},"correct":"D","explanation":"The primary goal of a Change Management Policy is to realize the benefits of the system's changes while minimizing disruptions to business operations, namely by ensuring the integrity of the organization's systems and processes (see ISC2 Study Guide, chapter 5, module 3). Guaranteeing that systems have the latest security patches is the goal of a Patch Management Policy. A Networking Policy governs the usage of networks, and an Acceptable Use Policy governs the usage of computer systems. The cre"},{"id":137,"question":"A backup that captures the changes made since the latest full backup is an example of:","options":{"A":"A differential backup","B":"An incremental backup","C":"A full backup","D":"A backup snapshot"},"correct":"A","explanation":"A differential backup is a backup that captures the changes made since the latest full backup. Incremental backups capture changes since the latest backup (which can be full or incremental), and snapshots are live copies of a system. Neither incremental backups nor snapshots necessarily capture changes since a full backup (see ISC2 Study Guide, chapter 5, module 1)."},{"id":138,"question":"Which of these social engineering attacks sends emails that target specific individuals?","options":{"A":"Spear phishing","B":"Pharming","C":"Whaling","D":"Vishing"},"correct":"A","explanation":"Spear phishing is a highly targeted phishing attack (and not just random spam) which aims to get specific individuals to reveal confidential information. The particularity of spear phishing is that these attacks are sent with prior knowledge about the target (person or company), so as to increase its chance of success. Whaling is a phishing attack targeted at a group (typically an organization's executives) (see ISC2 Study Guide, chapter 4, module 3). A pharming attack corrupts an infrastructure"},{"id":139,"question":"Which of these technologies is the LEAST effective means of preventing shared accounts?","options":{"A":"Password complexity requirements 62 | P a g e","B":"Requiring biometric authentication","C":"Requiring one-time passwords via a token","D":"Requiring a one-time password via an application"},"correct":"A","explanation":"Password complexity requirements do not prevent the sharing of complex passwords, making it the least effective option from the list. Enforcing complex passwords is a good practice for improving account security, but it does not effectively prevent account sharing. Users can still share complex passwords, making this the least effective measure for preventing account sharing. For example, consider a scenario in an enterprise environment where a team shares a single account for a software tool. E"},{"id":140,"question":"Which kind of document outlines the procedures ensuring that vital company systems keep running during business-disrupting events?","options":{"A":"Business Impact Analysis","B":"Business Continuity Plan","C":"Business Impact Plan","D":"Disaster Recovery Plan"},"correct":"B","explanation":"A Business Continuity Plan (BCP) is a predetermined set of instructions describing how an organization's business processes will be sustained during and after a significant disruption (see Chapter 2 ISC2 Study Guide, module 4, under Terms and Definitions). A Business Impact Analysis (BIA) is a method of analyzing how such disruptions can affect an organization. A Disaster Recovery Plan is used to recover systems after a major failure or disaster. The term 'Business Impact Plan' does not actually"},{"id":141,"question":"Acting ethically is mandatory for (ISC)\u00b2 members. Which of these is NOT considered unethical?","options":{"A":"Having fake social media profiles and accounts","B":"Disrupting the intended use of the internet","C":"Compromising the privacy of users","D":"Seeking to gain unauthorized access to resources on the internet"},"correct":"A","explanation":"63 | P a g e Having fake social media profiles and accounts can be socially objectionable, but does not violate the (ISC)\u00b2 Ethics Canons (see ISC2 Study Guide, chapter 1, module 5). That being said, seeking to gain unauthorized access to resources on the internet, compromising the privacy of users, and disrupting the intended use of the internet are all considered unethical behaviors by (ISC)\u00b2, as well as by other similar professional organizations. Aside from being violations of professional co"},{"id":142,"question":"Which of these is NOT a security principle?","options":{"A":"Zero Trust model","B":"Security Awareness Training","C":"Separation of Duties","D":"Least Privilege"},"correct":"B","explanation":"The correct answer is that D. Security Awareness Training refers to educational programs that teach users to recognize and avoid security threats. Security Awareness Training is not a security principle but rather a human-focused control. Zero Trust model, Separation of Duties and Least Privilege are all security principles. The Zero Trust model is based on the idea that organizations should not trust any user, device or network (even within the organization's own network) until appropriately ve"},{"id":143,"question":"Which of these different sub-masks will allow 30 hosts?","options":{"A":"/26","B":"/27","C":"/29","D":"/30"},"correct":"B","explanation":"A subnet mask is a number that distinguishes between the network address and the host address. Subnetting divides a network into two or more subnets (see ISC2 Study Guide, chapter 4, module 1). To allow 30 hosts + 2 addresses for broadcast and network addresses. Thus, we are looking for the mask 255.255.255.224, or /27 using CIDR (Classless Inter- 64 | P a g e Domain Routing) notation. For 32 addresses, we need 5 bits and the mask /32 - log2(32) = /32 - 5 = /27. As for the remaining masks, /26 w"},{"id":144,"question":"Which of these is included in an SLA document?","options":{"A":"Instructions to detect, respond to, and limit the consequences of a cyber-attack","B":"A plan to prepare the organization for the continuation of critical business functions","C":"A plan to keep business operations going while recovering from a significant disruption","D":"Instructions on data ownership and destruction"},"correct":"D","explanation":"A Service Level Agreement (SLA) is a contract between a service provider and a customer which defines the level of service that the provider will deliver. It must include instructions on data ownership and destruction in order to ensure that sensitive data is properly protected. A set of instructions or procedures to detect, respond, and limit the consequences of a cyber- attack is called an Incident Response Plan (see ISC2 Study Guide chapter 2, module 1, under The Goal of Incident Response). A"},{"id":145,"question":"A poster reminding the best password management practices is an example of which type of learning activity?","options":{"A":"Education","B":"Training","C":"Awareness","D":"Schooling"},"correct":"C","explanation":"An awareness poster or campaign can be effective in engaging a user's attention and encouraging them to consider their password practices. Specific strategies include highlighting the risks associated with weak or easily guessable passwords (such as the risk of account compromise or data theft) and encouraging users to remember to use a password manager to store and manage their passwords securely. The primary goal of education is to help learners improve both their understanding of concepts and"},{"id":146,"question":"Which of these attacks take advantage of inadequate input validation in websites?","options":{"A":"Phishing","B":"Trojans","C":"Cross-Site Scripting","D":"Rootkits"},"correct":"C","explanation":"Cross-Site Scripting (XSS) is an attack where malicious executable scripts are injected into an otherwise benign website (or web application) code. Websites are vulnerable to XSS when they display data originating from requests or forms without validating it (and further sanitizing it, so that it is not executable) (see ISC2 Study Guide, chapter 4, module 2). Trojans and phishing are attacks where software applications and messages try to appear legitimate, but have hidden malicious functions. T"},{"id":147,"question":"An organization needs a network security tool that detects and acts in the event of malicious activity. Which of these tools will BEST meet their needs?","options":{"A":"IDS","B":"Firewall","C":"IPS","D":"Router"},"correct":"C","explanation":"An intrusion prevention system (IPS) is designed to monitor network traffic in real-time, identifying patterns or behaviors that may indicate an attempted intrusion or other malicious activity. Whenever an IPS detects suspicious activity, it can also act to protect the network (such as by blocking suspicious traffic, alerting the network administrator, or initiating a response to contain the threat) (see ISC2 Study Guide, chapter 4, module 2). Another type of network security tool is an intrusio"},{"id":148,"question":"In the context of risk management, which information does ALE outline?","options":{"A":"The business impact of a risk","B":"The probability of a risk coming to pass in a given year","C":"The percentage of Asset Lost Efficiency","D":"The expected cost per year of not performing a given risk-mitigating action"},"correct":"D","explanation":"The Annualized Loss Expectancy (ALE) is a standard metric of risk exposure that refers to the expected cost per year of a given risk if it is not mitigated. The business impact of a risk is technically considered a loss, and is better captured by a metric called Single Loss Expectancy (see ISC2 Study Guide, chapter 1, module 2). The probability of a risk coming to pass in a given year is best captured by a metric called Annualized Rate of Occurrence (ARO). Asset Lost Efficiency is a misleading t"},{"id":149,"question":"Which of these types of layers is NOT part of the TCP/IP model?","options":{"A":"Internet","B":"Application","C":"Physical","D":"Transport"},"correct":"C","explanation":"The physical layer exists in the OSI model, but not in the TCP/IP model. The TCP/IP Protocol Architecture Layers are: [1] Application (Determines the protocols for the Transport layer); [2] Transport (Allows for data to move among devices); [3] Internet (Creates and inserts packets); [4] Network Interface (Governs how data will move through the network) (for more on this, see ISC2 Study Guide, Chapter 4, Module 1)."},{"id":150,"question":"Which one of these tools is MOST likely to detect an XSS vulnerability?","options":{"A":"Static application test","B":"Network vulnerability scanner 67 | P a g e","C":"Web application vulnerability scanner","D":"Intrusion detection system"},"correct":"C","explanation":"Intrusion detection systems are designed to detect attacks, not vulnerabilities. The remaining three tools could all possibly discover cross-site scripting (XSS) vulnerabilities. However, a web application vulnerability scanner is the one that's most likely to detect it, since it is specifically designed to test web applications (see ISC2 Study Guide, chapter 4, module 3)."},{"id":151,"question":"Which of these types of malware self-replicates without the need for human intervention?","options":{"A":"Rootkits","B":"Virus","C":"Trojan","D":"Worm"},"correct":"D","explanation":"A worm is a type of malware designed to replicate itself and spread to other computers without human intervention. Worms exploit operating systems, network servers and other software vulnerabilities in order to propagate themselves. They can cause various damaging effects, including disrupting network performance, consuming bandwidth, and stealing sensitive information (see ISC2 Study Guide, chapter 4, module 2)."},{"id":152,"question":"The primary objective of a Business Continuity Plan (BCP) is:","options":{"A":"To assess the impact of disruption to the business","B":"To restore the business to the full last-known reliable state of operations","C":"To sustain business operations while recovering from a disruption","D":"To regularly audit whether the organization complies with applicable regulations"},"correct":"C","explanation":"The primary objective of a Business Continuity Plan (BCP) is to maintain business operations while recovering from a disruption (see Chapter 2 ISC2 Study Guide, Module 4, under Terms and Definitions). A BCP is designed to ensure that critical business functions continue during a crisis and that the organization can recover effectively. For example, suppose a company's headquarters is damaged by a natural disaster. In this case, a well-prepared BCP might include moving operations to a secondary l"},{"id":153,"question":"Which of these properties is NOT guaranteed by a Message Authentication Code (MAC)?","options":{"A":"Integrity","B":"Anonymity","C":"Non-repudiation","D":"Authenticity"},"correct":"B","explanation":"A Message Authentication Code (MAC) does not guarantee anonymity. MAC is a cryptographic function that guarantees a message's integrity, authenticity, and non- repudiation. In particular: Integrity is the ability of the MAC to detect any changes that may have occurred to a message during either transmission or storage. A MAC provides this by generating a unique code for the message based on its contents, as well as a secret key that is shared between the sender and the receiver. If any changes a"},{"id":154,"question":"The BEST defense method to stop a 'Replay Attack' is to: (\u2605) 69 | P a g e","options":{"A":"Use password authentication","B":"Use message digesting","C":"Use an IPSec VPN","D":"Use a Firewall"},"correct":"C","explanation":"A replay attack is when an attacker captures and resends (i.e. \"replays\") authenticated messages (see ISC2 Study Guide, chapter 4, module 2). An IPSec VPN can prevent a replay attack because it tracks packet sequencing and includes the sender's signature on all packets; therefore preventing forged packages. Message digesting is ineffective in preventing resends (and thus also replay attacks), since it doesn't matter whether the attacker can read or decipher the original message and key (all they"},{"id":155,"question":"On a BYOD model, which of these technologies is best suited to keep corporate data and applications separate from personal?","options":{"A":"Biometrics","B":"Full-device encryption","C":"Context-aware authentication","D":"Containerization"},"correct":"D","explanation":"Containerization allows users to run corporate applications and access corporate data in a secure environment that applications outside the container cannot access. Containerization solutions for mobile devices typically use encryption and other isolation techniques to ensure that data and applications do not cross over. Full-device encryption helps reduce the risk of theft or loss of a device, thereby reducing the risk of a data breach. Biometrics and context-aware authentication are helpful in"},{"id":156,"question":"Which method is COMMONLY used to map live hosts in the network?","options":{"A":"Geolocation","B":"Traceroute","C":"Wireshark 70 | P a g e","D":"Ping sweep"},"correct":"D","explanation":"A ping sweep is a commonly used method to map live hosts in a network. A ping sweep involves sending a series of ping messages (ICMP Echo Request packets) to a range of IP addresses on a network so as to determine which hosts are currently online. Hosts that are online will respond with a reply message when a ping is sent to them."},{"id":157,"question":"What does the term LAN refer to?","options":{"A":"A long-distance connection between geographically-distant networks","B":"A tool to manage and control network traffic, as well as to protect a network","C":"A network on a building or limited geographical area","D":"A device that connects multiple other devices in a network"},"correct":"C","explanation":"A local area network (LAN) typically covers a single floor or building. Long-distance connections between geographically-distant networks form something called a wide area network (WAN). Multiple devices in a network are connected through hubs or switches. The management and control of network traffic and protection is achieved by specialized equipment, such as firewalls and intrusion prevention systems (ISC2 Study Guide, Chapter 4, Module 1)."},{"id":158,"question":"Which of these enables point-to-point online communication over an untrusted network?","options":{"A":"VPN","B":"Router","C":"Firewall","D":"VLAN"},"correct":"A","explanation":"A VPN is a type of network technology that creates a secure encrypted connection between a device and a network. This connection allows users to communicate with each other and access network resources as if they were on the same local network, even if they are in different locations (see ISC2 Study Guide, chapter 4, module 3). A VLAN (Virtual Local Area Network) is a network segmentation technology that allows devices on a network to be logically grouped, even if they are in different locations"},{"id":159,"question":"Which of these is NOT a common goal of a cybersecurity attacker?","options":{"A":"Alteration","B":"Allocation","C":"Disclosure","D":"Denial"},"correct":"B","explanation":"The three most common goals of cybersecurity attackers are disclosure, alteration, and denial (DAD), which correspond directly to to the cybersecurity triad: confidentiality, integrity, and availability (CIA) (see ISC2 Study Guide, chapter 1, module 1). Allocation means assigning controls to specific system elements responsible for providing a security or privacy capability (e.g., access control systems, routers, servers, etc.), and therefore is not a common goal of a cybersecurity attacker."},{"id":160,"question":"Which of these is a type of corrective security control?","options":{"A":"Intrusion detection systems","B":"Encryption","C":"Patches","D":"Guidelines"},"correct":"C","explanation":"Patches are a type of corrective security control, since they repair damage and restore resources and capabilities to a secure and previously-updated state (see ISC2 Study Guide, chapter 5, module 2). Encryption is a preventive security control that ensures data confidentiality. Intrusion detection systems are detective controls, since they monitor a given system for unwanted activity. Intrusion detection systems (IDS) alert administrators to potential security breaches or attacks. Although they"},{"id":161,"question":"The name, age, location and job title of a person are all examples of: 72 | P a g e","options":{"A":"Attributes","B":"Account permissions","C":"Biometric factors","D":"Identity factors"},"correct":"A","explanation":"Attributes such as a person's name, age, location, job title, and even characteristics such as height or hair color, may all be associated with their identity. None of these describe biometric factors used for authentication. Identity factors are something you know, are or have. Account permissions determine what an authenticated person (a user) can do, and not attributes related to the user's identity."},{"id":162,"question":"At which of the OSI layers do TCP and UDP work?","options":{"A":"Session Layer","B":"Transport Layer","C":"Physical Layer","D":"Application Layer"},"correct":"B","explanation":"TCP (Transmission Control Protocol) and UDP (User Datagram Protocol) are both transport layer protocols, which operate at the fourth layer of the OSI (Open Systems Interconnection) model (see ISC2 Study Guide, chapter 4, module 1). The transport layer (also known as \"Layer 4\") ensures that data is delivered reliably and efficiently between different devices on a network. TCP is a connection-oriented protocol which establishes a dedicated end-to-end connection. UDP is a connectionless protocol, a"},{"id":163,"question":"Which of these statements about the security implications of IPv6 is NOT true? (\u2605)","options":{"A":"IPv6 traffic may bypass existing security controls","B":"IPv6 reputation services may not be mature and useful","C":"IPv6's NAT implementation is insecure 73 | P a g e","D":"Rules based on static IPv6 addresses may not work"},"correct":"C","explanation":"IPv6 does not include network address translation (NAT), since many IP addresses are available. As a result, there is no NAT implementation, and so IPv6 can't actually have an insecure version. Rules based on static IPv6 addresses may not work, since IPv6 addresses are often dynamically assigned. Thus, certain security controls that rely on static address rules (such as firewalls or access controls) may not work in all cases. Reputation services are still relatively rare, and also somewhat less "},{"id":164,"question":"Which of these is an attack that encrypts the organization's information, and then demands payment for the decryption code?","options":{"A":"DDoS","B":"Ransomware","C":"Spoofing","D":"Phishing"},"correct":"B","explanation":"Ransomware is an attack that encrypts an organization's information (thereby rendering it inaccessible or unusable) and then demands payment in exchange for the decryption code (see ISC2 Study Guide, chapter 4, module 2). A distributed denial-of-service (DDoS) attack is a type of attack in which a large amount of malicious traffic is directed at a specific target (such as a website or server), so as to overwhelm it, thus making it unavailable to users. Phishing is an attack in which attackers se"},{"id":165,"question":"Which of these is a type of detective access control?","options":{"A":"Turnstiles","B":"Bollards","C":"Movement Sensors 74 | P a g e","D":"Firewalls"},"correct":"C","explanation":"Detective controls alert us to security problems by constantly monitoring activity and recording information, so as to take immediate action in the event of a security control failure (such as bollards or turnstiles). Therefore, a movement sensor is considered a detective control, and is complementary to physical controls. Firewalls are network devices used to filter network traffic, and are thus considered technical controls. Logging and monitoring tools, such as Security Information and Event "},{"id":166,"question":"Which of these cloud deployment models is a combination of public and private cloud storage?","options":{"A":"Private","B":"Public","C":"Hybrid","D":"Community"},"correct":"C","explanation":"A hybrid cloud deployment model combines public and private cloud storage. For example: an organization might use private cloud storage for sensitive or proprietary data that needs to be kept confidential, while at the same time using public cloud storage for less sensitive data or workloads, which are more suited to a shared infrastructure. This allows the organization to tailor its cloud storage strategy to meet the specific needs of its workloads, while at the same time taking advantage of th"},{"id":168,"question":"The PRIMARY objective of a security baseline is to establish ...","options":{"A":"a minimum understood and acceptable level of security requirements","B":"security and configuration requirements","C":"a maximum understood and an acceptable level of security requirements","D":"a minimum understood and a good level of security requirements"},"correct":"A","explanation":"A security baseline is a set of security standards, guidelines and procedures used to ensure that a system or network meets a minimum level of security. Security baselines are typically based on industry best practices, regulatory requirements, and an organization's specific security needs. The primary objective of a security baseline is to establish a minimum understood and acceptable level of security requirements. While it is true that a security baseline specifies security and configuration "},{"id":169,"question":"Which of these is part of the canons (ISC)\u00b2 code of ethics?","options":{"A":"Provide diligent and competent services to stakeholders","B":"Prevent and detect unauthorized use of digital assets in a society","C":"Act always in the best interest of your client","D":"Advance and protect the profession"},"correct":"D","explanation":"The four canons of ISC2 are (see ISC2 Study Guide, chapter 1, module 5): 1) Advance and protect the profession; 2) Act honorably, honestly, justly, responsibly and legally; 3) Provide diligent and competent serviceto principals; 4) Protect society, the common good, necessary public trust and confidence and the infrastructure. Although some options seem right, only 'Advance and protect the profession' is correct."},{"id":170,"question":"What does redundancy mean in the context of cybersecurity?","options":{"A":"Designing systems with robust components, so that the organization has more attack resilience","B":"Conceiving systems with duplicate components so that, if a failure occurs, there will be a backup","C":"Conceiving systems with less attack surface, so that the attacker has less chance of success","D":"Conceiving systems with only the most necessary components, so that the organization has just the necessary risks"},"correct":"B","explanation":"In cybersecurity, redundancy refers to conceiving systems for resilience with duplicate components so that, if a failure occurs, the redundant component will take over and maintain operations, thereby helping to prevent outages or other disruptions (see ISC2 Study Guide, chapter 4, module 3). Examples of this are redundant servers, redundant network links, and redundant power supplies. Redundancy is also effective against attacks, since the attacked nodes can be quarantined and then replaced by "},{"id":171,"question":"Which of these CANNOT be a corrective security control?","options":{"A":"Patches","B":"Backups","C":"Bollards","D":"Disaster Recovery Plan"},"correct":"C","explanation":"Corrective security controls are measures used to address security vulnerabilities or weaknesses already identified. Backups, patches, and Disaster Recovery Plans are all corrective security controls (see ISC2 Study Guide, chapter 3, module 2). Backups can help ensure that important information is not lost in the event of an incident. Patches can help fix vulnerabilities and improve security. Disaster Recovery Plans are administrative security controls that establish the corrective measures to b"},{"id":172,"question":"In an incident response process, which phase uses indicators of compromise and log analysis as part of a review of events?","options":{"A":"Containment","B":"Identification","C":"Eradication","D":"Preparation"},"correct":"B","explanation":"The correct answer is D. The identification phase of an incident response process involves recognizing the signs of a security incident, understanding its impact, and prioritizing the response. Indicators of compromise and log analysis are key tools used in this phase to review events and identify potential security incidents. For example, suppose an organization's network monitoring system detects unusual traffic patterns. The cybersecurity team would then use indicators of compromise, such as "},{"id":174,"question":"Which kind of physical access control is LESS effective at preventing unauthorized individual access to a data center?","options":{"A":"Barriers","B":"Bollards","C":"Fences","D":"Turnstiles"},"correct":"B","explanation":"Bollards are short, vertical posts that block vehicles from accessing a data center. They are, however, ineffective at preventing access to individuals. Fences can be placed around the perimeter of the data center, so as to block unauthorized access and deter potential intruders. Barriers such as gates, walls or barricades can be used to block access to the data center. Finally, turnstiles can be used to control access to a data center, namely by allowing entry only to authorized individuals."},{"id":175,"question":"While performing background checks on new employees, which of these can NEVER be an attribute for discrimination?","options":{"A":"References, education, political affiliation, employment history","B":"Credit history, employment history, references","C":"Employment history, references, criminal records","D":"Criminal Records, credit history, references"},"correct":"A","explanation":"When conducting background checks on new employees, it is illegal for an organization to discriminate on the basis of political affiliation to prevent a potential or current employee's political preferences from being a factor in hiring or career decisions (see ISC2 Study Guide, chapter 5, module 4). 79 | P a g e For example, a company hiring for a cybersecurity role can legally consider factors such as a candidate's references, education, work history, and even criminal or credit history. Howev"},{"id":176,"question":"Which port number corresponds to the Simple Mail Transfer Protocol (SMTP)?","options":{"A":"69","B":"25","C":"161","D":"22"},"correct":"B","explanation":"The Simple Mail Transfer Protocol (SMTP) is well-known for accepting connections on port 25, so as to receive unencrypted email messages. The more secure alternative is to use port 587 for SMTP by using Transport Layer Security (TLS), which encrypts the data between the mail client and the server (see ISC2 Study Guide, chapter 4, module 1)."},{"id":177,"question":"Which of the following is an implementation of an administrative control?","options":{"A":"Utilizing a turnstile to deter tailgating","B":"Placing a sign to direct suppliers to their entrance","C":"Requiring approval before accessing privileged tools","D":"Installing video cameras to oversee access to a facility"},"correct":"C","explanation":"Requiring authorization before accessing privileged tools is an example of an administrative control, specifically an instance of segregation of duties (SoD), which refers to the division of roles and responsibilities among different people to reduce the risk of potential errors or fraud. For example, in a software development organization, a developer may need access to certain privileged tools for debugging purposes. However, instead of granting unrestricted access, the company's policy can re"},{"id":178,"question":"Which of these is NOT a best practice in access management?","options":{"A":"Trust but verify","B":"Giving only the right amount of permission","C":"Requesting a justification when upgrading permission","D":"Periodically assessing whether user permissions still apply"},"correct":"A","explanation":"The \"Trust but verify\" model is a method of threat protection that involves granting privileged accounts access to the network and other resources, while at the same time verifying their actions and activities. However, over time, this model was found to have limitations that expose organizations to a wide array of security threats. Therefore, \"Trust but verify\" is being progressively abandoned in favor of the Zero Trust model. The remaining options are all best practices of access management."},{"id":179,"question":"Which of these types of credentials is NOT used in multi-factor authentication?","options":{"A":"Something you have","B":"Something you trust","C":"Something you are","D":"Something you know"},"correct":"B","explanation":"Authentication generally requires that users provide identity factors (that others can't not easily provide). Because no single factor is ever foolproof, multi-factor authentication typically uses one or several of the following (see ISC2 Study Guide, chapter 3, module 1): 'Something you know', such as a password or personal identification number (PIN); 'Something you have', such as a smart card or certificate; 'Something you are', which would be based on your physical characteristics, in which "},{"id":180,"question":"In the event of non-compliance, which of these can have considerable financial consequences for an organization?","options":{"A":"Regulations","B":"Standards","C":"Policies","D":"Guidelines"},"correct":"A","explanation":"Regulations are created by governments or national authorities, and often lead to financial fines for infringement. For example, the EU's GDPR prescribes penalties of up to 2% of annual revenue. Standards are created by governing or professional bodies (not by governments), and thus are not legally enforceable. Regulations are mandatory, while standards are voluntary. Policies and guidelines are internal to organizations, and are therefore not subject to financial penalties (see ISC2 Study Guide"},{"id":181,"question":"Which department in a company is NOT typically involved in a Disaster Recovery Plan (DRP)?","options":{"A":"IT","B":"Executive","C":"Financial","D":"Public Relations"},"correct":"C","explanation":"Executives and Public Relations staff need to be aware of the company's Disaster Recovery Plan (DRP) to properly handle the expectations of the public, as well as of company stakeholders. IT personnel should be focused on helping businesses return to normal operations. A company's financial department is rarely involved in a disaster recovery plan, except when the issue at hand is directly connected to company finances (see Chapter 2 ISC2 Study Guide, module 3, under Components of a Disaster Rec"},{"id":182,"question":"Which of these is NOT a best practice in access management? (\u2605)","options":{"A":"Requesting a justification when upgrading permission","B":"Periodically assessing whether user permissions still apply","C":"Giving only the right amount of permission","D":"Trust but verify"},"correct":"D","explanation":"The \"Trust but verify\" model is a method of threat protection that involves granting privileged accounts access to the network and other resources, while at the same time verifying their actions and activities. However, over time, this model was found to have limitations that expose organizations to a wide array of security threats. Therefore, \"Trust but verify\" is being progressively abandoned in favor of the Zero Trust model. The remaining options are all best practices of access management."},{"id":183,"question":"Which of these is NOT one of the (ISC)\u00b2 ethics canons?","options":{"A":"Consider the social consequences of the systems you are designing","B":"Act honorably, honestly, justly, responsibly, and legally","C":"Provide diligent and competent service to principals","D":"Protect society, the common good, necessary public trust and confidence, and the infrastructure"},"correct":"A","explanation":"Considering the social consequences of the systems you are designing is a valid concern, since the professional must abide by the canon of their protecting society, the common good, necessary public trust and confidence, and the infrastructure. However, this is not in itself a canon. The four canons of (ISC)\u00b2 are: Protect society, the common good, necessary public trust and confidence, and the infrastructure; Act honorably, honestly, justly, responsibly, and legally; Provide diligent and compete"},{"id":184,"question":"What technology is MOST LIKELY to conserve the storage space required for video recordings?","options":{"A":"Motion detection","B":"PTZ","C":"Infrared cameras","D":"Facial recognition"},"correct":"A","explanation":"Motion-detecting cameras record only when motion is detected, and thus help in reducing video storage requirements. A recording will occur more rarely in low-occupancy places (like data centers), thus conserving storage. In more heavily used areas, the impact on total storage space used will be negligible. Infrared cameras, facial recognition, and the ability to pan, tilt, and zoom (PTZ) a camera are important features, but more is needed to conserve storage space. 83 | P a g e"},{"id":185,"question":"When analyzing risks, which of these activities is required? (\u2605)","options":{"A":"Determining the likelihood of occurrence of a set of risks","B":"Accepting all evaluated risks","C":"Identifying risks associated with loss of confidentiality","D":"Selecting the appropriate controls"},"correct":"A","explanation":"Determining the likelihood of occurrence of a set of risks involves estimating the likelihood that the identified risks will occur, along with the potential impact it could have on the organization. Once the likelihood of occurrence has been determined, the next step is to select the appropriate controls to mitigate those risks, such as encryption, access controls, or administrative controls (like policies and procedures). Identifying the risks associated with loss of confidentiality (such as un"},{"id":186,"question":"In a DAC policy scenario, which of these tasks can only be performed by a subject granted access to information?","options":{"A":"Changing security attributes","B":"Executing the information","C":"Modifying the information","D":"Reading the information"},"correct":"A","explanation":"As a principle, users can perform Read, Write and Execute actions with every Access Control policy. However, in discretionary access control policies, the permissions associated with each object (files or system resources) are set by the object's owner. In this model, the creator of an object implicitly becomes its owner, and therefore can decide who will have permission to the objects (see ISC2 Study Guide, chapter 3, module 3). A major weakness of DAC is that it gives users complete control to"},{"id":187,"question":"84 | P a g e A security consultant hired to design the security policies for the PHI within an organization will be primarily handling:","options":{"A":"Personal Health information","B":"Public Health information","C":"Procedural Health information","D":"Protected Health information"},"correct":"D","explanation":"PHI is an acronym that stands for Protected Health Information (see ISC2 Study Guide, chapter 1, module 1). The remaining options are incorrect."},{"id":189,"question":"Which of these techniques is PRIMARILY used to ensure data integrity?","options":{"A":"Content Encryption","B":"Backups","C":"Message Digest","D":"Labeling"},"correct":"C","explanation":"85 | P a g e The primary function of message digesting is to ensure data integrity (which can be defined as maintaining and ensuring the accuracy and consistency of data throughout its lifecycle). Message digesting is a technique that uses cryptographic hash functions, such as MD5 or SHA-256, to create a unique, fixed-length summary, or \"digest,\" of the original message data. For example, when a file is downloaded from a Web site, the Web site can provide a hash value (message digest) for the fi"},{"id":190,"question":"A high-level executive of an organization receives a malicious email that tries to trick him. Which attack is the perpetrator using?","options":{"A":"Spear phishing","B":"Whaling","C":"DDOS","D":"Phishing"},"correct":"B","explanation":"When executives receive malicious emails that try to trick them, the attackers are likely attempting a whaling attack (see ISC2 Study Guide, chapter 4, module 2). Whaling is a type of spear phishing, and, in turn, spear phishing is a type of phishing. Whaling is a spear phishing attack targeted at a group of high-level executives, or at other influential individuals inside the organization. Spear phishing is a targeted attack in which the attacker uses email or other digital communication to tri"},{"id":191,"question":"Suppose that an organization wants to implement measures to strengthen its detective access controls. Which one of these tools should they implement? 86 | P a g e","options":{"A":"IDS","B":"Patches","C":"Encryption","D":"Backups"},"correct":"A","explanation":"Detective controls are a crucial component of a cybersecurity program, since they provide visibility into malicious activity, breaches and attacks on an organization's IT environment. An intrusion detection system (IDS) is a device or software application which monitors a network or systems for malicious activity or policy violations (meaning that it's a detective control) (see ISC2 Study Guide, chapter 4, module 1). Patches are corrective controls. Backups are compensating controls, since they "},{"id":192,"question":"Which of these exercises goes through a sample of an incident step-by-step, validating what each person will do?","options":{"A":"A tabletop exercise","B":"A walk-through exercise","C":"A checklist exercise","D":"A simulation exercise"},"correct":"B","explanation":"A walk-through exercise reviews each step of the incident, in order to ensure that every team member knows exactly what they should do, and how they should do it. In tabletop exercises, team members are given a scenario and asked how they would respond, as well as what tasks they believe would be relevant. A simulation exercise attempts to recreate an actual incident so as to thoroughly test responses. Checklists are essential in incident response, but aren't actually a specific type of exercise"},{"id":193,"question":"Which cloud service model provides the most suitable environment for customers who want to install their custom operating system?","options":{"A":"PaaS","B":"IaaS","C":"SaaS","D":"SLA"},"correct":"B","explanation":"Infrastructure as a Service (IaaS) is a cloud service model that allows the customer to manage the computing resources (including the operating systems). Software as a Service (SaaS) is a model that provides customers with access to software applications (typically on a subscription-based or pay-per-use model) but does not allow them to access the underlying infrastructure. Platform as a Service (PaaS) is a service model that provides a platform for building, deploying and managing applications;"},{"id":194,"question":"Which part of the CIA Triad will be PRIMARILY jeopardized in a Distributed Denial Of Service (DDOS) attack?","options":{"A":"Accountability","B":"Integrity","C":"Confidentiality","D":"Availability"},"correct":"D","explanation":"Distributed Denial-of-Service (DDoS) attacks are malicious attempts to block businesses from their traffic by flooding a target server, service or network with malicious coordinated traffic generated by a wide number of systems on the internet. The goal of DDoS attacks is to compromise availability (see ISC2 Study Guide, chapter 1, module 1 and also chapter 4, module 3) . A DDoS attack does not target confidentiality, but it may accidentally compromise integrity. Accountability is the property t"},{"id":195,"question":"Which type of recovery site has some or most systems in place, but does not have the data needed to take over operations?","options":{"A":"A cold site","B":"A warm site","C":"A cloud site","D":"A hot site"},"correct":"B","explanation":"A warm site is a type of recovery site that has most or all of the necessary systems in place, but does not have the current data needed to immediately take over operations in the event of a disaster (see the ISC2 Study Guide, Chapter 2, Module 3). These sites have hardware 88 | P a g e and connectivity, but data is typically restored from backups that may not be current. For example, a financial services company might have a warm site in another city. This site would have all the necessary serv"},{"id":196,"question":"Which of these access control models is commonly used in the military?","options":{"A":"Role-Based Access Control (RBAC)","B":"Discretionary Access Control (DAC)","C":"Mandatory Access Control (MAC)","D":"Attribute-Based Access Control (ABAC)"},"correct":"C","explanation":"Mandatory Access Control (MAC) is a model of access control that is commonly used in the military, because it enables the centralized management of access rights, as well as the enforcement of strict security policies (see ISC2 Study Guide, chapter 3, module 3). In MAC, access to resources is based on the classification level of a given resource, as well as on the clearance level of the user. The use of classification and clearance levels allows for a hierarchical approach to security, whereby a"},{"id":197,"question":"Which type of attack attempts to mislead the user into exposing personal information by sending fraudulent emails?","options":{"A":"Denial of Service 89 | P a g e","B":"Trojans","C":"Cross-Site Scripting","D":"Phishing"},"correct":"D","explanation":"A phishing attack emails a fraudulent message with the goal of tricking the recipient into disclosing sensitive information to the attacker (see ISC2 Study Guide, chapter 4, module 2). A Cross-Site Scripting attack tries to execute code on another website. Trojans are software that seem legitimate, but has hidden malicious functions. Trojans may be sent in a message, but are not themselves the message. A denial of service attack (DoS) compromises the availability of a system or service through a"},{"id":198,"question":"Which of these documents is MORE directly related to what can be done with a system or with its information?","options":{"A":"MOA","B":"SLA","C":"NDA","D":"MOU"},"correct":"D","explanation":"A Memorandum of Understanding (MOU) outlines the terms and conditions for collaboration, including eventual restrictions on the use of information (see ISC2 Study Guide, chapter 4, module 3). A Memorandum of Agreement (MOA) is similar to an MOU, but is both more formal and legally binding. A Service Level Agreement (SLA) is a contract between a service provider and a customer which specifies service-related guarantees or warranties. A non-disclosure agreement (NDA) restricts parties from sharing"},{"id":199,"question":"Which type of security control does NOT include CCTV cameras?","options":{"A":"Preventive","B":"Corrective","C":"Detective","D":"Deterrent"},"correct":"B","explanation":"CCTV cameras are considered a deterrent to criminal activity. In addition, combined with other sensors, they can detect movement, and thus are considered a detective control. Image recordings provide evidence after the fact. According to the NIST, preventive controls are measures to detect, deter and/or reduce an impact of a system. CCTV cameras are not 90 | P a g e corrective controls, as they are not deployed to repair detected errors or irregularities (see ISC2 Study Guide, chapter 3, module "},{"id":200,"question":"Which of these is LEAST likely to be installed by an infection?","options":{"A":"Keylogger","B":"Trojan","C":"Logic Bomb","D":"Backdoor"},"correct":"C","explanation":"A logic bomb is a piece of code intentionally inserted into software that will activate after specific conditions are met (see ISC2 Study Guide, chapter 4, module 2). Logic bombs are typically embedded in legitimate software. Trojans are a type of malware used to install keyloggers and backdoors. Keyloggers capture keystrokes and user input, but typically require malware to install the keylogger. A backdoor is a malicious feature that listens for commands on a specific logical port (TCP or UDP) "},{"id":201,"question":"What phase of the incident response process is aimed at minimizing the impact or extent of an incident?","options":{"A":"Containment","B":"Detection","C":"Response","D":"Recovery"},"correct":"A","explanation":"During the containment phase of the incident response process, security administrators work to minimize the impact or extent of an incident (see ISC2 Study Guide, Module 1, under Incident Response). This may involve containing the incident, isolating affected systems, and implementing temporary fixes to prevent further damage. For example, in the containment phase of a ransomware attack a security administrator would first isolate the infected systems to prevent the malware from spreading to oth"},{"id":202,"question":"What is a threat?","options":{"A":"A potential source of harm to a system","B":"A computer code that has a flaw that can cause a critical incident.","C":"An asset needs protection","D":"A gap in a fence"},"correct":"A","explanation":"A threat is a potential source of harm to a system (see ISC2 Study Guide, Chapter 1, Module 1). Threats can manifest in various ways including a malicious actor like a hacker, a computer virus, or even a natural disaster such as a hurricane or earthquake. In contrast, a computer code that contains a flaw resulting in a potential critical incident characterizes a vulnerability, not a threat. Similarly, a gap in a fence could be considered a vulnerability in physical security, not a threat itself."},{"id":203,"question":"What cloud service provides the highest level of flexibility and customization for the organization?","options":{"A":"Infrastructure-as-a-Service (IaaS)","B":"Platform-as-a-Service (PaaS)","C":"Software-as-a-Service (SaaS)","D":"Network-as-a-Service (NaaS)"},"correct":"A","explanation":"Infrastructure as a Service (IaaS) provides the highest level of flexibility for customization for an organization. IaaS is a cloud computing model that provides virtualized computing resources such as servers, storage, and networking (see ISC2 Study Guide, Module 3, under Cloud), allowing them to customize their environment to meet their specific needs. Regarding the other options, Platform-as-a-Service (PaaS) is a cloud computing model that provides access to a platform for developing and depl"},{"id":204,"question":"Which of the following is an administrative security control?","options":{"A":"No entry signs","B":"Security Awareness Training","C":"Access Control Lists","D":"Badge Readers"},"correct":"B","explanation":"Security Awareness Training is an administrative security control. It is an integral part of any organization's security program and is designed to educate employees on security policies and procedures, as well as how to identify and respond to potential security threats (see ISC2 Study Guide, Chapter 1, Module 3). An example of Security Awareness Training in action could be a company-wide training session about phishing attacks. Access Control Lists are a type of technical security control used"},{"id":205,"question":"Which of the following is a set of best practices, guidelines, or requirements that is widely accepted within an industry and helps organizations maintain a consistent level of security?","options":{"A":"Policies","B":"Regulations","C":"Standards","D":"Procedures"},"correct":"C","explanation":"Standards are a set of best practices, guidelines, or requirements widely accepted within an industry (see ISC2 Study Guide, Module 4, under Governance Elements). The ISO/IEC 27000 family of standards are examples of standards that help organizations improve their information security management, maintaining a consistent level of security and can also be used as a benchmark for evaluating an organization's cybersecurity posture. Procedures are specific steps to be taken to complete a task, such "},{"id":206,"question":"What is the final phase of the data handling life cycle?","options":{"A":"Modification phase","B":"Destruction phase","C":"Creation phase","D":"Sharing phase"},"correct":"B","explanation":"The final phase of the data handling life cycle is destruction (see ISC2 Study Guide, Module 1, under Data Handling Life Cycle). This phase involves securely destroying data that is no longer needed or has reached the end of its useful life. The creation phase is the first phase of the data handling life cycle and involves creating and collecting data. The modification phase is the second phase of the data handling life cycle and consists in modifying and updating data. The sharing phase is the "},{"id":207,"question":"What is the term for retaining and maintaining information for as long as it is needed?","options":{"A":"Record retention","B":"Data storage","C":"Asset maintenance","D":"Data storage policy"},"correct":"A","explanation":"Record retention is the term for retaining and maintaining information as long as needed (see ISC2 Study Guide, Module 1, under Data Handling Practices). Data storage policies refer to the guidelines an organization must follow to store data securely. Data storage refers to the physical or virtual space where information is stored. Asset maintenance refers to the process of tracking, protecting, and managing the assets of an organization. Record retention is the most appropriate term for retaini"},{"id":208,"question":"What type of attack involves attackers intercepting a connection between a user and a genuine website?","options":{"A":"Advanced Persistent Threat","B":"Man-in-the-middle","C":"Insider Threat 94 | P a g e","D":"Malware"},"correct":"B","explanation":"A man-in-the-middle (MitM) attack is an attack in which an attacker intercepts a connection between a user and a genuine website (see ISC2 Study Guide, Module 2, under Types of Threats). In this attack, the attacker can gain access to the user's data, alter the data, or redirect the user to a malicious website. WiFi Eavesdropping is one of the most common forms of MitM attacks. Insider threat is an attack in which an attacker uses privileged access to gain access to sensitive data or systems. Ma"},{"id":209,"question":"What is a PRIMARY objective of a Virtual Local Area Network (VLAN)?","options":{"A":"To segment a network into multiple subnets","B":"To provide secure access to a network","C":"To provide secure access to a cloud provider","D":"To provide secure access to an MSP"},"correct":"A","explanation":"The primary purpose of a Virtual Local Area Network (VLAN) is to segment a network into multiple subnets (see ISC2 Study Guide, Module 3, under Network Segmentation). This allows for more efficient network management and improved security, as different subnets can be assigned different levels of access. A VLAN does not provide secure access to a network, cloud provider, or Managed Service Provider (MSP). It is important to note that while a VLAN can provide additional security, it is not a repla"},{"id":210,"question":"What is the name of the network tool that changes and maps source addresses of client requests for client anonymity?","options":{"A":"A router","B":"A gateway","C":"A proxy","D":"A firewall"},"correct":"C","explanation":"A proxy server acts as an intermediary between a client and the internet, allowing the client to make requests to servers while keeping the client's IP address hidden. The proxy server receives requests from the client, forwards them to the appropriate server, and then returns 95 | P a g e the server's response to the client, all while masking the client's IP address. In this way, the proxy server provides additional security and anonymity for clients when accessing the internet. While gateways,"},{"id":211,"question":"Which ISC2 Code of Ethics Canon emphasizes a security analyst's duty to avoid harm and uphold public well-being?","options":{"A":"Provide diligent and competent service to principals","B":"Act honorably, honestly, justly, responsibly, and legally","C":"Protect society, the common good, necessary public trust and confidence, and the infrastructure","D":"Advance and protect the profession"},"correct":"C","explanation":"Protect society, the common good, necessary public trust and confidence, and the infrastructure (see ISC2 Study Guide, Module 5, under Professional Code of Conduct). This Canon emphasizes a security analyst's duty to avoid harm and uphold public well- being by protecting society, the common good, necessary public trust and confidence, and the infrastructure. Other options, rather than societal protection, stress ethical and legal behavior, on service to employers or clients, and on enhancing the"},{"id":212,"question":"What term is used to describe a large collection of unrelated patches released together?","options":{"A":"Security fix","B":"Service pack","C":"Update","D":"Hotfix"},"correct":"B","explanation":"A service pack is a cumulative package of all the updates, fixes, and patches released for a software product. It is a collection of unrelated patches released together to provide an efficient way of updating a software product. Service packs are typically released periodically, containing security updates and new features. A hotfix is a minor, targeted update that fixes a specific issue. In contrast, an update is a more significant and comprehensive release that may include new features, bug fi"},{"id":213,"question":"What is the PRIMARY object of security baselines?","options":{"A":"Identify potential threats","B":"Establish a standard for security configurations","C":"Monitor and detect security events","D":"Protect data from unauthorized access"},"correct":"B","explanation":"The primary objective of security baselines is to establish a standard for security configurations (see ISC2 Study Guide, Chapter 5, under Module 2). Security baselines provide a framework to manage security configurations of systems and applications by establishing clear standards. Security baselines can be used to identify potential threats and can be used to monitor and detect security events."},{"id":214,"question":"Which of the following is NOT a principle of the ISC2 code of ethics?","options":{"A":"Provide diligent and competent service to principals","B":"Protect society, the common good, necessary public trust and confidence, and the infrastructure","C":"Act honorably, honestly, justly, responsibly, and legally","D":"Promptly report security vulnerabilities to relevant authorities"},"correct":"D","explanation":"While reporting security vulnerabilities is an important aspect of information security; it is not explicitly stated as a principle within the ISC2 Code of Ethics Canons (see ISC2 Study Guide, Module 5, under Professional Code of Conduct). The four Canons are: Protect society, the common good, necessary public trust and confidence, and the infrastructure; Act honorably, honestly, justly, responsibly, and legally; Provide diligent and competent service to principals; Advance and protect the profe"},{"id":215,"question":"What is the likelihood of an earthquake in the downtown area of Paris, if the records show that a big earthquake happens every 100 years?","options":{"A":"0.01","B":"100","C":"1","D":"0.1"},"correct":"A","explanation":"0.01. If a big earthquake happens every 100 years, then the likelihood or probability of occurrence of a big earthquake occurring in any given year would be 1/100 or 0.01 (see ISC2 Study Guide, Module 2, under Risk Assessment)."},{"id":216,"question":"Which of the following is a valid public IP?","options":{"A":"172.213.123.321","B":"12.123.23.23","C":"192.168.123.123","D":"256.231.342.123"},"correct":"B","explanation":"12.123.23.23 is a valid public IP address.The other three answers are not valid public IP addresses, as 192.123.123.123 and 172.213.123.321 are in the private IP range, and 256.231.342.123 is outside the valid range of public IP addresses (see ISC2 Study Guide, Chapter 4, Module 1)"},{"id":217,"question":"What is a side-channel attack?","options":{"A":"An attack with the goal of gaining access to a target system through the use of a falsified identity","B":"A passive, noninvasive attack to observe the operation of a device","C":"An attack that attempts to misdirect legitimate users to malicious websites","D":"An attack that involves numerous unsuspecting secondary victim systems"},"correct":"B","explanation":"A side-channel attack is a type of security attack where the attacker gains information from the physical implementation of a system, rather than exploiting software vulnerabilities (see ISC2 Study Guide, Module 2, under Types of Threats). This can include observing the power consumption, electromagnetic leaks, timing information, acoustic signals, and even the amount of heat a device produces. By analyzing this data, attackers can potentially deduce sensitive information about the system, such "},{"id":218,"question":"What access control principle prevents someone from both creating a new user account and assigning that account superuser privileges within the same system? 98 | P a g e","options":{"A":"Job rotation","B":"Least privilege","C":"Separation of duties","D":"Security through obscurity"},"correct":"C","explanation":"Separation of duties is a principle that requires multiple individuals to participate in a task, with each person assigned to a different role (see ISC2 Study Guide, Chapter 3, Module 1). This prevents someone from both creating a new user account and assigning that account superuser privileges within the same system. To illustrate the concept, imagine that Alice is responsible for creating new user accounts as part of his role in the IT department. Another individual (let's call him Bob) is res"},{"id":219,"question":"Access is based on which three elements:","options":{"A":"Subject, Object, and Rules","B":"Permissions, Layers, and Rules","C":"Subject, Layers, and Rules","D":"Subject, Permissions, and Rules"},"correct":"A","explanation":"A subject is an individual or entity that is attempting to access assets. Subjects can include individual users, applications, or services. Objects are the things a subject is trying to access. Objects can be files, data, physical devices, or anything a subject requests access to. Rules are instructions created to decide whether a subject should be granted access to an object. Rules are commonly used to define a subject's privileges related to the object; this is often referred to as an access c"},{"id":220,"question":"What is the main purpose of a Service-Level Agreement (SLA)?","options":{"A":"To segment a network into multiple subnets","B":"To outline the services provided by an MSP","C":"To provide secure access to a network 99 | P a g e","D":"To provide secure access to a cloud provider"},"correct":"B","explanation":"A Service-Level Agreement (SLA) is a contract between a service provider and a customer that outlines the services provided by the service provider and the obligations of both parties (see ISC2 Study Guide, Module 3, under Service-Level Agreement). It is used to define the service provider's responsibilities for delivering the agreed-upon services, as well as the customer's responsibilities for meeting the service provider's expectations. It is not used to provide secure access to a network, seg"},{"id":221,"question":"Which of the following is NOT a typical physical security requirement for wiring closets?","options":{"A":"Ban flammable item storage","B":"Install only in monitored areas","C":"Use door sensors to record entries","D":"Perform regular closet inspections"},"correct":"A","explanation":"While keeping flammable items away from electronic equipment is generally good practice, this isn't a typical specific requirement for wiring closets (see ISC2 Study Guide, Module 3, under Physical Access Controls). Installing only in monitored areas, using door sensors to record entries, and performing regular closet inspections are all typical physical security requirements for wiring closets. Banning flammable item storage is not a specific requirement for wiring closets but a best practice f"},{"id":222,"question":"What responsibility do you have as a member of the data protection team?","options":{"A":"To understand how the privacy laws apply to your organization","B":"To enact these privacy laws","C":"To interpret the privacy laws","D":"To draft privacy laws for the government"},"correct":"A","explanation":"As a member of an organization's data protection team, you will need to understand how privacy laws apply to your organization (see ISC2 Study Guide, Chapter 1, Module 1). This understanding includes the scope of the laws, the requirements of the organization, and the potential consequences of non-compliance. For instance, as a member of a data protection team working for a multinational company would need to understand a variety of privacy 100 | P a g e laws, including the European Union's Gene"},{"id":223,"question":"Which of the following is a PRIMARY purpose of using digital signatures?","options":{"A":"Verifying the identity of a user accessing a system","B":"Ensuring the confidentiality of data in transit","C":"Providing a secure method for password storage","D":"Protecting data from unauthorized modification"},"correct":"D","explanation":"A primary purpose of using digital signatures is to protect data from unauthorized modification. Digital signatures provide a way to ensure data integrity by verifying that the data has not been tampered with during transmission (see ISC2 Study Guide, Chapter 1, Module 1). Ensuring the confidentiality of data in transit is a purpose of encryption, not digital signatures. Verifying the identity of a user accessing a system is a purpose of authentication, not digital signatures. Providing a secure"},{"id":224,"question":"What is the recommended approach for assessing risks when designing a Business Continuity Plan (BCP) that considers tangible and intangible assets?","options":{"A":"Quantitative risk assessment","B":"Neither quantitative nor qualitative risk assessment","C":"Combination of quantitative and qualitative risk assessment","D":"Qualitative risk assessment"},"correct":"C","explanation":""},{"id":225,"question":"In disaster recovery planning, which of the following would typically be considered examples of natural disasters? (I) Hacking incident, (II) Tsunami, (III) Forest fire, (IV) Terrorism","options":{"A":"II and III only","B":"I, II, III, and IV","C":"I and IV only","D":"II, III, and IV only"},"correct":"A","explanation":"Natural disasters such as tsunamis and wildfires can significantly impact an organization's ability to operate and are therefore considered disasters for disaster recovery planning. Hacking and terrorism are security incidents that can cause damage or disruption to an organization's operations but are not typically considered disasters"},{"id":226,"question":"The CIA Triad is a foundational security model that includes which three key principles?","options":{"A":"Confidentiality, Integrity, Availability","B":"Confidentiality, Identity, Availability","C":"Confidentiality, Integrity, Accessibility","D":"Concealment, Integrity, Authentication"},"correct":"A","explanation":"The CIA Triad is a fundamental security model encompassing three core principles: Confidentiality, Integrity, and Availability. Confidentiality focuses on ensuring that only authorized users can access sensitive information. Integrity aims to prevent unauthorized data alteration or destruction. Availability ensures authorized users have timely and reliable access to information and system services (see ISC2 Study Guide, Module 1, under CIA Deep Dive)."},{"id":227,"question":"Which of the following enables message recipients to prove the authenticity of the message sender to a third party? 102 | P a g e","options":{"A":"Authorization","B":"Integrity","C":"Non-repudiat
