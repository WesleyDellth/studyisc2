he responsibility of cybersecurity professionals to protect society and the common good, foster necessary public trust 254 | P a g e and confidence, and safeguard the infrastructure (see the ISC2 Study Guide, Chapter 1, Module 5). For instance, a cybersecurity professional might detect a potential threat in a public utility's sys"},{"id":546,"question":"What is the definition of availability?","options":{"A":"The ability to access data available anywhere","B":"Timely and reliable access to information and the ability to use it","C":"Timely and reliable access to data and information services","D":"The ability to make data available to other users"},"correct":"B","explanation":"Availability is defined as timely and reliable access to information and the ability to use it (see the ISC2 Study Guide, Chapter 1, Module 1). This means that users must be able to access the data they need, when they need it, and that the data must be accurate and up-to-date. For example, in a cloud storage service, users should be able to retrieve their stored files whenever they need them, and the files should be intact and usable. As for the other options, timely and reliable access to data"},{"id":547,"question":"At which layer of the OSI does a firewall NOT control the traffic?","options":{"A":"Layer 3","B":"Layer 7","C":"Layer 2","D":"Layer 1"},"correct":"D","explanation":"Firewalls do not control traffic on the physical layer (Layer 1) of the OSI model. The physical layer is responsible for sending and receiving raw bit streams over a physical medium, such as a cable. Firewalls do not operate at this layer. Firewalls operate at higher layers, where they can analyze and control network traffic based on IP addresses, port numbers, or application data. The other options are incorrect because firewalls can actually control traffic at Layer 2 (Data Link Layer), Layer "},{"id":548,"question":"Which of the following statement is related to Discretionary Access Control (DAC)?","options":{"A":"Allows the last user to determine access","B":"Provides dynamic access control based on predefined rules","C":"Allows the system administrator to have full control","D":"Allows the creator of the object to dictate access"},"correct":"D","explanation":"Discretionary Access Control (DAC) allows the creator of the object to dictate access. This access control model allows the owner or creator of a resource to decide who has access to it and how much access they have (see ISC2 Study Guide, Chapter 3, Module 3). For example, consider a collaborative online document created by an employee in an organization. The employee can choose to grant access to view or edit the document to selected partners on the project. The control here is with the creator"},{"id":549,"question":"Which solution is likely used by a cybersecurity analyst to monitor internet traffic and alert for unusual activity?","options":{"A":"SOAR","B":"HIDS","C":"NIDS","D":"NIPS"},"correct":"C","explanation":"A network intrusion detection system (NIDS) is a system that monitors and analyzes network traffic for signs of intrusion or suspicious activity analysts (see ISC2 Study Guide, Chapter 4, 256 | P a g e Module 2). Consider that a cybersecurity analyst might set up a NIDS to monitor all incoming and outgoing traffic, looking for patterns or behaviors that match known intrusion techniques. Then, for example, when an organization's network experiences an unusually high volume of login attempts, the "},{"id":550,"question":"Which of the following statements is TRUE regarding digital certificates?","options":{"A":"They are used to guarantee the authenticity of digital documents","B":"They are used to guarantee the confidentiality of digital documents","C":"They are used to guarantee the integrity of digital documents","D":"They are used to guarantee the non-repudiation of digital documents"},"correct":"A","explanation":"Digital certificates are digital credentials that link a public key to an entity's identity, providing a means to verify that an entity is who it claims to be and enabling the authentication of digital documents (see the ISC2 Study Guide, Chapter 1, Module 1). For example, when a user visits a secure Web site, the Web site presents a digital certificate to the user's browser. The browser then verifies the certificate with a trusted Certificate Authority (CA), ensuring the authenticity of the Web"},{"id":551,"question":"What is the difference between 'implicit deny' and 'explicit deny' in access control?","options":{"A":"'Implicit deny' means system administrators have access denied, while explicit deny means the user who created the object has denied access 257 | P a g e","B":"'Implicit deny' means that access is denied unless specifically granted, while 'explicit deny' means that access is specifically denied","C":"'Implicit deny' means the last user to access the system denied access, while 'explicit deny' means the system denied access","D":"There is no difference between 'implicit deny' and 'explicit deny'"},"correct":"B","explanation":"In access control systems, implicit deny works on the principle that access is automatically denied unless it is explicitly granted (see ISC2 Study Guide, Chapter 3, Module 3). For example, in an organization, if a particular employee has not been given specific permissions to access a confidential folder on a shared drive, access is denied by default (or implicitly). Conversely, an 'explicit deny' is a condition that explicitly denies access to a user or group, overriding all other permissions."},{"id":552,"question":"A junior cybersecurity analyst has detected a ransomware attack on the company's servers and has activated the incident response team. Which is the next BEST course of action? (\u2605)","options":{"A":"Attempt to isolate any compromised servers to prevent further damage","B":"Update all server anti-virus software with the latest updates","C":"Investigate how the ransomware entered the company's servers","D":"Generate support tickets to restore the affected systems to their previous state"},"correct":"A","explanation":"The analyst should attempt to quarantine all infected hosts to limit further spread. In the case of a ransomware attack, the immediate priority should be to contain the threat and prevent it from spreading to other systems. For example, suppose an organization's file server is infected with ransomware. In this case, the incident response team should immediately isolate the server from the network to prevent the ransomware from spreading to other servers or workstations. The other options, while "},{"id":553,"question":"What is the purpose of the two-person rule in a security strategy?","options":{"A":"Limiting access to high-security areas to two individuals only","B":"Ensuring that all tasks are completed twice for verification","C":"Reduce workload by dividing security tasks between two individuals","D":"Require a minimum of two individuals to be together in high-security areas"},"correct":"D","explanation":"The two-person rule is a security measure designed to prevent unauthorized access to sensitive or secure areas. It requires the presence of two authorized individuals at all times when accessing these areas, thereby reducing the risks of unauthorized action or security breaches (see the ISC2 Study Guide, Chapter 3, Module 1). For example, in a data center that houses sensitive information, the two-person rule would require that no individual can access the data center alone. This ensures that th"},{"id":554,"question":"In the context of information security, what is a definition for 'control'?","options":{"A":"A document outlining the security policies","B":"A protocol for protected communication","C":"A safeguard conceived to guarantee the CIA of data","D":"An encryption technique for data at rest"},"correct":"C","explanation":"A \"control\" refers to the measures or safeguards put in place to ensure the confidentiality, integrity, and availability (CIA) of data. These controls can be technical (such as firewalls or encryption), physical (such as locks or access cards), or administrative (such as policies or procedures). For example, a control might be a password policy that requires complex passwords and regular password changes to ensure the confidentiality and integrity of user accounts, or a firewall that protects a "},{"id":555,"question":"What is the consequence of failing to adhere to the ISC2 Code of Ethics?","options":{"A":"Suspension of certification","B":"Revocation of certification","C":"Loss of membership","D":"Loss of professional reputation"},"correct":"B","explanation":"Failure to adhere to the principles of the ISC2 Code of Ethics can result in serious consequences, including revocation of certification (see ISC2 Study Guide, Chapter 1, Module 5). Revocation of certification means that the individual is no longer recognized as certified by ISC2, which can have a significant impact on their professional standing and career opportunities. For example, if a cybersecurity professional is found to have engaged in unethical practices, such as knowingly implementing "},{"id":556,"question":"What is the main goal of a Disaster Recovery Plan (DRP)?","options":{"A":"Help guide the actions of emergency response personnel","B":"Restore IT and communications back to full operations","C":"Provide a high-level overview plan against a cyberterrorism attack","D":"Maintain critical business functions functioning"},"correct":"B","explanation":"The primary goal of a Disaster Recovery Plan (DRP) is to return IT and communications to full operation after a disaster (see ISC2 Study Guide, Chapter 2, Module 3). A DRP is a documented process or set of procedures for recovering and protecting an organization's IT infrastructure in the event of a disaster. For example, if a severe storm causes a power outage that knocks out a company's servers, the DRP would outline the steps to restore server functionality, such as switching to a redundant s"},{"id":557,"question":"Choosing NOT to implement the needed security controls is a form of:","options":{"A":"Risk reduction","B":"Risk acceptance","C":"Risk mitigation","D":"Risk transference"},"correct":"B","explanation":"Consciously choosing not to implement required security controls is a form of risk acceptance (see the ISC2 Study Guide, Chapter 1, Module 3). Risk acceptance is a risk management strategy that involves a conscious decision not to take action to reduce or mitigate a risk. This strategy is typically used when the cost of mitigating the risk is greater than the cost of accepting the risk. For example, an organization might decide not to purchase an expensive cyber defense system if its analysis sh"},{"id":558,"question":"Which is one PRIMARY benefit of having the least privilege principle?","options":{"A":"To minimize the risk of unauthorized access to sensitive data","B":"To reduce the number of users accounts in the system","C":"To simplify the process of giving privilege to an account","D":"To simplify the process of user account creation"},"correct":"A","explanation":"The primary benefit of implementing least privilege is to minimize the risk of unauthorized access to sensitive data. The principle of least privilege dictates that users should be granted only the minimum privileges necessary to perform their job functions (see ISC2 Study Guide, Chapter 5, 261 | P a g e Module 3). This principle reduces the potential damage that an insider threat or compromised user account can cause. For example, a customer service representative at a bank should only need acc"},{"id":559,"question":"How are permissions typically assigned in a role-based access control (RBAC) model?","options":{"A":"Based on the user's role within the organization","B":"Based on the discretion of the systems administrator","C":"Based on the last user to access the system","D":"Based on the needs of the individual user"},"correct":"A","explanation":"In a role-based access control (RBAC) model, permissions are typically assigned based on the user's role within the organization (see ISC2 Study Guide, Chapter 3, Module 3). For example, a human resources manager would have access to employee records, while a sales manager would have access to sales data. This ensures that users only have access to the information they need to do their jobs, improving security by limiting the potential for unauthorized access or misuse of data. Permissions are t"},{"id":560,"question":"Which of the following BEST describes a security solution that enforces policies on devices attempting to access network resources?","options":{"A":"Geolocation restrictions","B":"Network access control","C":"Password history requirements","D":"Time-based access control"},"correct":"B","explanation":"Network access control (NAC) is a security solution that enforces policies on devices attempting to access network resources. In this scenario, the NAC policy could be set to allow access to the corporate cloud storage only from corporate devices (see ISC2 Study Guide, Chapter 4, Module 3). For example, an enterprise network might have a NAC solution that checks the status of a device when it attempts to connect to the network. It would check for up-to-date anti-virus protection, operating syste"},{"id":561,"question":"An European institution wants different data handling protocols depending on the type of information stored. What does the institution need to do in order to achieve this?","options":{"A":"Classify the records","B":"Assign a data custodian","C":"Perform a vulnerability assessment","D":"Anonymize the data"},"correct":"A","explanation":"The financial institution can achieve its goal by implementing a data classification policy (see the ISC2 Study Guide, Chapter 5, Module 1). This involves categorizing data based on its sensitivity and privacy requirements, such as PII, financial records, and health records. Once classified, appropriate handling, storage, and protection measures could be applied to each category of data. For example, health records could be subject to more stringent controls due to their highly sensitive nature."},{"id":562,"question":"The posting of photographs of confidential documents that contain identifying information of customers and that have been left unattended on a printer is considered to be a breach:","options":{"A":"Occurrence","B":"Exploit","C":"Attack","D":"Breach"},"correct":"D","explanation":"The term 'breach' describes the unauthorized access or inadvertent disclosure of personally identifiable information (PII). A breach can occur in a number of ways including a cyber attack, employee negligence, or system error (see ISC2 Study Guide, Chapter 2, Module 1). Posting photos of confidential documents containing customer identifying information left unattended on a printer is considered a breach because it involves the unauthorized disclosure of personal information or records. For exam"},{"id":563,"question":"What information can be obtained by using the 'ping' command?","options":{"A":"The online status of the remote system","B":"The Domain Name Service (DNS) address of the remote system","C":"The route to the remote system","D":"The file transfer speed from the remote system"},"correct":"A","explanation":"The 'ping' command is a common network diagnostic tool used to test the availability of a host by measuring the round-trip time for Internet Control Message Protocol (ICMP) echo requests messages to the target host (see ISC2 Study Guide, Chapter 4, Module 1). If the server is unavailable, 'ping' will display a timeout. 264 | P a g e For example, a network administrator might use the 'ping' command to check if a server with the IP address 192.168.1.1 is online. They would type \"ping 192.168.1.1''"},{"id":564,"question":"Two healthcare organizations are planning to collaborate on a project. Which of the following can be used to formalize this collaboration agreement?","options":{"A":"Non-Disclosure Agreement (NDA)","B":"Information Sharing Agreement (ISA)","C":"A memorandum of understanding (MOU)","D":"Service Level Agreement (SLA)"},"correct":"C","explanation":"An MOU is a formal agreement between two or more parties to establish a formal partnership. It would outline the terms of cooperation, responsibilities, and shared goals for the two healthcare organizations. For example, the MOU might detail the data each organization will contribute, how they will share resources, and the goals of the project. The remaining options, while relevant in certain contexts, do not best fit this scenario. An Information Sharing Agreement (ISA) is used when the parties"},{"id":566,"question":"What is the difference between a policy and a regulation?","options":{"A":"Policies provide specific step-by-step instructions to achieve a task or process, while regulations are legally binding and must be followed","B":"Policies provide a set of criteria to be met, while regulations guide how to achieve a desired outcome","C":"Policies instruct how to achieve a desired outcome and ensure compliance, while regulations are legally binding and must be followed","D":"Policies provide a set of criteria to be met, while regulations provide specific step-by-step instructions to achieve a task or process"},"correct":"C","explanation":"Policies are guidelines that an organization establishes to govern its actions. They provide a framework and general direction for achieving specific results. For example, a company might have a policy that all employees must change their passwords periodically to ensure data security. Regulations, on the other hand, are rules or guidelines created and maintained by an authority. They are legally binding and must be followed. For example, the General Data Protection Regulation (GDPR) regulates d"},{"id":567,"question":"Which of the following is NOT an example of a physical security control?","options":{"A":"Zero Trust","B":"Security cameras","C":"Remote control electronic locks","D":"Biometric access controls"},"correct":"A","explanation":"Zero Trust is a cybersecurity concept that revolves around not trusting anyone by default, even those already on the organization's network. This approach requires continuous verification for all users attempting to access the system, rather than relying on one-time authentication (ISC2 Study Guide, Chapter 1, Module 3). The remaining options are incorrect because they are instances of physical controls, and Zero Trust is essentially an IT security model, not a physical security control."},{"id":568,"question":"Which of the following best describes a robust security awareness training program?","options":{"A":"Awareness activities","B":"Educating about potential threats","C":"A combination of education, training, and awareness activities","D":"Practical training on how to handle threats"},"correct":"C","explanation":"A robust security awareness program should include education, training, and awareness activities (see ISC2 Study Guide, Chapter 5, Module 4). Education informs employees about potential threats and security best practices. Training provides practical skills for dealing with security threats. Awareness activities update employees on the latest security threats and reinforce the importance of following security practices. For example, an organization might hold regular workshops (education), condu"},{"id":569,"question":"Which of the following options best describes the concept of Ethernet?","options":{"A":"A standard that defines wireless connections between networked devices","B":"A standard that defines connections between network equipment","C":"A standard that defines connections between digital devices","D":"A standard that defines wired connections between networked devices"},"correct":"D","explanation":"Ethernet is a standard that defines wired connections between networked devices. The protocol controls how data is transferred across a local area network (LAN) (see ISC2 Study Guide, Chapter 4, Module 1). For example, in a typical office setup, Ethernet cables connect computers, printers, and servers to communicate and share resources. The remaining options inaccurately represent the concept of Ethernet. Describing Ethernet as defining wireless connections is incorrect because Ethernet standard"},{"id":570,"question":"In the context of disaster recovery planning, what does RTO stand for?","options":{"A":"Recovery Team Operations","B":"Recovery Time Objective","C":"Recovery Team Objective","D":"Recovery Time Operations"},"correct":"B","explanation":"Recovery Time Objective (RTO). In the context of disaster recovery planning, RTO is a critical metric that defines the maximum tolerable amount of time a system, application, or network can be down following an outage or disaster. It sets the goal for restoring IT and business activities to avoid unacceptable consequences associated with a disruption in business continuity (see the ISC2 Study Guide, Chapter 2, Module 3). For example, if an organization sets a four-hour RTO for its email server, "},{"id":571,"question":"What is social engineering?","options":{"A":"A technique for optimizing algorithms on social media platforms to increase user engagement","B":"A technique for designing public spaces to induce community interactions and social gatherings","C":"A technique used by attackers to trick people into revealing sensitive information","D":"A technique for systematic study of society and its institutions, aiming to understand social behavior"},"correct":"C","explanation":"Social engineering is a technique used by attackers to trick people into revealing sensitive information. Instead of breaking encryption or finding software vulnerabilities, an attacker using social engineering manipulates people into unknowingly performing actions or disclosing confidential information (see ISC2 Study Guide, Chapter 5, Module 4). For example, an attacker might pose as a bank representative and ask a person for their account information under the guise of verifying their identit"},{"id":572,"question":"Why is it essential for organizations to periodically review their retained records?","options":{"A":"To stay compliant with changing regulations","B":"To retain only pertinent information","C":"To free up storage space","D":"To detect possible security risks in the data stored"},"correct":"A","explanation":"Organizations must periodically review their retained records to comply with changing regulations. Data privacy regulations can change over time, and organizations must ensure they are in compliance to avoid legal penalties, particularly with respect to data retention (see ISC2 Study Guide, Chapter 5, Module 1). For example, with the introduction of the General Data Protection Regulation (GDPR) in the European Union, there are specific requirements for how long certain types of data can be retai"},{"id":573,"question":"Which of the following is an example of dual control?","options":{"A":"A system password with two separate parts that no single person knowing the full password","B":"Two or more individuals sharing access to the same device","C":"An employee creating an invoice for payment to a vendor and getting it approved by a manager","D":"Two or more individuals submitting a proposal for a system configuration change and both reviewing the proposal"},"correct":"A","explanation":"A system password with two separate parts that no one person knows in full is an example of dual control (where two or more people are required to complete a sensitive task). See the ISC2 Study Guide, Chapter 3, Module 1 For example, in a banking environment, two employees may be required to enter their unique part of a password to authorize a large financial transaction. This ensures that no single person has complete control over sensitive operations, reducing the risk of fraud or misuse."},{"id":575,"question":"Regulatory bodies create regulations to ...: (\u2605)","options":{"A":"\u2026 provide a set of technical criteria to be met in security measures","B":"\u2026 impose legal penalties for non-compliance","C":"\u2026 provide specific step-by-step instructions to accomplish a task or process 270 | P a g e","D":"\u2026 instruct on desired outcomes and ensure compliance"},"correct":"D","explanation":"Regulatory bodies create regulations to direct desired outcomes while ensuring compliance with established standards or requirements (see the ISC2 Study Guide, Chapter 1, Module 4). For example, in cybersecurity, a regulatory body might issue a regulation requiring all organizations engaged in a specific activity to implement multi-factor authentication for all users. This instructs organizations on the desired outcome (improved user authentication) and ensures compliance with a specific standar"},{"id":576,"question":"What are the two PRIMARY transport layer protocols?","options":{"A":"TCP and UDP","B":"HTTPS and TCP","C":"ICMP and IMAP","D":"TCP and ICMP"},"correct":"A","explanation":"The two primary Transport Layer protocols in the Internet Protocol suite are the Transmission Control Protocol (TCP) and the User Datagram Protocol (UDP) (see ISC2 Study Guide, Chapter 4, Module 1). TCP is a connection-oriented protocol that provides reliable, ordered, and error- tested delivery of a stream of bytes between applications running on hosts communicating over an IP network. UDP is a simpler, connectionless Internet protocol that allows messages, also known as datagrams, to be sent w"},{"id":577,"question":"What kind of attack is likely to occur when a hacker intercepts and redirects traffic by spoofing the IP address of a corporate server?","options":{"A":"Advanced persistent threat (APT)","B":"Trojan 271 | P a g e","C":"On-path attack","D":"Spyware"},"correct":"C","explanation":"In an on-path attack, hackers position themselves on the communication path between two parties, intercepting and possibly altering the communication. For example, a hacker could intercept communication between a user and a bank's server and redirect the user to a bogus Website where the user unknowingly provides his or her login credentials. The other options are attacks that do not specifically require intercepting and redirecting communications. An Advanced Persistent Threat (APT) is a sustai"},{"id":578,"question":"What attack involves intercepting and possibly altering communication between two persons without their knowledge?","options":{"A":"Fragment attack","B":"Spoofing attack","C":"DoS attack","D":"Man-in-the-middle attack"},"correct":"D","explanation":"A man-in-the-middle (MitM) attack is a type of cyberattack in which a malicious actor inserts himself into a conversation between two parties, impersonates both parties, and gains access to information that the two parties were trying to send each other. The attacker could intercept and modify the communication to trick the victims into revealing confidential information (see ISC2 Study Guide, Chapter 4, Module 1). For example, consider a scenario where Alice attempts to send her bank account in"},{"id":579,"question":"What is the first step in classifying data stored in an Information System?","options":{"A":"Sharing","B":"Storing 272 | P a g e","C":"Collecting","D":"Labeling"},"correct":"D","explanation":"The first step in classifying data stored in an information system is labeling. This involves assigning a classification level to the data based on its sensitivity and the level of protection required (see ISC2 Study Guide, Chapter 5, Module 1). For example, an organization might label data as \"public,\" \"internal,\" \"confidential,\" or \"restricted\" based on the data's content, the potential impact of unauthorized disclosure, and regulatory requirements."},{"id":580,"question":"Which type of malware self-replicate without the need of user's interaction?","options":{"A":"Spyware","B":"Trojan","C":"Virus","D":"Worm"},"correct":"D","explanation":"A worm is a type of malware that can replicate itself without user interaction. Once a worm infects a system, it can automatically spread to other systems on the same network, exploiting vulnerabilities in those systems to gain access (see ISC2 Study Guide, Chapter 4, Module 2). For example, the infamous ILOVEYOU worm of 2000 spread via email. Once a user opened the infected email, the worm would send itself to all the contacts in the user's address book, spreading to new systems without further"},{"id":582,"question":"Which method eliminates residual physical effects from writing original values?","options":{"A":"Clearing","B":"Destruction","C":"Purging","D":"Overwriting"},"correct":"A","explanation":"Clearing is a method used to eliminate the residual physical effects of writing original values to a storage device. This process involves overwriting the data with zeros or ones to ensure the original data cannot be retrieved. For example, when a hard disk is erased, all previously stored data is overwritten, making it impossible to recover the original data (see ISC2 Study Guide, Chapter 5, Module 1). On the other hand, purging is more rigorous than wiping, in which the storage media is declas"},{"id":583,"question":"Which of the following is an example of the principle of least privilege?","options":{"A":"Users have the privilege to control who can access their information","B":"Users can access all items but can only modify the ones they need","C":"Users have unrestricted access to all information","D":"Users can only access the assets they need for their role and nothing more"},"correct":"D","explanation":"A policy that defines the rules that assign access to authorized individuals. Administrative controls are non-technical measures used to manage and control access to data. They include policies, procedures, and guidelines that determine who has access to data and under what conditions (see the ISC2 Study Guide, Chapter 3, Module 1). For example, a policy might specify that only IT administrators can access certain servers during certain hours. For example, a data center might have a policy that "},{"id":584,"question":"What type of access control model is based on user clearance and object classification?","options":{"A":"Discretionary access control (DAC)","B":"Role-based access control (RBAC)","C":"Mandatory access control (MAC)","D":"Rule-based access control (RuBAC)"},"correct":"C","explanation":"In a mandatory access control model, users are granted access based on their security clearance level and the classification level of the object or information they are trying to access (see ISC2 Study Guide, Chapter 3, Module 3). For example, MAC might be implemented to protect data in a government agency that handles classified information. If an analyst has a Secret clearance, he or she would only be allowed access to documents classified Secret or below. Similarly, if a document is classifie"},{"id":585,"question":"What is a disadvantage of password managers?","options":{"A":"They are complex and difficult to use 275 | P a g e","B":"They can be compromised if protected by a weak password","C":"They are expensive","D":"They are not compatible with most systems"},"correct":"B","explanation":"Password managers can be compromised if they are protected by a weak password. For example, if a user chooses a simple or commonly used password to secure their password manager, a hacker could easily guess or brute-force that password. Once inside, the hacker would have access to all passwords stored in the manager, resulting in a significant security breach. Password managers are not inherently difficult to use; most are designed with user-friendly interfaces and straightforward features. They"},{"id":586,"question":"What best describes the PRIMARY objective of a data retention policy?","options":{"A":"To ensure that data is retained for at least five years","B":"To delineate areas outside the scope of time-based data management","C":"To preserve data indefinitely","D":"To specify how long information and assets should be retained"},"correct":"D","explanation":"A data retention policy is a set of guidelines that helps organizations manage their data and determine how long certain types of data should be kept. For example, a company might have a policy of retaining financial records for seven years to comply with tax laws, while retaining employee e-mails for only two years to manage storage space and ensure privacy (see ISC2 Study Guide, Chapter 5, Module 1). The other options do not accurately describe the primary objective of a data retention policy."},{"id":587,"question":"Which of the following is usually NOT provided redundantly in data centers?","options":{"A":"Network connectivity 276 | P a g e","B":"Electrical supply","C":"Air flow","D":"Cooling"},"correct":"C","explanation":"While air circulation is critical in a data center to maintain optimal temperature and humidity levels, it is typically not redundant. A data center may have a central air circulation system to cool servers and maintain proper humidity levels. However, if this system fails, there is typically no redundant system that can immediately take over. Instead, the data center would rely on backup cooling methods or contingency protocols until the primary system is repaired. The other options are incorre"},{"id":588,"question":"Which of the following documents outlines the specific step-by-step instructions to achieve a task or process?","options":{"A":"Standards","B":"Regulations","C":"Procedures","D":"Policies"},"correct":"C","explanation":"Procedures are documents that outline the specific step-by-step instructions to achieve a task or process (see the ISC2 Study Guide, Chapter 1, Module 4). Policies are documents that define the rules and guidelines for an organization to follow. For instance, a procedure can detail the steps an IT staff must follow to reset a forgotten user password, ensuring all security measures are adhered to. Regulations are documents that define the laws and regulations that an organization must comply with"},{"id":589,"question":"What is a Local Area Network (LAN)?","options":{"A":"A network that connects distinct geographical locations 277 | P a g e","B":"A network that connects two computers","C":"A network that typically connects a single floor or building","D":"A network that typically interconnects switching equipment"},"correct":"C","explanation":"A local area network (LAN) is a network that typically connects devices within a limited geographic area, such as a single floor or building (see ISC2 Study Guide, Chapter 4, Module 1). For example, in a corporate office, a LAN might be used to connect all the computers, printers, servers, and other devices in the same building. This allows for efficient resource sharing, file sharing, and communication between devices on the network."},{"id":590,"question":"Which of the following documents are NOT commonly part of a Disaster Recovery Plan?","options":{"A":"Software source code","B":"Technical guides","C":"Executive summaries","D":"Checklists"},"correct":"A","explanation":"Software Source Code. A Disaster Recovery Plan (DRP) is a comprehensive document that outlines the steps to be taken in the event of a disaster or disruption to ensure business continuity. It typically includes executive summaries, technical guides, and checklists. However, software source code is not typically included in a DRP. While it's critical to have backups of software source code, code is not included in a document that outlines steps for disaster recovery (see the ISC2 Study Guide, Cha"},{"id":591,"question":"What is a drawback of biometric authentication?","options":{"A":"They can reveal medical information","B":"They require a constant power supply 278 | P a g e","C":"They can be easily hacked","D":"They are affordable to anyone"},"correct":"A","explanation":"Biometric authentication, such as a fingerprint or iris scan, can potentially reveal sensitive medical information(see ISC2 Study Guide, Chapter 3, Module 2). For example, certain diseases or medical conditions can affect a person's biometric information. This could lead to discrimination or other negative consequences if the information is not properly protected. Biometric authentication systems may not be affordable. The cost can vary greatly depending on the type and complexity of the system."},{"id":592,"question":"What can be considered as Personally Identifiable Information (PII)?","options":{"A":"Trade secrets, research, business plans and intellectual property","B":"Any data about an individual that could be used to direct or indirect identify them","C":"Data that, if improperly handled, would harm an organization or individual","D":"Aggregated information about a sensible group"},"correct":"B","explanation":"Personally Identifiable Information (PII) is any data about an individual that could be used to directly or indirectly identify that individual (see the ISC2 Study Guide, Chapter 1, Module 1). PII includes information such as an individual's name, e-mail address, physical address, telephone number, or social security number. For example, in an e-commerce transaction, a customer's credit card number, billing address, and e- mail address are all considered PII because they can be used to identify "},{"id":593,"question":"What is a Business Impact Analysis (BIA)? 279 | P a g e","options":{"A":"A checklist used by managers before a critical intervention","B":"A proactive development of procedures to restore critical business operations after a disaster","C":"A systematic process to evaluate the potential effects of an interruption to critical business operations","D":"A document that systematizes the disturbance in the business caused by a critical security event"},"correct":"C","explanation":"A Business Impact Analysis (BIA) is a systematic process for identifying and evaluating the potential impact of an interruption to critical business operations as part of business continuity planning (see ISC2 Study Guide, Chapter 2, Module 2). A BIA helps identify and prioritize the critical business functions affected by a disaster, facilitating recovery and maintaining business operations. For example, suppose an IT company conducts a BIA and determines that the loss of data center operations"},{"id":594,"question":"What is a definition of confidentiality?","options":{"A":"Ensuring privacy of user data","B":"Ensuring that data has not been altered in an unintended manner","C":"Ensuring access to data only to authorized users","D":"Ensuring completeness and consistency of data"},"correct":"C","explanation":"Confidentiality is about ensuring that information is accessible only to those with the appropriate privileges, and protecting the data from unauthorized access, disclosure, or destruction (see the ISC2 Study Guide, Chapter 1, Module 1). For example, a company might encrypt sensitive documents and make them available only to certain people with the correct decryption keys to ensure the confidentiality of the information. In this context, the other options are not the right ones. Ensuring that da"},{"id":595,"question":"Audit trail logs showed that a bank employee accessed customer accounts and transferred funds to a personal bank account. Which of the following describes this action?","options":{"A":"Social engineering","B":"Insider threat","C":"Third party risk","D":"Data breach"},"correct":"B","explanation":"An insider threat is a security risk that originates from within an organization, often from an employee or former employee (see ISC2 Study Guide, Chapter 4, Module 2). In this case, the bank employee who accessed customer accounts and transferred funds to a personal account is an example of an insider threat. This employee misused his authorized access to conduct fraudulent transactions. The other options are false for the following reasons. Social engineering refers to manipulation techniques "},{"id":596,"question":"What is the PRIMARY goal of a Denial of Service (DoS) attack?","options":{"A":"Preventing legitimate activity on a system","B":"Spreading malware","C":"Diverting users to malicious websites","D":"Gaining access to sensitive data"},"correct":"A","explanation":"The primary goal of a denial-of-service (DoS) attack is to make a system or network resource unavailable to its intended users by temporarily or indefinitely disrupting the services of a host connected to the Internet (see ISC2 Study Guide, Chapter 4, Module 2). This is typically accomplished by flooding the targeted machine or resource with unwanted requests in an attempt to overload systems and prevent some or all legitimate requests from being fulfilled. For example, an attacker might target "},{"id":597,"question":"What is the difference between risk mitigation and risk acceptance?","options":{"A":"Risk mitigation is the process of accepting a risk, while risk acceptance is the process of transferring a risk to another party","B":"Risk mitigation is the process of diminishing a risk, while risk acceptance is the process of accepting a risk","C":"Risk mitigation is the process of reducing a risk, while risk acceptance is the process of eliminating a risk","D":"Risk mitigation is the process of transferring a risk to another party, while risk acceptance is the process of accepting a risk"},"correct":"B","explanation":"Risk mitigation and risk acceptance are two different methods of risk management used in cybersecurity. Risk mitigation involves implementing strategies to limit the impact or likelihood of threats occurring. For example, an organization might install a firewall or two-step authentication to reduce the risk of unauthorized system access. This setup reduces the likelihood of a cyber-attack; therefore, the potential damage is mitigated (see ISC2 Study Guide, Chapter 1, Module 2). Risk acceptance, "},{"id":598,"question":"What concept is at the center in the concentric circles model of defense in depth? (\u2605)","options":{"A":"Physical Controls","B":"Administrative Controls","C":"Logical and/or Technical Controls","D":"Assets"},"correct":"D","explanation":"The concentric circle model of defense in depth places assets at the center. This model is designed to protect an organization's most valuable resources, its assets. Assets can be data, hardware, software, systems, or any other valuable resource. For example, in a bank, the assets could be the customer's financial information, the bank's proprietary software, the servers where all the data is stored, and so on. The remaining options are incorrect because they are not at the center of the concent"},{"id":599,"question":"What three intents are found in the ISC2 Code of Ethics?","options":{"A":"Protect society, resolve vulnerabilities, and act ethically","B":"Protect society, provide competent service, act ethically","C":"Protect society, detect vulnerabilities, and act ethically","D":"Protect society, report, vulnerabilities, provide competent service"},"correct":"B","explanation":"The ISC2 Code of Ethics Canon is a set of professional ethics statements that guide the behavior of cybersecurity professionals (see ISC2 Study Guide, Chapter 1, Module 5). It contains four canons, but the three mentioned in this option are: Protect society (Canon 1), Provide diligent and competent service to clients (Canon 3), and Advance and protect the profession (Canon 4), which includes acting ethically. While the other options contain elements of the ISC2 Code of Ethics Canon, they do not "},{"id":600,"question":"What is the PRIMARY goal of a firewall on a network?","options":{"A":"Filter data traffic on the basis of a set of rules","B":"Control the flow of network traffic","C":"Connect multiple devices on a network","D":"Provide information to other networked computers"},"correct":"A","explanation":"The primary function of a firewall is to control incoming and outgoing network traffic by analyzing data packets and determining whether or not to allow them through based on a predetermined set of rules (see ISC2 Study Guide, Chapter 4, Module 1). For example, a firewall can be configured to block traffic from specific IP addresses or to allow traffic only on specific ports. 283 | P a g e"}];

let state = {
  screen: 'start',
  mode: 'all',
  count: 50,
  questions: [],
  current: 0,
  answered: null,
  score: 0,
  wrong: 0,
  answers: []
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  let pool = state.mode === 'random' ? shuffle(ALL_QUESTIONS) : [...ALL_QUESTIONS];
  const n = Math.min(Math.max(1, state.count), pool.length);
  state.questions = pool.slice(0, n);
  state.current = 0;
  state.answered = null;
  state.score = 0;
  state.wrong = 0;
  state.answers = [];
  state.screen = 'quiz';
  render();
}

function selectAnswer(letter) {
  if (state.answered) return;
  const q = state.questions[state.current];
  const isCorrect = letter === q.correct;
  state.answered = letter;
  if (isCorrect) state.score++;
  else state.wrong++;
  state.answers.push({ qIndex: state.current, selected: letter, correct: q.correct, isCorrect });
  render();
}

function nextQuestion() {
  state.current++;
  state.answered = null;
  if (state.current >= state.questions.length) {
    state.screen = 'results';
  }
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
  const app = document.getElementById('app');
  if (state.screen === 'start') renderStart(app);
  else if (state.screen === 'quiz') renderQuiz(app);
  else renderResults(app);
}

function renderStart(app) {
  app.innerHTML = `
    <div class="start-screen">
      <div class="logo">ISC2 Practice Exam</div>
      <h1>Cybersecurity<br>Question Bank</h1>
      <p>${ALL_QUESTIONS.length} questions available</p>
      <div class="mode-cards">
        <div class="mode-card ${state.mode==='all'?'selected':''}" onclick="state.mode='all';render()">
          <h3>Sequential</h3>
          <span>Questions in order</span>
        </div>
        <div class="mode-card ${state.mode==='random'?'selected':''}" onclick="state.mode='random';render()">
          <h3>Random</h3>
          <span>Shuffled questions</span>
        </div>
      </div>
      <div class="count-row">
        <label>Number of questions</label>
        <input type="number" class="count-input" min="1" max="${ALL_QUESTIONS.length}" value="${state.count}" onchange="state.count=parseInt(this.value)||50">
      </div>
      <button class="btn btn-primary" onclick="startQuiz()">Start Exam</button>
    </div>
  `;
}

function renderQuiz(app) {
  const q = state.questions[state.current];
  const total = state.questions.length;
  const pct = ((state.current + (state.answered ? 1 : 0)) / total * 100).toFixed(0);
  const letters = ['A','B','C','D'];

  let optionsHtml = '';
  letters.forEach(l => {
    if (!q.options[l]) return;
    let cls = 'option-btn';
    if (state.answered) {
      cls += ' disabled';
      if (l === state.answered && state.answered === q.correct) cls += ' correct-selected';
      else if (l === state.answered && state.answered !== q.correct) cls += ' wrong-selected';
      else if (l === q.correct) cls += ' correct-reveal';
    }
    optionsHtml += `
      <button class="${cls}" onclick="selectAnswer('${l}')">
        <span class="option-letter">${l}</span>
        <span>${q.options[l]}</span>
      </button>`;
  });

  let explanationHtml = '';
  if (state.answered && q.explanation) {
    explanationHtml = `
      <div class="explanation-box">
        <strong>Explanation</strong>
        ${q.explanation}
      </div>`;
  }

  let navHtml = '';
  if (state.answered) {
    const isLast = state.current >= total - 1;
    navHtml = `
      <div class="nav-row">
        <button class="btn btn-primary" onclick="nextQuestion()">
          ${isLast ? 'View Results' : 'Next Question →'}
        </button>
      </div>`;
  }

  app.innerHTML = `
    <div class="quiz-header">
      <span class="progress-info">${state.current + 1} / ${total}</span>
      <div class="score-live">
        <span class="score-correct">✓ ${state.score}</span>
        <span class="score-wrong">✗ ${state.wrong}</span>
      </div>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" style="width:${pct}%"></div>
    </div>
    <div class="question-number">QUESTION ${q.id}</div>
    <div class="question-text">${q.question}</div>
    <div class="options">${optionsHtml}</div>
    ${explanationHtml}
    ${navHtml}
  `;
}

function renderResults(app) {
  const total = state.questions.length;
  const pct = Math.round(state.score / total * 100);
  const passed = pct >= 70;
  const circumference = 2 * Math.PI * 78;
  const offset = circumference - (pct / 100) * circumference;
  const color = passed ? 'var(--correct)' : 'var(--wrong)';

  let grade = '';
  if (pct >= 90) grade = 'Outstanding!';
  else if (pct >= 80) grade = 'Great job!';
  else if (pct >= 70) grade = 'You passed!';
  else if (pct >= 60) grade = 'Almost there';
  else grade = 'Keep studying';

  const wrongAnswers = state.answers.filter(a => !a.isCorrect);

  let reviewHtml = '';
  if (wrongAnswers.length > 0) {
    reviewHtml = `<div class="review-section"><h3>Review Incorrect Answers (${wrongAnswers.length})</h3>`;
    wrongAnswers.forEach(a => {
      const q = state.questions[a.qIndex];
      reviewHtml += `
        <div class="review-item was-wrong">
          <div class="review-q">Q${q.id}: ${q.question}</div>
          <div class="review-meta">
            <span class="review-your">Your answer: ${a.selected}. ${q.options[a.selected]}</span>
            <span class="review-correct-label">Correct: ${a.correct}. ${q.options[a.correct]}</span>
          </div>
        </div>`;
    });
    reviewHtml += '</div>';
  }

  app.innerHTML = `
    <div class="results">
      <div class="results-circle">
        <svg width="180" height="180" viewBox="0 0 180 180">
          <circle cx="90" cy="90" r="78" stroke="var(--border)" stroke-width="8" fill="none"/>
          <circle cx="90" cy="90" r="78" stroke="${color}" stroke-width="8" fill="none"
            stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
            stroke-linecap="round" style="transition: stroke-dashoffset 1s ease"/>
        </svg>
        <div class="pct-text">
          <span class="pct-number" style="color:${color}">${pct}%</span>
          <span class="pct-label">${passed ? 'PASS' : 'FAIL'}</span>
        </div>
      </div>
      <h2>${grade}</h2>
      <p class="subtitle">You answered ${state.score} out of ${total} correctly</p>
      <div class="stat-grid">
        <div class="stat-card green">
          <div class="val">${state.score}</div>
          <div class="lbl">Correct</div>
        </div>
        <div class="stat-card red">
          <div class="val">${state.wrong}</div>
          <div class="lbl">Incorrect</div>
        </div>
        <div class="stat-card gold">
          <div class="val">${pct}%</div>
          <div class="lbl">Score</div>
        </div>
      </div>
      <div class="results-actions">
        <button class="btn btn-secondary" onclick="state.screen='start';render()">New Exam</button>
        <button class="btn btn-primary" onclick="startQuiz()">Retry</button>
      </div>
      ${reviewHtml}
    </div>
  `;
}

render();
</script>
</body>
</html>
