:"To ensure that security incidents are ignored and not reported","C":"To provide a clear and consistent process for handling security incidents and minimizing their impact","D":"To reduce the frequency of security audits and assessments"},"correct":"C","explanation":"A documented incident response plan is a best practice because it provides a clear and consistent process for handling security incidents. This plan outlines the steps to be taken when a security incident occurs, ensuring that the incident is effectively managed and the necessary actions are taken to mitigate the problem and minimize its impact (see ISC2 Study Guide, Chapter 5, Module 3). For example, if an organization discovers a data breach, a well-documented incident response plan would guid"},{"id":438,"question":"What is the PRIMARY goal of enforcing defense in depth?","options":{"A":"Guarantee that no cyberattacks will occur","B":"Replace outdated security measures with more advanced ones","C":"Prevent or deter a cyberattack using multiple layers of security measures","D":"Make the organization's network impenetrable to attacks"},"correct":"C","explanation":"200 | P a g e Defense in depth is a strategy that employs a series of defensive mechanisms so that if one security control fails, another will be in place to block or limit the attack (see ISC2 Study Guide Chapter 3, Module 1). Overall, the goal of defense in depth is to prevent or deter a cyberattack using multiple layers of security measures. For example, an organization might have a firewall to block unauthorized access, encryption to protect sensitive data, and intrusion detection systems to"},{"id":439,"question":"What are the six components in the data lifecycle?","options":{"A":"Create, Store, Use, Share, Archive, Delete","B":"Create, Save, Use, Share, Archive, Destroy","C":"Create, Store, Utilize, Share, Archive, Destroy","D":"Create, Store, Use, Share, Archive, Destroy"},"correct":"D","explanation":"The six components of the data lifecycle are create, store, use, share, archive, and destroy (see ISC2 Study Guide, Chapter 5, Module 1). For example, when a document is created in an organization, it is stored in a secure location. The document is used for its intended purpose and may be shared with others who need access to it. When the document is no longer in active use, it is archived for possible future reference. Finally, when the document is no longer needed, even for archival purposes, "},{"id":441,"question":"What should be the primary consideration when deciding whether to install biometric scanners on all of the organization's doors or only some of them?","options":{"A":"The results of a site assessment","B":"The function of the work area","C":"The number of doors in the building","D":"The popularity of biometric scanners"},"correct":"A","explanation":"A site assessment will consider factors such as the sensitivity of the information or resources protected by each door, the cost of the scanners, and the impact on employees and operations (see ISC2 Study Guide Chapter 3, Module 1). The result of such site assessment should be the primary consideration when deciding whether to install biometric scanners on all of the organization's doors. For example, an organization may conduct a site assessment and determine that biometric scanners are needed "},{"id":442,"question":"Which of the following is an example of an invasion of privacy?","options":{"A":"A doctor discussing patient information without consent","B":"Reading a blog post","C":"Anonymous medical survey research","D":"A company accessing a database of another company"},"correct":"A","explanation":"An invasion of privacy is the unauthorized or unwanted access to or use of a person's personal information (see ISC2 Study Guide, Chapter 1, Module 1). A physician discussing patient information without consent is an invasion of privacy. There is no improper or unwanted access to or use of personal information in anonymous medical surveys. Because a blog post is publicly available, access to that information does not require authorization. Accessing another company's database does not specifical"},{"id":443,"question":"Non-repudiation is \u2026:","options":{"A":"\u2026 the protection against an individual falsely denying having performed a particular action","B":"\u2026 a law with multinational implications","C":"\u2026 the right of an individual to control the distribution of information about themselves","D":"\u2026 ensuring that protective security measures are in place"},"correct":"A","explanation":"Non-repudiation is a security concept that ensures that someone cannot deny the authenticity or origin of a communication, transaction or action they have performed. It provides evidence that the claimed party actually performed the action and prevents them from denying their involvement. Non- repudiation is often achieved through the use of digital signatures, timestamps and audit trails, which provide evidence that can be used to prove the authenticity and integrity of a transaction or communi"},{"id":444,"question":"Which is not an example of biometric data?","options":{"A":"Fingerprint identifiers","B":"Retinal identifiers","C":"Keystroke dynamics identifiers","D":"Credit history identifiers"},"correct":"D","explanation":"Credit history identifiers are not an example of biometrics. In fact, biometrics refers to unique, measurable characteristics of an individual that can be used for automatic recognition, such as 203 | P a g e fingerprints, retinal patterns, and keystroke dynamics (see the ISC2 Study Guide, Chapter 3, Module 2). For example, an organization may use fingerprint scanners to control access to secure areas. When an employee places his or her finger on the scanner, the system compares the scanned fing"},{"id":445,"question":"The Bell-LaPadula model has a PRIMARY goal to: \u2026?","options":{"A":"Ensure that all network communications are encrypted.","B":"Protect computers from viruses and malware","C":"Make sure only the owner of a file can access it","D":"Prevent the unauthorized sharing of classified information"},"correct":"D","explanation":"The primary goal of the Bell-LaPadula model is to prevent the unauthorized disclosure of classified information. The Bell-LaPadula model is a state machine that enforces access control in government and military applications. The model is based on the concept of secure states and state transitions. A system is in a secure state when no subject can access an object in a manner that violates the security policy. State transitions are defined by a set of rules that determine how subjects and object"},{"id":446,"question":"When implementing authentication, which of the following is considered a best practice?","options":{"A":"Use two or more authentication methods, such as password, biometrics, and a pin code","B":"Use three authentication methods such as username, a password, and a biometrics","C":"Use only one method of authentication","D":"Use two authentication methods, such as username and password"},"correct":"A","explanation":"204 | P a g e The best practice for implementing authentication is to use two or more authentication methods, such as passwords, biometrics and pin codes (see ISC2 Study Guide, Chapter 1, Module 1). This provides an extra layer of security and reduces the risk of unauthorized access. For example, consider an organization's access control system. When a user attempts to authenticate, they are required to provide both their fingerprint scan (biometrics) and a PIN code. By combining these two authe"},{"id":447,"question":"Why do organizations classify their information?","options":{"A":"To increase the access to the information","B":"To help employees search for information","C":"To restrict the access to the information","D":"To avoid ransomware attacks"},"correct":"C","explanation":"Organizations classify their information to restrict access to it (see ISC2 Study Guide, Chapter 5, Module 1). This is a critical part of information security because it ensures that only authorized individuals have access to sensitive data. For example, an organization may classify certain financial documents as \"confidential,\" meaning that only certain individuals within the organization can access them. The other options do not accurately describe why organizations classify their information."},{"id":449,"question":"What is a PRIMARY consideration when choosing physical access controls?","options":{"A":"Security of the network","B":"Security of the equipment","C":"Security of the personnel","D":"Security of the building"},"correct":"C","explanation":"The primary consideration when selecting physical access controls should be the security of personnel. While the security of the building, equipment, and network are also important, the security of personnel is paramount (see the ISC2 Study Guide, Chapter 3, Module 2). Physical access controls, such as locks, security cameras, and security personnel, are designed to protect both people and assets. For example, an organization may install security cameras and employ security personnel to monitor "},{"id":450,"question":"What is an endpoint in a network?","options":{"A":"The center of a network communications link","B":"The beginning of a network communications link","C":"The ends of a network communications link","D":"The beginning and end of a network communications link"},"correct":"C","explanation":"Endpoints are the ends of a network communication link. One end is often a server where a resource resides and the other end is often a client making a request to use a network resource. (see ISC2 Study Guide, Chapter 4, Module 1). In the context of computer networks, an endpoint can be any device connected to the network that is not a network device (i.e., not part of the network infrastructure). This can include desktops, laptops, smartphones, tablets, and servers. These devices are often the "},{"id":451,"question":"In a data center, what is NOT a typical issue related to airflow?","options":{"A":"Noise","B":"Dust","C":"Cooling","D":"Noxious fumes"},"correct":"A","explanation":"Noise is not typically an issue related to airflow in a data center (see ISC2 Study Guide, Chapter 4, Module 3). While noise can be an issue in a data center, it is typically related to equipment operation and not directly related to airflow. For example, servers and other hardware may generate noise during operation, but this is not caused by airflow. All of the other options are potential problems related to airflow in a data center. Cooling is a major concern because inadequate airflow can le"},{"id":452,"question":"Which of the following is NOT an example of a cyber attack?","options":{"A":"Malware infection","B":"Data breach","C":"Denial of Service","D":"Social engineering"},"correct":"B","explanation":"A data breach is not a cyber attack, but the result of a successful cyber attack. A data breach occurs when an unauthorized user gains access to confidential or sensitive information, such as customer data, financial records, or intellectual property (see the ISC2 Study Guide Chapter 4, Module 2)."},{"id":453,"question":"207 | P a g e What is the PRIMARY goal of a spoofing attack?","options":{"A":"Insert a program into a system to alter data","B":"Misdirect users to malicious websites","C":"Consume network resources and prevent legitimate activity","D":"To gain access to a target system by using a false identity"},"correct":"D","explanation":"The primary goal of a spoofing attack is to gain access to a target system by using a false identity (see ISC2 Study Guide, Chapter 4, Module 2). In spoofing attacks, an attacker pretends to be a trusted device or user on a network in order to launch attacks against network hosts, steal data, or bypass access controls. Spoofing attacks can take different forms, such as IP packet spoofing, email spoofing, or even caller ID spoofing. While spoofing can be used in conjunction with other attacks, no"},{"id":455,"question":"Which ISC2 Code of Ethics Canon focuses on a security analyst's responsibility to prevent harm and maintain public well-being?","options":{"A":"Protect society, the common good, necessary public trust and confidence, and the infrastructure","B":"Provide diligent and competent service to principals 208 | P a g e","C":"Advance and protect the profession","D":"Act honorably, honestly, justly, responsibly, and legally"},"correct":"A","explanation":"Protect society, the common good, necessary public trust and confidence, and the infrastructure (see ISC2 Study Guide Chapter 1, Module 5). This Canon emphasizes a security analyst's duty to avoid harm and uphold public well-being by protecting society, the common good, necessary public trust and confidence, and the infrastructure. Other options, rather than societal protection, stress ethical and legal behavior, on service to employers or clients, and on enhancing the profession's reputation an"},{"id":456,"question":"What term describes the activities that must be performed to ensure the incident is properly handled?","options":{"A":"Incident Management","B":"Incident Investigation","C":"Incident Solution","D":"Incident Response"},"correct":"D","explanation":"Incident response refers to the activities that must be performed to ensure that a security incident is properly addressed. These activities typically include preparation, detection and analysis, containment, remediation, recovery, and post-incident activities such as lessons learned and reporting (see ISC2 Study Guide Chapter 2, Module 1). For example, if a company's network is breached, the incident response team would follow a predefined plan to identify the breach, contain the damage, fix th"},{"id":457,"question":"Which of the following is NOT a common indicator for side-channel attack?","options":{"A":"Timing analysis","B":"Performance monitoring","C":"Packet analysis","D":"Fault analysis"},"correct":"C","explanation":"Packet analysis is not a common indicator of a side-channel attack. Side-channel attacks are typically characterized by gaining information from the physical implementation of a system, such as through performance monitoring, timing analysis, and fault analysis (see ISC2 Study Guide, Chapter 4, Module 3). Packet analysis, on the other hand, involves examining network traffic data, or \"packets,\" to diagnose network performance problems or investigate security incidents. While it is a valuable too"},{"id":458,"question":"Which of the following is TRUE about Denial of Service (DoS)?","options":{"A":"It is a type of attack used to bypass authentication","B":"It is a type of attack used to prevent encryption","C":"It is a type of attack used to gain access to a system","D":"It is a type of attack used to disrupt normal operations"},"correct":"D","explanation":"A Denial of Service (DoS) attack is a cyber attack in which the perpetrator attempts to make a machine or network resource unavailable to its intended users by temporarily or indefinitely disrupting the services of a host connected to the Internet (see ISC2 Study Guide, Chapter 4, Module 2). For example, an \\attacker could saturate the target machine with external communication requests, making it unable to respond to legitimate traffic or making it respond so slowly that it becomes unavailable."},{"id":459,"question":"Which method involves writing multiple patterns across all storage media?","options":{"A":"Deleting","B":"Destroying","C":"Overwriting","D":"Purging"},"correct":"C","explanation":"Overwriting involves writing multiple patterns across all storage media (see ISC2 Study Guide, Chapter 5, Module 1). This method ensures that the original data cannot be recovered. For example, if an organization wants to repurpose a hard drive, they can overwrite the drive with multiple data patterns to ensure that the original data is completely erased and cannot be recovered. The other options are methods of media sanitization, but none involves writing multiple patterns across all storage me"},{"id":460,"question":"What role does a hub play in a network?","options":{"A":"Filter data traffic based on a set of rules","B":"Control the flow of network traffic","C":"Connect multiple devices on a network","D":"Provide information to other networked computers"},"correct":"C","explanation":"The role of a hub in a network is to connect multiple devices (see ISC2 Study Guide, Chapter 4, Module 1). It serves as a common connection point for devices on a network, receiving incoming data packets and forwarding them to all other connected devices. For example, in a small office network, a hub might be used to connect all the computers so that they can communicate and share resources. Hubs do not control the flow of network traffic or filter traffic based on a set of rules; these function"},{"id":461,"question":"What does Configuration Management guarantee?","options":{"A":"That any changes made to a system are unauthorized and invalidated","B":"That all changes made to a system are authorized and invalidated","C":"That all changes made to a system are authorized and validated","D":"That all changes to a system are unauthorized and validated"},"correct":"C","explanation":"Configuration management ensures that all changes made to a system are authorized and validated (see ISC2 Study Guide, Chapter 5, Module 2). For example, when a software update is proposed for a system, Configuration Management ensures that the update is approved and tested to confirm that it works as expected and does not introduce new vulnerabilities. The remaining options do not accurately represent what Configuration Management guarantees. Suggesting that changes are unauthorized is contrary"},{"id":462,"question":"What does SaaS offer consumers?","options":{"A":"Access to security components","B":"Access to software applications","C":"Access to hardware components","D":"Access to network components"},"correct":"B","explanation":"Software as a Service (SaaS) provides consumers with access to software applications (see ISC2 Study Guide, Chapter 4, Module 3). SaaS is a cloud computing model in which a third-party provider hosts applications and makes them available to customers over the Internet. For example, Google Docs is a SaaS offering that allows users to create and edit documents online without installing software on their local devices. The other options do not accurately describe what SaaS provides to consumers. Ac"},{"id":464,"question":"What is the primary purpose of a Business Continuity Plan (BCP)?","options":{"A":"Preserve business operations while recovering from a significant disruption","B":"Supply customer service staff with alternate working areas","C":"Identify the dependencies of consumer billing inquiries and revenue","D":"Guarantee the confidentiality, integrity, and authentication of information"},"correct":"A","explanation":"The primary purpose of a business continuity plan is to maintain business operations while recovering from a significant disruption. A business continuity plan outlines the procedures and instructions an organization must follow in the face of such disasters; it covers business processes, assets, human resources, business partners, and more (see ISC2 Study Guide Chapter 2, Module 2)."},{"id":465,"question":"What is Role-based Access Control (RBAC)?","options":{"A":"An access control based on user permissions set according to roles","B":"An access control that only allows access to certain roles","C":"An access control that requires biometric verification","D":"An access control based on job descriptions"},"correct":"A","explanation":"Role-Based Access Control (RBAC) is best defined as an access control system in which user permissions are set according to roles (see ISC2 Study Guide, Chapter 3, Module 3). In an RBAC model, roles are created based on job functions and responsibilities, and users are assigned roles that give them the permissions they need to perform their jobs. 213 | P a g e For example, in a hospital, a nurse might have different roles and access rights than a doctor or an administrator."},{"id":466,"question":"In the incident response process, who is NOT typically involved in forensic investigations? (\u2605)","options":{"A":"Cybersecurity analysts","B":"Network architects","C":"Sales Personnel","D":"Receptionist"},"correct":"C","explanation":"Sales personnel are generally not involved in the direct process of forensic investigations. Forensic investigations in cybersecurity require a detailed examination and analysis of digital evidence to support or disprove a hypothesis, usually in the context of a cybercrime or incident. For example, in the event of a data breach, cybersecurity analysts are often the first responders to security incidents, and then network architects may be called to report on the integrity and security of the net"},{"id":467,"question":"In the context of change management, what is a security baseline?","options":{"A":"A process for requesting changes to a baseline","B":"A minimum level of protection that can be used as a reference point","C":"A regression and validation process","D":"A maximum level of protection that can be used as a reference point"},"correct":"B","explanation":"In change management, a security baseline is a minimum level of protection that can be used as a reference point (see ISC2 Study Guide, Chapter 5, Module 2). For example, a security baseline might specify the minimum requirements for firewall settings, password complexity, and patching frequency. Any changes to the system should not reduce the level of security below this baseline. The other options relate only to either the concept of a security baseline or to change management. A process for r"},{"id":468,"question":"214 | P a g e What is the purpose of a procedure?","options":{"A":"To provide specific step-by-step instructions to accomplish a task","B":"To instruct how to ensure compliance","C":"To provide a set of criteria to be met","D":"To enforce requirements and possibly carry penalties for non-compliance"},"correct":"A","explanation":"A procedure is a detailed guide that provides step-by-step instructions on how to perform a specific task or activity. It ensures that tasks are performed consistently and correctly and helps maintain standardization and quality control within an organization (ISC2 Study Guide, Chapter 1, Module 4). The other options are incorrect. While a procedure can help ensure compliance with policies and standards, its primary purpose is not to enforce compliance or to impose penalties for non- compliance."},{"id":469,"question":"In the context of business continuity planning (BCP), which of the following is an effective strategy for mitigating the risk of data loss?","options":{"A":"Regular backup of data and systems in multiple dispersed geographical locations","B":"Enforcing a robust cyber insurance policy","C":"Restricting employee access to business premises","D":"Periodic training on emergency procedures"},"correct":"A","explanation":"Regularly backing up data and systems to multiple, geographically dispersed locations is an effective strategy for mitigating the risk of data loss (see ISC2 Study Guide Chapter 2, Module 2). This strategy ensures that data is stored in multiple locations, providing a safety net in the event that one location is compromised. For example, an organization may store its data on servers located in different countries. Then, when a natural disaster destroys the data center where that server is locate"},{"id":470,"question":"Access controls are ...","options":{"A":"mechanisms that provide the highest level of access to all personnel","B":"mechanisms that grant appropriate access levels to authorized personnel and deny access to unauthorized ones","C":"mechanisms to secure the integrity of critical data","D":"mechanisms that always need to be implemented in pairs"},"correct":"B","explanation":"Access controls are mechanisms that grant appropriate access levels to authorized personnel and deny access to unauthorized ones. They are designed to prevent unauthorized access to systems, enable authorized users to access the resources they need and ensure the integrity and confidentiality of all data (see ISC2 Study Guide Chapter 3, Module 1). Consider, for example, in a company, an employee in the finance department would have access to financial records and systems. In contrast, an employe"},{"id":471,"question":"Who dictates the access controls rules in a Discretionary Access Control (DAC)?","options":{"A":"Only security administrators","B":"The subject who created the object","C":"The CEO or CISO of the company","D":"The last user who used the object"},"correct":"B","explanation":"In a Discretionary Access Control (DAC) model, the subject who created the object dictates the access control rules. This means that the owner of the information or resource has the discretion to determine who else can access it (see the ISC2 Study Guide, Chapter 3, Module 3). For example, in a file-sharing system that uses a DAC model, a user who creates a file can decide who else can view, edit, or delete the file. You might allow some users to view the file but not edit it, while other users "},{"id":472,"question":"What is ransomware?","options":{"A":"A type of computer virus that temporarily blocks access to data unless a ransom is paid","B":"A computer protocol that used to pay for the ransom of data","C":"A computer program that detects if your computer is infected with a virus","D":"A type of computer program that protects your computer from viruses"},"correct":"A","explanation":"A type of computer virus that temporarily blocks access to data unless a ransom is paid is called ransomware (see the ISC2 Study Guide, Chapter 4, Module 2). For example, a company may find its files systematically encrypted and a message pops up on the screen demanding a certain amount of money to restore the files. This deliberate form of malware may even scare users into paying the ransom with a countdown clock to create the desired psychological pressure. The remaining options are incorrect "},{"id":473,"question":"What are the two main options for a data center?","options":{"A":"Own or Outsource","B":"Own or Lease","C":"Lease or Outsource","D":"Lease or rent"},"correct":"A","explanation":"The two main options for a data center are own or outsource (see ISC2 Study Guide, Chapter 4, Module 3). Owning a data center means that the organization has complete control over the physical infrastructure and can tailor it to its needs. On the other hand, outsourcing involves using a third party to host the data center, which can provide cost savings and allow the organization to focus on its core business. The other options do not accurately represent the primary choices for a data center. W"},{"id":474,"question":"Which of the following is NOT commonly included in an Acceptable Use Policy (AUP)?","options":{"A":"Data access","B":"System access","C":"Internet usage","D":"Access to physical premisses"},"correct":"D","explanation":"Access to physical premises is not typically covered by an Acceptable Use Policy (AUP) (see ISC2 Study Guide, Chapter 5, Module 3). An AUP focuses primarily on the acceptable use of digital resources, such as data, systems, and Internet usage. For example, an AUP may state that employees should not use their work email for personal correspondence, or that company-owned devices should not be used for non-work related activities. It may also outline acceptable uses of the Internet during work hour"},{"id":475,"question":"Who controls access in a Mandatory Access Control (MAC) system?","options":{"A":"Only properly designated security administrators","B":"External auditors","C":"Any user with access to the system","D":"The CEO of the company"},"correct":"A","explanation":"In a Mandatory Access Control (MAC) system, security administrators are responsible for managing and controlling access. They are the ones who label subjects and objects within the system and determine access controls based on those labels (see the ISC2 Study Guide, Chapter 3, Module 3). The other options are incorrect. Any user (including the CEO) within the system does not have the authority to control access in a MAC environment. While external auditors may review the security controls, they "},{"id":476,"question":"What are the four cloud delivery models?","options":{"A":"Public, private, hybrid and enterprise","B":"Public, private, hybrid and individual","C":"Public, private, hybrid and government","D":"Public, private, hybrid and shared"},"correct":"D","explanation":"The four cloud delivery models are public, private, hybrid, and shared (see ISC2 Study Guide, Chapter 4, Module 3). Public clouds are available to the general public and are owned and operated by third-party cloud service providers. Private clouds are used exclusively by a single company or organization. Hybrid clouds combine public and private clouds, allowing data and applications to be shared between them. Shared clouds are used by multiple organizations that have similar needs and want to sh"},{"id":477,"question":"Which device determines the most efficient route for traffic flow on a network?","options":{"A":"Hub","B":"Firewall","C":"Router","D":"Switch"},"correct":"C","explanation":"The device that determines the most efficient route for traffic flow on a network is a router (see ISC2 Study Guide, Chapter 4, Module 1). Routers analyze the network topology and the state of the network links to determine the best path for data packets. For example, in a home network, the router directs incoming Internet traffic to the appropriate devices, such as your laptop or smartphone. The other options do not perform this function. A hub simply broadcasts incoming data to all connected d"},{"id":478,"question":"Which of the following is NOT a common component of a comprehensive Business Continuity Plan (BCP)?","options":{"A":"Multiple contact methods and a list of backup members","B":"Contact numbers for critical members of the supply chain","C":"Immediate response procedures and checklists","D":"How/Why to enact the plan"},"correct":"D","explanation":"How/Why to enact the plan\" is not a typical component of a comprehensive Business Continuity Plan (BCP). A well-structured BCP should include immediate response procedures and checklists that provide guidance on how to respond to business disruptions with the goal of minimizing the damage and downtime caused by the incident. It should also identify multiple points of contact and backup team members in case the primary members are unavailable. It should also include contact numbers for critical s"},{"id":480,"question":"What does a Privacy Policy typically stipulate?","options":{"A":"The proper locations to store personal belongings","B":"How to address a privacy breach","C":"Which information is considered personally identifiable information (PII)","D":"Which employees take care of data privacy"},"correct":"C","explanation":"A privacy policy typically defines what information is considered personally identifiable information (PII) (see ISC2 Study Guide, Chapter 5, Module 3). This policy outlines how an organization collects, uses, discloses, and manages a customer's or client's information, which includes defining what constitutes PII. For example, a privacy policy might state that an organization collects user information such as names, email addresses, and social security numbers, all of which are considered PII. "},{"id":481,"question":"In the context of incident response, the term that refers to the collection and preservation of an incident is: (\u2605)","options":{"A":"Evidence Collection","B":"Forensics Analysis","C":"Incident Preservation","D":"Incident Retention"},"correct":"A","explanation":"Evidence collection refers to the process of collecting and preserving evidence from a cybersecurity incident (see ISC2 Study Guide Chapter 2, Module 1). This process is critical to incident response because it helps determine the cause of the incident, identify the perpetrator, and support any legal proceedings that may arise. For example, in the event of a data breach, the response team would collect evidence such as log files, network traffic data, and system images and preserve them securely"},{"id":482,"question":"What is the difference between a standard and a regulation?","options":{"A":"Standards are optional and have no legal consequences, while regulations are legally binding and must be followed.","B":"Standards provide specific step-by-step instructions to achieve a task or process, while regulations are legally binding and must be followed","C":"Standards set criteria to be met, while regulations are legally binding and must be followed","D":"Standards are legally binding and must be followed, while regulations provide guidance on how to achieve a desired outcome"},"correct":"C","explanation":"Standards are guidelines or frameworks that provide best practices for achieving a specific outcome. They are typically developed by industry or professional organizations and are often voluntary, although they can become mandatory when adopted by specific industries or when incorporated into contracts or regulations. For example, ISO 27001 provides guidelines for implementing an information security management system. In specific industries, compliance to particular standards is mandatory by la"},{"id":483,"question":"What does a 'low sensitivity' label on data mean?","options":{"A":"Data compromise could result in loss of temporary competitive advantage","B":"Data compromise result in no harm","C":"Data compromise could result in significant loss of life","D":"Data compromise could cause minor disruption"},"correct":"D","explanation":"A 'low sensitivity' label on data means that compromising this data could cause a minor disruption (see ISC2 Study Guide, Chapter 5, Module 1). This data is not highly confidential or critical to the organization's operations. For example, a company's internal phone directory might be classified as \"low sensitivity\" because its unauthorized disclosure could cause some inconvenience but would not significantly harm the organization. Data whose compromise could result in significant loss of life o"},{"id":484,"question":"What is the recommended temperature range for optimized data center uptime and hardware life?","options":{"A":"50\u00b0F to 70\u00b0F (10\u00b0C to 21\u00b0C)","B":"72\u00b0F to 90\u00b0F (23\u00b0C to 32\u00b0C)","C":"64\u00b0F to 81\u00b0F (18\u00b0C to 27\u00b0C)","D":"60\u00b0F to 75\u00b0F (16\u00b0C to 24\u00b0C)"},"correct":"C","explanation":"The recommended temperature range for optimized data center uptime and hardware life is 18\u00b0C to 27\u00b0C (64\u00b0F to 81\u00b0F) (see ISC2 Study Guide, Chapter 4, Module 3). Maintaining this temperature range helps prevent overheating, which can lead to hardware failure and downtime. The other options do not accurately represent the recommended temperature range for a data center. A range of 50\u00b0F to 70\u00b0F (10\u00b0C to 21\u00b0C) is too cold and can lead to unnecessary energy consumption and potential hardware problems"},{"id":485,"question":"What is the FIRST activity in the Change Management components?","options":{"A":"Request for change","B":"Rollback the change","C":"Making the change","D":"Approval the change"},"correct":"A","explanation":"The Request for Change is a formal process that involves identifying the nature of the desired change and is the first activity in the Change Management Components (as described in the ISC2 Study Guide, Chapter 5, Module 3). For example, in a software development organization, a developer might identify a bug in the code that needs to be fixed. The developer would then initiate a change request, detailing the nature of the bug and the proposed solution. This request would then be reviewed and, i"},{"id":486,"question":"Which of the following options describes a possible enrollment process in a high-security environment?","options":{"A":"Issuing a badge and collect the employee's religious history for record keeping","B":"Issuing a badge and allow the employee to choose their own identifiers","C":"Issuing a badge and assign the employee a fixed location within the facility as an identifier","D":"Issuing a badge with the employee's credentials, possibly including biometrics"},"correct":"D","explanation":"In a high-security environment, the enrollment process often involves the issuance of a badge with the employee's identifiers and possibly biometric characteristics. This process ensures that the individual is uniquely identifiable and can be accurately authenticated by the access control system (see the ISC2 Study Guide, Chapter 3, Module 2). For example, an organization might issue an employee a badge that contains his or her photo, name, and a unique barcode or RFID chip. 224 | P a g e The ba"},{"id":487,"question":"What is the primary difference between DAC and MAC?","options":{"A":"The person who controls access (object owner in DAC, security administrators in MAC)","B":"The level of security they provide","C":"The technology they use","D":"The type of systems they are used on"},"correct":"A","explanation":"The primary distinction between Discretionary Access Control (DAC) and Mandatory Access Control (MAC) is who controls access. In DAC environments, access is controlled by the respective object owners, while in MAC environments, control is managed by designated security administrators (see the ISC2 Study Guide, Chapter 3, Module 3). Consider a document sharing system. In DAC settings, the person who creates a file can determine who can read or edit it. In contrast, in a MAC framework, such permis"},{"id":489,"question":"Which of the following is NOT a category of the incident response process?","options":{"A":"Detection","B":"Retention","C":"Containment","D":"Preparation"},"correct":"B","explanation":"Retention. An incident response process is a structured approach to addressing and managing the aftermath of a security breach or cyberattack (the incident). The process is designed to limit damage and reduce recovery time and costs. The components commonly found in an incident response plan are (in order): Preparation; Detection and Analysis; Containment, Remediation and Recovery; Post- Incident Activities (see ISC2 Study Guide Chapter 2, Module 1). Therefore, preparation, detection and contain"},{"id":490,"question":"Which of the following is a definition of phishing?","options":{"A":"An attack that attempts to gain access to a system using a false identity","B":"An attack that attempts to redirect legitimate users to malicious websites","C":"An attack that inserts a program into a system to alter data","D":"An attack that consumes network resources and prevents legitimate activity"},"correct":"B","explanation":"Of the options provided, the most appropriate definition for phishing is an attack that attempts to redirect legitimate users to malicious Web sites (see ISC2 Study Guide, Chapter 5, Module 3). Phishing is a form of social engineering where attackers pose as trusted entities to trick individuals into revealing sensitive information, often by directing them to fraudulent websites. The other options do not accurately define phishing. An attack that attempts to gain access to a system using a false"},{"id":491,"question":"What is the definition of a Risk?","options":{"A":"A possible event that can negatively impact the organization","B":"An exploitable weakness or flaw in a system or component","C":"A means by which a Threat Actor gains access to systems","D":"An individual or a group posing a threat"},"correct":"A","explanation":"A risk in cybersecurity refers to an event that, if it were to occur, could have negative consequences for an organization or system (see ISC2 Study Guide, Chapter 1, Module 2). For example, the potential risk to a banking system could be a cyber attack that breaches secure customer information, potentially resulting in financial loss and damage to the bank's reputation. Regarding the other options, an individual or group that poses a threat defines a threat actor\u2014but a threat actor only poses a"},{"id":493,"question":"Which of the following is NOT a type of attack that can be used to gain access to an organization's network?","options":{"A":"Brute force","B":"Password spray attack","C":"Rainbow table","D":"Denial of Service"},"correct":"D","explanation":"A denial of service (DoS) attack is not typically used to gain access to an organization's network. Instead, it is designed to disrupt the operation of the network by overwhelming it with traffic, making it unavailable to its intended users (see NIST SP 800-61 Rev. 2 under Denial of Service). The other options, on the other hand, are all methods that could potentially be used to gain unauthorized access to a network. A brute force attack involves systematically trying all possible combinations o"},{"id":495,"question":"Which of the following is NOT an ethical canon of the ISC2?","options":{"A":"Provide active and diligent service to principals","B":"Act honorably, honestly, justly, responsibly and legally","C":"Advance and protect the profession","D":"Protect society, the common good, necessary public trust and confidence, and the infrastructure"},"correct":"A","explanation":"In the code of ethics, we read \"Provide diligent and competent service to principals\", and not \"Provide active and qualified service to principals.\"; all the other options are valid canons of the code of ethics (see ISC2 Study Guide Chapter 1, Module 5)."},{"id":496,"question":"What is the PRIMARY objective of access control?","options":{"A":"To restrict access to information systems and data","B":"Protect data and systems from inside sources","C":"Safeguard data and systems from outside sources","D":"Grant the appropriate level of access to authorized personnel and processes"},"correct":"D","explanation":"The primary objective of access control is to grant the appropriate level of access to authorized individuals and processes. Access control is a security technique that regulates which users or applications can access or use resources in a computing environment (see the ISC2 Study Guide, Chapter 3, Module 1). Here is an example of access control in action. Consider an organization, an employee in the finance department would have access to financial records and systems, while an employee in the "},{"id":497,"question":"What are cloud-based resources?","options":{"A":"Any resources an organization accesses using personal computers","B":"Any resources that an organization accesses using cloud computing","C":"Any resources an organization accesses using local networks","D":"Any resources an organization accesses using physical servers"},"correct":"B","explanation":"Cloud-based resources are any resources that an organization accesses using cloud computing (see ISC2 Study Guide, Chapter 4, Module 3). This can include storage, applications, virtual machines, and more. For example, an organization might use a cloud-based customer relationship management (CRM) system to manage its customer data and interactions. The other options do not accurately define cloud-based resources. For the start, any resource that an organization accesses through physical servers i"},{"id":498,"question":"To monitor for potential hazards, what should NOT be integrated into the building control environment?","options":{"A":"HVAC failure detectors","B":"Fire alarms","C":"Smart Locks 230 | P a g e","D":"Water or gas leak detectors"},"correct":"C","explanation":"The option that should NOT be integrated into the building control environment is Smart Locks. Fire alarms, water or gas leak detectors, and HVAC failure detectors are all essential components of a building control environment. (see ISC2 Study Guide, Chapter 4, Module 3). For example, fire alarms can detect a fire early, allowing for quick evacuation and response. Water or gas leak detectors can warn of potential flooding or gas leaks, preventing damage to equipment and ensuring safety. HVAC fai"},{"id":499,"question":"What type of malware disguises itself as benign software but carries a malicious payload?","options":{"A":"Virus","B":"Trojan","C":"Worm","D":"Spyware"},"correct":"B","explanation":"A Trojan is a type of malware that disguises itself as benign software but carries a malicious payload (see ISC2 Study Guide, Chapter 4, Module 2). Named after the Trojan horse from Greek mythology, this type of malware tricks users into loading and running it on their systems, often by appearing to be a legitimate software program. None of the remaining options fit this description. A worm is a stand-alone piece of malware that replicates itself to spread to other computers, often without user "},{"id":500,"question":"A vulnerability is ...","options":{"A":"a means to gains access to systems","B":"possible event that can negatively impact the organization","C":"an individual or a group using an exploit to defeat protection","D":"an exploitable weakness or flaw in a system or component"},"correct":"D","explanation":"A vulnerability is a weakness or flaw in a system, network, or application that a threat actor can exploit to gain unauthorized access, disrupt operations, or perform other malicious activities. For example, a software flaw that allows an attacker to bypass authentication is a vulnerability (see ISC2 Study Guide, Chapter 1, Module 2). 231 | P a g e The other choices are wrong. Individuals or groups that use an exploit to bypass protection are threat actors, not vulnerabilities. A means of gainin"},{"id":501,"question":"Which is the PRIMARY objective of the principle of segregation of duties?","options":{"A":"To ensure that no one person should control an entire high-risk task from start to finish","B":"To ensure all employees are equally knowledgeable about all tasks","C":"To ensure all tasks are verified twice before completion","D":"To distribute high-risk tasks evenly among employees that should perform them"},"correct":"A","explanation":"Segregation of duties is a key principle in cybersecurity that ensures that no one person has control over an entire high-risk task from beginning to end. This principle is designed to prevent fraud and errors by requiring more than one person to complete a task (see the ISC2 Study Guide, Chapter 3, Module 1). For example, in a financial institution, one employee may be responsible for initiating a wire transfer, while another employee must approve the transaction. Segregation of duties also typ"},{"id":502,"question":"What types of cards can be used as a tool to grant access?","options":{"A":"Credit cards","B":"Smart cards","C":"Birthday cards","D":"Business cards"},"correct":"B","explanation":"Smart cards are a type of card that can be used to grant access. They are embedded with integrated circuits or a \"chip\" that can process data. This card, when paired with a card reader, can provide authentication, data storage, and application processing (see ISC2 Study Guide, Chapter 3, Module 2). For example, in a secure office environment, employees might be issued smart cards that they swipe at card readers to gain access to different parts of the building. 232 | P a g e"},{"id":503,"question":"What is the purpose of risk assessment?","options":{"A":"Identify and prioritize risks","B":"Analyze and prioritize risks","C":"Identify and eradicate risk","D":"Analyze and reduce risk"},"correct":"A","explanation":"The essential goal of cybersecurity risk assessment is to identify and prioritize risks (see the ISC2 Study Guide, Chapter 1, Module 2). This process involves identifying potential threats to an organization's systems and data, evaluating the potential impact and vulnerabilities, and prioritizing them according to their severity and the resources required to mitigate them. For example, a risk assessment may reveal that an aging server poses a significant risk of catastrophic system failure if it"},{"id":504,"question":"What does a 'highly restricted' label on data mean?","options":{"A":"Compromise could cause minor impacts","B":"Compromise could lead to loss of temporary competitive advantage","C":"Compromise could lead to substantial loss of life or property damage","D":"Compromise could cause minor disruptions"},"correct":"C","explanation":"The 'highly restricted' label on data indicates that the information is so critical that its compromise could have serious consequences (see ISC2 Study Guide, Chapter 5, Module 1). For example, data related to the operation of nuclear power plants or military defense systems would be 'highly restricted' because a breach could potentially result in loss of life or significant property damage. The other options do not accurately represent the severity of a 'severely restricted' data label. Both th"},{"id":505,"question":"Which of the following cloud models require the LEAST administration and support from the organization?","options":{"A":"Infrastructure as a Service (IaaS) 233 | P a g e","B":"Software Defined Networking (SDN)","C":"Software as a Service (SaaS)","D":"Platform as a Service (PaaS)"},"correct":"C","explanation":"Software as a Service (SaaS) is a cloud computing model that delivers applications over the Internet. In this model, the SaaS provider takes care of all the underlying infrastructure, including servers, storage, networking, and the software application itself. This means that the organization does not have to manage or support these elements (see ISC2 Study Guide, Chapter 4, Module 3). For example, an organization might use a SaaS solution such as Google Workspace or Microsoft 365, which provide"},{"id":506,"question":"What are the 'known' ports?","options":{"A":"Ports 1024 \u2013 49151","B":"Ports 49152 \u2013 65535","C":"Ports 80, 443, 65431","D":"Ports 0 \u2013 1023"},"correct":"D","explanation":"Known ports are those that range from 0 to 1023. These ports are assigned by the Internet Assigned Numbers Authority (IANA) and are typically used by system-level or root processes. Known ports are used by Internet Protocol Suite transport layer protocols, such as TCP and UDP (see ISC2 Study Guide, Chapter 4, Module 1). For example, port 80 is reserved for HTTP traffic and port 443 is reserved for HTTPS traffic. The other options are incorrect because they describe different ranges of ports. Por"},{"id":507,"question":"234 | P a g e Which of the following cloud models allows organizations to integrate their existing on- premises networks?","options":{"A":"Private cloud","B":"Public cloud","C":"Hybrid cloud","D":"Community cloud"},"correct":"C","explanation":"Hybrid cloud model allows an organization to integrate existing on-premises networks with cloud- based services, providing businesses with both the security of a private cloud and the computing power of a public cloud when needed (see ISC2 Study Guide, Chapter 4, Module 3). For example, consider a bank that has been running its IT infrastructure on-premises. This bank decides to start using a cloud-based AI tool for credit risk analysis, but it doesn't want to put sensitive customer data in the "},{"id":508,"question":"Which of the following best illustrates a shortened version of the IPV6 address 2003:0ab8:0000:0000:0000:eeee:0000:0001?","options":{"A":"2003:0ab8:0:eeee::1","B":"2003:ab8::eeee:0000:1","C":"2003:ab8::eeee:0:1","D":"2003:0ab8::eeee:0:0001"},"correct":"C","explanation":"In IPV6 addressing, leading zeros in a group can be omitted, and consecutive groups of zeros can be represented as '::'. However, '::' can only be used once in an address. Therefore, the IPV6 address '2003:0ab8:0000:0000:0000:eeee:0000:0001' can be shortened to '2003:ab8::eeee:0:1' (see ISC2 Study Guide, Chapter 4, Module 1). For example, if a network device has an IPV6 address of '2003:0ab8:0000:0000:0000:eeee:0000:0001', it can be represented in a more compact form as \"2003:ab8::eeee:0:1\". Thi"},{"id":509,"question":"What should be done if one person is unavailable during an emergency?","options":{"A":"Diligently assign a new decision maker to overcome the situation","B":"Call other people on the phone tree","C":"Use the due-care principle","D":"Contact the emergency services"},"correct":"B","explanation":"Careful designation of a new decision maker is the best approach in an emergency when one person is unavailable. This process ensures continuity and that critical decisions are made quickly and effectively (see the ISC2 Study Guide, Chapter 2, Module 2). An example of this process might be in a cybersecurity company, where if a chief security officer is unavailable during a data breach, the task can fall on the shoulders of the chief cybersecurity engineer or a similar role in the organization's"},{"id":510,"question":"What is the purpose of a policy?","options":{"A":"To enforce specific requirements for cybersecurity and can carry penalties for non-compliance","B":"To guide behavior, set standards, and ensure organizational compliance","C":"To provide specific step-by-step instructions to accomplish a task or process","D":"To provide a set of criteria to be met"},"correct":"B","explanation":"A policy is a set of principles that guide decisions and achieve rational outcomes. For example, an organization's cybersecurity policy would guide employee behavior regarding the use of technology and data, set standards for privacy, and ensure that the organization complies with relevant laws and regulations (ISC2 Study Guide, Chapter 1, Module 4). The other options are incorrect because they describe procedures, standards, and regulations, not policies. Procedures provide specific step-by-ste"},{"id":511,"question":"Which of the following is NOT a type of phishing attack?","options":{"A":"Tailgating","B":"Whaling attacks","C":"Vishing","D":"Spear phishing"},"correct":"A","explanation":"Tailgating, also known as piggybacking, is a physical security breach in which an unauthorized person follows an authorized person into a restricted area (see ISC2 Study Guide, Chapter 5, Module 4). For example, an intruder might tailgate an employee who uses his or her access card to enter a secure office building. This is not a type of phishing attack, which is a cyber-attack that tricks the target into revealing sensitive information such as passwords or credit card numbers. Whaling attacks, "},{"id":512,"question":"An employee received a suspicious text message with an unfamiliar invoice number and a hyperlink for more information. Which of the following attacks is MOST likely being described?","options":{"A":"Whaling","B":"Smishing","C":"Phishing","D":"Vishing"},"correct":"B","explanation":"Smishing is a social engineering attack that consists of sending fraudulent text messages to trick the recipient into divulging personal information. For example, a help desk employee might receive a bogus text message requesting immediate payment of a large and unfamiliar bill in order to trick the recipient into clicking on a hyperlink that may lead to a fraudulent Web site designed to capture their personal and financial information. In this scenario, the suspicious text message containing an"},{"id":513,"question":"The concept of data integrity refers to:","options":{"A":"Ensuring that data is available to multiple users simultaneously","B":"Ensuring that data is used only for ethical purposes","C":"Preventing the decryption of data","D":"Preventing data from being altered in an unintended manner"},"correct":"D","explanation":"Data integrity refers to ensuring that data is not altered or corrupted in an unintended or unauthorized manner (see the ISC2 Study Guide, Chapter 1, Module 1). For example, in a healthcare setting, data integrity ensures that a patient's medical records are accurately maintained and not altered without proper authorization. In a banking system, data integrity can ensure that the amount of money transferred from one account to another is accurate and not altered during the transaction process. E"},{"id":514,"question":"What term describes a potential malicious actor that may cause harm to an organization or its assets?","options":{"A":"Zero-Day","B":"Breach","C":"Vulnerability","D":"Threat"},"correct":"D","explanation":"In cybersecurity, a threat refers to a potential malicious actor or event that could cause harm to an organization or its assets (see ISC2 Study Guide, Chapter 2, Module 1). This actor or event could be an individual hacker, a group of cybercriminals, or even a natural disaster threatening the organization's digital infrastructure. The other options are related concepts in cybersecurity but do not describe a potential malicious actor. A breach is an incident where a threat successfully compromis"},{"id":515,"question":"What is ensured by an information security policy? (\u2605)","options":{"A":"The proper communication of the security posture of the organization","B":"The commitment of senior management to ensure that access to data is secure","C":"The correct handling of employee information on social networks","D":"That financial documents are securely backed up"},"correct":"B","explanation":"The primary function of the information security policy is to ensure senior management's commitment to secure data access. The policy describes the company's approach to information security management, emphasizes the company's commitment to protecting data, and outlines the role of employees in keeping data secure. For example, a software company's information security policy might establish guidelines for secure code development, access control to development environments, and data handling pr"},{"id":516,"question":"In a healthcare organization, which of the following would be an example of the principle of least privilege?","options":{"A":"All doctors have access to all patient data regardless of whether they are their assigned doctor","B":"Patients have the privilege to access other patients' data for comparison","C":"All healthcare workers can access all patient data to ensure efficient and premium service","D":"Healthcare workers can only access the assets they need for their role and nothing more"},"correct":"D","explanation":"The statement \"Healthcare workers can only access the assets they need to perform their roles and nothing more\" is an example of the principle of least privilege, which states that users should have only the minimum access necessary to perform their jobs (see the ISC2 Study Guide, Chapter 3, 239 | P a g e Module 1). For example, a nurse should only have access to the medical records of the patients she is currently treating, while a billing clerk should only have access to billing information. T"},{"id":517,"question":"Until the generators start up and stabilize, what do battery backups need to be properly sized to carry?","options":{"A":"The fire suppression load","B":"The HVAC load","C":"The network load","D":"The critical load"},"correct":"D","explanation":"Battery backups need to be adequately sized to carry the critical load until the generators start up and stabilize. The critical load refers to the power required to keep essential systems running, such as servers, storage devices, and network equipment (see ISC2 Study Guide, Chapter 4, Module 3). For instance, in a data center, if there is a power outage, the battery backups (also known as Uninterruptible Power Supply or UPS) should be able to provide sufficient power to keep the critical syste"},{"id":518,"question":"What should be included in the Business Continuity Plan (BCP) team members list?","options":{"A":"Notification systems and call trees","B":"Multiple contact methods and a list of backup members","C":"Contact numbers for critical members of the supply chain","D":"Immediate response procedures and checklists"},"correct":"B","explanation":"In the team member list of a Business Continuity Plan (BCP), it is critical to have multiple methods of contact and a list of back-up members (see ISC2 Study Guide Chapter 2, Module 2) 240 | P a g e to allow for accessible communication and contingency planning in case the initially assigned members become incapacitated or unavailable during an incident. Contact numbers for key members of the supply chain, while critical in the broader scope of the BCP, do not belong in the list of team members."},{"id":519,"question":"Which of the following options best describes the concept of a server?","options":{"A":"A computer that provides information to other computers on a network","B":"A device that filters traffic on a network","C":"The representation of the ends of a network communication link","D":"A standard that defines wired connections between networked devices"},"correct":"A","explanation":"A server is a computer or system that manages network resources and provides (or \"serves\") data to other computers, called clients, over a network (see ISC2 Study Guide, Chapter 4, Module 1). For example, a Web server hosts Web sites and makes their content available to users who request it. An e-mail server stores and manages e-mail for users on a network. When a user sends an e-mail message, it is first sent to the e-mail server, which then forwards the message to the recipient. The other opti"},{"id":520,"question":"Which of the following can be considered an administrative control in a data center?","options":{"A":"A policy, defining the rules that assign access to authorized individuals","B":"Access Control List, preventing access to data via the network","C":"Security dogs owned by the data center administration","D":"A barrier, providing a physical obstacle to data storage devices"},"correct":"A","explanation":"A policy defines the rules that assign access to authorized individuals. Administrative controls in a data center are typically non-technical measures used to manage and control access to data. They include policies, procedures, and guidelines that define who has access to data and under what 241 | P a g e conditions. For example, a policy might say that only network administrators can access certain servers, and only during certain hours (see the ISC2 Study Guide, Chapter 3, Module 1). The othe"},{"id":521,"question":"In a change management process, what is the purpose of Verification and Audit?","options":{"A":"Verify that newly applied changes don't break anything","B":"Identify the baseline of a system","C":"Provide a minimum level of protection to developers","D":"Request changes to a baseline"},"correct":"A","explanation":"Verification and audit in change management are processes that ensure that newly implemented changes have not broken the existing system or caused unintended consequences (see ISC2 Study Guide, Chapter 5, Module 2). For example, when a software update is applied to an organization's network, the verification and audit process would involve testing the network to ensure that it is still functioning as expected and that no new vulnerabilities have been introduced. The other options do not accurate"},{"id":522,"question":"In a data center, what do backup generators need to be sized for?","options":{"A":"The critical load and supporting infrastructure","B":"The fire suppression system and supporting infrastructure","C":"The HVAC system and supporting infrastructure","D":"The network and supporting infrastructure"},"correct":"A","explanation":"Backup generators in a data center must be sized for the critical load and supporting infrastructure because the primary function of backup generators is to provide power to critical 242 | P a g e systems and infrastructure in the event of a power outage (see ISC2 Study Guide, Chapter 4, Module 3). For example, suppose a data center hosts a critical application that must be available 24/7. In this case, the backup generators must be sized to support the servers running that application and the s"},{"id":523,"question":"What is the PRIMARY difference between an intrusion detection system (IDS) and an intrusion prevention system (IPS)?","options":{"A":"IDS is software-based, while IPS is hardware-based","B":"IPS can block network traffic, but IDS can't","C":"IPS is parallel to the traffic, while IDS is in-line","D":"IDS detects malware, but IPS doesn't"},"correct":"B","explanation":"An intrusion prevention system (IPS) has the ability to block or prevent malicious network traffic, while an intrusion detection system (IDS) can only detect and alert to the intrusion, but cannot take action to prevent it. For example, if a network is bombarded with a Distributed Denial of Service (DDoS) attack, an IPS can identify the malicious traffic and block it from entering the network, while an IDS would only detect and alert about the attack. The other options are incorrect for the foll"},{"id":525,"question":"What is the primary goal of Change Management in cybersecurity?","options":{"A":"Detect new vulnerabilities in the system","B":"Release software without introducing new vulnerabilities","C":"Create patches to correct vulnerabilities","D":"Ensure that all environments are free from vulnerabilities"},"correct":"B","explanation":"The primary goal of change management in cybersecurity is to release software without introducing new vulnerabilities (see ISC2 Study Guide, Chapter 5, Module 3). Change management is a systematic approach to managing all changes made to a system. Its primary goal is to ensure that changes are implemented in a controlled manner that minimizes the risk of introducing new vulnerabilities into the system. For example, when a software development team plans to release a new feature, it would follow "},{"id":526,"question":"In unified cloud storage, which solution can be used to separate access to patient records from administrative data without moving servers into different networks? 244 | P a g e","options":{"A":"Zero trust zone","B":"An intranet","C":"VLAN segmentation","D":"Screened subnet"},"correct":"C","explanation":"This solution allows the separation of network traffic without changing the physical layout of the network. For example, a healthcare organization could use VLAN segmentation to separate patient records (VLAN 1) from administrative data (VLAN 2). This ensures that each type of data is isolated and secure, preventing unauthorized access to sensitive patient information. The remaining options are not as effective at separating patient records from administrative data without moving servers to a di"},{"id":529,"question":"Which of the following would help an organization secure its network-critical server that is about to experience a significant power outage?","options":{"A":"Purchase cybersecurity insurance","B":"Perform a complete network upgrade","C":"Perform a server-to-cloud migration","D":"Install redundant power supplies"},"correct":"D","explanation":"Installing redundant power supplies would be the best option to maintain network functionality during a power outage. For example, if a server critical to network operations has a redundant power supply, it can continue to operate even if one power source fails, ensuring uninterrupted network operations. While a complete network upgrade or server-to-cloud migration could potentially improve the network's resilience to power outages, it would likely come at a significant cost, which is contrary t"},{"id":530,"question":"Why do many organizations find it challenging to maintain a separate test environment?","options":{"A":"Because it requires reliance on third-party vendor testing","B":"Because it presents logistical challenges 246 | P a g e","C":"Because it is unnecessary for change management","D":"Because it simplifies the rollback plan"},"correct":"B","explanation":"Maintaining a separate testing environment can be complex for many organizations because it requires additional resources such as hardware, software, and personnel. It also requires careful coordination and management to ensure that the test environment accurately mirrors the production environment (see ISC2 Study Guide, Chapter 5, Module 2). For example, an organization developing a new software application would need to set up a separate test environment to test the application before it is re"},{"id":531,"question":"Which of the following is typically NOT a member of an incident response team?","options":{"A":"PR representatives","B":"Legal representatives","C":"HR representatives","D":"Engineering representatives"},"correct":"C","explanation":"In the context of an incident response team, the primary focus is on managing and mitigating a security incident, typically involving representatives from IT, legal, communications, and executive management, each bringing their unique expertise to the table (see the ISC2 Study Guide, Chapter 2, Module 1). For example, IT and engineering representatives would handle the technical aspects of the incident, such as identifying the breach and implementing measures to contain it. Legal representatives"},{"id":532,"question":"What is the PRIMARY objective of Crime Prevention through Environmental Design (CPTED)?","options":{"A":"Create safer workspaces through green design elements","B":"Decreasing cyber-crime though appropriate corporate green policies","C":"Using the latest green data center technologies to improve cyber-security","D":"Create safer workspaces through passive design elements"},"correct":"D","explanation":"247 | P a g e Crime Prevention through Environmental Design (CPTED) is a multidisciplinary approach to deterring criminal behavior through environmental design. It includes strategies such as improving lighting, landscaping, and building design to reduce opportunities for crime (see ISC2 Study Guide, Chapter 3, Module 2). For example, improving lighting in dark areas such as sidewalks or parking lots can deter potential criminals who prefer to operate in the shadows. The remaining options mentio"},{"id":533,"question":"Which of the following statements is TRUE about ransomware?","options":{"A":"It encrypts the victim's data and demands payment to decrypt it","B":"It is a type of software that is installed with the user's permission","C":"It doesn't encrypt files, it deletes them","D":"It only affects Windows computers"},"correct":"A","explanation":"Ransomware is a type of malicious software that encrypts the victim's data and then demands a ransom, usually in the form of a cryptocurrency such as bitcoin, to restore access to the data (see ISC2 Study Guide, Chapter 4, Module 2). The attacker will provide a decryption key once the ransom is paid, although there's no guarantee that they will do so. For example, the 2017 WannaCry ransomware attack encrypted data on infected systems and demanded a ransom payment in Bitcoin to decrypt the data. "},{"id":535,"question":"Why might users be uncomfortable when using biometrics as an authentication method?","options":{"A":"They could be considered an invasion of privacy","B":"They are not always 100% accurate","C":"They are less secure than other authentication methods","D":"They are easy to bypass"},"correct":"A","explanation":"Biometric authentication methods could be considered an invasion of privacy because they involve collecting and using personal biological data. This can elicit discomfort or concern among some individuals owing to potential misuse or unauthorized access to their personal data (see ISC2 Study Guide, Chapter 3, Module 2). For example, an individual using biometric authentication to unlock their smartphone might be uncomfortable with the idea that their facial recognition data is stored somewhere w"},{"id":536,"question":"What are some examples of physical access controls? 249 | P a g e","options":{"A":"Employee training programs and background checks","B":"Encrypted data and firewalls","C":"Fences, locks, security guards, badges, and alarms","D":"Passwords and PINs"},"correct":"C","explanation":"Fences, locks, security guards, badges, and alarms are all examples of physical access controls, which are measures taken to prevent unauthorized physical access to a facility, resource, or information(see ISC2 Study Guide, Chapter 3, Module 2). For example, an organization might use security guards and badges to control who can enter its building, and locks to secure sensitive areas within the building. Alarms can alert security personnel to unauthorized access attempts. The other options are i"},{"id":537,"question":"What are three common methods of authentication?","options":{"A":"Passwords, Smart Cards, and retina scans","B":"Passwords, Memory Cards, and Smart Cards","C":"Passwords, Tokens, and voice fingerprinting","D":"Passwords, Tokens, and Biometrics"},"correct":"D","explanation":"Authentication is the process of verifying the identity of a user or system, which is a critical step before granting access to a network or system (see the ISC2 Study Guide, Chapter 1, Module 1). Common authentication methods include passwords, tokens, and biometrics. For example, when you log into your online banking account, you are authenticated by entering your username and password. You may also be asked to enter a one-time password (OTP) that is sent to your mobile device\u2014an example of to"},{"id":538,"question":"250 | P a g e What is one requirement of PCI DSS regarding credit card data?","options":{"A":"Credit card data should be pseudonymized and segregated into another database","B":"Credit card data should be classified as confidential and encrypted","C":"No employee can ever see unmasked credit card data of a data subject","D":"Credit card data is retained for shorter periods than any other data"},"correct":"B","explanation":"According to the Payment Card Industry Data Security Standard (PCI DSS), credit card data should be considered confidential and encrypted (see ISC2 Study Guide, Chapter 5, Module 3). This means that any sensitive cardholder data, such as card numbers, must be protected with strong encryption methods when stored or transmitted over public networks. For example, an e-commerce company must use strong encryption methods to protect customer credit card information when it is stored in its databases a"},{"id":539,"question":"What is the term used to verify or prove the user\u2019s identity?","options":{"A":"Authorization","B":"Validation","C":"Authentication","D":"Verification"},"correct":"C","explanation":"Authentication is the process of verifying or proving a user's identity (see the ISC2 Study Guide, Chapter 1, Module 1). Authentication typically involves the user providing credentials such as a username and password, a biometric scan, or a security token. For example, when you log in to your e-mail account, you authenticate your identity by providing your user name and password. The remaining options, while related, do not accurately describe the process of verifying a user's identity. Verific"},{"id":540,"question":"What is the primary benefit of using a rule-based access control (RuBAC) model? (\u2605)","options":{"A":"It enables the creator of the object to dictate access","B":"Allows the last user to determine access","C":"It provides dynamic access control based on pre-defined rules","D":"Allows the CEO or CISO to have ultimate control"},"correct":"C","explanation":"Rule-based access control (RuBAC) provides dynamic access control based on predefined rules. The RuBAC model is implemented with system-level preconditions that dictate which users are granted access to certain aspects of the system. An example of this would be an organization that implements a rule that only Human Resources employees can access employee personal information during business hours. The other options are incorrect for the following reasons. Suggesting that the CEO or CISO would ha"},{"id":541,"question":"What is the PRIMARY difference between qualitative and quantitative risk analysis?","options":{"A":"Qualitative risk analysis is based on subjective data, while quantitative risk analysis is based on numerical data","B":"Qualitative risk analysis is based on numerical data, while quantitative risk analysis is based on subjective data","C":"Qualitative risk analysis is based on objective data, while quantitative risk analysis is based on numerical data","D":"Qualitative risk analysis is based on numerical data, while quantitative risk analysis is based on objective data"},"correct":"A","explanation":"The primary difference between qualitative and quantitative risk analysis is in the nature and treatment of the data used (see the ISC2 Study Guide, Chapter 1, Module 2). 252 | P a g e Qualitative risk analysis is less precise and relies on subjective data such as expert judgment, perceptions and opinions. For example, questionnaires may be used to measure employee awareness of a potential cyber attack. The remaining options are wrong. The key point is how \"subjective\" or judgment-based data sho"},{"id":542,"question":"What are the three main concepts of access control?","options":{"A":"Confidentiality, Integrity, and Availability","B":"Managers, Subjects, Data","C":"Objects, Rules, Subjects","D":"Topics, Objects, Rules"},"correct":"C","explanation":"In the context of access control, an 'object' is the data or resource that is to be protected, a 'subject' is the entity (usually a user or process) that seeks access to the object, and 'rules' are the policies that determine how subjects can interact with objects. For instance, in a company's database, the 'object' could be a confidential file, the 'subject' could be an employee, and the 'rule' could be that only certain employees (like managers) can access the file (see the ISC2 Study Guide, C"},{"id":543,"question":"Which of the following is a technique used to protect the confidentiality of data?","options":{"A":"Digital Signatures","B":"Hashing","C":"Encryption","D":"Tokenization"},"correct":"C","explanation":"Encryption is a method used to protect the confidentiality of data by converting it into a format that can only be read by those with the appropriate decryption key (see the ISC2 Study Guide, Chapter 1, Module 1). For example, if a user sends an encrypted e-mail message, only the recipient with the correct key can decrypt and read the message, ensuring the confidentiality of the information. 253 | P a g e The other options are not correct. Digital signatures are used to verify the authenticity a"},{"id":544,"question":"Which type of fire suppression system is better for electronics but can be toxic to humans? (\u2605)","options":{"A":"Foam-based","B":"Dry chemical based","C":"Water-based","D":"Gas-based"},"correct":"D","explanation":"Gas-based fire suppression systems are better for electronics but can be toxic to humans. These systems use gases such as Inergen, FM-200, or Novec 1230, which are designed to suppress fires without damaging electronic equipment. However, these gases can be harmful or even lethal to humans when present in high concentrations. In a data center, for example, a gas-based fire suppression system could quickly extinguish a fire without damaging the servers, but personnel would have to evacuate the ar"},{"id":545,"question":"Which cannon of the ISC2 Code of Ethics is specifically designed to prioritize the welfare and trust of the broader public?","options":{"A":"Act honorably, honestly, justly, responsibly, and legally","B":"Provide diligent and competent service to principals","C":"Advance and protect the profession","D":"Protect society, the common good, necessary public trust and confidence, and the infrastructure"},"correct":"D","explanation":"The cannon \"Protect society, the common good, necessary public trust and confidence, and the infrastructure\" is primarily aimed at the general public as it underscores t
