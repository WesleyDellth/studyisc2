ion","D":"Authentication"},"correct":"C","explanation":"Non-repudiation refers to the principle that a message sender cannot deny sending a message or altering its content after sending it (see ISC2 Study Guide, Module 1, under Non-repudiation). Integrity ensures that the message has not been tampered with or altered during transit but does not provide proof of the sender's identity. Authentication, on the other hand, refers to the process of validating the identity of a user, system, or device\u2014it is the act of confirming a claim of identity. Authori"},{"id":228,"question":"Which access control model is more flexible and scalable between Mandatory Access Control (MAC)l and Discretionary Access Control (DAC)?","options":{"A":"MAC, for compartmentalization and scalability by adding more compartments","B":"MAC, for its scalability and flexibility by adding more labels","C":"DAC, for centralized decision-making, quick responses, and scalability by reducing required decisions while providing flexibility","D":"DAC, for enabling individual administrators to make decisions and achieve scalability and flexibility"},"correct":"D","explanation":"Discretionary Access Control (DAC) is generally considered to be more flexible and scalable than Mandatory Access Control (MAC) because it allows individual administrators to make decisions and achieve scalability and flexibility (see ISC2 Study Guide, Module 3, under Logical Access Controls)."},{"id":229,"question":"Which one of the following security principles is PRIMARILY at risk when a device is lost or stolen?","options":{"A":"Authentication","B":"Integrity","C":"Confidentiality 103 | P a g e","D":"Non-repudiation"},"correct":"C","explanation":"When a device is lost or stolen, unauthorized users may directly access sensitive data stored on the device. Therefore, the primary security principle at risk is confidentiality (see ISC2 Study Guide, Module 1, under CIA Deep Dive). In some instances, unauthorized users could also try to compromise integrity but this would not be the primary concern by comparison with confidentiality. In both scenarios, the unauthorized users would be bypassing authentication mechanisms, thus avoiding identity v"},{"id":230,"question":"What process should the company undertake to verify that an employee has the necessary privileges, considering their roles in HR, payroll, and customer service?","options":{"A":"Account review","B":"Privilege creep","C":"Account revocation","D":"Re-provisioning"},"correct":"A","explanation":"Account review is a process used to verify that employees have the necessary privileges considering their roles within the organization (see ISC2 Study Guide, Module 1, under Privileged Access Management). It involves periodically reviewing the permissions granted to each user account and ensuring they are still relevant and necessary. This process can help prevent privilege creep, the gradual accumulation of access privileges beyond what is required for an employee's current job responsibilitie"},{"id":231,"question":"Which of the following best describes the PRIMARY goal of Security Awareness activities within an organization?","options":{"A":"Focus just on complex security workflows.","B":"Build proficiency in a specific set of security skills or actions.","C":"Improve the understanding of security principles and their application in various situations.","D":"Attract attention to security issues and concerns"},"correct":"D","explanation":"Security Awareness activities aim to capture the attention of individuals in an organization, making them conscious of security issues or concerns (ISC2 Study Guide, Chapter 5, Module 4). The primary goal of security awareness activities is to raise awareness of security issues and concerns, not to build proficiency in a specific set of security skills or actions, improve the understanding of security principles and their application in various situations, or focus on complex security workflows."},{"id":232,"question":"When developing a business impact analysis, what should be the next step after creating a list of assets?","options":{"A":"Determine the value of each asset","B":"Assess the vulnerabilities present in each asset","C":"Identify the threats that each asset faces","D":"Evaluate the risks associated with each asset"},"correct":"A","explanation":"After creating a list of assets in a business impact analysis, the next step is to determine the value of each asset (see the ISC2 Study Guide, Module 2, under Business Impact Analysis). This step is critical because it allows the organization to prioritize its recovery efforts and allocate resources effectively. For example, an organization may identify its customer database as a high-value asset due to the sensitive information it contains and the potential business impact if it were compromis"},{"id":233,"question":"Which one of the ISC2 Code of Ethics canons emphasizes the importance of continuous professional development?","options":{"A":"Protect society, the common good, necessary public trust and confidence, and the infrastructure","B":"Provide diligent and competent service to principals","C":"Act honorably, honestly, justly, responsibly, and legally","D":"Advance and protect the profession"},"correct":"D","explanation":"Regarding \u201cadvance and protect the profession\u201d, ISC2 requires that as a member, you should maintain competence; keep skills and knowledge current (see ISC2 Study Guide, Module 5, under Professional Code of Conduct). This Canon emphasizes the importance of continuous professional development by requiring members to maintain their skills and knowledge in order to advance and protect the profession. The other Canons focus on protecting society, acting honorably and legally, and providing competent "},{"id":234,"question":"What is the PRIMARY purpose of encryption?","options":{"A":"To process data efficiently","B":"To analyze data","C":"To store data securely","D":"To protect data from unauthorized access"},"correct":"D","explanation":"The primary purpose of encryption is to protect data from unauthorized access (see ISC2 Study Guide, Module 1, under Encryption Overview). Encryption transforms data into unreadable and can only be decrypted by anyone with a valid key; thus, it is used to protect data from unauthorized access and ensure the integrity of the data. Even though it can be used as a preventive measure for data breaches, it is not the Primary purpose of encryption, and neither used to process data efficiently or analy"},{"id":235,"question":"How can organizations effectively combine different types of physical access controls to enhance security?","options":{"A":"By eliminating the use of physical access controls and relying solely on employee vigilance","B":"By implementing a single, universal access control mechanism for all areas","C":"By using multiple layers of access control, such as a combination of electronic access control and biometric authentication","D":"By allowing unrestricted access to all areas to promote a sense of trust among employees"},"correct":"C","explanation":"Layering different physical access controls can provide increased security by requiring multiple forms of authentication or verification before granting access to sensitive areas (see ISC2 Study Guide, Module 2, under Monitoring). This approach ensures that only authorized individuals are granted access and that their movements within the facility are appropriately restricted and monitored. Implementing a single, universal access control 106 | P a g e mechanism for all areas would not provide th"},{"id":236,"question":"What is the other name given to security controls?","options":{"A":"Security safeguards","B":"Security shields","C":"Security blockers","D":"Security agents"},"correct":"A","explanation":"Security controls are also referred to as security safeguards (see ISC2 Study Guide,Chapter 3, Module 1)"},{"id":237,"question":"What is the PRIMARY objective of a Virtual Private Network (VPN)?","options":{"A":"To provide access to a cloud provider","B":"To segment a network into multiple subnets","C":"To provide secure access to a network","D":"To provide virtual private access to network devices"},"correct":"C","explanation":"The primary objective of a Virtual Private Network (VPN) is to provide secure access to a network. It does this by encrypting data sent between two or more points, making it difficult for anyone to intercept and view the data. This makes it ideal for remote users accessing a secure network. Segmenting a network into multiple subnets is a different 107 | P a g e task, as it divides a network into smaller, more manageable sections.(see ISC2 Study Guide, Chapter 4, Module 3)"},{"id":238,"question":"Which of the following logical access control models uses a set of rules to determine whether a subject can access a specific object?","options":{"A":"Discretionary Access Control (DAC)","B":"Rule-Based Access Control (RAC)","C":"Role-Based Access Control (RBAC)","D":"Mandatory Access Control (MAC)"},"correct":"B","explanation":"Rule-based access control involves setting up a set of rules that dictate what actions are allowed or denied based on specific criteria such as source IP address, destination IP address, and port number (see ISC2 Study Guide, Module 3, under Logical Access Controls). Discretionary Access Control (DAC) allows data owners to grant or restrict access at their discretion. Role-Based Access Control (RBAC) assigns access rights based on job responsibilities. Mandatory Access Control (MAC) enforces acc"},{"id":239,"question":"What ports are typically used to identify unencrypted FTP traffic by an IDS?","options":{"A":"TCP port 21 and UDP port 21","B":"TCP port 23","C":"TCP port 21","D":"UDP port 69"},"correct":"C","explanation":"FTP (File Transfer Protocol) typically operates on TCP port 21 (not UDP) for command control and uses a separate data connection on another port for data transfer. An IDS (Intrusion Detection Systems) would typically monitor TCP port 21 to identify connections to it as unencrypted FTP traffic. Please note that TCP port 23 is typically used by Telnet and UDP port 69 is typically used by TFTP (Trivial File Transfer Protocol), which is different from FTP (see ISC2 Study Guide, Module 1, under Secur"},{"id":240,"question":"What type of control is commonly exemplified by dogs, guards, and fences?","options":{"A":"Recovery","B":"Physical","C":"Detective","D":"Administrative"},"correct":"B","explanation":"Dogs, guards, and fences are all physical security measures, which are designed to prevent or deter unauthorized physical access to a facility, equipment, or information (see ISC2 Study Guide, Module 2, under Physical Access Controls). Detective controls are used to detect and respond to security incidents, while recovery controls are used to restore normal operations after an incident has occurred. Administrative controls are policies, procedures, and other measures that are used to manage and "},{"id":241,"question":"Which OSI model layer is responsible for the end-to-end transmission of data between two hosts?","options":{"A":"The Network layer","B":"The Presentation layer","C":"The Session layer","D":"The Transport layer"},"correct":"D","explanation":"The Transport Layer is the layer of the OSI model responsible for the end-to-end transmission of data between two hosts. TCP and UDP are two of the main protocols used at this layer, as they provide reliable and unreliable data delivery services respectively. The Network layer is responsible for routing data between networks, while the Session layer is responsible for establishing, maintaining, and terminating communication sessions between applications. The Presentation layer is responsible for"},{"id":242,"question":"What security principle is being adhered to when a user's access request is declined, despite meeting the necessary security clearance, because there is no business justification for the access?","options":{"A":"Separation of duties","B":"Need to know","C":"Two-person control","D":"Least privilege"},"correct":"B","explanation":"Need to know is a principle that limits access to information to only those who require it to perform their Principle of Least Privilege). Need to know is a related principle restricting access to information based on a user's job requirements (see ISC2 Study Guide, Module 1, under Examples of Least Privilege). By restricting access to administrative servers only to IT system administrators, the organization applies the need-to-know principle, which ensures that only those with a legitimate need"},{"id":243,"question":"A hash function is \u2026:","options":{"A":"a method for compressing data to reduce storage requirements","B":"a cryptographic algorithm used for encryption","C":"a unique identifier assigned to a computer network","D":"a mathematical function that generates a fixed-size string of characters"},"correct":"D","explanation":"A hash function is a mathematical function that takes an input or 'message' and generates an output or 'hash value', usually much smaller than the original message, typically of a fixed-size (see ISC2 Study Guide, Module 1, under Encryption Overview). Hash functions are used to generate unique representations of data or verify data integrity and are a crucial element of cryptographic systems."},{"id":244,"question":"What information security principle is applied by restricting access to administrative servers only to IT system administrators?","options":{"A":"Least privilege","B":"Two-person control","C":"Need to know 110 | P a g e","D":"Transitive trust"},"correct":"C","explanation":"The principle of least privilege ensures that users or processes are granted the minimum permissions necessary to complete their tasks (see ISC2 Study Guide, Module 1)"},{"id":245,"question":"What type of attack is an APT attack?","options":{"A":"Advanced persistent threat attack","B":"Program insertion Attack","C":"On-path Attack","D":"Denial-of-Service Attack"},"correct":"A","explanation":"An Advanced Persistent Threat (APT) attack is a type of cyber attack designed to gain access to a target system and remain undetected for an extended period (see ISC2 Study Guide, Module 2, under Types of Threats). APT attacks are usually carried out by a group of highly sophisticated hackers and are often used to steal sensitive data or disrupt operations."},{"id":246,"question":"What mechanism among the following is typically NOT used as an anti-fraud measure?","options":{"A":"Human resources","B":"Mandatory vacations","C":"Two-person control","D":"Job rotation"},"correct":"A","explanation":"While Human Resources plays a critical role in any organization, its function is generally more focused on managing employment-related issues and ensuring that the organization adheres to labor laws; it isn't typically considered a direct anti-fraud measure. In turn, the other options mentioned are common anti-fraud measures (see ISC2 Study Guide, Module 6, under Fraud Prevention). Job rotation helps prevent fraud by ensuring that no single employee has control over a process for an extended per"},{"id":247,"question":"111 | P a g e What is the primary goal of a visitor management policy as part of physical access controls?","options":{"A":"To ensure all visitors have unrestricted access to all areas of the facility","B":"To avoid requiring visitors to provide identification or sign in","C":"To control and monitor visitor access to the facility, ensuring only authorized individuals are granted entry","D":"To eliminate the need for any physical access controls for visitors"},"correct":"C","explanation":"A visitor management policy is a vital component of physical access controls, as it helps organizations track and manage visitor access, ensuring that only those with legitimate reasons for being on the premises are granted entry and that their movements within the facility are appropriately restricted and monitored (see ISC2 Study Guide, Module 2, under Physical Access Controls). This helps to ensure the security of the facility and its assets. Allowing unrestricted access to all areas, elimina"},{"id":248,"question":"What is the best technology for detecting unauthorized storage of sensitive data on hard drives? (\u2605)","options":{"A":"IPS","B":"TLS","C":"DLP","D":"IDS"},"correct":"C","explanation":"DLP is a technology used to identify, monitor, and protect sensitive data to prevent unauthorized access, use, or transmission. It can detect unauthorized storage of sensitive data on hard drives and other storage devices and can also prevent the copying or transfer of such data to external storage devices or networks. IDS and IPS are intrusion detection and prevention systems, respectively, which focus on network traffic and behavior, and are not specifically designed for detecting unauthorized"},{"id":250,"question":"During a security incident response, where will an incident responder member find the most recent modification to a system\u2019s security settings?","options":{"A":"Application log","B":"Server log","C":"Change log","D":"Security log"},"correct":"C","explanation":"The change log records all changes made to a system, including security settings (see the ISC2 Study Guide, Module 3, under Change Logs). For example, after reviewing the change log, the IR team discovers that two-factor authentication (2FA) was recently disabled, which could have facilitated unauthorized access. The team can then further investigate why this change was made and whether it led to the security incident. Here is an excerpt from a change log showing that the system administrator ma"},{"id":251,"question":"Which term is used to denote the standard permissions assigned to a user account upon creation?","options":{"A":"Entitlement","B":"Transitivity","C":"Aggregation","D":"Baseline"},"correct":"D","explanation":"\"Baseline\" denotes the standard initial set of permissions assigned to a user account upon creation (see ISC2 Study Guide, Chapter 3, Module 1). Aggregation refers to the collection of multiple sets of data. In contrast, transitivity refers to the relationship between multiple 113 | P a g e security domains. Lastly, entitlement refers to the rights granted to a user based on their role or position within an organization."},{"id":252,"question":"Which access control type does NOT involve a lock among the following options?","options":{"A":"Directive","B":"Physical","C":"Deterrent","D":"Preventive"},"correct":"A","explanation":"Directive access control type is a type of administrative control that involves issuing directives, policies, or guidelines to manage access to resources (see ISC2 Study Guide, Module 1, under Access Control Concepts). They provide guidance and instruction to employees, contractors, or other users to ensure that they comply with security policies, procedures, and best practices."},{"id":253,"question":"Which of the following can be considered an example of a computer security incident?","options":{"A":"Completing a full backup schedule","B":"Updating antivirus signatures","C":"Conducting an unauthorized vulnerability scan","D":"Recording system access in a log"},"correct":"C","explanation":"An incident is an unplanned event that could impact the confidentiality, integrity, or availability of information or information systems, and requires a response to mitigate or resolve the incident. Conducting an unauthorized vulnerability scan is considered a computer security incident because it involves an unauthorized activity that could potentially identify weaknesses in a system or network that could later be exploited by a threat actor (see ISC2 Study Guide, Chapter 2, Module1). The rema"},{"id":254,"question":"Which of the following is an example of a technical security control? 114 | P a g e","options":{"A":"Conducting user security awareness training","B":"Establishing a BYOD policy","C":"Using CCTV cameras to monitor unauthorized access","D":"Establishing an acceptable usage policy"},"correct":"C","explanation":"Using CCTV cameras to monitor unauthorized access is an example of a technical security control as it involves the use of technology to control user access (see ISC2 Study Guide, Chapter 1, Module 1)."},{"id":255,"question":"Digital signatures provide which of the following security benefits?","options":{"A":"Data availability and redundancy","B":"Data confidentiality and encryption","C":"Data integrity and non-repudiation","D":"Data anonymization and obfuscation"},"correct":"C","explanation":"Digital signatures offer the security benefits of data integrity and non-repudiation (see ISC2 Study Guide, Module 1, under Non-repudiation). Indeed, a digital signature can be uniquely linked to a specific sender, offering an undeniable (non-repudiable) proof of the sender's identity and of the fact that the message originated from them. Moreover, when a digital signature is used, any changes made to the data after it has been signed will invalidate the signature, providing a method to check wh"},{"id":256,"question":"Which of the following documents outlines the specific step-by-step instructions to achieve a task or process?","options":{"A":"Standards","B":"Policies","C":"Procedures","D":"Regulations"},"correct":"C","explanation":"Procedures provide specific step-by-step instructions to achieve a task or process within a cybersecurity framework (see ISC2 Study Guide, Module 4, under Governance Elements). Procedures are detailed and help ensure consistency in the implementation of security measures. For instance, a procedure might detail the steps an IT administrator should take when an employee reports a potential phishing email. This procedure could include steps 115 | P a g e like advising the employee not to click on a"},{"id":257,"question":"What is the problem when a NAT router uses a 192.168.x.x subnet and has an external IP of 192.168.1.40?","options":{"A":"The upstream system may require the use of PAT if it is unable to properly process encapsulated packets","B":"192.168.x.x is not publicly routable and is only used for private networks","C":"Double NATing using the same IP range is possible but can cause complications","D":"192.168.1.40 is a valid address for use in a private network according to RFC 1918"},"correct":"B","explanation":"The problem with a NAT router using a 192.168.x.x subnet and having an external IP of 192.168.1.40 is that 192.168.x.x is not publicly routable and is only used for private networks (see ISC2 Study Guide, Module 1, under Internet Protocol IPv4 and IPv6). This means that any traffic originating from this subnet cannot reach the public Internet. For example, if a small business has a NAT router mistakenly configured with an external IP of 192.168.1.40, it would not be able to communicate with the "},{"id":258,"question":"How many are the authentication factors employed by an organization requiring a username, PIN, token, and retina scan during login?","options":{"A":"Two 116 | P a g e","B":"One","C":"Four","D":"Three"},"correct":"D","explanation":"In this scenario, the organization is using a username and pin (something you know), a token (something you have), and a retina scan (something you are). Therefore, the total number of authentication factors employed is three. The username and PIN are considered one factor, the token is another, and the retina scan is the third."},{"id":259,"question":"What is the main difference between 'ingress' monitoring and 'egress' monitoring?","options":{"A":"Ingress monitoring focuses on information sent between internal teams, while egress monitoring focuses on information sent to contractors","B":"Ingress monitoring focuses on external threats, while ingress monitoring focuses on internal threats","C":"Ingress monitoring focuses on inbound traffic, while egress monitoring focuses on outbound traffic","D":"Ingress monitoring focuses on people employees starting at the organization, while egress monitoring focuses on employees terminating their job at the organization"},"correct":"C","explanation":"Ingress monitoring focuses on incoming traffic, while egress monitoring focuses on outgoing traffic. In the context of network security, ingress monitoring is the analysis and management of traffic entering a network from the outside. Conversely, egress monitoring is the analysis and management of traffic leaving the network for the Internet or other networks. For example, an organization might use ingress monitoring to detect and block malicious traffic, such as attempts to exploit vulnerabilit"},{"id":260,"question":"What is the main purpose of an Acceptable Use Policy (AUP)?","options":{"A":"To monitor the use of the organization\u2019s network and computer systems","B":"To provide guidelines when choosing your corporate password","C":"Ensure the security of the organization\u2019s network and computer systems","D":"Informs users of company expectations when they use computer systems and networks"},"correct":"D","explanation":"An Acceptable Use Policy (AUP) is a set of rules that informs users of the company\u2019s expectations when they use its computer systems and networks (see ISC2 Study Guide, Module 5, chapter 5). AUPs are designed to protect an organization by limiting access to specific devices/areas, such as applications and databases, and by specifying various policies and standards the users must adhere to. Ensuring the security of the organization\u2019s network and computer systems is a goal of an AUP, but it is not"},{"id":261,"question":"What is the PRIMARY goal of security training?","options":{"A":"To reduce the number of security audits and assessments","B":"To ensure all employees have administrative access to systems","C":"To eliminate the need for security policies and procedures","D":"To build proficiency in a set of skills or actions in security subjects"},"correct":"D","explanation":"Security training allows employees to become familiar with and understand an organization's security policies, procedures, and processes. It also helps employees develop the skills and abilities to protect the organization from threats (see ISC2 Study Guide, Module 4, under Security Awareness Training). Security training is designed to build proficiency in a set of skills or actions in security subjects, such as recognizing and reporting phishing attempts, understanding the importance of passwor"},{"id":262,"question":"What is the term for an instance in which a logged-in user can perform specific activities within an application or system?","options":{"A":"Logins","B":"Group management","C":"Roles","D":"Authorization"},"correct":"D","explanation":"Authorization is the process of granting or denying specific rights and permissions to a user within a system or application (see ISC2 Study Guide, Chapter 3, Module 2). For example, in a banking system, a teller may be authorized to access customer account 118 | P a g e information and process transactions, but would not be authorized to approve loans or change system settings. This is determined by the user's identity and the privileges assigned to them. The other options are incorrect. Roles "},{"id":263,"question":"Which aspect of the CIA Triad focuses on ensuring that the information is accessible when it is needed?","options":{"A":"Integrity","B":"Confidentiality","C":"Availability","D":"Authentication"},"correct":"C","explanation":"Availability is the component of the CIA Triad that focuses on ensuring that the information is accessible when needed. This includes providing the system or data is available during authorized usage and preventing unauthorized access (see ISC2 Study Guide, Module 1, under the CIA Triad). Confidentiality focuses on ensuring that only authorized users can access sensitive information. Integrity aims to prevent unauthorized data alteration or destruction. Authentication refers to access control. I"},{"id":264,"question":"Which cryptographic attribute is demonstrated when Alice proves that Bob's message undeniably came from him?","options":{"A":"Confidentiality","B":"Authentication","C":"Integrity","D":"Non-repudiation"},"correct":"D","explanation":"Non-repudiation is a cryptographic attribute that ensures that a party cannot deny the authenticity of their signature on a document or the sending of a message they originated (see ISC2 Study Guide, Module 1, under Non-repudiation). Authentication verifies the identity of a sender or receiver, while confidentiality refers to protecting the content of the 119 | P a g e message from unauthorized access. Integrity is about ensuring the message is not altered during transmission. All of these attri"},{"id":265,"question":"Which risk management strategy is a company applying when the cost of implementing controls for a natural disaster outweighs the benefits?","options":{"A":"Risk acceptance","B":"Risk mitigation","C":"Risk avoidance","D":"Risk transference"},"correct":"A","explanation":"Risk acceptance is a risk management strategy in which a company chooses not to implement controls to address a risk, but instead accepts the risk and its potential consequences (see ISC2 Study Guide, Module 2, under Risk Management Terminology). In this scenario, the cost of implementing controls for a natural disaster is greater than the potential damage caused by the disaster, so it has decided to accept the risk. This doesn't mean the company ignores the risk; rather, they have made a consci"},{"id":266,"question":"What access control model is common in firewalls?","options":{"A":"Rule-based access controls (RuBAC)","B":"Discretionary access control (DAC)","C":"Mandatory access control (MAC)","D":"Role-based access control (RBAC)"},"correct":"A","explanation":"Rule-based access control involves setting up a set of rules that dictate what actions are allowed or denied based on specific criteria such as source IP address, destination IP address, and port number (see ISC2 Study Guide, Module 3, under Logical Access Controls). Firewalls use rule-based access control to allow or deny traffic based on specific rules configured by the administrator. Imagine that the following rules are configured in a firewall to control traffic entering and leaving the netw"},{"id":267,"question":"What instrument assists system administrators by providing secure configuration templates for operating systems and applications?","options":{"A":"Baseline configuration","B":"Security guidelines","C":"Running configuration","D":"Security policy"},"correct":"A","explanation":"A baseline configuration provides secure configuration templates for operating systems and applications, which can help system administrators ensure that systems are configured securely and according to industry best practices. Security guidelines are general recommendations or best practices for securing systems, while a security policy outlines an organization's overall approach to security. A running configuration is the current configuration of a system, which may or may not be secure. Basel"},{"id":268,"question":"A flood of inbound connections from various global locations suggests what kind of attack?","options":{"A":"An email phishing","B":"A virus","C":"A worm","D":"A denial-of-service attack"},"correct":"D","explanation":"A flood of inbound connections from various global locations suggests a distributed denial- of-service (DDoS) attack. In this type of attack, a large number of compromised machines (or devices) are used to flood a target system with traffic, overwhelming it and causing it to become inaccessible. The traffic may come from different sources, making blocking or mitigating the attack harder (because it becomes harder to distinguish legitimate from attacking traffic). A worm is a self-replicating mal"},{"id":269,"question":"What is the difference between Network Access Control (NAC) and a Virtual Private Network (VPN)?","options":{"A":"NAC is used to monitor and filter network traffic, while VPN is used to encrypt data","B":"NAC is used to control network access, while VPN is used to decrypt data","C":"NAC is used to control network access based on a determined policy, while VPN is used to create a secure connection.","D":"NAC is used to detect and prevent malicious activity, while VPN is used to monitor and filter network traffic"},"correct":"C","explanation":"Network Access Control (NAC) is a security solution that grants or restricts user access to a network based on a determined policy - including pre-admission endpoint security policy checks and post-admission controls over where users and devices can go on a network and what they can do (see ISC2 Study Guide, Module 3, under Network Access Control (NAC). While a Virtual Private Network (VPN) primarily serves to create a secure connection to another network over the Internet. It is a tool to encry"},{"id":270,"question":"Which one of the following is PRIMARILY used for identification purposes and is not suitable for use as an authenticator?","options":{"A":"Retinal scan","B":"Token","C":"Username","D":"Password"},"correct":"C","explanation":"A username is primarily used to identify the user and verify that they are who they claim to be, but it does not prove that the user is actually who they claim to be. A username is not a secure form of authentication, as it can be easily guessed or stolen. On the other hand, a password, retinal scan, and token are forms of authentication. They are used to verify the identity of the person or entity trying to gain access (see ISC2 Study Guide, Chapter 1, Module 1). A password is something you kno"},{"id":271,"question":"The PRIMARY objective of the Risk Management process is\u2026:","options":{"A":"\u2026To identify, assess, and prioritize risks, and implement appropriate controls to minimize their potential impact","B":"\u2026To minimize the implementation cost of security controls and countermeasures","C":"\u2026To identify potential risks invest and only in reactive countermeasures","D":"\u2026To eliminate all risks associated with an organization's information and assets"},"correct":"A","explanation":"Risk management is a proactive process of identifying, assessing, and prioritizing risks. Appropriate controls are then selected and implemented to reduce or mitigate the potential impact of identified risks (see ISC2 Study Guide, Module 2, under Risk Management Process). The primary objective of the risk management process is not to eliminate all risks, as this is often impractical and not cost-effective. Instead, the goal is to bring risks down to an acceptable level. It is important to note t"},{"id":272,"question":"What term refers to a facility that is equipped with HVAC, power, and communications circuits, but does not have hardware for a business to use during a disaster?","options":{"A":"Hot site","B":"Cold site","C":"Mobile site","D":"Warm site"},"correct":"B","explanation":"A cold site is a type of disaster recovery facility that is equipped with the necessary infrastructure such as heating, ventilation, air conditioning (HVAC), power, and communication circuits, but does not have any pre-installed hardware, servers, or applications (see ISC2 Study Guide, Module 3, under Disaster Recovery Sites). For example, a company might lease a cold site as part of their disaster recovery plan. In the event of a disaster that renders their primary site unusable, they would tra"},{"id":273,"question":"What type of attack is a Distributed Denial of Service (DDoS) attack?","options":{"A":"An attack that attempts to misdirect legitimate users to malicious websites through the abuse of URLs or hyperlinks in emails","B":"An attack that attempts to gain access to a target system through the use of a falsified identity","C":"An attack involving numerous unsuspecting secondary victim systems","D":"An attack that seeks to deny service to legitimate HTTP requests"},"correct":"C","explanation":"A Distributed Denial of Service (DDoS) attack is an attack that involves numerous unsuspecting secondary victim systems, which are used to flood the target system with requests, thus denying service to legitimate requests (see ISC2 Study Guide, Module 2, under Types of Threats). This type of attack is different from an attack that seeks to deny service to legitimate HTTP requests, an attack that attempts to gain access to a target system through the use of a falsified identity, and an attack tha"},{"id":274,"question":"What is the PRIMARY goal of a spoofing attack?","options":{"A":"Preventing access to a target system","B":"Redirecting users to malicious websites","C":"Propagation of malicious code","D":"Gaining access to a target system"},"correct":"D","explanation":"The primary goal of a spoofing attack is to gain access to a target system by impersonating a legitimate user or device (see ISC2 Study Guide, Module 2, under Types of Threats). Spoofing attacks can also redirect users to malicious websites, propagate malicious code, and prevent access to a target system. Spoofing attacks are often used to gain access to sensitive data or systems, as the attacker is able to bypass authentication and authorization processes."},{"id":276,"question":"What type of disaster recovery test involves activating the alternate processing facility while keeping the primary site operational?","options":{"A":"Checklist review","B":"Parallel test","C":"Full interruption test","D":"Tabletop exercise"},"correct":"B","explanation":"A parallel test involves running both the primary and alternate processing facilities simultaneously, with the primary site continuing normal operations while the alternate site processes backup transactions (see ISC2 Study Guide, Module 3, under Disaster Recovery Tests). This type of test is helpful for evaluating the compatibility of the alternate processing site with the primary site, as well as the ability of the backup systems to support normal business processes. It is the least disruptive"},{"id":277,"question":"Which type of disaster recovery test has the LEAST possible impact on regular information system operations?","options":{"A":"Parallel test","B":"Tabletop exercise","C":"Full interruption test","D":"Checklist review"},"correct":"B","explanation":"A tabletop exercise is a disaster recovery test that involves a discussion-based session in which team members meet in an informal setting to discuss their roles during an emergency and various simulated emergency scenarios. This type of test has the least impact on regular information system operations because it does not involve actual disruption or use of resources. For example, a financial institution's cybersecurity team might conduct a tabletop exercise to simulate a cyberattack on its sys"},{"id":278,"question":"What is the main difference between PII and HPI?","options":{"A":"PII is personal information, while HPI is health-related information","B":"PII is accessible to all users, while HPI is restricted to healthcare professionals","C":"PII is subject to regulatory requirements, while HPI is not","D":"PII is encrypted, while HPI is not encrypted"},"correct":"A","explanation":"Personally Identifiable Information (PII) refers to data that can be used to identify a specific individual, such as names, social security numbers, and dates of birth. Health Protected Information (HPI) is health-related information, typically about patients, subject to specific privacy and security regulations like HIPAA (see ISC2 Study Guide, Module 4, under Governance Elements). Indeed, PII is personal information subject to regulatory requirements, while HPI is health-related information su"},{"id":279,"question":"Which of the following documents is developed by governments or industry regulators to enforce specific requirements for cybersecurity?","options":{"A":"Regulations","B":"Standards","C":"Procedures","D":"Policies"},"correct":"A","explanation":"Regulations are typically developed by governments or industry regulators and are legally binding (see ISC2 Study Guide, Module 4, under Governance Elements). They enforce specific requirements for cybersecurity and can carry penalties for non-compliance. Standards outline best practices for cybersecurity, such as ISO 27001. Regulations are typically more stringent than standards, as they are legally binding and must be followed. Policies such as acceptable use and password policies outline an o"},{"id":280,"question":"What is the best technology for enforcing uniform security settings on multiple mobile devices in an organization? (\u2605)","options":{"A":"MDM","B":"IPS","C":"SIEM","D":"IDS"},"correct":"A","explanation":"Mobile Data Management MDM allows organizations to manage and secure mobile devices across multiple platforms and operating systems, such as smartphones and tablets. It can enforce security policies, remotely manage and wipe devices, and track device usage and location. IPS (Intrusion Prevention System), IDS (Intrusion Detection System), and SIEM (Security Information and Event Management) are all security technologies that focus on detecting and responding to security threats in a network or sy"},{"id":281,"question":"HIPAA primarily oversees the use of:","options":{"A":"Protected health information (PHI) in the United States","B":"Protected health information (PHI) in Europe","C":"Personal data on social media platforms","D":"Personal data of European Union citizens"},"correct":"A","explanation":"HIPAA is the Health Insurance Portability and Accountability Act. It is a US law that regulates the use and disclosure of Protected Health Information (PHI). This law applies to all entities that handle PHI, including healthcare providers, health plans, and healthcare clearinghouses. It does not apply to protected health information in Europe, personal data on social media platforms, or personal data of European Union citizens (see ISC2 Study Guide, Module 4, under Governance Elements)."},{"id":282,"question":"Why is it important to conduct security awareness training regularly?","options":{"A":"To ensure employees stay up to date with the latest security threats and best practices","B":"To decrease the need for security policies and procedures","C":"To avoid conducting security audits and assessments","D":"To enable employees to bypass security controls"},"correct":"A","explanation":"It is important to conduct security awareness training on a regular basis to ensure employees stay up to date with the latest security threats and best practices (see ISC2 Study Guide, Module 4, under Security Awareness Training). Security awareness training helps employees learn how to protect themselves and the organization from threats, understand security best practices, and be aware of new security technologies. In this way, employees identify threats and help protect the organization. The "},{"id":283,"question":"Which requirement is not necessary for a cryptographic hash function?","options":{"A":"The function must be one way","B":"The function must work on a variety of input sizes","C":"The function must have a low probability of producing the same output for different inputs 128 | P a g e","D":"The function must be efficient to compute"},"correct":"B","explanation":"The requirement for a cryptographic hash function to work on various input sizes is not necessary. A hash function is a mathematical algorithm that takes input data and produces an output (a hash value), a compact representation of the original data. The hash function must be efficient to compute, meaning it should be able to generate the hash value quickly. It must be one-way, which means obtaining the original input data from the hash value (i.e. reversing the function) should be computational"},{"id":284,"question":"Which of the following is a best practice for data backup policies?","options":{"A":"Not testing backups for data recovery","B":"Performing backups on as needed basis","C":"Storing all backups in the same physical location","D":"Encrypting backups to protect data confidentiality and integrity"},"correct":"D","explanation":"Data backup policies should include best practices such as encryption to ensure the security of backed-up data and regular testing of backups for data recovery and storage in separate locations from the production data. Storing all backups in the same physical location is not recommended as it increases the risk of data loss due to natural disasters or malicious attacks. Performing backups on an as-needed basis is not recommended as it does not provide a reliable way to recover data during a sys"},{"id":285,"question":"What model is utilized in Mandatory Access Control (MAC)?","options":{"A":"Lattice based","B":"Discretionary","C":"Rule based","D":"Group based"},"correct":"A","explanation":"129 | P a g e Mandatory access control (MAC) is a security model in which access decisions are based on labels assigned to resources and the clearance level of subjects seeking access (see ISC2 Study Guide, Module 3, under Mandatory Access Control). In this model, the lattice structure is used to determine the highest level of access an individual can have based on their security clearance level and the sensitivity level of the resource they are attempting to access."},{"id":286,"question":"What is an 'on-path' attack?","options":{"A":"An attack involving numerous unsuspecting secondary victim systems","B":"A passive, noninvasive attack to observe the operation of a device","C":"An attack with the goal of gaining access to a target system through the use of a falsified identity","D":"An attack that attempts to intercept the communication between two devices in order to modify the information."},"correct":"D","explanation":"An attack that attempts to place themselves between two devices, often between a web browser and a web server, to intercept or modify information that is intended for one or both of the endpoints (see ISC2 Study Guide, Module 2, under Types of Threats). On-path attacks are passive attacks, meaning they do not involve any direct interaction with the target system. They also differ from distributed denial of service (DDoS) attacks, which involve numerous unsuspecting secondary victim systems. The "},{"id":287,"question":"What cloud service is recommended for developers to create applications?","options":{"A":"Software as a Service (SaaS)","B":"Platform as a Service (PaaS)","C":"Network as a Service (NaaS)","D":"Infrastructure as a Service (IaaS)"},"correct":"B","explanation":"Platform as a Service (PaaS) is a cloud computing model that provides developers with a platform to create applications without managing the underlying infrastructure (see ISC2 Study Guide, Module 3, under Cloud). PaaS allows developers to focus on coding and testing the applications while the cloud provider controls the underlying infrastructure. Infrastructure as a Service (IaaS) provides developers access to virtual machines and storage, while Software as a Service (SaaS) provides access to a"},{"id":288,"question":"What receives a label in a MAC model?","options":{"A":"All objects and subjects are assigned a label.","B":"Each object has a label, and each subject has a compartment.","C":"Each subject has a label, and each object has a compartment.","D":"Labels are assigned to objects and subjects"},"correct":"D","explanation":"In a MAC (Mandatory Access Control) model, labels are assigned both to objects and to subjects based on their classification level (see ISC2 Study Guide, Module 3, under Mandatory Access Control). These labels are typically assigned as Confidential, Secret, and Top Secret, and determine the access rights each subject has to each object. Labels are not assigned to compartments or objects, and all objects and subjects do not receive the same label. Furthermore, labels are not assigned to objects a"},{"id":289,"question":"What is the most effective physical security measure for a recently established unstaffed computing facility, featuring motion detectors and secondary authentication?","options":{"A":"Turnstiles","B":"Faraday cages","C":"CCTV","D":"IPS"},"correct":"C","explanation":"CCTV (Closed-Circuit Television) would add a layer of visual surveillance that can deter, detect, and record intrusions, enhancing the facility's physical security (see ISC2 Study Guide, Module 2, under Physical Access Controls)."},{"id":290,"question":"What type of malware is used to take hostage a user's data and require a ransom payment for release?","options":{"A":"Virus","B":"Trojan 131 | P a g e","C":"Ransomware","D":"DoS"},"correct":"C","explanation":"Ransomware is a type of malware that takes hostage a user's data and requires a ransom payment for release (see ISC2 Study Guide, Module 2, under Types of Threats). Trojans, DoS, and viruses are all other types of malware, but they do not typically require a ransom payment for release. Specifically Trojans, hide within legitimate software to create backdoors for other malware or viruses, replicating and modifying other programs to carry out their destructive actions, ransomware blocks access to "},{"id":291,"question":"Which of the following is a common topic covered in security awareness training?","options":{"A":"How to grant administrative access to all users","B":"Recognizing and reporting phishing attempts","C":"Disabling antivirus software to improve system performance","D":"The importance of sharing passwords with colleagues"},"correct":"B","explanation":"Phishing is an attack on information systems that attempts to fraudulently acquire sensitive information such as usernames, passwords, or credit card details by posing as a legitimate entity (see ISC2 Study Guide, Module 4). Therefore, security awareness training programs must teach users how to recognize and report common phishing attempts to minimize the amount of information that malicious actors can gain access to. The remaining options are not topics typically covered in security awareness "},{"id":292,"question":"The Memorandum of Understanding (MOU)/Memorandum of Agreement (MOA) is ... 132 | P a g e","options":{"A":"provided by an MSP","B":"cloud provider C. a contractual agreement between two or more parties that outlines","D":"relationship","C":"the responsibilities of an organization"},"correct":"D","explanation":"A Memorandum of Understanding (MOU) or Memorandum of Agreement (MOA) is typically used to document a mutual understanding between parties, specifying each party's roles, responsibilities, and the nature of their relationship. These documents are often less formal than contracts and typically not legally binding. The other options given are more specific and might not always apply to an MOU or MOA."},{"id":293,"question":"Which of the following concepts is exemplified by a load balancer that spans across multiple regions and boosts website availability and performance?","options":{"A":"Warm site","B":"Multiple processing sites","C":"Cold sites","D":"A honeynet"},"correct":"B","explanation":"A load balancer spanning multiple regions distributes traffic among multiple servers or data centers, allowing for increased availability and performance (see ISC2 Study Guide, Module 3, under Disaster Recovery). Multiple processing sites can provide redundancy, load balancing, and failover capabilities, making it easier to handle high traffic demands or prevent single points of failure. Warm and cold sites typically refer to backup data centers that can be activated in case of disaster. At the "},{"id":294,"question":"Which type of documentation is commonly created once an incident has been remediated?","options":{"A":"A risk assessment report","B":"A list of remediation actions","C":"A checklist for mitigation measures","D":"A document outlining the lessons learned"},"correct":"D","explanation":"133 | P a g e A document outlining the lessons learned is commonly created once a post-mortem review of an incident has been remediated (see ISC2 Study Guide, Module 1, under Incident Response Team). This type of documentation provides valuable insights into the incident response process and helps identify improvement areas. A risk assessment report is typically performed prior to an incident to identify potential vulnerabilities, and a list of remediation actions and a checklist for mitigation "},{"id":295,"question":"Which option below does NOT represent a type of biometric data?","options":{"A":"Smart Card","B":"Fingerprint","C":"Voice record","D":"Retina Scan"},"correct":"A","explanation":"Biometric data includes physical features such as fingerprints, retina scans, and voice recordings that can be used to identify a person. All of the options listed, except for Smart Card, are types of biometric data (see ISC2 Study Guide, Chapter 3, Module 1)."},{"id":296,"question":"Which of the following is NOT considered a threat actor?","options":{"A":"Cyberterrorism","B":"A competing business engaging in corporate espionage","C":"A software company developing a malware detection system","D":"Nation-states"},"correct":"C","explanation":"A software company developing a malware detection system is not considered a threat actor. Threat actors are entities that exploit vulnerabilities for malicious purposes (see ISC2 Study Guide, Chapter 1, Module 1). In contrast, a software company creating a malware detection system is working to enhance cybersecurity. For instance, companies like Norton or McAfee develop antivirus software to identify and neutralize cyber threats, making them part of the cybersecurity solution, not a threat acto"},{"id":297,"question":"Data at rest is TYPICALLY vulnerable to which type of security risk? (\u2605)","options":{"A":"Loss of integrity","B":"Decryption","C":"Data breach","D":"Inadequate classification"},"correct":"C","explanation":"Data at rest refers to data stored on a storage device that is not being transmitted (in other words, data that is not actively in transit). Data at rest is typically vulnerable to data breaches, where unauthorized users gain access to the storage device and to the data. Loss of data integrity means that an unauthorized user breaches the storage device and tampers with the data therein. The unauthorized user must have access to data to alter it, which is already a data breach in itself. Inadequa"},{"id":298,"question":"What is NOT an example of a technical control?","options":{"A":"Router Access Control List","B":"Data classification","C":"Encryption","D":"Firewall rule"},"correct":"B","explanation":"A technical control is a measure designed to help protect data against unauthorized access, either physical or logical (see ISC2 Study Guide, Chapter 5). Examples of technical controls include firewalls, routers with Access Control Lists (ACLs), and encryption. Data classification, however, is the process of labeling data according to its sensitivity, allowing for different access levels based on the label given."},{"id":300,"question":"What is a zero-day vulnerability?","options":{"A":"A database attack that places the date 00/00/0000 in data tables in an attempt to exploit flaws in business logic","B":"A novice attacker","C":"An attack previously unknown to the security community","D":"An attack that sets the operating system date and time to 00/00/0000 and 00:00:00"},"correct":"C","explanation":"A zero-day vulnerability is a security flaw or weakness in software or hardware previously unknown to the security community, making it vulnerable to exploitation by attackers (ISC2 Study Guide, Module 2, under Types of Threats). This vulnerability is called \"zero-day\" because the developer has zero days to patch or fix the issue before attackers can exploit it."},{"id":302,"question":"Which of the following physical access control methods is designed to authenticate the identity of individuals entering a facility?","options":{"A":"Visitor sign-in sheets","B":"Key cards","C":"Video surveillance","D":"Security guards"},"correct":"B","explanation":"Key cards are designed to authenticate the identity of individuals entering a facility by requiring them to present a card with embedded information matched against a database of authorized users (see ISC2 Study Guide, Module 2, under Monitoring). Security guards and visitor sign-in sheets can help monitor and track access but do not authenticate identity. Video surveillance monitors and records activity within a facility but does not establish identity. Mechanical locks and keys are traditional"},{"id":303,"question":"Digital signatures primarily rely on which cryptographic technique?","options":{"A":"Stream ciphers","B":"Symmetric-key cryptography","C":"Hash functions","D":"Asymmetric-key cryptography"},"correct":"D","explanation":"Digital signatures primarily rely on asymmetric-key cryptography, which uses a pair of public and private keys to encrypt and decrypt data (see ISC2 Study Guide, Chapter 5, Module 1). In digital signatures, the sender's private key is used to sign the message, and the corresponding public key is used to verify the signature. With regards to the other options, symmetric-key cryptography is a type of cryptography that uses a single key to 137 | P a g e both encrypt and decrypt data and is not used"},{"id":304,"question":"What is the term for the GDPR requirement allowing individuals to request the termination of their data dissemination? (\u2605)","options":{"A":"The right of data portability","B":"The right to access","C":"Privacy by design","D":"The right to be forgotten"},"correct":"D","explanation":"The right to be forgotten is a principle under the General Data Protection Regulation (GDPR) that allows individuals to request the erasure of their personal data held by organizations. This right intends to enable individuals to manage and control their online presence by requesting the removal of outdated, irrelevant, or excessive personal information from online platforms. The remaining options are incorrect because the right to access, privacy by design, and the right of data portability are"},{"id":305,"question":"How does a Business Impact Analysis (BIA) contribute to the disaster recovery planning process?","options":{"A":"By focusing solely on preventing disasters from occurring","B":"By identifying the critical systems and processes that must be prioritized","C":"By avoiding the consideration of potential impacts on the organization","D":"By disregarding the need for a coordinated response to a disaster"},"correct":"B","explanation":"A BIA is an essential step in the disaster recovery planning process, as it helps organizations understand the potential impacts of a disaster or major incident on their operations and identify the systems and processes that are most critical to their continued functioning (see ISC2 Study Guide, Module 3, under Disaster Recovery). In practice, BIA helps organizations prioritize their recovery efforts. Imagine a company that conducts a BIA and identifies systems such as order processing, inventor"},{"id":306,"question":"What term is used to describe phishing attacks that specifically target company administrators?","options":{"A":"Barracuda attacks","B":"Piranha attacks","C":"Whaling attacks","D":"Shark attacks"},"correct":"C","explanation":"Whaling attacks are used to describe phishing attacks that specifically target company administrators (see ISC2 Study Guide, Module 4, under Phishing and Social Engineering). Whaling attacks are more sophisticated than regular phishing attacks and are designed to target high-level executives and administrators. Barracuda attacks, Shark attacks, and Piranha attacks are not terms used to describe phishing attacks."},{"id":307,"question":"What type of authentication factor is voice pattern recognition?","options":{"A":"Something you have","B":"Something you know","C":"Somewhere you are","D":"Something you are"},"correct":"D","explanation":"Voice pattern recognition is a type of biometric authentication that verifies a person's identity based on physical or behavioral characteristics unique to that individual. In this case, the person's voice pattern is the physical characteristic. Other biometric authentication factors include fingerprint scans, facial recognition, and iris scans. Something you know refers to passwords or PINs, something you have refers to physical tokens like smart cards, and somewhere you are referred to locatio"},{"id":308,"question":"During which phase of the incident response process would be most appropriate to implement long-term fixes to prevent similar incidents in the future?","options":{"A":"Recovery","B":"Detection","C":"Analysis","D":"Mitigation"},"correct":"A","explanation":"During the recovery phase, affected systems are restored to normal operations, and long- term fixes are implemented to prevent similar incidents from occurring in the future. This phase also includes updating and improving security measures based on lessons learned from the incident (see ISC2 Study Guide, Module 1, under Incident Response Team). The detection, analysis, and mitigation phases are all important steps in the incident response process, but they are not the appropriate time to implem"},{"id":309,"question":"Which of the following is an example of a threat vector?","options":{"A":"A natural disaster that could damage a data center","B":"A criminal hacking group targeting a specific organization","C":"A phishing email that tricks users into revealing their passwords","D":"A software bug that allows unauthorized access to a system"},"correct":"C","explanation":"A phishing email is an example of a threat vector, as it is a specific method used by an attacker to gain unauthorized access to a system or network, often by tricking users into providing sensitive information, such as their passwords or login credentials (see ISC2 Study Guide, Module 2, under Threats). A software bug that allows unauthorized access to a system is an example of a vulnerability, not a threat vector. A criminal hacking group targeting a specific organization is an example of a th"},{"id":310,"question":"Which of the following system hardening techniques involves reducing the attack surface by removing unnecessary software and services? (\u2605)","options":{"A":"Security configuration management","B":"Patch management","C":"Least privilege principle","D":"Reducing the number of elements of a system"},"correct":"D","explanation":"Reducing the number of system elements is a system hardening technique that removes unnecessary software and services to reduce the attack surface. Patch management identifies and applies security patches and updates to an organization\u2019s system and application. The least privilege principle is a security technique used to limit the access of users and processes to the resources they need to perform their duties. Security configuration management is controlling and monitoring changes to a system\u2019"},{"id":311,"question":"Which of the following documents establishes context and sets out strategic direction and priorities?","options":{"A":"Regulations","B":"Policies","C":"Standards","D":"Procedures"},"correct":"B","explanation":"Policies are formal, high-level statements of the organization's values, and attitudes regarding a specific issue, such as data privacy, human resources, or operations. They provide guiding principles that help employees make decisions and carry out their tasks within the defined boundaries. Policies are written in a broad way (typically without implementation details); they establish the context and set out strategic direction and priorities (see ISC2 Study Guide, Module 4, under Governance Ele"},{"id":312,"question":"Which of the following options is NOT an access control layer?","options":{"A":"Physical","B":"Administrative","C":"Policy","D":"Technical"},"correct":"C","explanation":"Policies are not considered an access control layer. While policies play a critical role in defining the rules for access control, they are not an access control layer in themselves. There are three layers of access control: Physical, Administrative, and Technical (see the ISC2 Study Guide, Module 1, under Controls Overview). These layers reflect the different methods used to control access to resources in an organization. Physical controls are tangible security measures such as door locks, fenc"},{"id":313,"question":"What is the primary goal of a Disaster Recovery Plan (DRP)?","options":{"A":"Maintaining critical business functions during a disruption","B":"Restoring the business to full last-known reliable operations","C":"Guiding emergency response personnel during a disaster","D":"Ensuring the sustainability of business operations after an interruption"},"correct":"B","explanation":"The primary goal of a Disaster Recovery Plan (DRP) is to restore the business to its most recently known, reliable state. This involves recovering and restoring all business operations to the state they were in before the disruption occurred (see ISC2 Study Guide, Chapter 2, Module 3). For example, if a company's server crashes, the DRP would include steps to restore all data from the last backup and ensure that the business can continue to operate smoothly. 142 | P a g e Maintaining critical bu"},{"id":314,"question":"Which of the options does not have attributes of a Privileged User Account?","options":{"A":"It does not interact directly with servers and other infrastructure devices","B":"It should require the use of MFA","C":"It should have the highest level of logging associated with actions","D":"It can often create users and assign permissions"},"correct":"A","explanation":"Privileged User Accounts are specifically designed to interact with servers and other infrastructure devices in order to perform privileged tasks that are necessary for system management and maintenance (see ISC2 Study Guide, Chapter 3, Module 1). All of the other choices are attributes of Privileged User Accounts."},{"id":315,"question":"What is the PRIMARY benefit of incorporating real-life examples and scenarios into security awareness training?","options":{"A":"To make the training more engaging and help employees better understand the practical implications of security best practices","B":"To encourage employees to share sensitive information with unauthorized individuals","C":"To reduce the overall security posture of the organization","D":"To demonstrate that security threats are not a concern for the organization"},"correct":"A","explanation":"The primary benefit of incorporating real-life examples and scenarios into security awareness training is to make it more engaging and help employees better understand the practical implications of security best practices (see ISC2 Study Guide Module 4, under Security Awareness Training). Incorporating real-life examples and scenarios can give employees a better understanding of the practical implications of security best practices and how to prevent security breaches. It encourages employees to"},{"id":316,"question":"Which of the following is NOT a recommended practice for password protection according to the security awareness training examples?","options":{"A":"Using different passwords for different systems","B":"Reusing passwords for multiple systems","C":"Avoiding the sharing of passwords with co-workers","D":"Using a password management solution"},"correct":"B","explanation":"Reusing passwords for multiple systems is not a recommended practice for password protection according to the security awareness training examples (see ISC2 Study Guide, Module 4, under Password Protection). Reusing passwords for multiple systems increases the risk of a security breach, as it is easier for a threat actor to access various systems with the same password. The security awareness training examples recommend a password management solution for creating strong and unique passwords for "},{"id":317,"question":"What is the primary goal of the Health Insurance Portability and Accountability Act (HIPAA)?","options":{"A":"To standardize data protection measures across countries","B":"To ensure the security and privacy of patients' health information","C":"To protect consumers' financial data","D":"To regulate the security of credit card transactions"},"correct":"B","explanation":"The primary goal of HIPAA, or the Health Insurance Portability and Accountability Act, is to ensure patient health information security and privacy (see ISC2 Study Guide, Module 4, under Governance Elements). HIPAA establishes specific rules and guidelines for healthcare organizations, insurance providers, and other entities handling protected health information (PHI). It is designed to protect the confidentiality, integrity, and availability of PHI and to ensure that individuals have control ov"},{"id":318,"question":"Which three OSI model layers correspond to the TCP/IP model's Application layer?","options":{"A":"Application, Presentation, and Transport","B":"Presentation, Session, and Transport","C":"There is not a direct match (the TCP model was created before the OSI model)","D":"Application, Presentation, and Session"},"correct":"D","explanation":"The OSI model's Application layer corresponds to the TCP/IP model's Application layer, and the OSI model's Presentation layer corresponds to the combination of the TCP/IP model's Presentation and Session layers. Therefore, the three OSI model layers corresponding to the TCP/IP model's Application layer are Application, Presentation, and Session (see ISC2 Study Guide, Module 4, under Network Protocols). The option stating that there is no direct match is incorrect, as there is a direct correspond"},{"id":319,"question":"What is the primary problem typically associated with decentralized access control? (\u2605)","options":{"A":"Potential for access interruptions","B":"Control is excessively detailed","C":"Inconsistent control","D":"Training expenses are elevated"},"correct":"C","explanation":"The primary problem typically associated with decentralized access control is inconsistent control. Decentralized access control means that access permissions and management are scattered across different departments or systems within an organization. The result of this dispersion can be varying levels of security, inconsistent access rights, and difficulty maintaining a consistent access control policy. For example, Department A may have strict access controls, while Department B may have lax c"},{"id":32,"question":"What is the cloud computing model where customers share computing infrastructure without knowing each other's identity?","options":{"A":"Community cloud","B":"Shared cloud","C":"Public cloud","D":"Private cloud"},"correct":"C","explanation":"Public Cloud is a cloud computing model where customers share computing infrastructure without knowing each other's identity (see ISC2 Study Guide, Module 3, under Cloud). In this model, the cloud provider is responsible for the maintenance and management of the infrastructure, and customers can access the resources on demand. A private cloud is a cloud model where the infrastructure is dedicated to a single customer or organization. In contrast, a community cloud is a cloud model where the infr"},{"id":321,"question":"What type of factor is a callback to a mobile phone?","options":{"A":"Somewhere you are","B":"Something you are","C":"Something you have","D":"Something you know"},"correct":"C","explanation":"A callback to a mobile phone is an example of a \"something you have\" factor in multi- factor authentication. \"Something you have\" factors require possession of a physical object, such as a phone, token, or smart card, as part of the authentication process. \"Something you know\" factors involve knowledge-based information, such as a password or PIN, while \"somewhere you are\" and \"something you are\" factors are based on physical location or biometric characteristics, respectively. A callback to a m"},{"id":322,"question":"In the context of the CIA Triad, which of the following security controls would primarily enhance data availability? (\u2605)","options":{"A":"Encrypting data at rest and in transit","B":"Implementing two-factor authentication","C":"Regularly backing up data and using redundant systems","D":"Monitoring network traffic for signs of intrusion"},"correct":"C","explanation":"Regularly backing up data and using redundant systems ensures that (authorized) users have timely and reliable access to information and resources, even during hardware failure, data loss, or other incidents. Thus, regular backups primarily enhance data availability Implementing two-factor authentication, encrypting data at rest and in transit, and monitoring network traffic for signs of intrusion are all important security measures, but they are not primarily focused on enhancing data availabil"},{"id":323,"question":"What is the primary objective of a Business Continuity Plan (BCP) in the context of incident response, business continuity, and disaster recovery concepts?","options":{"A":"To ensure the organization can continue to operate during and after a disaster or major incident","B":"To avoid implementing any recovery strategies","C":"To disregard the need for a coordinated response to a major incident","D":"To focus solely on preventing incidents from occurring"},"correct":"A","explanation":"The primary objective of a business continuity plan (BCP) is to ensure that the organization can continue to operate during and after a disaster or major incident (see the ISC2 Study Guide, Module 2, under The Importance of Business Continuity). A BCP outlines the procedures and instructions an organization must follow in the face of such disasters. It covers business processes, assets, personnel, business partners, and more. For example, suppose a severe storm causes a power outage at a company"},{"id":324,"question":"What type of attack attempts to misdirect legitimate users to malicious websites by abusing URLs or hyperlinks in emails?","options":{"A":"Spoofing","B":"Trojan","C":"Phishing","D":"Denial-of-Service (DoS)"},"correct":"C","explanation":"Phishing attempts to misdirect legitimate users to malicious websites by abusing URLs or hyperlinks in emails (see ISC2 Study Guide, Module 2, under Types of Threats). Spoofing is an attack in which the attacker attempts to disguise their identity to gain access to a system. At the same time, Denial-of-Service (DoS) is an attack that makes a system or network unavailable to its intended users. A Trojan is a malicious software that disguises itself as legitimate software to gain access to a syste"},{"id":325,"question":"What is the MOST formal document between a service provider and a customer that sets expectations FOR performance parameters?","options":{"A":"Operations level agreement (OLA)","B":"Service-level agreement (SLA)","C":"Statement of work (SOW)","D":"Memorandum of understanding (MOU)"},"correct":"B","explanation":"A Service-level agreement (SLA) is the most formal document between a service provider and a customer that sets expectations about performance parameters such as availability, reliability, and response times (see ISC2 Study Guide, Module 3, under Service-Level Agreement). An SLA outlines the services to be provided, the performance levels expected, and the penalties for non-compliance. An Operations level agreement (OLA) is an agreement between two or more internal departments or teams of an org"},{"id":326,"question":"Which of the following is a key component of a Disaster Recovery Plan (DRP)?","options":{"A":"Focusing solely on the prevention of disasters, rather than recovery efforts","B":"Establishing clear roles and responsibilities for personnel during disaster recovery efforts","C":"Ignoring the need for data backups and redundancy","D":"Avoiding the use of offsite backup facilities or cloud-based services"},"correct":"B","explanation":"Establishing clear roles and responsibilities for personnel during disaster recovery efforts is a critical component of a Disaster Recovery Plan (DRP) (see ISC2 Study Guide, Chapter 2, Module 3) because it ensures that each team member knows exactly what their responsibilities are in the event of a disaster, which helps streamline the recovery process and minimize downtime. For example, a DRP might assign specific roles for data recovery, communications, hardware replacement, and system restorat"},{"id":327,"question":"Alice and Bob are good friends and want to exchange messages securely. Alice receives a message from Bob. What key does Alice use to decrypt the encrypted message she received?","options":{"A":"Bob\u2019s public key","B":"Bob\u2019s private key","C":"Alice\u2019s private key","D":"Alice\u2019s public key"},"correct":"C","explanation":"Note: Secure messaging typically involves using public and private keys. To determine which key is used by Alice to decrypt the encrypted message received from Bob, we need to think step by step: The public key is used for encryption, while the private key is used for decryption. If Bob encrypts the message, he can use his private key or Alice\u2019s public key for encryption. However, keep in mind that Alice is the intended recipient. 149 | P a g e Since Alice is the recipient and needs to decrypt t"},{"id":329,"question":"What is the PRIMARY purpose of a firewall?","options":{"A":"To detect threats","B":"To prevent malicious software","C":"To stop or block attacks","D":"To correctly identify legitimate users"},"correct":"C","explanation":"The primary purpose of a firewall is to stop or block attacks (see ISC2 Study Guide, Module 2, under Preventing Threats). Firewalls are designed to detect and prevent unauthorized access to networks by using a combination of technologies such as packet filtering, application layer filtering, and stateful inspection. Firewalls can also be used to detect and prevent malicious software from entering a network, but their primary purpose is to protect against attacks. Firewalls cannot be used to corr"},{"id":330,"question":"What access control problem is identified during an audit when a previous employee retains access to shared folders? (\u2605)","options":{"A":"Privilege creep","B":"Excessive provisioning 150 | P a g e","C":"Unauthorized access","D":"Account review"},"correct":"A","explanation":"During an audit, privilege creep is identified when a previous employee retains access to shared folders. Privilege creep is when employees are granted more privileges than necessary to fulfill their job functions, leading to potential unauthorized access to sensitive assets. A practical solution is to review accounts regularly and to ensure that all privileges are monitored and managed closely. The remaining options are not access control problems that are identified during an audit. Excessive "},{"id":331,"question":"What is the recommended appropriate frequency for testing an organization's Business Continuity Plan (BCP)?","options":{"A":"Every five year","B":"Every six months","C":"According to business needs and requirements","D":"Annually"},"correct":"C","explanation":"The frequency for testing an organization's Business Continuity Plan (BCP) should be determined based on business needs and requirements (see the ISC2 Study Guide, Chapter 2, Module 2), as the frequency of testing should be aligned with the organization's risk profile, operational needs and any changes in the business environment. For example, an organization operating in a rapidly changing industry may need to test its BCP more frequently, such as quarterly, to ensure that it remains effective "},{"id":332,"question":"An organization wants to decrease the number of help desk cases related to password changes. What measure can the organization take? (\u2605) 151 | P a g e","options":{"A":"Self-service password reset","B":"Pa
