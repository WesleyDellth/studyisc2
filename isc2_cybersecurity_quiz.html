<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISC2 Cybersecurity Exam Practice</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0c0f1a;
  --surface: #151929;
  --surface-hover: #1c2137;
  --border: #2a2f45;
  --text: #e2e4ed;
  --text-dim: #8b90a5;
  --accent: #6c7aff;
  --accent-glow: rgba(108,122,255,0.15);
  --correct: #22c55e;
  --correct-bg: rgba(34,197,94,0.1);
  --correct-border: rgba(34,197,94,0.4);
  --wrong: #ef4444;
  --wrong-bg: rgba(239,68,68,0.1);
  --wrong-border: rgba(239,68,68,0.4);
  --gold: #f59e0b;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.app {
  max-width: 760px;
  margin: 0 auto;
  padding: 20px;
}

/* --- START SCREEN --- */
.start-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 90vh;
  text-align: center;
}

.logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--accent);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.start-screen h1 {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 8px;
  line-height: 1.2;
}

.start-screen p {
  color: var(--text-dim);
  font-size: 16px;
  margin-bottom: 40px;
}

.mode-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  width: 100%;
  max-width: 500px;
  margin-bottom: 24px;
}

.mode-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px 20px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}

.mode-card:hover {
  border-color: var(--accent);
  background: var(--surface-hover);
  transform: translateY(-2px);
}

.mode-card.selected {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent), 0 0 20px var(--accent-glow);
}

.mode-card h3 { font-size: 16px; margin-bottom: 6px; }
.mode-card span { font-size: 13px; color: var(--text-dim); }

.count-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
}

.count-row label { font-size: 14px; color: var(--text-dim); }

.count-input {
  width: 80px;
  padding: 8px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 16px;
  font-family: 'JetBrains Mono', monospace;
  text-align: center;
}

.count-input:focus { outline: none; border-color: var(--accent); }

.btn {
  padding: 14px 40px;
  font-size: 16px;
  font-weight: 600;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
}

.btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }

.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-secondary:hover { border-color: var(--accent); }

/* --- QUIZ SCREEN --- */
.quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
}

.progress-info {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--text-dim);
}

.score-live {
  display: flex;
  gap: 20px;
  font-size: 14px;
}

.score-correct { color: var(--correct); }
.score-wrong { color: var(--wrong); }

.progress-bar-track {
  width: 100%;
  height: 4px;
  background: var(--surface);
  border-radius: 2px;
  margin-bottom: 32px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
}

.question-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--accent);
  margin-bottom: 12px;
  letter-spacing: 1px;
}

.question-text {
  font-size: 20px;
  font-weight: 600;
  line-height: 1.5;
  margin-bottom: 28px;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 24px;
}

.option-btn {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  font-size: 15px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  line-height: 1.5;
}

.option-btn:hover:not(.disabled) {
  border-color: var(--accent);
  background: var(--surface-hover);
}

.option-letter {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 13px;
  min-width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  background: var(--bg);
  flex-shrink: 0;
  margin-top: 1px;
}

.option-btn.correct-selected {
  border-color: var(--correct-border);
  background: var(--correct-bg);
}

.option-btn.correct-selected .option-letter {
  background: var(--correct);
  color: #fff;
}

.option-btn.wrong-selected {
  border-color: var(--wrong-border);
  background: var(--wrong-bg);
}

.option-btn.wrong-selected .option-letter {
  background: var(--wrong);
  color: #fff;
}

.option-btn.correct-reveal {
  border-color: var(--correct-border);
  background: var(--correct-bg);
}

.option-btn.correct-reveal .option-letter {
  background: var(--correct);
  color: #fff;
}

.option-btn.disabled { cursor: default; opacity: 0.6; }
.option-btn.disabled:hover { border-color: var(--border); background: var(--surface); }

.explanation-box {
  margin-top: 20px;
  padding: 20px;
  background: var(--surface);
  border-left: 3px solid var(--accent);
  border-radius: 0 10px 10px 0;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-dim);
  animation: fadeIn 0.3s ease;
}

.explanation-box strong {
  color: var(--text);
  display: block;
  margin-bottom: 6px;
  font-size: 13px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.nav-row {
  display: flex;
  justify-content: flex-end;
  margin-top: 28px;
}

/* --- RESULTS SCREEN --- */
.results {
  text-align: center;
  padding: 60px 0;
  animation: fadeIn 0.5s ease;
}

.results-circle {
  width: 180px;
  height: 180px;
  margin: 0 auto 32px;
  position: relative;
}

.results-circle svg {
  transform: rotate(-90deg);
}

.results-circle .pct-text {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.pct-number {
  font-size: 48px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}

.pct-label {
  font-size: 14px;
  color: var(--text-dim);
}

.results h2 {
  font-size: 28px;
  margin-bottom: 8px;
}

.results .subtitle {
  color: var(--text-dim);
  font-size: 16px;
  margin-bottom: 40px;
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 40px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}

.stat-card .val {
  font-size: 28px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}

.stat-card .lbl {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 4px;
}

.stat-card.green .val { color: var(--correct); }
.stat-card.red .val { color: var(--wrong); }
.stat-card.gold .val { color: var(--gold); }

.results-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
}

/* Review section */
.review-section {
  margin-top: 48px;
  text-align: left;
}

.review-section h3 {
  font-size: 18px;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.review-item {
  padding: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 12px;
}

.review-item.was-wrong { border-left: 3px solid var(--wrong); }
.review-item.was-right { border-left: 3px solid var(--correct); }

.review-q {
  font-weight: 600;
  margin-bottom: 8px;
  font-size: 15px;
}

.review-meta {
  font-size: 13px;
  color: var(--text-dim);
  display: flex;
  gap: 16px;
}

.review-your { color: var(--wrong); }
.review-correct-label { color: var(--correct); }

@media (max-width: 600px) {
  .mode-cards { grid-template-columns: 1fr; }
  .stat-grid { grid-template-columns: 1fr; }
  .question-text { font-size: 17px; }
  .start-screen h1 { font-size: 24px; }
}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const ALL_QUESTIONS = [{"id":1,"question":"Which access control is MORE effective at protecting a door against unauthorized access?","options":{"A":"Fences","B":"Turnstiles","C":"Barriers","D":"Locks"},"correct":"D","explanation":"A lock is a device that prevents a physical structure (typically a door) from being opened, indicating that only the authorized person (i.e. the person with the key) can open it. A fence or a barrier will prevent ALL access. Turnstiles are physical barriers that can be easily overcome (after all, it is common knowledge that intruders can easily jump over a turnstile when no one is watching)."},{"id":2,"question":"Which type of attack PRIMARILY aims to make a resource inaccessible to its intended users?","options":{"A":"Phishing","B":"Denial of Service","C":"Trojans","D":"Cross-Site Scripting"},"correct":"B","explanation":"A denial of service attack (DoS) consists in compromising the availability of a system or service through a malicious overload of requests, which causes the activation of safety mechanisms that delay or limit the availability of that system or service. Due to this, systems or services are rendered inaccessible to their intended users. Trojans, phishing, and cross-site scripting attacks try to covertly gain access to the system or data, and therefore do not primarily aim at compromising the syste"},{"id":3,"question":"Which devices have the PRIMARY objective of collecting and analysing security events?","options":{"A":"Firewalls","B":"Hubs","C":"Routers","D":"SIEM"},"correct":"D","explanation":"A Security Information and Event Management (SIEM) system is an application that gathers security data from information system components and presents actionable information through a unified interface. Routers and Hubs aim to receive and forward traffic. Firewalls filter incoming traffic. Neither of these last three options aims at collecting and analysing security events."},{"id":4,"question":"Which access control model specifies access to an object based on the subject's role in the organization?","options":{"A":"RBAC","B":"MAC","C":"ABAC","D":"DAC"},"correct":"A","explanation":"The role-based access control (RBAC) model is well known for governing access to objects based on the roles of individual users within the organization. Mandatory access control is based on security classifications. Attribute-based access control is based on complex attribute rules. In discretionary access control, subjects can grant privileges to other subjects and change some of the security attributes of the objects they have access to. 3|P a g e"},{"id":5,"question":"When a company hires an insurance company to mitigate risk, which risk management technique is being applied?","options":{"A":"Risk transfer","B":"Risk avoidance","C":"Risk mitigation","D":"Risk tolerance"},"correct":"A","explanation":"Risk transfer is a risk management strategy that contractually shifts a pure risk from one party to another (in this case, to an insurance company). Risk avoidance consists in stopping activities and exposures that can negatively affect an organization and its assets. Risk mitigation consists of mechanisms to reduce the risk. Finally, risk tolerance is the degree of risk that an investor is willing to endure."},{"id":8,"question":"How many data labels are considered manageable?","options":{"A":"1 \u2013 2","B":"1","C":"2 \u2013 3","D":"> 4"},"correct":"C","explanation":"According to data handling and labeling best practices, two or three classifications for data are typically considered manageable for most organizations. In fact, in the ISC2 Study Guide, Chapter 5, Module 1, under Data Handling Practices in Labeling, we read that \"two or three classifications are manageable, but more than four tend to be challenging to manage. These classifications could be labels such as Public, Confidential, and Restricted, each representing a different level of data sensitiv"},{"id":9,"question":"In Change Management, which component addresses the procedures needed to undo changes?","options":{"A":"Request for Approval","B":"Rollback","C":"Request for Change","D":"Disaster and Recover"},"correct":"B","explanation":"In Change Management, the Request For Change (RFC) is the first stage of the request: it formalizes the change from the stakeholders' point of view. The next phase is the Approval phase, where each stakeholder reviews the change, identifies and allocates the corresponding resources, and eventually either approves or rejects the change (appropriately documenting the approval or rejection). Finally, the Rollback phase addresses the actions to take when the monitoring change suggests a failure or i"},{"id":11,"question":"Which cloud deployment model is suited to companies with similar needs and concerns?","options":{"A":"Community cloud","B":"Private cloud","C":"Multi-tenant","D":"Hybrid cloud"},"correct":"A","explanation":"The correct answer is B. Community cloud deployment models are where several organizations with similar needs and concerns (technological or regulatory) share the infrastructure and resources of a cloud environment. This model is attractive because it is cost-effective while addressing the specific requirements of the participating organizations. A private cloud is a cloud computing model where the cloud infrastructure is dedicated to a single organization (and never shared with others). A hybri"},{"id":12,"question":"Which of these would be the best option if a network administrator needs to control access to a network?","options":{"A":"HIDS","B":"IDS","C":"SIEM","D":"NAC"},"correct":"D","explanation":"Network Access Control (NAC) refers to a class of mechanisms that prevent access to a network until a user (or the user's device) either presents the relevant credentials, or passes the results of health checks performed on the client device. Security Information and Event Management (SIEM), Host Intrusion Detection Systems (HIDS), and Intrusion Detection Systems (IDS) are all monitoring systems."},{"id":13,"question":"In order to find out whether personal tablet devices are allowed in the office, which of the following policies would be helpful to read?","options":{"A":"Change Management Policy","B":"BYOD","C":"Privacy Policy","D":"AUP"},"correct":"B","explanation":"The Bring Your Own Device (BYOD) policy establishes rules for using personal devices for work-related activities. The Acceptable Use Policy (AUP) defines the permissions and limitations that users must agree to while accessing the network and using computer systems or any other organizational resources. The Privacy Policy (PP) outlines the data security mechanisms that protect customer data. In the context of Cybersecurity, a Change Management Policy (CMP) establishes the use of standardized met"},{"id":14,"question":"Governments can impose financial penalties as a consequence of breaking a:","options":{"A":"Regulation","B":"Procedure","C":"Standard","D":"Policy"},"correct":"A","explanation":"Standards are created by governing or professional bodies (not by governments themselves). Policies and procedures are created by organizations, and are therefore not subject to financial penalties (see ISC2 Study Guide Chapter 1, Module 4)"},{"id":15,"question":"In incident terminology, the meaning of Zero Day is:","options":{"A":"Days to solve a previously unknown system vulnerability","B":"Days without a cybersecurity incident","C":"Days with a cybersecurity incident","D":"A previously unknown system vulnerability"},"correct":"D","explanation":"A 'Zero Day' is an unknown system vulnerability that can be exploited since it does not yet exist in any vulnerability database. Moreover, these vulnerabilities do not generally fit recognized patterns, signatures or methods (see ISC2 Study Guide Chapter 2, Module 1, under Incident Terminology), making them very hard to detect and prevent."},{"id":16,"question":"What is an effective way of hardening a system?","options":{"A":"Patch the system","B":"Create a DMZ for web application services","C":"Have an IDS in place","D":"Run a vulnerability scan"},"correct":"A","explanation":"According to NIST SP 800-152, hardening is defined as the process of eliminating the means of an attack by simultaneously patching vulnerabilities and turning off nonessential services. The ISC2 Study Guide, chapter 5, module 2, under Configuration Management Overview, reads \"One of the best ways to achieve a hardened system is to have updates, patches, and service packs installed automatically\". Vulnerability scans and IDS do not eliminate the means of an attack. The DMZ does not eliminate vuln"},{"id":17,"question":"The address 8be2:4382:8d84:7ce2:ec0f:3908:d29b:903a is an:","options":{"A":"Web address","B":"IPv6 address","C":"Mac address","D":"IPv4 address"},"correct":"B","explanation":"An IPv6 address is a 128-bit address represented as a sequence of eight groups of 16-bit hexadecimal values. An IPv4 address is a 32-bit address represented as a sequence of four 8-bit integers. A Mac address is a 48-bit address represented as six groups of 8 bits values in hexadecimal. A web address consists of a protocol name, a server address, and a resource path (see ISC2 Study Guide, chapter 4, module 1 - Understand Computer Networking)."},{"id":18,"question":"Which of these types of user is LESS likely to have a privileged account?","options":{"A":"System Administrator","B":"Security Analyst","C":"External Worker","D":"Help Desk"},"correct":"C","explanation":"Typically, external workers should not have access to privileged accounts, due to the possibility of misuse. The Help Desk (or IT Support Staff) may have to view or manipulate endpoints, servers and applications platforms using privileged or restricted operations. Security analysts may require fast access to the IT infrastructure, systems, endpoints and data environment. By definition, systems administrators require privileged accounts, since they are responsible for operating systems, deploying"},{"id":19,"question":"A device found not to comply with the security baseline should be:","options":{"A":"Disabled or isolated into a quarantine area until it can be checked and updated","B":"Marked as potentially vulnerable and placed in a quarantine area","C":"Disabled or separated into a quarantine area until a virus scan can be run","D":"Placed in a demilitarized zone (DMZ) until it can be reviewed and updated"},"correct":"A","explanation":"Security baselines are used to guarantee that network devices, software, hardware and endpoints are configured consistently. Baselines ensure that all such devices comply with the security baseline set by the organization. Whenever a device is found not compliant with the security baseline, it may be disabled or isolated into a quarantine area until it can be checked and updated (see ISC2 Study Guide, chapter 5, module 2, under Configuration Management Overview). A DMZ is a protected boundary ne"},{"id":20,"question":"Which type of attack attempts to gain information by observing the device's power consumption?","options":{"A":"Side Channels","B":"Trojans","C":"Cross Site Scripting","D":"Denial of Service"},"correct":"A","explanation":"A side-channel attack is a passive and non-invasive attack aiming to extract information from a running system, by using special-purpose hardware to perform power monitoring, as well as timing and fault analysis attacks. The remaining are software-based attacks. 10 | P a g e"},{"id":21,"question":"Which of these is not an attack against an IP network?","options":{"A":"Man-in-the-middle Attack","B":"Oversized Packet Attack","C":"Side-channel Attack","D":"Fragmented Packet Attack"},"correct":"C","explanation":"Man-in-the-middle Attacks, Oversized Packet Attacks, and Fragmented Packet Attacks are typical IP network attacks (see ISC2 Study Guide, Chapter 4, Module 1, under Security of the Network). Side Channel Attacks are non-invasive attacks that extract information from devices (typically devices running cryptographic algorithms), and therefore do not aim at IP networks."},{"id":22,"question":"Which of the following attacks take advantage of poor input validation in websites?","options":{"A":"Cross-Site Scripting","B":"Rootkits","C":"Phishing","D":"Trojans"},"correct":"A","explanation":"Cross-Site Scripting (XSS) is a type of attack where malicious executable scripts are injected into the code of an otherwise benign website (or web application). Websites are vulnerable to XSS when they display data originating from requests or forms without validating it (and further sanitizing it, so that it is not executable). Trojans and phishing are attacks where software applications and messages try to appear legitimate but have hidden malicious functions, not necessarily relying on poor "},{"id":24,"question":"The last phase in the data security cycle is:","options":{"A":"Destruction","B":"Backup","C":"Archival","D":"Encryption"},"correct":"A","explanation":"According to the data security lifecycle model, the last phase is Data Destruction, which aims at guaranteeing that data contained in a given support is erased and destroyed in a way that renders it completely irrecoverable by any means (see ISC2 Study Guide, chapter 5, module 1, under Data Handling). Archival refers to the process whereby an organization creates a long-term data archive for compliance, storage reduction or business intelligence. A Backup is a copy of files and programs created "},{"id":25,"question":"Which of the following types of devices inspect packet header information to either allow or deny network traffic?","options":{"A":"Firewalls","B":"Hubs","C":"Routers","D":"Switches"},"correct":"A","explanation":"12 | P a g e Standard firewalls examine IP packet headers and flags in order to block or allow traffic from predefined rules. More recently, firewalls with Intrusion Detection Capability (IDC) also analyze each individual packet, looking for specific patterns known to be malicious, and then blocking traffic whenever such patterns are found. Routers, Switches, and Hubs have limited packet filtering capabilities, or none at all. A Router is a device that acts as a gateway between two or more netwo"},{"id":26,"question":"Which of the following principles aims primarily at fraud detection?","options":{"A":"Least Privilege","B":"Privileged Accounts","C":"Separation of Duties","D":"Defense in Depth"},"correct":"C","explanation":"According to the principle of Separation of Duties, operations on objects are to be segmented (often referred to as 'transactions'), requiring distinct users and authorizations. The involvement of multiple users guarantees that no single user can perpetrate and conceal errors or fraud in their duties. To the extent that users have to review the work of other users, Separation of Duties can also be considered a mechanism of fraud detection (see ISC2 Study Guide Chapter 1, Module 3). The principle"},{"id":27,"question":"Which of the following is a detection control?","options":{"A":"Smoke sensors","B":"Bollards","C":"Firewalls","D":"Turnstiles"},"correct":"A","explanation":"By definition, smoke detectors are fire protection devices employed for the early detection of fire. Firewalls are devices that filter incoming traffic, and are a type of logical preventive control. Bollards and turnstiles are types of physical preventive controls."},{"id":28,"question":"Which port is used to secure communication over the web (HTTPS)?","options":{"A":"69","B":"25","C":"80","D":"443"},"correct":"D","explanation":"All options show examples of logical communication ports. Port 80 is reserved for plain HTTP connections, port 69 for TFTP protocol; and port 25 for SMTP protocol. Port 443 is the one reserved for HTTPS connections."},{"id":29,"question":"Which protocol uses a three-way handshake to establish a reliable connection?","options":{"A":"UDP","B":"SNMP","C":"TCP","D":"SMTP"},"correct":"C","explanation":"14 | P a g e TCP uses a three-way handshake to establish a reliable connection by exchanging three packets with theSYN, SYN/ACK, and ACK flags. SMTP uses a two-way handshake. Neither UDP nor SNMP require a handshake phase."},{"id":30,"question":"Which of the following is an example of an administrative security control?","options":{"A":"No entry signs","B":"Access Control Lists","C":"Acceptable Use Policies","D":"Badge Readers"},"correct":"C","explanation":"Policies are a type of administrative security controls. An access control list is a type of technical security control. A badge reader and a 'No entry' sign are types of physical security controls (see ISC2 Study Guide, Chapter 1, Module 3)."},{"id":31,"question":"A best practice of patch management is to:","options":{"A":"Apply patches according to the vendor's reputation","B":"Apply all patches as quickly as possible","C":"Apply patches every Wednesday","D":"Test patches before applying them"},"correct":"D","explanation":"Patches sometimes disrupt a system's configurations and stability. One of the main challenges for security professionals is to ensure that patches are deployed as quickly as possible, while simultaneously ensuring the stability of running systems. To prevent flawed patches from negatively affecting running systems, it is good practice to test patches in a designated qualification environment before applying them to production systems (see ISC2 Study Guide, chapter 5, module 2 under Configuration"},{"id":32,"question":"Which security principle states that a user should only have the necessary permission to execute a task?","options":{"A":"Separation of Duties","B":"Least Privilege","C":"Privileged Accounts","D":"Defense in Depth"},"correct":"B","explanation":"The principle of Defense in Depth refers to using multiple layers of security. The principle of Least Privilege states that subjects should be given only those privileges required to complete their specific tasks (ISC2 Study Guide Chapter 1, Module 3). Separation of Duties states that no user should ever be given enough privileges to misuse the system. Finally, Privileged Accounts are accounts with permissions beyond those of regular users, such as manager and administrator accounts."},{"id":35,"question":"In which cloud model does the cloud customer have LESS responsibility over the infrastructure?","options":{"A":"SaaS","B":"FaaS","C":"IaaS","D":"PaaS"},"correct":"A","explanation":"In Software as a Service (SaaS), consumers may control user-specific application configuration settings, but neither the underlying application logic nor the infrastructure. In the Function as a Service (FaaS) model, cloud customers deploy application-level functionality (typically as microservices) and are charged only when this functionality is executed. In Platform as a Service (PaaS), the cloud customer does not manage or control the underlying cloud infrastructure (which includes the networ"},{"id":36,"question":"What is the consequence of a Denial of Service attack?","options":{"A":"Remote control of a device","B":"Exhaustion of device resources","C":"Malware Infection","D":"Increase in the availability of resources"},"correct":"B","explanation":"A denial of service attack (DoS) consists in a malicious overload of requests which will eventually lead to the exhaustion of resources, rendering the service unavailable, as well as causing the activation of safety mechanisms that delay or limit the availability of that system or service. This type of attack seeks to compromise service availability, but not to control a device nor to install malware"},{"id":37,"question":"In which of the following access control models can the creator of an object delegate permission?","options":{"A":"RBAC","B":"MAC","C":"DAC","D":"ABAC"},"correct":"C","explanation":"In a Discretionary Access control model, the permissions associated with each object (file or data) are set by the owner of the object. In this model, the creator of an object implicitly becomes its owner, and therefore can decide who will have permission over the objects. In the remaining models, access specifications are centrally determined."},{"id":38,"question":"Which of the following is NOT a possible model for an Incident Response Team (IRT)?","options":{"A":"Dedicated","B":"Hybrid","C":"Pre-existing","D":"Leveraged"},"correct":"C","explanation":"The three possible models for incident response are Leveraged, Dedicated, and Hybrid (see the ISC2 Study Guide, Chapter 2, Module 1, under Chapter Takeaways). The term 'Pre-existing' is not a valid model for an IRT."},{"id":39,"question":"Which are the components of an incident response plan?","options":{"A":"Preparation \u2192 Detection and Analysis \u2192 Containment \u2192 Eradication \u2192 Post- Incident Activity \u2192 Recovery","B":"Preparation \u2192 Detection and Analysis \u2192 Containment, Eradication and Recovery \u2192 Post-Incident Activity","C":"Preparation \u2192 Detection and Analysis \u2192 Recovery \u2192 Containment \u2192 Eradication \u2192 Post-Incident Activity","D":"Preparation \u2192 Detection and Analysis \u2192 Eradication \u2192 Recovery \u2192 Containment \u2192 Post-Incident Activity"},"correct":"B","explanation":"The components commonly found in an incident response plan are (in this order): Preparation; Detection and Analysis; Containment, Eradication and Recovery; Post- Incident Activity (see the ISC2 Chapter 2, Module 1, under Components of an Incident Response Plan)."},{"id":40,"question":"With respect to risk management, which of the following options should be prioritized?","options":{"A":"The expected probability of occurrence is high, and the potential impact is low","B":"The frequency of occurrence is low, and the expected impact value is high","C":"The expected probability of occurrence is low, and the potential impact is low","D":"The frequency of occurrence is high, and the expected impact value is low"},"correct":"B","explanation":"The highest priority should be given to risks estimated to high impact and low probability over high probability and low impact value (ISC2 Study Guide, Chapter 1, Module 2). In qualitative risk analysis, the 'expected probability of occurrence' and the 'frequency of occurrence' refer to the same thing. The same goes for the concepts of expected impact value (NIST SP 800-30 Rev. 1 under Impact Value) and potential impact (NIST SP 800-60 Vol. 1 Rev. 1 under Potential Impact). 19 | P a g e `"},{"id":41,"question":"Which access control model can grant access to a given object based on complex rules?","options":{"A":"RBAC","B":"DAC","C":"ABAC","D":"MAC"},"correct":"C","explanation":"ABAC is an access control model that controls access to objects using rules that are evaluated according to the attributes of the subject, relevant objects, and attributes of the environment and action. The RBAC and MAC models are based on more straightforward and relatively less flexible rule systems, which are evaluated according to subject roles and security classifications. The rules that can be specified in a DAC model are even simpler than those of the previous two models"},{"id":42,"question":"Which of these has the PRIMARY objective of identifying and prioritizing critical business processes?","options":{"A":"Disaster Recovery Plan","B":"Business Impact Analysis","C":"Business Impact Plan","D":"Business Continuity Plan"},"correct":"B","explanation":"The term 'Business Impact Plan' does not exist. A Business Impact Analysis (BIA) is a technique for analyzing how disruptions can affect an organization, and determines the criticality of all business activities and associated resources. A Business Continuity Plan (BCP) is a pre-determined set of instructions describing how the mission/business processes of an organization will be sustained during and after a significant disruption. A Disaster Recovery Plan is a written plan for recovering infor"},{"id":43,"question":"Which of the following are NOT types of security controls?","options":{"A":"System-specific controls","B":"Common controls","C":"Hybrid controls","D":"Storage controls"},"correct":"D","explanation":"Storage controls are not a type of security control. Security controls are safeguards or countermeasures that an organization can employ to avoid, counteract or minimize security risks. System-specific controls are security controls that provide security capability for only one specific information system. Common controls are security controls that provide security capability for multiple information systems. Hybrid controls have characteristics of both system-specific and common controls."},{"id":44,"question":"Provide active and qualified service to principal","options":{"A":"Act honorably, honestly, justly, responsibly and legally","B":"Advance and protect the profession","C":"Protect society, the common good, necessary public trust","D":"confidence, and the infrastructure"},"correct":"A","explanation":"In the code of ethics, we read \"Provide diligent and competent service to principals\", and not \"Provide active and qualified service to principals.\"; all the other options are valid canons of the code of ethics (see ISC2 Study Guide Chapter 1, Module 5)."},{"id":47,"question":"Which of the following is NOT a protocol of the OSI Level 3?","options":{"A":"ICMP","B":"IP","C":"SNMP","D":"IGMP"},"correct":"C","explanation":"Internet Protocol (IP) is known to be a level 3 protocol. Internet Control Message Protocol (ICMP) and Internet Group Management Protocol (IGMP) are also level 3 protocols. Simple Network Management Protocol (SNMP) is a protocol used to configure and 22 | P a g e monitor devices attached to networks. It is an application-level protocol (level 7), and therefore the only option that is not from level 3."},{"id":48,"question":"Which are the three packets used on the TCP connection handshake?","options":{"A":"SYN \u2192 ACK \u2192 FIN","B":"Offer \u2192 Request \u2192 ACK","C":"SYN \u2192 SYN/ACK \u2192 ACK","D":"Discover \u2192 Offer \u2192 Request"},"correct":"C","explanation":"TCP uses a three-way handshake to establish a reliable connection by exchanging three packets with the SYN, SYN/ACK and ACK flags. Although SYN, ACK and FIN are valid TCP packet flags, the sequence SYN \u2192 ACK \u2192 FIN is not the TCP handshake. Both the sequences Discover \u2192 Offer \u2192 Request and Offer \u2192 Request \u2192 ACK are used in DHCP (but are still incomplete, since DHCP is a four-way handshake)."},{"id":49,"question":"Which of the following is NOT a type of learning activity used in Security Awareness?","options":{"A":"Tutorial","B":"Awareness","C":"Education","D":"Training"},"correct":"A","explanation":"The three learning activities that organizations use in training for security awareness are Education, Training and Awareness (see ISC2 Study Guide, chapter 5, module 4). A tutorial is a form of training, but is not on the list of types of learning activities."},{"id":50,"question":"Which regulations address data protection and privacy in Europe?","options":{"A":"FISMA","B":"HIPAA","C":"SOX","D":"GDPR"},"correct":"D","explanation":"The General Data Protection Regulation (GDPR) is the official EU regulation for data protection and privacy. The remaining three options only apply to the United States. The Federal Information Security Management Act (FISMA) contains guidelines and security standards that protect government information and operations in the United States. The Sarbanes\u2013Oxley (SOx) Act of 2002 is a United States federal law that mandates and regulates financial record-keeping and reporting practices for corporati"},{"id":52,"question":"Sensitivity is a measure of the \u2026:","options":{"A":"\u2026 pertinence assigned to information by its owner, or the purpose of representing its need for urgency","B":"\u2026 protection and timeliness assigned to information by its owner, or the purpose of representing its need for urgency","C":"\u2026 importance assigned to information by its owner, or the purpose of representing its need for protection","D":"\u2026 urgency and protection assigned to information by its owner"},"correct":"C","explanation":"24 | P a g e Sensitivity is also defined as the measure of the importance assigned to information by its owner, or the purpose of representing its need for protection (see the ISC2 study guide, module 1, under CIA Deep Dive)."},{"id":53,"question":"Which of the following is NOT an example of a physical security control?","options":{"A":"Security cameras","B":"Biometric access controls","C":"Remote control electronic locks","D":"Firewalls"},"correct":"D","explanation":"Firewalls are a type of electronic equipment which connects to a network that filters inbound traffic arriving from the Internet, and, thus are a type of technical security controls. Security cameras, biometric access control and electronic locks, though connected to a network, control access to physical facilities, and thus are types of physical security controls. (ISC2 Study Guide, Chapter 1, Module 3)"},{"id":54,"question":"Risk Management is:","options":{"A":"The assessment of the potential impact of a threat","B":"The identification, evaluation and prioritization of risks","C":"The impact and likelihood of a threat","D":"The creation of an incident response team"},"correct":"B","explanation":"Risk Management is the process of identifying, assessing and mitigating risks (ISC2 Study Guide, chapter 1, module 2). \"Impact and likelihood of a threat\" is a definition of risk. \"Creating an incident response team\" and \"assessing the potential impact of a threat\" can be considered Risk Management actions, but are not in themselves Risk Management."},{"id":56,"question":"What type of security control is the biometric reader that grants access to the data center building?","options":{"A":"Administrative Control","B":"Physical Control","C":"Technical Control","D":"Authorization Control"},"correct":"B","explanation":"Physical controls have to do with the architectural features of buildings and facilities. Administrative controls are connected to the actions of people within the organization. Technical controls are implemented inside of computer systems. Authorization controls relate to the assets to which a user is granted access inside a particular computer system (see ISC2 Study Guide Chapter 1, Module 3)."},{"id":57,"question":"Which of the following areas is connected to PII?","options":{"A":"Non-repudiation","B":"Authentication","C":"Integrity","D":"Confidentiality"},"correct":"D","explanation":"Confidentiality is the most distinctive property of personally identifiable information (see ISC2 study guide, Module 1, under CIA Deep Dive). The remaining options apply to all types of data. All data requires integrity to be usable. Non-repudiation refers to the inability to deny the production, approval, or transmission of information. Authentication refers to the access to information. 26 | P a g e"},{"id":58,"question":"An exploitable weakness or flaw in a system or component is a:","options":{"A":"Vulnerability","B":"Bug","C":"Threat","D":"Risk"},"correct":"A","explanation":"A Vulnerability is a weakness in an information system, system security procedures, internal controls or implementation that could be exploited by a Threat source (NIST SP 800-30 Rev 1). The Threat is the circumstance or event that can adversely impact operations. A Risk is a possible event that can negatively impact the organization. A Bug is a flaw causing an application to produce an unintended or unexpected result that may be exploitable."},{"id":59,"question":"In which of the following phases of an Incident Recovery Plan are incident responses prioritized?","options":{"A":"Post-incident Activity","B":"Detection and Analysis","C":"Contentment, Eradication, and Recovery","D":"Preparation"},"correct":"B","explanation":"Incident responses are prioritized in the Detection and Analysis phase (see the ISC2 Study Guide, Chapter 2, Module 1, under Components of Incident Response)."},{"id":60,"question":"Which of the following properties is NOT guaranteed by Digital Signatures?","options":{"A":"Authentication","B":"Non-repudiation","C":"Confidentiality","D":"Integrity"},"correct":"B","explanation":"The correct answer is B. A digital signature is the result of a cryptographic transformation of data which is useful for providing: data origin authentication, data integrity, and non- 27 | P a g e repudiation of the signer (see NIST SP 800-12 Rev. 1 under Digital Signature). However, digital signatures cannot guarantee confidentiality (i.e. the property of data or information not being made available or disclosed)."},{"id":61,"question":"Which of these is NOT a change management component?","options":{"A":"RFC","B":"Governance","C":"Approval","D":"Rollback"},"correct":"B","explanation":"All significant change management practices address typical core activities: Request For Change (RFC), Approval, and Rollback (see ISC2 Study Guide, chapter 5, module 3). Governance is not one of these practices."},{"id":62,"question":"In the event of a disaster, what should be the primary objective?","options":{"A":"Protection of the production database","B":"Guarantee the safety of people","C":"Application of disaster communication","D":"Guarantee the continuity of critical systems"},"correct":"B","explanation":"In the event of a disaster, the primary objective should always be to ensure the safety of people (see ISC2 Study Guide, Chapter 2, Module 1). Human life is the most valuable asset, and ensuring the safety of everyone involved should always be the first priority. For example, in the event of a fire in a data center, the first step should be to evacuate all personnel to a safe location before attempting to salvage any equipment or data. While deploying disaster communications, protecting the prod"},{"id":63,"question":"Which of the following canons is found in the (ISC)\u00b2 code of ethics?","options":{"A":"Act honorably, honestly, safely and legally","B":"Provide diligent and competent service to principals","C":"Advance and promote the profession","D":"Protect society, the common good, and the infrastructure"},"correct":"B","explanation":"Only \"Provide diligent and competent service to principals\" contains the accurate text of the ISC2 code of ethics. Although a security professional should discourage unsafe practices, no direct reference to acting safely exists in the canons. Aside from society, the common good and infrastructure, security professionals are expected to protect public trust and confidence. Finally, they are expected to protect the profession, and not just advance and promote it."},{"id":64,"question":"The magnitude of the harm expected as a result of the consequences of an unauthorized disclosure, modification, destruction, or loss of information, is known as the:","options":{"A":"Vulnerability","B":"Likelihood","C":"Threat","D":"Impact"},"correct":"D","explanation":"The sentence matches the definition of the concept of impact (see NIST SP 800-60 Vol. 1 Rev. 1 under Impact). Furthermore, the ISC2 Study Guide, chapter 1, defines likelihood as the probability that a potential vulnerability may be exploited. A threat is defined as a circumstance or event that can adversely impact organizational operations. A vulnerability is a weakness that a threat can exploit."},{"id":65,"question":"Which of the following is NOT a social engineering technique?","options":{"A":"Pretexting","B":"Segregation","C":"Quid pro quo 29 | P a g e","D":"Baiting"},"correct":"B","explanation":"In cybersecurity, 'segregation', or 'segregation of duties' (SoD), is a security principle designed to prevent fraud or error by dividing tasks among multiple persons.It is an administrative control that reduces the risk of potential errors or fraud from a single person having control over all aspects of a critical process. The remaining options are valid social engineering techniques. Baiting is a social engineering attack in which a scammer uses a false promise to lure a victim. Pretexting is "},{"id":66,"question":"A web server that accepts requests from external clients should be placed in which network?","options":{"A":"Intranet","B":"Internal Network","C":"VPN","D":"DMZ"},"correct":"D","explanation":"In Cybersecurity, a DMZ (demilitarized zone) is a physical or logical subnetwork that contains and exposes external-facing services (such as web services). An Internal Network is an organization-controlled network that is isolated from external access. An Intranet is itself an internal network that supports similar protocols and services to the Internet, but only for the organization's internal use. A Virtual Private Network (VPN) creates a secure tunnel between endpoints (whether between networ"},{"id":68,"question":"The process that ensures that system changes do not adversely impact business operations is known as:","options":{"A":"Change Management","B":"Inventory Management","C":"Vulnerability Management","D":"Configuration Management"},"correct":"A","explanation":"Change Management is the process of implementing necessary changes so that they do not adversely affect business operations (see ISC2 Study Guide, chapter 5, module 3). Vulnerability Management refers to the capacity to identify, track, prioritize and eliminate vulnerabilities in systems and devices. Configuration Management refers to a collection of activities with the purpose of establishing and maintaining the integrity of information systems through their development lifecycle (see NIST SP 1"},{"id":69,"question":"Which of the following is a data handling policy procedure?","options":{"A":"Collect","B":"Destroy","C":"Encode","D":"Transform"},"correct":"B","explanation":"The data handling procedures are 'Classify', 'Categorize', 'Label', 'Store', 'Encrypt', 'Backup', and 'Destroy' (see ISC2 Study Guide, chapter 5, module 3). 31 | P a g e"},{"id":70,"question":"The cloud deployment model where a company has resources on-premise and in the cloud is known as:","options":{"A":"Private cloud","B":"Hybrid cloud","C":"Multi-tenant","D":"Community cloud"},"correct":"B","explanation":"A hybrid cloud is a model that combines (i.e. orchestrates) on-premise infrastructure, private cloud services, and a public cloud to handle storage and service. A community cloud is an infrastructure where multiple organizations share resources and services based on common technological and regulatory necessities. Multi-tenancy refers to a context where several of a cloud vendor's customers share the same computing resources. A private cloud is a cloud computing model where the cloud infrastruct"},{"id":71,"question":"A security safeguard is the same as a:","options":{"A":"Security control","B":"Security principle","C":"Safety control","D":"Privacy control"},"correct":"A","explanation":"Security safeguards are approved security measures taken to protect computational resources by eliminating or reducing the risk to a system. These can be measures like hardware and software mechanisms, policies, procedures, and physical controls (see NIST SP 800-28 Version 2, under safeguard). This definition matches the definition of security control as the means of managing risk, including policies, procedures, guidelines, practices, or organizational structures, which can be of an administrat"},{"id":72,"question":"How many layers does the OSI model have?","options":{"A":"4","B":"6","C":"5","D":"7"},"correct":"D","explanation":"The OSI model organizes communicating systems according to 7 layers: Physical layer, Data Link layer, Network layer, Transport layer, Session layer, Presentation layer, and Application layer (see Chapter 4 - Module 1 under Open Systems Interconnection)."},{"id":73,"question":"The process of verifying or proving the user's identification is known as:","options":{"A":"Integrity","B":"Authentication","C":"Confidentiality","D":"Authorization"},"correct":"B","explanation":"Authentication is the verification of the identity of a user, process or device, as a prerequisite to allowing access to the resources in a given system. In contrast, authorization refers to the permission granted to users, processes or devices to access specific assets. Confidentiality and integrity are properties of information and systems, not processes."},{"id":75,"question":"Which tool is commonly used to sniff network traffic?","options":{"A":"Wireshark","B":"Burp Suite","C":"John the Ripper","D":"Nslookup"},"correct":"A","explanation":"Wireshark is the world's most widely-used and complete network protocol analyzer that, informally speaking, is the \"microscope\" of network traffic. John the Ripper is a famous Open Source password security auditing and password recovery tool. Nslookup is a network administration command-line tool for querying the Domain Name System that obtains the mapping between the domain name, IP address, or other DNS records. Finally, Burp Suite is a set of well-known vulnerability scanning, penetration tes"},{"id":76,"question":"What does SIEM mean?","options":{"A":"System Information and Enterprise Manager","B":"System Information and Event Manager","C":"Security Information and Enterprise Manager","D":"Security Information and Event Manager"},"correct":"D","explanation":"Security Information and Event Management (SIEM) is software for aggregating logs and events from applications, servers, network equipment, and specialized security equipment such as firewalls or Intrusion Prevention systems (IPS). SIEM offers a unified view of security-related data, and is capable of identifying deviations to the regular operation of systems that are often symptoms of attacks. The remaining options do not refer to any common term in Cybersecurity. 34 | P a g e"},{"id":77,"question":"Which of the following is NOT a feature of a cryptographic hash function?","options":{"A":"Reversible","B":"Deterministic","C":"Unique","D":"Useful"},"correct":"A","explanation":"A cryptographic hash function should be unique, deterministic, useful, tamper-evident (also referred to as 'the avalanche effect' or 'integrity assurance') and non-reversible (also referred to as 'one-way'). No reversible means it is impossible to reverse the hash function to derive the original text of a message from its hash output value (see ISC2 Study Guide, chapter 5, module 1, under Encryption Overview). Thus, the 'reversible' feature is not a feature of a hash function."},{"id":78,"question":"The Bell and LaPadula access control model is a form of ----?","options":{"A":"ABAC","B":"MAC","C":"DAC","D":"RBAC"},"correct":"B","explanation":"The Bell and LaPadula access control model arranges subjects and objects into security levels and defines access specifications, whereby subjects can only access objects at certain levels based on their security level. Typical access specifications can be things like \"Unclassified personnel cannot read data at confidential levels\" or \"Top-Secret data cannot be written into the files at unclassified levels\". Since subjects cannot change access specifications, this model is a form of mandatory acc"},{"id":79,"question":"Which of the following is an example of a technical security control? 35 | P a g e","options":{"A":"Access control lists","B":"Fences","C":"Bollards","D":"Turnstiles"},"correct":"A","explanation":"An access control list is a type of technical security control. Bollards, fences and turnstiles control access to physical facilities, and thus are types of physical security controls. (ISC2 Study Guide, Chapter 1, Module 3)"},{"id":80,"question":"Which type of attack has the PRIMARY objective of encrypting devices and their data, and then demanding a ransom payment for the decryption key?","options":{"A":"Ransomware","B":"Cross-Site Scripting","C":"Trojan","D":"Phishing"},"correct":"A","explanation":"Ransomware is malware designed to deny a user or organization access to files on their computer, by encrypting them and demanding a ransom payment for the decryption key. Trojans and phishing can be used to install ransomware on a system or device, but are not themselves the ransomware attack."},{"id":81,"question":"Which of the following documents contains elements that are NOT mandatory?","options":{"A":"Procedures","B":"Guidelines","C":"Policies","D":"Regulations"},"correct":"B","explanation":"Only guidelines contain elements that may not be mandatory. Compliance with policies, procedures and regulations is mandatory (see ISC2 Study Guide Chapter 1, Module 4)."},{"id":82,"question":"Which physical access control would be MOST effective against tailgating?","options":{"A":"Fences","B":"Locks 36 | P a g e","C":"Barriers","D":"Turnstiles"},"correct":"D","explanation":"Turnstiles are designed to allow only one person through at a time, making them the most effective physical access control against tailgating. Tailgating occurs when an unauthorized person follows an authorized person into a secured area. For example, consider a secure corporate office that uses a turnstile at the main entrance. Each employee has a unique badge. When the card is swiped, the turnstile allows one person through. If another person tries to follow (or bypass) without swiping the car"},{"id":83,"question":"The detailed steps to complete tasks supporting departmental or organizational policies are typically documented in:","options":{"A":"Standards","B":"Procedures","C":"Regulations","D":"Policies"},"correct":"B","explanation":"Policies are high-level documents that frame all ongoing activities of an organization to ensure that it complies with industry standards and regulations. Regulations are usually devised by governments. Standards are created by governing or professional bodies to support regulations. Both regulations and standards are created outside of the organization (see ISC2 Study Guide Chapter 1, Module 4)."},{"id":84,"question":"The predetermined set of instructions or procedures to sustain business operations after a disaster is commonly known as:","options":{"A":"Disaster Recovery Plan","B":"Business Impact Analysis 37 | P a g e","C":"Business Continuity Plan","D":"Business Impact Plan"},"correct":"C","explanation":"A Business Continuity Plan (BCP) is a pre-determined set of instructions describing how an organization's mission/business processes will be sustained during and after a significant disruption (see Chapter 2 ISC2 Study Guide, module 4, under Terms and Definitions). A Business Impact Analysis (BIA) is a technique for analyzing how disruptions can affect an organization. A Disaster Recovery Plan is a written plan for recovering information systems in response to a major failure or disaster. The te"},{"id":85,"question":"Security posters are an element PRIMARILY employed in\u2026.?","options":{"A":"Incident Response Plans","B":"Business Continuity Plans","C":"Physical Security Controls","D":"Security Awareness"},"correct":"D","explanation":"Security posters are used to raise the awareness of employees regarding security threats, and thus are primarily employed in Security Awareness (see ISC2 Study Guide, chapter 5, module 4)."},{"id":86,"question":"Which type of attack has the PRIMARY objective controlling the system from outside?","options":{"A":"Rootkits","B":"Cross-Site Scripting","C":"Trojans","D":"Backdoors"},"correct":"D","explanation":"Trojans and Rootkits are often used to install backdoors. A backdoor is a malicious feature that listens for commands on a specific logical port (TCP or UDP) and executes them on the attacked system or device, thereby giving direct control of the system or device to a malicious outside entity (or program). Cross-Site Scripting can execute code with the same permissions as the scripts generated by the target website, compromising the confidentiality and integrity of data transfers between the web"},{"id":87,"question":"38 | P a g e According to the canon \"Provide diligent and competent service to principals\", (ISC)\u00b2 professionals are to:","options":{"A":"Treat all members fairly and, when resolving conflicts, consider public safety and duties to principals, individuals and the profession, in that order","B":"Promote the understanding and acceptance of prudent information security measures","C":"Avoid apparent or actual conflicts of interest","D":"Take care not to tarnish the reputation of other professionals through malice or indifference"},"correct":"C","explanation":"The direction for applying the ethical principles of ISC2 states that avoiding conflicts of interest or the appearance thereof is a consequence of providing diligent and competent service to principals. The other options are consequences of the remaining three ethical principles."},{"id":88,"question":"Which of the following Cybersecurity concepts guarantees that information is accessible only to those authorized to access it?","options":{"A":"Non-repudiation","B":"Authentication","C":"Accessibility","D":"Confidentiality"},"correct":"D","explanation":"Confidentiality, Integrity and Availability are known as the CIA triad, from the model that guides policies for information security. Confidentiality is the property of data or information not being made available or disclosed, which leads to sensitive information being protected from unauthorized access. Integrity refers to the preservation of the consistency, accuracy and trustworthiness of data. Availability is the property of data being consistently and readily accessible to the parties auth"},{"id":89,"question":"Which of the following is LESS likely to be part of an Incident Response Team (IRT)?","options":{"A":"Representatives of senior management","B":"Human Resources","C":"Information security professionals 39 | P a g e","D":"Legal representatives"},"correct":"B","explanation":"The incident response team carries out the post-incident analysis phase of an incident response plan. They are a cross-functional group of individuals representing the management, technical and functional areas of responsibility most directly impacted by a security incident. In the incident response team, we typically find (i) representatives of senior management, (ii) information security professionals, (iii) legal representatives, (iv) public affairs/communications representatives, (v) enginee"},{"id":90,"question":"Which of these is the most efficient and effective way to test a business continuity plan?","options":{"A":"Reviews","B":"Simulations","C":"Discussions","D":"Walkthroughs"},"correct":"B","explanation":"Simulations are full re-enactments of business continuity procedures and can involve most, if not all, of your workforce. They also tend to take place on-site in the relevant business areas. Thus, they are an exceptionally effective way to test your business continuity plan. Walkthroughs verbally carry out specific recovery steps stipulated in the business Continuity plan. Discussion and reviews are static ways of testing the business continuity plan."},{"id":91,"question":"Which devices would be more effective in detecting an intrusion into a network?","options":{"A":"HIDS","B":"Firewalls","C":"Routers","D":"NIDS"},"correct":"D","explanation":"Network intrusion detection systems (NIDS) are network devices that detect malicious traffic on a network. Host intrusion detection systems (HIDS) are applications that 40 | P a g e monitor computer systems for intrusion. Typically, HIDS are not concerned with network devices. A firewall is a device that filters incoming Internet traffic. Routers receive and forward traffic, but (typically) do not analyze it."},{"id":92,"question":"The implementation of Security Controls is a form of:","options":{"A":"Risk reduction","B":"Risk transference","C":"Risk acceptance","D":"Risk avoidance"},"correct":"A","explanation":"The implementation of Security Controls involves taking actions to mitigate risk, and thus is a form of risk reduction. Risk acceptance will take no action, risk avoidance will modify operations in order to avoid risk entirely, and risk transference will transfer the risk to another party."},{"id":93,"question":"Which of the following areas is the most distinctive property of PHI?","options":{"A":"Integrity","B":"Non-repudiation","C":"Confidentiality","D":"Authentication"},"correct":"C","explanation":"The correct answer is B. Confidentiality is the most distinctive property of protected health information (see ISC2 Study Guide, Module 1, under CIA Deep Dive). The remaining options apply to all types of data. All data requires integrity to be usable. Non-repudiation refers to the inability to deny the production, approval, or transmission of information. Authentication refers to guaranteeing that systems and information are accessed by persons and systems that are who they claim to be."},{"id":95,"question":"According to (ISC)\u00b2, which are the six phases of data handling?","options":{"A":"Create \u2192 Share \u2192 Store \u2192 Use \u2192 Archive \u2192 Destroy","B":"Create \u2192 Share \u2192 Use \u2192 Store \u2192 Archive \u2192 Destroy","C":"Create \u2192 Use \u2192 Store \u2192 Share \u2192 Archive \u2192 Destroy","D":"Create \u2192 Store \u2192 Use \u2192 Share \u2192 Archive \u2192 Destroy"},"correct":"D","explanation":"According to the data security lifecycle model, the six phases of data security lifecycle model are Create -> Store -> Use -> Share -> Archive -> Destroy (see ISC2 Study Guide, chapter 5, module 1 under data handling)."},{"id":96,"question":"Logging and monitoring systems are essential to:","options":{"A":"Identifying inefficient performing systems, preventing compromises, and providing a record of how systems are used","B":"Identifying inefficient performing systems, detecting compromises, and providing a record of how systems are used","C":"Identifying efficient performing systems, labeling compromises, and providing a record of how systems are used","D":"Identifying efficient performing systems, detecting compromises, and providing a record of how systems are used"},"correct":"B","explanation":"According to the ISC2 Study Guide (chapter 5, module 1, under Data Handling Practices), logging and monitoring systems are characterized as being \"Essential to identifying inefficient performing systems, detecting compromises, and providing a record of how systems are used\". The remaining options are incorrect variations of this definition. 42 | P a g e"},{"id":97,"question":"Which of the following is NOT an element of System Security Configuration Management?","options":{"A":"Updates","B":"Baselines","C":"Audit logs","D":"Inventory"},"correct":"C","explanation":"System Security Configuration Management elements are inventories, baselines, updates and patches. Audit logs can be generated after 'Verification and Audit'. However, 'Verification and Audit' is a configuration management procedure, and not a configuration management element (see ISC2 Study Guide, chapter 5, module 2, under Chapter Resource)."},{"id":98,"question":"Which of the following is a public IP?","options":{"A":"10.221.123.1","B":"192.168.123.1","C":"13.16.123.1","D":"172.16.123.1"},"correct":"C","explanation":"The ranges of IP addresses 10.0.0.0 to 10.255.255.254, 172.16.0.0 to 172.31.255.254, and 192.168.0.0 to 192.168.255.254 are reserved for private use (see ISC2 Study Guide, chapter 4, module 1, under Internet Protocol - IPv4 and IPv6). Therefore, the IP address 13.16.123.1 is the only address in a public range."},{"id":99,"question":"Which of these is the PRIMARY objective of a Disaster Recovery Plan?","options":{"A":"Communicate to the responsible entities the damage caused to operations in the event of a disaster","B":"Restore company operation to the last-known reliable operation state","C":"Maintain crucial company operations in the event of a disaster","D":"Outline a safe escape procedure for the organization's personnel"},"correct":"B","explanation":"A Disaster Recovery Plan (DRP) is a plan for processing and restoring operations in the event of a significant hardware or software failure, or of the destruction of the organization's facilities. The primary goal of a DRP is to restore the business to the last- known reliable state of operations. Maintaining crucial operations is the goal of the 43 | P a g e Business Continuity Plan (BCP). The remaining options may be included in a DRP, but are not its primary objective."},{"id":100,"question":"After an earthquake disrupting business operations, which document contains the procedures required to return business to normal operation?","options":{"A":"The Disaster Recovery Plan","B":"The Business Impact Plan","C":"The Business Continuity Plan","D":"The Business Impact Analysis"},"correct":"A","explanation":"A Disaster Recovery Plan (DRP) is a plan for processing and restoring operations in the event of a significant hardware or software failure, or of the destruction of the organization's facilities. The primary goal of a DRP is to restore the business to the last- known reliable state of operations (see Chapter 2 ISC2 Study Guide, module 4, under The Goal of Disaster Recovery). The term 'Business Impact Plan' does not exist. A Business Continuity Plan (BCP) is a pre-determined set of instructions "},{"id":101,"question":"When an incident occurs, which of the following is NOT a primary responsibility of an organization's incident response team?","options":{"A":"Communicating with top management regarding the circumstances of the cybersecurity event","B":"Implementing the recovery procedures necessary to restore security and recover from any incident-related damage","C":"Determining the scope of the damage caused by the incident","D":"Determining whether any confidential information has been compromised over the course of the entire incident"},"correct":"A","explanation":"While communicating with senior management about the circumstances of a cybersecurity event is important, it is not a primary responsibility of the incident response team. The response team's primary responsibility is to address the immediate impact of the incident and restore security as quickly as possible. For example, if a data breach occurs, the 44 | P a g e response team's focus would be on determining the extent of the breach, determining if any confidential information has been compromis"},{"id":102,"question":"Requiring a specific user role to access resources is an example of which access control model:","options":{"A":"Mandatory Access Control (MAC)","B":"Attribute-Based Access Control (ABAC)","C":"Discretionary Access Control (DAC)","D":"Role-Based Access Control (RBAC)"},"correct":"D","explanation":"Role-Based Access Control (RBAC) restricts access to the resources of a computer or network according to the roles of each individual user in the organization (see ISC2 Study Guide, chapter 3, module 3). Attribute-Based Access Control (ABAC) is based on complex attribute rules. In Discretionary Access Control (DAC), users can grant privileges to other subjects, as well as change the security attributes of objects they have access to. In Mandatory Access Control (MAC), no roles are required, sinc"},{"id":104,"question":"In an Access Control List (ACL), the element that determines what permissions you have is:","options":{"A":"The object","B":"The firmware","C":"The rule","D":"The subject"},"correct":"C","explanation":"An Access Control List (ACL) is a list of rules that specifies which users or systems are granted or denied access (i.e., have permission to access) to a particular object or system resource (see ISC2 Study Guide, chapter 3, module 4). Each rule in the ACL specifies the permissions, such as read, write, or execute, that a subject has over an object. For instance, in a file system, an ACL might include a rule that grants read and write access to a specific user for a particular file. This rule de"},{"id":105,"question":"Which of these is NOT an effective way to protect an organization from cybercriminals?","options":{"A":"Using intrusion detection and prevention systems","B":"Using out-dated anti-malware software","C":"Using firewalls","D":"Removing or disabling unneeded services and protocols"},"correct":"B","explanation":"Using out-dated anti-malware software is NOT an effective way to protect an organization from cybercriminals. Anti-malware software (such as antivirus programs) are designed to detect and remove malware from computer systems and networks. To be effective, it is vital, instead, to ensure that running software is kept up-to-date with the latest security updates and definitions. Other effective ways to protect an organization from cybercriminals are: Removing or disabling unneeded services and prot"},{"id":106,"question":"What is the PRIMARY objective of a rollback in the context of the change management process?","options":{"A":"Establish a minimum understood and acceptable level of security requirements","B":"Restore the system to its last state before the change was made","C":"Validate the system change process","D":"Identify the required changes needed"},"correct":"B","explanation":"In the context of the change management process, the primary objective of a rollback is to restore the system to its last state before the change was made. By rolling back the change, the system can be returned to its previous state, which may help to resolve issues and restore regular operation. Rollbacks can be either triggered automatically in response to a failure or error, or initiated manually during the change management process (see ISC2 Study Guide, chapter 5, module 2). Establishing a "},{"id":107,"question":"What is the PRIMARY objective of a degaussing? 47 | P a g e","options":{"A":"Reducing noisy data on a disk","B":"Preventing magnetic side-channel attacks","C":"Erasing the data on a disk","D":"Retaining the data on a disk"},"correct":"C","explanation":"Degaussing is a technique used to erase data from a magnetic storage device, such as a hard disk drive (HDD) or magnetic tape. In degaussing, devices are exposed to strong magnetic fields that neutralize the magnetic records of the data stored on the device. This effectively erases the data, making it difficult or impossible to recover. Degaussing is often used to securely erase data from storage devices before disposing or repurposing them, thereby ensuring that unauthorized parties cannot acce"},{"id":108,"question":"Which of these pairs does NOT constitute Multi-Factor Authentication (MFA)?","options":{"A":"Fingerprint and password","B":"Username and retina scan","C":"Password and username","D":"PIN and credit card"},"correct":"C","explanation":"Multi-Factor Authentication uses authentication from more than one factor. Passwords and usernames are not multifactor, since they are both 'something you know' (see ISC2 Study Guide, chapter 3, module 1)."},{"id":109,"question":"A security professional should report violations of a company's security policy to:","options":{"A":"A court of law","B":"The ISC Ethics Committee","C":"Company management","D":"National authorities"},"correct":"C","explanation":"The code of ethics requires security professionals to be honest, but not to behave as law enforcers. The violation of a company's security policy should be reported and handled within the company itself (this will typically involve the human resources, legal, and/or management departments) (see ISC2 Study Guide, chapter 2, module 1). Moreover, only individuals can be reported to the (ISC)\u00b2 Ethics Committee (not companies). National authorities can only deal with direct violations of laws and reg"},{"id":110,"question":"Which of these statements is TRUE about cybersquatting?","options":{"A":"It is an illegal practice","B":"It is s a legal practice","C":"Its an unethical practice but everyone does it","D":"It is partially illegal practice"},"correct":"A","explanation":"Cybersquatting (also known as domain squatting) is the practice of speculatively registering and then selling (typically at a high price) a domain name, with the intent of profiting from someone else's trademark. An example would be someone registering the domain name \"mycompany.com\" and then offering to sell it to the owner of the trademark \"MyCompany\" for a high price. Cybersquatting can cause confusion and damage to the trademark owner's brand, which is generally considered unethical and dece"},{"id":111,"question":"When looking for cybersecurity insurance, which of these is the MOST IMPORTANT objective?","options":{"A":"Risk transference","B":"Risk acceptance","C":"Risk spreading","D":"Risk avoidance"},"correct":"A","explanation":"49 | P a g e The purpose of any insurance is to transfer risk from one party to another. The insurer is obligated to indemnify the insured for a loss caused by an unexpected event, over the course of a definite and mutually-agreed period of time. Risk avoidance consists in avoiding or eliminating the actions and conditions that give rise to the risk. Risk spreading consists in spreading a significant amount of risk over a larger part of the organization or activity, namely by manipulating the se"},{"id":112,"question":"Which of these terms refers to a collection of fixes?","options":{"A":"Downgrade","B":"Hotfix","C":"Patch","D":"Service Pack"},"correct":"D","explanation":"A service pack comprises a collection of updates, fixes or enhancements to a software program delivered as a single installable package. A hotfix (or quick-fix) engineering update is a cumulative package which includes information that will be used to address a problem in a software product. A software patch is a quick-repair job for a piece of programming, and is designed to resolve functionality issues, improve security and/or add new features."},{"id":113,"question":"What is the most important difference between Mandatory Access Control (MAC) and Discretionary Access Control (DAC)?","options":{"A":"In MAC, security administrators assign access permissions; in DAC, access permissions are set at the object owner\u2019s discretion","B":"In MAC, security administrators assign access permissions; in DAC, security administrators set user roles","C":"In MAC, security administrators set the roles for the users; in DAC, roles are set at the object owner\u2019s discretion","D":"In MAC, access permissions are set at the object owner\u2019s discretion; in DAC, it is up to security administrators to assign access permissions"},"correct":"A","explanation":"Both Mandatory Access Control (MAC) and Discretionary Access Control (DAC) are used to control access to resources in computer systems (see ISC2 Study Guide, chapter 3, 50 | P a g e module 3). That being said, the two differ in how the access control rules are enforced. In MAC systems, access to resources is granted or denied based on the resource's sensitivity and the user's clearance level, as determined by a central authority. This means that users cannot grant resource access to other users."},{"id":114,"question":"Which of these is NOT a feature of a SIEM (Security Information and Event Management)?","options":{"A":"Log consolidation","B":"Log retention","C":"Log encryption","D":"Log auditing"},"correct":"D","explanation":"Log auditing is not a feature of a SIEM (Security Information and Event Management). A SIEM typically provides the following features: Log consolidation, which consists in collecting logs from various sources (like servers, firewalls or IDS/IPS) and then storing them in one central location. Log retention, which consists in storing logs for a specific period (like 90 days), so as to allow security analysts to keep track of and investigate past events. Log encryption, which is an optional feature"},{"id":111,"question":"What does the term 'data remanence' refer?","options":{"A":"All of the data in a system","B":"Files saved locally that can't be remoted accessed","C":"Data in use that can't be encrypted","D":"Data left over after routine removal and deletion"},"correct":"D","explanation":"51 | P a g e Data Remanence refers to data left over after routine removal and deletion of data from a storage device (see ISC2 Study Guide, chapter 4, module 3). When digital data is deleted, instead of being erased from the storage media, it is often only marked deleted, and the corresponding space is then made available to be overwritten later on. Consequently, deleted data can still be present on the storage media, and can be recovered using the proper media analysis and recovery tools. Data"},{"id":116,"question":"Which of these devices has the PRIMARY objective of determining the most efficient path for the traffic to flow across the network","options":{"A":"Firewalls","B":"Hubs","C":"Switches","D":"Routers"},"correct":"D","explanation":"A router is a networking device whose primary objective is to determine the most efficient path for traffic to flow across a network. Routers connect two or more networks and forward data packets between them according to their destination address (see ISC2 Study Guide, chapter 4, module 1). When a router receives a data packet, it checks the destination address and determines the best route on which to forward the packet, based on its routing table. The routing table is a set of rules that the "},{"id":117,"question":"Which of these is an attack whose PRIMARY goal is to gain access to a target system through falsified identity?","options":{"A":"Ransomware","B":"Spoofing","C":"Amplification","D":"DDoS"},"correct":"B","explanation":"Spoofing is an attack whose primary goal is to gain access to a target system through a falsified identity. In a spoofing attack, the attacker creates or manipulates a digital identity or communication, so as to deceive the target into believing that the attacker is someone or 52 | P a g e something else. There are many different types of spoofing attacks, including email spoofing, IP spoofing
