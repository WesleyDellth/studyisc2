<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompTIA Security+ SY0-701 Quiz</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2e3344;
  --text: #e4e6ef;
  --text-dim: #8b8fa7;
  --accent: #6c5ce7;
  --accent-light: #a29bfe;
  --correct: #00b894;
  --correct-bg: rgba(0,184,148,0.12);
  --wrong: #fd7979;
  --wrong-bg: rgba(253,121,121,0.12);
  --gold: #fdcb6e;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', 'IBM Plex Sans Thai', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

.app { max-width: 800px; margin: 0 auto; padding: 16px; }

/* Header */
.header {
  text-align: center;
  padding: 32px 0 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
.header h1 {
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.header .sub { color: var(--text-dim); font-size: 0.85rem; }

/* Stats bar */
.stats {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.stat-card {
  flex: 1;
  min-width: 80px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  text-align: center;
}
.stat-card .val {
  font-size: 1.3rem;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}
.stat-card .label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-card.correct .val { color: var(--correct); }
.stat-card.wrong .val { color: var(--wrong); }
.stat-card.score .val { color: var(--gold); }

/* Progress bar */
.progress-wrap {
  background: var(--surface);
  border-radius: 6px;
  height: 6px;
  margin-bottom: 20px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  border-radius: 6px;
  transition: width 0.4s ease;
}

/* Question card */
.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  margin-bottom: 16px;
}
.q-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--accent-light);
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.q-topic {
  font-size: 0.65rem;
  background: var(--surface2);
  padding: 2px 8px;
  border-radius: 4px;
  color: var(--text-dim);
}
.q-text {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 6px;
  line-height: 1.5;
}
.q-text-th {
  font-size: 0.88rem;
  color: var(--text-dim);
  margin-bottom: 16px;
  font-family: 'IBM Plex Sans Thai', sans-serif;
  line-height: 1.6;
}
.select-hint {
  font-size: 0.75rem;
  color: var(--accent-light);
  margin-bottom: 8px;
  font-style: italic;
}

/* Options */
.options { display: flex; flex-direction: column; gap: 8px; }
.option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  background: var(--surface2);
  border: 2px solid transparent;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.option:hover:not(.disabled) {
  border-color: var(--accent);
  background: rgba(108,92,231,0.08);
}
.option.selected {
  border-color: var(--accent);
  background: rgba(108,92,231,0.12);
}
.option.correct-answer {
  border-color: var(--correct);
  background: var(--correct-bg);
}
.option.wrong-answer {
  border-color: var(--wrong);
  background: var(--wrong-bg);
}
.option.disabled { cursor: default; opacity: 0.7; }
.option.correct-answer.disabled { opacity: 1; }
.option.wrong-answer.disabled { opacity: 1; }
.option-letter {
  width: 28px;
  height: 28px;
  min-width: 28px;
  border-radius: 50%;
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.8rem;
  font-family: 'JetBrains Mono', monospace;
  margin-top: 1px;
}
.option.correct-answer .option-letter { background: var(--correct); color: #fff; }
.option.wrong-answer .option-letter { background: var(--wrong); color: #fff; }
.option-text { font-size: 0.92rem; line-height: 1.5; }

/* Multi-select checkbox styling */
.option.multi .option-letter {
  border-radius: 5px;
}

/* Explanation */
.explanation {
  margin-top: 16px;
  padding: 16px;
  border-radius: 10px;
  border-left: 3px solid var(--correct);
  background: rgba(0,184,148,0.06);
  animation: fadeIn 0.3s ease;
}
.explanation.wrong-expl {
  border-left-color: var(--wrong);
  background: rgba(253,121,121,0.06);
}
.expl-title {
  font-weight: 700;
  font-size: 0.85rem;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.expl-title.correct { color: var(--correct); }
.expl-title.wrong { color: var(--wrong); }
.expl-en { font-size: 0.88rem; margin-bottom: 8px; line-height: 1.6; }
.expl-th {
  font-size: 0.85rem;
  color: var(--text-dim);
  font-family: 'IBM Plex Sans Thai', sans-serif;
  line-height: 1.7;
  border-top: 1px solid var(--border);
  padding-top: 8px;
}

/* Navigation */
.nav {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
}
.btn {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.btn-prev {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-prev:hover { background: var(--border); }
.btn-next {
  background: var(--accent);
  color: #fff;
}
.btn-next:hover { background: var(--accent-light); color: var(--bg); }
.btn-submit {
  background: var(--correct);
  color: #fff;
}
.btn-submit:hover { background: #00d2a0; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Mode selector */
.mode-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.mode-btn {
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.mode-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.mode-btn:hover:not(.active) { border-color: var(--accent-light); color: var(--text); }

/* Jump to question */
.jump-bar {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 16px;
}
.jump-input {
  width: 70px;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  text-align: center;
}
.jump-input:focus { outline: none; border-color: var(--accent); }
.jump-label { font-size: 0.8rem; color: var(--text-dim); }

/* Results screen */
.results {
  text-align: center;
  padding: 40px 20px;
}
.results h2 {
  font-size: 1.8rem;
  margin-bottom: 8px;
}
.results .big-score {
  font-size: 4rem;
  font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
  margin: 16px 0;
}
.results .big-score.pass { color: var(--correct); }
.results .big-score.fail { color: var(--wrong); }
.results .msg { color: var(--text-dim); margin-bottom: 24px; font-size: 0.95rem; }
.btn-restart {
  padding: 14px 32px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}
.btn-restart:hover { background: var(--accent-light); color: var(--bg); }

/* Review list */
.review-list { margin-top: 24px; text-align: left; }
.review-item {
  padding: 10px 14px;
  margin-bottom: 6px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: center;
  cursor: pointer;
  font-size: 0.85rem;
}
.review-item:hover { border-color: var(--accent); }
.review-icon { font-size: 1.1rem; }
.review-num { font-family: 'JetBrains Mono', monospace; color: var(--text-dim); min-width: 28px; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ─── QUESTION DATA ───
const questions = [
  {
    id:1, topic:"Exam Topic 1",
    q:"A software company is analysing a process that detects software vulnerabilities at the earliest stage possible. The goal is to scan the source looking for unsecure practices and weaknesses before the application is deployed in a runtime environment. Which of the following would BEST assist the company with this objective?",
    qTh:"บริษัทซอฟต์แวร์กำลังวิเคราะห์กระบวนการตรวจจับช่องโหว่ของซอฟต์แวร์ตั้งแต่ระยะแรกสุด เป้าหมายคือสแกน source code เพื่อหาแนวปฏิบัติที่ไม่ปลอดภัยก่อนนำแอปไป deploy ในสภาพแวดล้อมจริง ตัวเลือกใดช่วยได้ดีที่สุด?",

  },
  {

    qTh:"ตัวเลือกใดเป็นแนวคิดทางการเข้ารหัสที่ทำงานบนบิตความยาวคงที่?",
    opts:["Block cipher","Hashing","Key stretching","Salting"],
    ans:[0], multi:false,
    expl:"A block cipher encrypts data in fixed-length groups of bits (blocks) using a symmetric key.",
    explTh:"Block cipher เข้ารหัสข้อมูลเป็นกลุ่มบิตขนาดคงที่ (blocks) โดยใช้ symmetric key"

// ─── APP STATE ───
let state = {
  currentQ: 0,
  answers: {},      // {qIndex: [selectedIndices]}
  revealed: {},     // {qIndex: true}
  mode: 'practice', // 'practice' or 'exam'
  finished: false
};

function render() {
  const app = document.getElementById('app');
  if (state.finished) { renderResults(app); return; }
  
  const q = questions[state.currentQ];
  const answered = state.answers[state.currentQ] !== undefined;
  const revealed = state.revealed[state.currentQ] || false;
  const selected = state.answers[state.currentQ] || [];
  
  const totalAnswered = Object.keys(state.answers).length;
  const correctCount = Object.keys(state.answers).filter(k => isCorrect(parseInt(k))).length;
  const wrongCount = totalAnswered - correctCount;
  const pct = totalAnswered > 0 ? Math.round((correctCount/totalAnswered)*100) : 0;
  
  let html = `
    <div class="header">
      <h1>CompTIA Security+ SY0-701</h1>
      <div class="sub">Interactive Quiz • แบบทดสอบเชิงโต้ตอบ</div>
    </div>
    
    <div class="mode-bar">
      <button class="mode-btn ${state.mode==='practice'?'active':''}" onclick="setMode('practice')">📖 Practice Mode</button>
      <button class="mode-btn ${state.mode==='exam'?'active':''}" onclick="setMode('exam')">🎯 Exam Mode</button>
    </div>
    
    <div class="stats">
      <div class="stat-card"><div class="val">${state.currentQ+1}/${questions.length}</div><div class="label">Question / ข้อ</div></div>
      <div class="stat-card correct"><div class="val">${correctCount}</div><div class="label">Correct / ถูก</div></div>
      <div class="stat-card wrong"><div class="val">${wrongCount}</div><div class="label">Wrong / ผิด</div></div>
      <div class="stat-card score"><div class="val">${pct}%</div><div class="label">Score / คะแนน</div></div>
    </div>
    
    <div class="progress-wrap"><div class="progress-bar" style="width:${((state.currentQ+1)/questions.length)*100}%"></div></div>
    
    <div class="jump-bar">
      <span class="jump-label">Jump to / ข้ามไปข้อ:</span>
      <input class="jump-input" type="number" min="1" max="${questions.length}" value="${state.currentQ+1}" onchange="jumpTo(this.value)">
    </div>
    
    <div class="q-card">
      <div class="q-number">
        <span>Q${q.id}</span>
        <span class="q-topic">${q.topic}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="q-text-th">${q.qTh}</div>
      ${q.multi ? '<div class="select-hint">Select multiple answers / เลือกหลายคำตอบ</div>' : ''}
      <div class="options">`;
  
  const letters = 'ABCDEFGH';
  q.opts.forEach((opt, i) => {
    let cls = 'option';
    if (q.multi) cls += ' multi';
    if (revealed) {
      cls += ' disabled';
      if (q.ans.includes(i)) cls += ' correct-answer';
      else if (selected.includes(i)) cls += ' wrong-answer';
    } else if (selected.includes(i)) {
      cls += ' selected';
    }
    html += `<div class="${cls}" onclick="selectOpt(${i})">
      <div class="option-letter">${letters[i]}</div>
      <div class="option-text">${opt}</div>
    </div>`;
  });
  
  html += `</div>`;
  
  // Submit button for practice mode
  if (state.mode === 'practice' && answered && !revealed) {
    html += `<div style="margin-top:12px;text-align:center;"><button class="btn btn-submit" style="width:auto;padding:10px 24px;" onclick="revealAnswer()">✓ Check Answer / ตรวจคำตอบ</button></div>`;
  }
  
  // Explanation
  if (revealed) {
    const correct = isCorrect(state.currentQ);
    const correctLetters = q.ans.map(a => letters[a]).join(', ');
    html += `<div class="explanation ${correct?'':'wrong-expl'}">
      <div class="expl-title ${correct?'correct':'wrong'}">${correct?'✅ Correct! / ถูกต้อง!':'❌ Incorrect / ไม่ถูกต้อง'} — Answer: ${correctLetters}</div>
      <div class="expl-en">${q.expl}</div>
      <div class="expl-th">${q.explTh}</div>
    </div>`;
  }
  
  html += `</div>`;
  
  // Navigation
  html += `<div class="nav">
    <button class="btn btn-prev" ${state.currentQ===0?'disabled':''} onclick="prevQ()">← Previous / ก่อนหน้า</button>`;
  
  if (state.currentQ === questions.length - 1) {
    html += `<button class="btn btn-next" onclick="finishQuiz()" style="background:var(--gold);color:var(--bg);">📊 Finish / เสร็จสิ้น</button>`;
  } else {
    html += `<button class="btn btn-next" onclick="nextQ()">Next / ถัดไป →</button>`;
  }
  html += `</div>`;
  
  app.innerHTML = html;
}

function renderResults(app) {
  const total = questions.length;
  const answered = Object.keys(state.answers).length;
  const correct = Object.keys(state.answers).filter(k => isCorrect(parseInt(k))).length;
  const pct = answered > 0 ? Math.round((correct/answered)*100) : 0;
  const pass = pct >= 75;
  
  let html = `
    <div class="header">
      <h1>CompTIA Security+ SY0-701</h1>
      <div class="sub">Quiz Results / ผลการทดสอบ</div>
    </div>
    <div class="results">
      <h2>${pass ? '🎉 Passed! / ผ่าน!' : '📚 Keep Studying! / ฝึกต่อ!'}</h2>
      <div class="big-score ${pass?'pass':'fail'}">${pct}%</div>
      <div class="msg">${correct} correct out of ${answered} answered (${total} total) • ถูก ${correct} จาก ${answered} ที่ตอบ (ทั้งหมด ${total} ข้อ)</div>
      <div class="msg">Passing score: 75% • คะแนนผ่าน: 75%</div>
      <button class="btn-restart" onclick="restart()">🔄 Restart Quiz / เริ่มใหม่</button>
      
      <div class="review-list">
        <h3 style="margin-bottom:12px;font-size:0.95rem;">Review Incorrect / ทบทวนข้อที่ผิด</h3>`;
  
  Object.keys(state.answers).forEach(k => {
    const i = parseInt(k);
    const correct = isCorrect(i);
    if (!correct) {
      html += `<div class="review-item" onclick="reviewQ(${i})">
        <span class="review-icon">❌</span>
        <span class="review-num">Q${questions[i].id}</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${questions[i].q.substring(0,60)}...</span>
      </div>`;
    }
  });
  
  html += `</div></div>`;
  app.innerHTML = html;
}

function selectOpt(i) {
  if (state.revealed[state.currentQ]) return;
  const q = questions[state.currentQ];
  
  if (q.multi) {
    let sel = state.answers[state.currentQ] || [];
    if (sel.includes(i)) sel = sel.filter(x => x !== i);
    else sel.push(i);
    state.answers[state.currentQ] = sel;
  } else {
    state.answers[state.currentQ] = [i];
    if (state.mode === 'exam') {
      // In exam mode, auto-advance
    }
  }
  
  if (state.mode === 'practice' && !q.multi) {
    // Show check button
  }
  
  render();
}

function revealAnswer() {
  state.revealed[state.currentQ] = true;
  render();
}

function isCorrect(qIndex) {
  const q = questions[qIndex];
  const sel = state.answers[qIndex] || [];
  if (sel.length !== q.ans.length) return false;
  return q.ans.every(a => sel.includes(a)) && sel.every(s => q.ans.includes(s));
}

function nextQ() {
  if (state.mode === 'exam' && state.answers[state.currentQ]) {
    state.revealed[state.currentQ] = true;
  }
  if (state.currentQ < questions.length - 1) {
    state.currentQ++;
    render();
    window.scrollTo(0, 0);
  }
}

function prevQ() {
  if (state.currentQ > 0) {
    state.currentQ--;
    render();
    window.scrollTo(0, 0);
  }
}

function jumpTo(val) {
  const n = parseInt(val);
  if (n >= 1 && n <= questions.length) {
    state.currentQ = n - 1;
    render();
    window.scrollTo(0, 0);
  }
}

function setMode(mode) {
  state.mode = mode;
  render();
}

function finishQuiz() {
  // Reveal all remaining
  Object.keys(state.answers).forEach(k => {
    state.revealed[parseInt(k)] = true;
  });
  state.finished = true;
  render();
  window.scrollTo(0, 0);
}

function restart() {
  state = { currentQ: 0, answers: {}, revealed: {}, mode: state.mode, finished: false };
  render();
  window.scrollTo(0, 0);
}

function reviewQ(i) {
  state.finished = false;
  state.currentQ = i;
  render();
  window.scrollTo(0, 0);
}

// Init
render();
</script>
</body>
</html>
