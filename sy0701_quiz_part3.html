<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompTIA Security+ SY0-701 Quiz — Part 3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--card:#1a1d27;--card2:#232735;--accent:#6c5ce7;--accent2:#a855f7;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--text:#e2e8f0;--text2:#94a3b8;--border:#2d3348}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:16px}
/* Header */
.header{text-align:center;padding:24px 0 16px}
.header h1{font-size:1.5rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.header p{color:var(--text2);font-size:.85rem}
.badge{display:inline-block;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:.75rem;color:var(--accent2);margin-top:8px}
/* Mode Select */
.mode-select{display:flex;gap:12px;justify-content:center;margin:20px 0}
.mode-btn{padding:14px 28px;border-radius:12px;border:2px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:.95rem;transition:.2s}
.mode-btn:hover,.mode-btn.active{border-color:var(--accent);background:rgba(108,92,231,.15)}
.mode-btn small{display:block;color:var(--text2);font-size:.75rem;margin-top:4px}
/* Progress */
.progress-wrap{background:var(--card);border-radius:12px;padding:16px;margin-bottom:16px}
.progress-bar{height:8px;background:var(--card2);border-radius:4px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .3s}
.progress-info{display:flex;justify-content:space-between;font-size:.8rem;color:var(--text2)}
/* Question Card */
.q-card{background:var(--card);border-radius:16px;padding:24px;margin-bottom:16px;border:1px solid var(--border)}
.q-num{font-size:.8rem;color:var(--accent2);margin-bottom:8px}
.q-text{font-size:1rem;line-height:1.6;margin-bottom:6px}
.q-text-th{font-size:.9rem;color:var(--text2);line-height:1.5;margin-bottom:16px;padding-left:12px;border-left:3px solid var(--accent)}
.q-multi-hint{font-size:.75rem;color:var(--yellow);margin-bottom:12px}
/* Choices */
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--card2);cursor:pointer;transition:.2s;font-size:.9rem;line-height:1.4;display:flex;align-items:flex-start;gap:10px}
.choice:hover{border-color:var(--accent);background:rgba(108,92,231,.08)}
.choice.selected{border-color:var(--accent);background:rgba(108,92,231,.15)}
.choice.correct{border-color:var(--green);background:rgba(34,197,94,.12)}
.choice.wrong{border-color:var(--red);background:rgba(239,68,68,.12)}
.choice-marker{min-width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;margin-top:1px;flex-shrink:0}
.choice.selected .choice-marker{border-color:var(--accent);background:var(--accent);color:#fff}
.choice.correct .choice-marker{border-color:var(--green);background:var(--green);color:#fff}
.choice.wrong .choice-marker{border-color:var(--red);background:var(--red);color:#fff}
/* Explanation */
.explanation{margin-top:16px;padding:16px;border-radius:10px;background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);display:none}
.explanation.show{display:block}
.explanation h4{color:var(--green);font-size:.85rem;margin-bottom:8px}
.explanation p{font-size:.85rem;line-height:1.5;margin-bottom:6px}
.explanation .th{color:var(--text2)}
/* Navigation */
.nav-btns{display:flex;gap:10px;justify-content:space-between;margin:16px 0}
.btn{padding:10px 24px;border-radius:10px;border:none;font-size:.9rem;cursor:pointer;transition:.2s;font-weight:600}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-submit{background:linear-gradient(135deg,var(--green),#16a34a);color:#fff}
/* Navigator */
.q-nav{display:flex;flex-wrap:wrap;gap:6px;padding:16px;background:var(--card);border-radius:12px;margin-bottom:16px}
.q-nav-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text2);font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.q-nav-btn:hover{border-color:var(--accent)}
.q-nav-btn.current{border-color:var(--accent);background:var(--accent);color:#fff}
.q-nav-btn.answered{background:rgba(108,92,231,.2);border-color:var(--accent);color:var(--accent2)}
.q-nav-btn.correct-nav{background:rgba(34,197,94,.2);border-color:var(--green);color:var(--green)}
.q-nav-btn.wrong-nav{background:rgba(239,68,68,.2);border-color:var(--red);color:var(--red)}
/* Results */
.results{text-align:center;padding:32px 16px}
.results h2{font-size:1.8rem;margin-bottom:8px}
.score-circle{width:160px;height:160px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:24px auto;border:6px solid var(--border)}
.score-circle.pass{border-color:var(--green)}
.score-circle.fail{border-color:var(--red)}
.score-pct{font-size:2.5rem;font-weight:800}
.score-label{font-size:.85rem;color:var(--text2)}
.pass-badge{display:inline-block;padding:6px 20px;border-radius:20px;font-weight:700;font-size:1rem;margin:12px 0}
.pass-badge.pass{background:rgba(34,197,94,.15);color:var(--green);border:1px solid var(--green)}
.pass-badge.fail{background:rgba(239,68,68,.15);color:var(--red);border:1px solid var(--red)}
.stats{display:flex;gap:16px;justify-content:center;margin:20px 0;flex-wrap:wrap}
.stat{background:var(--card);border-radius:10px;padding:14px 20px;min-width:100px}
.stat-val{font-size:1.4rem;font-weight:700}
.stat-lbl{font-size:.75rem;color:var(--text2)}
.stat.green .stat-val{color:var(--green)}
.stat.red .stat-val{color:var(--red)}
.stat.yellow .stat-val{color:var(--yellow)}
/* Review */
.review-item{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px;text-align:left;border-left:4px solid var(--red)}
.review-item.rev-correct{border-left-color:var(--green)}
.review-q{font-size:.9rem;margin-bottom:8px}
.review-ans{font-size:.8rem;margin-bottom:4px}
.review-ans.your{color:var(--red)}
.review-ans.right{color:var(--green)}
/* Toggle */
.toggle-wrap{display:flex;gap:8px;margin:16px 0;justify-content:center}
.toggle-btn{padding:6px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text2);cursor:pointer;font-size:.8rem}
.toggle-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.hidden{display:none!important}
@media(max-width:600px){.container{padding:10px}.q-card{padding:16px}.mode-btn{padding:10px 16px;font-size:.85rem}.q-nav-btn{width:32px;height:32px;font-size:.7rem}}
</style>
</head>
<body>
<div class="container" id="app">
  <!-- Start Screen -->
  <div id="startScreen">
    <div class="header">
      <h1>CompTIA Security+ SY0-701</h1>
      <p>Practice Quiz — Part 3</p>
      <div class="badge">108 Questions • EN/TH</div>
    </div>
    <div class="mode-select">
      <button class="mode-btn" onclick="startQuiz('practice')">
        🎯 Practice Mode
        <small>เฉลยทันทีทุกข้อ</small>
      </button>
      <button class="mode-btn" onclick="startQuiz('exam')">
        📝 Exam Mode
        <small>เฉลยตอนจบ • Pass 70%</small>
      </button>
    </div>
  </div>

  <!-- Quiz Screen -->
  <div id="quizScreen" class="hidden">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-info">
        <span id="progressText">1 / 108</span>
        <span id="scoreText"></span>
      </div>
    </div>
    <div id="qNav" class="q-nav"></div>
    <div id="questionArea"></div>
    <div class="nav-btns">
      <button class="btn btn-secondary" id="prevBtn" onclick="navigate(-1)">← ก่อนหน้า</button>
      <div>
        <button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()" class="hidden">ตรวจคำตอบ</button>
        <button class="btn btn-submit" id="submitBtn" onclick="submitExam()" class="hidden">ส่งข้อสอบ</button>
      </div>
      <button class="btn btn-secondary" id="nextBtn" onclick="navigate(1)">ถัดไป →</button>
    </div>
  </div>

  <!-- Results Screen -->
  <div id="resultsScreen" class="hidden"></div>
</div>

<script>
const QUESTIONS = [
  {
    id: 1,
    q: "A security analyst needs to implement an MDM solution for BYOD users that will allow the company to retain control over company emails residing on the devices and limit data exfiltration that might occur if the devices are lost or stolen. Which of the following would BEST meet these requirements? (Select TWO).",
    q_th: "นักวิเคราะห์ความปลอดภัยต้องการติดตั้งโซลูชัน MDM สำหรับผู้ใช้ BYOD ที่จะช่วยให้บริษัทยังคงควบคุมอีเมลของบริษัทที่อยู่ในอุปกรณ์ และจำกัดการรั่วไหลของข้อมูลที่อาจเกิดขึ้นหากอุปกรณ์สูญหายหรือถูกขโมย ข้อใดตรงกับความต้องการนี้มากที่สุด? (เลือก 2 ข้อ)",
    choices: ["A. Full-device encryption", "B. Network usage rules", "C. Geofencing", "D. Containerization", "E. Application whitelisting", "F. Remote control"],
    answer: [3, 4],
    multi: true,
    explain_en: "Containerization creates a separate secure space on the device for work data, isolating personal and corporate data. Application whitelisting allows only authorized apps to run, preventing malicious apps from compromising corporate data.",
    explain_th: "Containerization สร้างพื้นที่ปลอดภัยแยกต่างหากบนอุปกรณ์สำหรับข้อมูลงาน แยกข้อมูลส่วนตัวและข้อมูลองค์กรออกจากกัน Application whitelisting อนุญาตให้เฉพาะแอปที่ได้รับอนุญาตเท่านั้นที่ทำงานได้ ป้องกันแอปที่เป็นอันตรายจากการเข้าถึงข้อมูลองค์กร"
  },
  {
    id: 2,
    q: "Which of the following is a cryptographic concept that operates on a fixed length of bits?",
    q_th: "ข้อใดต่อไปนี้เป็นแนวคิดทางการเข้ารหัสที่ทำงานบนบิตที่มีความยาวคงที่?",
    choices: ["A. Block cipher", "B. Hashing", "C. Key stretching", "D. Salting"],
    answer: [0],
    multi: false,
    explain_en: "A block cipher is a symmetric-key encryption algorithm that operates on fixed-length groups of bits, called blocks. It uses a secret key to encrypt and decrypt data.",
    explain_th: "Block cipher เป็นอัลกอริทึมการเข้ารหัสแบบ symmetric-key ที่ทำงานบนกลุ่มบิตที่มีความยาวคงที่เรียกว่า block โดยใช้ secret key ในการเข้ารหัสและถอดรหัสข้อมูล"
  },
  {
    id: 3,
    q: "A company is planning to install a guest wireless network so visitors will be able to access the Internet. The stakeholders want the network to be easy to connect to so time is not wasted during meetings. Which of the following would BEST protect the company's internal wireless network against visitors accessing company resources?",
    q_th: "บริษัทวางแผนติดตั้งเครือข่ายไร้สายสำหรับแขกเพื่อให้ผู้เข้าชมสามารถเข้าถึงอินเทอร์เน็ตได้ ข้อใดจะป้องกันเครือข่ายภายในของบริษัทจากการเข้าถึงทรัพยากรของบริษัทโดยผู้เข้าชมได้ดีที่สุด?",
    choices: ["A. Configure the guest wireless network to be on a separate VLAN from the company's internal wireless network", "B. Change the password for the guest wireless network every month", "C. Decrease the power levels of the access points for the guest wireless network", "D. Enable WPA2 using 802.1X for logging on to the guest wireless network"],
    answer: [0],
    multi: false,
    explain_en: "Configuring the guest wireless network on a separate VLAN from the company's internal wireless network will prevent visitors from accessing company resources through network segmentation.",
    explain_th: "การตั้งค่าเครือข่ายไร้สายสำหรับแขกบน VLAN แยกจากเครือข่ายภายในของบริษัทจะป้องกันผู้เข้าชมจากการเข้าถึงทรัพยากรของบริษัทผ่าน network segmentation"
  },
  {
    id: 4,
    q: "If a current private key is compromised, which of the following would ensure it cannot be used to decrypt all historical data?",
    q_th: "หาก private key ปัจจุบันถูกเปิดเผย ข้อใดจะรับประกันว่ามันไม่สามารถถูกใช้เพื่อถอดรหัสข้อมูลในอดีตทั้งหมด?",
    choices: ["A. Perfect forward secrecy", "B. Elliptic-curve cryptography", "C. Key stretching", "D. Homomorphic encryption"],
    answer: [0],
    multi: false,
    explain_en: "Perfect Forward Secrecy (PFS) generates a unique session key for each session. Even if one key is compromised, it cannot decrypt other sessions.",
    explain_th: "Perfect Forward Secrecy (PFS) สร้าง session key ที่ไม่ซ้ำกันสำหรับแต่ละ session แม้ key หนึ่งถูกเปิดเผย ก็ไม่สามารถถอดรหัส session อื่นได้"
  },
  {
    id: 5,
    q: "As part of annual audit requirements, the security team performed a review of exceptions to the company policy that allows specific users to use USB storage devices. Access, in most cases, had not been removed when it was no longer needed. Which of the following should the company do to ensure appropriate access is not disrupted but unneeded access is removed?",
    q_th: "ทีมความปลอดภัยตรวจสอบข้อยกเว้นนโยบายที่อนุญาตให้ผู้ใช้บางรายใช้ USB ส่วนใหญ่สิทธิ์ไม่ได้ถูกเพิกถอนเมื่อไม่จำเป็นแล้ว บริษัทควรทำอย่างไรเพื่อไม่ขัดจังหวะสิทธิ์ที่เหมาะสมแต่ลบสิทธิ์ที่ไม่จำเป็น?",
    choices: ["A. Create an automated, monthly attestation process that removes access if an employee's supervisor denies the approval", "B. Remove access for all employees and only allow new access to be granted if the employee's supervisor approves", "C. Perform a quarterly audit of all user accounts that have been granted access and verify the exceptions with the management team", "D. Implement a ticketing system that tracks each request and generates reports listing which employees actively use USB storage devices"],
    answer: [0],
    multi: false,
    explain_en: "An automated monthly attestation process ensures appropriate access continues while removing unneeded access through regular supervisor approval/denial cycles.",
    explain_th: "กระบวนการ attestation อัตโนมัติรายเดือนรับประกันว่าสิทธิ์ที่เหมาะสมยังคงอยู่ขณะที่ลบสิทธิ์ที่ไม่จำเป็นผ่านรอบการอนุมัติ/ปฏิเสธของหัวหน้า"
  },
  {
    id: 6,
    q: "A store receives reports that shoppers' credit card information is being stolen. Those same shoppers also withdrew money from an ATM in that store. The attackers are using the credit card information to make online purchases. Which of the following attacks is the MOST probable cause?",
    q_th: "ร้านค้าได้รับรายงานว่าข้อมูลบัตรเครดิตของลูกค้าถูกขโมย ลูกค้าเหล่านั้นยังถอนเงินจากตู้ ATM ในร้าน ผู้โจมตีใช้ข้อมูลบัตรเครดิตซื้อของออนไลน์ ข้อใดเป็นสาเหตุที่เป็นไปได้มากที่สุด?",
    choices: ["A. Identity theft", "B. RFID cloning", "C. Shoulder surfing", "D. Card skimming"],
    answer: [3],
    multi: false,
    explain_en: "Card skimming involves placing a device on card readers (like ATMs) to capture credit card data. The stolen data is then used for fraudulent online purchases.",
    explain_th: "Card skimming คือการติดตั้งอุปกรณ์บนเครื่องอ่านบัตร (เช่น ATM) เพื่อดักจับข้อมูลบัตรเครดิต ข้อมูลที่ขโมยมาจะถูกนำไปใช้ซื้อของออนไลน์โดยผิดกฎหมาย"
  },
  {
    id: 7,
    q: "A retail company is launching a new website and registered multiple subdomains. Which of the following should the company use to secure its website if the company is concerned with convenience and cost?",
    q_th: "บริษัทค้าปลีกเปิดตัวเว็บไซต์ใหม่และลงทะเบียน subdomain หลายรายการ บริษัทควรใช้อะไรเพื่อรักษาความปลอดภัยเว็บไซต์หากคำนึงถึงความสะดวกและต้นทุน?",
    choices: ["A. A self-signed certificate", "B. A root certificate", "C. A code-signing certificate", "D. A wildcard certificate", "E. An extended validation certificate"],
    answer: [3],
    multi: false,
    explain_en: "A wildcard certificate can secure multiple subdomains of a primary domain with a single certificate, making it cost-effective and convenient.",
    explain_th: "Wildcard certificate สามารถรักษาความปลอดภัย subdomain หลายรายการของโดเมนหลักด้วย certificate เดียว ทำให้คุ้มค่าและสะดวก"
  },
  {
    id: 8,
    q: "Which of the following environments would MOST likely be used to assess the execution of component parts of a system at both the hardware and software levels and to measure performance characteristics?",
    q_th: "สภาพแวดล้อมใดจะถูกใช้ในการประเมินการทำงานของส่วนประกอบของระบบทั้งระดับฮาร์ดแวร์และซอฟต์แวร์ และวัดคุณลักษณะประสิทธิภาพ?",
    choices: ["A. Test", "B. Staging", "C. Development", "D. Production"],
    answer: [0],
    multi: false,
    explain_en: "The test environment is specifically used to assess component execution at hardware and software levels and measure performance characteristics.",
    explain_th: "สภาพแวดล้อม test ถูกใช้เฉพาะเพื่อประเมินการทำงานของส่วนประกอบทั้งระดับฮาร์ดแวร์และซอฟต์แวร์ และวัดคุณลักษณะประสิทธิภาพ"
  },
  {
    id: 9,
    q: "A network engineer and a security engineer are discussing ways to monitor network operations. Which of the following is the BEST method?",
    q_th: "วิศวกรเครือข่ายและวิศวกรความปลอดภัยกำลังหารือเกี่ยวกับวิธีการตรวจสอบการทำงานของเครือข่าย ข้อใดเป็นวิธีที่ดีที่สุด?",
    choices: ["A. Disable Telnet and force SSH", "B. Establish a continuous ping", "C. Utilize an agentless monitor", "D. Enable SNMPv3 with passwords"],
    answer: [2],
    multi: false,
    explain_en: "An agentless monitor doesn't require software installation on monitored devices, making it less intrusive and less likely to disrupt network operations.",
    explain_th: "Agentless monitor ไม่ต้องติดตั้งซอฟต์แวร์บนอุปกรณ์ที่ถูกตรวจสอบ ทำให้รบกวนน้อยและไม่น่าจะส่งผลกระทบต่อการทำงานของเครือข่าย"
  },
  {
    id: 10,
    q: "A Chief Information Officer is concerned about employees using company-issued laptops to steal data when accessing network shares. Which of the following should the company implement?",
    q_th: "CIO กังวลเกี่ยวกับพนักงานใช้แล็ปท็อปของบริษัทขโมยข้อมูลเมื่อเข้าถึง network shares บริษัทควรติดตั้งอะไร?",
    choices: ["A. DLP", "B. CASB", "C. HIDS", "D. EDR", "E. UEFI"],

    multi: false,
    explain_en: "The incremental backup from 72 hours ago contains the most recent clean data before the ransomware infection, minimizing data loss.",

</script>
<script>
let mode='practice', currentQ=0, userAnswers=[], checked=[], questions=[];

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}

function startQuiz(m){
  mode=m;
  questions=[...QUESTIONS];
  shuffle(questions);
  userAnswers=new Array(questions.length).fill(null).map(()=>[]);
  checked=new Array(questions.length).fill(false);
  currentQ=0;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  document.getElementById('resultsScreen').classList.add('hidden');
  buildNav();
  renderQ();
}

function buildNav(){
  const nav=document.getElementById('qNav');
  nav.innerHTML='';
  questions.forEach((_,i)=>{
    const b=document.createElement('button');
    b.className='q-nav-btn'+(i===currentQ?' current':'');
    b.textContent=i+1;
    b.onclick=()=>{currentQ=i;renderQ()};
    nav.appendChild(b);
  });
}

function updateNav(){
  const btns=document.querySelectorAll('.q-nav-btn');
  btns.forEach((b,i)=>{
    b.className='q-nav-btn';
    if(i===currentQ) b.classList.add('current');
    else if(checked[i]){
      b.classList.add(isCorrect(i)?'correct-nav':'wrong-nav');
    } else if(userAnswers[i].length>0) b.classList.add('answered');
  });
}

function isCorrect(idx){
  const q=questions[idx],ua=userAnswers[idx];
  if(ua.length!==q.answer.length) return false;
  return q.answer.every(a=>ua.includes(a));
}

function renderQ(){
  const q=questions[currentQ];
  const area=document.getElementById('questionArea');
  let html=`<div class="q-card">
    <div class="q-num">Question ${currentQ+1} of ${questions.length}</div>
    <div class="q-text">${q.q}</div>
    <div class="q-text-th">${q.q_th}</div>`;
  if(q.multi) html+=`<div class="q-multi-hint">⚡ เลือกหลายข้อ (Select ${q.answer.length})</div>`;
  html+=`<div class="choices">`;
  q.choices.forEach((c,i)=>{
    let cls='choice';
    if(userAnswers[currentQ].includes(i)) cls+=' selected';
    if(checked[currentQ]){
      if(q.answer.includes(i)) cls+=' correct';
      else if(userAnswers[currentQ].includes(i)) cls+=' wrong';
    }
    const disabled=checked[currentQ]?'style="pointer-events:none"':'';
    html+=`<div class="${cls}" onclick="selectChoice(${i})" ${disabled}>
      <div class="choice-marker">${String.fromCharCode(65+i)}</div>
      <div>${c.replace(/^[A-F]\.\s*/,'')}</div>
    </div>`;
  });
  html+=`</div>`;
  // Explanation
  html+=`<div class="explanation${checked[currentQ]?' show':''}">
    <h4>✅ Explanation</h4>
    <p>${q.explain_en}</p>
    <p class="th">🇹🇭 ${q.explain_th}</p>
  </div>`;
  html+=`</div>`;
  area.innerHTML=html;

  // Update progress
  const answered=userAnswers.filter(a=>a.length>0).length;
  document.getElementById('progressFill').style.width=((answered/questions.length)*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${questions.length}`;

  if(mode==='practice'){
    const corr=checked.filter((_,i)=>checked[i]&&isCorrect(i)).length;
    const tot=checked.filter(c=>c).length;
    document.getElementById('scoreText').textContent=tot?`✓ ${corr}/${tot}`:'';
    document.getElementById('checkBtn').classList.remove('hidden');
    document.getElementById('checkBtn').disabled=checked[currentQ];
    document.getElementById('submitBtn').classList.add('hidden');
  } else {
    document.getElementById('scoreText').textContent=`ตอบแล้ว ${answered}/${questions.length}`;
    document.getElementById('checkBtn').classList.add('hidden');
    document.getElementById('submitBtn').classList.remove('hidden');
  }
  document.getElementById('prevBtn').disabled=currentQ===0;
  document.getElementById('nextBtn').disabled=currentQ===questions.length-1;
  updateNav();
}

function selectChoice(i){
  if(checked[currentQ]) return;
  const q=questions[currentQ];
  if(q.multi){
    const idx=userAnswers[currentQ].indexOf(i);
    if(idx>-1) userAnswers[currentQ].splice(idx,1);
    else userAnswers[currentQ].push(i);
  } else {
    userAnswers[currentQ]=[i];
  }
  if(mode==='practice'&&!q.multi){
    checkAnswer();
  } else {
    renderQ();
  }
}

function checkAnswer(){
  if(userAnswers[currentQ].length===0) return;
  checked[currentQ]=true;
  renderQ();
}

function navigate(dir){
  currentQ+=dir;
  if(currentQ<0)currentQ=0;
  if(currentQ>=questions.length)currentQ=questions.length-1;
  renderQ();
}

function submitExam(){
  if(!confirm('ส่งข้อสอบ? คุณแน่ใจหรือไม่?\nSubmit exam? Are you sure?')) return;
  checked.fill(true);
  showResults();
}

function showResults(){
  document.getElementById('quizScreen').classList.add('hidden');
  const rs=document.getElementById('resultsScreen');
  rs.classList.remove('hidden');

  let correct=0,wrong=0,unanswered=0;
  questions.forEach((_,i)=>{
    if(userAnswers[i].length===0) unanswered++;
    else if(isCorrect(i)) correct++;
    else wrong++;
  });
  const total=questions.length;
  const pct=Math.round((correct/total)*100);
  const pass=pct>=70;

  let html=`<div class="results">
    <h2>📊 ผลการสอบ / Results</h2>
    <div class="score-circle ${pass?'pass':'fail'}">
      <div class="score-pct">${pct}%</div>
      <div class="score-label">${correct}/${total}</div>
    </div>
    <div class="pass-badge ${pass?'pass':'fail'}">${pass?'✅ PASSED':'❌ FAILED'}</div>
    <p style="color:var(--text2);margin:8px 0">Pass mark: 70%</p>
    <div class="stats">
      <div class="stat green"><div class="stat-val">${correct}</div><div class="stat-lbl">ถูก / Correct</div></div>
      <div class="stat red"><div class="stat-val">${wrong}</div><div class="stat-lbl">ผิด / Wrong</div></div>
      <div class="stat yellow"><div class="stat-val">${unanswered}</div><div class="stat-lbl">ไม่ตอบ / Skip</div></div>
    </div>
    <div class="toggle-wrap">
      <button class="toggle-btn active" onclick="filterReview('all',this)">ทั้งหมด (${total})</button>
      <button class="toggle-btn" onclick="filterReview('wrong',this)">ข้อที่ผิด (${wrong+unanswered})</button>
    </div>
    <div id="reviewArea">`;

  questions.forEach((q,i)=>{
    const cor=isCorrect(i);
    const ua=userAnswers[i];
    const yourAns=ua.length?ua.map(a=>q.choices[a]).join(', '):'ไม่ได้ตอบ';
    const rightAns=q.answer.map(a=>q.choices[a]).join(', ');
    html+=`<div class="review-item ${cor?'rev-correct':''}" data-correct="${cor}">
      <div class="review-q"><strong>Q${i+1}.</strong> ${q.q}</div>
      <div class="review-q" style="color:var(--text2);font-size:.8rem">${q.q_th}</div>
      <div class="review-ans your">Your: ${yourAns}</div>
      ${!cor?`<div class="review-ans right">Correct: ${rightAns}</div>`:''}
      <div class="explanation show" style="margin-top:10px">
        <p style="font-size:.8rem">${q.explain_en}</p>
        <p class="th" style="font-size:.8rem">🇹🇭 ${q.explain_th}</p>
      </div>
    </div>`;
  });

  html+=`</div>
    <div style="margin-top:24px">
      <button class="btn btn-primary" onclick="location.reload()">🔄 ทำใหม่ / Retry</button>
    </div>
  </div>`;
  rs.innerHTML=html;
}

function filterReview(f,el){
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.review-item').forEach(item=>{
    if(f==='all') item.style.display='';
    else item.style.display=item.dataset.correct==='true'?'none':'';
  });
}
</script>

</html>
