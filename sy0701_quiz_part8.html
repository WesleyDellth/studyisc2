<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompTIA Security+ SY0-701 Quiz — Part 8</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--surface:#1a1d27;--card:#22252f;--border:#2e3140;
  --primary:#6c8cff;--primary-dim:#4a6ad4;--correct:#34d399;--wrong:#f87171;
  --text:#e4e6ef;--text-dim:#8b8fa3;--text-muted:#5a5e72;
  --accent:#a78bfa;--warning:#fbbf24;
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.container{max-width:900px;margin:0 auto;padding:16px}

/* Header */
.header{text-align:center;padding:32px 16px 24px;border-bottom:1px solid var(--border)}
.header h1{font-size:1.5rem;font-weight:700;color:var(--primary);letter-spacing:-0.5px}
.header p{color:var(--text-dim);font-size:0.85rem;margin-top:4px}

/* Mode Selection */
.mode-select{display:flex;flex-direction:column;align-items:center;gap:20px;padding:60px 20px}
.mode-select h2{font-size:1.3rem;color:var(--text)}
.mode-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.mode-card{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:28px 24px;width:280px;cursor:pointer;transition:all .2s;text-align:center}
.mode-card:hover{border-color:var(--primary);transform:translateY(-2px)}
.mode-card h3{color:var(--primary);font-size:1.1rem;margin-bottom:8px}
.mode-card p{color:var(--text-dim);font-size:0.85rem}
.mode-card .icon{font-size:2rem;margin-bottom:12px}

/* Progress Bar */
.progress-section{padding:16px 0;display:flex;align-items:center;gap:12px}
.progress-bar-bg{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width .3s}
.progress-text{color:var(--text-dim);font-size:0.8rem;white-space:nowrap;min-width:60px;text-align:right}

/* Top bar */
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 0;gap:8px;flex-wrap:wrap}
.top-bar .score-display{color:var(--text-dim);font-size:0.85rem}
.top-bar .score-display span{color:var(--correct);font-weight:600}
.btn-sm{background:var(--card);color:var(--text-dim);border:1px solid var(--border);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.8rem;transition:all .2s}
.btn-sm:hover{border-color:var(--primary);color:var(--text)}

/* Question Card */
.question-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin:16px 0}
.q-badge{display:inline-block;background:var(--primary-dim);color:#fff;padding:2px 10px;border-radius:4px;font-size:0.75rem;font-weight:600;margin-bottom:12px}
.q-multi-badge{background:var(--accent);margin-left:6px}
.q-text{font-size:1rem;color:var(--text);margin-bottom:6px;font-weight:500}
.q-text-th{font-size:0.9rem;color:var(--text-dim);margin-bottom:16px;font-style:italic}

/* Options */
.options-list{display:flex;flex-direction:column;gap:8px}
.option-btn{background:var(--surface);border:2px solid var(--border);border-radius:8px;padding:12px 16px;cursor:pointer;text-align:left;color:var(--text);font-size:0.9rem;transition:all .15s;display:flex;align-items:flex-start;gap:8px}
.option-btn:hover:not(.disabled){border-color:var(--primary);background:#1e2233}
.option-btn.selected{border-color:var(--primary);background:#1e2640}
.option-btn.correct{border-color:var(--correct);background:#0f2a20}
.option-btn.wrong{border-color:var(--wrong);background:#2a1015}
.option-btn.disabled{cursor:default;opacity:0.85}
.option-btn .check-box{width:20px;height:20px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;font-size:0.7rem;transition:all .15s}
.option-btn.selected .check-box{border-color:var(--primary);background:var(--primary);color:#fff}
.option-btn.correct .check-box{border-color:var(--correct);background:var(--correct);color:#fff}
.option-btn.wrong .check-box{border-color:var(--wrong);background:var(--wrong);color:#fff}

/* Explanation */
.explanation{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:16px;display:none}
.explanation.show{display:block}
.explanation h4{color:var(--correct);font-size:0.85rem;margin-bottom:8px}
.explanation .exp-en{color:var(--text);font-size:0.85rem;margin-bottom:6px}
.explanation .exp-th{color:var(--text-dim);font-size:0.85rem;font-style:italic}

/* Navigation */
.nav-row{display:flex;justify-content:space-between;align-items:center;padding:16px 0;gap:12px}
.btn{padding:10px 24px;border-radius:8px;border:none;cursor:pointer;font-size:0.9rem;font-weight:500;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dim)}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.btn-outline:hover{border-color:var(--primary);color:var(--text)}

/* Question Navigator */
.q-nav-toggle{text-align:center;padding:8px 0}
.q-navigator{display:none;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin:8px 0}
.q-navigator.show{display:block}
.q-nav-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(36px,1fr));gap:4px}
.q-nav-item{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);font-size:0.75rem;cursor:pointer;transition:all .15s}
.q-nav-item:hover{border-color:var(--primary)}
.q-nav-item.current{border-color:var(--primary);background:var(--primary);color:#fff}
.q-nav-item.answered{background:#1a2a1f;border-color:var(--correct);color:var(--correct)}
.q-nav-item.wrong-answer{background:#2a1015;border-color:var(--wrong);color:var(--wrong)}

/* Results */
.results-container{text-align:center;padding:40px 16px}
.results-circle{width:160px;height:160px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:24px auto;border:4px solid var(--correct)}
.results-circle.fail{border-color:var(--wrong)}
.results-circle .score-pct{font-size:2.5rem;font-weight:700;color:var(--correct)}
.results-circle.fail .score-pct{color:var(--wrong)}
.results-circle .score-label{font-size:0.8rem;color:var(--text-dim)}
.results-badge{display:inline-block;padding:6px 20px;border-radius:20px;font-weight:600;font-size:0.9rem;margin:16px 0}
.results-badge.pass{background:#0f2a20;color:var(--correct);border:1px solid var(--correct)}
.results-badge.fail{background:#2a1015;color:var(--wrong);border:1px solid var(--wrong)}
.results-stats{display:flex;justify-content:center;gap:32px;margin:24px 0;flex-wrap:wrap}
.stat-item{text-align:center}
.stat-item .num{font-size:1.5rem;font-weight:700}
.stat-item .lbl{font-size:0.75rem;color:var(--text-dim)}
.stat-item.correct-stat .num{color:var(--correct)}
.stat-item.wrong-stat .num{color:var(--wrong)}
.stat-item.skip-stat .num{color:var(--warning)}
.review-section{margin-top:32px;text-align:left}
.review-section h3{font-size:1rem;color:var(--text);margin-bottom:16px;text-align:center}
.review-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
.review-item .ri-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.review-item .ri-q{font-size:0.9rem;color:var(--text);margin-bottom:4px}
.review-item .ri-q-th{font-size:0.8rem;color:var(--text-dim);font-style:italic;margin-bottom:8px}
.review-item .ri-answer{font-size:0.8rem;padding:4px 8px;border-radius:4px}
.ri-answer.your-wrong{background:#2a1015;color:var(--wrong)}
.ri-answer.correct-ans{background:#0f2a20;color:var(--correct)}

/* Lang toggle */
.lang-toggle{display:flex;gap:4px;background:var(--surface);border-radius:6px;padding:2px}
.lang-btn{padding:4px 10px;border-radius:4px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;font-size:0.75rem;transition:all .15s}
.lang-btn.active{background:var(--primary);color:#fff}

/* Responsive */
@media(max-width:600px){
  .container{padding:12px}
  .mode-card{width:100%}
  .question-card{padding:16px}
  .q-nav-grid{grid-template-columns:repeat(auto-fill,minmax(32px,1fr))}
  .results-stats{gap:20px}
}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="header">
    <h1>🛡️ CompTIA Security+ SY0-701</h1>
    <p>Practice Quiz — Part 8 (112 Questions)</p>
  </div>
  <div id="content"></div>
</div>

<script>
const QUESTIONS = [
{
  id: 1,
  q_en: "A security engineer is installing a WAF to protect the company's website from malicious web requests over SSL. Which of the following is needed to meet the objective?",
  q_th: "วิศวกรด้านความปลอดภัยกำลังติดตั้ง WAF เพื่อปกป้องเว็บไซต์ของบริษัทจากการร้องขอเว็บที่เป็นอันตรายผ่าน SSL ข้อใดต่อไปนี้จำเป็นเพื่อให้บรรลุวัตถุประสงค์?",
  options: ["A. A reverse proxy", "B. A decryption certificate", "C. A split-tunnel VPN", "D. Load-balanced servers"],
  answer: [1],
  multi: false,
  explain_en: "A Web Application Firewall (WAF) needs a decryption certificate to decrypt the SSL traffic before it can inspect and filter out malicious requests.",
  explain_th: "Web Application Firewall (WAF) ต้องการ decryption certificate เพื่อถอดรหัสทราฟฟิก SSL ก่อนที่จะสามารถตรวจสอบและกรองคำร้องขอที่เป็นอันตรายได้"
},
{
  id: 2,
  q_en: "A network engineer and a security engineer are discussing ways to monitor network operations. Which of the following is the BEST method?",
  q_th: "วิศวกรเครือข่ายและวิศวกรด้านความปลอดภัยกำลังหารือเกี่ยวกับวิธีการตรวจสอบการดำเนินงานเครือข่าย ข้อใดต่อไปนี้เป็นวิธีที่ดีที่สุด?",
  options: ["A. Disable Telnet and force SSH", "B. Establish a continuous ping", "C. Utilize an agentless monitor", "D. Enable SNMPv3 with passwords"],
  answer: [2],
  multi: false,
  explain_en: "An agentless monitor is the best method because it does not require any software or agents to be installed on the devices being monitored, making it less intrusive and less likely to disrupt network operations.",
  explain_th: "Agentless monitor เป็นวิธีที่ดีที่สุดเพราะไม่จำเป็นต้องติดตั้งซอฟต์แวร์หรือ agent ใดๆ บนอุปกรณ์ที่ถูกตรวจสอบ ทำให้รบกวนน้อยและมีโอกาสน้อยที่จะกระทบต่อการดำเนินงานเครือข่าย"
},
{
  id: 3,
  q_en: "A Chief Information Officer is concerned about employees using company-issued laptops to steal data when accessing network shares. Which of the following should the company implement?",
  q_th: "Chief Information Officer มีความกังวลเกี่ยวกับพนักงานที่ใช้แล็ปท็อปของบริษัทเพื่อขโมยข้อมูลเมื่อเข้าถึง network shares ข้อใดต่อไปนี้ที่บริษัทควรนำมาใช้?",
  options: ["A. DLP", "B. CASB", "C. HIDS", "D. EDR", "E. UEFI"],
  answer: [0],
  multi: false,
  explain_en: "Data Loss Prevention (DLP) should be implemented to prevent employees from stealing data when accessing network shares.",
  explain_th: "ควรนำ Data Loss Prevention (DLP) มาใช้เพื่อป้องกันพนักงานจากการขโมยข้อมูลเมื่อเข้าถึง network shares"
},
{
  id: 4,
  q_en: "The Chief Executive Officer announced a new partnership with a strategic vendor and asked the Chief Information Security Officer to federate user digital identities using SAML-based protocols. Which of the following will this enable?",
  q_th: "CEO ประกาศความร่วมมือใหม่กับผู้จำหน่ายเชิงกลยุทธ์ และขอให้ CISO รวม digital identities ของผู้ใช้โดยใช้โปรโตคอล SAML ข้อใดต่อไปนี้จะถูกเปิดใช้งาน?",
  options: ["A. SSO", "B. MFA", "C. PKI", "D. DLP"],
  answer: [0],
  multi: false,
  explain_en: "Federating user digital identities using SAML-based protocols enables Single Sign-On (SSO), allowing users to log in once and access multiple applications.",
  explain_th: "การรวม digital identities ของผู้ใช้โดยใช้โปรโตคอล SAML จะเปิดใช้งาน Single Sign-On (SSO) ทำให้ผู้ใช้สามารถเข้าสู่ระบบครั้งเดียวและเข้าถึงแอปพลิเคชันหลายตัวได้"
},
{
  id: 5,
  q_en: "A security assessment found that several embedded systems are running unsecure protocols. These systems were purchased two years ago and the company that developed them is no longer in business. Which of the following constraints BEST describes the reason the findings cannot be remediated?",
  q_th: "การประเมินความปลอดภัยพบว่าระบบ embedded หลายระบบกำลังใช้โปรโตคอลที่ไม่ปลอดภัย ระบบเหล่านี้ซื้อมาสองปีก่อนและบริษัทที่พัฒนาไม่ได้ดำเนินกิจการแล้ว ข้อจำกัดใดอธิบายเหตุผลที่ไม่สามารถแก้ไขได้ดีที่สุด?",
  options: ["A. Inability to authenticate", "B. Implied trust", "C. Lack of computing power", "D. Unavailable patch"],
  answer: [3],
  multi: false,
  explain_en: "If the company that developed the systems is no longer in business, there are no patches available to remediate the issue.",
  explain_th: "หากบริษัทที่พัฒนาระบบไม่ได้ดำเนินกิจการแล้ว ก็ไม่มี patch ที่พร้อมใช้งานเพื่อแก้ไขปัญหา"
},
{
  id: 6,
  q_en: "A security analyst was deploying a new website and found a connection attempting to authenticate on the site's portal. The analyst identified the following input in the username field: admin' or 1=1--. Which of the following BEST explains this type of attack?",
  q_th: "นักวิเคราะห์ด้านความปลอดภัยกำลังปรับใช้เว็บไซต์ใหม่และพบการเชื่อมต่อที่พยายามยืนยันตัวตนบนพอร์ทัลของเว็บไซต์ นักวิเคราะห์พบข้อมูลที่ป้อนในช่องชื่อผู้ใช้: admin' or 1=1-- ข้อใดอธิบายการโจมตีประเภทนี้ได้ดีที่สุด?",
  options: ["A. DLL injection to hijack administrator services", "B. SQLi on the field to bypass authentication", "C. Execution of a stored XSS on the website", "D. Code to execute a race condition on the server"],
  answer: [1],
  multi: false,
  explain_en: "The input 'admin' or 1=1--' is an example of SQL injection (SQLi) attack, attempting to bypass authentication by injecting SQL code that causes the authentication check to always return true.",
  explain_th: "การป้อนข้อมูล 'admin' or 1=1--' เป็นตัวอย่างของการโจมตี SQL injection (SQLi) ที่พยายาม bypass การยืนยันตัวตนโดยการฉีดโค้ด SQL ที่ทำให้การตรวจสอบการยืนยันตัวตนคืนค่า true เสมอ"
},
{
  id: 7,
  q_en: "Which of the following provides a catalog of security and privacy controls related to the United States federal information systems?",
  q_th: "ข้อใดต่อไปนี้จัดทำแคตตาล็อกของการควบคุมความปลอดภัยและความเป็นส่วนตัวที่เกี่ยวข้องกับระบบสารสนเทศของรัฐบาลกลางสหรัฐอเมริกา?",
  options: ["A. GDPR", "B. PCI DSS", "C. ISO 27000", "D. NIST 800-53"],
  answer: [3],
  multi: false,
  explain_en: "NIST 800-53 provides a catalog of security and privacy controls related to United States federal information systems.",
  explain_th: "NIST 800-53 จัดทำแคตตาล็อกของการควบคุมความปลอดภัยและความเป็นส่วนตัวที่เกี่ยวข้องกับระบบสารสนเทศของรัฐบาลกลางสหรัฐอเมริกา"
},
{
  id: 8,
  q_en: "An analyst is working on an email security incident in which the target opened an attachment containing a worm. The analyst wants to implement mitigation techniques to prevent further spread. Which of the following is the BEST course of action?",
  q_th: "นักวิเคราะห์กำลังทำงานเกี่ยวกับเหตุการณ์ด้านความปลอดภัยอีเมลที่เป้าหมายเปิดไฟล์แนบที่มี worm นักวิเคราะห์ต้องการใช้เทคนิคการบรรเทาเพื่อป้องกันการแพร่กระจายเพิ่มเติม ข้อใดเป็นแนวทางปฏิบัติที่ดีที่สุด?",
  options: ["A. Apply a DLP solution", "B. Implement network segmentation", "C. Utilize email content filtering", "D. Isolate the infected attachment"],
  answer: [1],
  multi: false,
  explain_en: "Network segmentation is the best course of action to prevent further spread of the worm by dividing the network into smaller segments, isolating the infected area.",
  explain_th: "Network segmentation เป็นแนวทางปฏิบัติที่ดีที่สุดเพื่อป้องกันการแพร่กระจายของ worm โดยการแบ่งเครือข่ายออกเป็นส่วนย่อยๆ แยกพื้นที่ที่ติดเชื้อออกมา"
},
{
  id: 9,
  q_en: "Which of the following should a technician consider when selecting an encryption method for data that needs to remain confidential for a specific length of time?",
  q_th: "ข้อใดต่อไปนี้ที่ช่างเทคนิคควรพิจารณาเมื่อเลือกวิธีการเข้ารหัสสำหรับข้อมูลที่ต้องรักษาความลับเป็นระยะเวลาที่กำหนด?",
  options: ["A. The key length of the encryption algorithm", "B. The encryption algorithm's longevity", "C. A method of introducing entropy into key calculations", "D. The computational overhead of calculating the encryption key"],
  answer: [1],
  multi: false,
  explain_en: "The longevity of the encryption algorithm should be considered to ensure the data remains secure for the required period.",
  explain_th: "ควรพิจารณาอายุการใช้งานของอัลกอริทึมการเข้ารหัสเพื่อให้แน่ใจว่าข้อมูลยังคงปลอดภัยตามระยะเวลาที่กำหนด"
},
{
  id: 10,
  q_en: "Which of the following authentication methods is considered to be the LEAST secure?",
  q_th: "ข้อใดต่อไปนี้เป็นวิธีการยืนยันตัวตนที่ถือว่ามีความปลอดภัยน้อยที่สุด?",
  options: ["A. TOTP", "B. SMS", "C. HOTP", "D. Token key"],
  answer: [1],
  multi: false,
  explain_en: "SMS-based authentication is the least secure because SMS messages can be intercepted through SIM swapping, man-in-the-middle attacks, or exploiting SS7 protocol weaknesses.",
  explain_th: "การยืนยันตัวตนผ่าน SMS มีความปลอดภัยน้อยที่สุดเพราะข้อความ SMS สามารถถูกดักจับผ่าน SIM swapping, การโจมตี man-in-the-middle หรือการใช้ประโยชน์จากจุดอ่อนของโปรโตคอล SS7"
},
{

// App State
const state = {
  mode: null, // 'practice' or 'exam'
  currentQ: 0,
  answers: {},
  submitted: {},
  showNav: false,
  finished: false
};

const totalQ = QUESTIONS.length;
const PASS_MARK = 70;

function render() {
  const c = document.getElementById('content');
  if (!state.mode) { renderModeSelect(c); return; }
  if (state.finished) { renderResults(c); return; }
  renderQuiz(c);
}

function renderModeSelect(c) {
  c.innerHTML = `
    <div class="mode-select fade-in">
      <h2>เลือกโหมดการทดสอบ</h2>
      <div class="mode-cards">
        <div class="mode-card" onclick="startMode('practice')">
          <div class="icon">📖</div>
          <h3>Practice Mode</h3>
          <p>เฉลยทันทีหลังตอบแต่ละข้อ<br>พร้อมคำอธิบาย EN/TH</p>
        </div>
        <div class="mode-card" onclick="startMode('exam')">
          <div class="icon">🎯</div>
          <h3>Exam Mode</h3>
          <p>เฉลยเมื่อทำเสร็จทุกข้อ<br>เกณฑ์ผ่าน 70%</p>
        </div>
      </div>
      <p style="color:var(--text-muted);font-size:0.8rem;margin-top:16px">${totalQ} ข้อ จาก CompTIA Security+ SY0-701</p>
    </div>`;
}

function startMode(m) {
  state.mode = m;
  state.currentQ = 0;
  state.answers = {};
  state.submitted = {};
  state.finished = false;
  render();
}

function renderQuiz(c) {
  const q = QUESTIONS[state.currentQ];
  const answered = state.answers[state.currentQ] !== undefined;
  const isSubmitted = state.submitted[state.currentQ];
  const pct = Math.round(((Object.keys(state.submitted).length) / totalQ) * 100);
  const correctCount = Object.keys(state.submitted).filter(k => state.submitted[k]).length;

  let optionsHtml = q.options.map((opt, i) => {
    let cls = 'option-btn';
    const sel = state.answers[state.currentQ] || [];
    const isSelected = sel.includes(i);
    if (isSelected) cls += ' selected';
    if (state.mode === 'practice' && isSubmitted !== undefined) {
      cls += ' disabled';
      if (q.answer.includes(i)) cls += ' correct';
      else if (isSelected) cls += ' wrong';
    }
    if (state.mode === 'exam' && isSubmitted !== undefined) {
      cls += ' disabled';
    }
    const checkMark = isSelected ? '✓' : '';
    return `<div class="${cls}" onclick="selectOption(${i})" data-idx="${i}">
      <div class="check-box">${checkMark}</div>
      <span>${opt}</span>
    </div>`;
  }).join('');

  let explainHtml = '';
  if (state.mode === 'practice' && isSubmitted !== undefined) {
    explainHtml = `<div class="explanation show fade-in">
      <h4>✅ Correct Answer: ${q.answer.map(a=>q.options[a]).join(', ')}</h4>
      <div class="exp-en">${q.explain_en}</div>
      <div class="exp-th">${q.explain_th}</div>
    </div>`;
  }

  let navBtns = '';
  if (state.mode === 'practice') {
    if (isSubmitted === undefined) {
      navBtns = `<button class="btn btn-primary" onclick="submitAnswer()" ${!answered?'disabled':''}>ส่งคำตอบ</button>`;
    } else {
      navBtns = state.currentQ < totalQ - 1
        ? `<button class="btn btn-primary" onclick="nextQ()">ข้อถัดไป →</button>`
        : `<button class="btn btn-primary" onclick="finishQuiz()">ดูผลลัพธ์</button>`;
    }
  } else {
    const canFinish = Object.keys(state.answers).length > 0;
    if (isSubmitted === undefined && answered) {
      navBtns = `<button class="btn btn-primary" onclick="submitAnswer()">ยืนยัน</button>`;
    }
    if (state.currentQ < totalQ - 1) {
      navBtns += ` <button class="btn btn-primary" onclick="nextQ()">ข้อถัดไป →</button>`;
    }
    if (canFinish) {
      navBtns += ` <button class="btn btn-outline" onclick="finishQuiz()" style="margin-left:auto">ส่งข้อสอบ</button>`;
    }
  }

  // Question navigator grid
  let navGrid = QUESTIONS.map((_, i) => {
    let ncls = 'q-nav-item';
    if (i === state.currentQ) ncls += ' current';
    else if (state.submitted[i] === true) ncls += ' answered';
    else if (state.submitted[i] === false) ncls += ' wrong-answer';
    else if (state.answers[i]) ncls += ' answered';
    return `<div class="${ncls}" onclick="goToQ(${i})">${i+1}</div>`;
  }).join('');

  c.innerHTML = `
    <div class="fade-in">
      <div class="progress-section">
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <div class="progress-text">${Object.keys(state.submitted).length}/${totalQ}</div>
      </div>
      <div class="top-bar">
        <div class="score-display">${state.mode==='practice'?`คะแนน: <span>${correctCount}</span>/${Object.keys(state.submitted).length}`:''} ${state.mode==='exam'?'Exam Mode':''}</div>
        <button class="btn-sm" onclick="toggleNav()">📋 Navigator</button>
        <button class="btn-sm" onclick="resetQuiz()">🔄 เริ่มใหม่</button>
      </div>
      <div class="q-navigator ${state.showNav?'show':''}">
        <div class="q-nav-grid">${navGrid}</div>
      </div>
      <div class="question-card">
        <span class="q-badge">Q${state.currentQ+1} / ${totalQ} (ID: ${q.id})</span>
        ${q.multi?'<span class="q-badge q-multi-badge">เลือกหลายข้อ</span>':''}
        <div class="q-text">${q.q_en}</div>
        <div class="q-text-th">${q.q_th}</div>
        <div class="options-list">${optionsHtml}</div>
        ${explainHtml}
      </div>
      <div class="nav-row">
        <button class="btn btn-outline" onclick="prevQ()" ${state.currentQ===0?'disabled':''}>← ก่อนหน้า</button>
        <div>${navBtns}</div>
      </div>
    </div>`;
}

function selectOption(idx) {
  const q = QUESTIONS[state.currentQ];
  if (state.submitted[state.currentQ] !== undefined && state.mode === 'practice') return;
  if (state.submitted[state.currentQ] !== undefined && state.mode === 'exam') return;

  if (!state.answers[state.currentQ]) state.answers[state.currentQ] = [];

  if (q.multi) {
    const pos = state.answers[state.currentQ].indexOf(idx);
    if (pos > -1) state.answers[state.currentQ].splice(pos, 1);
    else state.answers[state.currentQ].push(idx);
  } else {
    state.answers[state.currentQ] = [idx];
  }
  render();
}

function submitAnswer() {
  const sel = state.answers[state.currentQ];
  if (!sel || sel.length === 0) return;
  const q = QUESTIONS[state.currentQ];
  const correct = q.answer.length === sel.length && q.answer.every(a => sel.includes(a));
  state.submitted[state.currentQ] = correct;
  render();
}

function nextQ() {
  if (state.currentQ < totalQ - 1) { state.currentQ++; render(); window.scrollTo(0,0); }
}
function prevQ() {
  if (state.currentQ > 0) { state.currentQ--; render(); window.scrollTo(0,0); }
}
function goToQ(i) {
  state.currentQ = i; state.showNav = false; render(); window.scrollTo(0,0);
}
function toggleNav() {
  state.showNav = !state.showNav; render();
}

function finishQuiz() {
  // In exam mode, auto-submit unanswered as wrong
  if (state.mode === 'exam') {
    for (let i = 0; i < totalQ; i++) {
      if (state.submitted[i] === undefined) {
        if (state.answers[i] && state.answers[i].length > 0) {
          const q = QUESTIONS[i];
          const sel = state.answers[i];
          state.submitted[i] = q.answer.length === sel.length && q.answer.every(a => sel.includes(a));
        } else {
          state.submitted[i] = false;
        }
      }
    }
  }
  state.finished = true;
  render();
  window.scrollTo(0,0);
}

function renderResults(c) {
  const correctCount = Object.values(state.submitted).filter(v => v === true).length;
  const wrongCount = Object.values(state.submitted).filter(v => v === false).length;
  const answeredCount = Object.keys(state.submitted).length;
  const skipped = totalQ - answeredCount;
  const pct = Math.round((correctCount / totalQ) * 100);
  const passed = pct >= PASS_MARK;

  // Wrong questions review
  let reviewHtml = '';
  const wrongQs = Object.keys(state.submitted).filter(k => !state.submitted[k]).map(Number);
  if (wrongQs.length > 0) {
    reviewHtml = wrongQs.map(qi => {
      const q = QUESTIONS[qi];
      const userAns = (state.answers[qi]||[]).map(a=>q.options[a]).join(', ') || 'ไม่ได้ตอบ';
      const correctAns = q.answer.map(a=>q.options[a]).join(', ');
      return `<div class="review-item">
        <div class="ri-header">
          <span class="q-badge">Q${qi+1} (ID: ${q.id})</span>
        </div>
        <div class="ri-q">${q.q_en}</div>
        <div class="ri-q-th">${q.q_th}</div>
        <div style="margin-top:8px">
          <span class="ri-answer your-wrong">คำตอบของคุณ: ${userAns}</span>
        </div>
        <div style="margin-top:4px">
          <span class="ri-answer correct-ans">คำตอบที่ถูก: ${correctAns}</span>
        </div>
        <div class="explanation show" style="margin-top:8px">
          <div class="exp-en">${q.explain_en}</div>
          <div class="exp-th">${q.explain_th}</div>
        </div>
      </div>`;
    }).join('');
  }

  c.innerHTML = `
    <div class="results-container fade-in">
      <h2 style="margin-bottom:8px">📊 ผลการทดสอบ</h2>
      <p style="color:var(--text-dim);font-size:0.85rem">CompTIA Security+ SY0-701 — Part 8</p>
      <div class="results-circle ${passed?'':'fail'}">
        <div class="score-pct">${pct}%</div>
        <div class="score-label">${correctCount}/${totalQ}</div>
      </div>
      <div class="results-badge ${passed?'pass':'fail'}">${passed?'✅ PASSED':'❌ FAILED'} (เกณฑ์ผ่าน: ${PASS_MARK}%)</div>
      <div class="results-stats">
        <div class="stat-item correct-stat"><div class="num">${correctCount}</div><div class="lbl">ถูกต้อง</div></div>
        <div class="stat-item wrong-stat"><div class="num">${wrongCount}</div><div class="lbl">ผิด</div></div>
        <div class="stat-item skip-stat"><div class="num">${skipped}</div><div class="lbl">ข้าม</div></div>
      </div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px">
        <button class="btn btn-primary" onclick="resetQuiz()">🔄 ทำใหม่อีกครั้ง</button>
        <button class="btn btn-outline" onclick="reviewWrong()">📝 ทบทวนข้อที่ผิด (${wrongCount})</button>
      </div>
      ${wrongQs.length > 0 ? `
        <div class="review-section" id="review-section" style="display:none">
          <h3>📝 ทบทวนข้อที่ผิด (${wrongQs.length} ข้อ)</h3>
          ${reviewHtml}
        </div>
      ` : ''}
    </div>`;
}

function reviewWrong() {
  const rs = document.getElementById('review-section');
  if (rs) rs.style.display = rs.style.display === 'none' ? 'block' : 'none';
}

function resetQuiz() {
  state.mode = null;
  state.currentQ = 0;
  state.answers = {};
  state.submitted = {};
  state.showNav = false;
  state.finished = false;
  render();
  window.scrollTo(0,0);
}

// Init
render();
</script>
</body>
