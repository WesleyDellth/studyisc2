<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompTIA Security+ SY0-701 Quiz — Part 6</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--surface:#1a1d27;--card:#222636;--border:#2e3348;
  --primary:#6c63ff;--primary-hover:#5a52e0;--success:#22c55e;--danger:#ef4444;--warning:#f59e0b;
  --text:#e8e6f0;--text-dim:#9390a8;--text-muted:#6b6880;
  --radius:10px;--shadow:0 4px 24px rgba(0,0,0,.4);
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:16px}

/* Header */
.header{text-align:center;padding:32px 0 16px}
.header h1{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,var(--primary),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .subtitle{color:var(--text-dim);font-size:.85rem;margin-top:4px}
.badge{display:inline-block;background:var(--card);border:1px solid var(--border);padding:3px 10px;border-radius:20px;font-size:.75rem;color:var(--text-dim);margin-top:8px}

/* Screens */
.screen{display:none}.screen.active{display:block}

/* Start Screen */
.start-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;text-align:center;margin-top:24px}
.start-card h2{font-size:1.2rem;margin-bottom:16px}
.mode-buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px}
.mode-btn{padding:14px 28px;border:2px solid var(--primary);border-radius:var(--radius);background:transparent;color:var(--primary);font-size:.95rem;font-weight:600;cursor:pointer;transition:.2s}
.mode-btn:hover{background:var(--primary);color:#fff}
.mode-btn.filled{background:var(--primary);color:#fff}
.mode-btn.filled:hover{background:var(--primary-hover)}
.stat-row{display:flex;gap:24px;justify-content:center;margin-top:20px;color:var(--text-dim);font-size:.85rem}

/* Progress */
.progress-bar-wrap{background:var(--surface);border-radius:20px;height:6px;margin:16px 0;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),#a78bfa);border-radius:20px;transition:width .4s ease}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;font-size:.8rem;color:var(--text-dim);margin-bottom:8px}

/* Question Card */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow)}
.q-num{font-size:.75rem;color:var(--primary);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.q-text{font-size:.95rem;margin-bottom:6px;font-weight:500}
.q-text-th{font-size:.88rem;color:var(--text-dim);margin-bottom:16px;padding-left:12px;border-left:2px solid var(--border)}

/* Options */
.options{display:flex;flex-direction:column;gap:8px}
.opt-btn{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:.2s;font-size:.9rem;text-align:left;color:var(--text)}
.opt-btn:hover:not(.disabled){border-color:var(--primary);background:#1e2235}
.opt-btn.selected{border-color:var(--primary);background:rgba(108,99,255,.12)}
.opt-btn.correct{border-color:var(--success);background:rgba(34,197,94,.1)}
.opt-btn.incorrect{border-color:var(--danger);background:rgba(239,68,68,.1)}
.opt-btn.disabled{cursor:default;opacity:.85}
.opt-letter{min-width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--card);border:1px solid var(--border);font-size:.8rem;font-weight:600;flex-shrink:0}
.opt-btn.selected .opt-letter{background:var(--primary);border-color:var(--primary);color:#fff}
.opt-btn.correct .opt-letter{background:var(--success);border-color:var(--success);color:#fff}
.opt-btn.incorrect .opt-letter{background:var(--danger);border-color:var(--danger);color:#fff}

/* Explanation */
.explanation{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:16px;display:none}
.explanation.show{display:block}
.explanation h4{font-size:.8rem;color:var(--success);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.explanation p{font-size:.85rem;color:var(--text-dim);margin-bottom:6px}
.explanation .th-label{color:var(--warning);font-weight:600}

/* Navigation */
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:16px}
.nav-btn{padding:10px 20px;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:.2s}
.nav-btn.prev{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.nav-btn.prev:hover{background:var(--card)}
.nav-btn.next{background:var(--primary);color:#fff}
.nav-btn.next:hover{background:var(--primary-hover)}
.nav-btn:disabled{opacity:.4;cursor:not-allowed}
.nav-btn.submit{background:var(--success);color:#fff}

/* Question Navigator */
.q-nav-toggle{text-align:center;margin:12px 0}
.q-nav-toggle button{background:none;border:1px solid var(--border);color:var(--text-dim);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:.78rem}
.q-nav-grid{display:none;grid-template-columns:repeat(auto-fill,36px);gap:6px;justify-content:center;padding:12px 0}
.q-nav-grid.show{display:grid}
.q-nav-dot{width:36px;height:36px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.q-nav-dot.answered{background:var(--primary);color:#fff;border-color:var(--primary)}
.q-nav-dot.current{border-color:var(--warning);box-shadow:0 0 0 2px rgba(245,158,11,.3)}
.q-nav-dot.right{background:var(--success);color:#fff;border-color:var(--success)}
.q-nav-dot.wrong{background:var(--danger);color:#fff;border-color:var(--danger)}

/* Results */
.results-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;text-align:center;margin-top:16px}
.score-circle{width:140px;height:140px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:20px auto;font-size:2rem;font-weight:700}
.score-circle.pass{border:4px solid var(--success);color:var(--success)}
.score-circle.fail{border:4px solid var(--danger);color:var(--danger)}
.score-circle small{font-size:.75rem;font-weight:400;color:var(--text-dim)}
.result-label{font-size:1.3rem;font-weight:700;margin:12px 0}
.result-label.pass{color:var(--success)}
.result-label.fail{color:var(--danger)}
.result-stats{display:flex;gap:20px;justify-content:center;margin:16px 0;font-size:.85rem;color:var(--text-dim)}
.result-stats span{display:flex;align-items:center;gap:4px}
.dot-g{width:8px;height:8px;border-radius:50%;background:var(--success)}
.dot-r{width:8px;height:8px;border-radius:50%;background:var(--danger)}
.dot-s{width:8px;height:8px;border-radius:50%;background:var(--text-muted)}
.review-btn{margin-top:16px;padding:10px 24px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:.9rem}
.review-btn:hover{background:var(--primary-hover)}
.restart-btn{margin-top:10px;padding:10px 24px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-weight:600;font-size:.9rem}

/* Review */
.review-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.review-item.wrong-review{border-left:3px solid var(--danger)}
.review-item.right-review{border-left:3px solid var(--success)}
.review-label{font-size:.75rem;font-weight:600;margin-bottom:4px}
.your-ans{color:var(--danger)}.correct-ans{color:var(--success)}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:.78rem}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.back-top{margin-bottom:12px}
.back-top button{background:none;border:1px solid var(--border);color:var(--text-dim);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.82rem}

/* Multi-select note */
.multi-note{font-size:.78rem;color:var(--warning);margin-bottom:8px;font-style:italic}

@media(max-width:600px){
  .container{padding:10px}
  .q-card{padding:16px}
  .start-card{padding:20px}
  .mode-buttons{flex-direction:column}
  .mode-btn{width:100%}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>CompTIA Security+ SY0-701</h1>
    <div class="subtitle">Practice Quiz — Part 6</div>
    <div class="badge">111 Questions • EN/TH</div>
  </div>

  <!-- START SCREEN -->
  <div class="screen active" id="startScreen">
    <div class="start-card">
      <h2>เลือกโหมดการทำข้อสอบ</h2>
      <p style="color:var(--text-dim);font-size:.85rem;margin-bottom:8px">เกณฑ์ผ่าน: 70% (78/111 ข้อ)</p>
      <div class="stat-row">
        <span>📝 111 ข้อ</span>
        <span>⏱ ไม่จำกัดเวลา</span>
        <span>🌐 EN + TH</span>
      </div>
      <div class="mode-buttons">
        <button class="mode-btn filled" onclick="startQuiz('practice')">🎯 Practice Mode<br><small style="font-weight:400;font-size:.75rem">เฉลยทันทีทุกข้อ</small></button>
        <button class="mode-btn" onclick="startQuiz('exam')">📋 Exam Mode<br><small style="font-weight:400;font-size:.75rem">เฉลยตอนจบ</small></button>
      </div>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen" id="quizScreen">
    <div class="quiz-meta">
      <span id="qCounter">ข้อ 1 / 111</span>
      <span id="scoreDisplay">✓ 0 ✗ 0</span>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    
    <div class="q-card" id="questionCard"></div>
    
    <div class="nav-row">
      <button class="nav-btn prev" id="prevBtn" onclick="navigate(-1)">← ก่อนหน้า</button>
      <button class="nav-btn next" id="nextBtn" onclick="navigate(1)">ถัดไป →</button>
    </div>
    
    <div class="q-nav-toggle">
      <button onclick="toggleNav()">📍 เลือกข้อ</button>
    </div>
    <div class="q-nav-grid" id="qNavGrid"></div>
  </div>

  <!-- RESULTS SCREEN -->
  <div class="screen" id="resultScreen"></div>

  <!-- REVIEW SCREEN -->
  <div class="screen" id="reviewScreen"></div>
</div>

<script>
const QUESTIONS = [
{
  id:1, topic:"Exam Topic 1",
  en:"If a current private key is compromised, which of the following would ensure it cannot be used to decrypt all historical data?",
  th:"หาก private key ปัจจุบันถูก compromise ข้อใดจะทำให้ไม่สามารถใช้ถอดรหัสข้อมูลในอดีตทั้งหมดได้?",
  options:["A. Perfect forward secrecy","B. Elliptic-curve cryptography","C. Key stretching","D. Homomorphic encryption"],
  answer:"A",
  explainEN:"Perfect forward secrecy (PFS) generates a unique session key for each session. Even if one key is compromised, it cannot decrypt other sessions' data.",
  explainTH:"Perfect forward secrecy (PFS) สร้าง session key เฉพาะสำหรับแต่ละ session ดังนั้นแม้ key หนึ่งถูก compromise ก็ไม่สามารถถอดรหัส session อื่นได้"
},
{
  id:2, topic:"Exam Topic 1",
  en:"Which of the following would produce the closest experience of responding to an actual incident response scenario?",
  th:"ข้อใดจะให้ประสบการณ์ใกล้เคียงกับการตอบสนองต่อเหตุการณ์จริงมากที่สุด?",
  options:["A. Lessons learned","B. Simulation","C. Walk-through","D. Tabletop"],
  answer:"B",
  explainEN:"A simulation exercise creates an experience as close as possible to a real-world incident response scenario by simulating an attack and having personnel respond as they would in a real incident.",
  explainTH:"การฝึก Simulation สร้างประสบการณ์ใกล้เคียงเหตุการณ์จริงมากที่สุด โดยจำลองการโจมตีและให้บุคลากรตอบสนองเหมือนเหตุการณ์จริง"
},
{
  id:3, topic:"Exam Topic 1",
  en:"Developers are writing code and merging it into shared repositories several times a day, where it is tested automatically. Which concept does this BEST represent?",
  th:"นักพัฒนาเขียนโค้ดและ merge เข้า shared repository หลายครั้งต่อวัน โดยมีการทดสอบอัตโนมัติ ข้อใดอธิบายแนวคิดนี้ได้ดีที่สุด?",
  options:["A. Functional testing","B. Stored procedures","C. Elasticity","D. Continuous integration"],
  answer:"D",
  explainEN:"Continuous integration (CI) is a practice where developers merge code into a shared repository frequently, and it is tested automatically to reduce errors and conflicts.",
  explainTH:"Continuous integration (CI) คือการที่นักพัฒนา merge โค้ดเข้า shared repository บ่อยครั้ง และมีการทดสอบอัตโนมัติเพื่อลดข้อผิดพลาดและความขัดแย้ง"
},
{
  id:4, topic:"Exam Topic 1",
  en:"The CEO announced a new partnership and asked the CISO to federate user digital identities using SAML-based protocols. Which of the following will this enable?",
  th:"CEO ประกาศ partnership ใหม่ และขอให้ CISO ทำ federate digital identities ผ่าน SAML ข้อใดที่จะเปิดใช้งานได้?",
  options:["A. SSO","B. MFA","C. PKI","D. OLP"],
  answer:"A",
  explainEN:"Federating user digital identities using SAML enables Single Sign-On (SSO), allowing users to log in once and access multiple applications.",
  explainTH:"การ federate digital identities ผ่าน SAML ทำให้ใช้ Single Sign-On (SSO) ได้ ผู้ใช้ล็อกอินครั้งเดียวเข้าถึงหลายแอปพลิเคชัน"
},
{
  id:5, topic:"Exam Topic 1",
  en:"A company reduced datacenter area by creating virtual networking through automation and provisioning routes/rules through scripting. Which does this describe?",
  th:"บริษัทลดพื้นที่ datacenter โดยสร้าง virtual networking ผ่าน automation และ provisioning routes/rules ผ่าน scripting ข้อใดอธิบายสิ่งนี้?",
  options:["A. IaC","B. MSSP","C. Containers","D. SaaS"],
  answer:"A",
  explainEN:"Infrastructure as Code (IaC) allows creation of virtual networks, automation, and scripting to reduce datacenter footprint.",
  explainTH:"Infrastructure as Code (IaC) ช่วยให้สร้าง virtual networks, automation และ scripting เพื่อลดพื้นที่ datacenter"
},
{
  id:6, topic:"Exam Topic 1",
  en:"A security researcher alerted an organization that its sensitive user data was found for sale on a website. Which should the organization use to inform affected parties?",
  th:"นักวิจัยความปลอดภัยแจ้งว่าข้อมูลผู้ใช้ขององค์กรถูกนำไปขายบนเว็บไซต์ องค์กรควรใช้อะไรแจ้งผู้ที่ได้รับผลกระทบ?",
  options:["A. An incident response plan","B. A communications plan","C. A business continuity plan","D. A disaster recovery plan"],
  answer:"B",
  explainEN:"A communications plan outlines how an organization communicates with stakeholders during a crisis, including who communicates, what channels, and what messages.",
  explainTH:"Communications plan ระบุวิธีสื่อสารกับผู้มีส่วนได้ส่วนเสียในช่วงวิกฤต รวมถึงผู้รับผิดชอบ ช่องทาง และข้อความที่จะสื่อสาร"
},
{
  id:7, topic:"Exam Topic 1",
  en:"Several embedded systems run unsecure protocols. The developing company is no longer in business. Which constraint BEST describes why findings cannot be remediated?",
  th:"ระบบ embedded หลายตัวใช้ protocol ไม่ปลอดภัย บริษัทผู้พัฒนาเลิกกิจการแล้ว ข้อจำกัดใดอธิบายเหตุผลที่แก้ไขไม่ได้?",
  options:["A. Inability to authenticate","B. Implied trust","C. Lack of computing power","D. Unavailable patch"],
  answer:"D",
  explainEN:"Since the developing company is no longer in business, there are no patches available to fix the unsecure protocols on the embedded systems.",
  explainTH:"เนื่องจากบริษัทผู้พัฒนาเลิกกิจการแล้ว จึงไม่มี patch สำหรับแก้ไข protocol ที่ไม่ปลอดภัยบนระบบ embedded"
},
{
  id:8, topic:"Exam Topic 1",
  en:"Which of the following is a physical security control that ensures only the authorized user is present when gaining access to a secured area?",
  th:"ข้อใดเป็น physical security control ที่ทำให้มั่นใจว่ามีเฉพาะผู้ที่ได้รับอนุญาตเท่านั้นเมื่อเข้าพื้นที่ปลอดภัย?",
  options:["A. A biometric scanner","B. A smart card reader","C. A PKI token","D. A PIN pad"],
  answer:"A",
  explainEN:"A biometric scanner uses physical characteristics like fingerprints to identify an individual, ensuring only the authorized user is present.",
  explainTH:"Biometric scanner ใช้ลักษณะทางกายภาพ เช่น ลายนิ้วมือ เพื่อยืนยันตัวตน ทำให้มั่นใจว่ามีเฉพาะผู้ที่ได้รับอนุญาต"
},
{
  id:9, topic:"Exam Topic 1",
  en:"An organization discovered a disgruntled employee exfiltrated PII data by uploading files. Which control should mitigate this risk?",
  th:"องค์กรพบว่าพนักงานที่ไม่พอใจ exfiltrate ข้อมูล PII โดยอัปโหลดไฟล์ ควรใช้ control ใดเพื่อลดความเสี่ยงนี้?",
  options:["A. EDR","B. Firewall","C. HIPS","D. DLP"],
  answer:"D",
  explainEN:"Data Loss Prevention (DLP) monitors and controls data flows to prevent unauthorized transfer of sensitive data like PII.",
  explainTH:"Data Loss Prevention (DLP) ตรวจสอบและควบคุมการไหลของข้อมูลเพื่อป้องกันการถ่ายโอนข้อมูลที่ไม่ได้รับอนุญาต เช่น PII"
},
{
  id:10, topic:"Exam Topic 1",
  en:"A bad actor tries to persuade someone to provide financial information over the phone. Which attack type does this describe?",
  th:"ผู้ไม่หวังดีพยายามหลอกลวงให้เหยื่อให้ข้อมูลทางการเงินผ่านโทรศัพท์ ข้อใดอธิบายการโจมตีนี้?",
  options:["A. Vishing","B. Phishing","C. Spear phishing","D. Whaling"],
  answer:"A",
  explainEN:"Vishing is a social engineering attack using phone calls or voicemail to trick people into divulging sensitive information.",
  explainTH:"Vishing คือการโจมตีแบบ social engineering ผ่านโทรศัพท์หรือข้อความเสียงเพื่อหลอกให้เปิดเผยข้อมูลสำคัญ"
},
{
  id:11, topic:"Exam Topic 1",
  en:"A company installed crosscut shredders as part of increased information security practices. Which risk will this practice reduce?",
  th:"บริษัทติดตั้งเครื่องทำลายเอกสารแบบ crosscut เพื่อเพิ่มความปลอดภัยข้อมูล ข้อใดจะลดความเสี่ยงได้?",
  options:["A. Dumpster diving","B. Shoulder surfing","C. Information elicitation","D. Credential harvesting"],
  answer:"A",
  explainEN:"Crosscut shredders destroy paper documents, reducing the risk of dumpster diving — retrieving sensitive information from discarded documents.",
  explainTH:"เครื่องทำลายเอกสารแบบ crosscut ช่วยลดความเสี่ยงจาก dumpster diving คือการค้นหาข้อมูลสำคัญจากเอกสารที่ถูกทิ้ง"
},
{
  id:12, topic:"Exam Topic 1",
  en:"An enterprise needs to keep cryptographic keys in a safe manner. Which network appliance can achieve this?",
  th:"องค์กรต้องเก็บ cryptographic keys อย่างปลอดภัย อุปกรณ์เครือข่ายใดทำได้?",
  options:["A. HSM","B. CASB","C. TPM","D. DLP"],
  answer:"A",
  explainEN:"Hardware Security Module (HSM) is a network appliance designed to securely store cryptographic keys and perform cryptographic operations.",
  explainTH:"Hardware Security Module (HSM) เป็นอุปกรณ์เครือข่ายที่ออกแบบมาเพื่อเก็บ cryptographic keys อย่างปลอดภัยและดำเนินการ cryptographic"
},
{
  id:13, topic:"Exam Topic 1",
  en:"Which method would a security analyst use to confirm a downloaded file is not altered in transit using a verified checksum?",

}

</script>

<script>
let mode='practice', currentQ=0, answers={}, score={correct:0,wrong:0};
const PASS_MARK=0.7;

function startQuiz(m){
  mode=m; currentQ=0; answers={}; score={correct:0,wrong:0};
  show('quizScreen');
  buildNavGrid();
  renderQuestion();
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function renderQuestion(){
  const q=QUESTIONS[currentQ];
  const isMulti=q.answer.length>1;
  const userAns=answers[currentQ];
  const answered=userAns!==undefined;
  const revealed=mode==='practice'&&answered;

  let html=`<div class="q-num">Question ${q.id} — ${q.topic}</div>
    <div class="q-text">${q.en}</div>
    <div class="q-text-th">${q.th}</div>`;
  
  if(isMulti) html+=`<div class="multi-note">⚠ เลือกหลายคำตอบ (${q.answer.length} ข้อ)</div>`;
  
  html+=`<div class="options">`;
  q.options.forEach((opt,i)=>{
    const letter=opt.charAt(0);
    let cls='opt-btn';
    if(revealed){
      cls+=' disabled';
      if(q.answer.includes(letter)) cls+=' correct';
      else if(userAns&&userAns.includes(letter)) cls+=' incorrect';
    } else if(answered && mode==='exam'){
      if(userAns.includes(letter)) cls+=' selected';
    } else if(!answered){
      // clickable
    }
    html+=`<div class="${cls}" onclick="selectAnswer(${currentQ},'${letter}',${isMulti})" data-letter="${letter}">
      <span class="opt-letter">${letter}</span><span>${opt.substring(3)}</span></div>`;
  });
  html+=`</div>`;

  if(revealed){
    html+=`<div class="explanation show">
      <h4>✔ คำตอบ: ${q.answer}</h4>
      <p><strong>EN:</strong> ${q.explainEN}</p>
      <p><span class="th-label">TH:</span> ${q.explainTH}</p>
    </div>`;
  }

  document.getElementById('questionCard').innerHTML=html;
  document.getElementById('qCounter').textContent=`ข้อ ${currentQ+1} / ${QUESTIONS.length}`;
  document.getElementById('progressBar').style.width=((currentQ+1)/QUESTIONS.length*100)+'%';
  document.getElementById('scoreDisplay').textContent=`✓ ${score.correct}  ✗ ${score.wrong}`;
  document.getElementById('prevBtn').disabled=currentQ===0;
  
  const allAnswered=Object.keys(answers).length===QUESTIONS.length;
  const nb=document.getElementById('nextBtn');
  if(currentQ===QUESTIONS.length-1){
    if(mode==='exam'&&allAnswered){
      nb.textContent='📊 ดูผลลัพธ์';nb.className='nav-btn submit';nb.onclick=()=>showResults();
    } else if(mode==='practice'){
      nb.textContent='📊 ดูผลลัพธ์';nb.className='nav-btn submit';nb.onclick=()=>showResults();
    } else {
      nb.textContent='ถัดไป →';nb.className='nav-btn next';nb.disabled=true;nb.onclick=()=>navigate(1);
    }
  } else {
    nb.textContent='ถัดไป →';nb.className='nav-btn next';nb.disabled=false;nb.onclick=()=>navigate(1);
  }
  updateNavGrid();
}

function selectAnswer(qi,letter,isMulti){
  const q=QUESTIONS[qi];
  if(mode==='practice'&&answers[qi]!==undefined) return;
  if(mode==='exam'&&Object.keys(answers).length===QUESTIONS.length) return;

  if(isMulti){
    if(!answers[qi]) answers[qi]=[];
    else if(mode==='practice') return;
    const idx=answers[qi].indexOf(letter);
    if(idx>-1) answers[qi].splice(idx,1);
    else answers[qi].push(letter);
    
    if(mode==='practice'&&answers[qi].length===q.answer.length){
      checkAnswer(qi);
    } else if(mode==='exam'){
      renderQuestion();
    } else {
      // Highlight selected in practice before complete
      renderQuestion();
    }
  } else {
    answers[qi]=[letter];
    if(mode==='practice') checkAnswer(qi);
    else renderQuestion();
  }
}

function checkAnswer(qi){
  const q=QUESTIONS[qi];
  const userSorted=[...answers[qi]].sort().join('');
  const correctSorted=[...q.answer].sort().join('');
  if(userSorted===correctSorted) score.correct++;
  else score.wrong++;
  renderQuestion();
}

function navigate(dir){
  currentQ+=dir;
  if(currentQ<0) currentQ=0;
  if(currentQ>=QUESTIONS.length) currentQ=QUESTIONS.length-1;
  renderQuestion();
  window.scrollTo(0,0);
}

function toggleNav(){
  document.getElementById('qNavGrid').classList.toggle('show');
}

function buildNavGrid(){
  let html='';
  QUESTIONS.forEach((_,i)=>{
    html+=`<div class="q-nav-dot" data-i="${i}" onclick="jumpTo(${i})">${i+1}</div>`;
  });
  document.getElementById('qNavGrid').innerHTML=html;
}

function updateNavGrid(){
  document.querySelectorAll('.q-nav-dot').forEach(dot=>{
    const i=parseInt(dot.dataset.i);
    dot.className='q-nav-dot';
    if(i===currentQ) dot.classList.add('current');
    if(answers[i]!==undefined){
      if(mode==='practice'){
        const q=QUESTIONS[i];
        const userSorted=[...answers[i]].sort().join('');
        const correctSorted=[...q.answer].sort().join('');
        dot.classList.add(userSorted===correctSorted?'right':'wrong');
      } else {
        dot.classList.add('answered');
      }
    }
  });
}

function jumpTo(i){
  currentQ=i;
  renderQuestion();
  document.getElementById('qNavGrid').classList.remove('show');
  window.scrollTo(0,0);
}

function showResults(){
  // In exam mode, score all unanswered and answered
  if(mode==='exam'){
    score={correct:0,wrong:0};
    QUESTIONS.forEach((q,i)=>{
      if(answers[i]){
        const userSorted=[...answers[i]].sort().join('');
        const correctSorted=[...q.answer].sort().join('');
        if(userSorted===correctSorted) score.correct++;
        else score.wrong++;
      } else {
        score.wrong++;
      }
    });
  }
  
  const total=QUESTIONS.length;
  const pct=Math.round(score.correct/total*100);
  const passed=pct>=PASS_MARK*100;
  const skipped=total-score.correct-score.wrong;
  
  document.getElementById('resultScreen').innerHTML=`
    <div class="results-card">
      <h2>📊 ผลลัพธ์การสอบ</h2>
      <div class="score-circle ${passed?'pass':'fail'}">
        ${pct}%
        <small>${score.correct}/${total}</small>
      </div>
      <div class="result-label ${passed?'pass':'fail'}">${passed?'✅ PASSED — ผ่าน!':'❌ FAILED — ไม่ผ่าน'}</div>
      <p style="color:var(--text-dim);font-size:.85rem">เกณฑ์ผ่าน: 70% (${Math.ceil(total*PASS_MARK)} ข้อ)</p>
      <div class="result-stats">
        <span><span class="dot-g"></span> ถูก: ${score.correct}</span>
        <span><span class="dot-r"></span> ผิด: ${score.wrong}</span>
        ${skipped>0?`<span><span class="dot-s"></span> ข้าม: ${skipped}</span>`:''}
      </div>
      <button class="review-btn" onclick="showReview()">🔍 ทบทวนคำตอบ</button><br>
      <button class="restart-btn" onclick="location.reload()">🔄 เริ่มใหม่</button>
    </div>`;
  show('resultScreen');
}

function showReview(filter='all'){
  let html=`<div class="back-top"><button onclick="show('resultScreen')">← กลับผลลัพธ์</button></div>
    <div class="filter-bar">
      <button class="filter-btn ${filter==='all'?'active':''}" onclick="showReview('all')">ทั้งหมด</button>
      <button class="filter-btn ${filter==='wrong'?'active':''}" onclick="showReview('wrong')">❌ ข้อที่ผิด</button>
      <button class="filter-btn ${filter==='right'?'active':''}" onclick="showReview('right')">✅ ข้อที่ถูก</button>
      <button class="filter-btn ${filter==='skipped'?'active':''}" onclick="showReview('skipped')">⏭ ข้ามไป</button>
    </div>`;

  QUESTIONS.forEach((q,i)=>{
    const userAns=answers[i];
    const userSorted=userAns?[...userAns].sort().join(''):'';
    const correctSorted=[...q.answer].sort().join('');
    const isCorrect=userSorted===correctSorted;
    const isSkipped=!userAns;

    if(filter==='wrong'&&(isCorrect||isSkipped)) return;
    if(filter==='right'&&!isCorrect) return;
    if(filter==='skipped'&&!isSkipped) return;

    html+=`<div class="review-item ${isSkipped?'':isCorrect?'right-review':'wrong-review'}">
      <div class="q-num">Q${q.id}</div>
      <div class="q-text" style="font-size:.85rem;margin-bottom:4px">${q.en}</div>
      <div class="q-text-th" style="font-size:.8rem;margin-bottom:8px">${q.th}</div>
      <div class="review-label">คำตอบของคุณ: <span class="${isCorrect?'correct-ans':'your-ans'}">${userAns?userAns.join(', '):'ไม่ได้ตอบ'}</span></div>
      <div class="review-label">คำตอบที่ถูก: <span class="correct-ans">${q.answer}</span></div>
      <div class="explanation show" style="margin-top:10px">
        <p><strong>EN:</strong> ${q.explainEN}</p>
        <p><span class="th-label">TH:</span> ${q.explainTH}</p>
      </div>
    </div>`;
  });

  document.getElementById('reviewScreen').innerHTML=html;
  show('reviewScreen');
}
</script>
</body>
</html>
