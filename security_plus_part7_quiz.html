<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompTIA Security+ SY0-701 — Part 7 Quiz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--surface:#1a1d27;--card:#222639;--border:#2e3347;
  --primary:#6c8cff;--primary-dim:#4a63b8;--accent:#ff6b9d;
  --green:#4ade80;--red:#f87171;--yellow:#fbbf24;--orange:#fb923c;
  --text:#e2e8f0;--text-dim:#94a3b8;--text-muted:#64748b;
  --radius:12px;--shadow:0 4px 24px rgba(0,0,0,.4);
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
.container{max-width:900px;margin:0 auto;padding:16px}

/* Header */
.header{background:linear-gradient(135deg,#1e2235,#2a2f4a);border-bottom:1px solid var(--border);padding:16px 0;position:sticky;top:0;z-index:100}
.header-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.logo{font-size:1.1rem;font-weight:700;color:var(--primary)}
.logo small{font-size:.75rem;color:var(--text-dim);font-weight:400;display:block}
.mode-badge{padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:600}
.mode-badge.practice{background:rgba(74,222,128,.15);color:var(--green)}
.mode-badge.exam{background:rgba(248,113,113,.15);color:var(--red)}

/* Progress */
.progress-wrap{margin:12px 0}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width .4s ease;border-radius:3px}
.progress-text{display:flex;justify-content:space-between;font-size:.78rem;color:var(--text-dim);margin-top:4px}

/* Start Screen */
.start-screen{text-align:center;padding:60px 20px}
.start-screen h1{font-size:2rem;margin-bottom:8px;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.start-screen p{color:var(--text-dim);margin-bottom:32px;max-width:500px;margin-left:auto;margin-right:auto}
.start-screen .stat-row{display:flex;justify-content:center;gap:24px;margin-bottom:32px;flex-wrap:wrap}
.stat-box{background:var(--card);padding:16px 24px;border-radius:var(--radius);border:1px solid var(--border)}
.stat-box .num{font-size:1.8rem;font-weight:700;color:var(--primary)}
.stat-box .lbl{font-size:.75rem;color:var(--text-dim)}
.mode-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.mode-btn{padding:16px 32px;border-radius:var(--radius);font-size:1rem;font-weight:600;transition:all .2s}
.mode-btn.practice{background:linear-gradient(135deg,#2d6a4f,#1b4332);color:var(--green);border:1px solid rgba(74,222,128,.3)}
.mode-btn.practice:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(74,222,128,.2)}
.mode-btn.exam{background:linear-gradient(135deg,#7f1d1d,#5c1010);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.mode-btn.exam:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(248,113,113,.2)}

/* Question Card */
.question-area{display:none}
.q-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:24px;margin-bottom:16px;box-shadow:var(--shadow)}
.q-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.q-num{background:var(--primary);color:#fff;padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:700;white-space:nowrap}
.q-multi{font-size:.75rem;color:var(--yellow);background:rgba(251,191,36,.12);padding:2px 10px;border-radius:12px}
.q-text{font-size:1.05rem;margin-bottom:8px;line-height:1.7}
.q-text-th{font-size:.92rem;color:var(--text-dim);margin-bottom:20px;line-height:1.7;padding-left:12px;border-left:3px solid var(--primary-dim)}

/* Options */
.options{display:flex;flex-direction:column;gap:8px}
.opt-btn{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:.95rem;color:var(--text);text-align:left;transition:all .15s;line-height:1.5}
.opt-btn:hover:not(.disabled){background:#252a3e;border-color:var(--primary-dim)}
.opt-btn.selected{background:rgba(108,140,255,.1);border-color:var(--primary)}
.opt-btn.correct{background:rgba(74,222,128,.1);border-color:var(--green);color:var(--green)}
.opt-btn.wrong{background:rgba(248,113,113,.1);border-color:var(--red);color:var(--red)}
.opt-btn.disabled{pointer-events:none;opacity:.85}
.opt-btn .marker{min-width:24px;height:24px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;margin-top:1px;transition:all .15s}
.opt-btn.selected .marker{border-color:var(--primary);background:var(--primary);color:#fff}
.opt-btn.correct .marker{border-color:var(--green);background:var(--green);color:#000}
.opt-btn.wrong .marker{border-color:var(--red);background:var(--red);color:#fff}

/* Explanation */
.explanation{display:none;margin-top:16px;padding:16px;border-radius:10px;border:1px solid var(--border);background:var(--surface);animation:fadeIn .3s}
.explanation.show{display:block}
.expl-title{font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.expl-title.correct-title{color:var(--green)}
.expl-title.wrong-title{color:var(--red)}
.expl-text{font-size:.9rem;color:var(--text-dim);line-height:1.7;margin-bottom:8px}
.expl-divider{border:none;border-top:1px solid var(--border);margin:8px 0}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Nav Buttons */
.nav-btns{display:flex;gap:12px;justify-content:space-between;margin-top:16px;flex-wrap:wrap}
.nav-btn{padding:10px 24px;border-radius:10px;font-size:.9rem;font-weight:600;transition:all .15s}
.nav-btn.prev{background:var(--surface);color:var(--text-dim);border:1px solid var(--border)}
.nav-btn.prev:hover{background:var(--card)}
.nav-btn.next{background:var(--primary);color:#fff}
.nav-btn.next:hover{filter:brightness(1.1)}
.nav-btn.finish{background:linear-gradient(135deg,var(--accent),#e14578);color:#fff}
.nav-btn:disabled{opacity:.4;pointer-events:none}

/* Question Navigator */
.q-nav{margin:16px 0;padding:16px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border)}
.q-nav-title{font-size:.8rem;color:var(--text-dim);margin-bottom:8px}
.q-nav-grid{display:flex;flex-wrap:wrap;gap:6px}
.q-dot{width:36px;height:36px;border-radius:8px;font-size:.75rem;font-weight:600;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);color:var(--text-dim);transition:all .15s}
.q-dot:hover{background:var(--card);border-color:var(--primary-dim)}
.q-dot.current{border-color:var(--primary);background:rgba(108,140,255,.15);color:var(--primary)}
.q-dot.answered{background:rgba(108,140,255,.1);border-color:var(--primary-dim);color:var(--primary)}
.q-dot.correct-dot{background:rgba(74,222,128,.15);border-color:var(--green);color:var(--green)}
.q-dot.wrong-dot{background:rgba(248,113,113,.15);border-color:var(--red);color:var(--red)}

/* Results */
.results{display:none;padding:20px 0;animation:fadeIn .4s}
.results-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:32px;text-align:center;box-shadow:var(--shadow)}
.results-card h2{font-size:1.6rem;margin-bottom:8px}
.score-circle{width:160px;height:160px;margin:24px auto;position:relative}
.score-circle svg{transform:rotate(-90deg)}
.score-circle .score-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.2rem;font-weight:800}
.score-circle .score-label{position:absolute;top:50%;left:50%;transform:translate(-50%,20px);font-size:.8rem;color:var(--text-dim)}
.pass-badge{display:inline-block;padding:6px 20px;border-radius:20px;font-weight:700;font-size:1rem;margin:16px 0}
.pass-badge.passed{background:rgba(74,222,128,.15);color:var(--green);border:1px solid rgba(74,222,128,.3)}
.pass-badge.failed{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.results-stats{display:flex;justify-content:center;gap:24px;margin:20px 0;flex-wrap:wrap}
.r-stat{text-align:center}
.r-stat .val{font-size:1.4rem;font-weight:700}
.r-stat .lbl{font-size:.75rem;color:var(--text-dim)}
.r-stat .val.green{color:var(--green)}
.r-stat .val.red{color:var(--red)}
.r-stat .val.yellow{color:var(--yellow)}
.review-section{margin-top:24px;text-align:left}
.review-section h3{font-size:1rem;margin-bottom:12px;color:var(--text-dim)}
.review-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.review-item .ri-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.review-item .ri-q{font-size:.9rem;line-height:1.5}
.review-item .ri-q-th{font-size:.82rem;color:var(--text-dim);margin:6px 0}
.review-item .ri-ans{font-size:.82rem;margin-top:6px}
.review-item .ri-ans .your{color:var(--red)}
.review-item .ri-ans .correct{color:var(--green)}
.review-item .ri-expl{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:.82rem;color:var(--text-dim);line-height:1.6}
.results-actions{display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.results-actions button{padding:12px 28px;border-radius:10px;font-size:.9rem;font-weight:600}
.btn-restart{background:var(--primary);color:#fff}
.btn-review{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-review-wrong{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.3)}

/* Timer */
.timer{font-size:.85rem;color:var(--text-dim);display:flex;align-items:center;gap:4px}
.timer svg{width:14px;height:14px}

/* Filter tabs */
.filter-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-tab{padding:6px 16px;border-radius:20px;font-size:.8rem;background:var(--surface);border:1px solid var(--border);color:var(--text-dim);transition:all .15s}
.filter-tab.active{background:rgba(108,140,255,.15);border-color:var(--primary);color:var(--primary)}

@media(max-width:600px){
  .container{padding:12px}
  .q-card{padding:16px}
  .start-screen h1{font-size:1.5rem}
  .q-text{font-size:.95rem}
  .q-dot{width:32px;height:32px;font-size:.7rem}
  .opt-btn{padding:12px;font-size:.88rem}
  .results-card{padding:20px}
}
</style>
</head>
<body>

<div class="header">
<div class="container header-inner">
  <div class="logo">Security+ SY0-701<small>Part 7 — 61 Questions</small></div>
  <div id="headerRight"></div>
</div>
</div>

<div class="container">
  <!-- Start Screen -->
  <div id="startScreen" class="start-screen">
    <h1>CompTIA Security+ SY0-701</h1>
    <p>ข้อสอบฝึกซ้อม Part 7 — คำถามภาษาไทย พร้อมเฉลย 2 ภาษา</p>
    <div class="stat-row">
      <div class="stat-box"><div class="num">61</div><div class="lbl">คำถาม</div></div>
      <div class="stat-box"><div class="num">70%</div><div class="lbl">เกณฑ์ผ่าน</div></div>
      <div class="stat-box"><div class="num">2</div><div class="lbl">โหมด</div></div>
    </div>
    <div class="mode-btns">
      <button class="mode-btn practice" onclick="startQuiz('practice')">
        🎯 Practice Mode<br><small>เฉลยทันทีทุกข้อ</small>
      </button>
      <button class="mode-btn exam" onclick="startQuiz('exam')">
        📝 Exam Mode<br><small>เฉลยเมื่อจบข้อสอบ</small>
      </button>
    </div>
  </div>

  <!-- Question Area -->
  <div id="questionArea" class="question-area">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text">
        <span id="progressLabel">ข้อ 1/61</span>
        <span id="scoreLabel"></span>
      </div>
    </div>

    <div class="q-card" id="qCard">
      <div class="q-header">
        <span class="q-num" id="qNum">Q1</span>
        <span class="q-multi" id="qMulti" style="display:none">เลือกหลายข้อ</span>
      </div>
      <div class="q-text" id="qText"></div>
      <div class="q-text-th" id="qTextTH"></div>
      <div class="options" id="optionsArea"></div>
      <div class="explanation" id="explanation">
        <div class="expl-title" id="explTitle"></div>
        <div class="expl-text" id="explEN"></div>
        <hr class="expl-divider">
        <div class="expl-text" id="explTH"></div>
      </div>
    </div>

    <div class="nav-btns">
      <button class="nav-btn prev" id="btnPrev" onclick="prevQ()">← ข้อก่อนหน้า</button>
      <div style="display:flex;gap:8px">
        <button class="nav-btn next" id="btnSubmit" onclick="submitAnswer()" style="display:none">ส่งคำตอบ</button>
        <button class="nav-btn next" id="btnNext" onclick="nextQ()">ข้อถัดไป →</button>
        <button class="nav-btn finish" id="btnFinish" onclick="finishQuiz()" style="display:none">🏁 จบข้อสอบ</button>
      </div>
    </div>

    <div class="q-nav">
      <div class="q-nav-title">📋 Question Navigator</div>
      <div class="q-nav-grid" id="qNavGrid"></div>
    </div>
  </div>

  <!-- Results -->
  <div id="resultsArea" class="results"></div>
</div>

<script>
// ===== QUESTIONS DATA PLACEHOLDER =====
const QUIZ_DATA = [
  {
    id: 1,
    qNum: "Q1",
    question: "Employees in the research and development business unit receive extensive training to ensure they understand how to best protect company data. Which of the following is the type of data these employees are most likely to use in day-to-day work activities?",
    questionTH: "พนักงานในหน่วยธุรกิจวิจัยและพัฒนาได้รับการฝึกอบรมอย่างเข้มข้นเพื่อให้เข้าใจวิธีปกป้องข้อมูลบริษัทอย่างดีที่สุด ข้อใดต่อไปนี้คือประเภทข้อมูลที่พนักงานเหล่านี้มีแนวโน้มจะใช้ในกิจกรรมการทำงานประจำวัน?",
    options: ["A. Encrypted", "B. Intellectual property", "C. Critical", "D. Data in transit"],
    answer: [1],
    multiple: false,
    explanationEN: "Intellectual property is data consisting of ideas, inventions, designs, or creative works with commercial value protected by law. R&D employees work with IP daily as they create new products/services, requiring extensive training to protect it.",
    explanationTH: "ทรัพย์สินทางปัญญา (Intellectual Property) คือข้อมูลที่ประกอบด้วยแนวคิด สิ่งประดิษฐ์ การออกแบบ หรือผลงานสร้างสรรค์ที่มีมูลค่าทางการค้าและได้รับการคุ้มครองตามกฎหมาย พนักงาน R&D ทำงานกับ IP ทุกวันเนื่องจากสร้างผลิตภัณฑ์/บริการใหม่ จึงต้องได้รับการฝึกอบรมอย่างเข้มข้นเพื่อปกป้องข้อมูลนี้"
  },
  {
    id: 2,
    qNum: "Q2",
    question: "Which of the following is the best reason to complete an audit in a banking environment?",
    questionTH: "ข้อใดต่อไปนี้เป็นเหตุผลที่ดีที่สุดในการดำเนินการตรวจสอบ (audit) ในสภาพแวดล้อมธนาคาร?",
    options: ["A. Regulatory requirement", "B. Organizational change", "C. Self-assessment requirement", "D. Service-level requirement"],
    answer: [0],
    multiple: false,
    explanationEN: "A regulatory requirement is a mandate imposed by a government or authority. In banking, audits are required by regulators to ensure compliance with laws, standards, and policies related to security, privacy, and financial reporting.",
    explanationTH: "ข้อกำหนดด้านกฎระเบียบ (Regulatory requirement) คือคำสั่งที่กำหนดโดยรัฐบาลหรือหน่วยงานกำกับดูแล ในภาคธนาคาร การตรวจสอบถูกกำหนดโดยหน่วยงานกำกับดูแลเพื่อให้มั่นใจว่าปฏิบัติตามกฎหมาย มาตรฐาน และนโยบายที่เกี่ยวข้องกับความปลอดภัย ความเป็นส่วนตัว และการรายงานทางการเงิน"
  },
  {
    id: 3,
    qNum: "Q3",
    question: "Which of the following must be considered when designing a high-availability network? (Choose two).",
    questionTH: "ข้อใดต่อไปนี้ต้องพิจารณาเมื่อออกแบบเครือข่ายที่มีความพร้อมใช้งานสูง (high-availability)? (เลือก 2 ข้อ)",
    options: ["A. Ease of recovery", "B. Ability to patch", "C. Physical isolation", "D. Responsiveness", "E. Attack surface", "F. Extensible authentication"],
    answer: [0, 4],
    multiple: true,
    explanationEN: "High-availability networks must consider: Ease of recovery (ability to restore functionality quickly after failure via backup/failover/disaster recovery) and Attack surface (exposure to threats, reduced by firewalls, encryption, segmentation, hardening).",
    explanationTH: "เครือข่าย high-availability ต้องพิจารณา: ความง่ายในการกู้คืน (Ease of recovery) คือความสามารถในการกู้คืนระบบอย่างรวดเร็วหลังเกิดข้อขัดข้อง ผ่าน backup/failover/disaster recovery และ Attack surface คือระดับการเปิดรับภัยคุกคาม ลดได้ด้วย firewall, encryption, segmentation, hardening"
  },
  {
    id: 4,
    qNum: "Q4",
    question: "An engineer needs to find a solution that creates an added layer of security by preventing unauthorized access to internal company resources. Which of the following would be the best solution?",
    questionTH: "วิศวกรต้องการหาโซลูชันที่สร้างชั้นความปลอดภัยเพิ่มเติมโดยป้องกันการเข้าถึงทรัพยากรภายในบริษัทโดยไม่ได้รับอนุญาต ข้อใดเป็นโซลูชันที่ดีที่สุด?",
    options: ["A. RDP server", "B. Jump server", "C. Proxy server", "D. Hypervisor"],
    answer: [1],
    multiple: false,
    explanationEN: "A jump server (bastion host) acts as an intermediary between a user and target system, providing an added security layer. Users connect via SSH to the jump server, then access internal resources. It enforces authentication, authorization, logging, and auditing.",
    explanationTH: "Jump server (bastion host) ทำหน้าที่เป็นตัวกลางระหว่างผู้ใช้และระบบเป้าหมาย สร้างชั้นความปลอดภัยเพิ่มเติม ผู้ใช้เชื่อมต่อผ่าน SSH ไปยัง jump server แล้วเข้าถึงทรัพยากรภายใน มันบังคับใช้ authentication, authorization, logging และ auditing"
  },
  {
    id: 5,
    qNum: "Q5",
    question: "Which of the following can best protect against an employee inadvertently installing malware on a company system?",
    questionTH: "ข้อใดสามารถป้องกันพนักงานจากการติดตั้ง malware โดยไม่ตั้งใจบนระบบของบริษัทได้ดีที่สุด?",
    options: ["A. Host-based firewall", "B. System isolation", "C. Least privilege", "D. Application allow list"],
    answer: [3],
    multiple: false,
    explanationEN: "An application allow list specifies which applications are authorized to run and blocks all others, preventing execution of unauthorized or malicious software like viruses, worms, trojans, ransomware, or spyware.",
    explanationTH: "Application allow list ระบุว่าแอปพลิเคชันใดได้รับอนุญาตให้ทำงานและบล็อกอื่นทั้งหมด ป้องกันการทำงานของซอฟต์แวร์ที่ไม่ได้รับอนุญาตหรือเป็นอันตราย เช่น virus, worm, trojan, ransomware หรือ spyware"
  },
  {
    id: 6,

let mode = '';
let currentQ = 0;
let answers = {};
let revealed = {};
let shuffledQuestions = [];
let timerInterval;
let startTime;

function startQuiz(m) {
  mode = m;
  shuffledQuestions = [...QUIZ_DATA].sort(() => Math.random() - 0.5);
  answers = {};
  revealed = {};
  currentQ = 0;
  startTime = Date.now();

  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('questionArea').style.display = 'block';
  document.getElementById('resultsArea').style.display = 'none';

  const badge = `<span class="mode-badge ${mode}">${mode === 'practice' ? '🎯 Practice' : '📝 Exam'}</span>`;
  const timer = mode === 'exam' ? `<div class="timer" id="timerDisp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span id="timerText">00:00</span></div>` : '';
  document.getElementById('headerRight').innerHTML = badge + timer;

  if (mode === 'exam') {
    timerInterval = setInterval(updateTimer, 1000);
  }

  buildNavGrid();
  renderQuestion();
}

function updateTimer() {
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const s = String(elapsed % 60).padStart(2, '0');
  const el = document.getElementById('timerText');
  if (el) el.textContent = `${m}:${s}`;
}

function buildNavGrid() {
  const grid = document.getElementById('qNavGrid');
  grid.innerHTML = '';
  shuffledQuestions.forEach((q, i) => {
    const dot = document.createElement('button');
    dot.className = 'q-dot';
    dot.textContent = i + 1;
    dot.onclick = () => { currentQ = i; renderQuestion(); };
    grid.appendChild(dot);
  });
}

function updateNavGrid() {
  const dots = document.querySelectorAll('.q-dot');
  dots.forEach((dot, i) => {
    dot.className = 'q-dot';
    if (i === currentQ) dot.classList.add('current');
    if (answers[i] !== undefined) {
      if (mode === 'practice' && revealed[i]) {
        dot.classList.add(isCorrect(i) ? 'correct-dot' : 'wrong-dot');
      } else {
        dot.classList.add('answered');
      }
    }
  });
}

function renderQuestion() {
  const q = shuffledQuestions[currentQ];
  document.getElementById('qNum').textContent = q.qNum;
  document.getElementById('qText').textContent = q.question;
  document.getElementById('qTextTH').textContent = q.questionTH;
  document.getElementById('qMulti').style.display = q.multiple ? '' : 'none';

  // Progress
  const answered = Object.keys(answers).length;
  document.getElementById('progressFill').style.width = `${(answered / shuffledQuestions.length) * 100}%`;
  document.getElementById('progressLabel').textContent = `ข้อ ${currentQ + 1}/${shuffledQuestions.length}`;

  if (mode === 'practice') {
    const correct = Object.keys(revealed).filter(k => isCorrect(parseInt(k))).length;
    document.getElementById('scoreLabel').textContent = `✓ ${correct}/${answered} ตอบถูก`;
  } else {
    document.getElementById('scoreLabel').textContent = `ตอบแล้ว ${answered}/${shuffledQuestions.length}`;
  }

  // Options
  const optArea = document.getElementById('optionsArea');
  optArea.innerHTML = '';
  const isRevealed = revealed[currentQ];
  const userAns = answers[currentQ] || [];

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    if (userAns.includes(i)) btn.classList.add('selected');
    if (isRevealed) {
      btn.classList.add('disabled');
      if (q.answer.includes(i)) btn.classList.add('correct');
      else if (userAns.includes(i)) btn.classList.add('wrong');
    }
    const marker = document.createElement('span');
    marker.className = 'marker';
    if (isRevealed && q.answer.includes(i)) marker.textContent = '✓';
    else if (isRevealed && userAns.includes(i)) marker.textContent = '✗';
    else marker.textContent = String.fromCharCode(65 + i);

    const text = document.createElement('span');
    text.textContent = opt;

    btn.appendChild(marker);
    btn.appendChild(text);
    if (!isRevealed) {
      btn.onclick = () => toggleOption(i, q.multiple);
    }
    optArea.appendChild(btn);
  });

  // Explanation
  const expl = document.getElementById('explanation');
  if (isRevealed) {
    expl.classList.add('show');
    const correct = isCorrect(currentQ);
    document.getElementById('explTitle').innerHTML = correct
      ? `<span class="expl-title correct-title">✅ ถูกต้อง!</span>`
      : `<span class="expl-title wrong-title">❌ ไม่ถูกต้อง — คำตอบที่ถูก: ${q.answer.map(a => q.options[a].split('.')[0]).join(', ')}</span>`;
    document.getElementById('explEN').innerHTML = `<strong>🇬🇧 EN:</strong> ${q.explanationEN}`;
    document.getElementById('explTH').innerHTML = `<strong>🇹🇭 TH:</strong> ${q.explanationTH}`;
  } else {
    expl.classList.remove('show');
  }

  // Submit button (practice mode)
  const btnSubmit = document.getElementById('btnSubmit');
  if (mode === 'practice' && !isRevealed && userAns.length > 0) {
    btnSubmit.style.display = '';
  } else {
    btnSubmit.style.display = 'none';
  }

  // Navigation
  document.getElementById('btnPrev').disabled = currentQ === 0;
  const isLast = currentQ === shuffledQuestions.length - 1;
  document.getElementById('btnNext').style.display = isLast ? 'none' : '';
  document.getElementById('btnFinish').style.display = (mode === 'exam' && answered >= shuffledQuestions.length) || isLast ? '' : 'none';

  updateNavGrid();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleOption(idx, multiple) {
  if (!answers[currentQ]) answers[currentQ] = [];
  const arr = answers[currentQ];
  const pos = arr.indexOf(idx);
  if (multiple) {
    if (pos > -1) arr.splice(pos, 1);
    else arr.push(idx);
  } else {
    answers[currentQ] = [idx];
  }
  renderQuestion();
}

function submitAnswer() {
  if (!answers[currentQ] || answers[currentQ].length === 0) return;
  revealed[currentQ] = true;
  renderQuestion();
}

function isCorrect(qIdx) {
  const q = shuffledQuestions[qIdx];
  const ua = answers[qIdx] || [];
  if (ua.length !== q.answer.length) return false;
  return q.answer.every(a => ua.includes(a));
}

function nextQ() {
  if (mode === 'practice' && answers[currentQ] && !revealed[currentQ]) {
    submitAnswer();
    return;
  }
  if (currentQ < shuffledQuestions.length - 1) {
    currentQ++;
    renderQuestion();
  }
}

function prevQ() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

function finishQuiz() {
  // Auto-reveal all in exam mode
  if (mode === 'exam') {
    shuffledQuestions.forEach((_, i) => { revealed[i] = true; });
  }
  if (timerInterval) clearInterval(timerInterval);
  const elapsed = Math.floor((Date.now() - startTime) / 1000);

  document.getElementById('questionArea').style.display = 'none';
  const res = document.getElementById('resultsArea');
  res.style.display = 'block';

  const total = shuffledQuestions.length;
  let correct = 0, wrong = 0, unanswered = 0;
  const wrongItems = [];

  shuffledQuestions.forEach((q, i) => {
    if (!answers[i] || answers[i].length === 0) {
      unanswered++;
      wrongItems.push(i);
    } else if (isCorrect(i)) {
      correct++;
    } else {
      wrong++;
      wrongItems.push(i);
    }
  });

  const pct = Math.round((correct / total) * 100);
  const passed = pct >= 70;
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;

  // Score circle
  const circumference = 2 * Math.PI * 68;
  const offset = circumference - (pct / 100) * circumference;
  const scoreColor = passed ? 'var(--green)' : 'var(--red)';

  let reviewHTML = '';
  wrongItems.forEach(i => {
    const q = shuffledQuestions[i];
    const ua = answers[i] || [];
    const uaText = ua.length ? ua.map(a => q.options[a]).join(', ') : 'ไม่ได้ตอบ';
    const caText = q.answer.map(a => q.options[a]).join(', ');
    reviewHTML += `
    <div class="review-item">
      <div class="ri-header">
        <span class="q-num">${q.qNum}</span>
        <span style="color:var(--red);font-size:.8rem">${ua.length ? '❌ ตอบผิด' : '⚠️ ไม่ได้ตอบ'}</span>
      </div>
      <div class="ri-q">${q.question}</div>
      <div class="ri-q-th">${q.questionTH}</div>
      <div class="ri-ans"><span class="your">คำตอบของคุณ: ${uaText}</span></div>
      <div class="ri-ans"><span class="correct">คำตอบที่ถูก: ${caText}</span></div>
      <div class="ri-expl"><strong>🇬🇧</strong> ${q.explanationEN}<br><strong>🇹🇭</strong> ${q.explanationTH}</div>
    </div>`;
  });

  res.innerHTML = `
  <div class="results-card">
    <h2>${passed ? '🎉 ยินดีด้วย! คุณสอบผ่าน!' : '📚 ยังไม่ผ่าน ลองอีกครั้ง!'}</h2>
    <div class="score-circle">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="68" fill="none" stroke="var(--border)" stroke-width="8"/>
        <circle cx="80" cy="80" r="68" fill="none" stroke="${scoreColor}" stroke-width="8"
          stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
      </svg>
      <div class="score-text" style="color:${scoreColor}">${pct}%</div>
      <div class="score-label">คะแนน</div>
    </div>
    <div class="pass-badge ${passed ? 'passed' : 'failed'}">${passed ? '✅ PASSED' : '❌ FAILED'} (เกณฑ์ผ่าน 70%)</div>
    <div class="results-stats">
      <div class="r-stat"><div class="val green">${correct}</div><div class="lbl">ถูก</div></div>
      <div class="r-stat"><div class="val red">${wrong}</div><div class="lbl">ผิด</div></div>
      <div class="r-stat"><div class="val yellow">${unanswered}</div><div class="lbl">ไม่ตอบ</div></div>
      <div class="r-stat"><div class="val">${mins}:${String(secs).padStart(2,'0')}</div><div class="lbl">เวลาที่ใช้</div></div>
    </div>
    <div class="results-actions">
      <button class="nav-btn btn-restart" onclick="location.reload()">🔄 เริ่มใหม่</button>
      <button class="nav-btn btn-review-wrong" onclick="toggleReview()">📋 ดูข้อที่ผิด (${wrongItems.length})</button>
    </div>
    <div class="review-section" id="reviewSection" style="display:none">
      <h3>📋 ทบทวนข้อที่ผิด/ไม่ได้ตอบ (${wrongItems.length} ข้อ)</h3>
      ${reviewHTML || '<p style="color:var(--text-dim)">ไม่มีข้อที่ผิด 🎉</p>'}
    </div>
  </div>`;
}

function toggleReview() {
  const s = document.getElementById('reviewSection');
  s.style.display = s.style.display === 'none' ? 'block' : 'none';
  if (s.style.display === 'block') s.scrollIntoView({ behavior: 'smooth' });
}
</script>
