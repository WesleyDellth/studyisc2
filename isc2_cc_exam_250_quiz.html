<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISC2 Certified in Cybersecurity (CC) Exam Practice</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0c0f1a;
  --surface: #151929;
  --surface-hover: #1c2137;
  --border: #2a2f45;
  --text: #e2e4ed;
  --text-dim: #8b90a5;
  --accent: #7c6aff;
  --accent-glow: rgba(124,106,255,0.15);
  --correct: #22c55e;
  --correct-bg: rgba(34,197,94,0.1);
  --correct-border: rgba(34,197,94,0.4);
  --wrong: #ef4444;
  --wrong-bg: rgba(239,68,68,0.1);
  --wrong-border: rgba(239,68,68,0.4);
  --gold: #f59e0b;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.app { max-width: 760px; margin: 0 auto; padding: 20px; }

.start-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 90vh; text-align: center;
}

.logo {
  font-family: 'JetBrains Mono', monospace; font-size: 14px;
  color: var(--accent); letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 16px;
}

.start-screen h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; line-height: 1.2; }
.start-screen p { color: var(--text-dim); font-size: 16px; margin-bottom: 40px; }

.mode-cards {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 16px; width: 100%; max-width: 500px; margin-bottom: 24px;
}

.mode-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px 20px; cursor: pointer;
  transition: all 0.2s; text-align: left;
}

.mode-card:hover { border-color: var(--accent); background: var(--surface-hover); transform: translateY(-2px); }
.mode-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 0 20px var(--accent-glow); }
.mode-card h3 { font-size: 16px; margin-bottom: 6px; }
.mode-card span { font-size: 13px; color: var(--text-dim); }

.count-row { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
.count-row label { font-size: 14px; color: var(--text-dim); }

.count-input {
  width: 80px; padding: 8px 12px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px; color: var(--text);
  font-size: 16px; font-family: 'JetBrains Mono', monospace; text-align: center;
}

.count-input:focus { outline: none; border-color: var(--accent); }

.btn {
  padding: 14px 40px; font-size: 16px; font-weight: 600;
  border: none; border-radius: 10px; cursor: pointer;
  transition: all 0.2s; font-family: 'Inter', sans-serif;
}

.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); }

.quiz-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 32px;
}

.progress-info { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--text-dim); }
.score-live { display: flex; gap: 20px; font-size: 14px; }
.score-correct { color: var(--correct); }
.score-wrong { color: var(--wrong); }

.progress-bar-track {
  width: 100%; height: 4px; background: var(--surface);
  border-radius: 2px; margin-bottom: 32px; overflow: hidden;
}

.progress-bar-fill {
  height: 100%; background: var(--accent);
  border-radius: 2px; transition: width 0.4s ease;
}

.question-number {
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  color: var(--accent); margin-bottom: 12px; letter-spacing: 1px;
}

.question-text { font-size: 20px; font-weight: 600; line-height: 1.5; margin-bottom: 28px; }

.options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }

.option-btn {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 16px 20px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px;
  cursor: pointer; transition: all 0.2s; text-align: left;
  font-size: 15px; color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.5;
}

.option-btn:hover:not(.disabled) { border-color: var(--accent); background: var(--surface-hover); }

.option-letter {
  font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 13px;
  min-width: 28px; height: 28px; display: flex; align-items: center;
  justify-content: center; border-radius: 6px; background: var(--bg); flex-shrink: 0; margin-top: 1px;
}

.option-btn.correct-selected { border-color: var(--correct-border); background: var(--correct-bg); }
.option-btn.correct-selected .option-letter { background: var(--correct); color: #fff; }
.option-btn.wrong-selected { border-color: var(--wrong-border); background: var(--wrong-bg); }
.option-btn.wrong-selected .option-letter { background: var(--wrong); color: #fff; }
.option-btn.correct-reveal { border-color: var(--correct-border); background: var(--correct-bg); }
.option-btn.correct-reveal .option-letter { background: var(--correct); color: #fff; }
.option-btn.disabled { cursor: default; opacity: 0.6; }
.option-btn.disabled:hover { border-color: var(--border); background: var(--surface); }

.explanation-box {
  margin-top: 20px; padding: 20px; background: var(--surface);
  border-left: 3px solid var(--accent); border-radius: 0 10px 10px 0;
  font-size: 14px; line-height: 1.7; color: var(--text-dim); animation: fadeIn 0.3s ease;
}

.explanation-box strong {
  color: var(--text); display: block; margin-bottom: 6px;
  font-size: 13px; letter-spacing: 0.5px; text-transform: uppercase;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.nav-row { display: flex; justify-content: flex-end; margin-top: 28px; }

.results { text-align: center; padding: 60px 0; animation: fadeIn 0.5s ease; }

.results-circle { width: 180px; height: 180px; margin: 0 auto 32px; position: relative; }
.results-circle svg { transform: rotate(-90deg); }
.results-circle .pct-text {
  position: absolute; inset: 0; display: flex;
  flex-direction: column; align-items: center; justify-content: center;
}

.pct-number { font-size: 48px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.pct-label { font-size: 14px; color: var(--text-dim); }

.results h2 { font-size: 28px; margin-bottom: 8px; }
.results .subtitle { color: var(--text-dim); font-size: 16px; margin-bottom: 40px; }

.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 40px; }

.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px;
}

.stat-card .val { font-size: 28px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.stat-card .lbl { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
.stat-card.green .val { color: var(--correct); }
.stat-card.red .val { color: var(--wrong); }
.stat-card.gold .val { color: var(--gold); }

.results-actions { display: flex; gap: 12px; justify-content: center; }

.review-section { margin-top: 48px; text-align: left; }
.review-section h3 {
  font-size: 18px; margin-bottom: 20px;
  padding-bottom: 12px; border-bottom: 1px solid var(--border);
}

.review-item {
  padding: 20px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px; margin-bottom: 12px;
}

.review-item.was-wrong { border-left: 3px solid var(--wrong); }
.review-q { font-weight: 600; margin-bottom: 8px; font-size: 15px; }
.review-meta { font-size: 13px; color: var(--text-dim); display: flex; gap: 16px; flex-wrap: wrap; }
.review-your { color: var(--wrong); }
.review-correct-label { color: var(--correct); }

@media (max-width: 600px) {
  .mode-cards { grid-template-columns: 1fr; }
  .stat-grid { grid-template-columns: 1fr; }
  .question-text { font-size: 17px; }
  .start-screen h1 { font-size: 24px; }
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const ALL_QUESTIONS = [{"id":1,"question":"The address 8be2:4382:8d84:7ce2:ec0f:3908:d29a:903a is an:","options":{"A":"Web address","B":"IPv4 address","C":"IPv6 address","D":"Mac address"},"correct":"C","explanation":"An IPv6 address is a 128-bit address represented as a sequence of eight groups of 16-bit hexadecimal values. An IPv4 address is a 32-bit address represented as a sequence of four 8-bit integers. A Mac address is a 48-bit address represented as six groups of 8 bits values in hexadecimal. A web address consists of a protocol name, a server address, and a resource path (see ISC2 Study Guide, chapter 4, module 1 - Understand Computer Networking)."},{"id":2,"question":"Which of the following canons is found in the ISC2 code of ethics?","options":{"A":"Advance and promote the profession","B":"Protect society, the common good, and the infrastructure","C":"Provide diligent and competent service to principals","D":"Act honorably, honestly, safely and legally"},"correct":"C","explanation":"Only \"Provide diligent and competent service to principals\" contains the accurate text of the ISC2 code of ethics. Although a security professional should discourage unsafe practices, no direct reference to acting safely exists in the canons. Aside from society, the common good and infrastructure, security professionals are expected to protect public trust and confidence. Finally, they are expected to protect the profession, and not just advance and promote it."},{"id":3,"question":"Which of the following is NOT an ethical canon of the ISC2?","options":{"A":"Advance and protect the profession","B":"Protect society, the common good, necessary public trust and confidence, and the infrastructure","C":"Act honorably, honestly, justly, responsibly and legally","D":"Provide active and qualified service to principal"},"correct":"D","explanation":"In the code of ethics, we read \"Provide diligent and competent service to principals\", and not \"Provide active and qualified service to principals.\"; all the other options are valid canons of the code of ethics (see ISC2 Study Guide Chapter 1, Module 5)."},{"id":4,"question":"The cloud deployment model where a company has resources on-premise and in the cloud is known as:","options":{"A":"Hybrid cloud","B":"Multi-tenant","C":"Private cloud","D":"Community cloud"},"correct":"A","explanation":"A hybrid cloud is a model that combines (i.e. orchestrates) on-premise infrastructure, private cloud services, and a public cloud to handle storage and service. A community cloud is an infrastructure where multiple organizations share resources and services based on common technological and regulatory necessities. Multi-tenancy refers to a context where several of a cloud vendor's customers share the same computing resources. A private cloud is a cloud computing model where the cloud infrastruct"},{"id":5,"question":"Which of the following is a public IP?","options":{"A":"13.16.123.1","B":"192.168.123.1","C":"172.16.123.1","D":"10.221.123.1"},"correct":"A","explanation":"The ranges of IP addresses 10.0.0.0 to 10.255.255.254, 172.16.0.0 to 172.31.255.254, and 192.168.0.0 to 192.168.255.254 are reserved for private use (see ISC2 Study Guide, chapter 4, module 1, under Internet Protocol - IPv4 and IPv6). Therefore, the IP address 13.16.123.1 is the only address in a public range."},{"id":6,"question":"Which of the following is a data handling policy procedure?","options":{"A":"Transform","B":"Collect","C":"Encode","D":"Destroy"},"correct":"D","explanation":"The data handling procedures are 'Classify', 'Categorize', 'Label', 'Store', 'Encrypt', 'Backup', and 'Destroy' (see ISC2 Study Guide, chapter 5, module 3)."},{"id":7,"question":"Which devices would be more effective in detecting an intrusion into a network?","options":{"A":"Routers","B":"HIDS","C":"Firewalls","D":"NIDS"},"correct":"D","explanation":"Network intrusion detection systems (NIDS) are network devices that detect malicious traffic on a network. Host intrusion detection systems (HIDS) are applications that monitor computer systems for intrusion. Typically, HIDS are not concerned with network devices. A firewall is a device that filters incoming Internet traffic. Routers receive and forward traffic, but (typically) do not analyze it."},{"id":8,"question":"Which concept describes an information security strategy that integrates people, technology and operations in order to establish security controls across multiple layers of the organization?","options":{"A":"Least Privilege","B":"Defense in Depth","C":"Separation of Duties","D":"Privileged Accounts"},"correct":"B","explanation":"Defense in depth describes a cybersecurity approach that uses multiple layers of security for holistic protection (see ISC2 Study Guide Chapter 1, Module 3). According to the principle of Separation of Duties, no user should ever be given enough privileges to misuse the system on their own. The principle of Least Privilege dictates that users should be given only those privileges required to complete their specific tasks. Privileged Accounts are a class of accounts that have permissions exceedin"},{"id":9,"question":"Which access control is more effective at protecting a door against unauthorized access?","options":{"A":"Fences","B":"Turnstiles","C":"Barriers","D":"Locks"},"correct":"D","explanation":"A lock is a device that prevents a physical structure (typically a door) from being opened, indicating that only the authorized person (i.e. the person with the key) can open it. A fence or a barrier will prevent ALL access. Turnstiles are physical barriers that can be easily overcome (after all, it is common knowledge that intruders can easily jump over a turnstile when no one is watching)."},{"id":10,"question":"Which of the following is a detection control?","options":{"A":"Turnstiles","B":"Smoke sensors","C":"Bollards","D":"Firewalls"},"correct":"B","explanation":"By definition, smoke detectors are fire protection devices employed for the early detection of fire. Firewalls are devicesthat filter incoming traffic, and are a type of logical preventive control. Bollards and turnstiles are types of physical preventive controls."},{"id":11,"question":"Which type of attack has the PRIMARY objective controlling the system from outside?","options":{"A":"Backdoors","B":"Rootkits","C":"Cross-Site Scripting","D":"Trojans"},"correct":"A","explanation":"Trojans and Rootkits are often used to install backdoors. A backdoor is a malicious feature that listens for commands on a specific logical port (TCP or UDP) and executes them on the attacked system or device, thereby giving direct control of the system or device to a malicious outside entity (or program). Cross-Site Scripting can execute code with the same github.com/ayemunhossain permissions as the scripts generated by the target website, compromising the confidentiality and integrity of data "},{"id":12,"question":"Which of the following is not a protocol of the OSI Level 3?","options":{"A":"SNMP","B":"ICMP","C":"IGMP","D":"IP"},"correct":"A","explanation":"Internet Protocol (IP) is known to be a level 3 protocol. Internet Control Message Protocol (ICMP) and Internet Group Management Protocol (IGMP) are also level 3 protocols. Simple Network Management Protocol (SNMP) is a protocol used to configure and monitor devices attached to networks. It is an application-level protocol (level 7), and therefore the only option that is not from level 3."},{"id":13,"question":"When a company hires an insurance company to mitigate risk, which risk management technique is being applied?","options":{"A":"Risk avoidance","B":"Risk transfer","C":"Risk mitigation","D":"Risk tolerance"},"correct":"B","explanation":"Risk transfer is a risk management strategy that contractually shifts a pure risk from one party to another (in this case, to an insurance company). Risk avoidance consists in stopping activities and exposures that can negatively affect an organization and its assets. Risk mitigation consists of mechanisms to reduce the risk. Finally, risk tolerance is the degree of risk that an investor is willing to endure. github.com/ayemunhossain"},{"id":14,"question":"The SMTP protocol operates at OSI Level:","options":{"A":"7","B":"25","C":"3","D":"23"},"correct":"A","explanation":"Simple Mail Transport Protocol (SNMP) is an application layer protocol that operates at level 7. Level 3 corresponds to the network layer. There are no OSI layers above level 7. The number 25 presumably refers to the TCP/IP port of the SMTP protocol. The number 23, in turn, refers to the TCP/IP port of the Telnet protocol."},{"id":15,"question":"The process of verifying or proving the user's identification is known as:","options":{"A":"Confidentiality","B":"Integrity","C":"Authentication","D":"Authorization"},"correct":"C","explanation":"Authentication is the verification of the identity of a user, process or device, as a prerequisite to allowing access to the resources in a given system. In contrast, authorization refers to the permission granted to users, processes or devices to access specific assets. Confidentiality and integrity are properties of information and systems, not processes."},{"id":16,"question":"If an organization wants to protect itself against tailgating, which of the following types of access control would be most effective? github.com/ayemunhossain","options":{"A":"Locks","B":"Fences","C":"Barriers","D":"Turnstiles"},"correct":"D","explanation":"A lock is a device that prevents a physical structure (typically a door) from being opened, indicating that only the authorized person (i.e. the person with the key) can open it. A fence or a barrier will prevent ALL access. Turnstiles are physical barriers that can be easily overcome (after all, it is common knowledge that intruders can easily jump over a turnstile when no one is watching)."},{"id":17,"question":"Logging and monitoring systems are essential to:","options":{"A":"Identifying inefficient performing systems, preventing compromises, and providing a record of how systems are used","B":"Identifying efficient performing systems, labeling compromises, and providing a record of how systems are used","C":"Identifying inefficient performing systems, detecting compromises, and providing a record of how systems are used","D":"Identifying efficient performing systems, detecting compromises, and providing a record of how systems are used"},"correct":"C","explanation":"According to the ISC2 Study Guide (chapter 5, module 1, under Data Handling Practices), logging and monitoring systems are characterized as being \"Essential to identifying inefficient performing systems, detecting compromises, and providinga record of how systems are used\". The remaining options are incorrect variations of this definition."},{"id":18,"question":"In the event of a disaster, which of these should be the PRIMARY objective? (\u2605)","options":{"A":"Guarantee the safety of people","B":"Guarantee the continuity of critical systems","C":"Protection of the production database github.com/ayemunhossain","D":"Application of disaster communication"},"correct":"A","explanation":"In the event of a disaster, the clear priority is to guarantee the safety of human life above all. The remaining options, though important from the point of view of disaster recovery and business continuity, are secondary when compared to safety."},{"id":19,"question":"The process that ensures that system changes do not adversely impact business operations is known as:","options":{"A":"Change Management","B":"Vulnerability Management","C":"Configuration Management","D":"Inventory Management"},"correct":"A","explanation":"Change Management is the process of implementing necessary changes so that they do not adversely affect business operations (see ISC2 Study Guide, chapter 5, module 3). Vulnerability Management refers to the capacity to identify, track, prioritize and eliminate vulnerabilities in systems and devices. Configuration Management refers to a collection of activities with the purpose of establishing and maintaining the integrity of information systems through their development lifecycle (see NIST SP 1"},{"id":20,"question":"The last phase in the data security cycle is:","options":{"A":"Encryption","B":"Backup","C":"Archival github.com/ayemunhossain","D":"Destruction"},"correct":"D","explanation":"According to the data security lifecycle model, the last phase is Data Destruction, which aims at guaranteeing that data contained in a given support is erased and destroyed in a way that renders it completely irrecoverable by any means (see ISC2 Study Guide, chapter 5, module 1, under Data Handling). Archival refers to the process whereby an organization creates a long-term data archive for compliance, storage reduction or business intelligence. A Backup is a copy of files and programs created "},{"id":21,"question":"Which access control model specifies access to an object based on the subject's role in the organization?","options":{"A":"RBAC","B":"MAC","C":"DAC","D":"ABAC"},"correct":"A","explanation":"The role-based access control (RBAC) model is well known for governing access to objects based on the roles of individual users within the organization. Mandatory access control is based on security classifications. Attribute-based access control is based on complex attribute rules. In discretionary access control, subjects can grant privileges to other subjects and change some of the security attributes of the objects they have access to."},{"id":22,"question":"Which of the following is NOT an example of a physical security control?","options":{"A":"Firewalls","B":"Biometric access controls","C":"Remote control electronic locks","D":"Security cameras github.com/ayemunhossain"},"correct":"A","explanation":"Firewalls are a type of electronic equipment which connects to a network that filters inbound traffic arriving from the Internet, and, thus are a type of technical security controls. Security cameras, biometric access control and electronic locks, though connected to a network, control access to physical facilities, and thus are types of physical security controls. (ISC2 Study Guide, Chapter 1, Module 3)"},{"id":23,"question":"Which type of attack will most effectively maintain remote access and control over the victim's computer?","options":{"A":"Trojans","B":"Phishing","C":"Cross-Site Scripting","D":"Rootkits"},"correct":"D","explanation":"A rootkit tries to maintain root-level access while concealing malicious activity. It typically creates a backdoor and attempts to remain undetected by anti-malware software. A rootkit is active while the system is running. Trojans can also create backdoors but are only active while a specific application is running, and thus are not as effective as a rootkit. Phishing is used to initiate attacks by redirecting the user to fake websites. Cross-Site Scripting is used to attack websites."},{"id":24,"question":"In incident terminology, the meaning of Zero Day is:","options":{"A":"Days to solve a previously unknown system vulnerability","B":"A previously unknown system vulnerability","C":"Days without a cybersecurity incident","D":"Days with a cybersecurity incident"},"correct":"B","explanation":"A 'Zero Day' is an unknown system vulnerability that can be exploited since it does not yet exist in any vulnerability database. Moreover, these vulnerabilities do not generally fit recognized patterns, signatures or methods (see ISC2 Study Guide Chapter 2, Module 1, under Incident Terminology), making them very hard to detect and prevent."},{"id":25,"question":"Which of the following is NOT a possible model for an Incident Response Team (IRT)?","options":{"A":"Leveraged","B":"Pre-existing","C":"Dedicated","D":"Hybrid"},"correct":"B","explanation":"The three possible models for incident response are Leveraged, Dedicated, and Hybrid (see the ISC2 Study Guide, Chapter 2, Module 1, under Chapter Takeaways). The term 'Pre-existing' is not a valid model for an IRT."},{"id":26,"question":"A device found not to comply with the security baseline should be:","options":{"A":"Disabled or separated into a quarantine area until a virus scan can be run","B":"Disabled or isolated into a quarantine area until it can be checked and updated.","C":"Placed in a demilitarized zone (DMZ) until it can be reviewed and updated","D":"Marked as potentially vulnerable and placed in a quarantine area"},"correct":"B","explanation":"Security baselines are used to guarantee that network devices, software, hardware and endpoints are configured consistently. Baselines ensure that all such devices comply with the security baseline set by the organization. Whenever a device is found not compliant with the security baseline, it may be disabled or isolated into a quarantine area until it can be checked and updated (see ISC2 Study Guide, chapter 5, module 2, under Configuration Management Overview). A github.com/ayemunhossain DMZ i"},{"id":27,"question":"A biometric reader that grants access to a computer system in a data center is a:","options":{"A":"Administrative Control","B":"Physical Control","C":"Authorization Control","D":"Technical Control"},"correct":"D","explanation":"Physical controls have to do with the architectural features of buildings and facilities. Administrative controls are connected to the actions of people within the organization. Technical controls are implemented inside of computer systems. Authorization controls relate to the assets to which a user is granted access inside a particular computer system (see ISC2 Study Guide Chapter 1, Module 3)."},{"id":28,"question":"Which type of attack PRIMARILY aims to make a resource inaccessible to its intended users?","options":{"A":"Denials of Service","B":"Phishing","C":"Trojans","D":"Cross-Site Scripting"},"correct":"A","explanation":"A denial of service attack (DoS) consists in compromising the availability of a system or service through a malicious overload of requests, which causes the activation of safety mechanisms that delay or limit the availability of that system or service. Due to this, systems or services are rendered inaccessible to their intended users. Trojans, phishing, and cross-site scripting attacks try to covertly gain access to the system or data, and therefore do not primarily aim at github.com/ayemunhossa"},{"id":29,"question":"Which type of attack embeds malicious payload inside a reputable or trusted software?","options":{"A":"Trojans","B":"Phishing","C":"Rootkits","D":"Cross-Site Scripting"},"correct":"A","explanation":"Trojans are a type of software that appears legitimate but has hidden malicious functions that evade security mechanisms, typically by exploiting legitimate authorizations of the user that invokes the program. Rootkits try to maintain privilege-level access while concealing malicious activity. They often replace system files, so they are activated when the system is restarted. Trojans often install Rootkits, but Rootkits are not the Trojans themselves). Phishing typically tries to redirect the u"},{"id":30,"question":"Which tool is commonly used to sniff network traffic? (\u2605)","options":{"A":"Burp Suite","B":"John the Ripper","C":"Wireshark","D":"Nslookup"},"correct":"C","explanation":"Wireshark is the world's most widely-used and complete network protocol analyzer that, informally speaking, is the \"microscope\" of network traffic. John the Ripper is a famous Open Source password security auditing and password recovery tool. Nslookup is a network administration command-line tool for querying the Domain Name System that obtains the mapping between the domain name, IP address, or other DNS records. Finally, Burp Suite is a set of well- github.com/ayemunhossain known vulnerability"},{"id":31,"question":"Which of these is not an attack against an IP network?","options":{"A":"Side-channel Attack","B":"Man-in-the-middle Attack","C":"Fragmented Packet Attack","D":"Oversized Packet Attack"},"correct":"A","explanation":"Man-in-the-middle Attacks, Oversized Packet Attacks, and Fragmented Packet Attacks are typical IP network attacks (see ISC2 Study Guide, Chapter 4, Module 1, under Security of the Network). Side Channel Attacks are non-invasive attacks that extract information from devices (typically devices running cryptographic algorithms), and therefore do not aim at IP networks."},{"id":32,"question":"The detailed steps to complete tasks supporting departmental or organizational policies are typically documented in:","options":{"A":"Regulations","B":"Standards","C":"Policies","D":"Procedures"},"correct":"D","explanation":"Policies are high-level documents that frame all ongoing activities of an organization to ensure that it complies with industry standards and regulations. Regulations are usually devised by governments. Standards are created by governing or professional bodies to support regulations. Both regulations and standards are created outside of the organization (see ISC2 Study Guide Chapter 1, Module 4). github.com/ayemunhossain"},{"id":33,"question":"Which device is used to connect a LAN to the Internet?","options":{"A":"SIEM","B":"HIDS","C":"Router","D":"Firewall"},"correct":"C","explanation":"A router is a device that acts as a gateway between two or more networks by relaying and directing data packets between them. A firewall is a device that filters traffic coming from the Internet but does not seek to distribute traffic. Neither Security Information and Event Management (SIEM) systems nor Host Intrusion Detection Systems (HIDS) are monitoring devices nor applications that aim at inter-network connectivity."},{"id":34,"question":"What does SIEM mean?","options":{"A":"Security Information and Enterprise Manager","B":"Security Information and Event Manager","C":"System Information and Enterprise Manager","D":"System Information and Event Manager"},"correct":"B","explanation":"Security Information and Event Management (SIEM) is software for aggregating logs and events from applications, servers, network equipment, and specialized security equipment such as firewalls or Intrusion Prevention systems (IPS). SIEM offers a unified view of security-related data, and is capable of identifying deviations to the regular operation of systems that are often symptoms of attacks. The remaining options do not refer to any common term in Cybersecurity."},{"id":35,"question":"A Security safeguard is the same as a: github.com/ayemunhossain","options":{"A":"Safety control","B":"Privacy control","C":"Security control","D":"Security principle"},"correct":"C","explanation":"Security safeguards are approved security measures taken to protect computational resources by eliminating or reducing the risk to a system. These can be measures like hardware and software mechanisms, policies, procedures, and physical controls (see NIST SP 800-28 Version 2, under safeguard). This definition matches the definition of security control as the means of managing risk, including policies, procedures, guidelines, practices, or organizational structures, which can be of an administrat"},{"id":36,"question":"Which access control model can grant access to a given object based on complex rules?","options":{"A":"DAC","B":"ABAC","C":"RBAC","D":"MAC"},"correct":"B","explanation":"ABAC is an access control model that controls access to objects using rules that are evaluated according to the attributes of the subject, relevant objects, and attributes of the environment and action. The RBAC and MAC models are based on more straightforward and relatively less flexible rule systems, which are evaluated according to subject roles and security classifications. The rules that can be specified in a DAC model are even simpler than those of the previous two models"},{"id":37,"question":"Which port is used to secure communication over the web (HTTPS)?","options":{"A":"69","B":"80 github.com/ayemunhossain","C":"25","D":"443"},"correct":"D","explanation":"All options show examples of logical communication ports. Port 80 is reserved for plain HTTP connections, port 69 for TFTP protocol; and port 25 for SMTP protocol. Port 443 is the one reserved for HTTPS connections."},{"id":38,"question":"Which of these has the PRIMARY objective of identifying and prioritizing critical business processes?","options":{"A":"Business Impact Plan","B":"Business Impact Analysis","C":"Disaster Recovery Plan","D":"Business Continuity Plan"},"correct":"B","explanation":"The term 'Business Impact Plan' does not exist. A Business Impact Analysis (BIA) is a technique for analyzing how disruptions can affect an organization, and determines the criticality of all business activities and associated resources. A Business Continuity Plan (BCP) is a pre-determined set of instructions describing how the mission/business processes of an organization will be sustained during and after a significant disruption. A Disaster Recovery Plan is a written plan for recovering infor"},{"id":39,"question":"Which of the following are NOT types of security controls?","options":{"A":"Common controls","B":"Hybrid controls","C":"System-specific controls","D":"Storage controls github.com/ayemunhossain"},"correct":"D","explanation":"Storage controls are not a type of security control. Security controls are safeguards or countermeasures that an organization can employ to avoid, counteract or minimize security risks. System-specific controls are security controls that provide security capability for only one specific information system. Common controls are security controls that provide security capability for multiple information systems. Hybrid controls have characteristics of both system-specific and common controls."},{"id":40,"question":"Which of the following is NOT a type of learning activity used in Security Awareness?","options":{"A":"Awareness","B":"Training","C":"Education","D":"Tutorial"},"correct":"D","explanation":"The three learning activities that organizations use in training for security awareness are Education, Training and Awareness (see ISC2 Study Guide, chapter 5, module 4). A tutorial is a form of training, but is not on the list of types of learning activities."},{"id":41,"question":"The magnitude of the harm expected as a result of the consequences of an unauthorized disclosure, modification, destruction, or loss of information, is known as the:","options":{"A":"Vulnerability","B":"Threat","C":"Impact","D":"Likelihood"},"correct":"C","explanation":"The sentence matches the definition of the concept of impact (see NIST SP 800-60 Vol. 1 Rev. 1 under Impact). Furthermore, the ISC2 Study Guide, chapter 1, defines likelihood as the probability that a potential vulnerability may be exploited. A threat is defined as a circumstance or event that can adversely impact organizational operations. A vulnerability is a weakness that a threat can exploit."},{"id":42,"question":"The implementation of Security Controls is a form of:","options":{"A":"Risk reduction","B":"Risk acceptance","C":"Risk avoidance","D":"Risk transference"},"correct":"A","explanation":"The implementation of Security Controls involves taking actions to mitigate risk, and thus is a form of risk reduction. Risk acceptance will take no action, risk avoidance will modify operations in order to avoid risk entirely, and risk transference will transfer the risk to another party."},{"id":43,"question":"Which of the following attacks take advantage of poor input validation in websites?","options":{"A":"Trojans","B":"Cross-Site Scripting","C":"Phishing","D":"Rootkits"},"correct":"B","explanation":"Cross-Site Scripting (XSS) is a type of attack where malicious executable scripts are injected into the code of an otherwise benign website (or web application). Websites are vulnerable to XSS when they display data originating from requests or forms without validating it (and further sanitizing it, so that it is not executable). Trojans and phishing are github.com/ayemunhossain attacks where software applications and messages try to appear legitimate but have hidden malicious functions, not nec"},{"id":44,"question":"Which of the following is an example of an administrative security control?","options":{"A":"Access Control Lists","B":"Acceptable Use Policies","C":"Badge Readers","D":"No entry signs"},"correct":"B","explanation":"Policies are a type of administrative security controls. An access control list is a type of technical security control. A badge reader and a 'No entry' sign are types of physical security controls (see ISC2 Study Guide, Chapter 1, Module 3)."},{"id":45,"question":"In Change Management, which component addresses the procedures needed to undo changes?","options":{"A":"Request for Approval","B":"Request for Change","C":"Rollback","D":"Disaster and Recover"},"correct":"C","explanation":"In Change Management, the Request For Change (RFC) is the first stage of the request: it formalizes the change from the stakeholders' point of view. The next phase is the Approval phase, where each stakeholder reviews the change, identifies and allocates the corresponding resources, and eventually either approves or rejects the change (appropriately documenting the approval or rejection). Finally, the Rollback phase addresses the actions to take when the monitoring change suggests a failure or i"},{"id":46,"question":"Which of the following properties is NOT guaranteed by Digital Signatures?","options":{"A":"Authentication","B":"Confidentiality","C":"Non-Repudiation","D":"Integrity"},"correct":"B","explanation":"The correct answer is B. A digital signature is the result of a cryptographic transformation of data which is useful for providing: data origin authentication, data integrity, and non-repudiation of the signer (see NIST SP 800-12 Rev. 1 under Digital Signature). However, digital signatures cannot guarantee confidentiality (i.e. the property of data or information not being made available or disclosed)."},{"id":47,"question":"Which devices have the PRIMARY objective of collecting and analyzing security events?","options":{"A":"Hubs","B":"Firewalls","C":"Routers","D":"SIEM"},"correct":"D","explanation":"A Security Information and Event Management (SIEM) system is an application that gathers security data from information system components and presents actionable information through a unified interface. Routers and Hubs aim to receive and forward traffic. Firewalls filter incoming traffic. Neither of these last three options aims at collecting and analyzing security events."},{"id":48,"question":"What is an effective way of hardening a system? github.com/ayemunhossain","options":{"A":"Patch the system","B":"Have an IDS in place","C":"Run a vulnerability scan","D":"Create a DMZ for web application services"},"correct":"A","explanation":"According to NIST SP 800-152, hardening is defined as the process of eliminating the means of an attack by simultaneously patching vulnerabilities and turning off nonessential services. The ISC2 Study Guide, chapter 5, module 2, under Configuration Management Overview, reads \"One of the best ways to achieve a hardened system is to have updates, patches, and service packs installed automatically\". Vulnerability scans and IDS do not eliminate the means of an attack. The DMZ does not eliminate vuln"},{"id":49,"question":"Which type of key can be used to both encrypt and decrypt the same message?","options":{"A":"A public key","B":"A private key","C":"An asymmetric key","D":"A symmetric key"},"correct":"D","explanation":"Symmetric-key algorithms are a class of cryptographic algorithms that use a single key for both encrypting and decrypting of data. Asymmetric cryptography uses pairs of related keys: the public and the corresponding private keys. A message encrypted with the public key can only be decrypted by its corresponding private key, and vice versa. The term 'asymmetric key' is not applicable here."},{"id":50,"question":"Which regulations address data protection and privacy in Europe?","options":{"A":"SOX","B":"HIPAA github.com/ayemunhossain","C":"FISMA","D":"GDPR"},"correct":"D","explanation":"The General Data Protection Regulation (GDPR) is the official EU regulation for data protection and privacy. The remaining three options only apply to the United States. The Federal Information Security Management Act (FISMA) contains guidelines and security standards that protect government information and operations in the United States. The Sarbanes\u2013Oxley (SOx) Act of 2002 is a United States federal law that mandates and regulates financial record-keeping and reporting practices for corporati"},{"id":51,"question":"Which of the following types of devices inspect packet header information to either allow or deny network traffic?","options":{"A":"Hubs","B":"Firewalls","C":"Routers","D":"Switches"},"correct":"B","explanation":"Standard firewalls examine IP packet headers and flags in order to block or allow traffic from predefined rules. More recently, firewalls with Intrusion Detection Capability (IDS) also analyze each individual packet, looking for specific patterns known to be malicious, and then blocking traffic whenever such patterns are found. Routers, Switches, and Hubs have limited packet filtering capabilities, or none at all. A Router is a device that acts as a gateway between two or more networks by relayi"},{"id":52,"question":"A web server that accepts requests from external clients should be placed in which network?","options":{"A":"Intranet github.com/ayemunhossain","B":"DMZ","C":"Internal Network","D":"VPN"},"correct":"B","explanation":"In Cybersecurity, a DMZ (demilitarized zone) is a physical or logical subnetwork that contains and exposes external-facing services (such as web services). An Internal Network is an organization-controlled network that is isolated from external access. An Intranet is itself an internal network that supports similar protocols and services to the Internet, but only for the organization's internal use. A Virtual Private Network (VPN) creates a secure tunnel between endpoints (whether between networ"},{"id":53,"question":"Sensitivity is a measure of the \u2026:","options":{"A":"\u2026 protection and timeliness assigned to information by its owner, or the purpose of representing its need for urgency.","B":"\u2026 urgency and protection assigned to information by its owner.","C":"\u2026 importance assigned to information by its owner, or the purpose of representing its need for protection.","D":"\u2026 pertinence assigned to information by its owner, or the purpose of representing its need for urgency."},"correct":"C","explanation":"Sensitivity is also defined as the measure of the importance assigned to information by its owner, or the purpose of representing its need for protection (see the ISC2 study guide, module 1, under CIA Deep Dive)."},{"id":54,"question":"How many data labels are considered good practice?","options":{"A":"2 - 3","B":"1","C":"1-2 github.com/ayemunhossain","D":">4"},"correct":"A","explanation":"According to the ISC2 Study Guide, chapter 5, module 1, under Data Handling Practices in Labeling, we read that two or three classifications are manageable, but more than four tend to be challenging to manage."},{"id":55,"question":"Security posters are an element PRIMARILY employed in: (\u2605)","options":{"A":"Security Awareness","B":"Incident Response Plans","C":"Business Continuity Plans","D":"Physical Security Controls"},"correct":"A","explanation":"Security posters are used to raise the awareness of employees regarding security threats, and thus are primarily employed in Security Awareness (see ISC2 Study Guide, chapter 5, module 4)."},{"id":56,"question":"Which of these types of user is LESS likely to have a privileged account?","options":{"A":"System Administrator","B":"Security Analyst","C":"Help Desk","D":"External Worker"},"correct":"D","explanation":"Typically, external workers should not have access to privileged accounts, due to the possibility of misuse. The Help Desk (or IT Support Staff) may have to view or manipulate endpoints, servers and applications platforms using privileged or restricted operations. Security analysts may require fast access to the IT infrastructure, systems, endpoints and data environment. By definition, systems administrators require privileged accounts, since they are responsible for operating systems, deploying"},{"id":57,"question":"Which of the following is NOT an element of System Security Configuration Management?","options":{"A":"Inventory","B":"Baselines","C":"Updates","D":"Audit logs"},"correct":"D","explanation":"System Security Configuration Management elements are inventories, baselines, updates and patches. Audit logs can be generated after 'Verification and Audit'. However, 'Verification and Audit' is a configuration management procedure, and not a configuration management element (see ISC2 Study Guide, chapter 5, module 2, under Chapter Resource)."},{"id":58,"question":"Which are the components of an incident response plan?","options":{"A":"Preparation -> Detection and Analysis -> Recovery -> Containment -> Eradication -> Post-Incident Activity","B":"Preparation -> Detection and Analysis -> Containment -> Eradication -> Post-Incident Activity -> Recovery","C":"Preparation -> Detection and Analysis -> Eradication -> Recovery -> Containment -> Post-Incident Activity","D":"Preparation -> Detection and Analysis -> Containment, Eradication and Recovery -> Post-Incident Activity"},"correct":"D","explanation":"The components commonly found in an incident response plan are (in this order): Preparation; Detection and Analysis; Containment, Eradication and Recovery; Post-Incident Activity (see the ISC2 Chapter 2, Module 1, under Components of github.com/ayemunhossain an Incident Response Plan)."},{"id":59,"question":"Which of the following is an example of 2FA?","options":{"A":"Badges","B":"Passwords","C":"Keys","D":"One-Time passwords (OTA)"},"correct":"D","explanation":"One-time passwords are typically generated by a device (i.e. \"something you have\") and are required in addition to the actual main password (i.e. \"something you know\"). Badges, keys and passwords with no other overlapping authentication controls are considered single-factor (and thus are not 2FA)."},{"id":60,"question":"The predetermined set of instructions or procedures to sustain business operations after a disaster is commonly known as:","options":{"A":"Business Impact Analysis","B":"Disaster Recovery Plan","C":"Business Impact Plan","D":"Business Continuity Plan"},"correct":"D","explanation":"A Business Continuity Plan (BCP) is a pre-determined set of instructions describing how an organization's mission/business processes will be sustained during and after a significant disruption (see Chapter 2 ISC2 Study Guide, module 4, under Terms and Definitions). A Business Impact Analysis (BIA) is a technique for analyzing how disruptions can affect an organization. A Disaster Recovery Plan is a written plan for recovering information systems in response to a major failure or disaster. The te"},{"id":61,"question":"Which of the following is NOT a feature of a cryptographic hash function?","options":{"A":"Reversible","B":"Unique","C":"Deterministic","D":"Useful"},"correct":"B","explanation":"A cryptographic hash function should be unique, deterministic, useful, tamper-evident (also referred to as 'the avalanche effect' or 'integrity assurance') and non-reversible (also referred to as 'one-way'). Nonreversible means it is impossible to reverse the hash function to derive the original text of a message from its hash output value (see ISC2 Study Guide, chapter 5, module 1, under Encryption Overview). Thus, the 'reversible' feature is not a feature of a hash function."},{"id":62,"question":"Which are the three packets used on the TCP connection handshake? (\u2605)","options":{"A":"Offer \u2192 Request \u2192 ACK","B":"SYN \u2192 SYN/ACK \u2192 ACK","C":"SYN \u2192 ACK \u2192 FIN","D":"Discover \u2192 Offer \u2192 Request"},"correct":"B","explanation":"TCP uses a three-way handshake to establish a reliable connection by exchanging three packets with the SYN, SYN/ACK and ACK flags. Although SYN, ACK and FIN are valid TCP packet flags, the sequence SYN \u2192 ACK \u2192 FIN is not the TCP handshake. Both the sequences Discover \u2192 Offer \u2192 Request and Offer \u2192 Request \u2192 ACK are used in DHCP (but are still incomplete, since DHCP is a four-way handshake)."},{"id":63,"question":"After an earthquake disrupting business operations, which document contains the procedures required to return business github.com/ayemunhossain to normal operation?","options":{"A":"The Business Impact Plan","B":"The Business Impact Analysis","C":"The Business Continuity Plan","D":"The Disaster Recovery Plan"},"correct":"D","explanation":"A Disaster Recovery Plan (DRP) is a plan for processing and restoring operations in the event of a significant hardware or software failure, or of the destruction of the organization's facilities. The primary goal of a DRP is to restore the business to the last-known reliable state of operations (see Chapter 2 ISC2 Study Guide, module 4, under The Goal of Disaster Recovery). The term 'Business Impact Plan' does not exist. A Business Continuity Plan (BCP) is a pre-determined set of instructions d"},{"id":64,"question":"What is the consequence of a Denial Of Service attack?","options":{"A":"Exhaustion of device resources","B":"Malware Infection","C":"Increase in the availability of resources","D":"Remote control of a device"},"correct":"A","explanation":"A denial of service attack (DoS) consists in a malicious overload of requests which will eventually lead to the exhaustion of resources, rendering the service unavailable, as well as causing the activation of safety mechanisms that delay or limit the availability of that system or service. This type of attack seeks to compromise service availability, but not to control a device nor to install malware."},{"id":65,"question":"According to ISC2, which are the six phases of data handling? github.com/ayemunhossain","options":{"A":"Create -> Use -> Store -> Share -> Archive -> Destroy","B":"Create -> Store -> Use -> Share -> Archive -> Destroy","C":"Create -> Share -> Use ->Store -> Archive -> Destroy","D":"Create -> Share -> Store -> Use -> Archive -> Destroy"},"correct":"B","explanation":"According to the data security lifecycle model, the six phases of data security lifecycle model are Create -> Store -> Use -> Share -> Archive -> Destroy (see ISC2 Study Guide, chapter 5, module 1 under data handling)."},{"id":66,"question":"Which of the following is less likely to be part of an incident response team?","options":{"A":"Legal representatives","B":"Human Resources","C":"Representatives of senior management","D":"Information security professionals"},"correct":"B","explanation":"The incident response team carries out the post-incident analysis phase of an incident response plan. They are a cross- functional group of individuals representing the management, technical and functional areas of responsibility most directly impacted by a security incident. In the incident response team, we typically find (i) representatives of senior management, (ii) information security professionals, (iii) legal representatives, (iv) public affairs/communications representatives, (v) engine"},{"id":67,"question":"Which of these tools is commonly used to crack passwords? (\u2605)","options":{"A":"Burp Suite","B":"Nslookup github.com/ayemunhossain","C":"John the Ripper","D":"Wireshark"},"correct":"C","explanation":"John the Ripper is a famous Open Source password security auditing and password recovery tool. Burp Suite is a well- known set of tools for vulnerability scanning, penetration testing, and web app security (not for cracking passwords). The remaining options are both network analysis tools. Wireshark is the most used network protocol analyzer in the world. Nslookup is a network administration command-line tool for querying the Domain Name System to obtain the mapping between the domain name, IP a"},{"id":68,"question":"In order to find out whether personal tablet devices are allowed in the office, which of the following policies would be helpful to read?","options":{"A":"BYOD","B":"Privacy Policy","C":"Change Management Policy","D":"AUP"},"correct":"A","explanation":"The Bring Your Own Device (BYOD) policy establishes rules for using personal devices for work-related activities. The Acceptable Use Policy (AUP) defines the permissions and limitations that users must agree to while accessing the network and using computer systems or any other organizational resources. The Privacy Policy (PP) outlines the data security mechanisms that protect customer data. In the context of Cybersecurity, a Change Management Policy (CMP) establishes the use of standardized met"},{"id":69,"question":"In which cloud deployment model do companies share resources and infrastructure on the cloud?","options":{"A":"Hybrid cloud","B":"Multi-tenant github.com/ayemunhossain","C":"Private cloud","D":"Community cloud"},"correct":"D","explanation":"A private cloud is a cloud computing model where the cloud infrastructure is dedicated to a single organization (and never shared with others). Multitenancy means that multiple cloud vendor customers (i.e. tenants) share the same computing resources. A community cloud is an infrastructure where multiple organizations share resources and infrastructure based on common needs (that can be technological or regulatory). Finally, a hybrid cloud refers to a model that combines (i.e. orchestrates) on-pr"},{"id":70,"question":"Which of these is the PRIMARY objective of a Disaster Recovery Plan?","options":{"A":"Restore company operation to the last-known reliable operation state","B":"Outline a safe escape procedure for the organization's personnel","C":"Maintain crucial company operations in the event of a disaster","D":"Communicate to the responsible entities the damage caused to operations in the event of a disaster"},"correct":"A","explanation":"A Disaster Recovery Plan (DRP) is a plan for processing and restoring operations in the event of a significant hardware or software failure, or of the destruction of the organization's facilities. The primary goal of a DRP is to restore the business to the last-known reliable state of operations (see Chapter 2 ISC2 Study Guide, module 4, under The Goal of Disaster Recovery). Maintaining crucial operations is the goal of the Business Continuity Plan (BCP). The remaining options may be included in"},{"id":71,"question":"An entity that acts to exploit a target organization\u2019s system vulnerabilities is a:","options":{"A":"Threat Vector","B":"Threat Actor","C":"Threat github.com/ayemunhossain","D":"Attacker"},"correct":"B","explanation":"A Threat Actor is defined as an individual or a group posing a threat (according to NIST SP 800-150 under Threat Actor). A Threat Vector is a means by which a Threat Actor gains access to systems (for example: phishing, trojans, baiting, etc.). An Attacker is always an individual, but a Threat Actor can be either a group or an entity. A Threat is a circumstance or event that can adversely impact organizational operations that a Threat Actor can potentially explore through a Threat Vector."},{"id":72,"question":"A best practice of patch management is to:","options":{"A":"Apply all patches as quickly as possible","B":"Test patches before applying them","C":"Apply patches every Wednesday","D":"Apply patches according to the vendor's reputation"},"correct":"B","explanation":"Patches sometimes disrupt a system's configurations and stability. One of the main challenges for security professionalsis to ensure that patches are deployed as quickly as possible, while simultaneously ensuring the stability of running systems. To prevent flawed patches from negatively affecting running systems, it is good practice to test patches in a designated qualification environment before applying them to production systems (see ISC2 Study Guide, chapter 5, module 2 under Configuration "},{"id":73,"question":"Which of these would be the best option if a network administrator needs to control access to a network?","options":{"A":"HIDS","B":"IDS","C":"SIEM github.com/ayemunhossain","D":"NAC"},"correct":"D","explanation":"Network Access Control (NAC) refers to a class of mechanisms that prevent access to a network until a user (or the user's device) either presents the relevant credentials, or passes the results of health checks performed on the client device. Security Information and Event Management (SIEM), Host Intrusion Detection Systems (HIDS), and Intrusion Detection Systems (IDS) are all monitoring systems."},{"id":74,"question":"Which of these is NOT a change management component?","options":{"A":"Approval","B":"RFC","C":"Rollback","D":"Governance"},"correct":"D","explanation":"All significant change management practices address typical core activities: Request For Change (RFC), Approval, and Rollback (see ISC2 Study Guide, chapter 5, module 3). Governance is not one of these practices."},{"id":75,"question":"Which of the following is NOT a social engineering technique?","options":{"A":"Pretexting","B":"Quid pro quo","C":"Double-dealing","D":"Baiting"},"correct":"C","explanation":"Baiting is a social engineering attack wherein a scammer uses a false promise to lure a victim. Pretexting is a social engineering technique that manipulates victims into disclosing information. Quid pro quo is a social engineering attack (technically, one that combines 'baiting' with 'pretexting') that promises users a profit in exchange for information that can later be used to gain control of a user's account or sensitive information). Regarding cybersecurity, 'Double-ealing' is not a valid s"},{"id":76,"question":"If there is no time constraint, which protocol should be employed to establish a reliable connection between two devices?","options":{"A":"TCP","B":"DHCP","C":"SNMP","D":"UDP"},"correct":"A","explanation":"TCP is used for connection-oriented communication, verifies data delivery, and is known to favor reliability. In a congested network, TCP delays data transmission, and thus cannot guarantee delivery under time constraints. UDP favors speed and efficiency over reliability, and thus cannot ensure a reliable connection. DHCP and SNMP are (respectively) a device configuration and a device management protocol, which means that neither aims to establish connections between devices."},{"id":77,"question":"An exploitable weakness or flaw in a system or component is a:","options":{"A":"Threat","B":"Bug","C":"Vulnerability","D":"Risk"},"correct":"C","explanation":"A Vulnerability is a weakness in an information system, system security procedures, internal controls or implementationthat could be exploited by a Threat source (NIST SP 800-30 Rev 1). The Threat is the circumstance or event that can adversely impact operations. A Risk is a possible event that can negatively impact the organization. A Bug is a flaw causing an application to produce an unintended or unexpected result that may be exploitable."},{"id":78,"question":"In which cloud model does the cloud customer have LESS responsibility over the infrastructure? (\u2605)","options":{"A":"IaaS","B":"FaaS","C":"PaaS","D":"SaaS"},"correct":"D","explanation":"In Software as a Service (SaaS), consumers may control user-specific application configuration settings, but neither the underlying application logic nor the infrastructure. In the Function as a Service (FaaS) model, cloud customers deploy application-level functionality (typically as microservices) and are charged only when this functionality is executed. In Platform as a Service (PaaS), the cloud customer does not manage or control the underlying cloud infrastructure (wnich includes the networ"},{"id":79,"question":"Risk Management is:","options":{"A":"The assessment of the potential impact of a threat.","B":"The creation of an incident response team.","C":"The impact and likelihood of a threat.","D":"The identification, evaluation and prioritization of risks."},"correct":"D","explanation":"Risk Management is the process of identifying, assessing and mitigating risks (ISC2 Study Guide, chapter 1, module 2). \"Impact and likelihood of a threat\" is a definition of risk. \"Creating an incident response team\" and \"assessing the potential impact of a threat\" can be considered Risk Management actions, but are not in themselves Risk Management."},{"id":80,"question":"Which of the following documents contains elements that are NOT mandatory?","options":{"A":"Policies","B":"Guidelines","C":"Regulations","D":"Procedures"},"correct":"B","explanation":"Only guidelines contain elements that may not be mandatory. Compliance with policies, procedures and regulations is mandatory (see ISC2 Study Guide Chapter 1, Module 4)."},{"id":81,"question":"In which of the following phases of an Incident Recovery Plan are incident responses prioritized?","options":{"A":"Post-incident Activity","B":"Detection and Analysis","C":"Preparation","D":"Contentment, Eradication, and Recovery"},"correct":"B","explanation":"Incident responses are prioritized in the Detection and Analysis phase (see the ISC2 Study Guide, Chapter 2, Module 1, under Components of Incident Response). github.com/ayemunhossain"},{"id":82,"question":"Which security principle states that a user should only have the necessary permission to execute a task?","options":{"A":"Privileged Accounts","B":"Separation of Duties","C":"Least Privilege","D":"Defense in Depth"},"correct":"C","explanation":"The principle of Defense in Depth refers to using multiple layers of security. The principle of Least Privilege states that subjects should be given only those privileges required to complete their specific tasks (ISC2 Study Guide Chapter 1, Module 3). Separation of Duties states that no user should ever be given enough privileges to misuse the system. Finally, Privileged Accounts are accounts with permissions beyond those of regular users, such as manager and administrator accounts."},{"id":83,"question":"The Bell and LaPadula access control model is a form of: (\u2605)","options":{"A":"ABAC","B":"RBAC","C":"MAC","D":"DAC"},"correct":"C","explanation":"The Bell and LaPadula access control model arranges subjects and objects into security levels and defines access specifications, whereby subjects can only access objects at certain levels based on their security level. Typical access specifications can be things like \"Unclassified personnel cannot read data at confidential levels\" or \"Top-Secret data cannot be written into the files at unclassified levels\". Since subjects cannot change access specifications, this model is a form of mandatory acc"},{"id":84,"question":"In risk management, the highest priority is given to a risk where:","options":{"A":"The frequency of occurrence is low, and the expected impact value is high","B":"The expected probability of occurrence is low, and the potential impact is low","C":"The expected probability of occurrence is high, and the potential impact is low","D":"The frequency of occurrence is high, and the expected impact value is low"},"correct":"A","explanation":"The highest priority is given to risks estimated to have high impact and low probability over high probability and low impact value (ISC2 Study Guide, Chapter 1, Module 2). In qualitative risk analysis, the 'expected probability of occurrence' and the 'frequency of occurrence' refer to the same thing. The same goes for the concepts of expected impact value (NIST SP 800-30 Rev. 1 under Impact Value) and potential impact (NIST SP 800-60 Vol. 1 Rev. 1 under Potential Impact)."},{"id":85,"question":"Which of the following areas is connected to PII?","options":{"A":"Non-Repudiation","B":"Authentication","C":"Integrity","D":"Confidentiality"},"correct":"D","explanation":"Confidentiality is the most distinctive property of personally identifiable information (see ISC2 study guide, Module 1, under CIA Deep Dive). The remaining options apply to all types of data. All data requires integrity to be usable. Non- repudiation refers to the inability to deny the production, approval, or transmission of information. Authentication refers to the access to information. github.com/ayemunhossain"},{"id":86,"question":"According to the canon \"Provide diligent and competent service to principals\", ISC2 professionals are to:","options":{"A":"Take care not to tarnish the reputation of other professionals through malice or indifference.","B":"Treat all members fairly and,when resolving conflicts, consider public safety and duties to principals, individuals and the profession, in that order.","C":"Avoid apparent or actual conflicts of interest.","D":"Promote the understanding and acceptance of prudent information security measures."},"correct":"C","explanation":"The direction for applying the ethical principles of ISC2 states that avoiding conflicts of interest or the appearance thereof is a consequence of providing diligent and competent service to principals (see https://resources.infosecinstitute.com/certification/the-isc2-code-of-ethics-a-binding-requirement-for-certification/). The other options are consequences of the remaining three ethical principles."},{"id":87,"question":"Malicious emails that aim to attack company executives are an example of:","options":{"A":"Trojans","B":"Whaling","C":"Phishing","D":"Rootkits"},"correct":"B","explanation":"Phishing is a digital social engineering attack that uses authentic-looking (but counterfeit) e-mail messages to request information from users, or to get them to unknowingly execute an action that will make way for the attacker. Whaling attacks are phishing attacks that target high-ranking members of organizations. After gaining root-level access to a host, rootkits are used by an attacker to conceal malicious activities while keeping root-level access. Trojans are a type of software that appea"},{"id":88,"question":"Governments can impose financial penalties as a consequence of breaking a:","options":{"A":"Regulation","B":"Standard","C":"Policy","D":"Procedure"},"correct":"A","explanation":"Standards are created by governing or professional bodies (not by governments themselves). Policies and procedures are created by organizations, and are therefore not subject to financial penalties (see ISC2 Study Guide Chapter 1, Module 4)"},{"id":89,"question":"Which type of attack attempts to trick the user into revealing personal information by sending a fraudulent message?","options":{"A":"Phishing","B":"Cross-Site Scripting","C":"Denials of Service","D":"Trojans"},"correct":"A","explanation":"A phishing attack emails a fraudulent message to trick the recipient into disclosing sensitive information to the attacker.A Cross-Site Scripting attack tries to execute code on another website. Trojans are software that appear legitimate, but that have hidden malicious functions. Trojans may be sent in a message, but are not the message themselves. A denial of service attack (DoS) consists in compromising the availability of a system or service through a malicious overload of requests, which ca"},{"id":90,"question":"In which of the following access control models can the creator of an object delegate permission? github.com/ayemunhossain","options":{"A":"ABAC","B":"MAC","C":"RBAC","D":"DAC"},"correct":"D","explanation":"In a Discretionary Access control model, the permissions associated with each object (file or data) are set by the owner of the object. In this model, the creator of an object implicitly becomes its owner, and therefore can decide who will have permission over the objects. In the remaining models, access specifications are centrally determined."},{"id":91,"question":"Which type of attack has the PRIMARY objective of encrypting devices and their data, and then demanding a ransom payment for the decryption key?","options":{"A":"Ransomware","B":"Trojan","C":"Cross-Site Scripting","D":"Phishing"},"correct":"A","explanation":"Ransomware is malware designed to deny a user or organization access to files on their computer, by encrypting them and demanding a ransom payment for the decryption key. Trojans and phishing can be used to install ransomware on a system or device, but are not themselves the ransomware attack."},{"id":92,"question":"Which of the following cloud models allows access to fundamental computer resources? (\u2605)","options":{"A":"SaaS","B":"FaaS","C":"PaaS github.com/ayemunhossain","D":"IaaS"},"correct":"D","explanation":"Infrastructure as a Service (IaaS) provides the capability to provision processing, storage, networks, and other fundamental computing resources. Platform as a Service (PaaS) enables the provisioning of applications, programming libraries, services, and tools that the provider supports. Unlike IaaS, consumers do not control their underlying cloud infrastructure (including operating systems and storage). Both Software as a Service (SaaS) and Function as a Service (FaaS) models abstract away from "},{"id":93,"question":"How many layers does the OSI model have?","options":{"A":"7","B":"4","C":"6","D":"5"},"correct":"A","explanation":"The OSI model organizes communicating systems according to 7 layers: Physical layer, Data Link layer, Network layer, Transport layer, Session layer, Presentation layer, and Application layer (see Chapter 4 - Module 1 under Open Systems Interconnection)."},{"id":94,"question":"Which of the following principles aims primarily at fraud detection?","options":{"A":"Privileged Accounts","B":"Defense in Depth","C":"Least Privilege","D":"Separation of Duties"},"correct":"D","explanation":"According to the principle of Separation of Duties, operations on objects are to be segmented (often referred to as 'transactions'), requiring distinct users and authorizations. The involvement of multiple users guarantees that no single user can perpetrate and conceal errors or fraud in their duties. To the extent that users have to review the work of other users, Separation of Duties can also be considered a mechanism of fraud detection (see ISC2 Study Guide Chapter 1, Module 3). The principle"},{"id":95,"question":"Which protocol uses a three-way handshake to establish a reliable connection?","options":{"A":"TCP","B":"SMTP","C":"UDP","D":"SNMP"},"correct":"A","explanation":"TCP uses a three-way handshake to establish a reliable connection by exchanging three packets with theSYN, SYN/ACK, and ACK flags. SMTP uses a two-way handshake. Neither UDP nor SNMP require a handshake phase."},{"id":96,"question":"Which of the following is an example of a technical security control?","options":{"A":"Access control lists","B":"Turnstiles","C":"Fences","D":"Bollards"},"correct":"A","explanation":"An access control list is a type of technical security control. Bollards, fences and turnstiles control access to physical facilities, and thus are types of physical security controls. (ISC2 Study Guide, Chapter 1, Module 3)"},{"id":97,"question":"Which type of attack attempts to gain information by observing the device's power consumption? (\u2605)","options":{"A":"Side Channels","B":"Trojans","C":"Cross Site Scripting","D":"Denials of Service"},"correct":"A","explanation":"A side-channel attack is a passive and non-invasive attack aiming to extract information from a running system, by using special-purpose hardware to perform power monitoring, as well as timing and fault analysis attacks. The remaining are software-based attacks."},{"id":98,"question":"Which of the following areas is the most distinctive property of PHI?","options":{"A":"Integrity","B":"Confidentiality","C":"Non-Repudiation","D":"Authentication"},"correct":"B","explanation":"The correct answer is B. Confidentiality is the most distinctive property of protected health information (see ISC2 Study Guide, Module 1, under CIA Deep Dive). The remaining options apply to all types of data. All data requires integrity to be usable. Non-repudiation refers to the inability to deny the production, approval, or transmission of information. Authentication refers to guaranteeing that systems and information are accessed by persons and systems that are who github.com/ayemunhossain "},{"id":99,"question":"Which of these is the most efficient and effective way to test a business continuity plan?","options":{"A":"Simulations","B":"Walkthroughs","C":"Reviews","D":"Discussions"},"correct":"A","explanation":"Simulations are full re-enactments of business continuity procedures and can involve most, if not all, of your workforce. They also tend to take place on-site in the relevant business areas. Thus, they are an exceptionally effective way to test your business continuity plan. Walkthroughs verbally carry out specific recovery steps stipulated in the business Continuity plan. Discussion and reviews are static ways of testing the business continuity plan."},{"id":100,"question":"Which of the following Cybersecurity concepts guarantees that information is accessible only to those authorized to access it?","options":{"A":"Confidentiality","B":"Non-repudiation","C":"Authentication","D":"Accessibility"},"correct":"A","explanation":"Confidentiality, Integrity and Availability are known as the CIA triad, from the model that guides policies for information security. Confidentiality is the property of data or information not being made available or disclosed, which leads to sensitive information being protected from unauthorized access. Integrity refers to the preservation of the consistency, accuracy and trustworthiness of data. Availability is the property of data being consistently and readily accessible to the parties auth"},{"id":101,"question":"In the event of a disaster, what should be the PRIMARY objective? (\u2605)","options":{"A":"Apply disaster communication","B":"Protect the production database","C":"Guarantee the safety of people","D":"Guarantee the continuity of critical systems"},"correct":"C","explanation":"In the event of a disaster, the number one priority is to guarantee the safety of human life above all else. The remaining options, though important as concerns business continuity, are never as important as the safety of human beings."},{"id":102,"question":"A security professional should report violations of a company's security policy to:","options":{"A":"The ISC Ethics Committee","B":"Company management","C":"National authorities","D":"A court of law"},"correct":"B","explanation":"The code of ethics requires security professionals to be honest, but not necessarily \"law enforcers\". A violation of a company's security policy should be reported and handled within the company itself (usually involving the human resources, legal, or management departments). Only individuals can be reported to the ISC2 ethics committee (i.e. not companies). National authorities only deal with violations of laws and regulations. github.com/ayemunhossain"},{"id":103,"question":"Which department in a company is NOT regularly involved in a DRP?","options":{"A":"Executives","B":"IT","C":"Public Relations","D":"Financial"},"correct":"D","explanation":"Executives and Public Relations (PR) need to be aware of the company DRP to handle the expectation of the public and of company stakeholders. IT personnel should be involved in helping businesses get back to normal operations. A company's financial department is rarely involved in a disaster recovery plan. An exception would be if the issue at hand is connected to their area of expertise (see Chapter 2 ISC2 Study Guide, module 4, under Components of a Disaster Recovery Plan)."},{"id":104,"question":"Which of the following is included in an SLA document?","options":{"A":"A plan to prepare the organization for the continuation of critical business functions","B":"A plan to keep business operations going while recovering from a significant disruption","C":"Instructions to detect, respond to, and limit the consequences of a cyber-attack","D":"Instructions on data ownership and destruction"},"correct":"D","explanation":"A set of instructions or procedures to detect, respond and limit the consequences of a cyber-attack is an Incident Response Plan (see ISC2 Study Guide Chapter 2, module 1, under The Goal of Incident Response). A plan to sustain business operations while recovering from a significant disruption is a Business Continuity Plan (see ISC2 Study Guide Chapter 2, module 2, under The Importance of Business Continuity). A plan to prepare the organization for the continuation of critical business functions"},{"id":105,"question":"What is the most important difference between MAC and DAC?","options":{"A":"In MAC, security administrators set the roles for the users; in DAC, roles are set at the object owner\u2019s discretion","B":"In MAC, security administrators assign access permissions; in DAC, security administrators set user roles","C":"In MAC, security administrators assign access permissions; in DAC, access permissions are set at the object owner\u2019s discretion","D":"In MAC, access permissions are set at the object owner\u2019s discretion; in DAC, it is up to security administrators to assign access permissions"},"correct":"C","explanation":"In Mandatory Access Control (MAC), security administrators assign access permissions. In contrast, with Discretionary Access Control (MAC), it is up to the object owner\u2019s discretion to set object permissions (see ISC2 Study Guide chapter 1, module 3, under Understand Logical Access Controls)."},{"id":106,"question":"Requiring a specific user role to access resources is an example of:","options":{"A":"MAC","B":"ABAC","C":"RBAC","D":"DAC"},"correct":"C","explanation":"Role-Based Access Control (RBAC) restricts acces
