s to the resources of a computer or network, according to the roles of individual users within your organization. Attribute-Based Access Control (ABAC) is based on complex attribute rules. In Discretionary Access Control (DAC), users may grant privileges to other subjects, as well as change the security attributes of the objects they have access to. github.com/ayemunhossain"},{"id":107,"question":"Which type of document outlines the procedures ensuring that vital company systems keep running during business- disrupting events?","options":{"A":"Business Impact Plan","B":"Business Impact Analysis","C":"Disaster Recovery Plan","D":"Business Continuity Plan"},"correct":"D","explanation":"A Business Continuity Plan (BCP) is a pre-determined set of instructions describing how an organization's mission or business processes will be sustained during and after a significant disruption (see Chapter 2 ISC2 Study Guide, module 4, under Terms and Definitions). A Business Impact Analysis (BIA) is a method of analyzing how disruptions can affect an organization. A Disaster Recovery Plan is used to recover systems after a major failure or disaster. The term 'Business Impact Plan' does not e"},{"id":108,"question":"Which of the following is NOT a best practice in access management?","options":{"A":"Give only the right amount of permission","B":"Periodically assess if user permissions still apply","C":"Request a justification when upgrading permission","D":"Trust but verify"},"correct":"D","explanation":"The \u201cTrust but verify\u201d model is a method of threat protection wherein privileged accounts are trusted (but always verified) and allowed access to the network and other resources . Over time, the \u201cTrust but verify\u201d model has been found to expose organizations to multiple security threats, and is therefore being progressively abandoned in favor of the Zero Trust model. The remaining options are all good practices of access management. github.com/ayemunhossain"},{"id":109,"question":"If a company collects PII, which policy is required?","options":{"A":"Remote Access Policy","B":"GDPR","C":"Privacy Policy","D":"Acceptable Use Policy"},"correct":"C","explanation":"A Privacy Policy (PP) outlines the data security mechanisms which ensure that customer data is protected, namely, how Personal Identifiable Information (PII) is collected, stored and processed. An Acceptable Use Policy (AUP) defines the guidelines and limitations that users must agree on while accessing the an organization's network, computer systems or other related resources. The General Data Protection Regulation (GDPR) is a regulation on data protection and privacy for the European Union and"},{"id":110,"question":"Which of these is LEAST likely to be installed by an infection?","options":{"A":"Logic Bomb","B":"Keylogger","C":"Trojan","D":"Backdoor"},"correct":"A","explanation":"A logic bomb is a piece of code intentionally inserted into software that will activate after specific conditions are met (see ISC2 Study Guide, chapter 4, module 2). Logic bombs are typically embedded in legitimate software. Trojans are a type of malware used to install keyloggers and backdoors. Keyloggers capture keystrokes and user input, but typically require malware to install the keylogger. A backdoor is a malicious feature that listens for commands on a specific logical port (TCP or UDP) "},{"id":111,"question":"(\u2605) The best defense method to stop a 'Replay Attack' is to:","options":{"A":"Use an IPSec VPN","B":"Use a Firewall","C":"Use password authentication","D":"Use message digesting"},"correct":"A","explanation":"A replay attack is when an attacker captures and resends (i.e. \"replays\") authenticated messages (see ISC2 Study Guide, chapter 4, module 2). An IPSec VPN can prevent a replay attack because it tracks packet sequencing and includes the sender's signature on all packets; therefore preventing forged packages. Message digesting is ineffective in preventing resends (and thus also replay attacks), since it doesn't matter whether the attacker can read or decipher the original message and key (all they"},{"id":112,"question":"Which of these devices has the PRIMARILY objective of determining the most efficient path for the traffic to flow across the networks?","options":{"A":"Hubs","B":"Firewalls","C":"Routers","D":"Switches"},"correct":"C","explanation":"A router is a networking device whose primary objective is to determine the most efficient path for traffic to flow across a network. Routers connect two or more networks and forward data packets between them according to their destination address (see ISC2 Study Guide, chapter 4, module 1). When a router receives a data packet, it checks the destination address and determines the best route on which to forward the packet, based on its routing table. The routing table is a github.com/ayemunhossa"},{"id":113,"question":"Which of these types of malware self-replicates without the need for human intervention?","options":{"A":"Worm","B":"Trojan","C":"Virus","D":"Rootkits"},"correct":"A","explanation":"A worm is a type of malware designed to replicate itself and spread to other computers without human intervention. Worms exploit operating systems, network servers and other software vulnerabilities in order to propagate themselves. They can cause various damaging effects, including disrupting network performance, consuming bandwidth, and stealing sensitive information (see ISC2 Study Guide, chapter 4, module 2). Some worms can also perform directly malicious actions, such as installing rootkits"},{"id":114,"question":"As an (ISC)\u00b2 member, you are expected to perform with due care. What does 'due care' specifically mean?","options":{"A":"Do what is right in each situation you encounter on the job","B":"Give continuity to the legacy of security practices of your company","C":"Apply patches annually","D":"Researching and acquiring the knowledge to do your job right github.com/ayemunhossain"},"correct":"A","explanation":"The concept of 'due Care' (also known as 'the prudent person rule') refers to what a prudent person would do in a given situation. In cybersecurity, 'due care' means taking reasonable steps to secure and protect the organization's assets, reputation and finances. The concept is holistic and includes, among other things: implementing the appropriate security standards, policies and procedures; ensuring proper cybersecurity awareness training; and promoting the continuous improvement of monitoring"},{"id":115,"question":"(\u2605) Which of these is NOT a best practice in access management?","options":{"A":"Periodically assessing whether user permissions still apply","B":"Requesting a justification when upgrading permission","C":"Giving only the right amount of permission","D":"Trust but verify"},"correct":"D","explanation":"The \"Trust but verify\" model is a method of threat protection that involves granting privileged accounts access to the network and other resources, while at the same time verifying their actions and activities. However, over time, this model was found to have limitations that expose organizations to a wide array of security threats. Therefore, \"Trust but verify\" is being progressively abandoned in favor of the Zero Trust model. The remaining options are all best practices of access management."},{"id":116,"question":"During the investigation of an incident, which security policies are more likely to cause difficulties?","options":{"A":"Configuration standards","B":"Incident response policies","C":"Communication policies","D":"Retention policies github.com/ayemunhossain"},"correct":"D","explanation":"For many organizations, retention policies entail keeping data only for a limited time. Because of the high costs of data storage capacity, organizations maintain specific logs only for a short period of time (a few hours to several days), and keep other data records for more extended periods (months to years). Because of this, not all data regarding an incident may be available. Communication and incident response policies can provide valuable help to an incident investigation. Finally, configu"},{"id":117,"question":"In an Access Control List (ACL), the element that determines which permissions you have is:","options":{"A":"The subject","B":"The object","C":"The firmware","D":"The rule"},"correct":"D","explanation":"An Access Control List (ACL) is a list of rules that specifies which users or systems are granted or denied access (i.e., have permission to access) to a particular object or system resource (see ISC2 Study Guide, chapter 3, module 4). The subject is a user or a process run by a user, which inherits the user authorization. The object is the resource or data in the system (or the network) to be accessed. Firmware is a type of software embedded in a hardware system; therefore, the concept of an Ac"},{"id":118,"question":"What does the term 'data remanence' refer?","options":{"A":"Data in use that can't be encrypted","B":"Files saved locally that can't be remoted accessed","C":"Data left over after routine removal and deletion","D":"All of the data in a system"},"correct":"C","explanation":"Data Remanence refers to data left over after routine removal and deletion of data from a storage device (see ISC2 Study Guide, chapter 4, module 3). When digital data is deleted, instead of being erased from the storage media, it is often only marked deleted, and the corresponding space is then made available to be overwritten later on. Consequently, deleted data can still be present on the storage media, and can be recovered using the proper media analysis and recovery tools. Data remanence is"},{"id":119,"question":"(\u2605) Which type of recovery site has some or most systems in place, but does not have the data needed to take over operations?","options":{"A":"A hot site","B":"A cloud site","C":"A warm site","D":"A cold site"},"correct":"C","explanation":"A cold site requires space, power, network connectivity, systems and data to be put in place and take over operations. Warm sites have power, connectivity, and systems, but do not have live or current data enabling the immediate takeover of operations (see ISC2 Study Guide, chapter 2, module 3). A hot site can immediately take over operations. A cloud site is not a term that refers to one of the three most common types of recovery sites."},{"id":120,"question":"Which of these is NOT a characteristic of an MSP implementation?","options":{"A":"Manage all in-house company infrastructure","B":"Monitor and respond to security incidents","C":"Mediate, execute and decide top-level decisions","D":"Utilize expertise for the implementation of a product or service"},"correct":"A","explanation":"Manage all-in-house company infrastructure is not a characteristic of an MSP (Managed Service Provider) implementation. MSPs provide an outsourced IT service to manage a company's IT infrastructure and endpoints, rather than managing it all in-house. Some characteristics of an MSP implementation include the following (see ISC2 Study Guide, chapter 4, module 3): Utilizing expertise for the implementation of a product or serviceMonitoring and responding to security incidents Mediating, executing a"},{"id":121,"question":"Which of these is NOT a typical component of a comprehensive business continuity plan (BCP)?","options":{"A":"A cost prediction of the immediate response procedures","B":"Immediate response procedures and checklists","C":"Notification systems and call trees for alerting personnel","D":"A list of the BCP team members"},"correct":"A","explanation":"Cost predictions of response procedures are not typical components of business continuity plans (BCP). A BCP typically includes the following elements: A list of BCP team members, who will be responsible for implementing the BCP and coordinating the response to an incident; Immediate response procedures and checklists, with step-by-step instructions for responding to an incident and restoring operations; Notification systems and call trees for alerting personnel, the purpose of which is to effec"},{"id":122,"question":"Acting ethically is mandatory for (ISC)\u00b2 members. Which of these is NOT considered unethical? github.com/ayemunhossain","options":{"A":"Disrupting the intended use of the internet","B":"Seeking to gain unauthorized access to resources on thae internet","C":"Compromising the privacy of users","D":"Having fake social media profiles and accounts"},"correct":"D","explanation":"Having fake social media profiles and accounts can be socially objectionable, but does not violate the (ISC)\u00b2 Ethics Canons (see ISC2 Study Guide, chapter 1, module 5). That being said, seeking to gain unauthorized access to resources on the internet, compromising the privacy of users, and disrupting the intended use of the internet are all considered unethical behaviors by (ISC)\u00b2, as well as by other similar professional organizations. Aside from being violations of professional codes of conduc"},{"id":123,"question":"In an incident response process, which phase uses indicators of compromise and log analysis as part of a review of events?","options":{"A":"Preparation","B":"Eradication","C":"Identification","D":"Containment"},"correct":"C","explanation":"According to NIST methodology, an incident response plan has four phases to structure the organization\u2019s incident response, and typically includes short and long-term goals, metrics for measuring success, training, and job requirements for incident response roles. The identification phase focuses on identifying the attack, understanding its severity, and prioritizing it appropriately. Preparation focuses on building tools, processes and procedures to respond to incidents. Eradication involves th"},{"id":124,"question":"Which of these Access Control Systems is commonly used in the military?","options":{"A":"ABAC","B":"DAC","C":"RBAC","D":"MAC"},"correct":"D","explanation":"Mandatory Access Control (MAC) is a model of access control that is commonly used in the military, because it enables the centralized management of access rights, as well as the enforcement of strict security policies (see ISC2 Study Guide, chapter 3, module 3). In MAC, access to resources is based on the classification level of a given resource, as well as on the clearance level of the user. The use of classification and clearance levels allows for a hierarchical approach to security, whereby a"},{"id":125,"question":"Which of these is NOT a security principle?","options":{"A":"Security in Depth (SID)","B":"Zero Trust model","C":"Least Privilege","D":"Separation of Duties"},"correct":"A","explanation":"Security in Depth (SID) is not a security principle, but a security model that involves implementing multiple layers of security controls, so as to protect against threats and reduce the risk of a successful attack. In Security in Depth, the idea is to create a multi-layered defense system that includes both technical controls (such as firewalls and intrusion detection systems) and administrative controls (such as policies and procedures). github.com/ayemunhossain Zero Trust model, Separation of"},{"id":126,"question":"Which of these is not a common goal of a cybersecurity attacker?","options":{"A":"Allocation","B":"Alteration","C":"Disclosure","D":"Denial"},"correct":"A","explanation":"The three most common goals of cybersecurity attackers are disclosure, alteration, and denial (DAD), which correspond directly to to the cybersecurity triad: confidentiality, integrity, and availability (CIA) (see ISC2 Study Guide, chapter 1, module 1). Allocation means assigning controls to specific system elements responsible for providing a security or privacy capability (e.g., access control systems, routers, servers, etc.), and therefore is not a common goal of a cybersecurity attacker."},{"id":127,"question":"Which of these types of layers is NOT part of the TCP/IP model?","options":{"A":"Application","B":"Physical","C":"Internet","D":"Transport"},"correct":"B","explanation":"The physical layer exists in the OSI model, but not in the TCP/IP model. The TCP/IP Protocol Architecture Layers are: [1] Application (Determines the protocols for the Transport layer); [2] Transport (Allows for data to move among devices); [3] Internet (Creates and inserts packets); [4] Network Interface (Governs how data will move through the network) (for more on this, see ISC2 Study Guide, Chapter 4, Module 1)."},{"id":128,"question":"On a BYOD model, which of these technologies is best suited to keep corporate data and applications separate from personal?","options":{"A":"Biometrics","B":"Full-device encryption","C":"Context-aware authentication","D":"Containerization"},"correct":"D","explanation":"Containerization allows users to run corporate applications and access corporate data in a secure environment that applications outside the container cannot access. Containerization solutions for mobile devices typically use encryption and other isolation techniques to ensure that data and applications do not cross over. Full-device encryption helps reduce the risk of theft or loss of a device, thereby reducing the risk of a data breach. Biometrics and context-aware authentication are helpful in"},{"id":129,"question":"In the context of risk management, which information does ALE outline?","options":{"A":"The expected cost per year of not performing a given risk-mitigating action","B":"The business impact of a risk","C":"The percentage of Asset Lost Efficiency","D":"The probability of a risk coming to pass in a given year"},"correct":"A","explanation":"The Annualized Loss Expectancy (ALE) is a standard metric of risk exposure that refers to the expected cost per year of a given risk if it is not mitigated. The business impact of a risk is technically considered a loss, and is better captured by a metric called Single Loss Expectancy (see ISC2 Study Guide, chapter 1, module 2). The probability of a risk coming to pass in a given year is best captured by a metric called Annualized Rate of Occurrence (ARO). Asset Lost Efficiency is a misleading t"},{"id":130,"question":"Which of these techniques is PRIMARILY used to ensure data integrity?","options":{"A":"Message Digest","B":"Content Encryption","C":"Backups","D":"Hashing"},"correct":"A","explanation":"Data integrity means that a message has not been tampered with or altered. A Message Digest ensures the integrity of any message data that is transmitted over an insecure channel (since a channel that may alter the message's content) (see ISC2 Study Guide, chapter 1, module 1). Cryptographic hash functions (like MD5 or SHA-256) create a fixed-length digital fingerprint of the message data called the Message Digest. If the Message Digest does not match, then the message's integrity has been compr"},{"id":131,"question":"Which of these is an example of a privacy breach?","options":{"A":"Any observable occurrence in a network or system","B":"Being exposed to the possibility of attack","C":"Unavailability of critical systems","D":"Access of private information by an unauthorized person github.com/ayemunhossain"},"correct":"D","explanation":"A privacy breach is a compromise of confidentiality (see ISC2 Study Guide, chapter 2, module 1). The NIST defines privacy breach as \"the loss of control, compromise, unauthorized disclosure, unauthorized acquisition, or any similar occurrence where a person other than an authorized user accesses (or potentially accesses) personally identifiable information, or uses it for anything other than its authorized purpose\". The unavailability of a critical system is a compromise of availability (not of "},{"id":132,"question":"Which of these terms refers to a collection of fixes?","options":{"A":"Downgrade","B":"Patch","C":"Service Pack","D":"Hotfix"},"correct":"C","explanation":"A service pack comprises a collection of updates, fixes or enhancements to a software program delivered as a single installable package. A hotfix (or quick-fix) engineering update is a cumulative package which includes information that will be used to address a problem in a software product. A software patch is a quick-repair job for a piece of programming, and is designed to resolve functionality issues, improve security and/or add new features."},{"id":133,"question":"While performing background checks on new employees, which of these can NEVER be an attribute for discrimination?","options":{"A":"Employment history, references, criminal records","B":"Credit history, employment history, references","C":"Criminal Records, credit history, references","D":"References, education, political affiliation, employment history"},"correct":"D","explanation":"The correct answer is A. A best practice when hiring new staff is to perform a background check, so as to minimize risks. A company can use discriminatory factors such as references, academic degrees, and employment, criminal, or credit history (although this is not very common). However, it is illegal to inquire about potential or current employees' political preferences (see ISC2 Study Guide, chapter 5, module 4)."},{"id":134,"question":"When looking for cybersecurity insurance, which of these is the MOST IMPORTANT objective?","options":{"A":"Risk acceptance","B":"Risk transference","C":"Risk avoidance","D":"Risk spreading"},"correct":"B","explanation":"The purpose of any insurance is to transfer risk from one party to another. The insurer is obligated to indemnify the insured for a loss caused by an unexpected event, over the course of a definite and mutually-agreed period of time. Risk avoidance consists in avoiding or eliminating the actions and conditions that give rise to the risk. Risk spreading consists in spreading a significant amount of risk over a larger part of the organization or activity, namely by manipulating the sequence or siz"},{"id":135,"question":"Which of these documents is MORE directly related to what can be done with a system or with its information?","options":{"A":"SLA","B":"MOA","C":"MOU","D":"ROE"},"correct":"C","explanation":"A Memorandum of Understanding (MOU) outlines the terms and conditions for collaboration, including eventual restrictions on the use of information (see ISC2 Study Guide, chapter 4, module 3). A Memorandum of Agreement (MOA) is similar to an MOU, but is both more formal and legally binding. A Service Level Agreement (SLA) is a contract between a service provider and a customer which specifies service-related guarantees or warranties. In Cybersecurity, Rules of Engagement (ROE) are guidelines and "},{"id":136,"question":"Which kind of document outlines the procedures ensuring that vital company systems keep running during business- disrupting events?","options":{"A":"Business Impact Analysis","B":"Business Impact Plan","C":"Business Continuity Plan","D":"Disaster Recovery Plan"},"correct":"C","explanation":"A Business Continuity Plan (BCP) is a predetermined set of instructions describing how an organization's business processes will be sustained during and after a significant disruption (see Chapter 2 ISC2 Study Guide, module 4, under Terms and Definitions). A Business Impact Analysis (BIA) is a method of analyzing how such disruptions can affect an organization. A Disaster Recovery Plan is used to recover systems after a major failure or disaster. The term 'Business Impact Plan' does not actually"},{"id":137,"question":"Which of these social engineering attacks sends emails that target specific individuals?","options":{"A":"Pharming","B":"Whaling","C":"Vishing","D":"Spear phishing"},"correct":"D","explanation":"Spear phishing is a highly targeted phishing attack (and not just random spam) which aims to get specific individuals to reveal confidential information. The particularity of spear phishing is that these attacks are sent with prior knowledge about the target (person or company), so as to increase its chance of success. Whaling is a phishing attack targeted at a group (typically an organization's executives) (see ISC2 Study Guide, chapter 4, module 3). A pharming attack corrupts an infrastructure"},{"id":138,"question":"(\u2605) Which of these properties is NOT guaranteed by a Message Authentication Code (MAC)?","options":{"A":"Authenticity","B":"Anonymity","C":"Integrity","D":"Non-repudiation"},"correct":"B","explanation":"A Message Authentication Code (MAC) does not guarantee anonymity. MAC is a cryptographic function that guarantees a message's integrity, authenticity, and non-repudiation. In particular: Integrity is the ability of the MAC to detect any changes that may have occurred to a message during either transmission or storage. A MAC provides this by generating a unique code for the message based on its contents, as well as a secret key that is shared between the sender and the receiver. If any changes ar"},{"id":139,"question":"What is the PRIMARY objective of a degaussing? github.com/ayemunhossain","options":{"A":"Preventing magnetic side-channel attacks","B":"Reducing noisy data on a disk","C":"Erasing the data on a disk","D":"Retaining the data on a disk"},"correct":"C","explanation":"Degaussing is a technique used to erase data from a magnetic storage device, such as a hard disk drive (HDD) or magnetic tape. In degaussing, devices are exposed to strong magnetic fields that neutralize the magnetic records of the data stored on the device. This effectively erases the data, making it difficult or impossible to recover. Degaussing is often used to securely erase data from storage devices before disposing or repurposing them, thereby ensuring that unauthorized parties cannot acce"},{"id":140,"question":"Which of these is part of the canons (ISC)\u00b2 code of ethics?","options":{"A":"Provide diligent and competent services to stakeholders","B":"Advance and protect the profession","C":"Prevent and detect unauthorized use of digital assets in a society","D":"Act always in the best interest of your client"},"correct":"B","explanation":"The four canons of ISC2 are (see ISC2 Study Guide, chapter 1, module 5): Advance and protect the profession; Act honorably, honestly, justly, responsibly and legally; Provide diligent and competent service to principals; Protect society, the common good, necessary public trust and confidence and the infrastructure.Although some options seem right, only 'Advance and protect the profession' is correct. github.com/ayemunhossain"},{"id":141,"question":"Which of these is NOT one of the (ISC)\u00b2 ethics canons?","options":{"A":"Act honorably, honestly, justly, responsibly, and legally","B":"Consider the social consequences of the systems you are designing","C":"Protect society, the common good, necessary public trust and confidence, and the infrastructure","D":"Provide diligent and competent service to principals"},"correct":"B","explanation":"Considering the social consequences of the systems you are designing is a valid concern, since the professional must abide by the canon of their protecting society, the common good, necessary public trust and confidence, and the infrastructure. However, this is not in itself a canon. The four canons of (ISC)\u00b2 are: Protect society, the common good, necessary public trust and confidence, and the infrastructure; Act honorably, honestly, justly, responsibly, and legally; Provide diligent and compete"},{"id":142,"question":"(\u2605) Which of these is the PRIMARY objective of the PCI-DSS standard?","options":{"A":"Personally Identifiable Information (PII)","B":"Change Management","C":"Secure Credit Cards Payments","D":"Protected Health Information (PHI)"},"correct":"C","explanation":"PCI-DSS (Payment Card Industry Data Security Standard) is a standard used in the payment card industry. Protected Health Information (PHI) is any individually identifiable health information that is created, used or disclosed while providing healthcare services. The Health Insurance Portability and Accountability Act (HIPAA) is a United States law aimed at protecting PHI. Personally Identifiable Information (PII) is any information that is capable of identifying an individual. PII is protected b"},{"id":143,"question":"Which of these is an attack that encrypts the organization's information, and then demands payment for the decryption code?","options":{"A":"Phishing","B":"DDoS","C":"Spoofing","D":"Ransomware"},"correct":"D","explanation":"Ransomware is an attack that encrypts an organization's information (thereby rendering it inaccessible or unusable) and then demands payment in exchange for the decryption code (see ISC2 Study Guide, chapter 4, module 2). A distributed denial-of-service (DDoS) attack is a type of attack in which a large amount of malicious traffic is directed at a specific target (such as a website or server), so as to overwhelm it, thus making it unavailable to users. Phishing is an attack in which attackers se"},{"id":144,"question":"The PRIMARY objective of a business continuity plan is:","options":{"A":"To regularly verify whether the organization complies with applicable regulations","B":"To sustain business operations while recovering from a disruption","C":"To assess the impact of disruption to the business","D":"To restore the business to the full last-known reliable state of operations"},"correct":"B","explanation":"A Business Continuity Plan (BCP) is a predetermined set of instructions describing how the mission and business processes of an organization will be sustained during and after a significant disruption (see Chapter 2 ISC2 Study Guide, module 4, under Terms and Definitions). Restoring a business to its last-known reliable state of operations is the goal of a Disaster Recovery Plan (see Chapter 2 ISC2 Study Guide, module 4, under The Goal of Disaster Recovery). Assessing the github.com/ayemunhossai"},{"id":145,"question":"Which of these is an attack whose PRIMARY goal is to gain access to a target system through falsified identity?","options":{"A":"Ransomware","B":"Amplification","C":"Spoofing","D":"DDoS"},"correct":"C","explanation":"Spoofing is an attack whose primary goal is to gain access to a target system through a falsified identity. In a spoofing attack, the attacker creates or manipulates a digital identity or communication, so as to deceive the target into believing that the attacker is someone or something else. There are many different types of spoofing attacks, including email spoofing, IP spoofing, and URL spoofing. Such attacks are used to gain unauthorized access to systems or networks, steal sensitive informa"},{"id":146,"question":"When an incident occurs, which of these is not a PRIMARY responsibility of an organization's response team?","options":{"A":"Determining the scope of the damage caused by the incident","B":"Implementing the recovery procedures necessary to restore security and recover from any incident-related damage","C":"Determining whether any confidential information has been compromised over the course of the entire incident","D":"Communicating with top management regarding the circumstances of the cybersecurity event"},"correct":"D","explanation":"While communicating with top management about the circumstances of the cybersecurity event is always important, it is not a primary responsibility of the response team. Indeed, the primary responsibility of the response team is to address github.com/ayemunhossain the immediate impact of the incident, and to restore security as quickly as possible. When an incident occurs, the primary duties of a response team include the following: Determining the scope of the damage caused by the incident, and "},{"id":147,"question":"What is the PRIMARY objective of a rollback in the context of the change management process?","options":{"A":"Identify the required changes needed","B":"Validate the system change process","C":"Restore the system to its last state before the change was made","D":"Establish a minimum understood and acceptable level of security requirements"},"correct":"C","explanation":"In the context of the change management process, the primary objective of a rollback is to restore the system to its last state before the change was made. By rolling back the change, the system can be returned to its previous state, which may help to resolve issues and restore regular operation. Rollbacks can be either triggered automatically in response to a failure or error, or initiated manually during the change management process (see ISC2 Study Guide, chapter 5, module 2). Establishing a "},{"id":148,"question":"Which of these entities is responsible for signing an organization's policies?","options":{"A":"Human Resources","B":"Security engineer","C":"Financial Department","D":"Senior management github.com/ayemunhossain"},"correct":"D","explanation":"Senior management is typically responsible for setting the organization's overall direction and strategy, and for ensuring that policies and procedures are in place to support that strategy. Therefore, it is the senior management's responsibilityto sign the organization's policies. Although other departments and stakeholders may be called in to develop and draft policies, it is ultimately the responsibility of senior management to sign off on the policies, indicating their approval and support."},{"id":149,"question":"Which of these terms refers to threats with unusually high technical and operational sophistication, spanning months or even years?","options":{"A":"Rootkit","B":"APT","C":"Side-channel","D":"Ping of death"},"correct":"B","explanation":"An Advanced Persistent Threat is a threat with unusually high technical and operational sophistication. APTs can be difficult to detect and defend against, as the attackers often use sophisticated techniques to evade detection, and to remain stealthy for extended periods of time. APTs are typically carried out by highly skilled and well-funded attackers (such as nation-state actors or well-organized criminal groups), and often target specific organizations or individuals with the goal of stealin"},{"id":150,"question":"The PRIMARY objective of a security baseline is to establish ...","options":{"A":". a minimum understood and a good level of security requirements","B":"a minimum understood and acceptable level of security requirements github.com/ayemunhossain","C":"security and configuration requirements","D":"a maximum understood and an acceptable level of security requirements"},"correct":"B","explanation":"A security baseline is a set of security standards, guidelines and procedures used to ensure that a system or network meets a minimum level of security. Security baselines are typically based on industry best practices, regulatory requirements, and an organization's specific security needs. The primary objective of a security baseline is to establish a minimum understood and acceptable level of security requirements. While it is true that a security baseline specifies security and configuration "},{"id":151,"question":"Which of these attacks take advantage of inadequate input validation in websites?","options":{"A":"Phishing","B":"Trojans","C":"Cross-Site Scripting","D":"Rootkits"},"correct":"C","explanation":"Cross-Site Scripting (XSS) is an attack where malicious executable scripts are injected into an otherwise benign website (or web application) code. Websites are vulnerable to XSS when they display data originating from requests or forms without validating it (and further sanitizing it, so that it is not executable) (see ISC2 Study Guide, chapter 4, module 2). Trojans and phishing are attacks where software applications and messages try to appear legitimate, but have hidden malicious functions. T"},{"id":152,"question":"An organization needs a network security tool that detects and acts in the event of malicious activity. Which of these tools will BEST meet their needs?","options":{"A":"Router github.com/ayemunhossain","B":"IPS","C":"IDS","D":"Firewall"},"correct":"B","explanation":"An intrusion prevention system (IPS) is designed to monitor network traffic in real-time, identifying patterns or behaviors that may indicate an attempted intrusion or other malicious activity. Whenever an IPS detects suspicious activity, it can also act to protect the network (such as by blocking suspicious traffic, alerting the network administrator, or initiating a response to contain the threat) (see ISC2 Study Guide, chapter 4, module 2). Another type of network security tool is an intrusio"},{"id":153,"question":"In a DAC policy scenario, which of these tasks can only be performed by a subject granted access to information?","options":{"A":"Changing security attributes","B":"Reading the information","C":"Executing the information","D":"Modifying the information"},"correct":"A","explanation":"As a principle, users can perform Read, Write and Execute actions with every Access Control policy. However, in discretionary access control policies, the permissions associated with each object (files or system resources) are set by the object's owner. In this model, the creator of an object implicitly becomes its owner, and therefore can decide who will have permission to the objects (see ISC2 Study Guide, chapter 3, module 3). A major weakness of DAC is that it gives users complete control to"},{"id":154,"question":"In the event of non-compliance, which of these can have considerable financial consequences for an organization?","options":{"A":"Policies","B":"Regulations","C":"Guidelines","D":"Standards"},"correct":"B","explanation":"Regulations are created by governments or national authorities, and often lead to financial fines for infringement. For example, the EU's GDPR prescribes penalties of up to 2% of annual revenue. Standards are created by governing or professional bodies (not by governments), and thus are not legally enforceable. Regulations are mandatory, while standards are voluntary. Policies and guidelines are internal to organizations, and are therefore not subject to financial penalties (see ISC2 Study Guide"},{"id":155,"question":"What does the term LAN refer to?","options":{"A":"A tool to manage and control network traffic, as well as to protect a network.","B":"A network on a building or limited geographical area","C":"A device that connects multiple other devices in a network","D":"A long-distance connection between geographically-distant networks"},"correct":"B","explanation":"A local area network (LAN) typically covers a single floor or building. Long-distance connections between geographically- distant networks form something called a wide area network (WAN). Multiple devices in a network are connected through hubs or switches. The management and control of network traffic and protection is achieved by specialized equipment, such as firewalls and intrusion prevention systems (ISC2 Study Guide, Chapter 4, Module 1)"},{"id":156,"question":"Which of these is a type of corrective security control? github.com/ayemunhossain","options":{"A":"Patches","B":"Intrusion detection systems","C":"Guidelines","D":"Encryption"},"correct":"A","explanation":"Patches are a type of corrective security control, since they repair damage and restore resources and capabilities to a secure and previously-updated state (see ISC2 Study Guide, chapter 5, module 2). Encryption is a preventive security control that ensures data confidentiality. Intrusion detection systems are detective controls, since they monitor a given system for unwanted activity. Intrusion detection systems (IDS) alert administrators to potential security breaches or attacks. Although they"},{"id":157,"question":"Which of these enables point-to-point online communication over an untrusted network?","options":{"A":"VLAN","B":"Firewall","C":"Router","D":"VPN"},"correct":"D","explanation":"A VPN is a type of network technology that creates a secure encrypted connection between a device and a network. This connection allows users to communicate with each other and access network resources as if they were on the same local network, even if they are in different locations (see ISC2 Study Guide, chapter 4, module 3). A VLAN (Virtual Local Area Network) is a network segmentation technology that allows devices on a network to be logically grouped, even if they are in different locations"},{"id":158,"question":"At which of the OSI layers do TCP and UDP work?","options":{"A":"Transport Layer","B":"Session Layer","C":"Application Layer","D":"Physical Layer"},"correct":"A","explanation":"TCP (Transmission Control Protocol) and UDP (User Datagram Protocol) are both transport layer protocols, which operate at the fourth layer of the OSI (Open Systems Interconnection) model (see ISC2 Study Guide, chapter 4, module 1). The transport layer (also known as \"Layer 4\") ensures that data is delivered reliably and efficiently between different devices on a network. TCP is a connection-oriented protocol which establishes a dedicated end-to-end connection. UDP is a connectionless protocol, a"},{"id":159,"question":"(\u2605) Which is the PRIMARY focus of the ISO 27002 standard?","options":{"A":"Health Insurance Portability and Accountability Act (HIPAA)","B":"Information Security Management System (ISMS)","C":"Risk Management","D":"Application Security"},"correct":"B","explanation":"ISO 27002 is a supplementary standard aimed at guiding implementation controls in order to maintain security controls for Information Security Management Systems (ISMS), as defined in ISO 27001. Among many other aspects, these security controls comprise application security. Risk management is an activity that is touched on in this standard, but is not its primary focus (it is the focus of the ISO 31000 standard). HIPAA is the United States law that governs the privacy github.com/ayemunhossain o"},{"id":160,"question":"(\u2605) Which of these different sub-masks will allow 30 hosts?","options":{"A":"/26","B":"/30","C":"/27","D":"/29"},"correct":"C","explanation":"A subnet mask is a number that distinguishes between the network address and the host address. Subnetting divides a network into two or more subnets (see ISC2 Study Guide, chapter 4, module 1). To allow 30 hosts + 2 addresses for broadcast and network addresses. Thus, we are looking for the mask 255.255.255.224, or /27 using CIDR (Classless Inter- Domain Routing) notation. For 32 addresses, we need 5 bits and the mask /32 - log2(32) = /32 - 5 = /27. As for the remaining masks, /26 would result i"},{"id":161,"question":"(\u2605) Which of these statements about the security implications of IPv6 is NOT true?","options":{"A":"Rules based on static IPv6 addresses may not work","B":"IPv6's NAT implementation is insecure","C":"IPv6 traffic may bypass existing security controls","D":"IPv6 reputation services may not be mature and useful"},"correct":"B","explanation":"IPv6 does not include network address translation (NAT), since many IP addresses are available. As a result, there is no NAT implementation, and so IPv6 can't actually have an insecure version. Rules based on static IPv6 addresses may not work, since IPv6 addresses are often dynamically assigned. Thus, certain security controls that rely on static address rules (such as firewalls or access controls) may not work in all cases. Reputation services are still relatively rare, and also somewhat less "},{"id":162,"question":"Which of these is a type of detective access control?","options":{"A":"Bollards","B":"Movement Sensors","C":"Turnstiles","D":"Firewalls"},"correct":"B","explanation":"Detective controls alert us to security problems by constantly monitoring activity and recording information, so as to take immediate action in the event of a security control failure (such as bollards or turnstiles). Therefore, a movement sensor is considered a detective control, and is complementary to physical controls. Firewalls are network devices used to filter network traffic, and are thus considered technical controls. Logging and monitoring tools, such as Security Information and Event "},{"id":163,"question":"The name, age, location and job title of a person are all examples of:","options":{"A":"Biometric factors","B":"Attributes","C":"Account permissions","D":"Identity factors"},"correct":"B","explanation":"Attributes such as a person's name, age, location, job title, and even characteristics such as height or hair color, may all be associated with their identity. None of these describe biometric factors used for authentication. Identity factors are something you know, are or have. Account permissions determine what an authenticated person (a user) can do, and not attributes related to the user's identity. github.com/ayemunhossain"},{"id":164,"question":"Which cloud service model provides the most suitable environment for customers who want to install their custom operating system?","options":{"A":"SaaS","B":"SLA","C":"IaaS","D":"PaaS"},"correct":"C","explanation":"Infrastructure as a Service (IaaS) is a cloud service model that allows the customer to manage the computing resources (including the operating systems). Software as a Service (SaaS) is a model that provides customers with access to software applications (typically on a subscription-based or pay-per-use model) but does not allow them to access the underlying infrastructure. Platform as a Service (PaaS) is a service model that provides a platform for building, deploying and managing applications;"},{"id":165,"question":"(\u2605) Which of these statements is TRUE about cybersquatting?","options":{"A":"Its an unethical practice but everyone does it","B":"It is partially illegal practice","C":"It is an illegal practice","D":"It is s a legal practice"},"correct":"C","explanation":"Cybersquatting (also known as domain squatting) is the practice of speculatively registering and then selling (typically ata high price) a domain name, with the intent of profiting from someone else's trademark. An example would be someone registering the domain name \"mycompany.com\" and then offering to sell it to the owner of the trademark \"MyCompany\" for a high price. Cybersquatting can cause confusion and damage to the trademark owner's brand, which is generally considered unethical and decep"},{"id":166,"question":"Which of these addresses is commonly reserved specifically for broadcasting?","options":{"A":"192.299.121.254","B":"192.299.121.0","C":"192.299.121.14","D":"192.299.121.255"},"correct":"D","explanation":"IPv4 addresses are 32-bits represented as a sequence of four 8-bit integers separated by a dot. Addresses ending with 0 are reserved to specifically signify the network itself (and not a specific device on that network). In contrast, addresses ending in 255 are generally reserved for broadcasting to all devices on that network (see ISC2 Study Guide, chapter 4, module 1)."},{"id":167,"question":"Which department in a company is NOT typically involved in a Disaster Recovery Plan (DRP)?","options":{"A":"Executive","B":"Financial","C":"Public Relations","D":"IT"},"correct":"B","explanation":"Executives and Public Relations staff need to be aware of the company's Disaster Recovery Plan (DRP) to properly handle the expectations of the public, as well as of company stakeholders. IT personnel should be focused on helping businesses return to normal operations. A company's financial department is rarely involved in a disaster recovery plan, except when the issue at hand is directly connected to company finances (see Chapter 2 ISC2 Study Guide, module 3, under Components of a Disaster Rec"},{"id":168,"question":"Which of these pairs does NOT constitute Multi-Factor Authentication (MFA)?","options":{"A":"Fingerprint and password.","B":"Username and retina scan.","C":"Password and username.","D":"PIN and credit card."},"correct":"C","explanation":"Multi-Factor Authentication uses authentication from more than one factor. Passwords and usernames are not multifactor, since they are both 'something you know' (see ISC2 Study Guide, chapter 3, module 1)."},{"id":169,"question":"Which method is COMMONLY used to map live hosts in the network?","options":{"A":"Geolocation","B":"Traceroute","C":"Ping sweep","D":"Wireshark"},"correct":"C","explanation":"A ping sweep is a commonly used method to map live hosts in a network. A ping sweep involves sending a series of ping messages (ICMP Echo Request packets) to a range of IP addresses on a network so as to determine which hosts are currently online. Hosts that are online will respond with a reply message when a ping is sent to them. Collecting the replies makes it possible to map which hosts are currently online on the network (see ISC2 Study Guide, chapter 4, module 3). The remaining options are "},{"id":170,"question":"A poster reminding the best password management practices is an example of which type of learning activity?","options":{"A":"Awareness","B":"Schooling","C":"Education","D":"Training"},"correct":"A","explanation":"An awareness poster or campaign can be effective in engaging a user's attention and encouraging them to consider their password practices. Specific strategies include highlighting the risks associated with weak or easily guessable passwords (such as the risk of account compromise or data theft) and encouraging users to remember to use a password manager to store and manage their passwords securely. The primary goal of education is to help learners improve both their understanding of concepts and"},{"id":171,"question":"Which part of the CIA Triad will be PRIMARILY jeopardized in a Distributed Denial Of Service (DDOS) attack?","options":{"A":"Accountability","B":"Availability","C":"Integrity","D":"Confidentiality"},"correct":"B","explanation":"Distributed Denial-of-Service (DDoS) attacks are malicious attempts to block businesses from their traffic by flooding a target server, service or network with malicious coordinated traffic generated by a wide number of systems on the internet. The goal of DDoS attacks is to compromise availability (see ISC2 Study Guide, chapter 1, module 1 and also chapter 4, module 3) . A DDoS attack does not target confidentiality, but it may accidentally compromise integrity. Accountability is the property t"},{"id":172,"question":"(\u2605) What technology is MOST LIKELY to conserve the storage space required for video recordings?","options":{"A":"Motion detection","B":"PTZ","C":"Facial recognition","D":"Infrared cameras"},"correct":"A","explanation":"Motion-detecting cameras record only when motion is detected, and thus help in reducing video storage requirements. A recording will occur more rarely in low-occupancy places (like data centers), thus conserving storage. In more heavily used areas, the impact on total storage space used will be negligible. Infrared cameras, facial recognition, and the abilityto pan, tilt, and zoom (PTZ) a camera are important features, but more is needed to conserve storage space."},{"id":173,"question":"An organization that uses a layered approach when designing its security architecture is using which of these security approaches?","options":{"A":"Zero trust","B":"Defense in depth","C":"Network Layers","D":"Network Control Access"},"correct":"B","explanation":"An organization that uses a layered approach when designing its security architecture is using a defense in-depth approach. In a defense in-depth approach, different layers of security controls may be implemented at different levels of the organization, such as at the network, application and user levels (see ISC2 Study Guide, chapter 4, module 3). Network control access refers to the process of controlling access to a network. Network layers refer to the different levels of a computer network, "},{"id":174,"question":"Which of these techniques will ensure the property of 'non-repudiation'?","options":{"A":"Using a VPN","B":"Passwords","C":"Encryption","D":"Digital signatures"},"correct":"D","explanation":"Non-repudiation means ensuring that the sender cannot later deny having sent the message. Digital signatures provide an undeniable match between sender and digital signature. We can think of a digital signature as a Message Digest encrypted with an asymmetric key: first, the message hash is encrypted using the sender's private key; then, the message (possibly encrypted) previously encrypted message hash; finally, the recipient decrypts the signature with the sender's public key, and transfers th"},{"id":175,"question":"(\u2605) A USB pen with data passed around the office is an example of:","options":{"A":"Data in motion","B":"Data at rest","C":"Data in transit","D":"Data in use"},"correct":"B","explanation":"Data at rest is stored data that resides on hard drives, on tapes, in the cloud, or on other storage media like (in this case)a USB pen. Data in processing (also called data in use) is actively used by a computer system. Data sent over a network is called data in motion. Data in transit is a term that does not usually apply to such a situation."},{"id":176,"question":"Suppose that an organization wants to implement measures to strengthen its detective access controls. Which one of these tools should they implement?","options":{"A":"Patches","B":"Encryption","C":"IDS","D":"Backups"},"correct":"C","explanation":"Detective controls are a crucial component of a cybersecurity program, since they provide visibility into malicious activity, breaches and attacks on an organization's IT environment. An intrusion detection system (IDS) is a device or software application which monitors a network or systems for malicious activity or policy violations (meaning that it's a detective control) (see ISC2 Study Guide, chapter 4, module 1). Patches are corrective controls. Backups are compensating controls, since they "},{"id":177,"question":"(\u2605) Which of these is an example of a MAC address?","options":{"A":"00-51-02-1F-58-F6","B":"0051021f58","C":"10.23.19.49","D":"2001 : db8: 3333 : 4444 : 5555 : 6666 : 7777 : 8888"},"correct":"A","explanation":"All network devices have a 48-bit Media Access Control (MAC) address, represented as six groups of 8 bits values in github.com/ayemunhossain hexadecimal (see ISC2 Study Guide, chapter 4, module 1 - Understand Computer Networking). An example of a MAC address would be 00-51-02-1F-58-F6. An IPv4 address is a 32-bit address represented as a sequence of four 8-bit integers, an example of which would be 10.23.19.49. An IPv6 address is a 128-bit address represented as a sequence of eight groups of 16-"},{"id":178,"question":"Which of these types of credentials is NOT used in multi-factor authentication?","options":{"A":"Something you have","B":"Something you know","C":"Something you are","D":"Something you trust"},"correct":"D","explanation":"Authentication generally requires that users provide identity factors (that others can't not easily provide). Because no single factor is ever foolproof, multi-factor authentication typically uses one or several of the following (see ISC2 Study Guide, chapter 3, module 1): 'Something you know', such as a password or personal identification number (PIN); 'Something you have', such as a smart card or certificate; 'Something you are', which would be based on your physical characteristics, in which "},{"id":179,"question":"On an Incident Response team, which role acts as the team's main link to Senior Management?","options":{"A":"Information security","B":"Communications and public relations","C":"Management","D":"Technical expert"},"correct":"C","explanation":"On most incident response teams, members of management or organizational leadership act as a primary conduit to senior management (see ISC2 Study Guide, chapter 2, module 1). The management team member also ensures that difficult or urgent decisions can be made without escalating authority. Communications and public relations staff focus on internal and external communications that typically differ from the direct conduit to senior management. Technical and information security experts are prima"},{"id":180,"question":"Which of these is NOT an effective way to protect an organization from cybercriminals?","options":{"A":"Removing or disabling unneeded services and protocols","B":"Using firewalls","C":"Using out-dated anti-malware software","D":"Using intrusion detection and prevention systems"},"correct":"C","explanation":"Using out-dated anti-malware software is NOT an effective way to protect an organization from cybercriminals. Anti- malware software (such as antivirus programs) are designed to detect and remove malware from computer systems and networks. To be effective, it is vital, instead, to ensure that running software is kept up-to-date with the latest security updates and definitions. Other effective ways to protect an organization from cybercriminals are: Removing or disabling unneeded services and pro"},{"id":181,"question":"Which of these CANNOT be a corrective security control?","options":{"A":"Disaster Recovery Plan","B":"Backups","C":"Patches","D":"Bollards"},"correct":"D","explanation":"Corrective security controls are measures used to address security vulnerabilities or weaknesses already identified. Backups, patches, and Disaster Recovery Plans are all corrective security controls (see ISC2 Study Guide, chapter 3, module 2). Backups can help ensure that important information is not lost in the event of an incident. Patches can help fix vulnerabilities and improve security. Disaster Recovery Plans are administrative security controls that establish the corrective measures to b"},{"id":182,"question":"Which of these is included in an SLA document?","options":{"A":"Instructions on data ownership and destruction","B":"Instructions to detect, respond to, and limit the consequences of a cyber-attack","C":"A plan to keep business operations going while recovering from a significant disruption","D":"A plan to prepare the organization for the continuation of critical business functions"},"correct":"A","explanation":"A Service Level Agreement (SLA) is a contract between a service provider and a customer which defines the level of service that the provider will deliver. It must include instructions on data ownership and destruction in order to ensure that sensitive data is properly protected. A set of instructions or procedures to detect, respond, and limit the consequences of a cyber-attack is called an Incident Response Plan (see ISC2 Study Guide chapter 2, module 1, under The Goal of Incident Response). A "},{"id":183,"question":"Which port number corresponds to the Simple Mail Transfer Protocol (SMTP)?","options":{"A":"161","B":"69","C":"25","D":"22"},"correct":"C","explanation":"The Simple Mail Transfer Protocol (SMTP) is well-known for accepting connections on port 25, so as to receive unencrypted email messages. The more secure alternative is to use port 587 for SMTP by using Transport Layer Security (TLS), which encrypts the data between the mail client and the server (see ISC2 Study Guide, chapter 4, module 1)"},{"id":184,"question":"Which type of attack attempts to mislead the user into exposing personal information by sending fraudulent emails?","options":{"A":"Cross-Site Scripting","B":"Denial of Service","C":"Trojans","D":"Phishing"},"correct":"D","explanation":"A phishing attack emails a fraudulent message with the goal of tricking the recipient into disclosing sensitive informationto the attacker (see ISC2 Study Guide, chapter 4, module 2). A Cross-Site Scripting attack tries to execute code on another website. Trojans are software that seem legitimate, but has hidden malicious functions. Trojans may be sent in a message, but are not themselves the message. A denial of service attack (DoS) compromises the availability of a system or service through a "},{"id":185,"question":"Which of these is NOT a characteristic of the cloud?","options":{"A":"Zero Customer Responsibility","B":"Broad Network Access","C":"Measured Service","D":"Rapid Elasticity"},"correct":"A","explanation":"The characteristics of the cloud, also known as the \"five essential characteristics\" of cloud computing, are (see ISC2 github.com/ayemunhossain Study Guide, chapter 4, module 3): Broad network access: Cloud resources, such as the internet, can be accessed over a network; Rapid elasticity: Cloud resources can be scaled up or down quickly and automatically to meet changing demand; Measured service: Cloud providers track and measure the use of resources, and users are typically charged based on the"},{"id":186,"question":"Which of these is a COMMON mistake made when implementing record retention policies?","options":{"A":"Not categorizing the type of information to be retained","B":"Not labeling the type of information to be retained","C":"Applying the longest retention periods to the information","D":"Applying shorter retention periods to the information"},"correct":"C","explanation":"A common mistake in record retention is applying the longest retention period without taking into account the sensitivity or importance of the corresponding information. Retaining unnecessary data has considerable costs in terms of storage and management. Less important or sensitive information can have shorter retention periods, thereby allowing longer retention periods for more important or sensitive information (see ISC2 Study Guide, chapter 5, module 1)."},{"id":187,"question":"Which type of security control does NOT include CCTV cameras?","options":{"A":"Corrective","B":"Deterrent","C":"Preventive","D":"Detective"},"correct":"A","explanation":"CCTV cameras are considered a deterrent to criminal activity. In addition, combined with other sensors, they can detect movement, and thus are considered a detective control. Image recordings provide evidence after the fact. According to the NIST, preventive controls are measures to detect, deter and/or reduce an impact of a system. CCTV cameras are not corrective controls, as they are not deployed to repair detected errors or irregularities (see ISC2 Study Guide, chapter 3, module 2)."},{"id":188,"question":"A security consultant hired to design the security policies for the PHI within an organization will be primarily handling:","options":{"A":"Personal Health information","B":"Public Health information","C":"Procedural Health information","D":"Protected Health information"},"correct":"D","explanation":"PHI is an acronym that stands for Protected Health Information (see ISC2 Study Guide, chapter 1, module 1). The remaining options are incorrect."},{"id":189,"question":"Which of these cloud deployment models is a combination of public and private cloud storage?","options":{"A":"Community","B":"Private","C":"Hybrid","D":"Public"},"correct":"C","explanation":"A hybrid cloud deployment model combines public and private cloud storage. For example: an organization might use private cloud storage for sensitive or proprietary data that needs to be kept confidential, while at the same time using github.com/ayemunhossain public cloud storage for less sensitive data or workloads, which are more suited to a shared infrastructure. This allows the organization to tailor its cloud storage strategy to meet the specific needs of its workloads, while at the same ti"},{"id":190,"question":"What is the primary goal of a Change Management Policy?","options":{"A":"To standardize the creation of the organization's network and computer systems","B":"To guarantee that systems are up to date with the latest security patch","C":"To standardize the usage of the organization's network and computer systems","D":"To guarantee that system changes are performed without negatively affecting business operations"},"correct":"D","explanation":"The primary goal of a Change Management Policy is to realize the benefits of the system's changes while minimizing disruptions to business operations, namely by ensuring the integrity of the organization's systems and processes (see ISC2 Study Guide, chapter 5, module 3). Guaranteeing that systems have the latest security patches is the goal of a Patch Management Policy. A Networking Policy governs the usage of networks, and an Acceptable Use Policy governs the usage of computer systems. The cre"},{"id":191,"question":"Which of these is NOT a feature of a SIEM (Security Information and Event Management)?","options":{"A":"Log auditing","B":"Log encryption","C":"Log consolidation","D":"Log retention github.com/ayemunhossain"},"correct":"A","explanation":"Log auditing is not a feature of a SIEM (Security Information and Event Management). A SIEM typically provides the following features: Log consolidation, which consists in collecting logs from various sources (like servers, firewalls or IDS/IPS) and then storing them in one central location. Log retention, which consists in storing logs for a specific period (like 90 days), so as to allow security analysts to keep track of and investigate past events. Log encryption, which is an optional feature"},{"id":192,"question":"Which of these technologies is the LEAST effective means of preventing shared accounts?","options":{"A":"Requiring a one-time password via an application","B":"Requiring one-time passwords via a token","C":"Password complexity requirements","D":"Requiring biometric authentication"},"correct":"C","explanation":"Password complexity requirements do not prevent the sharing of complex passwords, making it the least effective option from the above list. One-time passwords are hard to share, making it far less convenient to share accounts. Biometric authentication requires the registered user to actually be present when signing in. However, in some cases, such as fingerprint systems, multiple users could each register a valid fingerprint for a single account (see ISC2 Study Guide, chapter 3, module 1)."},{"id":193,"question":"Which of these is NOT a best practice in access management?","options":{"A":"Trust but verify","B":"Periodically assessing whether user permissions still apply","C":"Giving only the right amount of permission github.com/ayemunhossain","D":"Requesting a justification when upgrading permission"},"correct":"A","explanation":"The \"Trust but verify\" model is a method of threat protection that involves granting privileged accounts access to the network and other resources, while at the same time verifying their actions and activities. However, over time, this model was found to have limitations that expose organizations to a wide array of security threats. Therefore, \"Trust but verify\" is being progressively abandoned in favor of the Zero Trust model. The remaining options are all best practices of access management."},{"id":194,"question":"(\u2605) When analyzing risks, which of these activities is required?","options":{"A":"Accepting all evaluated risks","B":"Identifying risks associated with loss of confidentiality","C":"Determining the likelihood of occurrence of a set of risks","D":"Selecting the appropriate controls"},"correct":"C","explanation":"Determining the likelihood of occurrence of a set of risks involves estimating the likelihood that the identified risks will occur, along with the potential impact it could have on the organization. Once the likelihood of occurrence has been determined, the next step is to select the appropriate controls to mitigate those risks, such as encryption, access controls, or administrative controls (like policies and procedures). Identifying the risks associated with loss of confidentiality (such as un"},{"id":195,"question":"Which of these exercises goes through a sample of an incident step-by-step, validating what each person will do?","options":{"A":"A simulation exercise","B":"A walk-through exercise","C":"A tabletop exercise github.com/ayemunhossain","D":"A checklist exercise"},"correct":"B","explanation":"A walk-through exercise reviews each step of the incident, in order to ensure that every team member knows exactly what they should do, and how they should do it. In tabletop exercises, team members are given a scenario and asked how they would respond, as well as what tasks they believe would be relevant. A simulation exercise attempts to recreate an actual incident so as to thoroughly test responses. Checklists are essential in incident response, but aren't actually a specific type of exercise"},{"id":196,"question":"(\u2605) Which of these types of documents is usually THE LEAST formal?","options":{"A":"Standards","B":"Guidelines","C":"Policies","D":"Regulations"},"correct":"B","explanation":"Of the document types listed above, guidelines are generally the least formal. Guidelines provide recommendations or suggestions for achieving a particular goal or objective. They are often less formal than standards and policies, and are used to specify best practices or recommended approaches. Standards are generally more formal than guidelines, and describe the requirements, specifications or characteristics that a product, service or system should possess. Policies are usually more formal th"},{"id":197,"question":"A backup that captures the changes made since the latest full backup is an example of:","options":{"A":"A differential backup","B":"An incremental backup","C":"A backup snapshot github.com/ayemunhossain","D":"A full backup"},"correct":"A","explanation":"A differential backup is a backup that captures the changes made since the latest full backup. Incremental backups capture changes since the latest backup (which can be full or incremental), and snapshots are live copies of a system. Neither incremental backups nor snapshots necessarily capture changes since a full backup (see ISC2 Study Guide, chapter 5, module 1)."},{"id":198,"question":"A high-level executive of an organization receives a malicious email that tries to trick him. Which attack is the perpetrator using?","options":{"A":"DDOS","B":"Whaling","C":"Phishing","D":"Spear phishing"},"correct":"B","explanation":"When executives receive malicious emails that try to trick them, the attackers are likely attempting a whaling attack (see ISC2 Study Guide, chapter 4, module 2). Whaling is a type of spear phishing, and, in turn, spear phishing is a type of phishing. Whaling is a spear phishing attack targeted at a group of high-level executives, or at other influential individuals inside the organization. Spear phishing is a targeted attack in which the attacker uses email or other digital communication to tri"},{"id":199,"question":"What does redundancy mean in the context of cybersecurity?","options":{"A":"Designing systems with robust components, so that the organization has more attack resilience","B":"Conceiving systems with only the most necessary components, so that the organization has just the necessary risks. github.com/ayemunhossain","C":"Conceiving systems with less attack surface, so that the attacker has less chance of success","D":"Conceiving systems with duplicate components so that, if a failure occurs, there will be a backup"},"correct":"D","explanation":"In cybersecurity, redundancy refers to conceiving systems for resilience with duplicate components so that, if a failure occurs, the redundant component will take over and maintain operations, thereby helping to prevent outages or other disruptions (see ISC2 Study Guide, chapter 4, module 3). Examples of this are redundant servers, redundant network links, and redundant power supplies. Redundancy is also effective against attacks, since the attacked nodes can be quarantined and then replaced by "},{"id":200,"question":"When a company collects PII, which policy is required?","options":{"A":"Remote Access Policy","B":"GDPR","C":"Privacy Policy","D":"Acceptable Use Policy"},"correct":"C","explanation":"A Privacy Policy outlines the data security mechanisms which ensure that customer data is protected; namely, how Personal Identifiable Information (PII) is collected, stored and processed (see ISC2 Study Guide, chapter 5, module 3). The General Data Protection Regulation (GDPR) is a data protection and privacy regulation for the European Union and the European Economic Area (not a policy). An Acceptable Use Policy (AUP) defines the guidelines and limitations that users must agree on while access"},{"id":201,"question":"Which type of attack PRIMARILY aims to consume all the available resources, thereby making an organization's service inaccessible to its intended users?","options":{"A":"Trojans","B":"Cross-Site Scripting github.com/ayemunhossain","C":"Denial of Service","D":"Phishing"},"correct":"C","explanation":"A denial of service attack (DoS) compromises the availability of a system or service through a malicious overload of requests, thereby activating safety mechanisms that delay or limit the availability of that system or service. As a result, systems or services become temporarily inaccessible to their intended users (see ISC2 Study Guide, chapter 4, module 2). Trojans, phishing and cross-site scripting attacks try to gain access to the system or data covertly, and therefore do not primarily aim a"},{"id":202,"question":"Which one of these tools is MOST likely to detect an XSS vulnerability?","options":{"A":"Network vulnerability scanner","B":"Static application test","C":"Intrusion detection system","D":"Web application vulnerability scanner"},"correct":"D","explanation":"Intrusion detection systems are designed to detect attacks, not vulnerabilities. The remaining three tools could all possibly discover cross-site scripting (XSS) vulnerabilities. However, a web application vulnerability scanner is the one that's most likely to detect it, since it is specifically designed to test web applications (see ISC2 Study Guide, chapter 4, module 3)."},{"id":203,"question":"Which kind of physical access control is LESS effective at preventing unauthorized individual access to a data center?","options":{"A":"Turnstiles","B":"Barriers","C":"Fences","D":"Bollards github.com/ayemunhossain"},"correct":"D","explanation":"Bollards are short, vertical posts that block vehicles from accessing a data center. They are, however, ineffective at preventing access to individuals. Fences can be placed around the perimeter of the data center, so as to block unauthorized access and deter potential intruders. Barriers such as gates, walls or barricades can be used to block access to the data center. Finally, turnstiles can be used to control access to a data center, namely by allowing entry only to authorized individuals."},{"id":204,"question":"Which of these is NOT a type of malware?","options":{"A":"Trojan","B":"Worm","C":"Spoofing","D":"Rootkit"},"correct":"C","explanation":"Spoofing is not a type of malware. Spoofing is an attack whose primary goal is to gain access to a target system through a falsified identity (see ISC2 Study Guide, chapter 4, module 2). Trojans, rootkits and worms are all different types of malware. A Trojan is a type of malware that disguises itself as a legitimate program or file. A Rootkit is a type of malware that hides itself to go unnoticed in the compromised system, or in the victim's computer. A Worm is a type of malware designed to rep"},{"id":205,"question":"Which security principle states that a user should only have the necessary permission to execute a task?","options":{"A":"Privileged Accounts","B":"Separation of Duties","C":"Least Privilege","D":"Defense in Depth"},"correct":"C","explanation":"The principle of Defense in Depth refers to using multiple layers of security. The principle of Least Privilege states that subjects should be given only those privileges required to complete their specific tasks (ISC2 Study Guide Chapter 1, Module 3). Separation of Duties states that no user should ever be given enough privileges to misuse the system. Finally, Privileged Accounts are accounts with permissions beyond those of regular users, such as manager and administrator accounts. github.com/"}];

let state = {
  screen:'start', mode:'all', count:50, questions:[], current:0,
  answered:null, score:0, wrong:0, answers:[]
};

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function startQuiz(){
  let pool=state.mode==='random'?shuffle(ALL_QUESTIONS):[...ALL_QUESTIONS];
  const n=Math.min(Math.max(1,state.count),pool.length);
  state.questions=pool.slice(0,n); state.current=0; state.answered=null;
  state.score=0; state.wrong=0; state.answers=[]; state.screen='quiz'; render();
}

function selectAnswer(l){
  if(state.answered)return;
  const q=state.questions[state.current];
  const ok=l===q.correct; state.answered=l;
  if(ok)state.score++;else state.wrong++;
  state.answers.push({qIndex:state.current,selected:l,correct:q.correct,isCorrect:ok}); render();
}

function nextQuestion(){
  state.current++; state.answered=null;
  if(state.current>=state.questions.length)state.screen='results';
  render(); window.scrollTo({top:0,behavior:'smooth'});
}

function render(){
  const app=document.getElementById('app');
  if(state.screen==='start')renderStart(app);
  else if(state.screen==='quiz')renderQuiz(app);
  else renderResults(app);
}

function renderStart(app){
  app.innerHTML=`
    <div class="start-screen">
      <div class="logo">ISC2 CC Exam</div>
      <h1>Certified in<br>Cybersecurity</h1>
      <p>${ALL_QUESTIONS.length} practice questions</p>
      <div class="mode-cards">
        <div class="mode-card ${state.mode==='all'?'selected':''}" onclick="state.mode='all';render()">
          <h3>Sequential</h3><span>Questions in order</span>
        </div>
        <div class="mode-card ${state.mode==='random'?'selected':''}" onclick="state.mode='random';render()">
          <h3>Random</h3><span>Shuffled questions</span>
        </div>
      </div>
      <div class="count-row">
        <label>Number of questions</label>
        <input type="number" class="count-input" min="1" max="${ALL_QUESTIONS.length}" value="${state.count}" onchange="state.count=parseInt(this.value)||50">
      </div>
      <button class="btn btn-primary" onclick="startQuiz()">Start Exam</button>
    </div>`;
}

function renderQuiz(app){
  const q=state.questions[state.current], total=state.questions.length;
  const pct=((state.current+(state.answered?1:0))/total*100).toFixed(0);
  const letters=['A','B','C','D'];
  let opts='';
  letters.forEach(l=>{
    if(!q.options[l])return;
    let c='option-btn';
    if(state.answered){
      c+=' disabled';
      if(l===state.answered&&l===q.correct)c+=' correct-selected';
      else if(l===state.answered&&l!==q.correct)c+=' wrong-selected';
      else if(l===q.correct)c+=' correct-reveal';
    }
    opts+=`<button class="${c}" onclick="selectAnswer('${l}')"><span class="option-letter">${l}</span><span>${q.options[l]}</span></button>`;
  });
  let exp='';
  if(state.answered&&q.explanation) exp=`<div class="explanation-box"><strong>Explanation</strong>${q.explanation}</div>`;
  let nav='';
  if(state.answered){
    const last=state.current>=total-1;
    nav=`<div class="nav-row"><button class="btn btn-primary" onclick="nextQuestion()">${last?'View Results':'Next Question →'}</button></div>`;
  }
  app.innerHTML=`
    <div class="quiz-header">
      <span class="progress-info">${state.current+1} / ${total}</span>
      <div class="score-live"><span class="score-correct">✓ ${state.score}</span><span class="score-wrong">✗ ${state.wrong}</span></div>
    </div>
    <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="question-number">QUESTION ${q.id}</div>
    <div class="question-text">${q.question}</div>
    <div class="options">${opts}</div>${exp}${nav}`;
}

function renderResults(app){
  const total=state.questions.length, pct=Math.round(state.score/total*100);
  const passed=pct>=70, circ=2*Math.PI*78, off=circ-(pct/100)*circ;
  const col=passed?'var(--correct)':'var(--wrong)';
  let grade='';
  if(pct>=90)grade='Outstanding!';else if(pct>=80)grade='Great job!';
  else if(pct>=70)grade='You passed!';else if(pct>=60)grade='Almost there';
  else grade='Keep studying';
  const wrongs=state.answers.filter(a=>!a.isCorrect);
  let rev='';
  if(wrongs.length>0){
    rev=`<div class="review-section"><h3>Review Incorrect Answers (${wrongs.length})</h3>`;
    wrongs.forEach(a=>{
      const q=state.questions[a.qIndex];
      rev+=`<div class="review-item was-wrong"><div class="review-q">Q${q.id}: ${q.question}</div><div class="review-meta"><span class="review-your">Your answer: ${a.selected}. ${q.options[a.selected]}</span><span class="review-correct-label">Correct: ${a.correct}. ${q.options[a.correct]}</span></div></div>`;
    });
    rev+='</div>';
  }
  app.innerHTML=`
    <div class="results">
      <div class="results-circle">
        <svg width="180" height="180" viewBox="0 0 180 180">
          <circle cx="90" cy="90" r="78" stroke="var(--border)" stroke-width="8" fill="none"/>
          <circle cx="90" cy="90" r="78" stroke="${col}" stroke-width="8" fill="none" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" style="transition:stroke-dashoffset 1s ease"/>
        </svg>
        <div class="pct-text"><span class="pct-number" style="color:${col}">${pct}%</span><span class="pct-label">${passed?'PASS':'FAIL'}</span></div>
      </div>
      <h2>${grade}</h2>
      <p class="subtitle">You answered ${state.score} out of ${total} correctly</p>
      <div class="stat-grid">
        <div class="stat-card green"><div class="val">${state.score}</div><div class="lbl">Correct</div></div>
        <div class="stat-card red"><div class="val">${state.wrong}</div><div class="lbl">Incorrect</div></div>
        <div class="stat-card gold"><div class="val">${pct}%</div><div class="lbl">Score</div></div>
      </div>
      <div class="results-actions">
        <button class="btn btn-secondary" onclick="state.screen='start';render()">New Exam</button>
        <button class="btn btn-primary" onclick="startQuiz()">Retry</button>
      </div>${rev}
    </div>`;
}

render();
</script>
</body>
</html>
