<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McGraw-Hill CC All-in-One Exam Guide — Quiz</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f110f; --surface: #1a1d1a; --surface-hover: #222622;
  --border: #2e3530; --text: #e4e8e4; --text-dim: #8a918a;
  --accent: #34d399; --accent-glow: rgba(52,211,153,0.12);
  --correct: #22c55e; --correct-bg: rgba(34,197,94,0.1); --correct-border: rgba(34,197,94,0.4);
  --wrong: #ef4444; --wrong-bg: rgba(239,68,68,0.1); --wrong-border: rgba(239,68,68,0.4);
  --gold: #fbbf24; --ch-tag: #a78bfa;
}
body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.app { max-width: 760px; margin: 0 auto; padding: 20px; }

.start-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90vh; text-align: center; }
.badge { display: inline-block; padding: 6px 14px; background: var(--accent-glow); border: 1px solid rgba(52,211,153,0.3); border-radius: 20px; font-size: 12px; font-weight: 600; color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 20px; }
.start-screen h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
.start-screen .sub { color: var(--text-dim); font-size: 15px; margin-bottom: 36px; }
.config-section { width: 100%; max-width: 500px; margin-bottom: 20px; text-align: left; }
.config-section label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 8px; font-weight: 500; }
.config-row { display: flex; gap: 12px; margin-bottom: 20px; }
.mode-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; cursor: pointer; transition: all 0.2s; text-align: center; }
.mode-card:hover { border-color: var(--accent); }
.mode-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.mode-card h3 { font-size: 15px; margin-bottom: 3px; }
.mode-card span { font-size: 12px; color: var(--text-dim); }
select, .num-input { width: 100%; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; font-family: 'Inter', sans-serif; }
select:focus, .num-input:focus { outline: none; border-color: var(--accent); }
.btn { padding: 13px 36px; font-size: 15px; font-weight: 600; border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
.btn-primary { background: var(--accent); color: #0f110f; }
.btn-primary:hover { filter: brightness(1.1); }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); }
.start-btn-row { margin-top: 12px; }

.quiz-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
.progress-info { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-dim); }
.score-live { display: flex; gap: 16px; font-size: 13px; font-family: 'JetBrains Mono', monospace; }
.score-correct { color: var(--correct); }
.score-wrong { color: var(--wrong); }
.progress-bar-track { width: 100%; height: 4px; background: var(--surface); border-radius: 2px; margin-bottom: 28px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
.ch-tag { display: inline-block; padding: 3px 10px; background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.25); border-radius: 6px; font-size: 12px; color: var(--ch-tag); margin-bottom: 10px; }
.question-text { font-size: 19px; font-weight: 600; line-height: 1.5; margin-bottom: 24px; }
.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.option-btn { display: flex; align-items: flex-start; gap: 12px; padding: 14px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.15s; text-align: left; font-size: 14px; color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.5; }
.option-btn:hover:not(.disabled) { border-color: var(--accent); background: var(--surface-hover); }
.option-letter { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 12px; min-width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 6px; background: var(--bg); flex-shrink: 0; margin-top: 1px; }
.option-btn.correct-sel { border-color: var(--correct-border); background: var(--correct-bg); }
.option-btn.correct-sel .option-letter { background: var(--correct); color: #fff; }
.option-btn.wrong-sel { border-color: var(--wrong-border); background: var(--wrong-bg); }
.option-btn.wrong-sel .option-letter { background: var(--wrong); color: #fff; }
.option-btn.correct-rev { border-color: var(--correct-border); background: var(--correct-bg); }
.option-btn.correct-rev .option-letter { background: var(--correct); color: #fff; }
.option-btn.disabled { cursor: default; opacity: 0.55; }
.option-btn.disabled:hover { border-color: var(--border); background: var(--surface); }
.explanation-box { margin-top: 16px; padding: 16px 18px; background: var(--surface); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; font-size: 13px; line-height: 1.6; color: var(--text-dim); animation: fadeIn 0.3s ease; }
.explanation-box strong { color: var(--text); display: block; margin-bottom: 4px; font-size: 12px; letter-spacing: 0.5px; text-transform: uppercase; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.nav-row { display: flex; justify-content: flex-end; margin-top: 24px; }

.results { text-align: center; padding: 50px 0; animation: fadeIn 0.5s ease; }
.results-circle { width: 170px; height: 170px; margin: 0 auto 28px; position: relative; }
.results-circle svg { transform: rotate(-90deg); }
.results-circle .pct-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.pct-number { font-size: 44px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.pct-label { font-size: 13px; color: var(--text-dim); }
.results h2 { font-size: 26px; margin-bottom: 6px; }
.results .subtitle { color: var(--text-dim); font-size: 15px; margin-bottom: 36px; }
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 36px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
.stat-card .val { font-size: 26px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.stat-card .lbl { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
.stat-card.green .val { color: var(--correct); }
.stat-card.red .val { color: var(--wrong); }
.stat-card.gold .val { color: var(--gold); }
.results-actions { display: flex; gap: 12px; justify-content: center; }
.review-section { margin-top: 40px; text-align: left; }
.review-section h3 { font-size: 17px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.review-item { padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; border-left: 3px solid var(--wrong); }
.review-q { font-weight: 600; margin-bottom: 6px; font-size: 14px; }
.review-exp { font-size: 12px; color: var(--accent); margin-top: 6px; font-style: italic; }
.review-meta { font-size: 12px; color: var(--text-dim); display: flex; gap: 14px; flex-wrap: wrap; }
.review-your { color: var(--wrong); }
.review-correct-label { color: var(--correct); }
@media (max-width: 600px) { .config-row { flex-direction: column; } .stat-grid { grid-template-columns: 1fr; } .question-text { font-size: 17px; } .start-screen h1 { font-size: 22px; } }
</style>
</head>

<div class="app" id="app"></div>
<script>
const ALL_QUESTIONS = [{"id":1,"chapter":"Ch1: Security Principles","question":"A cyberattacker changes the website of a pharmacy so it displays incorrect information about COVID testing. This is an example of what kind of compromise?","options":{"A":"Confidentiality","B":"Integrity","C":"Availability","D":"Nonrepudiation"},"correct":"B","explanation":"Changing data without proper authorization is a compromise of integrity."},{"id":2,"chapter":"Ch1: Security Principles","question":"The function of a computer system that verifies the identity of a user is called _________.","options":{"A":"Authentication","B":"Authorization","C":"Authenticity","D":"Availability"},"correct":"A","explanation":"Authentication is the function of verifying a user\u2019s identity."},{"id":3,"chapter":"Ch1: Security Principles","question":"Jane received an electronic message from Fred that was digitally signed proving it came from him. However, Fred said he never sent it. This is an example of what message integrity characteristic?","options":{"A":"Nonreputation","B":"Nonrefutability","C":"Nonrepudiation","D":"Authenticity"},"correct":"C","explanation":"Nonrepudiation technologies are used to guarantee that a sender of a message cannot later deny that they sent the message."},{"id":4,"chapter":"Ch1: Security Principles","question":"Which of the following elements do not apply to privacy?","options":{"A":"Confidentiality","B":"Integrity","C":"Availability","D":"None of the above"},"correct":"D","explanation":"All of the items listed apply to privacy."},{"id":5,"chapter":"Ch1: Security Principles","question":"Information assurance refers to the ____________ of information security.","options":{"A":"Quality","B":"Confidentiality","C":"Ethics","D":"Measurement"},"correct":"D","explanation":"Information assurance is the measurement of the security controls an organization has put into place."},{"id":6,"chapter":"Ch1: Security Principles","question":"What is the first thing a cyberattacker would want to do to launch an attack against an organization?","options":{"A":"Learn about the organization\u2019s vulnerabilities.","B":"Learn about the organization\u2019s business, including domain names, corporate information, facilities, names of employees, etc.","C":"Deploy malware.","D":"Steal data."},"correct":"B","explanation":"While learning about vulnerabilities might seem like a good answer, the best answer is learning about the organization\u2019s business details because that will provide the basic information the cyberattacker can use to launch the attack."},{"id":7,"chapter":"Ch1: Security Principles","question":"Which of the following statements is most correct?","options":{"A":"Security should be done the same way regardless of the situation.","B":"Security should be tailored based on the situation.","C":"It\u2019s always best to mitigate risks rather than transfer them.","D":"Risk avoidance trumps security controls every time."},"correct":"B","explanation":"Answers A, C, and D all contain absolute statements about applying security. But security is never absolute; it is tailored based on the situation and the organization\u2019s tolerance for risk, so the best answer is B."},{"id":8,"chapter":"Ch1: Security Principles","question":"You are asked to perform a risk assessment of an information system for the purpose of recommending the most appropriate security controls. You have a short amount of time to do this. You have information about how each asset in the system is used and its importance to the business, but you have no financial information about the assets or the information systems. Which is the most appropriate method to use for this assessment?","options":{"A":"Qualitative","B":"Threat modeling","C":"Quantitative","D":"Delphi"},"correct":"A","explanation":"Since you have no financial data, a quantitative assessment is not possible, but since you have information about how each asset in the system is used and its importance to the business, you have what you need to do a qualitative analysis."},{"id":9,"chapter":"Ch1: Security Principles","question":"You are asked to implement a risk treatment in which your IT department is removing a server from the environment that it deems is too risky due to having too many vulnerabilities in it. You have just practiced which type of risk treatment?","options":{"A":"Risk transfer","B":"Risk avoidance","C":"Risk acceptance","D":"Risk mitigation"},"correct":"C","explanation":"Risk avoidance is the best answer because by removing the risky server altogether, you are avoiding the risk. Answer D may have been considered because vulnerability mitigation is a type of risk treatment, but that usually involves addressing specific vulnerabilities, not removing entire systems or services."},{"id":10,"chapter":"Ch1: Security Principles","question":"A security engineer is performing a review of an organization\u2019s datacenter security controls. They document that the datacenter lacks security cameras for monitoring the facilities. What type of control does this represent?","options":{"A":"Administrative","B":"Technical","C":"Physical","D":"Logical"},"correct":"C","explanation":"Security cameras used for monitoring facilities are an example of physical security controls. Administrative controls are managementoriented controls such as documentation, policies, procedures, and training. Technical or logical controls are hardware or software components implemented by computer systems or network devices."},{"id":11,"chapter":"Ch1: Security Principles","question":"The senior security engineer is creating a document that provides stepby-step instructions on how to launch a vulnerability scan utilizing the organization\u2019s vulnerability scanning tool that all security engineers will be required to follow. Which of the following governance elements is this an example of?","options":{"A":"Policy","B":"Procedure","C":"Guideline","D":"Law"},"correct":"B","explanation":"A document containing step-by-step instructions on how to perform a vulnerability scanning is an example of a procedure. Policies are high-level management statements providing directives to the organization but do not prescribe exact steps. Guidelines serve as best practice references but are not required to be followed. While following the procedure may be a requirement of the business, the proc"},{"id":12,"chapter":"Ch1: Security Principles","question":"An information security policy is an example of which of the following types of controls?","options":{"A":"Administrative","B":"Technical","C":"Logical","D":"Physical"},"correct":"A","explanation":"A policy is an example of an administrative control. Administrative controls are management-oriented controls that provide directives and instruction aimed at people within the organization, such as documentation, training, and other personnel management practices. Technical controls, also known as logical controls, are hardware or software components that protect virtual resources. Physical contr"},{"id":13,"chapter":"Ch1: Security Principles","question":"Sarah is a security engineer for a Software as a Service (SaaS) organization. Her friend Kyle is a systems administrator for the organization and helped her get the job by serving as a reference. While reviewing some system logs, Sarah discovered that Kyle is running a crypto-mining program on a company server for his own financial gain. How should Sarah respond to this situation?","options":{"A":"Ask Kyle to stop","B":"Ask Kyle to share the profits with her","C":"Mind her own business","D":"Escalate to senior management"},"correct":"D","explanation":"Sarah should immediately escalate this to senior leadership in accordance with the organization\u2019s policies and procedures. This would be the ethical response to this situation. CHAPTER 2 Access Controls Concepts This chapter discusses the following topics: \u2022 Access control fundamentals \u2022 Logical access controls \u2022 Physical access controls In Chapter 1 we introduced the concept of security controls,"},{"id":14,"chapter":"Ch2: Access Controls Concepts","question":"Jane is a security administrator setting up access for a new employee who works in the manufacturing department. Jane makes sure to enable the employee\u2019s access for the manufacturing area but not for the parts storage area. What best describes the principle Jane is applying?","options":{"A":"Principle of authentication","B":"Two-person rule","C":"Need to know","D":"Least privilege"},"correct":"D","explanation":"Least privilege is the most correct answer. By giving the employee access to the area the employee requires access to but no more, Jane is applying the principle of least privilege."},{"id":15,"chapter":"Ch2: Access Controls Concepts","question":"Which statement best describes the relationship between subjects, objects, and rules?","options":{"A":"A subject grants access to an object based on rules.","B":"An object is granted access to a subject based on rules.","C":"A subject is granted access to an object based on rules.","D":"An object is granted access to a subject based on credentials."},"correct":"C","explanation":"After first requesting access, a subject gets access to an object based on rules."},{"id":16,"chapter":"Ch2: Access Controls Concepts","question":"Joe has to log in to many systems on a daily basis and has too many passwords to remember. What is the best way for Joe to manage his passwords?","options":{"A":"Write the passwords down on a piece of paper.","B":"Store the passwords in a text file and store it in a safe place.","C":"Use the same password for every system so he only has to remember one password.","D":"Use a password manager or password vault software."},"correct":"D","explanation":"The best answer is to use a password manager or password vault software to manage passwords. These products require credentials to log in and protect the passwords with encryption and good access control. None of the other answers provide a secure solution."},{"id":17,"chapter":"Ch2: Access Controls Concepts","question":"Debby has been an employee of Acme Corp. for over 20 years. During that time, she has been able to access more and more systems. Now she has access to systems she doesn\u2019t even need access to in order to do her job. This is an example of what type of situation?","options":{"A":"Privilege modification","B":"Access management","C":"Privileged access management","D":"Privilege creep"},"correct":"D","explanation":"The situation described is an example of privilege creep, where over time a person\u2019s access increases beyond that which they require to do their job."},{"id":18,"chapter":"Ch2: Access Controls Concepts","question":"The identity and access management lifecycle consists of which steps?","options":{"A":"Provisioning, review, revocation","B":"Setup, review, auditing","C":"Creation, monitoring, termination","D":"Identification, authentication, authorization"},"correct":"A","explanation":"The identity and access management lifecycle consists of provisioning, review, and revocation steps."},{"id":19,"chapter":"Ch2: Access Controls Concepts","question":"Which of the following access control models leverages roles to provision access, where users with similar access needs are assigned to the same role?","options":{"A":"DAC","B":"MAC","C":"RBAC","D":"None of the above"},"correct":"C","explanation":"Role-based access control (RBAC) enforces access based on roles that define permissions and the level of access provided to any user assigned to that role. Roles are typically developed for similar users with the same access needs (e.g., HR, Sales, IT, Security)."},{"id":20,"chapter":"Ch2: Access Controls Concepts","question":"An organization is concerned about the risk of a car driving from the parking lot through the entrance of the building. Which of the following security measures would best help address this concern?","options":{"A":"Biometrics","B":"RBAC","C":"Badge system","D":"Bollards"},"correct":"D","explanation":"Bollards are pillars or spheres made out of hard material used to prevent vehicles from driving through entrances. Biometrics and badge systems are measures to implement physical access control but would not prevent a car from driving through the entrance. RBAC is an access control model."},{"id":21,"chapter":"Ch2: Access Controls Concepts","question":"The security team is reviewing the configuration of the door that serves as the only entrance or exit to the datacenter. Organization personnel commonly access the datacenter to perform their work. In the event of a fire that impacts power to the door-locking mechanism, which of the following configurations is best?","options":{"A":"The door should always remain locked.","B":"The door should fail-secure.","C":"The door should fail-open.","D":"The door should automatically lock when there is no power."},"correct":"C","explanation":"The door should fail-open (also known as fail-safe). While this is a less secure option, it ensures the preservation of human life, which is the number-one priority."},{"id":22,"chapter":"Ch2: Access Controls Concepts","question":"The security team of an organization is concerned about the physical security of datacenter access. They want the datacenter entrance built in such a way that there are two doors with locks and the first door must close before the next door can be unlocked. Which of the following is this an example of?","options":{"A":"Bollard","B":"Mantrap","C":"Fence","D":"Biometric lock"},"correct":"B","explanation":"A mantrap is an area that has two doors built in such a way that the first door must be closed before the second door can be opened."},{"id":23,"chapter":"Ch2: Access Controls Concepts","question":"Which of the following access control models allows the creator of a resource the ability to assign permissions to other users?","options":{"A":"DAC","B":"MAC","C":"RBAC","D":"None of the above"},"correct":"A","explanation":"Discretionary access control (DAC) provides the owner of the resource, typically the creator, full control to configure which users can access the resource. CHAPTER 3 Network Security This chapter discusses the following topics: \u2022 Network fundamentals \u2022 Network threats and attacks \u2022 Network defenses \u2022 Network infrastructure This chapter covers the Certified in Cybersecurity Domain 4. It starts wit"},{"id":24,"chapter":"Ch2: Access Controls Concepts","question":"__________________ is a method of attack where a hacker enters SQL commands into fields on a vulnerable web page. The commands are executed without proper authorization.","options":{"A":"Buffer overflow","B":"SQL injection","C":"HTTP response splitting","D":"Backdoor 12. Most cyber criminals would agree that _________________ are the weakest link in cybersecurity."},"correct":"A","explanation":"Passwords B. Backdoors C. Laws D. People"},{"id":25,"chapter":"Ch2: Access Controls Concepts","question":"Mary is a network engineer who wants to install a firewall in front of a database server to hide its IP address. What type of firewall should Mary choose?","options":{"A":"Proxy","B":"Packet filter","C":"Stateful/dynamic packet filter","D":"Database filter 16. Antivirus software vendors use ______________ to keep up with the latest information about viruses and threats."},"correct":"A","explanation":"Google B. National Vulnerability Database C. Threat intelligence D. National Security Agency"},{"id":26,"chapter":"Ch2: Access Controls Concepts","question":"An organization is using a cloud service provider to host their infrastructure. The cloud service provider manages the underlying infrastructure, and the organization manages the platforms and software (such as the OS, development tools, and applications). Which of the following cloud service models is being utilized?","options":{"A":"IaaS","B":"PaaS","C":"SaaS","D":"On-premises 20. An organization has built out a cloud environment in their own datacenter for exclusive use by their employees to allow other teams to provision and manage virtual resources. Which of the following cloud deployment models is this an example of?"},"correct":"A","explanation":"Public B. Private C. Community D. Hybrid"},{"id":27,"chapter":"Ch3: Network Security","question":"Which of the following is referred to as a physical address in computer networking?","options":{"A":"IPv4 address","B":"IPv6 address","C":"MAC address","D":"Loopback address"},"correct":"C","explanation":"Media access control (MAC) addresses are often referred to as a physical address or hardware address since they are assigned to the device\u2019s physical hardware. Internet Protocol (IP) addresses are known as logical addresses. A loopback address is a special type of IP address."},{"id":28,"chapter":"Ch3: Network Security","question":"How many layers are there in the OSI model?","options":{"A":"8","B":"7","C":"6","D":"5"},"correct":"B","explanation":"There are seven layers in the OSI model. These Include Application, Presentation, Session, Transport, Network, Data, and Physical."},{"id":29,"chapter":"Ch3: Network Security","question":"Which of the following terms best describes a computer that provides content to other computers such as a website or an application?","options":{"A":"Client","B":"Server","C":"Endpoint","D":"Router"},"correct":"B","explanation":"Server is a term that describes a computer that serves content or provides a service to another computer on a network. A client is a computer that accesses or uses the content or service provided by the server. An endpoint is a computing device on a network, which could include a server but is not the best answer. A router is a network device that routes traffic on a network."},{"id":30,"chapter":"Ch3: Network Security","question":"What is the name of the seventh layer of the OSI model?","options":{"A":"Application","B":"Session","C":"Presentation","D":"Network"},"correct":"A","explanation":"The Application Layer is Layer 7 (the uppermost layer) of the OSI model. The order of the layers from top (Layer 7) to bottom (Layer 1) are Application, Presentation, Session, Transport, Network, Data Link, and Physical."},{"id":31,"chapter":"Ch3: Network Security","question":"Which of the following attacks are most likely to be carried out by a botnet?","options":{"A":"Advanced persistent threat attack","B":"DDoS attack","C":"Trojan horse attack","D":"Backdoor attack"},"correct":"B","explanation":"A botnet is a group of computers under the control of an attacker, most often for a coordinated attacker such as a DDoS attack. Advanced persistent threat and backdoors are not specific types of attacks, but rather features of attacks. A trojan horse is a type of attack but unlikely to be carried out by a botnet."},{"id":32,"chapter":"Ch3: Network Security","question":"What is the best description of the difference between a phishing email and a spear phishing e-mail?","options":{"A":"A phishing e-mail is sent to a specific person; a spear phishing email is sent to an entire company.","B":"A phishing e-mail is sent to random recipients; a spear phishing email is sent to specific recipients.","C":"A phishing e-mail is sent to an entire company; a spear phishing email is sent to a specific person.","D":"A spear phishing e-mail is sent to random recipients; a phishing email is sent to specific recipients."},"correct":"B","explanation":"A phishing e-mail is sent to random recipients; a spear phishing email is sent to specific recipients. A phishing e-mail is literally like going fishing\u2014you cast a wide net randomly and you see what you get. Conversely spear phishing is literally like spearfishing\u2014you have a specific target in mind, and you shoot the spear directly at it. A spear phishing e-mail is sent to a specific person or spe"},{"id":33,"chapter":"Ch3: Network Security","question":"Which of the following is not a true statement about a worm?","options":{"A":"It can replicate itself.","B":"It is a type of malware.","C":"It is a type of botnet.","D":"It does not require a host program to infect and deliver it to the victim system."},"correct":"C","explanation":"A worm is not a type of botnet. A worm can replicate itself and is a type of malware, but since it isn\u2019t a virus, it does not require a host program to infect and serve as the delivery mechanism."},{"id":34,"chapter":"Ch3: Network Security","question":"What is the primary difference between an IDS and an IPS?","options":{"A":"They both do the same thing.","B":"An IDS detects malicious activity, whereas an IPS prevents the activity from happening in the first place.","C":"An IDS detects malicious activity, whereas an IPS monitors system performance.","D":"An IDS detects malicious activity, whereas an IPS detects malicious activity and takes action on it."},"correct":"D","explanation":"An IDS, which stands for intrusion detection system, detects malicious activity, whereas an IPS, which stands for intrusion prevention system, detects malicious activity and takes action on it."},{"id":35,"chapter":"Ch3: Network Security","question":"Joe is a cyber criminal who has targeted a web server for a potential cyberattack. Joe wants to know if the server has any unpatched vulnerabilities he might be able to exploit. Which of the following actions is Joe most likely to take?","options":{"A":"Launch a smurf attack against the target server.","B":"Run a vulnerability scan against the target server.","C":"Send a phishing e-mail to the target server.","D":"Send a spear phishing e-mail to the target server."},"correct":"B","explanation":"The answer is to run a vulnerability scan, as that is the only one of the choices that will reveal vulnerabilities on the server."},{"id":36,"chapter":"Ch3: Network Security","question":"__________________ is a method of attack where a hacker enters SQL commands into fields on a vulnerable web page. The commands are executed without proper authorization.","options":{"A":"Buffer overflow","B":"SQL injection","C":"HTTP response splitting","D":"Backdoor"},"correct":"B","explanation":"If a web server software does not properly check the data input by the user, it could allow an attacker to put SQL commands in the field, which are then executed by the SQL database without proper authorization. This is called a SQL injection attack."},{"id":37,"chapter":"Ch3: Network Security","question":"Most cyber criminals would agree that _________________ are the weakest link in cybersecurity.","options":{"A":"Passwords","B":"Backdoors","C":"Laws","D":"People"},"correct":"D","explanation":"It is widely acknowledged that people are the weakest link in cybersecurity. Despite extensive progress in technical tools and controls, deliberate or accidental acts by people lead to the largest number of and most damaging security breaches."},{"id":38,"chapter":"Ch3: Network Security","question":"A hacker uses a phishing attack to obtain a user\u2019s credentials, access their company\u2019s database, and steal proprietary information. This is an example of _______________.","options":{"A":"Denial of service","B":"Advanced persistent threat","C":"Extortion","D":"Data exfiltration"},"correct":"D","explanation":"The correct answer is data exfiltration, which is the unauthorized transfer of data from a computer or network."},{"id":39,"chapter":"Ch3: Network Security","question":"A sophisticated cyber criminal gains access to a financial institution\u2019s e-mail server, installs malware, and then over a period of weeks, moves to other servers and systems on the company\u2019s network, installing other malware and tools, finding other credentials, stealing data, and scrubbing logs to cover her tracks. Which term best describes this type of activity?","options":{"A":"Denial of service attack","B":"Advanced persistent threat attack","C":"Extortion attack","D":"Website defacement attack"},"correct":"B","explanation":"During an advanced persistent threat attack, there is a sophisticated cyber criminal seeking to expand the attack over time, probing the network, finding more systems with vulnerabilities, exploiting them, and gaining unauthorized access to more and more systems and data, all the while doing things to cover their tracks."},{"id":40,"chapter":"Ch3: Network Security","question":"Antivirus software vendors use ______________ to keep up with the latest information about viruses and threats.","options":{"A":"Google","B":"National Vulnerability Database","C":"Threat intelligence","D":"National Security Agency"},"correct":"C","explanation":"Organizations and product vendors use threat intelligence from a variety of sources. By collecting and studying data about threats, vendors can prepare for and defend against them."},{"id":41,"chapter":"Ch3: Network Security","question":"When leveraging a third-party cloud service provider, which of the following is always the responsibility of the provider?","options":{"A":"Data security","B":"Physical security of the datacenter","C":"Identity and access management controls","D":"Endpoint protection"},"correct":"B","explanation":"Physical security of the datacenter is always the responsibility of the cloud service provider."},{"id":42,"chapter":"Ch3: Network Security","question":"An organization is using a cloud service provider to host their infrastructure. The cloud service provider manages the underlying infrastructure, and the organization manages the platforms and software (such as the OS, development tools, and applications). Which of the following cloud service models is being utilized?","options":{"A":"IaaS","B":"PaaS","C":"SaaS","D":"On-premises"},"correct":"A","explanation":"Infrastructure as a service (IaaS) provides customers with access to a pool of infrastructure resources such as network, server, and storage resources that can be virtually provisioned. The cloud service provider manages the underlying physical infrastructure, and the cloud service customer manages the platforms and software (such as OS, development tools, and applications) that run on the infrast"},{"id":43,"chapter":"Ch3: Network Security","question":"An organization has built out a cloud environment in their own datacenter for exclusive use by their employees to allow other teams to provision and manage virtual resources. Which of the following cloud deployment models is this an example of?","options":{"A":"Public","B":"Private","C":"Community","D":"Hybrid"},"correct":"B","explanation":"A private cloud deployment model consists of computing infrastructure and resources that are dedicated for use by a single organization."},{"id":44,"chapter":"Ch3: Network Security","question":"An organization is hosting applications in a private cloud environment and also making use of Amazon Web Services (AWS) to load-balance the traffic for applications if there is a spike in demand. Which of the following cloud deployment models is this an example of?","options":{"A":"Public","B":"Private","C":"Community","D":"Hybrid"},"correct":"D","explanation":"A hybrid cloud deployment model is a mix of the other models (such as a public and private model)."},{"id":45,"chapter":"Ch3: Network Security","question":"An organization is utilizing Google Mail (Gmail) as their e-mail service provider. Which of the following types of cloud service models is being utilized?","options":{"A":"SaaS","B":"PaaS","C":"IaaS","D":"On-premises"},"correct":"A","explanation":"Software as a service (SaaS) provides customers with access to an application hosted by the cloud service provider (such as an e-mail service). CHAPTER 4 Security Operations This chapter discusses the following topics: \u2022 Data security \u2022 System hardening \u2022 Best practice security policies \u2022 Security awareness training This chapter covers the Certified in Cybersecurity Domain 5. Like Chapter 3, this "},{"id":46,"chapter":"Ch4: Security Operations","question":"Alice sends Bob a message encrypted with a private key. Bob decrypts the message with the same private key. Which of the following types of encryption is this an example of?","options":{"A":"Asymmetric","B":"Symmetric","C":"Hashing","D":"None of the above"},"correct":"B","explanation":"Symmetric encryption uses the same key for encryption and decryption. This means that the sender and receiver of a message need to have a copy of the same key in order to encrypt/decrypt the message."},{"id":47,"chapter":"Ch4: Security Operations","question":"Which of the following is not a secure method of data deletion?","options":{"A":"Emptying the recycle bin on your computer desktop","B":"Physical destruction of a hard drive","C":"Zeroization","D":"Overwriting"},"correct":"A","explanation":"Pressing the delete key on a computer and emptying the recycle bin on your desktop are not secure methods of data destruction, as the data is not actually securely deleted from the hard drive. These actions simply tell the operating system that the location on the hard drive is free for use."},{"id":48,"chapter":"Ch4: Security Operations","question":"Which of the following can be used to create message digests?","options":{"A":"Symmetric encryption algorithms","B":"Asymmetric encryption algorithms","C":"Hash functions","D":"All of the above"},"correct":"C","explanation":"Hash functions transform information into fixed-length output known as a hash value, message digest, or fingerprint."},{"id":49,"chapter":"Ch4: Security Operations","question":"A security administrator is looking for ways to automate the monitoring of logs throughout the environment. Which of the following solutions would help provide automated monitoring capability?","options":{"A":"Regularly review the logs","B":"Store the logs on a centralized log server","C":"Implement a SIEM","D":"Implement a firewall"},"correct":"C","explanation":"Implementing a security information and event management (SIEM) system is one example of how an organization can implement automated monitoring. A SIEM system is a tool that ingests logs from various sources, serves as a central secure log repository, and contains rules that alert on suspicious events identified in logs."},{"id":50,"chapter":"Ch4: Security Operations","question":"Which of the following types of encryption uses two keys: one for encryption and a separate key for decryption?","options":{"A":"Asymmetric","B":"Symmetric","C":"Hashing","D":"None of the above"},"correct":"A","explanation":"Asymmetric encryption uses two keys: a public key (for encryption) and a private key (for decryption)."},{"id":51,"chapter":"Ch4: Security Operations","question":"As the new CISO of his organization, Joe decided to initiate a comprehensive set of scans. The scans reported that nearly all of his endpoints have known operating system vulnerabilities. What is the most likely root cause of this situation?","options":{"A":"The organization is the victim of an advanced persistent threat.","B":"The endpoints do not have up-to-date antimalware software installed.","C":"The endpoints have not been kept up-to-date with the latest security patches.","D":"Brute force attack."},"correct":"C","explanation":"The most likely reason endpoints have known operating system vulnerabilities is they do not have the latest patches installed from the vendors. Poorly configured antimalware software or a brute force attack would not cause this, and an APT might be the result of this situation but not the cause of it."},{"id":52,"chapter":"Ch4: Security Operations","question":"A network administrator found that one of the firewalls was no longer configured in accordance with recommended settings from DISA as it once was. What is the most likely reason for this?","options":{"A":"The settings from DISA were incorrect.","B":"Configuration management procedures for the device were not followed.","C":"Privilege creep.","D":"Data integrity."},"correct":"B","explanation":"The best answer is that it is most likely that someone changed a setting without the proper approval and documentation; therefore, CM procedures were not followed."},{"id":53,"chapter":"Ch4: Security Operations","question":"Mary isn\u2019t sure if she is allowed to use her company-owned laptop to send messages to her friend on Facebook. To find out if she can, which policy should she refer to?","options":{"A":"AUP","B":"BYOD policy","C":"Data handling policy","D":"None of the above"},"correct":"A","explanation":"Of the choices provided, the AUP is the one most likely to provide guidance concerning whether or not Mary can use the company-owned laptop for nonbusiness use."},{"id":54,"chapter":"Ch4: Security Operations","question":"Of the policies listed, which one is most likely to provide guidance on connecting a home computer to the work network via VPN?","options":{"A":"AUP","B":"BYOD","C":"Data handling policy","D":"None of the above"},"correct":"B","explanation":"Of the choices provided, the BYOD policy is the best choice. The BYOD policy is used by organizations that want to allow their employees to use their personally owned devices to connect to the corporate network."},{"id":55,"chapter":"Ch4: Security Operations","question":"What is the best reason to provide social engineering training to employees?","options":{"A":"To show people how to perform a social engineering attack","B":"So employees can report security violations to management","C":"To teach people what to look out for","D":"None of the above"},"correct":"C","explanation":"The correct answer is to show people what kinds of things they should look out for as a way to defend against social engineering attacks. 5 Business Continuity (BC), Disaster Recovery (DR) & Incident Response Concepts CHAPTER This chapter discusses the following topics: \u2022 Incident response \u2022 Business continuity \u2022 Disaster recovery This chapter explores how organizations respond to and recover from"},{"id":56,"chapter":"Ch4: Security Operations","question":"Of the following which is the most likely reason(s) a business continuity program might fail?","options":{"A":"Failure to test the plan and procedures","B":"Failure to document activation procedures","C":"Failure to address the threats the organization is most likely to face","D":"All of the above 8. Alice is responsible for designing her organization\u2019s datacenter to provide resiliency in the event of a disaster. If a disaster occurs, she wants to have the new datacenter up and running within a few days, but she does not want to incur the cost of building a full datacenter with all equipment fully installed and configured. Which of the following options is the best choice for her situation?"},"correct":"A","explanation":"Hot site B. Warm site C. Cold site D. Tertiary site"},{"id":57,"chapter":"Ch5: Business Continuity & DR","question":"During which phase of the incident response process is the incident response plan developed and documented?","options":{"A":"Preparation","B":"Containment, eradication, and recovery","C":"Detection and analysis","D":"Post-incident activity"},"correct":"A","explanation":"The incident response plan is developed and documented during the preparation phase of the incident response process."},{"id":58,"chapter":"Ch5: Business Continuity & DR","question":"During which phase of the incident response process does the lessonslearned assessment take place?","options":{"A":"Detection and analysis","B":"Containment, eradication, and recovery","C":"Preparation","D":"Post-incident activity"},"correct":"D","explanation":"The lessons-learned assessment occurs during the post-incident activity phase of the incident response process."},{"id":59,"chapter":"Ch5: Business Continuity & DR","question":"In which phase of the incident response process would a security analyst recover a system from a backup?","options":{"A":"Preparation","B":"Detection and analysis","C":"Post-incident activity","D":"Containment, eradication, and recovery"},"correct":"D","explanation":"Recovering a system from backup would take place during the containment, eradication, and recovery phase of the incident response process."},{"id":60,"chapter":"Ch5: Business Continuity & DR","question":"What phase comes after the detection and analysis phase in the incident response process?","options":{"A":"Containment, eradication, and recovery.","B":"Preparation.","C":"Post-incident activity.","D":"Detection and analysis is the last phase of the process."},"correct":"A","explanation":"The containment, eradication, and recovery phase comes after the detection and analysis phase of the incident response process. The process steps are Preparation -> Detection and Analysis -> Containment, Eradication, and Recovery -> Post-Incident Activity."},{"id":61,"chapter":"Ch5: Business Continuity & DR","question":"Carol is tasked with creating a business continuity plan for her organization. What should she do to determine which of her organization\u2019s business functions should be restored in the event of an incident?","options":{"A":"Conduct a risk assessment.","B":"Interview key stakeholders throughout the organization.","C":"Calculate the MTD for each business function.","D":"Conduct a business impact analysis."},"correct":"D","explanation":"The purpose of a business impact analysis is to determine which business functions should be restored after an incident."},{"id":62,"chapter":"Ch5: Business Continuity & DR","question":"Of the following which is the most likely reason(s) a business continuity program might fail?","options":{"A":"Failure to test the plan and procedures","B":"Failure to document activation procedures","C":"Failure to address the threats the organization is most likely to face","D":"All of the above"},"correct":"D","explanation":"Failure to test the plan and procedures, document activation procedures, and address likely threats are all reasons the business continuity program may fail."},{"id":63,"chapter":"Ch5: Business Continuity & DR","question":"Alice is responsible for designing her organization\u2019s datacenter to provide resiliency in the event of a disaster. If a disaster occurs, she wants to have the new datacenter up and running within a few days, but she does not want to incur the cost of building a full datacenter with all equipment fully installed and configured. Which of the following options is the best choice for her situation?","options":{"A":"Hot site","B":"Warm site","C":"Cold site","D":"Tertiary site"},"correct":"B","explanation":"A warm site is a facility that is configured with equipment suitable for supporting IT operations but without the computing equipment itself. The warm site has power, HVAC, physical infrastructure, and possibly telecommunications and peripheral equipment. APPENDIX About the Online Content This book comes complete with TotalTester Online customizable practice exam software with 200 practice exam qu"}];
const CHAPTERS = [...new Set(ALL_QUESTIONS.map(q=>q.chapter))];
let state={screen:'start',mode:'all',chapter:'all',count:20,questions:[],current:0,answered:null,score:0,wrong:0,answers:[]};

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function startQuiz(){
  let pool=state.chapter==='all'?[...ALL_QUESTIONS]:ALL_QUESTIONS.filter(q=>q.chapter===state.chapter);
  if(state.mode==='random')pool=shuffle(pool);
  const n=Math.min(Math.max(1,state.count),pool.length);
  state.questions=pool.slice(0,n);state.current=0;state.answered=null;state.score=0;state.wrong=0;state.answers=[];state.screen='quiz';render();
}
function selectAnswer(l){if(state.answered)return;const q=state.questions[state.current];const ok=l===q.correct;state.answered=l;if(ok)state.score++;else state.wrong++;state.answers.push({qIndex:state.current,selected:l,correct:q.correct,isCorrect:ok});render();}
function nextQuestion(){state.current++;state.answered=null;if(state.current>=state.questions.length)state.screen='results';render();window.scrollTo({top:0,behavior:'smooth'});}
function render(){const app=document.getElementById('app');if(state.screen==='start')renderStart(app);else if(state.screen==='quiz')renderQuiz(app);else renderResults(app);}

function renderStart(app){
  const chOpts=CHAPTERS.map(c=>`<option value="${c}" ${state.chapter===c?'selected':''}>${c}</option>`).join('');
  const poolSize=state.chapter==='all'?ALL_QUESTIONS.length:ALL_QUESTIONS.filter(q=>q.chapter===state.chapter).length;
  app.innerHTML=`<div class="start-screen">
    <div class="badge">McGraw-Hill All-in-One</div>
    <h1>CC Certified in<br>Cybersecurity</h1>
    <p class="sub">${ALL_QUESTIONS.length} exam guide questions across ${CHAPTERS.length} chapters</p>
    <div class="config-section">
      <label>Study mode</label>
      <div class="config-row">
        <div class="mode-card ${state.mode==='all'?'selected':''}" onclick="state.mode='all';render()"><h3>Sequential</h3><span>In order</span></div>
        <div class="mode-card ${state.mode==='random'?'selected':''}" onclick="state.mode='random';render()"><h3>Random</h3><span>Shuffled</span></div>
      </div>
      <label>Chapter</label>
      <select onchange="state.chapter=this.value;render()" style="margin-bottom:16px">
        <option value="all" ${state.chapter==='all'?'selected':''}>All Chapters (${ALL_QUESTIONS.length})</option>${chOpts}
      </select>
      <label>Questions (${poolSize} available)</label>
      <input type="number" class="num-input" min="1" max="${poolSize}" value="${Math.min(state.count,poolSize)}" onchange="state.count=parseInt(this.value)||20">
    </div>
    <div class="start-btn-row"><button class="btn btn-primary" onclick="startQuiz()">Start Quiz</button></div>
  </div>`;
}

function renderQuiz(app){
  const q=state.questions[state.current],total=state.questions.length;
  const pct=((state.current+(state.answered?1:0))/total*100).toFixed(0);
  const letters=Object.keys(q.options).sort();
  let opts='';
  letters.forEach(l=>{let c='option-btn';if(state.answered){c+=' disabled';if(l===state.answered&&l===q.correct)c+=' correct-sel';else if(l===state.answered&&l!==q.correct)c+=' wrong-sel';else if(l===q.correct)c+=' correct-rev';}opts+=`<button class="${c}" onclick="selectAnswer('${l}')"><span class="option-letter">${l}</span><span>${q.options[l]}</span></button>`;});
  let exp='';if(state.answered&&q.explanation)exp=`<div class="explanation-box"><strong>Explanation</strong>${q.explanation}</div>`;
  let nav='';if(state.answered){const last=state.current>=total-1;nav=`<div class="nav-row"><button class="btn btn-primary" onclick="nextQuestion()">${last?'View Results':'Next →'}</button></div>`;}
  app.innerHTML=`<div class="quiz-header"><span class="progress-info">${state.current+1} / ${total}</span><div class="score-live"><span class="score-correct">✓${state.score}</span><span class="score-wrong">✗${state.wrong}</span></div></div>
    <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="ch-tag">${q.chapter}</div>
    <div class="question-text">${q.question}</div>
    <div class="options">${opts}</div>${exp}${nav}`;
}

function renderResults(app){
  const total=state.questions.length,pct=Math.round(state.score/total*100);
  const passed=pct>=70,circ=2*Math.PI*75,off=circ-(pct/100)*circ;
  const col=passed?'var(--correct)':'var(--wrong)';
  let grade='';if(pct>=90)grade='Outstanding!';else if(pct>=80)grade='Great job!';else if(pct>=70)grade='You passed!';else if(pct>=60)grade='Almost there';else grade='Keep studying';
  const wrongs=state.answers.filter(a=>!a.isCorrect);
  let rev='';
  if(wrongs.length>0){rev=`<div class="review-section"><h3>Review Incorrect (${wrongs.length})</h3>`;wrongs.forEach(a=>{const q=state.questions[a.qIndex];rev+=`<div class="review-item"><div class="review-q">${q.question}</div><div class="review-meta"><span class="review-your">Yours: ${a.selected}. ${q.options[a.selected]}</span><span class="review-correct-label">Correct: ${a.correct}. ${q.options[a.correct]}</span></div><div class="review-exp">${q.explanation}</div></div>`;});rev+='</div>';}
  app.innerHTML=`<div class="results">
    <div class="results-circle"><svg width="170" height="170" viewBox="0 0 170 170"><circle cx="85" cy="85" r="75" stroke="var(--border)" stroke-width="7" fill="none"/><circle cx="85" cy="85" r="75" stroke="${col}" stroke-width="7" fill="none" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" style="transition:stroke-dashoffset 1s ease"/></svg><div class="pct-text"><span class="pct-number" style="color:${col}">${pct}%</span><span class="pct-label">${passed?'PASS':'FAIL'}</span></div></div>
    <h2>${grade}</h2><p class="subtitle">${state.score} of ${total} correct</p>
    <div class="stat-grid"><div class="stat-card green"><div class="val">${state.score}</div><div class="lbl">Correct</div></div><div class="stat-card red"><div class="val">${state.wrong}</div><div class="lbl">Incorrect</div></div><div class="stat-card gold"><div class="val">${pct}%</div><div class="lbl">Score</div></div></div>
    <div class="results-actions"><button class="btn btn-secondary" onclick="state.screen='start';render()">New Quiz</button><button class="btn btn-primary" onclick="startQuiz()">Retry</button></div>${rev}
  </div>`;
}
render();
</script>
</body>
