M is identity and access management, FDE is full-disk encryption, and ESC is not a commonly used security acronym."},{"chapter":"ch11","chapter_name":"Chapter 11: Endpoint Security","num":8,"question":"Fred has recently purchased a network router and is preparing to deploy it. Which of the following is a common step in deploying new routers?","options":{"A":"Disabling unwanted services","B":"Removing unnecessary software","C":"Installing antivirus","D":"Changing default passwords"},"correct":["D"],"explanation":"Network devices as well as many other devices like printers come with default passwords set. Fred should change the default password as part of the process of setting up his new router."},{"chapter":"ch11","chapter_name":"Chapter 11: Endpoint Security","num":9,"question":"Charlene wants to prevent attacks against her system that leverage flaws in the services that it provides while still keeping the services accessible. What hardening technique should she use?","options":{"A":"A host-based firewall","B":"A host-based IPS","C":"Encryption","D":"An EDR"},"correct":["B"],"explanation":"A host-based intrusion prevention system (HIPS) can detect and prevent attacks against services while allowing the service to be accessible. A firewall can only block based on port, protocol, and IP; encryption won't prevent this; and an EDR is primarily targeted at malicious software and activity, not at network-based attacks on services."},{"chapter":"ch11","chapter_name":"Chapter 11: Endpoint Security","num":10,"question":"Allan is preparing to harden his organization's network switches. Which of the following is not a common hardening technique for network devices?","options":{"A":"Removing unnecessary software","B":"Installing patches","C":"Administrative VLANs","D":"Changing default passwords"},"correct":["A"],"explanation":"Unlike computers and mobile devices, switches and other network devices typically do not have additional software that can be removed. Installing patches, placing administrative interfaces on protected VLANs, and changing default passwords are all common hardening techniques for network devices like switches."},{"chapter":"ch11","chapter_name":"Chapter 11: Endpoint Security","num":11,"question":"Helen's organization is planning to deploy IoT devices across their buildings as part of a HVAC system. Helen knows that the vendor for the IoT devices does not provide regular security updates to the device's web interfaces that are used to manage the devices. What security control should she recommend to help protect the devices on the network?","options":{"A":"Install host-based firewalls.","B":"Deploy the IoT devices to a protected VLAN.","C":"Install host-based IPS.","D":"Disable the web interfaces for the IoT devices."},"correct":["B"],"explanation":"Since the web interfaces are needed to manage the devices, Helen's best option is to place the IoT devices in a protected VLAN. IoT devices will not typically allow additional software to be installed, meaning that adding firewalls or a HIPS won't work."},{"chapter":"ch11","chapter_name":"Chapter 11: Endpoint Security","num":12,"question":"What is the primary reason to remove unnecessary software during hardening efforts?","options":{"A":"To reduce the attack footprint of the device","B":"To reduce the number of patches that are installed","C":"To reduce the number of firewall rules required for the device","D":"To support incident response (IR) activities"},"correct":["A"],"explanation":"Removing unnecessary software helps to reduce the attack surface of the devices. Not all software runs a service or opens a network port, but installed software provides additional opportunities for attackers to find vulnerabilities. That means that reducing firewall rules is not a primary purpose. While removing it may reduce the number of patches required by a device, that is not the primary driver. Finally, while incident response efforts may point to a need for further hardening to prevent future incidents, removing unnecessary software is not a typical step in support of IR activities."},{"chapter":"ch11","chapter_name":"Chapter 11: Endpoint Security","num":13,"question":"Brian has deployed a system that monitors sensors and uses that data to manage the power distribution for the power company that he works for. Which of the following terms is commonly used to describe this type of control and monitoring solution?","options":{"A":"SCADA","B":"SIM","C":"HVAC","D":"AVAD"},"correct":["A"],"explanation":"SCADA (supervisory control and data acquisition) is a system architecture that combines data acquisition and control devices with communications methods and interfaces to oversee complex industrial and manufacturing processes, just like those used in utilities. A SIM (subscriber identity module) is the small card used to identify cell phones; HVAC stands for heating, ventilation, and air-conditioning; and AVAD was made up for this question."},{"chapter":"ch11","chapter_name":"Chapter 11: Endpoint Security","num":14,"question":"The organization that Lynn works for wants to deploy an embedded system that needs to process data as it comes in to the device without processing delays or other interruptions. What type of solution does Lynn's company need to deploy?","options":{"A":"An MFP","B":"A HIPS","C":"An SoC","D":"An RTOS"},"correct":["D"],"explanation":"A real-time operating system (RTOS) is an OS that is designed to handle data as it is fed to the operating system, rather than delaying handling it as other processes and programs are run. Real-time operating systems are used when processes or procedures are sensitive to delays that might occur if responses do not happen immediately. An MFP is a multifunction printer, a HIPS is a host intrusion prevention system, and an SoC is a system on a chip—which is hardware, which might run an RTOS, but the option does not mention what type of OS the SoC is running."},{"chapter":"ch11","chapter_name":"Chapter 11: Endpoint Security","num":15,"question":"Which of the following is not a common constraint of an embedded system?","options":{"A":"Compute","B":"Cost","C":"Network","D":"Authentication"},"correct":["B"],"explanation":"Embedded systems are available at many price points. Understanding constraints that limited resources create for embedded systems helps security professionals identify appropriate security controls and options."},{"chapter":"ch11","chapter_name":"Chapter 11: Endpoint Security","num":16,"question":"Jim configures a Windows machine with the built-in BitLocker full- disk encryption tool that uses a TPM chip. When is the machine least vulnerable to having data stolen from it?","options":{"A":"When the machine is off","B":"When the machine is booted and logged in but is locked","C":"When the machine is booted and logged in but is unlocked","D":"When the machine is booted and logged in but is asleep"},"correct":["A"],"explanation":"Jim knows that once a BitLocker-enabled machine is booted, the drive is unlocked and could be accessed. He would be least worried if the machine were off and was stolen, or if the drive itself were stolen from the machine, since the data would not be accessible in either of those cases."},{"chapter":"ch11","chapter_name":"Chapter 11: Endpoint Security","num":17,"question":"Olivia wants to install a host-based security package that can detect attacks against the system coming from the network, but she does not want to take the risk of blocking the attacks since she fears that she might inadvertently block legitimate traffic. What type of tool could she install that will meet this requirement?","options":{"A":"A host firewall","B":"A host-based intrusion detection system","C":"A host-based intrusion prevention system","D":"A data loss prevention tool"},"correct":["B"],"explanation":"Olivia should install a host-based intrusion detection system (HIDS). An HIDS can detect and report on potential attacks but does not have the ability to stop them. A host-based intrusion prevention system (HIPS) can be configured to report only on attacks, but it does have the built-in ability to be set up to block them. Firewalls can block known ports, protocols, or applications, but they do not detect attacks —although advanced modern firewalls blur the line between firewalls and other defensive tools. Finally, a data loss prevention (DLP) tool focuses on preventing data exposures, not on stopping network attacks."},{"chapter":"ch11","chapter_name":"Chapter 11: Endpoint Security","num":18,"question":"Anita wants to enforce security settings across her organization's Windows Active Directory domain. What tool can she use to do this?","options":{"A":"EDR","B":"Group Policy","C":"XDR","D":"SELinux"},"correct":["B"],"explanation":"Group Policy deployed via Active Directory will allow Anita to set security settings across her domain managed systems. EDR and XDR are useful for detecting and responding to malware and malicious actors but not for deploying security configurations. SELinux is a Linux kernel-based security module that provides additional security capabilities and options on top of existing Linux distributions."},{"chapter":"ch11","chapter_name":"Chapter 11: Endpoint Security","num":19,"question":"Chris wants systems that connect to his network to report their boot processes to a server where they can be validated before being permitted to join the network. What technology should he use to do this on the workstations?","options":{"A":"UEFI/Trusted boot","B":"BIOS/Trusted boot","C":"UEFI/Measured boot","D":"BIOS/Measured boot"},"correct":["C"],"explanation":"Chris knows that BIOS-based systems do not support either of these modes, and that trusted boot validates every component before loading it, whereas measured boot logs the boot process and sends it to a server that can validate it before permitting the system to connect to the network or perform other actions."},{"chapter":"ch11","chapter_name":"Chapter 11: Endpoint Security","num":20,"question":"Elaine wants to securely erase the contents of a tape used for backups in her organization's tape library. What is the fastest secure erase method available to her that will allow the tape to be reused?","options":{"A":"Using a degausser","B":"Wiping the tape by writing a random pattern of 1s and 0s to it","C":"Incinerating the tape","D":"Wiping the tape by writing all 1s or all 0s to it"},"correct":["A"],"explanation":"A degausser is a quick and effective way to erase a tape before it is reused. Wiping a tape by writing 1s, 0s, or a pattern of 1s and 0s to it will typically be a slow operation and is not a common method of destroying data on a tape. Incinerating the tape won't allow it to be reused!"},{"chapter":"ch12","chapter_name":"Chapter 12: Network Security","num":1,"question":"A system that Tony manages sends an SNMP trap. What type of information should Tony expect to receive?","options":{"A":"Notification of a vulnerability","B":"Notification of a patch being installed","C":"Notification of an issue","D":"Notification of user being created"},"correct":["C"],"explanation":"SNMP traps can be configured to provide additional information, but typical SNMP traps provide information about issues such as links going down, authentication failures, and reboots."},{"chapter":"ch12","chapter_name":"Chapter 12: Network Security","num":2,"question":"Ben wants to observe malicious behavior targeted at multiple systems on a network. He sets up a variety of systems and instruments to allow him to capture copies of attack tools and to document all the attacks that are conducted. What has he set up?","options":{"A":"A honeypot","B":"A beartrap","C":"A honeynet","D":"A tarpit"},"correct":["C"],"explanation":"A honeynet is a group of systems that intentionally exposes vulnerabilities so that defenders can observe attacker behaviors, techniques, and tools to help them design better defenses."},{"chapter":"ch12","chapter_name":"Chapter 12: Network Security","num":3,"question":"Valerie wants to replace the telnet access that she found still in use in her organization. Which protocol should she use to replace it, and what port will it run on?","options":{"A":"SFTP, port 21","B":"SSH, port 22","C":"HTTPS, port 443","D":"RDP, port 3389"},"correct":["B"],"explanation":"Telnet provides remote command-line access but is not secure. SSH is the most common alternative to telnet, and it operates on port 22."},{"chapter":"ch12","chapter_name":"Chapter 12: Network Security","num":4,"question":"Jill wants to use DNS filtering to prevent users in her organization from visiting potentially malicious sites. What type of service should she use to obtain this information?","options":{"A":"An OSINT service","B":"A STP feed","C":"An ACL monitoring service","D":"A reputation service"},"correct":["D"],"explanation":"DNS reputation services can provide Jill with an automated feed of malicious sites that she can include in her DNS filter. OSINT (open source intelligence) is gathered without scans but typically won't provide DNS block lists. STP (Spanning Tree Protocol) prevents loops in networks and is not relevant to DNS filtering, and an access control monitoring service will not be either."},{"chapter":"ch12","chapter_name":"Chapter 12: Network Security","num":5,"question":"Chuck wants to provide access to a protected network from a less trusted network. What type of solution is commonly implemented to provide a secure, monitored access method?","options":{"A":"A proxy server","B":"A jump server","C":"A VLAN","D":"An air gap"},"correct":["B"],"explanation":"Jump servers are used to provide secure, monitored access to a protected network. Users log in to the jump server, which then has access to the network. Proxies are used to filter or manage traffic and might be used in this scenario, but jump servers are the preferred answer for most organizations and uses. A VLAN (virtual LAN) is used to logically separate network segments. An air gap is a physical disconnection between networks or devices."},{"chapter":"ch12","chapter_name":"Chapter 12: Network Security","num":6,"question":"Kathleen wants to deploy a firewall that can handle large amounts of network traffic while performing advanced firewalling tasks. What type of device should she select?","options":{"A":"A NGFW","B":"A WAF","C":"A UTM","D":"A SD-FW"},"correct":["A"],"explanation":"A next-generation firewall (NGFW) device is typically designed and built to be more capable at high speeds and throughput than a universal threat management device. Since UTM devices provide such a wide array of services that consume CPU and memory resources, this performance gap can also sometimes be due to the broad set of services that a UTM device provides. A WAF (web application firewall) is specialized in web traffic, and SD-FW was made up for this question."},{"chapter":"ch12","chapter_name":"Chapter 12: Network Security","num":7,"question":"Mark wants to prevent DNS poisoning attacks. What technology should he implement to counter them most effectively?","options":{"A":"DNSSEC","B":"SDNS","C":"SASE","D":"SD-WAN"},"correct":["A"],"explanation":"DNSSEC validates both the origin of DNS information and ensures that DNS responses have not been modified, making it the best option to help prevent DNS poisoning attacks. SDNS was made up for this question. SASE is used to secure networks in complex multilocation environments, and SD-WAN allows for dynamic wide area networks defined by software, but neither provides this type of DNS security."},{"chapter":"ch12","chapter_name":"Chapter 12: Network Security","num":8,"question":"Casey wants to replace her organization's MPLS-based external connectivity using commodity technologies. What technology should she select to help her manage this?","options":{"A":"IPSec VPN","B":"SASE","C":"SD-WAN","D":"TLS VPN"},"correct":["C"],"explanation":"SD-WAN (software-defined wide area network) is commonly used to replace MPLS (Multiprotocol Label Switching) networks, which are typically higher cost than other connectivity options. IPSec and TLS- based VPNs are used to connect through untrusted networks, but they do not provide the functionality required. SASE uses SD-WAN and other technologies to ensure secure connectivity in complex network infrastructures with endpoints in many locations."},{"chapter":"ch12","chapter_name":"Chapter 12: Network Security","num":9,"question":"What protocol is used to securely wrap many otherwise insecure protocols?","options":{"A":"ISAKMP","B":"SSL","C":"IKE","D":"TLS"},"correct":["D"],"explanation":"Transport Layer Security (TLS) is commonly used to wrap (protect) otherwise insecure protocols. In fact, many of the secure protocols simply add TLS to protect them. ISAKMP and IKE are both used for IPSec and can be used to wrap insecure protocols, but they aren't used alone. SSL is no longer used; TLS has almost entirely replaced it, although SSL is still often casually referred to as TLS."},{"chapter":"ch12","chapter_name":"Chapter 12: Network Security","num":10,"question":"Valentine wants to deploy a secure version of DHCP for her organization. What should she implement?","options":{"A":"S-DHCP","B":"DHCP over TLS","C":"DHCPS","D":"There is no secured version of DHCP."},"correct":["D"],"explanation":"While many protocols have a secure version, DHCP does not have a secure option, and protection must be handled by using detection and response mechanisms, rather than an encrypted protocol."},{"chapter":"ch12","chapter_name":"Chapter 12: Network Security","num":11,"question":"What component of a zero-trust architecture forwards requests from subjects and acts on whether subjects are allowed to access resources?","options":{"A":"Policy administrators","B":"Policy enforcement points","C":"Policy engines","D":"Policy gateways"},"correct":["B"],"explanation":"Policy enforcement points communicate with policy administrators to forward requests from subjects and to receive instructions from them about connections to allow or end. Policy administrators are components that establish or remove the communication path between subjects and resources, including creating session-specific authentication tokens or credentials as needed. Policy engines make policy decisions based on both rules and external systems. Policy gateways are not reference components for zero-trust designs."},{"chapter":"ch12","chapter_name":"Chapter 12: Network Security","num":12,"question":"Gary wants to use secure protocols for email access for his end users. Which of the following groups of protocols should he implement to accomplish this task?","options":{"A":"DKIM, DMARC, HTTPS","B":"SPF, POPS, IMAPS","C":"POPS, IMAPS, HTTPS","D":"DMARC, DKIM, SPF"},"correct":["C"],"explanation":"End users may use secure POP (POPS), secure IMAP (IMAPS), and secure HTTP (HTTPS) to retrieve email. SPF, DKIM, and DMARC are used to identify and validate email servers, not to access email by end users."},{"chapter":"ch12","chapter_name":"Chapter 12: Network Security","num":13,"question":"Gary wants to prevent his organization's most sensitive data from being accessed by network-based attackers at any cost. What solution should he implement to ensure this?","options":{"A":"An air gap","B":"Firewall rules","C":"An IPS","D":"IPSec"},"correct":["A"],"explanation":"Physical isolation like an air gap is used when the additional work to manually transfer files is an acceptable trade-off against the potential for a security event caused by potential network-based attackers. Firewall rules, an IPS, or the use of IPSec to protect traffic will not sufficiently address this issue if any services remain accessible on the system."},{"chapter":"ch12","chapter_name":"Chapter 12: Network Security","num":14,"question":"Madhuri is designing a load-balancing configuration for her company and wants to keep a single node from being overloaded. What type of design will meet this need?","options":{"A":"A daisy chain","B":"Active/active","C":"Duck-duck-goose","D":"Active/passive"},"correct":["B"],"explanation":"Active/active designs spread traffic among active nodes, helping ensure that a single node will not be overwhelmed. Active/passive designs are useful for disaster recovery and business continuity, but they do not directly address heavy load on a single node. There are many load-balancing schemes, but daisy chains and duck-duck-goose are not among them."},{"chapter":"ch12","chapter_name":"Chapter 12: Network Security","num":15,"question":"What type of NAC will provide Isaac with the greatest amount of information about the systems that are connecting while also giving him the most amount of control of systems and their potential impact on other systems that are connected to the network?","options":{"A":"Agent-based, preadmission NAC","B":"Agentless, postadmission NAC","C":"Agent-based NAC, postadmission NAC","D":"Agentless, postadmission NAC"},"correct":["A"],"explanation":"Agent-based, preadmission NAC will provide Isaac with the greatest amount of information about a machine and the most control about what connects to the network and what can impact other systems. Since systems will not be connected to the network, even to a quarantine or preadmission zone, until they have been verified, Isaac will have greater control."},{"chapter":"ch12","chapter_name":"Chapter 12: Network Security","num":16,"question":"Danielle's organization has implemented a tool that combines SD- WAN, a CASB, and Zero Trust, among other security functions, to provide security regardless of where her organization's devices are. What type of solution has her organization implemented?","options":{"A":"A UTM","B":"An NGFW","C":"IPSec","D":"SASE"},"correct":["D"],"explanation":"SASE (Secure Access Service Edge) combines network security and device security by leveraging SD-WAN with security tools like Zero Trust, firewalls, and cloud access security brokers (CASBs). Both UTM and NGFW are advanced firewalls but do not provide this full functionality, and IPSec is a protocol used to provide encryption and authentication for network traffic."},{"chapter":"ch12","chapter_name":"Chapter 12: Network Security","num":17,"question":"Wayne is concerned that an on-path attack has been used against computers he is responsible for. What artifact is he most likely to find associated with this attack?","options":{"A":"A compromised router","B":"A browser plug-in","C":"A compromised server","D":"A modified hosts file"},"correct":["B"],"explanation":"Browser on-path attacks take advantage of malicious browser plug- ins or proxies to modify traffic at the browser level. They do not involve compromised routers or servers, and a modified hosts file is more likely to be involved in an on-path attack."},{"chapter":"ch12","chapter_name":"Chapter 12: Network Security","num":18,"question":"Elle has scanned her organization from an external IP address and has identified all of the services that are visible from the public Internet. What does this enable her to describe?","options":{"A":"If the organization is a fail-open organization","B":"Her organization's OSINT report","C":"Her organization's attack surface","D":"If the organization is a fail-closed organization"},"correct":["C"],"explanation":"Understanding what services your organization offers to the outside world is an important step in describing the organization's attack surface. Fail open and fail closed describe what happens when devices or systems fail, not vulnerability and service availability information. OSINT is a passive process and scanning is not a passive activity."},{"chapter":"ch12","chapter_name":"Chapter 12: Network Security","num":19,"question":"What technique is used to ensure that DNSSEC-protected DNS information is trustworthy?","options":{"A":"It is digitally signed.","B":"It is sent via TLS.","C":"It is encrypted using AES256.","D":"It is sent via an IPSec VPN."},"correct":["A"],"explanation":"DNSSEC does not encrypt data but does rely on digital signatures to ensure that DNS information has not been modified and that it is coming from a server that the domain owner trusts. DNSSEC does not protect confidentiality, which is a key thing to remember when discussing it as a security option. TLS, an IPSec VPN, or encryption via AES are all potential solutions to protect the confidentiality of network data."},{"chapter":"ch12","chapter_name":"Chapter 12: Network Security","num":20,"question":"Fred wants to ensure that the administrative interfaces for the switches and routers are protected so that they cannot be accessed by attackers. Which of the following solutions should he recommend as part of his organization's network design?","options":{"A":"NAC","B":"Trunking","C":"Out-of-band management","D":"Port security"},"correct":["C"],"explanation":"Out-of-band management places the administrative interface of a switch, router, or other device on a separate network or requires direct connectivity to the device to access and manage it. This ensures that an attacker who has access to the network cannot make changes to the network devices. NAC and port security help protect the network itself, whereas trunking is used to combine multiple interfaces, VLANs, or ports together."},{"chapter":"ch13","chapter_name":"Chapter 13: Wireless and Mobile Security","num":1,"question":"Alyssa wants to harden iOS devices her organization uses. What set of guidelines can she follow to align to common industry security practices?","options":{"A":"OWASP","B":"CIS benchmarks","C":"NIST 800-103","D":"NIST 800-111"},"correct":["B"],"explanation":"The Center for Internet Security (CIS) provides hardening guidelines known as CIS benchmarks that Alyssa can use as a guide to secure her organization's iOS devices. OWASP does not provide these, and NIST provides general guidance, not OS- or device-specific configuration guides."},{"chapter":"ch13","chapter_name":"Chapter 13: Wireless and Mobile Security","num":2,"question":"Fred's company issues devices in a BYOD model. That means that Fred wants to ensure that corporate data and applications are kept separate from personal applications on the devices. What technology is best suited to meet this need?","options":{"A":"Biometrics","B":"Full-device encryption","C":"Context-aware authentication","D":"Containerization"},"correct":["D"],"explanation":"Using a containerization system can allow Fred's users to run corporate applications and to use corporate data in a secure environment that cannot be accessed by other applications outside of the container on the device. Containerization schemes for mobile devices typically use encryption and other isolation techniques to ensure that data and applications do not cross over. Biometrics and context-aware authentication are useful for ensuring that the right user is using a device but don't provide this separation. Full-device encryption helps reduce the risk of theft or loss of a device resulting in a data breach."},{"chapter":"ch13","chapter_name":"Chapter 13: Wireless and Mobile Security","num":3,"question":"Michelle has deployed iPads to her staff who work her company's factory floor. She wants to ensure that the devices work only in the factory and that if they are taken home they cannot access business data or services. What type of solution is best suited to her needs?","options":{"A":"Context-aware authentication","B":"Geofencing","C":"Geolocation","D":"Unified endpoint management (UEM)"},"correct":["B"],"explanation":"Geofencing will allow Michelle to determine what locations the device should work in. The device will then use geolocation to determine when it has moved and where it is. In this case, the correct answer is therefore geofencing—simply having geolocation capabilities would not provide the solution she needs. Context-aware authentication can help by preventing users from logging in when they aren't in the correct location, but a device that was logged in may not require reauthentication. Finally, UEM, much like mobile device management, can be used to enforce these policies, but the most correct answer is geofencing."},{"chapter":"ch13","chapter_name":"Chapter 13: Wireless and Mobile Security","num":4,"question":"Ivan is running an enterprise wireless network and his heatmap shows that two access points are likely conflicting with each other. What will the enterprise access controller most likely do to handle this conflict?","options":{"A":"Increase the broadcast power of one of the access points.","B":"Change the SSID for one of the access points.","C":"Disable one of the access points.","D":"Decrease the broadcast power of the access points."},"correct":["D"],"explanation":"When access points conflict, enterprise wireless network management tools will typically decrease the power for both access points until the issue is resolved. Simply increasing power will cause more conflicts, changing the SSID would not serve typical enterprise models that use a single SSID to allow roaming, and disabling an access point may leave coverage gaps."},{"chapter":"ch13","chapter_name":"Chapter 13: Wireless and Mobile Security","num":5,"question":"Chris wants to use geolocation technology to find where phones issued by his organization are located. Which of the following is not commonly used as part of geolocation techniques?","options":{"A":"Bluetooth","B":"GPS","C":"NFC","D":"Wi-Fi"},"correct":["C"],"explanation":"Nearfield communication (NFC) is not typically used for geolocation because of its extremely short range. Geolocation services may use GPS, Wi-Fi, and Bluetooth to identify areas, access points, Bluetooth beacons, and other items that help with location services."},{"chapter":"ch13","chapter_name":"Chapter 13: Wireless and Mobile Security","num":6,"question":"Daniel knows that WPA3 has added a method to ensure that brute- force attacks against weak preshared keys are less likely to succeed. What is this technology called?","options":{"A":"SAE","B":"CCMP","C":"PSK","D":"WPS"},"correct":["A"],"explanation":"Simultaneous Authentication of Equals (SAE) is used to establish a secure peering environment and to protect session traffic. Since the process requires additional cryptographic steps, it causes brute-force attacks to be much slower and thus less likely to succeed while also providing more security than WPA2's preshared key (PSK) mode. WPS is Wi-Fi Protected Setup, a quick setup capability; CCMP is the encryption mode used for WPA2 networks. WPA3 moves to 128-bit encryption for Personal mode and can support 192-bit encryption in Enterprise mode."},{"chapter":"ch13","chapter_name":"Chapter 13: Wireless and Mobile Security","num":7,"question":"Isabelle needs to select the EAP protocol that she will use with her wireless network. She wants to use a secure protocol that does not require client devices to have a certificate, but she does want to require mutual authentication. Which EAP protocol should she use?","options":{"A":"EAP-FAST","B":"EAP-TTLS","C":"PEAP","D":"EAP-TLS"},"correct":["C"],"explanation":"Isabelle should select PEAP, which doesn't require client certificates but does provide TLS support. EAP-TTLS provides similar functionality but requires additional software to be installed on some devices. EAP-FAST focuses on quick reauthentication, and EAP-TLS requires certificates to be deployed to the endpoint devices."},{"chapter":"ch13","chapter_name":"Chapter 13: Wireless and Mobile Security","num":8,"question":"Theresa has implemented a technology that keeps data for personal use separate from data for her company on mobile devices used by members of her staff. What is this concept called?","options":{"A":"Storage segmentation","B":"Multifactor storage","C":"Full-device encryption","D":"Geofencing"},"correct":["A"],"explanation":"Storage segmentation is the concept of splitting storage between functions or usage to ensure that information that fits a specific context is not shared or used by applications or services outside of that context. Full-device encryption encrypts the entire device, geofencing is used to determine geographic areas where actions or events may be taken by software, and multifactor storage was made up for this question."},{"chapter":"ch13","chapter_name":"Chapter 13: Wireless and Mobile Security","num":9,"question":"A member of Jake's team tells him that he sideloaded applications on his Android-based company owned phone. What has occurred?","options":{"A":"Malware was installed on the phone.","B":"The phone was rooted to allow administrative access.","C":"Applications were installed by copying them instead of via an app store.","D":"The organization's MDM was disabled to avoid its management controls."},"correct":["C"],"explanation":"Sideloading is the process of copying files between two devices like a phone and a laptop, desktop, or storage device. Jake's team member has loaded an application without using the Android application store. Sideloading does not necessarily imply malware, rooting, or disabling an MDM, although an MDM may be configured to prevent sideloading."},{"chapter":"ch13","chapter_name":"Chapter 13: Wireless and Mobile Security","num":10,"question":"Madhuri disables SMS, MMS, and RCS on phones in her organization. What has she prevented from being sent?","options":{"A":"Phone calls and texts","B":"Text messages and multimedia messages","C":"Text messages and firmware updates","D":"Phone calls and multimedia messages"},"correct":["B"],"explanation":"SMS (Short Message Service) is used to send text messages, and MMS and RCS provide additional multimedia features. Neither provides phone calls or firmware updates."},{"chapter":"ch13","chapter_name":"Chapter 13: Wireless and Mobile Security","num":11,"question":"What is the most frequent concern that leads to GPS tagging being disabled by some companies via an MDM tool?","options":{"A":"Chain of custody","B":"The ability to support geofencing","C":"Privacy","D":"Context-aware authentication"},"correct":["C"],"explanation":"Geotagging places a location stamp in documents and pictures that can include position, time, and date. This can be a serious privacy issue when pictures or other information are posted, and many individuals and organizations disable GPS tagging. Organizations may want to enforce GPS tagging for some work products, meaning that the ability to enable or disable it in an MDM tool is quite useful. Chain of custody is a forensic concept, the ability to support geofencing does not require GPS tagging, and context-aware authentication may need geolocation but not GPS tagging."},{"chapter":"ch13","chapter_name":"Chapter 13: Wireless and Mobile Security","num":12,"question":"Bart wants to use a cellular hotspot to provide Internet connectivity via Wi-Fi. What type of network has he set up for his laptop and phone to connect to?","options":{"A":"Ad-hoc","B":"NFC","C":"Point-to-point","D":"RFID"},"correct":["A"],"explanation":"This is an ad-hoc network set up to allow devices to connect to the access point provided by the cellular modem. NFC is a short range, low bandwidth connection method used for payments and similar purposes. Point-to-point connections are used to bridge two networks together or for single connections, this is a multi-device network. RFID uses tags and readers."},{"chapter":"ch13","chapter_name":"Chapter 13: Wireless and Mobile Security","num":13,"question":"Susan wants to ensure that the threat of a lost phone creating a data breach is minimized. What two technologies should she implement to do this?","options":{"A":"Wi-Fi and NFC","B":"Remote wipe and FDE","C":"Containerization and NFC","D":"Geofencing and remote wipe"},"correct":["B"],"explanation":"Susan's best options are to use a combination of full-device encryption (FDE) and remote wipe. If a device is stolen and continues to be connected to the cellular network, or reconnects at any point, the remote wipe will occur. If it does not, or if attackers attempt to get data from the device and it is locked, the encryption will significantly decrease the likelihood of the data being accessed. Of course, cracking a passcode, PIN, or password remains a potential threat. NFC and Wi- Fi are wireless connection methods and have no influence on data breaches due to loss of a device. Geofencing may be useful for some specific organizations that want to take action if devices leave designated areas, but it is not a general solution. Containerization may shield data, but use of containers does not immediately imply encryption or other protection of the data but simply that the environments are separated."},{"chapter":"ch13","chapter_name":"Chapter 13: Wireless and Mobile Security","num":14,"question":"What are the two most commonly deployed biometric authentication solutions for mobile devices?","options":{"A":"Voice recognition and face recognition","B":"Fingerprint recognition and gait recognition","C":"Face recognition and fingerprint recognition","D":"Voice recognition and fingerprint recognition"},"correct":["C"],"explanation":"Current mobile device implementations have focused heavily on facial recognition via services like Apple's Face ID and fingerprint recognition like Android's fingerprint scanning and Apple's Touch ID. Gait recognition is not a widely deployed biometric technology and would be difficult for most mobile device users to use. Voice recognition as a biometric authenticator has not been broadly deployed for mobile devices, whereas voice-activated services are in wide usage."},{"chapter":"ch13","chapter_name":"Chapter 13: Wireless and Mobile Security","num":15,"question":"Alaina wants to modify operating system settings and features on her iOS device and to install applications that are not permitted or available via the Apple App Store. What would she need to do to accomplish this?","options":{"A":"Deploy an MDM tool to the phone.","B":"Jailbreak the phone.","C":"Keymod the phone.","D":"Install a third-party operating system."},"correct":["B"],"explanation":"Jailbreaking will allow Alaina to obtain administrator access to the underlying phone operating system and to modify operating system settings and options as well as to install applications that are not available via the App Store. Deploying an MDM does not permit all of this, keymodding is not a term used in this context, and installing a third-party OS would allow access but would change the OS."},{"chapter":"ch13","chapter_name":"Chapter 13: Wireless and Mobile Security","num":16,"question":"Jerome wants to allow guests to use his organization's wireless network, but he does not want to provide a preshared key. What solution can he deploy to gather information such as email addresses or other contact information before allowing users to access his open network?","options":{"A":"WPS capture mode","B":"Kerberos","C":"WPA2","D":"A captive portal"},"correct":["D"],"explanation":"Jerome should deploy a captive portal that requires users to provide information before being moved to a network segment that allows Internet access. WPS capture mode was made up for this question, Kerberos is used for enterprise authentication, and WPA2 supports open, enterprise, or PSK modes but does not provide the capability Jerome needs by itself."},{"chapter":"ch13","chapter_name":"Chapter 13: Wireless and Mobile Security","num":17,"question":"Amanda wants to create a view of her buildings that shows Wi-Fi signal strength and coverage. What is this type of view called?","options":{"A":"A channel overlay","B":"A PSK","C":"A heatmap","D":"A SSID chart"},"correct":["C"],"explanation":"Amanda wants to create a heatmap, which shows the signal strength and coverage for each access point in a facility. Heatmaps can also be used to physically locate an access point by finding the approximate center of the signal. This can be useful to locate rogue access points and other unexpected or undesired wireless devices. PSK stands for preshared key, a channel overlay is not a commonly used term (although channel overlap is a concern for channels that share bandwidth), and SSID chart was made up for this question."},{"chapter":"ch13","chapter_name":"Chapter 13: Wireless and Mobile Security","num":18,"question":"Megan wants to prevent access to phones that are misplaced by members of her organization. Which of the following MDM control options is least likely to help her protect phones that are misplaced?","options":{"A":"PINs","B":"Device encryption","C":"Remote wipe","D":"Application management"},"correct":["D"],"explanation":"Managing applications won't help protect a misplaced phone from being accessed. PINs, device encryption, and remote wipe will all help keep her organization's data and devices secure."},{"chapter":"ch13","chapter_name":"Chapter 13: Wireless and Mobile Security","num":19,"question":"Gurvinder wants to select a mobile device deployment method that provides employees with devices that they can use as though they're personally owned to maximize flexibility and ease of use. Which deployment model should he select?","options":{"A":"CYOD","B":"COPE","C":"BYOD","D":"MOTD"},"correct":["B"],"explanation":"Gurvinder's requirements fit the COPE (corporate-owned, personally enabled) mobile device deployment model. Choose your own device (CYOD) allows users to choose a device but then centrally manages it. BYOD allows users to use their own device, rather than have the company provide it, and MOTD means message of the day, and is not a mobile device deployment scheme."},{"chapter":"ch13","chapter_name":"Chapter 13: Wireless and Mobile Security","num":20,"question":"Octavia discovers that the contact list from her phone has been acquired via a wireless attack. Which of the following is the most likely culprit?","options":{"A":"Bluejacking","B":"An evil maid","C":"Bluesnarfing","D":"An evil twin"},"correct":["C"],"explanation":"Bluesnarfing is the theft of information from a Bluetooth enabled device. If Octavia left Bluetooth on and had not properly secured her device, then an attacker may have been able to access her contact list and download its contents. A bluejacking attack occurs when unwanted messages are sent to a device via Bluetooth. Evil twins are malicious access points configured to appear to be legitimate access points, and an evil maid attack is an in-person attack where an attacker takes advantage of physical access to hardware to acquire information or to insert malicious software on a device."},{"chapter":"ch14","chapter_name":"Chapter 14: Monitoring and Incident Response","num":1,"question":"The following figure shows the Security+ incident response cycle. What item is missing?","options":{"A":"Planning","B":"Reporting","C":"Monitoring","D":"Preparation"},"correct":["D"],"explanation":"The first item in the incident response cycle used by the Security+ exam is preparation."},{"chapter":"ch14","chapter_name":"Chapter 14: Monitoring and Incident Response","num":2,"question":"Michael analyzes network traffic, including packet content, as part of his incident response process. What tool should he use?","options":{"A":"Syslog","B":"NetFlow","C":"Packet capture","D":"A SIEM"},"correct":["C"],"explanation":"Packet capture will allow Michael to see all the content of packets that are captured to analyze them. NetFlow simply shows source, destination, protocol, and traffic volume. Syslog and a SIEM don't capture packet content, and instead focus on logs and events."},{"chapter":"ch14","chapter_name":"Chapter 14: Monitoring and Incident Response","num":3,"question":"Susan wants to create a dashboard that shows her aggregated log events related to logins from different geographic regions. Her goal is to identify impossible travel scenarios. Which of the following solutions should she select to accomplish that goal?","options":{"A":"IPS","B":"OS logs","C":"SIEM","D":"Vulnerability scan data"},"correct":["C"],"explanation":"A SIEM with correlation rules for geographic IP information as well as user IDs and authentication events will accomplish Susan's goals. An IPS may detect attacks, but it isn't well suited to detecting impossible travel. OS logs would need to be aggregated, and vulnerability scan data won't show this at all."},{"chapter":"ch14","chapter_name":"Chapter 14: Monitoring and Incident Response","num":4,"question":"Selah wants to ensure that users in her organization can only install applications that are evaluated and approved by the organization's security team. What should she use?","options":{"A":"A SIEM","B":"An application deny list","C":"An application allow list","D":"sFlow"},"correct":["C"],"explanation":"Application allow lists are used to ensure that only allowed applications are installable on systems. A deny list specifically identifies programs that aren't allowed. A SIEM doesn't provide application management capabilities, and sFlow is a flow tool like NetFlow."},{"chapter":"ch14","chapter_name":"Chapter 14: Monitoring and Incident Response","num":5,"question":"What is the primary concern with sFlow in a large, busy network?","options":{"A":"It may allow buffer overflow attacks against the collector host.","B":"sFlow is not designed for large or complex networks.","C":"sFlow puts extreme load on the flow collector host.","D":"sFlow samples only network traffic, meaning that some detail will be lost."},"correct":["D"],"explanation":"The primary concern for analysts who deploy sFlow is often that it samples only data, meaning some accuracy and nuance can be lost in the collection of flow data. Sampling, as well as the implementation methods for sFlow, means that it scales well to handle complex and busy networks. Although vulnerabilities may exist in sFlow collectors, a buffer overflow is not a primary concern for them."},{"chapter":"ch14","chapter_name":"Chapter 14: Monitoring and Incident Response","num":6,"question":"Mark unplugs the network connection from a system that is part of an incident and places tape over its Ethernet jack with a sign that says, “Do not reconnect without approval from IR team.” How is this method best described?","options":{"A":"Containment","B":"Isolation","C":"Segmentation","D":"Zoning"},"correct":["B"],"explanation":"Mark has isolated the system by removing it from the network and ensuring that it cannot communicate with other systems. Containment would limit the impact of the incident and might leave the system connected but with restricted or protected access. Segmentation moves systems or groups of systems into zones that have similar purposes, data classification, or other restrictions on them."},{"chapter":"ch14","chapter_name":"Chapter 14: Monitoring and Incident Response","num":7,"question":"The company that Ben works for wants to test its incident response plan. Ben gathers the incident response team in a room and walks through a scenario to validate the organization's processes and procedures. What type of event has Ben hosted?","options":{"A":"A checklist exercise","B":"A simulation","C":"A tabletop exercise","D":"A fail-over exercise"},"correct":["C"],"explanation":"Ben's organization is conducting a tabletop exercise. Tabletop exercises are conducted with more flexibility—team members are given a scenario and asked how they would respond and what they would do to accomplish tasks they believe would be relevant. Checklist exercises are not a specific type of exercise. A simulation exercise attempts to more fully re-create an actual incident to test responses. Fail-over exercises are conducted by actually failing a datacenter over to a hot location."},{"chapter":"ch14","chapter_name":"Chapter 14: Monitoring and Incident Response","num":8,"question":"Madhuri wants to check a PNG-formatted photo for GPS coordinates. Where can she find that information if it exists in the photo?","options":{"A":"In the location.txt file appended to the PNG","B":"On the original camera","C":"In the photo's metadata","D":"In the photo as a steganographically embedded data field"},"correct":["C"],"explanation":"If the photo includes GPS data, it will be included in the photo's metadata. Madhuri can use a tool like ExifTool to review the metadata for useful information. None of the other options are places where data is stored for a PNG image as a normal practice."},{"chapter":"ch14","chapter_name":"Chapter 14: Monitoring and Incident Response","num":9,"question":"Alyssa has identified malware on a system. She removes the system from the network to ensure that it cannot impact other systems. What technique has she used to deal with this system?","options":{"A":"Quarantine","B":"Segmentation","C":"Converted it to agentless","D":"Deny listing"},"correct":["A"],"explanation":"Alyssa's has quarantined the machine, ensuring it cannot reach other systems or impact the rest of her organization. Segmentation would involve putting the system in protected network zone. Agentless tools are used to send data without a separate program or agent deployed to allow that. Deny lists are used to prevent specific programs or files from being used or deployed to systems."},{"chapter":"ch14","chapter_name":"Chapter 14: Monitoring and Incident Response","num":10,"question":"Kristen discovers missing logs as part of her threat hunting activities. What has most likely happened?","options":{"A":"The logs hit the end of their life cycle and were rotated.","B":"The system is a newly deployed system.","C":"An attacker wiped the logs to hide evidence.","D":"An attacker encrypted the logs as part of their process."},"correct":["C"],"explanation":"Missing logs are often associated with an attacker attempting to hide evidence of their actions. Log rotation will typically remove the oldest log items and replace them with new log items rather than wiping a log, or will archive the old log file and create a new one. A newly deployed system typically has at least some logs from booting and running. Encrypting logs would leave a file in place even if it couldn't be read."},{"chapter":"ch14","chapter_name":"Chapter 14: Monitoring and Incident Response","num":11,"question":"Ian has been receiving hundreds of false positive alerts from his SIEM every night when scheduled jobs run across his datacenter. What should he adjust on his SIEM to reduce the false positive rate?","options":{"A":"Trend analysis","B":"Sensitivity","C":"Correlation rules","D":"Dashboard configuration"},"correct":["B"],"explanation":"Ian's first step should be changing the sensitivity for his alerts. Adjusting the alerts to ignore safe or expected events can help reduce false positives. Correlation rules may then need to be adjusted if they are matching unrelated items. Dashboards are used to visualize data, not for alerting, and trend analysis is used to feed dashboards and reports."},{"chapter":"ch14","chapter_name":"Chapter 14: Monitoring and Incident Response","num":12,"question":"Which team member acts as a primary conduit to senior management on an IR team?","options":{"A":"Communications and public relations","B":"Information security","C":"Management","D":"Technical expert"},"correct":["C"],"explanation":"Members of management or organizational leadership act as a primary conduit to senior leadership for most incident response teams. They also ensure that difficult or urgent decisions can be made without needing escalated authority. Communications and PR staff focus on internal and external communications but are typically not the direct conduit to leadership. Technical and information security experts do most of the incident response work itself."},{"chapter":"ch14","chapter_name":"Chapter 14: Monitoring and Incident Response","num":13,"question":"Dana is reviewing her system's application logs and notices that a full backup of the application was done at 10 a.m. She knows that the job that runs the backup process is set to run overnight. What indicator should she flag this as?","options":{"A":"Unexpected logs","B":"Resource consumption","C":"Resource inaccessibility","D":"Out-of-cycle logging"},"correct":["D"],"explanation":"This is an example of out-of-cycle logging, or logging that occurs at a different time than expected. This may be because an attacker is using the backup tool to acquire data. Unexpected logs are not an indicator found on the Security+ exam outline. There is no indication of resource consumption or inaccessibility in the question."},{"chapter":"ch14","chapter_name":"Chapter 14: Monitoring and Incident Response","num":14,"question":"Jim wants to view log entries that describe actions taken by applications on a Red Hat Linux system. Which of the following tools can he use on the system to view those logs?","options":{"A":"logger","B":"syslog-ng","C":"journalctl","D":"tail"},"correct":["C"],"explanation":"Red Hat Enterprise uses journalctl to view journal logs that contain application information. Jim should use journalctl to review the logs for the information he needs. The tool also provides functionality that replicates what head and tail can do for logs. Syslog-ng is a logging infrastructure, and though logs may be sent via syslog-ng, it is not mentioned here. logger is a logging utility used to make entries in the system log."},{"chapter":"ch14","chapter_name":"Chapter 14: Monitoring and Incident Response","num":15,"question":"Megan wants to ensure that logging is properly configured for her organization's Windows workstations. What could she use to ensure that logging best practices are configured?","options":{"A":"SIEM","B":"Benchmarks","C":"Syslog","D":"Agents"},"correct":["B"],"explanation":"Benchmarks often include logging settings and configurations. SIEM is used to gather and analyze logs. Syslog is a standard for logging and sending logs. Agents are used to send logs for systems that don't have a logging capability."},{"chapter":"ch14","chapter_name":"Chapter 14: Monitoring and Incident Response","num":16,"question":"Chris has turned on logon auditing for a Windows system. Which log will show them?","options":{"A":"The Windows Application log","B":"The Windows Security log","C":"The Windows System log","D":"All of the above"},"correct":["B"],"explanation":"The Windows Security log records logon events when logon auditing is enabled. The Application and System logs do not contain these events."},{"chapter":"ch14","chapter_name":"Chapter 14: Monitoring and Incident Response","num":17,"question":"Jayne wants to determine why a ransomware attack was successful against her organization. She plans to conduct a root cause analysis. Which of the following is not a typical root cause analysis method?","options":{"A":"Root/branch review","B":"Five whys","C":"Event analysis","D":"Diagramming"},"correct":["A"],"explanation":"Five whys, event analysis, and diagramming are all common methods of performing root cause analysis. Root/branch review is not a typical process for this."},{"chapter":"ch14","chapter_name":"Chapter 14: Monitoring and Incident Response","num":18,"question":"Hitesh wants to keep a system online but limit the impact of the malware that was found on it while an investigation occurs. What method from the following list should he use?","options":{"A":"Containment","B":"Isolation","C":"Segmentation","D":"Black holing"},"correct":["A"],"explanation":"Containment activities focus on preventing further malicious actions or attacks. In this case, Hitesh might opt to prevent the malware from spreading but leave the system online due to a critical need or a desire to preserve memory and other artifacts for investigation. Isolation walls a system or systems off from the rest of the world, whereas segmentation is frequently used before incidents occur to create zones or segments of a network or system with different security levels and purposes."},{"chapter":"ch14","chapter_name":"Chapter 14: Monitoring and Incident Response","num":19,"question":"What phase in the incident response process leverages indicators of compromise and log analysis as part of a review of events?","options":{"A":"Preparation","B":"Containment","C":"Eradication","D":"Identification"},"correct":["D"],"explanation":"The Analysis phase focuses on using various techniques to analyze events to identify potential incidents. Preparation focuses on building tools, processes, and procedures to respond to incidents. Eradication involves the removal of artifacts related to the incident, and containment limits the scope and impact of the incident."},{"chapter":"ch14","chapter_name":"Chapter 14: Monitoring and Incident Response","num":20,"question":"Henry wants to check to see if services were installed by an attacker. What commonly gathered organizational data can he use to see if a new service appeared on systems?","options":{"A":"Registry dumps from systems throughout his organization","B":"Firewall logs","C":"Vulnerability scans","D":"Flow logs"},"correct":["C"],"explanation":"Vulnerability scans are the best way to find new services that are offered by systems. In fact, many vulnerability scanners will flag new services when they appear, allowing administrators to quickly notice unexpected new services. Registry information is not regularly dumped or collected in most organizations. Firewall logs and flow logs could show information about the services being used by systems whose traffic passes through them, but this is a less useful and accurate way of identifying new services and would work only if those services were also being used."},{"chapter":"ch15","chapter_name":"Chapter 15: Digital Forensics","num":1,"question":"Felix wants to make an exact copy of a drive using a Linux command- line tool as part of a forensic acquisition process. What command should he use?","options":{"A":"df","B":"cp","C":"dd","D":"ln"},"correct":["C"],"explanation":"dd is a copying and conversion command for Linux and can be used to create a forensic image that can be validated using an MD5sum or SHA1 hash. The other commands are df for disk usage, cp for copying files, and ln to link files."},{"chapter":"ch15","chapter_name":"Chapter 15: Digital Forensics","num":2,"question":"Greg is preparing a forensic report and needs to describe the tools that were used. What should he report about the tools in addition to their names?","options":{"A":"The type of system the tools were installed or run on","B":"The training level or certifications of the team that uses the tools","C":"Any known limitations or issues with the tools","D":"The patch level or installed version of the tools"},"correct":["C"],"explanation":"If there are known limitations or issues with the tools used, this should be included in the report. The type of system the tool was installed on may influence performance but should not influence the report or output. Training and certification may be listed as part of a team description but are not required as part of tool description. Finally, patch levels or installed versions are not critical unless there are known issues that would have been described as such."},{"chapter":"ch15","chapter_name":"Chapter 15: Digital Forensics","num":3,"question":"Gabby is preparing chain-of-custody documentation and identifies a gap in hand-off documentation for an original source forensic drive. What issue should she expect to encounter due to this gap?","options":{"A":"The evidence may not be admissible in court.","B":"The forensic activities may need to be repeated.","C":"The staff involved may have to re-create the missed log.","D":"The chain of custody may need to be edited to note the problem."},"correct":["A"],"explanation":"If forensic evidence was not properly handled, it may not be admissible in court. Repeating forensic activities won't reverse mishandling, staff can't go back and re-create logs, and noting the issue will not resolve it."},{"chapter":"ch15","chapter_name":"Chapter 15: Digital Forensics","num":4,"question":"Mike's organization has recently moved to a SaaS cloud service and needs to collect forensic data from the cloud service. What process can Mike use to gather the information he needs?","options":{"A":"Install forensic imaging software on the cloud service's servers.","B":"Identify the log information available and request any other desired information from the cloud service provider.","C":"Engage law enforcement to acquire the forensic data.","D":"Request the forensic information from third-party auditors."},"correct":["B"],"explanation":"Mike's best option is to identify the log information available from the provider and to request any additional information knowing that he may not receive more detail unless there is contractual language that specifies it. SaaS vendors typically won't allow installation of forensic tools, law enforcement does not perform forensic acquisition for third parties upon request, and auditors don't provide forensic data acquisition either."},{"chapter":"ch15","chapter_name":"Chapter 15: Digital Forensics","num":5,"question":"Charles wants to obtain a forensic copy of a running virtual machine. What technique should he use to capture the image?","options":{"A":"Run dd from within the running machine.","B":"Use FTK Imager from the virtual machine host.","C":"Use the VM host to create a snapshot.","D":"Use WinHex to create a copy from within the running machine."},"correct":["C"],"explanation":"Creating a snapshot will provide a complete copy of the system, including memory state that can then be analyzed for forensic purposes. Copying a running system from a program running within that system can be problematic, since the system itself will change while it is trying to copy itself. FTK Imager can copy drives and files, but it would not handle a running virtual machine."},{"chapter":"ch15","chapter_name":"Chapter 15: Digital Forensics","num":6,"question":"Melissa wants to capture network traffic for forensic purposes. What tool should she use to capture it?","options":{"A":"A forensic suite","B":"Wireshark","C":"dd","D":"WinHex"},"correct":["B"],"explanation":"Even though Wireshark is not a dedicated network forensic tool, since network traffic is ephemeral, capturing it with a packet sniffer like Wireshark is Melissa's best option. Forensic suites are useful for analyzing captured images, not capturing network traffic, and dd and WinHex are both useful for packet capture, but not for network traffic analysis."},{"chapter":"ch15","chapter_name":"Chapter 15: Digital Forensics","num":7,"question":"Frank is concerned about the admissibility of his forensic data. Which of the following is not an element he should be concerned about?","options":{"A":"Whether the forensic source data has remained unaltered","B":"Whether the practices and procedures would survive review by experts","C":"Whether the evidence is relevant to the case","D":"Whether the forensic information includes a time stamp"},"correct":["D"],"explanation":"Forensic information does not have to include a time stamp to be admissible, but time stamps can help build a case that shows when events occurred. Files without a time stamp may still show other information that is useful to the case or may have other artifacts associated with them that can provide context about the time and date."},{"chapter":"ch15","chapter_name":"Chapter 15: Digital Forensics","num":8,"question":"What is the document that tracks the custody or control of a piece of evidence called?","options":{"A":"Evidence log","B":"Audit log","C":"Event report","D":"Chain of custody"},"correct":["D"],"explanation":"Chain-of-custody documentation tracks evidence throughout its life cycle, with information about who has custody or control and when transfers happened, and continues until the evidence is removed from the legal process and disposed of. The other terms are not used for this practice."},{"chapter":"ch15","chapter_name":"Chapter 15: Digital Forensics","num":9,"question":"Isaac is performing a forensic analysis on two systems that were compromised in the same event in the same facility. As he performs his analysis, he notices that the event appears to have happened almost exactly one hour earlier on one system than the other. What is the most likely issue he has encountered?","options":{"A":"The attacker took an hour to get to the second system.","B":"One system is set to an incorrect time zone.","C":"The attacker changed the system clock to throw off forensic practitioners.","D":"The forensic tool is reading the time stamps incorrectly."},"correct":["B"],"explanation":"The most common cause of an hour of difference between two systems in an environment is an incorrectly set time zone. Isaac should check the time zone settings, and then correct his findings based on the time zones set on the systems if necessary."},{"chapter":"ch15","chapter_name":"Chapter 15: Digital Forensics","num":10,"question":"What legal concept determines the law enforcement agency or agencies that will be involved in a case based on location?","options":{"A":"Nexus","B":"Nonrepudiation","C":"Jurisdiction","D":"Admissibility"},"correct":["C"],"explanation":"Jurisdiction is the legal authority over an area or individuals based on laws that create the jurisdiction. Nexus defines whether a relationship or connection exists, such as a local branch or business location. Non-repudiation ensures that evidence or materials can be connected to their originator. Admissibility determines whether evidence can be used in court."},{"chapter":"ch15","chapter_name":"Chapter 15: Digital Forensics","num":11,"question":"Michael wants to acquire the firmware from a running device for analysis. What method is most likely to succeed?","options":{"A":"Use forensic memory acquisition techniques.","B":"Use disk forensic acquisition techniques.","C":"Remove the firmware chip from the system.","D":"Shut down the system and boot to the firmware to copy it to a removable device."},"correct":["A"],"explanation":"Firmware can be challenging to access, but both memory forensic techniques and direct hardware interface access are viable means in some cases. Firmware is not typically stored on the disk and instead is stored in a BIOS or UEFI chip. Removing the chip from the system will leave it unable to run and thus this is not a preferred method. Also, many chips are not removable. Shutting down the device and booting it to the firmware does not provide a means of copying the firmware for most devices. Although the firmware is likely to allow updates, most do not allow downloads or copying."},{"chapter":"ch15","chapter_name":"Chapter 15: Digital Forensics","num":12,"question":"Charles needs to know about actions an individual performed on a PC. What is the best starting point to help him identify those actions?","options":{"A":"Review the system log.","B":"Review the event log.","C":"Interview the individual.","D":"Analyze the system's keystroke log."},"correct":["C"],"explanation":"Although it may be tempting to use a technical answer, interviewing the individual involved is the best starting point when a person performed actions that need to be reviewed. Charles can interview the staff member, and then move on to technical means to validate their responses. System and event logs may have some clues to what occurred, but normal systems do not maintain a keystroke log. In fact, the closest normal element is the command log used by both Windows and Linux to allow command-line input to be recalled as needed."},{"chapter":"ch15","chapter_name":"Chapter 15: Digital Forensics","num":13,"question":"Maria has acquired a disk image from a hard drive using dd, and she wants to ensure that her process is forensically sound. What should her next step be after completing the copy?","options":{"A":"Securely wipe the source drive.","B":"Compare the hashes of the source and target drive.","C":"Securely wipe the target drive.","D":"Update her chain-of-custody document."},"correct":["B"],"explanation":"Once a copy is made, hashes for the original and target drive should be compared to ensure that the copy was successful. After that, the chain-of-custody document can be updated to note that a copy was made and will be tracked as it is analyzed while the original is preserved. Wiping either drive after a copy is not part of the process, although a target drive may be wiped after a case is complete."},{"chapter":"ch15","chapter_name":"Chapter 15: Digital Forensics","num":14,"question":"Alex has been handed a flash media device that was quick-formatted and has been asked to recover the data. What data will remain on the drive?","options":{"A":"No data will remain on the drive.","B":"Files will remain but file indexes will not.","C":"File indexes will remain, but the files will be gone.","D":"Files and file indexes will remain on the drive."},"correct":["B"],"explanation":"Quick-formatting a drive removes the file indexes but leaves the file content on the drive. Recovery tools look for those files on the drive and piece them back together using metadata, headers, and other clues that help to recover the files."},{"chapter":"ch15","chapter_name":"Chapter 15: Digital Forensics","num":15,"question":"Naomi is preparing to migrate her organization to a cloud service and wants to ensure that she has the appropriate contractual language in place. Which of the following is not a common item she should include?","options":{"A":"Right-to-audit clauses","B":"Right to forensic examination","C":"Choice of jurisdiction","D":"Data breach notification timeframe"},"correct":["B"],"explanation":"Contracts commonly include right to audit, choice of jurisdiction, and data breach notification time frame clauses, but a right to forensically examine a vendor's systems or devices is rarely included. Naomi may want to ask about their incident response process and for examples of previous breach notification and incident documentation shared with customers instead."},{"chapter":"ch15","chapter_name":"Chapter 15: Digital Forensics","num":16,"question":"Alaina wants to maintain chain-of-custody documentation and has created a form. Which of the following is not a common element on a chain-of-custody form?","options":{"A":"Item identifier number","B":"Signature of the person transferring the item","C":"Signature of the person receiving the item","D":"Method of transport"},"correct":["D"],"explanation":"Chain of custody tracks who has an item, how it is collected, where it is stored and how, how it is secured or protected, who collected it, and transfers, but it does not typically include how the items were transported because that is not relevant if the other data is provided."},{"chapter":"ch15","chapter_name":"Chapter 15: Digital Forensics","num":17,"question":"Henry is following the EDRM model and is preparing to review data. What two key tasks occur during this stage?","options":{"A":"Validating that time stamps match between systems and that data is properly hashed to confirm that original data is sent","B":"Validating that the legal hold request is valid and that all documented items are included","C":"Validating that the desired data is included and that information that should not be shared is not included","D":"Validating that chain of custody is ensured and that malicious files are not included"},"correct":["C"],"explanation":"It is important to ensure that data prepared for e-discovery only contains what it is supposed to, and that information that should not be shared is not included. Time stamps, hashing, chain of custody, and ensuring malicious files are not included are not part of the EDRM model. Validating that a legal hold is valid should happen before preservation, but validating that documented items from the hold are included if they exist should occur."},{"chapter":"ch15","chapter_name":"Chapter 15: Digital Forensics","num":18,"question":"Theresa's organization has received a legal hold notice for their files and documents. Which of the following is not an action she needs to take?","options":{"A":"Ensure that changes to existing documents related to the case are tracked and that originals can be provided.","B":"Preserve all existing documents relevant to the case.","C":"Delete all sensitive documents related to the case.","D":"Prevent backups that contain files related to the case from being overwritten on their normal schedule."},"correct":["C"],"explanation":"Removing information relevant to a legal hold is exactly what the hold is intended to prevent. Theresa's organization could be in serious legal trouble if they were to intentionally purge or change related information."},{"chapter":"ch15","chapter_name":"Chapter 15: Digital Forensics","num":19,"question":"Gurvinder wants to follow the order of volatility to guide his forensic data acquisition. Which of the following is the least volatile?","options":{"A":"RAM","B":"Data on the hard drive","C":"Backups","D":"Remote logs"},"correct":["C"],"explanation":"Backups are the least volatile of these options according to the order of volatility. Backups will be kept until they are aged out, which may be days, weeks, or even months in some cases. From most to least volatile, these are RAM, data on the hard drive, remote logs, and then backups."},{"chapter":"ch15","chapter_name":"Chapter 15: Digital Forensics","num":20,"question":"What is the key difference between hashing and checksums?","options":{"A":"Both can validate integrity, but a hash also provides a unique digital fingerprint.","B":"A hash can be reversed, and a checksum cannot be.","C":"Checksums provide greater security than hashing.","D":"Checksums have fewer message collisions than a hash."},"correct":["A"],"explanation":"Although both a checksum and a hash can be used to validate message integrity, a hash has fewer collisions than a checksum and will also provide a unique fingerprint for a file. Checksums are primarily used as a quick means of checking that that integrity is maintained, whereas hashes are used for many other purposes such as secure password validation without retaining the original password. A checksum would not be useful for proving a forensic image was identical, but it could be used to ensure that your work had not changed the contents of the drive."},{"chapter":"ch16","chapter_name":"Chapter 16: Security Governance and Compliance","num":1,"question":"Joe is authoring a document that explains to system administrators one way in which they might comply with the organization's requirement to encrypt all laptops. What type of document is Joe writing?","options":{"A":"Policy","B":"Guideline","C":"Procedure","D":"Standard"},"correct":["B"],"explanation":"The key phrase in this scenario is “one way.” This indicates that compliance with the document is not mandatory, so Joe must be authoring a guideline. Policies, standards, and procedures are all mandatory."},{"chapter":"ch16","chapter_name":"Chapter 16: Security Governance and Compliance","num":2,"question":"Which one of the following statements is not true about compensating controls under PCI DSS?","options":{"A":"Controls used to fulfill one PCI DSS requirement may be used to compensate for the absence of a control needed to meet another requirement.","B":"Controls must meet the intent of the original requirement.","C":"Controls must meet the rigor of the original requirement.","D":"Compensating controls must provide a similar level of defense as the original requirement."},"correct":["A"],"explanation":"PCI DSS compensating controls must be “above and beyond” other PCI DSS requirements. This specifically bans the use of a control used to meet one requirement as a compensating control for another requirement."},{"chapter":"ch16","chapter_name":"Chapter 16: Security Governance and Compliance","num":3,"question":"What law creates privacy obligations for those who handle the personal information of European Union residents?","options":{"A":"HIPAA","B":"FERPA","C":"GDPR","D":"PCI DSS"},"correct":["C"],"explanation":"The General Data Protection Regulation (GDPR) implements privacy requirements for handling the personal information of EU residents. The Health Insurance Portability and Accountability Act (HIPAA) includes security and privacy rules that affect health-care providers, health insurers, and health information clearinghouses. The Family Educational Rights and Privacy Act (FERPA) applies to educational institutions. The Payment Card Industry Data Security Standard (PCI DSS) applies to credit and debit card information."},{"chapter":"ch16","chapter_name":"Chapter 16: Security Governance and Compliance","num":4,"question":"Which one of the following is not one of the five core security functions defined by the NIST Cybersecurity Framework?","options":{"A":"Identify","B":"Contain","C":"Respond","D":"Recover"},"correct":["B"],"explanation":"The five security functions described in the NIST Cybersecurity Framework are identify, protect, detect, respond, and recover."},{"chapter":"ch16","chapter_name":"Chapter 16: Security Governance and Compliance","num":5,"question":"What ISO standard provides guidance on privacy controls?","options":{"A":"27002","B":"27001","C":"27701","D":"31000"},"correct":["C"],"explanation":"The International Organization for Standardization (ISO) publishes ISO 27701, covering privacy controls. ISO 27001 and 27002 cover cybersecurity, and ISO 31000 covers risk management."},{"chapter":"ch16","chapter_name":"Chapter 16: Security Governance and Compliance","num":6,"question":"Which one of the following documents must normally be approved by the CEO or similarly high-level executive?","options":{"A":"Standard","B":"Procedure","C":"Guideline","D":"Policy"},"correct":["D"],"explanation":"Policies require approval from the highest level of management, usually the CEO. Other documents may often be approved by other managers, such as the CISO."},{"chapter":"ch16","chapter_name":"Chapter 16: Security Governance and Compliance","num":7,"question":"Greg would like to create an umbrella agreement that provides the security terms and conditions for all future work that his organization does with a vendor. What type of agreement should Greg use?","options":{"A":"BPA","B":"MOU","C":"MSA","D":"SLA"},"correct":["C"],"explanation":"Master service agreements (MSAs) provide an umbrella contract for the work that a vendor does with an organization over an extended period of time. The MSA typically includes detailed security and privacy requirements. Each time the organization enters into a new project with the vendor, they may then create a statement of work (SOW) that contains project-specific details and references the MSA."},{"chapter":"ch16","chapter_name":"Chapter 16: Security Governance and Compliance","num":8,"question":"What organization is known for creating independent security benchmarks covering hardware and software platforms from many different vendors?","options":{"A":"Microsoft","B":"Center for Internet Security","C":"Cloud Security Alliance","D":"Cisco"},"correct":["B"],"explanation":"All of these organizations produce security standards and benchmarks. However, only the Center for Internet Security (CIS) is known for producing independent benchmarks covering a wide variety of software and hardware."},{"chapter":"ch16","chapter_name":"Chapter 16: Security Governance and Compliance","num":9,"question":"What do many organizations use to schedule and coordinate changes for information systems?","options":{"A":"Impact analysis","B":"Backout plans","C":"Maintenance windows","D":"Version control"},"correct":["C"],"explanation":"Many organizations use scheduled maintenance windows to coordinate changes to information systems. These windows are preplanned and announced times when all non-emergency changes will take place and often occur on evenings and weekends. A change management process ensures that personnel can perform a security impact analysis. Experts ev
