<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompTIA Security+ SY0-701 Quiz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0f1419;--surface:#1a2332;--surface2:#243044;--surface3:#2d3b50;
--accent:#00d4aa;--accent2:#00b894;--accent-dim:rgba(0,212,170,0.12);
--red:#ff6b6b;--red-dim:rgba(255,107,107,0.12);
--yellow:#ffd93d;--yellow-dim:rgba(255,217,61,0.12);
--blue:#74b9ff;--blue-dim:rgba(116,185,255,0.12);
--text:#e8edf3;--text2:#9aa8b9;--text3:#5d6d7e;
--radius:10px;--radius-sm:6px;
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.container{max-width:900px;margin:0 auto;padding:16px}
button{cursor:pointer;border:none;font-family:inherit;font-size:inherit;transition:all .2s}
/* HEADER */
.app-header{text-align:center;padding:32px 0 24px;border-bottom:1px solid var(--surface2);margin-bottom:24px}
.app-header h1{font-size:1.6em;font-weight:700;color:var(--accent);letter-spacing:-0.5px}
.app-header p{color:var(--text2);font-size:.9em;margin-top:4px}
/* SCREEN: HOME */
#home-screen .mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:24px 0}
.mode-card{background:var(--surface);border:2px solid var(--surface2);border-radius:var(--radius);padding:24px;text-align:center;transition:all .2s}
.mode-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.mode-card.selected{border-color:var(--accent);background:var(--accent-dim)}
.mode-card h3{font-size:1.1em;margin-bottom:6px}
.mode-card p{color:var(--text2);font-size:.82em}
.mode-icon{font-size:2em;margin-bottom:8px}
.chapter-select{margin:24px 0}
.chapter-select h3{font-size:1em;margin-bottom:12px;color:var(--text2)}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.ch-btn{background:var(--surface);border:1.5px solid var(--surface2);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);text-align:left;font-size:.82em;display:flex;justify-content:space-between;align-items:center}
.ch-btn:hover{border-color:var(--accent)}
.ch-btn.selected{border-color:var(--accent);background:var(--accent-dim)}
.ch-btn .ch-count{color:var(--text3);font-size:.8em}
.select-actions{display:flex;gap:8px;margin:12px 0}
.select-actions button{background:var(--surface2);color:var(--text2);padding:6px 14px;border-radius:var(--radius-sm);font-size:.8em}
.select-actions button:hover{background:var(--surface3)}
.start-btn{display:block;width:100%;max-width:320px;margin:28px auto 0;padding:14px;background:var(--accent);color:var(--bg);font-weight:700;font-size:1.05em;border-radius:var(--radius);letter-spacing:.3px}
.start-btn:hover{background:var(--accent2);transform:translateY(-1px)}
.start-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
/* SCREEN: QUIZ */
.quiz-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.progress-wrap{flex:1;min-width:120px}
.progress-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.progress-label{font-size:.75em;color:var(--text2);margin-top:4px}
.quiz-stats{display:flex;gap:16px;font-size:.82em;color:var(--text2)}
.quiz-stats span{display:flex;align-items:center;gap:4px}
.stat-correct{color:var(--accent)}
.stat-wrong{color:var(--red)}
.q-card{background:var(--surface);border-radius:var(--radius);padding:24px;margin-bottom:16px}
.q-number{font-size:.78em;color:var(--accent);font-weight:600;margin-bottom:4px;display:flex;justify-content:space-between}
.q-chapter{color:var(--text3);font-weight:400;font-size:.9em}
.q-text{font-size:1.02em;margin:10px 0 6px;line-height:1.65}
.q-text-th{font-size:.88em;color:var(--text2);margin-bottom:16px;font-style:italic;line-height:1.55}
.options-list{display:flex;flex-direction:column;gap:8px}
.opt-btn{background:var(--surface2);border:1.5px solid transparent;border-radius:var(--radius-sm);padding:12px 16px;color:var(--text);text-align:left;font-size:.92em;display:flex;gap:10px;align-items:flex-start;line-height:1.5}
.opt-btn:hover:not(.locked){background:var(--surface3);border-color:var(--text3)}
.opt-btn.selected{border-color:var(--blue);background:var(--blue-dim)}
.opt-btn.correct{border-color:var(--accent);background:var(--accent-dim)}
.opt-btn.wrong{border-color:var(--red);background:var(--red-dim)}
.opt-btn.locked{cursor:default}
.opt-letter{font-weight:700;color:var(--text2);min-width:22px}
.explanation-box{margin-top:16px;padding:16px;background:var(--surface2);border-radius:var(--radius-sm);border-left:3px solid var(--accent);font-size:.88em;line-height:1.6}
.explanation-box h4{color:var(--accent);margin-bottom:6px;font-size:.9em}
.explanation-box .exp-th{color:var(--text2);margin-top:8px;font-style:italic}
.nav-buttons{display:flex;gap:10px;justify-content:space-between;margin-top:20px}
.nav-btn{padding:10px 24px;border-radius:var(--radius-sm);font-weight:600;font-size:.9em}
.nav-prev{background:var(--surface2);color:var(--text)}
.nav-prev:hover{background:var(--surface3)}
.nav-next{background:var(--accent);color:var(--bg)}
.nav-next:hover{background:var(--accent2)}
.nav-finish{background:var(--yellow);color:var(--bg)}
.nav-finish:hover{filter:brightness(1.1)}
/* NAVIGATOR */
.nav-toggle{background:var(--surface2);color:var(--text2);padding:8px 16px;border-radius:var(--radius-sm);font-size:.8em;margin-bottom:16px}
.nav-grid{display:none;grid-template-columns:repeat(auto-fill,minmax(38px,1fr));gap:6px;margin-bottom:20px;padding:12px;background:var(--surface);border-radius:var(--radius-sm)}
.nav-grid.open{display:grid}
.nav-cell{width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);font-size:.78em;font-weight:600;background:var(--surface2);color:var(--text2);border:1.5px solid transparent}
.nav-cell:hover{border-color:var(--text3)}
.nav-cell.current{border-color:var(--accent);color:var(--accent)}
.nav-cell.answered{background:var(--accent-dim);color:var(--accent)}
.nav-cell.wrong-ans{background:var(--red-dim);color:var(--red)}
/* SCREEN: RESULTS */
.result-card{text-align:center;padding:40px 24px;background:var(--surface);border-radius:var(--radius);margin-bottom:24px}
.result-score{font-size:3.5em;font-weight:800;margin:16px 0 8px}
.result-score.pass{color:var(--accent)}
.result-score.fail{color:var(--red)}
.result-badge{display:inline-block;padding:6px 20px;border-radius:20px;font-weight:700;font-size:1.1em;margin-bottom:12px}
.result-badge.pass{background:var(--accent-dim);color:var(--accent)}
.result-badge.fail{background:var(--red-dim);color:var(--red)}
.result-details{color:var(--text2);font-size:.9em}
.result-breakdown{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:24px 0}
.rb-item{background:var(--surface);border-radius:var(--radius-sm);padding:16px;text-align:center}
.rb-num{font-size:1.8em;font-weight:700}
.rb-label{font-size:.78em;color:var(--text2);margin-top:4px}
.review-section h3{font-size:1.05em;margin-bottom:16px;color:var(--text2)}
.review-q{background:var(--surface);border-radius:var(--radius-sm);padding:16px;margin-bottom:10px;border-left:3px solid var(--red)}
.review-q.correct-review{border-left-color:var(--accent)}
.review-q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.review-q-num{font-size:.8em;font-weight:600;color:var(--text2)}
.review-q-result{font-size:.78em;font-weight:600;padding:2px 8px;border-radius:10px}
.review-q-result.wrong-r{background:var(--red-dim);color:var(--red)}
.review-q-result.correct-r{background:var(--accent-dim);color:var(--accent)}
.review-q-text{font-size:.9em;margin-bottom:8px}
.review-answer{font-size:.82em;color:var(--text2)}
.result-actions{display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.result-actions button{padding:12px 28px;border-radius:var(--radius-sm);font-weight:600}
.filter-btns{display:flex;gap:8px;margin-bottom:16px}
.filter-btns button{padding:6px 14px;border-radius:var(--radius-sm);background:var(--surface2);color:var(--text2);font-size:.8em}
.filter-btns button.active{background:var(--accent-dim);color:var(--accent)}
/* HIDE/SHOW */
.screen{display:none}
.screen.active{display:block}
/* RESPONSIVE */
@media(max-width:600px){
 #home-screen .mode-cards{grid-template-columns:1fr}
 .ch-grid{grid-template-columns:1fr}
 .result-breakdown{grid-template-columns:1fr}
 .quiz-bar{flex-direction:column;align-items:stretch}
 .q-card{padding:16px}
}
/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(15,20,25,.9);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--surface2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--text2);font-size:.9em}
</style>
</head>
<body>
<div class="container">
<header class="app-header">
<h1>🔐 CompTIA Security+ SY0-701</h1>
<p>339 Practice Questions — 17 Chapters</p>
</header>

<!-- HOME SCREEN -->
<div id="home-screen" class="screen active">
<div class="mode-cards">
<div class="mode-card selected" data-mode="practice" onclick="selectMode('practice')">
<div class="mode-icon">📖</div>
<h3>Practice Mode</h3>
<p>เฉลยทันทีหลังตอบแต่ละข้อ<br>ดูคำอธิบายได้เลย</p>
</div>
<div class="mode-card" data-mode="exam" onclick="selectMode('exam')">
<div class="mode-icon">📝</div>
<h3>Exam Mode</h3>
<p>เฉลยตอนจบเท่านั้น<br>จำลองสอบจริง</p>
</div>
</div>

<div class="chapter-select">
<h3>เลือกบทที่ต้องการทดสอบ</h3>
<div class="select-actions">
<button onclick="toggleAll(true)">✅ เลือกทั้งหมด</button>
<button onclick="toggleAll(false)">❌ ยกเลิกทั้งหมด</button>
</div>
<div class="ch-grid" id="ch-grid"></div>
</div>

<button class="start-btn" id="start-btn" onclick="startQuiz()">เริ่มทดสอบ</button>
<p style="text-align:center;color:var(--text3);font-size:.8em;margin-top:8px" id="q-count-label"></p>
</div>

<!-- QUIZ SCREEN -->
<div id="quiz-screen" class="screen">
<div class="quiz-bar">
<div class="progress-wrap">
<div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
<div class="progress-label" id="progress-label"></div>
</div>
<div class="quiz-stats">
<span class="stat-correct" id="stat-correct">✓ 0</span>
<span class="stat-wrong" id="stat-wrong">✗ 0</span>
<span id="stat-unanswered">○ 0</span>
</div>
</div>
<button class="nav-toggle" onclick="toggleNav()">📋 Question Navigator</button>
<div class="nav-grid" id="nav-grid"></div>
<div id="question-area"></div>
<div class="nav-buttons">
<button class="nav-btn nav-prev" id="btn-prev" onclick="goQ(-1)">← ก่อนหน้า</button>
<button class="nav-btn nav-next" id="btn-next" onclick="goQ(1)">ถัดไป →</button>
</div>
</div>

<!-- RESULTS SCREEN -->
<div id="results-screen" class="screen"></div>
</div>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loading" style="display:none">
<div class="spinner"></div>
<div class="loading-text">กำลังแปลคำถาม...</div>
</div>

<script>
const QUESTIONS=[{"chapter":"ch1","chapter_name":"Chapter 1: Today's Security Professional","num":1,"question":"Matt is updating the organization's threat assessment process. What category of control is Matt implementing?","options":{"A":"Operational","B":"Technical","C":"Corrective","D":"Managerial"},"correct":["D"],"explanation":"Managerial controls are procedural mechanisms that focus on the mechanics of the risk management process. Threat assessment is an example of one of these activities."},{"chapter":"ch1","chapter_name":"Chapter 1: Today's Security Professional","num":2,"question":"Jade's organization recently suffered a security breach that affected stored credit card data. Jade's primary concern is the fact that the organization is subject to sanctions for violating the provisions of the Payment Card Industry Data Security Standard. What category of risk is concerning Jade?","options":{"A":"Strategic","B":"Compliance","C":"Operational","D":"Financial"},"correct":["B"],"explanation":"The breach of credit card information may cause many different impacts on the organization, including compliance, operational, and financial risks. However, in this scenario, Jade's primary concern is violating PCI DSS, making his concern a compliance risk."},{"chapter":"ch1","chapter_name":"Chapter 1: Today's Security Professional","num":3,"question":"Chris is responding to a security incident that compromised one of his organization's web servers. He believes that the attackers defaced one or more pages on the website. What cybersecurity objective did this attack violate?","options":{"A":"Confidentiality","B":"Nonrepudiation","C":"Integrity","D":"Availability"},"correct":["C"],"explanation":"The defacement of a website alters content without authorization and is, therefore, a violation of the integrity objective. The attackers may also have breached the confidentiality or availability of the website, but the scenario does not provide us with enough information to draw those conclusions."},{"chapter":"ch1","chapter_name":"Chapter 1: Today's Security Professional","num":4,"question":"Gwen is exploring a customer transaction reporting system and discovers the table shown here. What type of data minimization has most likely been used on this table?","options":{"A":"Destruction","B":"Masking","C":"Tokenization","D":"Hashing"},"correct":["B"],"explanation":"In this case, the first 12 digits of the credit card have been removed and replaced with asterisks. This is an example of data masking."},{"chapter":"ch1","chapter_name":"Chapter 1: Today's Security Professional","num":5,"question":"Tonya is concerned about the risk that an attacker will attempt to gain access to her organization's database server. She is searching for a control that would discourage the attacker from attempting to gain access. What type of security control is she seeking to implement?","options":{"A":"Preventive","B":"Detective","C":"Corrective","D":"Deterrent"},"correct":["D"],"explanation":"Deterrent controls are designed to prevent an attacker from attempting to violate security policies in the first place. Preventive controls would attempt to block an attack that was about to take place. Corrective controls would remediate the issues that arose during an attack. Detective controls detect issues or indicators of issues."},{"chapter":"ch1","chapter_name":"Chapter 1: Today's Security Professional","num":6,"question":"Greg is implementing a data loss prevention system. He would like to ensure that it protects against transmissions of sensitive information by guests on his wireless network. What DLP technology would best meet this goal?","options":{"A":"Watermarking","B":"Pattern recognition","C":"Host-based","D":"Network-based"},"correct":["D"],"explanation":"In this case, Greg must use a network-based DLP system. Host- based DLP requires the use of agents, which would not be installed on guest systems. Greg may use watermarking and/or pattern recognition to identify the sensitive information, but he must use network-based DLP to meet his goal."},{"chapter":"ch1","chapter_name":"Chapter 1: Today's Security Professional","num":7,"question":"What term best describes data that is being sent between two systems over a network connection?","options":{"A":"Data at rest","B":"Data in transit","C":"Data in processing","D":"Data in use"},"correct":["B"],"explanation":"Data being sent over a network is data in transit. Data at rest is stored data that resides on hard drives, tapes, in the cloud, or on other storage media. Data in processing, or data in use, is data that is actively in use by a computer system."},{"chapter":"ch1","chapter_name":"Chapter 1: Today's Security Professional","num":8,"question":"Tina is tuning her organization's intrusion prevention system to prevent false positive alerts. What type of control is Tina implementing?","options":{"A":"Technical control","B":"Physical control","C":"Managerial control","D":"Operational control"},"correct":["A"],"explanation":"Technical controls enforce confidentiality, integrity, and availability in the digital space. Examples of technical security controls include firewall rules, access control lists, intrusion prevention systems, and encryption."},{"chapter":"ch1","chapter_name":"Chapter 1: Today's Security Professional","num":9,"question":"Which one of the following is not a common goal of a cybersecurity attacker?","options":{"A":"Disclosure","B":"Denial","C":"Alteration","D":"Allocation"},"correct":["D"],"explanation":"The three primary goals of cybersecurity attackers are disclosure, alteration, and denial. These map directly to the three objectives of cybersecurity professionals: confidentiality, integrity, and availability."},{"chapter":"ch1","chapter_name":"Chapter 1: Today's Security Professional","num":10,"question":"Tony is reviewing the status of his organization's defenses against a breach of their file server. He believes that a compromise of the file server could reveal information that would prevent the company from continuing to do business. What term best describes the risk that Tony is considering?","options":{"A":"Strategic","B":"Reputational","C":"Financial","D":"Operational"},"correct":["A"],"explanation":"The risk that Tony is contemplating could fit any one of these categories. However, his primary concern is that the company may no longer be able to do business if the risk materializes. This is a strategic risk."},{"chapter":"ch1","chapter_name":"Chapter 1: Today's Security Professional","num":11,"question":"Which one of the following data elements is not commonly associated with identity theft?","options":{"A":"Social Security number","B":"Driver's license number","C":"Frequent flyer number","D":"Passport number"},"correct":["C"],"explanation":"Although it is possible that a frequent flyer account number, or any other account number for that matter, could be used in identity theft, it is far more likely that identity thieves would use core identity documents. These include drivers' licenses, passports, and Social Security numbers."},{"chapter":"ch1","chapter_name":"Chapter 1: Today's Security Professional","num":12,"question":"What term best describes an organization's desired security state?","options":{"A":"Control objectives","B":"Security priorities","C":"Strategic goals","D":"Best practices"},"correct":["A"],"explanation":"As an organization analyzes its risk environment, technical and business leaders determine the level of protection required to preserve the confidentiality, integrity, and availability of their information and systems. They express these requirements by writing the control objectives that the organization wishes to achieve. These control objectives are statements of a desired security state."},{"chapter":"ch1","chapter_name":"Chapter 1: Today's Security Professional","num":13,"question":"Lou mounted the sign below on the fence surrounding his organization's datacenter. What control type best describes this control? Source: Gabriel Cassan / Adobe Stock","options":{"A":"Compensating","B":"Detective","C":"Physical","D":"Deterrent"},"correct":["D"],"explanation":"This question is a little tricky. The use of an actual guard dog could be considered a deterrent, physical, or detective control. It could even be a compensating control in some circumstances. However, the question asks about the presence of a sign and does not state that an actual dog is used. The sign only has value as a deterrent control. Be careful when facing exam questions like this to read the details of the question."},{"chapter":"ch1","chapter_name":"Chapter 1: Today's Security Professional","num":14,"question":"What technology uses mathematical algorithms to render information unreadable to those lacking the required key?","options":{"A":"Data loss prevention","B":"Data obfuscation","C":"Data minimization","D":"Data encryption"},"correct":["D"],"explanation":"Encryption technology uses mathematical algorithms to protect information from prying eyes, both while it is in transit over a network and while it resides on systems. Encrypted data is unintelligible to anyone who does not have access to the appropriate decryption key, making it safe to store and transmit encrypted data over otherwise insecure means."},{"chapter":"ch1","chapter_name":"Chapter 1: Today's Security Professional","num":15,"question":"Greg recently conducted an assessment of his organization's security controls and discovered a potential gap: the organization does not use full-disk encryption on laptops. What type of control gap exists in this case?","options":{"A":"Detective","B":"Corrective","C":"Deterrent","D":"Preventive"},"correct":["D"],"explanation":"The use of full-disk encryption is intended to prevent a security incident from occurring if a device is lost or stolen. Therefore, this is a preventive control gap."},{"chapter":"ch1","chapter_name":"Chapter 1: Today's Security Professional","num":16,"question":"What compliance regulation most directly affects the operations of a health-care provider?","options":{"A":"HIPAA","B":"PCI DSS","C":"GLBA","D":"SOX"},"correct":["A"],"explanation":"Although a health-care provider may be impacted by any of these regulations, the Health Insurance Portability and Accountability Act (HIPAA) provides direct regulations for the security and privacy of protected health information and would have the most direct impact on a health-care provider."},{"chapter":"ch1","chapter_name":"Chapter 1: Today's Security Professional","num":17,"question":"Nolan is writing an after action report on a security breach that took place in his organization. The attackers stole thousands of customer records from the organization's database. What cybersecurity principle was most impacted in this breach?","options":{"A":"Availability","B":"Nonrepudiation","C":"Confidentiality","D":"Integrity"},"correct":["C"],"explanation":"The disclosure of sensitive information to unauthorized individuals is a violation of the principle of confidentiality."},{"chapter":"ch1","chapter_name":"Chapter 1: Today's Security Professional","num":18,"question":"Which one of the following objectives is not one of the three main objectives that information security professionals must achieve to protect their organizations against cybersecurity threats?","options":{"A":"Integrity","B":"Nonrepudiation","C":"Availability","D":"Confidentiality"},"correct":["B"],"explanation":"The three primary objectives of cybersecurity professionals are confidentiality, integrity, and availability."},{"chapter":"ch1","chapter_name":"Chapter 1: Today's Security Professional","num":19,"question":"Which one of the following data protection techniques is reversible when conducted properly?","options":{"A":"Tokenization","B":"Masking","C":"Hashing","D":"Shredding"},"correct":["A"],"explanation":"Tokenization techniques use a lookup table and are designed to be reversible. Masking and hashing techniques replace the data with values that can't be reversed back to the original data if performed properly. Shredding, when conducted properly, physically destroys data so that it may not be recovered."},{"chapter":"ch1","chapter_name":"Chapter 1: Today's Security Professional","num":20,"question":"Which one of the following statements is not true about compensating controls under PCI DSS?","options":{"A":"Controls used to fulfill one PCI DSS requirement may be used to compensate for the absence of a control needed to meet another requirement.","B":"Controls must meet the intent of the original requirement.","C":"Controls must meet the rigor of the original requirement.","D":"Compensating controls must provide a similar level of defense as the original requirement."},"correct":["A"],"explanation":"PCI DSS compensating controls must be “above and beyond” other PCI DSS requirements. This specifically bans the use of a control used to meet one requirement as a compensating control for another requirement."},{"chapter":"ch2","chapter_name":"Chapter 2: Cybersecurity Threat Landscape","num":1,"question":"Which of the following measures is not commonly used to assess threat intelligence?","options":{"A":"Timeliness","B":"Detail","C":"Accuracy","D":"Relevance"},"correct":["B"],"explanation":"Although higher levels of detail can be useful, they aren't a common measure used to assess threat intelligence. Instead, the timeliness, accuracy, and relevance of the information are considered critical to determining whether you should use the threat information."},{"chapter":"ch2","chapter_name":"Chapter 2: Cybersecurity Threat Landscape","num":2,"question":"Which one of the following motivations is most commonly attributed to hacktivists?","options":{"A":"War","B":"Financial gain","C":"Political/philosophical beliefs","D":"Ethical"},"correct":["C"],"explanation":"Hacktivists are defined by the motivation behind their actions— advancing their political or philosophical beliefs. They engage in cyberattacks that they believe will advance their causes."},{"chapter":"ch2","chapter_name":"Chapter 2: Cybersecurity Threat Landscape","num":3,"question":"Kolin is a penetration tester who works for a cybersecurity company. His firm was hired to conduct a penetration test against a health-care system, and Kolin is working to gain access to the systems belonging to a hospital in that system. What term best describes Kolin's work?","options":{"A":"Authorized attacker","B":"Unauthorized attacker","C":"Unknown attacker","D":"Semi-authorized attacker"},"correct":["A"],"explanation":"Attacks that are conducted as part of an authorized penetration test are white-hat hacking attacks, regardless of whether they are conducted by internal employees or an external firm. Kolin is, therefore, engaged in white-hat hacking. If he were acting on his own, without authorization, his status would depend on his intent. If he had malicious intent, his activity would be considered black-hat hacking. If he simply intended to report vulnerabilities to the hospital, his attack would be considered gray hat and he would likely be semi-authorized."},{"chapter":"ch2","chapter_name":"Chapter 2: Cybersecurity Threat Landscape","num":4,"question":"Which one of the following attackers is most likely to be associated with an APT?","options":{"A":"Nation-state actor","B":"Hacktivist","C":"Unskilled","D":"Insider"},"correct":["A"],"explanation":"Advanced persistent threats (APTs) are most commonly associated with nation-state actors. It is unlikely that an APT group would leverage the unsophisticated services of an unskilled script kiddie type attacker. It is also unlikely that a hacktivist would have access to APT resources. Although APTs may take advantage of insider access, they are most commonly associated with nation-state actors."},{"chapter":"ch2","chapter_name":"Chapter 2: Cybersecurity Threat Landscape","num":5,"question":"Which organization did the U.S. government help create to share knowledge between organizations in specific verticals?","options":{"A":"DHS","B":"SANS","C":"CERTS","D":"ISACs"},"correct":["D"],"explanation":"The U.S. government created the Information Sharing and Analysis Centers (ISACs). ISACs help infrastructure owners and operators share threat information, and provide tools and assistance to their members."},{"chapter":"ch2","chapter_name":"Chapter 2: Cybersecurity Threat Landscape","num":6,"question":"Which of the following threat actors typically has the greatest access to resources?","options":{"A":"Nation-state actors","B":"Organized crime","C":"Hacktivists","D":"Insider threats"},"correct":["A"],"explanation":"Nation-state actors are government sponsored, and they typically have the greatest access to resources, including tools, money, and talent."},{"chapter":"ch2","chapter_name":"Chapter 2: Cybersecurity Threat Landscape","num":7,"question":"Of the threat vectors shown here, which one is most commonly exploited by attackers who are at a distant location?","options":{"A":"Email","B":"Direct access","C":"Wireless","D":"Removable media"},"correct":["A"],"explanation":"Email is the most common threat vector exploited by attackers who use phishing and other social engineering tactics to gain access to an organization. The other vectors listed here, direct access, wireless, and removable media, all require physical proximity to an organization and are not easily executed from a remote location."},{"chapter":"ch2","chapter_name":"Chapter 2: Cybersecurity Threat Landscape","num":8,"question":"Which one of the following is the best example of a hacktivist group?","options":{"A":"Chinese military","B":"U.S. government","C":"Russian mafia","D":"Anonymous"},"correct":["D"],"explanation":"The Chinese military and U.S. government are examples of nation- state actors and advanced persistent threats (APTs). The Russian mafia is an example of a criminal syndicate. Anonymous is the world's most prominent hacktivist group."},{"chapter":"ch2","chapter_name":"Chapter 2: Cybersecurity Threat Landscape","num":9,"question":"What type of assessment is particularly useful for identifying insider threats?","options":{"A":"Behavioral","B":"Instinctual","C":"Habitual","D":"IoCs"},"correct":["A"],"explanation":"Behavioral assessments are very useful when you are attempting to identify insider threats. Since insider threats are often hard to distinguish from normal behavior, the context of the actions performed —such as after-hours logins, misuse of credentials, logins from abnormal locations, or abnormal patterns—and other behavioral indicators are often used."},{"chapter":"ch2","chapter_name":"Chapter 2: Cybersecurity Threat Landscape","num":10,"question":"Cindy is concerned that her organization may be targeted by a supply chain attack and is conducting a review of all of her vendor and supplier partners. Which one of the following organizations is least likely to be the conduit for a supply chain attack?","options":{"A":"Hardware provider","B":"Software provider","C":"Managed service provider","D":"Talent provider"},"correct":["D"],"explanation":"Supply chain attacks are typically associated with vendors and suppliers that provide technology infrastructure or services that may be compromised. This would include hardware and software providers as well as managed service providers (MSPs). Talent providers, who help with staffing solutions, are generally not considered common avenues for supply chain attacks."},{"chapter":"ch2","chapter_name":"Chapter 2: Cybersecurity Threat Landscape","num":11,"question":"Greg believes that an attacker may have installed malicious firmware in a network device before it was provided to his organization by the supplier. What type of threat vector best describes this attack?","options":{"A":"Supply chain","B":"Removable media","C":"Cloud","D":"Direct access"},"correct":["A"],"explanation":"Tampering with equipment before it reaches the intended user is an example of a supply chain threat. It is also possible to describe this attack as a direct access attack because it involved physical access to the device, but supply chain is a more relevant answer. You should be prepared to select the best possible choice from several possible correct answers when you take the exam. Security+ questions often use this type of misdirection."},{"chapter":"ch2","chapter_name":"Chapter 2: Cybersecurity Threat Landscape","num":12,"question":"Ken is conducting threat research on Transport Layer Security (TLS) and would like to consult the authoritative reference for the protocol's technical specification. What resource would best meet his needs?","options":{"A":"Academic journal","B":"Internet RFCs","C":"Subject matter experts","D":"Textbooks"},"correct":["B"],"explanation":"All of these resources might contain information about the technical details of TLS, but Internet Request for Comments (RFC) documents are the definitive technical standards for Internet protocols. Consulting the RFCs would be Ken's best option."},{"chapter":"ch2","chapter_name":"Chapter 2: Cybersecurity Threat Landscape","num":13,"question":"Wendy is scanning cloud-based repositories for sensitive information. Which one of the following should concern her most, if discovered in a public repository?","options":{"A":"Product manuals","B":"Source code","C":"API keys","D":"Open source data"},"correct":["C"],"explanation":"All of these items could be concerning, depending on the circumstances. However, API keys should never be found in public repositories because they may grant unauthorized individuals access to information and resources."},{"chapter":"ch2","chapter_name":"Chapter 2: Cybersecurity Threat Landscape","num":14,"question":"Which one of the following threat research tools is used to visually display information about the location of threat actors?","options":{"A":"Threat map","B":"Predictive analysis","C":"Vulnerability feed","D":"STIX"},"correct":["A"],"explanation":"Threat maps are graphical tools that display information about the geographic locations of attackers and their targets. These tools are most often used as interesting marketing gimmicks, but they can also help identify possible threat sources."},{"chapter":"ch2","chapter_name":"Chapter 2: Cybersecurity Threat Landscape","num":15,"question":"Vince recently received the hash values of malicious software that several other firms in his industry found installed on their systems after a compromise. What term best describes this information?","options":{"A":"Vulnerability feed","B":"IoC","C":"TTP","D":"RFC"},"correct":["B"],"explanation":"Specific details of attacks that may be used to identify compromises are known as indicators of compromise (IoCs). This data may also be described as an adversary tactics, techniques, and procedures (TTP), but the fact that it is a set of file signatures makes it more closely match the definition of an IoC."},{"chapter":"ch2","chapter_name":"Chapter 2: Cybersecurity Threat Landscape","num":16,"question":"Ursula recently discovered that a group of developers are sharing information over a messaging tool provided by a cloud vendor but not sanctioned by her organization. What term best describes this use of technology?","options":{"A":"Shadow IT","B":"System integration","C":"Vendor management","D":"Data exfiltration"},"correct":["A"],"explanation":"The developers in question are using unapproved technology for business purposes. This is the classic definition of shadow IT. It is possible to describe this as data exfiltration, but there is no indication that the data security has been compromised, so shadow IT is a better description here. Remember, you will often be asked to choose the best answer from multiple correct answers on the exam."},{"chapter":"ch2","chapter_name":"Chapter 2: Cybersecurity Threat Landscape","num":17,"question":"Tom's organization recently learned that the vendor is discontinuing support for their customer relationship management (CRM) system. What should concern Tom the most from a security perspective?","options":{"A":"Unavailability of future patches","B":"Lack of technical support","C":"Theft of customer information","D":"Increased costs"},"correct":["A"],"explanation":"Tom's greatest concern should be that running unsupported software exposes his organization to the risk of new, unpatchable vulnerabilities. It is certainly true that they will no longer receive technical support, but this is a less important issue from a security perspective. There is no indication in the scenario that discontinuing the product will result in the theft of customer information or increased costs."},{"chapter":"ch2","chapter_name":"Chapter 2: Cybersecurity Threat Landscape","num":18,"question":"Which one of the following information sources would not be considered an OSINT source?","options":{"A":"DNS lookup","B":"Search engine research","C":"Port scans","D":"WHOIS queries"},"correct":["C"],"explanation":"Port scans are an active reconnaissance technique that probe target systems and would not be considered open source intelligence (OSINT). Search engine research, DNS lookups, and WHOIS queries are all open source resources."},{"chapter":"ch2","chapter_name":"Chapter 2: Cybersecurity Threat Landscape","num":19,"question":"Edward Snowden was a government contractor who disclosed sensitive government documents to journalists to uncover what he believed were unethical activities. Which of the following terms best describe Snowden's activities? (Choose two.)","options":{"A":"Insider","B":"State actor","C":"Hacktivist","D":"APT","E":"Organized crime"},"correct":["A","C"],"explanation":"As a government contractor, Snowden had authorized access to classified information and exploited this access to make an unauthorized disclosure of that information. This clearly makes him fit into the category of an insider. He did so with political motivations, making him fit the category of hacktivist as well."},{"chapter":"ch2","chapter_name":"Chapter 2: Cybersecurity Threat Landscape","num":20,"question":"Renee is a cybersecurity hobbyist. She receives an email about a new web-based grading system being used by her son's school and she visits the site. She notices that the URL for the site looks like this: www.myschool.edu/grades.php&studentID=1023425 She realizes that 1023425 is her son's student ID number and she then attempts to access the following similar URLs: www.myschool.edu/grades.php&studentID=1023423 www.myschool.edu/grades.php&studentID=1023424 www.myschool.edu/grades.php&studentID=1023426 www.myschool.edu/grades.php&studentID=1023427 When she does so, she accesses the records of other students. She closes the records and immediately informs the school principal of the vulnerability. What term best describes Renee's work?","options":{"A":"Authorized hacking","B":"Unknown hacking","C":"Semi-authorized hacking","D":"Unauthorized hacking"},"correct":["C"],"explanation":"Renee was not authorized to perform this security testing, so her work does not fit into the category of white-hat hacking, or authorized hacking. However, she also does not have malicious intent, so her work cannot be categorized as an unauthorized, or black-hat attack. Instead, it fits somewhere in between the two extremes and would best be described as semi-authorized, or gray-hat hacking."},{"chapter":"ch3","chapter_name":"Chapter 3: Malicious Code","num":1,"question":"Ryan wants to prevent logic bombs created by insider threats from impacting his organization. What technique will most effectively limit the likelihood of logic bombs being put in place?","options":{"A":"Deploying antivirus software","B":"Using a code review process","C":"Deploying endpoint detection and response (EDR) software","D":"Disabling autorun for USB drives"},"correct":["B"],"explanation":"Logic bombs are embedded in code, so Ryan's organization would get the most benefit from a code review process for any code that goes into production. Antivirus and EDR are unlikely to detect logic bombs created by staff in Ryan's organization."},{"chapter":"ch3","chapter_name":"Chapter 3: Malicious Code","num":2,"question":"Yasmine believes that her organization may be dealing with an advanced rootkit and wants to write IoC definitions for it. Which of the following is not likely to be a useful IoC for a rootkit?","options":{"A":"File hashes","B":"Command and control domains","C":"Pop-ups demanding a ransom","D":"Behavior-based identifiers"},"correct":["C"],"explanation":"Rootkits are intended to be stealthy, and a pop-up demanding ransom works against that purpose. File hashes, command and control details, and behavior-based identifiers are all useful IoCs likely to be relevant to a rootkit."},{"chapter":"ch3","chapter_name":"Chapter 3: Malicious Code","num":3,"question":"Nathan works at a school and notices that one of his staff appears to have logged in and changed grades for a single student to higher grades, even in classes that staff member is not responsible for. When asked, the staff member says that they did not perform the action. Which of the following is the most likely way that a student could have gotten access to the staff member's password?","options":{"A":"A keylogger","B":"A rootkit","C":"Spyware","D":"A logic bomb"},"correct":["A"],"explanation":"Nathan should check the staff member's computer for a keylogger, which would have captured their username and password. A student could have then used the staff member's credentials to make the changes described. A rootkit would be used to retain access, spyware gathers a variety of data but is not specifically aimed at capturing keystrokes like this, and logic bombs have specific events or triggers that cause them to take action."},{"chapter":"ch3","chapter_name":"Chapter 3: Malicious Code","num":4,"question":"Amanda notices traffic between her systems and a known malicious host on TCP port 6667. What type of traffic is she most likely detecting?","options":{"A":"Command and control","B":"Spyware","C":"A worm","D":"A hijacked web browser"},"correct":["A"],"explanation":"Amanda has most likely discovered a botnet's command and control channel, and the system or systems she is monitoring are probably using IRC as the command and control channel. Spyware is likely to simply send data to a central server via HTTP/HTTPS, worms spread by attacking vulnerable services, and a hijacked web browser would probably operate on common HTTP or HTTPS ports (80/443)."},{"chapter":"ch3","chapter_name":"Chapter 3: Malicious Code","num":5,"question":"Mike discovers that attackers have left software that allows them to have remote access to systems on a computer in his company's network. How should he describe or classify this malware?","options":{"A":"A worm","B":"Crypto malware","C":"A trojan","D":"A backdoor"},"correct":["D"],"explanation":"Remote access to a system is typically provided by a backdoor. Backdoors may also appear in firmware or even in hardware. None of the other items listed provide remote access by default, although they may have a backdoor as part of a more capable malware package."},{"chapter":"ch3","chapter_name":"Chapter 3: Malicious Code","num":6,"question":"What is the primary impact of bloatware?","options":{"A":"Consuming resources","B":"Logging keystrokes","C":"Providing information about users and devices to third parties","D":"Allowing unauthorized remote access"},"correct":["A"],"explanation":"Bloatware is typically not a significant security threat, but it consumes resources like disk space, CPU, and memory. Unfortunately, some bloatware can be vulnerable and may not get regularly patched, meaning it's both useless and a potential risk!"},{"chapter":"ch3","chapter_name":"Chapter 3: Malicious Code","num":7,"question":"What type of malware is used to gather information about a user's browsing habits and system?","options":{"A":"A Trojan","B":"Bloatware","C":"Spyware","D":"A rootkit"},"correct":["C"],"explanation":"Spyware is specifically designed to gather information about users and systems and to send that data back to a central collector. Trojans pretend to be useful software and include malicious components, bloatware is preinstalled software that isn't needed, and rootkits are used to conceal malicious software and retain a foothold on compromised systems."},{"chapter":"ch3","chapter_name":"Chapter 3: Malicious Code","num":8,"question":"Matt uploads a malware sample to a third-party malware scanning site that uses multiple antimalware and antivirus engines to scan the sample. He receives multiple different answers for what the malware package is. What has occurred?","options":{"A":"The package contains more than one piece of malware.","B":"The service is misconfigured.","C":"The malware is polymorphic and changed while being tested.","D":"Different vendors use different names for malware packages."},"correct":["D"],"explanation":"One of the challenges security practitioners can face when attempting to identify malware is that different antivirus and antimalware vendors will name malware packages and families differently. This means that Matt may need to look at different names to figure out what he is dealing with."},{"chapter":"ch3","chapter_name":"Chapter 3: Malicious Code","num":9,"question":"Nancy is concerned that there is a software keylogger on the system she's investigating. What best describes data that may have been stolen?","options":{"A":"All files on the system","B":"All keyboard input","C":"All files the user accessed while the keylogger was active","D":"Keyboard and other input from the user"},"correct":["D"],"explanation":"While keyloggers often focus on keyboard input, other types of input may also be captured, meaning Nancy should worry about any user input that occurred while the keylogger was installed. Keyloggers typically do not target files on systems, although if Nancy finds a keylogger, she may want to check for other malware packages with additional capabilities."},{"chapter":"ch3","chapter_name":"Chapter 3: Malicious Code","num":10,"question":"A system in Elaine's company has suddenly displayed a message demanding payment in Bitcoin and claiming that the data from the system has been encrypted. What type of malware has Elaine likely encountered?","options":{"A":"Worms","B":"A virus","C":"Ransomware","D":"Rootkit"},"correct":["C"],"explanation":"Ransomware demands payment to be made while typically using encryption to make data inaccessible. Worms, viruses, and rootkits are not defined by behavior like this."},{"chapter":"ch3","chapter_name":"Chapter 3: Malicious Code","num":11,"question":"Rick believes that a system he is responsible for has been compromised with malware that uses a rootkit to obtain and retain access to the system. When he runs an antimalware tool's scanner, the system doesn't show any malware. If he has other data that indicates the system is infected, what should his next step be if he wants to determine what malware may be on the system?","options":{"A":"Rerun the antimalware scan.","B":"Mount the drive on another system and scan it that way.","C":"Disable the systems antivirus because it may be causing a false negative.","D":"The system is not infected and he should move on."},"correct":["B"],"explanation":"Rootkits are designed to hide from antimalware scanners and can often defeat locally run scans. Mounting the drive in another system in read-only mode or booting from a USB drive and scanning using a trusted, known good operating system can be an effective way to determine what malware is on a potentially infected system."},{"chapter":"ch3","chapter_name":"Chapter 3: Malicious Code","num":12,"question":"A recently terminated developer from Jaya's organization has contacted the organization claiming that they left code in an application that they wrote that will delete files and bring the application down if they are not employed by the company. What type of malware is this?","options":{"A":"Ransomware","B":"Extortionware","C":"A logic bomb","D":"A Trojan"},"correct":["C"],"explanation":"Jaya's former employee is describing a logic bomb, malicious code that will cause harm when a trigger or specific action occurs. In this case, the former employee is claiming that the trigger is them not being employed at the company. Jaya will need to assess all of the code that the employee wrote to determine if a logic bomb exists. Ransomware is a type of malicious software that typically uses encryption to extort a ransom. Extortionware is not a commonly used term. Trojans appear to be useful or desirable software but contain malicious code."},{"chapter":"ch3","chapter_name":"Chapter 3: Malicious Code","num":13,"question":"Selah wants to ensure that malware is completely removed from a system. What should she do to ensure this?","options":{"A":"Run multiple antimalware tools and use them to remove all detections.","B":"Wipe the drive and reinstall from known good media.","C":"Use the delete setting in her antimalware software rather than the quarantine setting.","D":"There is no way to ensure the system is safe and it should be destroyed."},"correct":["B"],"explanation":"In most malware infection scenarios, wiping the drive and reinstalling from known good media is the best option available. If the malware has tools that can infect the system BIOS/UEFI, even this may not be sufficient, but BIOS/UEFI resident malware is relatively uncommon. Multiple antivirus and antimalware tools, even if they are set to delete malware, may still fail against unknown or advanced malware packages. Destroying systems is uncommon, expensive, and unlikely to be acceptable to most organizations as a means of dealing with a malware infection."},{"chapter":"ch3","chapter_name":"Chapter 3: Malicious Code","num":14,"question":"What is the key difference between a worm and a virus?","options":{"A":"What operating system they run on","B":"How they spread","C":"What their potential impact is","D":"The number of infections"},"correct":["B"],"explanation":"The key difference between worms and viruses is how they spread. Worms spread themselves, whereas viruses rely on human interaction."},{"chapter":"ch3","chapter_name":"Chapter 3: Malicious Code","num":15,"question":"Ben wants to analyze Python code that he believes may be malicious code written by an employee of his organization. What can he do to determine if the code is malicious?","options":{"A":"Run a decompiler against it to allow him to read the code","B":"Open the file using a text editor to review the code","C":"Test the code using an antivirus tool","D":"Submit the Python code to a malware testing website"},"correct":["B"],"explanation":"Python is an interpreted rather than a compiled language, so Ben doesn't need to use a decompiler. Instead, his best bet is to open the file and review the code to see what it does. Since it was written by an employee, it is unlikely that it will match an existing known malicious package, which means antivirus and antimalware tools and sites will be useless."},{"chapter":"ch3","chapter_name":"Chapter 3: Malicious Code","num":16,"question":"Which of the following defenses is most likely to prevent Trojan installation?","options":{"A":"Installing patches for known vulnerabilities","B":"Preventing downloads from application stores","C":"Preventing the use of USB drives","D":"Disabling autorun from USB drives"},"correct":["B"],"explanation":"Trojans are often found in application stores where they appear to be innocuous but desirable applications or are listed in confusingly similar ways to legitimate applications. Many organizations choose to lock down the ability to acquire applications from app stores to prevent this type of issue. Since Trojans do not self-spread and rely on user action, patching typically won't prevent them. While users may try to transfer files via USB, this isn't the most common means for modern Trojans to spread."},{"chapter":"ch3","chapter_name":"Chapter 3: Malicious Code","num":17,"question":"Jason's security team reports that a recent WordPress vulnerability seems to have been exploited by malware and that their organization's entire WordPress service cluster has been infected. What type of malware is most likely involved if a vulnerability in the software was exploited over the network?","options":{"A":"A logic bomb","B":"A Trojan","C":"A worm","D":"A rootkit"},"correct":["C"],"explanation":"Worms often spread via networks, taking advantage of vulnerabilities to install themselves on targeted systems and then to propagate further. Trojans require human interaction to install software that appears desirable. Logic bombs are embedded in code and perform actions when triggers like a date or event occur. Rootkits are used to hide malware and to conceal attacker's actions."},{"chapter":"ch3","chapter_name":"Chapter 3: Malicious Code","num":18,"question":"Hui's organization recently purchased new Windows computers from an office supply store. The systems have a number of unwanted programs on them that load at startup that were installed by the manufacturer. What type of software is this?","options":{"A":"Viruses","B":"Trojans","C":"Spyware","D":"Bloatware"},"correct":["D"],"explanation":"Unwanted, typically preinstalled programs are known as bloatware. They take up space and resources without providing value, and many organizations either uninstall them or install clean operating system images to avoid them. There is no indication of malicious activity in the question, so these are most likely not viruses, Trojans, or spyware."},{"chapter":"ch3","chapter_name":"Chapter 3: Malicious Code","num":19,"question":"What type of malware connects to a command and control system, allowing attackers to manage, control, and update it remotely?","options":{"A":"A bot","B":"A drone","C":"A vampire","D":"A worm"},"correct":["A"],"explanation":"Bots connect to command and control (C&C) systems, allowing them to be updated, controlled, and managed remotely. Worms spread via vulnerabilities, and drones and vampires aren't common terms for malware."},{"chapter":"ch3","chapter_name":"Chapter 3: Malicious Code","num":20,"question":"Randy believes that a system that he is responsible for was infected after a user picked up a USB drive and plugged it in. The user claims that they only opened one file on the drive to see who might own it. What type of malware is most likely involved?","options":{"A":"A virus","B":"A worm","C":"A trojan","D":"A spyware tool"},"correct":["A"],"explanation":"Randy knows that viruses spread through user interaction with files on thumb drives. A worm would spread itself, a Trojan would look like a useful or desirable file, and there is no indication of spyware in the question."},{"chapter":"ch4","chapter_name":"Chapter 4: Social Engineering and Password Attacks","num":1,"question":"Joseph receives an email notifying him that he needs to change his password due to a recent account issue. He notices that the email links him to a website using the domain amaz0n.com. What type of attack should he describe this as?","options":{"A":"Typosquatting","B":"Phishing","C":"Smishing","D":"A watering hole attack"},"correct":["B"],"explanation":"This email is an attempt to get account information and is a phishing email. Joseph did not enter the URL himself, which is the behavior that a typosquatter relies on. A smishing attack relies on SMS, and a watering hole attack uses a frequently visited website."},{"chapter":"ch4","chapter_name":"Chapter 4: Social Engineering and Password Attacks","num":2,"question":"When you combine phishing with voicemail, it is known as:","options":{"A":"Whaling","B":"Spoofing","C":"Spooning","D":"Vishing"},"correct":["D"],"explanation":"Vishing is a form of phishing done via voice phones call or voicemail. Whaling focuses on targeting important targets for phishing attacks, whereas spoofing is a general term that means faking things. Spooning is not a technical term used for security practices."},{"chapter":"ch4","chapter_name":"Chapter 4: Social Engineering and Password Attacks","num":3,"question":"While reviewing her logs, Michele notices that a remote system has attempted to log into her server via SSH using the username admin and a variety of passwords like “password” and “ninja.” What type of attack has Michele noticed?","options":{"A":"A brute-force attack","B":"Shoulder surfing","C":"An on-path attack","D":"Pretexting"},"correct":["A"],"explanation":"Michele has discovered a brute-force attack, which relies on trying a large number of passwords, often combined with a list of usernames to try. Shoulder surfing attacks involve an attacker watching as a user enters information like a password or credit card data. On-path attacks intercept data sent via a network, and pretexting is a social engineering attack that relies on a believable reason for attackers to need a victim to take action."},{"chapter":"ch4","chapter_name":"Chapter 4: Social Engineering and Password Attacks","num":4,"question":"Joanna wants to detect password spraying attacks. What type of rule should she deploy through her security systems?","options":{"A":"Match attempts to log into many systems with the same username and password.","B":"Match multiple attempts to log into the same user account using different passwords.","C":"Match repeated use of the same password during failed login attempts for multiple usernames.","D":"Match all attempts to use passwords with slight changes for the same account."},"correct":["C"],"explanation":"Password spraying involves the use of the same password to attempt to log into multiple accounts. Joanna should search for uses of the same password for different accounts."},{"chapter":"ch4","chapter_name":"Chapter 4: Social Engineering and Password Attacks","num":5,"question":"One of the staff at Susan's organization has reported that a critical vendor has contacted them about an unpaid invoice. After Susan investigates, she discovers that the invoice was sent from an email account that was not typically a contact and that the invoice requested payment to a PayPal account. What type of social engineering attack has Susan most likely discovered?","options":{"A":"Smishing","B":"Business email compromise","C":"Disinformation","D":"Typosquatting"},"correct":["B"],"explanation":"Susan has most likely discovered a business email compromise and should reach out to the impacted organization to inform them of the potentially compromised account. Smishing would occur via SMS, there is nothing in the question to indicate a disinformation campaign was part of this, and there is no URL mentioned and thus typosquatting can be dismissed as well."},{"chapter":"ch4","chapter_name":"Chapter 4: Social Engineering and Password Attacks","num":6,"question":"Selah infects the ads on a website that users from her target company frequently visit with malware as part of her penetration test. What technique has she used?","options":{"A":"A watering hole attack","B":"Vishing","C":"Whaling","D":"Typosquatting"},"correct":["A"],"explanation":"Watering hole attacks rely on compromising or infecting a website that targeted users frequently visit, much like animals will visit a common watering hole. Vishing is phishing via voice, whaling is a targeted phishing attack against senior or important staff, and typosquatting registers similar URLs that are likely to be inadvertently entered in order to harvest clicks or conduct malicious activity."},{"chapter":"ch4","chapter_name":"Chapter 4: Social Engineering and Password Attacks","num":7,"question":"Ben wants to determine if brute-force password attacks are being used against his company. What log information is least likely to be useful when working to detect brute-force attacks?","options":{"A":"Source IP address or hostname","B":"Failed login logs","C":"The password that was used for each attempt","D":"The geographic location of system being logged into"},"correct":["D"],"explanation":"The source IP or hostname; the failed login logs with time, date, username, and other information; and the password that was used for each failed attempt would be useful for watching for brute-force attempts. Knowing where the system being logged into is located isn't useful when tracking brute-force attempts. Logging failed passwords can be problematic as it can reveal actual passwords by allowing log reviewers to see failures driven by typos, so Ben may want to avoid that sort of log even though it can be useful!"},{"chapter":"ch4","chapter_name":"Chapter 4: Social Engineering and Password Attacks","num":8,"question":"Melissa receives a call and the caller informs her a senior manager in her organization needs her to buy gift cards for an event that starts in an hour. The caller says that the senior leader forgot to get the cards, and that the event is critical to her organization. Melissa buys the cards and sends them to the Gmail address the caller says that the senior leader needs them sent to. What type of attack has Melissa fallen for?","options":{"A":"Phishing","B":"Pretexting","C":"Business email compromise","D":"Carding"},"correct":["B"],"explanation":"The caller is using pretexting, providing Melissa with a story that relies on urgency and perceived authority to get her to take actions she might normally question. This social engineering attack is not a phishing attack aimed at gathering information or credentials, it does not involve business email accounts being compromised, and carding is not a topic covered in the Security+ exam outline."},{"chapter":"ch4","chapter_name":"Chapter 4: Social Engineering and Password Attacks","num":9,"question":"Alaina wants to determine if a password spraying attack was used against her organization. Which of the following indicators would be most useful as part of her investigation?","options":{"A":"The time the login attempts happened","B":"The passwords used for failed attempts","C":"The source IP address of the attempts","D":"The number of failed attempts for each user"},"correct":["B"],"explanation":"Password spraying attempts try to use a single common password for many user accounts. Determining if a single password is being used over and over can help catch basic password spraying attempts. The time, source IP, or number of failed attempts do not indicate password spraying."},{"chapter":"ch4","chapter_name":"Chapter 4: Social Engineering and Password Attacks","num":10,"question":"Which of the following human vectors is primarily associated with nation-state actors?","options":{"A":"Misinformation campaigns","B":"Watering hole attacks","C":"Business email compromise","D":"Password spraying"},"correct":["A"],"explanation":"Misinformation and disinformation campaigns are primarily associated with nation-state actors, but are increasingly used by other organizations and even individuals as well. Watering hole attacks, business email compromise, and password spraying are broadly used attacks."},{"chapter":"ch4","chapter_name":"Chapter 4: Social Engineering and Password Attacks","num":11,"question":"Nicole accidentally types www.smazon.com into her browser and discovers that she is directed to a different site loaded with ads and pop-ups. Which of the following is the most accurate description of the attack she has experienced?","options":{"A":"DNS hijacking","B":"Pharming","C":"Typosquatting","D":"Hosts file compromise"},"correct":["C"],"explanation":"Typosquatting uses misspellings and common typos of websites to redirect traffic for profit or malicious reasons. Fortunately in reality, if you visit smazon.com, you'll be redirected to the actual amazon.com website, as Amazon knows about and works to prevent this type of issue. DNS hijacking and hosts file modifications both attempt to redirect traffic to actual URLs or hostnames to different destinations, and pharming does redirect legitimate traffic to fake sites, but typosquatting is the more specific answer."},{"chapter":"ch4","chapter_name":"Chapter 4: Social Engineering and Password Attacks","num":12,"question":"Devon is a penetration tester and sets up malicious tools on his target organization's primary internal website. What type of attack is he conducting?","options":{"A":"A misinformation campaign","B":"A watering hole attack","C":"A typosquatting attack","D":"A disinformation campaign"},"correct":["B"],"explanation":"Devon is conducting a watering hole attack that leverages a frequently visited site to deploy malware. There is no description of misinformation or disinformation in the question, and there is not a typo described that would lead to a typosquatting attack being successful."},{"chapter":"ch4","chapter_name":"Chapter 4: Social Engineering and Password Attacks","num":13,"question":"Phishing emails sent pretending to be from a company that recipients are familiar with and likely to respond to is what type of attack?","options":{"A":"Phishing","B":"Pharming","C":"Brand impersonation","D":"Pretexting"},"correct":["C"],"explanation":"Brand impersonation attacks are designed to appear to be from a company that recipients are likely to be familiar with, and thus are more likely to elicit a response. While these are a type of phishing, the more specific answer of brand impersonation is the best answer. Pretexting is a social engineering concept that provides a reason for the request. Pharming attacks redirect traffic intended to be sent to a legitimate site to a fake website typically designed to simulate the real one."},{"chapter":"ch4","chapter_name":"Chapter 4: Social Engineering and Password Attacks","num":14,"question":"When a caller was recently directed to Amanda, who is a junior IT employee at her company, the caller informed her that they were the head of IT for her organization and that she needed to immediately disable the organization's firewall. After Amanda made the change, she discovered that the caller was not the head of IT, and that they were actually a penetration tester hired by her company. What social engineering attack best describes this?","options":{"A":"Smishing","B":"Pretexting","C":"Impersonation","D":"Vishing"},"correct":["C"],"explanation":"This is an example of an impersonation attack. The pentester impersonated the head of IT in order to achieve their goals. The good news is that it was a penetration tester! Smishing is phishing via SMS, vishing is phishing via voice or voicemail, and pretexting provides a reason that the target should perform an action. Here the attack relied on the authority that Amanda believed the caller had."},{"chapter":"ch4","chapter_name":"Chapter 4: Social Engineering and Password Attacks","num":15,"question":"Fred is concerned about text message–based attacks. Which of the following attacks relies on text messages as its primary focus?","options":{"A":"Impersonation","B":"Watering hole attacks","C":"Smishing","D":"Business email compromise"},"correct":["C"],"explanation":"Smishing attacks are SMS-based. Impersonation attacks could use texts but don't specifically rely on them. Watering hole attacks use frequently visited websites, whereas business email compromise attacks focus on gaining access to business email accounts to use in follow-up attacks."},{"chapter":"ch4","chapter_name":"Chapter 4: Social Engineering and Password Attacks","num":16,"question":"Sharif notices that his authentication logs have many different usernames showing failed logins with the same password. What type of attack has he discovered?","options":{"A":"Credential harvesting","B":"Impersonation","C":"BEC","D":"Spraying"},"correct":["D"],"explanation":"Sharif has discovered a spraying attack that uses the same password —often a default or common password—with many usernames. Credential harvesting is the process of gathering credentials like usernames and passwords. Impersonation is a social engineering technique used when an attacker pretends to be someone else. BEC, or business email compromise, involves attackers posing as a trusted individual and asking for actions to be performed."},{"chapter":"ch4","chapter_name":"Chapter 4: Social Engineering and Password Attacks","num":17,"question":"Naomi receives a report of smishing. What type of attack should she be looking for?","options":{"A":"Compressed files in phishing","B":"Text message–based phishing","C":"Voicemail-based phishing","D":"Server-based phishing"},"correct":["B"],"explanation":"Smishing is a type of phishing that occurs via text (SMS) message."},{"chapter":"ch4","chapter_name":"Chapter 4: Social Engineering and Password Attacks","num":18,"question":"Jack's organization wants to prevent typosquatting. What option should he select to address this issue?","options":{"A":"Copyright the domain name","B":"Purchase the most common typos for his organization's domain","C":"Trademark the domain name","D":"Disable typo resolution for the domain"},"correct":["B"],"explanation":"While it's nearly impossible to prevent typosquatting, purchasing and registering the most common typos (typo-domains) related to your organization's domain and redirecting them to your real domain is the most effective option available. Copyrighting or trademarking the domain name does not prevent typosquatting, and typo resolution is not a feature or capability that is available."},{"chapter":"ch4","chapter_name":"Chapter 4: Social Engineering and Password Attacks","num":19,"question":"Gwyne's company has been contacted by customers asking about a new social media account operating under the company's brand. The social media account is advertising cryptocurrency, which Gwyne's organization does not sell or work with. What type of attack best describes what Gwyne's organization has encountered?","options":{"A":"Impersonation","B":"Brand impersonation","C":"Mis-branding","D":"Crypto-phishing"},"correct":["B"],"explanation":"Using an organization's brand in this way is an example of brand impersonation. While this is also an impersonation attack, the more specific description is the best answer here. Misbranding and crypto- phishing were both made up for this question and aren't commonly used terms."},{"chapter":"ch4","chapter_name":"Chapter 4: Social Engineering and Password Attacks","num":20,"question":"Nation-state-driven social media campaigns about the trustworthiness of the U.S. election in 2016 are an example of what type of social engineering?","options":{"A":"Smishing","B":"Pretexting","C":"Disinformation","D":"Spraying"},"correct":["C"],"explanation":"Disinformation campaigns are used to shift public opinion or to accomplish other goals. They are not limited to nation-state actors but are an increasingly heavily used social engineering tactic at a broad scale. Smishing relies on SMS messages, pretexting involves using a reason that creates urgency or importance in a request from a social engineer, and spraying is a type of password brute forcing."},{"chapter":"ch5","chapter_name":"Chapter 5: Security Assessment and Testing","num":1,"question":"Which one of the following security assessment techniques assumes that an organization has already been compromised and searches for evidence of that compromise?","options":{"A":"Vulnerability scanning","B":"Penetration testing","C":"Threat hunting","D":"War driving"},"correct":["C"],"explanation":"Threat hunting is an assessment technique that makes an assumption of compromise and then searches the organization for indicators of compromise that confirm the assumption. Vulnerability scanning, penetration testing, and war driving are all assessment techniques that probe for vulnerabilities but do not assume that a compromise has already taken place."},{"chapter":"ch5","chapter_name":"Chapter 5: Security Assessment and Testing","num":2,"question":"Renee is configuring her vulnerability management solution to perform credentialed scans of servers on her network. What type of account should she provide to the scanner?","options":{"A":"Domain administrator","B":"Local administrator","C":"Root","D":"Read-only"},"correct":["D"],"explanation":"Credentialed scans only require read-only access to target servers. Renee should follow the principle of least privilege and limit the access available to the scanner."},{"chapter":"ch5","chapter_name":"Chapter 5: Security Assessment and Testing","num":3,"question":"Ryan is planning to conduct a vulnerability scan of a business-critical system using dangerous plug-ins. What would be the best approach for the initial scan?","options":{"A":"Run the scan against production systems to achieve the most realistic results possible.","B":"Run the scan during business hours.","C":"Run the scan in a test environment.","D":"Do not run the scan to avoid disrupting the business."},"correct":["C"],"explanation":"Ryan should first run his scan against a test environment to identify likely vulnerabilities and assess whether the scan itself might disrupt business activities."},{"chapter":"ch5","chapter_name":"Chapter 5: Security Assessment and Testing","num":4,"question":"Which one of the following values for the CVSS attack complexity metric would indicate that the specified attack is simplest to exploit?","options":{"A":"High","B":"Medium","C":"Low","D":"Severe"},"correct":["C"],"explanation":"An attack complexity of “low” indicates that exploiting the vulnerability does not require any specialized conditions."},{"chapter":"ch5","chapter_name":"Chapter 5: Security Assessment and Testing","num":5,"question":"Tara recently analyzed the results of a vulnerability scan report and found that a vulnerability reported by the scanner did not exist because the system was actually patched as specified. What type of error occurred?","options":{"A":"False positive","B":"False negative","C":"True positive","D":"True negative"},"correct":["A"],"explanation":"A false positive error occurs when the vulnerability scanner reports a vulnerability that does not actually exist."},{"chapter":"ch5","chapter_name":"Chapter 5: Security Assessment and Testing","num":6,"question":"Brian ran a penetration test against a school's grading system and discovered a flaw that would allow students to alter their grades by exploiting a SQL injection vulnerability. What type of control should he recommend to the school's cybersecurity team to prevent students from engaging in this type of activity?","options":{"A":"Confidentiality","B":"Integrity","C":"Alteration","D":"Availability"},"correct":["B"],"explanation":"By allowing students to change their own grades, this vulnerability provides a pathway to unauthorized alteration of information. Brian should recommend that the school deploy integrity controls that prevent unauthorized modifications."},{"chapter":"ch5","chapter_name":"Chapter 5: Security Assessment and Testing","num":7,"question":"Which one of the following security assessment tools is least likely to be used during the reconnaissance phase of a penetration test?","options":{"A":"Nmap","B":"Nessus","C":"Metasploit","D":"Nslookup"},"correct":["C"],"explanation":"Nmap is a port scanning tool used to enumerate open network ports on a system. Nessus is a vulnerability scanner designed to detect security issues on a system. Nslookup is a DNS information gathering utility. All three of these tools may be used to gather information and detect vulnerabilities. Metasploit is an exploitation framework used to execute and attack and would be better suited for the Attacking and Exploiting phase of a penetration test."},{"chapter":"ch5","chapter_name":"Chapter 5: Security Assessment and Testing","num":8,"question":"During a vulnerability scan, Brian discovered that a system on his network contained this vulnerability: What security control, if deployed, would likely have addressed this issue?","options":{"A":"Patch management","B":"File integrity monitoring","C":"Intrusion detection","D":"Threat hunting"},"correct":["A"],"explanation":"This vulnerability is corrected by a patch that was released by Microsoft in 2017. A strong patch management program would have identified and remediated the missing patch."},{"chapter":"ch5","chapter_name":"Chapter 5: Security Assessment and Testing","num":9,"question":"Which one of the following tools is most likely to detect an XSS vulnerability?","options":{"A":"Static application test","B":"Web application vulnerability scanner","C":"Intrusion detection system","D":"Network vulnerability scanner"},"correct":["B"],"explanation":"Intrusion detection systems do not detect vulnerabilities; they detect attacks. The remaining three tools could all possibly discover a cross- site scripting (XSS) vulnerability, but a web application vulnerability scanner is the most likely to detect it because it is specifically designed to test web applications."},{"chapter":"ch5","chapter_name":"Chapter 5: Security Assessment and Testing","num":10,"question":"During a penetration test, Patrick deploys a toolkit on a compromised system and uses it to gain access to other systems on the same network. What term best describes this activity?","options":{"A":"Lateral movement","B":"Privilege escalation","C":"Footprinting","D":"OSINT"},"correct":["A"],"explanation":"Moving from one compromised system to other systems on the same network is known as lateral movement. Privilege escalation attacks increase the level of access that an attacker has to an already compromised system. Footprinting and OSINT are reconnaissance techniques."},{"chapter":"ch5","chapter_name":"Chapter 5: Security Assessment and Testing","num":11,"question":"Zian is a cybersecurity leader who is coordinating the activities of a security audit. The audit is being done to validate the organization's financial statements to investors and involves a review of cybersecurity controls. What term best describes this audit?","options":{"A":"External audit","B":"Penetration test","C":"Internal audit","D":"Informal audit"},"correct":["A"],"explanation":"Audits performed to validate an organization's financial statements are very formal audits that are performed by independent third-party auditors. This makes them external audits. Internal audits may be more or less formal than external audits but they are generally done only to provide assurance to internal parties and not to investors. Penetration tests may be done as part of an audit but they are not audits themselves."},{"chapter":"ch5","chapter_name":"Chapter 5: Security Assessment and Testing","num":12,"question":"Which one of the following assessment techniques is designed to solicit participation from external security experts and reward them for discovering vulnerabilities?","options":{"A":"Threat hunting","B":"Penetration testing","C":"Bug bounty","D":"Vulnerability scanning"},"correct":["C"],"explanation":"Bug bounty programs are designed to allow external security experts to test systems and uncover previously unknown vulnerabilities. Bug bounty programs offer successful testers financial rewards to incentivize their participation."},{"chapter":"ch5","chapter_name":"Chapter 5: Security Assessment and Testing","num":13,"question":"Kyle is conducting a penetration test. After gaining access to an organization's database server, he installs a backdoor on the server to grant himself access in the future. What term best describes this action?","options":{"A":"Privilege escalation","B":"Lateral movement","C":"Maneuver","D":"Persistence"},"correct":["D"],"explanation":"Backdoors are a persistence tool, designed to make sure that the attacker's access persists after the original vulnerability is remediated. Kyle can use this backdoor to gain access to the system in the future, even if the original exploit that he used to gain access is no longer effective."},{"chapter":"ch5","chapter_name":"Chapter 5: Security Assessment and Testing","num":14,"question":"Which one of the following techniques would be considered passive reconnaissance?","options
