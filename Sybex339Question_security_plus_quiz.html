":{"A":"Port scans","B":"Vulnerability scans","C":"WHOIS lookups","D":"Footprinting"},"correct":["C"],"explanation":"WHOIS lookups use external registries and are an example of open source intelligence (OSINT), which is a passive reconnaissance technique. Port scans, vulnerability scans, and footprinting all require active engagement with the target and are, therefore, active reconnaissance."},{"chapter":"ch5","chapter_name":"Chapter 5: Security Assessment and Testing","num":15,"question":"Which element of the SCAP framework can be used to consistently describe vulnerabilities?","options":{"A":"CPE","B":"CVE","C":"CVSS","D":"CCE"},"correct":["B"],"explanation":"Common Vulnerabilities and Exposures (CVE) provides a standard nomenclature for describing security-related software flaws. Common Platform Enumeration (CPE) provides a standard nomenclature for describing product names and versions. The Common Vulnerability Scoring System (CVSS) provides a standardized approach for measuring and describing the severity of security-related software flaws. Common Configuration Enumeration (CCE) provides a standard nomenclature for discussing system configuration issues."},{"chapter":"ch5","chapter_name":"Chapter 5: Security Assessment and Testing","num":16,"question":"Bruce is conducting a penetration test for a client. The client provided him with full details of their systems in advance. What type of test is Bruce conducting?","options":{"A":"Partially known environment test","B":"Detailed environment test","C":"Known environment test","D":"Unknown environment test"},"correct":["C"],"explanation":"Known environment tests are performed with full knowledge of the underlying technology, configurations, and settings that make up the target. Unknown environment tests are intended to replicate what an attacker would encounter. Testers are not provided with access to or information about an environment, and instead, they must gather information, discover vulnerabilities, and make their way through an infrastructure or systems like an attacker would. Partially known environment tests are a blend of unknown environment and known environment testing. Detailed environment tests are not a type of penetration test."},{"chapter":"ch5","chapter_name":"Chapter 5: Security Assessment and Testing","num":17,"question":"Lila is working on a penetration testing team and she is unsure whether she is allowed to conduct social engineering as part of the test. What document should she consult to find this information?","options":{"A":"Contract","B":"Statement of work","C":"Rules of engagement","D":"Lessons learned report"},"correct":["C"],"explanation":"The rules of engagement provide technical details on the parameters of the test. This level of detail would not normally be found in a contract or statement of work (SOW). The lessons learned report is not produced until after the test."},{"chapter":"ch5","chapter_name":"Chapter 5: Security Assessment and Testing","num":18,"question":"Grace would like to determine the operating system running on a system that she is targeting in a penetration test. Which one of the following techniques will most directly provide her with this information?","options":{"A":"Port scanning","B":"Footprinting","C":"Vulnerability scanning","D":"Packet capture"},"correct":["B"],"explanation":"All of these techniques might provide Grace with information about the operating system running on a device. However, footprinting is a technique specifically designed to elicit this information."},{"chapter":"ch5","chapter_name":"Chapter 5: Security Assessment and Testing","num":19,"question":"Kevin recently identified a new security vulnerability and computed its CVSS base score as 6.5. Which risk category would this vulnerability fall into?","options":{"A":"Low","B":"Medium","C":"High","D":"Critical"},"correct":["B"],"explanation":"Vulnerabilities with CVSS base scores between 4.0 and 6.9 fit into the medium risk category. Vulnerability scores between 0.1 and 3.9 would be low, between 7.0 and 8.9 would be high, and those between 9.0 and 10.0 would be in the critical risk category."},{"chapter":"ch5","chapter_name":"Chapter 5: Security Assessment and Testing","num":20,"question":"Which one of the CVSS metrics would contain information about the type of account access that an attacker must have to execute an attack?","options":{"A":"AV","B":"C","C":"PR","D":"AC"},"correct":["C"],"explanation":"The privileges required (PR) metric indicates the type of system access that an attacker must have to execute the attack."},{"chapter":"ch6","chapter_name":"Chapter 6: Application Security","num":1,"question":"Adam is conducting software testing by reviewing the source code of the application. What type of code testing is Adam conducting?","options":{"A":"Mutation testing","B":"Static code analysis","C":"Dynamic code analysis","D":"Fuzzing"},"correct":["B"],"explanation":"Adam is conducting static code analysis by reviewing the source code. Dynamic code analysis requires running the program, and both mutation testing and fuzzing are types of dynamic analysis."},{"chapter":"ch6","chapter_name":"Chapter 6: Application Security","num":2,"question":"Charles is worried about users conducting SQL injection attacks. Which of the following solutions will best address his concerns?","options":{"A":"Using secure session management","B":"Enabling logging on the database","C":"Performing user input validation","D":"Implementing TLS"},"correct":["C"],"explanation":"Charles should perform user input validation to strip out any SQL code or other unwanted input. Secure session management can help prevent session hijacking, logging may provide useful information for incident investigation, and implementing TLS can help protect network traffic, but only input validation helps with the issue described."},{"chapter":"ch6","chapter_name":"Chapter 6: Application Security","num":3,"question":"Precompiled SQL statements that only require variables to be input are an example of what type of application security control?","options":{"A":"Parameterized queries","B":"Encoding data","C":"Input validation","D":"Appropriate access controls"},"correct":["A"],"explanation":"A parameterized query (sometimes called a prepared statement) uses a prebuilt SQL statement to prevent SQL-based attacks. Variables from the application are fed to the query, rather than building a custom query when the application needs data. Encoding data helps to prevent cross-site scripting attacks, as does input validation. Appropriate access controls can prevent access to data that the account or application should not have access to, but they don't use precompiled SQL statements. Stored procedures are an example of a parameterized query implementation."},{"chapter":"ch6","chapter_name":"Chapter 6: Application Security","num":4,"question":"During a web application test, Ben discovers that the application shows SQL code as part of an error provided to application users. What should he note in his report?","options":{"A":"Improper error handling","B":"Code exposure","C":"SQL injection","D":"A default configuration issue"},"correct":["A"],"explanation":"Improper error handling often exposes data to users and possibly attackers that should not be exposed. In this case, knowing what SQL code is used inside the application can provide an attacker with details they can use to conduct further attacks. Code exposure is not one of the vulnerabilities we discuss in this book, and SQL code being exposed does not necessarily mean that SQL injection is possible. While this could be caused by a default configuration issue, there is nothing in the question to point to that problem."},{"chapter":"ch6","chapter_name":"Chapter 6: Application Security","num":5,"question":"The application that Scott is writing has a flaw that occurs when two operations are attempted at the same time, resulting in unexpected results when the two actions do not occur in the expected order. What type of flaw does the application have?","options":{"A":"Dereferencing","B":"A race condition","C":"An insecure function","D":"Improper error handling"},"correct":["B"],"explanation":"The application has a race condition, which occurs when multiple operations cause undesirable results due to their order of completion. De-referencing accesses or uses a memory pointer, an insecure function would have security issues in the function itself, and improper error handling would involve an error and how it was displayed or what data it provided."},{"chapter":"ch6","chapter_name":"Chapter 6: Application Security","num":6,"question":"Every time Susan checks code into her organization's code repository, it is tested and validated, and then if accepted, it is immediately put into production. What is the term for this?","options":{"A":"Continuous integration","B":"Continuous delivery","C":"A security nightmare","D":"Agile development"},"correct":["B"],"explanation":"Although this example includes continuous integration, the key thing to notice is that the code is then deployed into production. This means that Susan is operating in a continuous deployment environment, where code is both continually integrated and deployed. Agile is a development methodology and often uses CI/CD, but we cannot determine if Susan is using Agile."},{"chapter":"ch6","chapter_name":"Chapter 6: Application Security","num":7,"question":"Tim is working on a change to a web application used by his organization to fix a known bug. What environment should he be working in?","options":{"A":"Test","B":"Development","C":"Staging","D":"Production"},"correct":["B"],"explanation":"Developers working on active changes to code should always work in the development environment. The test environment is where the software or systems can be tested without impacting the production environment. The staging environment is a transition environment for code that has successfully cleared testing and is waiting to be deployed into production. The production environment is the live system. Software, patches, and other changes that have been tested and approved move to production."},{"chapter":"ch6","chapter_name":"Chapter 6: Application Security","num":8,"question":"Ricky is concerned that developers in his organization make use of third-party code in their applications, which may introduce unknown vulnerabilities. He is concerned about the risk of the organization running code that it is not aware it is using. Which one of the following activities would best address this risk?","options":{"A":"Web application firewalls","B":"Package monitoring","C":"Static analysis","D":"Dynamic analysis"},"correct":["B"],"explanation":"All of the activities listed here may reduce the risk of the vulnerabilities created by the code. However, Ricky is specifically concerned about the fact that the organization may not be aware of all of the code that it is running. Package monitoring would inventory and monitor these third-party libraries, so that is the best answer here."},{"chapter":"ch6","chapter_name":"Chapter 6: Application Security","num":9,"question":"Which one of the following is not an advantage of automation in cybersecurity operations?","options":{"A":"Enforcing baselines","B":"Technical debt","C":"Employee retention","D":"Standardizing infrastructure configurations"},"correct":["B"],"explanation":"The main benefits of automation are efficiency and time savings, enforcing baselines, standardizing infrastructure configurations, scaling in a secure manner, retaining employees, reducing reaction time, and serving as a workforce multiplier. Technical debt is one of the potential drawbacks of automation."},{"chapter":"ch6","chapter_name":"Chapter 6: Application Security","num":10,"question":"Chris is creating a script that will automatically screen any user requests and flag those that exceed normal thresholds for manual review. What term best describes this automation use case?","options":{"A":"User provisioning","B":"Guard rails","C":"Ticket creation","D":"Escalation"},"correct":["B"],"explanation":"This is an example of the guard rails use case for automation. Cybersecurity professionals can use scripting to automatically review user actions and block any that are outside of normal parameters."},{"chapter":"ch6","chapter_name":"Chapter 6: Application Security","num":11,"question":"Which one of the following is not a common drawback of automating cybersecurity operations?","options":{"A":"Reducing employee satisfaction","B":"Creating single points of failure","C":"Costs","D":"Complexity"},"correct":["A"],"explanation":"Automation normally increases employee retention. The common drawbacks to automation include complexity, cost, creating single points of failure, incurring technical debt, and creating challenges to ongoing supportability."},{"chapter":"ch6","chapter_name":"Chapter 6: Application Security","num":12,"question":"Frank is investigating a security incident where the attacker entered a very long string into an input field, which was followed by a system command. What type of attack likely took place?","options":{"A":"Cross-site request forgery","B":"Server-side request forgery","C":"Command injection","D":"Buffer overflow"},"correct":["D"],"explanation":"Buffer overflow attacks occur when an attacker manipulates a program into placing more data into an area of memory than is allocated for that program's use. The goal is to overwrite other information in memory with instructions that may be executed by a different process running on the system."},{"chapter":"ch6","chapter_name":"Chapter 6: Application Security","num":13,"question":"What type of attack places an attacker in the position to eavesdrop on communications between a user and a web server?","options":{"A":"On-path attack","B":"Session hijacking","C":"Buffer overflow","D":"Meet-in-the-middle"},"correct":["A"],"explanation":"In an on-path attack, the attacker fools the user into thinking that the attacker is actually the target website and presenting a fake authentication form. They may then authenticate to the website on the user's behalf and obtain the cookie. This is slightly different from a session hijacking attack, where the attacker steals the cookie associated with an active session."},{"chapter":"ch6","chapter_name":"Chapter 6: Application Security","num":14,"question":"Tom is a software developer who creates code for sale to the public. He would like to assure his users that the code they receive actually came from him. What technique can he use to best provide this assurance?","options":{"A":"Code signing","B":"Code endorsement","C":"Code encryption","D":"Code obfuscation"},"correct":["A"],"explanation":"Code signing provides developers with a way to confirm the authenticity of their code to end users. Developers use a cryptographic function to digitally sign their code with their own private key, and then browsers can use the developer's public key to verify that signature and ensure that the code is legitimate and was not modified by unauthorized individuals."},{"chapter":"ch6","chapter_name":"Chapter 6: Application Security","num":15,"question":"Chris is reviewing evidence of a cross-site scripting attack where the attacker embedded JavaScript in a URL that a user clicked. The web page then sent the JavaScript to the user in the displayed page. What term best describes this attack?","options":{"A":"Reflected XSS","B":"Stored XSS","C":"Persistent XSS","D":"DOM-based XSS"},"correct":["A"],"explanation":"This is an example of a reflected attack because the script code is contained within the URL. A persistent or stored attack places the content on a web page or other location where a victim may later access it. DOM-based XSS attacks hide the attack code within the Document Object Model."},{"chapter":"ch6","chapter_name":"Chapter 6: Application Security","num":16,"question":"Joe checks his web server logs and sees that someone sent the following query string to an application running on the server: www.mycompany.com/servicestatus.php? serviceID=892&serviceID=892’%20;DROP%20TABLE%20Services;-- What type of attack was most likely attempted?","options":{"A":"Cross-site scripting","B":"Session hijacking","C":"Parameter pollution","D":"On-path"},"correct":["C"],"explanation":"This query string is indicative of a parameter pollution attack. In this case, it appears that the attacker was waging a SQL injection attack and tried to use parameter pollution to slip the attack past content filtering technology. The two instances of the serviceID parameter in the query string indicate a parameter pollution attempt."},{"chapter":"ch6","chapter_name":"Chapter 6: Application Security","num":17,"question":"Upon further inspection, Joe finds a series of thousands of requests to the same URL coming from a single IP address. Here are a few examples: www.mycompany.com/servicestatus.php?serviceID=1 www.mycompany.com/servicestatus.php?serviceID=2 www.mycompany.com/servicestatus.php?serviceID=3 www.mycompany.com/servicestatus.php?serviceID=4 www.mycompany.com/servicestatus.php?serviceID=5 www.mycompany.com/servicestatus.php?serviceID=6 What type of vulnerability was the attacker likely trying to exploit?","options":{"A":"Insecure direct object reference","B":"File upload","C":"Unvalidated redirect","D":"Session hijacking"},"correct":["A"],"explanation":"The series of thousands of requests incrementing a variable indicate that the attacker was most likely attempting to exploit an insecure direct object reference vulnerability."},{"chapter":"ch6","chapter_name":"Chapter 6: Application Security","num":18,"question":"Joe's adventures in web server log analysis are not yet complete. As he continues to review the logs, he finds the request: www.mycompany.com/../../../etc/passwd What type of attack was most likely attempted?","options":{"A":"SQL injection","B":"Session hijacking","C":"Directory traversal","D":"File upload"},"correct":["C"],"explanation":"In this case, the .. operators are the telltale giveaway that the attacker was attempting to conduct a directory traversal attack. This particular attack sought to break out of the web server's root directory and access the /etc/passwd file on the server."},{"chapter":"ch6","chapter_name":"Chapter 6: Application Security","num":19,"question":"Wendy is a penetration tester who wishes to engage in a session hijacking attack. What information is crucial for Wendy to obtain if her attack will be successful?","options":{"A":"Session ticket","B":"Session cookie","C":"Username","D":"User password"},"correct":["B"],"explanation":"Websites use HTTP cookies to maintain sessions over time. If Wendy is able to obtain a copy of the user's session cookie, she can use that cookie to impersonate the user's browser and hijack the authenticated session."},{"chapter":"ch6","chapter_name":"Chapter 6: Application Security","num":20,"question":"Joe is examining the logs for his web server and discovers that a user sent input to a web application that contained the string WAITFOR. What type of attack was the user likely attempting?","options":{"A":"Timing-based SQL injection","B":"HTML injection","C":"Cross-site scripting","D":"Content-based SQL injection"},"correct":["A"],"explanation":"The use of the SQL WAITFOR command is a signature characteristic of a timing-based SQL injection attack."},{"chapter":"ch7","chapter_name":"Chapter 7: Cryptography and the PKI","num":1,"question":"Mike is sending David an encrypted message using a symmetric encryption algorithm. What key should he use to encrypt the message?","options":{"A":"Mike's public key","B":"Mike's private key","C":"David's public key","D":"Shared secret key"},"correct":["D"],"explanation":"In symmetric encryption algorithms, both the sender and the receiver use a shared secret key to encrypt and decrypt the message, respectively."},{"chapter":"ch7","chapter_name":"Chapter 7: Cryptography and the PKI","num":2,"question":"Shahla recently discovered an attack where the attacker managed to force a network user to use weak encryption and was then able to decrypt that content. What term best describes this attack?","options":{"A":"Downgrade","B":"Collision","C":"Homomorphic encryption","D":"Birthday attack"},"correct":["A"],"explanation":"Downgrade attacks try to remove or lower the strength of encryption to allow the decryption of sensitive information. Birthday attacks find collisions where two different inputs produce the same hash value output, but there is no discussion of that in this scenario. Homomorphic encryption is not an attack but a technology that protects privacy by encrypting data in a way that preserves the ability to perform computation on that data."},{"chapter":"ch7","chapter_name":"Chapter 7: Cryptography and the PKI","num":3,"question":"Norm is using full-disk encryption technology to protect the contents of laptops against theft. What goal of cryptography is he attempting to achieve?","options":{"A":"Integrity","B":"Non-repudiation","C":"Authentication","D":"Confidentiality"},"correct":["D"],"explanation":"Norm's actions are designed to protect against the unauthorized disclosure of sensitive information. This is a clear example of protecting confidentiality."},{"chapter":"ch7","chapter_name":"Chapter 7: Cryptography and the PKI","num":4,"question":"Brian discovers that a user suspected of stealing sensitive information is posting many image files to a message board. What technique might the individual be using to hide sensitive information in those images?","options":{"A":"Steganography","B":"Homomorphic encryption","C":"Replay attack","D":"Birthday attack"},"correct":["A"],"explanation":"Steganography is the art of using cryptographic techniques to embed secret messages within another file."},{"chapter":"ch7","chapter_name":"Chapter 7: Cryptography and the PKI","num":5,"question":"Which one of the following statements about cryptographic keys is incorrect?","options":{"A":"All cryptographic keys should be kept secret.","B":"Longer keys are better than shorter keys when the same algorithm is used.","C":"Asymmetric algorithms generally use longer keys than symmetric algorithms.","D":"Digital certificates are designed to share public keys."},"correct":["A"],"explanation":"All of these statements are correct except for the statement that all cryptographic keys should be kept secret. The exception to this rule are public keys used in asymmetric cryptography. These keys should be freely shared."},{"chapter":"ch7","chapter_name":"Chapter 7: Cryptography and the PKI","num":6,"question":"What type of cipher operates on one character of text at a time?","options":{"A":"Block cipher","B":"Bit cipher","C":"Stream cipher","D":"Balanced cipher"},"correct":["C"],"explanation":"Stream ciphers operate on one character or bit of a message (or data stream) at a time. Block ciphers operate on “chunks,” or blocks, of a message and apply the encryption algorithm to an entire message block at the same time."},{"chapter":"ch7","chapter_name":"Chapter 7: Cryptography and the PKI","num":7,"question":"Vince is choosing a symmetric encryption algorithm for use in his organization. He would like to choose the strongest algorithm from these choices. What algorithm should he choose?","options":{"A":"DES","B":"3DES","C":"RSA","D":"AES"},"correct":["D"],"explanation":"AES is the successor to 3DES and DES and is the best choice for a symmetric encryption algorithm. RSA is a secure algorithm, but it is asymmetric rather than symmetric."},{"chapter":"ch7","chapter_name":"Chapter 7: Cryptography and the PKI","num":8,"question":"Kevin is configuring a web server to use digital certificates. What technology can he use to allow clients to quickly verify the status of those certificates without contacting a remote server?","options":{"A":"CRL","B":"OCSP","C":"Certificate stapling","D":"Certificate pinning"},"correct":["C"],"explanation":"The Online Certificate Status Protocol (OCSP) provides real-time checking of a digital certificate's status using a remote server. Certificate stapling attaches a current OCSP response to the certificate to allow the client to validate the certificate without contacting the OCSP server. Certificate revocation lists (CRLs) are a slower, outdated approach to managing certificate status. Certificate pinning is used to provide an expected key, not to manage certificate status."},{"chapter":"ch7","chapter_name":"Chapter 7: Cryptography and the PKI","num":9,"question":"Acme Widgets has 10 employees and they all need the ability to communicate with one another using a symmetric encryption system. The system should allow any two employees to securely communicate without other employees eavesdropping. If an 11th employee is added to the organization, how many new keys must be added to the system?","options":{"A":"1","B":"2","C":"10","D":"11"},"correct":["C"],"explanation":"When the 11th employee joins Acme Widgets, they will need a shared secret key with every existing employee. There are 10 existing employees, so 10 new keys are required."},{"chapter":"ch7","chapter_name":"Chapter 7: Cryptography and the PKI","num":10,"question":"Referring to the scenario in question 9, if Acme Widgets switched to an asymmetric encryption algorithm, how many keys would be required to add the 11th employee?","options":{"A":"1","B":"2","C":"10","D":"11"},"correct":["B"],"explanation":"In an asymmetric encryption algorithm, each employee needs only two keys: a public key and a private key. Adding a new user to the system requires the addition of these two keys for that user, regardless of how many other users exist."},{"chapter":"ch7","chapter_name":"Chapter 7: Cryptography and the PKI","num":11,"question":"What type of digital certificate provides the greatest level of assurance that the certificate owner is who they claim to be?","options":{"A":"DV","B":"OV","C":"UV","D":"EV"},"correct":["D"],"explanation":"Extended validation (EV) certificates provide the highest available level of assurance. The CA issuing an EV certificate certifies that they have verified the identity and authenticity of the certificate subject."},{"chapter":"ch7","chapter_name":"Chapter 7: Cryptography and the PKI","num":12,"question":"Glenn recently obtained a wildcard certificate for *.mydomain.com. Which one of the following domains would not be covered by this certificate?","options":{"A":"mydomain.com","B":"core.mydomain.com","C":"dev. www.mydomain.com","D":"mail.mydomain.com"},"correct":["C"],"explanation":"Wildcard certificates protect the listed domain as well as all first- level subdomains. dev.www.mydomain.com is a second-level subdomain of mydomain.com and would not be covered by this certificate."},{"chapter":"ch7","chapter_name":"Chapter 7: Cryptography and the PKI","num":13,"question":"Which one of the following servers is almost always an offline CA in a large PKI deployment?","options":{"A":"Root CA","B":"Intermediate CA","C":"RA","D":"Internal CA"},"correct":["A"],"explanation":"Root CAs are highly protected and not normally used for certificate issuance. A root CA is usually run as an offline CA that delegates authority to intermediate CAs that run as online CAs."},{"chapter":"ch7","chapter_name":"Chapter 7: Cryptography and the PKI","num":14,"question":"Which one of the following certificate formats is closely associated with Windows binary certificate files?","options":{"A":"DER","B":"PEM","C":"PFX","D":"P7B"},"correct":["C"],"explanation":"The PFX format is most closely associated with Windows systems that store certificates in binary format, whereas the P7B format is used for Windows systems storing files in text format."},{"chapter":"ch7","chapter_name":"Chapter 7: Cryptography and the PKI","num":15,"question":"What type of security solution provides a hardware platform for the storage and management of encryption keys?","options":{"A":"HSM","B":"IPS","C":"SIEM","D":"SOAR"},"correct":["A"],"explanation":"Hardware security modules (HSMs) provide an effective way to manage encryption keys. These hardware devices store and manage encryption keys in a secure manner that prevents humans from ever needing to work directly with the keys."},{"chapter":"ch7","chapter_name":"Chapter 7: Cryptography and the PKI","num":16,"question":"What type of cryptographic attack attempts to force a user to reduce the level of encryption that they use to communicate with a remote server?","options":{"A":"Birthday","B":"Frequency","C":"Downgrade","D":"Collision"},"correct":["C"],"explanation":"A downgrade attack is sometimes used against secure communications such as TLS in an attempt to get the user or system to inadvertently shift to less secure cryptographic modes. The idea is to trick the user into shifting to a less secure version of the protocol, one that might be easier to break."},{"chapter":"ch7","chapter_name":"Chapter 7: Cryptography and the PKI","num":17,"question":"David would like to send Mike a message using an asymmetric encryption algorithm. What key should he use to encrypt the message?","options":{"A":"David's public key","B":"David's private key","C":"Mike's public key","D":"Mike's private key"},"correct":["C"],"explanation":"When encrypting a message using an asymmetric encryption algorithm, the person performing the encryption does so using the recipient's public key."},{"chapter":"ch7","chapter_name":"Chapter 7: Cryptography and the PKI","num":18,"question":"When Mike receives the message that David encrypted for him, what key should he use to decrypt the message?","options":{"A":"David's public key","B":"David's private key","C":"Mike's public key","D":"Mike's private key"},"correct":["D"],"explanation":"In an asymmetric encryption algorithm, the recipient of a message uses their own private key to decrypt messages that they receive."},{"chapter":"ch7","chapter_name":"Chapter 7: Cryptography and the PKI","num":19,"question":"If David wishes to digitally sign the message that he is sending Mike, what key would he use to create the digital signature?","options":{"A":"David's public key","B":"David's private key","C":"Mike's public key","D":"Mike's private key"},"correct":["B"],"explanation":"The sender of a message may digitally sign the message by encrypting a message digest with the sender's own private key."},{"chapter":"ch7","chapter_name":"Chapter 7: Cryptography and the PKI","num":20,"question":"When Mike receives the digitally signed message from David, what key should he use to verify the digital signature?","options":{"A":"David's public key","B":"David's private key","C":"Mike's public key","D":"Mike's private key"},"correct":["A"],"explanation":"The recipient of a digitally signed message may verify the digital signature by decrypting it with the public key of the individual who signed the message."},{"chapter":"ch8","chapter_name":"Chapter 8: Identity and Access Management","num":1,"question":"Angela has chosen to federate with other organizations to allow use of services that each organization provides. What role does Angela's organization play when they authenticate their users and assert that those users are valid to other members of the federation?","options":{"A":"Service provider","B":"Relying party","C":"Authentication provider","D":"Identity provider"},"correct":["D"],"explanation":"Angela's organization is acting as an identity provider (IdP). Other members of the federation may act as a service provider or relying party when they allow her users to access their services. Authentication provider is not a named role in typical federation activities."},{"chapter":"ch8","chapter_name":"Chapter 8: Identity and Access Management","num":2,"question":"Which of the following technologies is the least effective means of preventing shared accounts?","options":{"A":"Password complexity requirements","B":"Requiring biometric authentication","C":"Requiring one-time passwords via a token","D":"Requiring a one-time password via an application"},"correct":["A"],"explanation":"Password complexity requirements do not prevent sharing of complex passwords, making it the least effective option from the list. Biometric authentication measures will require the enrolled user to be there, although in some cases such as fingerprint systems, multiple users could each enroll a valid fingerprint for a single account. Both types of one-time passwords could be shared but make it harder and less convenient to share accounts."},{"chapter":"ch8","chapter_name":"Chapter 8: Identity and Access Management","num":4,"question":"Amitoj wants to ensure that her organization's password policy does not allow users to reset their password multiple times until they can reuse their current password. What setting is used to prevent this?","options":{"A":"Complexity","B":"Length","C":"Expiration","D":"Age"},"correct":["D"],"explanation":"Password age is set to prevent users from resetting their password enough times to bypass reuse settings. Complexity, length, and expiration do not influence this."},{"chapter":"ch8","chapter_name":"Chapter 8: Identity and Access Management","num":5,"question":"Which type of multifactor authentication is considered the least secure?","options":{"A":"HOTP","B":"SMS","C":"TOTP","D":"Biometric"},"correct":["B"],"explanation":"SMS messages are not secure and could be accessed by cloning a SIM card or redirecting VoIP traffic, among other possible threat models. Both HOTP and TOTP tokens and applications as well as biometric factors are generally considered more secure than an SMS- based factor."},{"chapter":"ch8","chapter_name":"Chapter 8: Identity and Access Management","num":6,"question":"Geeta has been issued a USB security key as part of her organization's multifactor implementation. What type of implementation is this?","options":{"A":"A hard token","B":"A biometric token","C":"A soft token","D":"An attestation token"},"correct":["A"],"explanation":"A USB security key is an example of a hard, or physical, token. An application is an example of a soft token. A biometric factor might be a fingerprint or faceprint. Attestation is a formal verification that something is true. Attestation tokens were made up for this question."},{"chapter":"ch8","chapter_name":"Chapter 8: Identity and Access Management","num":7,"question":"Michelle enables the Windows picture password feature to control logins for her laptop. Which type of attribute will it provide?","options":{"A":"Somewhere you are","B":"Something you know","C":"Something you are","D":"Someone you know"},"correct":["B"],"explanation":"Picture password asks users to click on specific, self-defined parts of a picture. This means that clicking on those points is something you know. Something you are involves biometric traits, and somewhere you are relies on geographic locations."},{"chapter":"ch8","chapter_name":"Chapter 8: Identity and Access Management","num":8,"question":"What purpose would Linux file permissions set to rw-r—r-- serve?","options":{"A":"To allow the owner to read and write the file, and for the owner's group and others to be able to read it","B":"To allow all users to read and write the file, and for the group and owner to be able to read it","C":"To allow system administrators to read and write the file, and for users and all others to be able to read it","D":"To prevent reading and writing for all users, and to prevent reading by groups and a specific user"},"correct":["A"],"explanation":"Linux file permissions are read left to right, with the first three characters indicating read, write, and execute permissions (rwx) for the owner of the file, the second three apply to the group, and the last three to all other users. Any indicated with a – are not allowed for that set."},{"chapter":"ch8","chapter_name":"Chapter 8: Identity and Access Management","num":9,"question":"Theresa wants to implement an access control scheme that sets permissions based on what the individual's job requires. Which of the following schemes is most suited to this type of implementation?","options":{"A":"ABAC","B":"DAC","C":"RBAC","D":"MAC"},"correct":["C"],"explanation":"Role-based access control (RBAC) sets permissions based on an individual's role, which is typically associated with their job. Attribute- based access control (ABAC) is typically matched to other attributes than the job role. Discretionary access control (DAC) and mandatory access control (MAC) are commonly implemented at the operating system level."},{"chapter":"ch8","chapter_name":"Chapter 8: Identity and Access Management","num":10,"question":"Which of the following biometric technologies is most broadly deployed due to its ease of use and acceptance from end users?","options":{"A":"Voice print recognition","B":"Gait recognition","C":"Retina scanners","D":"Fingerprint scanner"},"correct":["D"],"explanation":"Fingerprint scanners are found on many mobile devices and laptops, making them one of the most broadly deployed biometric technologies. Facial recognition is also broadly deployed, but it is not mentioned in this question or offered as an option."},{"chapter":"ch8","chapter_name":"Chapter 8: Identity and Access Management","num":11,"question":"Adam want to increase his organization's passwords resistance to attacks in the event that the password hash database is stolen by attackers. Which of the following password security settings has the largest impact on password cracking if his organization's current passwords are 8 characters long?","options":{"A":"Password complexity","B":"Password length","C":"Password reuse limitations","D":"Preventing the use of common words in passwords"},"correct":["B"],"explanation":"Password length has the largest impact on preventing password cracking. When paired with a strong password hash algorithm and proper use of technology like salting, long passwords are much harder to crack. Complexity is the next most important option, as preventing simple repeated characters and similar problematic passwords helps reduce the probability of easily cracked passwords being used. Reuse limitations and preventing common words are less useful."},{"chapter":"ch8","chapter_name":"Chapter 8: Identity and Access Management","num":12,"question":"A PIN is an example of what type of factor?","options":{"A":"Something you know","B":"Something you are","C":"Something you have","D":"Something you set"},"correct":["A"],"explanation":"PINs and passwords are both examples of something you know. Something you set is not a type of factor. Biometric factors are an example of something you are, and a physical USB token would be a common example of something you have."},{"chapter":"ch8","chapter_name":"Chapter 8: Identity and Access Management","num":13,"question":"Marie is implementing a PAM solution and wants to ensure that root passwords are available in the event of an outage. Which PAM-related tool is most likely to be useful in this situation?","options":{"A":"Ephemeral accounts","B":"Just-in-time permissions","C":"Password vaulting","D":"Token-based authentication"},"correct":["C"],"explanation":"Password vaulting, which stores passwords for use with proper authentication and rights, is the most appropriate solution for Marie's needs. Ephemeral accounts and just-in-time permissions are typically used under normal circumstances to provide least privilege access as needed. Token-based authentication is not specifically a PAM solution."},{"chapter":"ch8","chapter_name":"Chapter 8: Identity and Access Management","num":14,"question":"Jill sets her files on a Windows file share to allow Fred to access the files. What type of access control system is she using?","options":{"A":"Mandatory access control","B":"Rule-based access control","C":"Attribute-based access control","D":"Discretionary access control"},"correct":["D"],"explanation":"Jill is able to make decisions about the rights she grants on her files, meaning this is a discretionary access control system. A mandatory access control system relies on labels to set access control rules. Rule- based access control systems rely on rules to define access, and attribute-based access control systems grant access based on attributes like job roles or locations."},{"chapter":"ch8","chapter_name":"Chapter 8: Identity and Access Management","num":15,"question":"Lisa sets up an account on a website that allows her to log in with Google. When she logs in, Google provides an access token to the website that confirms that she is who she says she is but doesn't provide the site with her password. Which of the following technologies has she used?","options":{"A":"LDAP","B":"OAuth","C":"MITRE","D":"RADIUS"},"correct":["B"],"explanation":"OAuth is an authentication protocol that allows services to receive authentication tokens from an identity provider without needing the user's password. LDAP is a directory service and is often used as part of SSO processes. MITRE is a nonprofit organization, and RADIUS is an authentication technology."},{"chapter":"ch8","chapter_name":"Chapter 8: Identity and Access Management","num":16,"question":"Kyle has been asked to provide his government-issued ID as part of the creation of his user account. What process should he assume it is being used for?","options":{"A":"Biometric enrollment","B":"Just-in-time permission creation","C":"Identity proofing","D":"Federation"},"correct":["C"],"explanation":"Kyle can assume that his government-issued ID is being used as part of an identity proofing process to validate that he is who he claims to be. Biometric enrollment typically requires interaction with an enrollment process to scan or capture biometric information. Just-in- time permission creation is done when access is requested and does not require government ID, and federation connects identity providers with service providers, which is not described here."},{"chapter":"ch8","chapter_name":"Chapter 8: Identity and Access Management","num":17,"question":"What key concept below best describes only providing the permissions necessary to perform a role?","options":{"A":"Least privilege","B":"Best practice","C":"Ephemeral accounts","D":"Mandatory access control"},"correct":["A"],"explanation":"The principle of least privilege means that users should only be given the permissions necessary to perform their role. Best practice is a general term describing commonly recommended and accepted industry practices. Temporal accounts are ephemeral, or short-lived accounts. Mandatory access control is an access control scheme."},{"chapter":"ch8","chapter_name":"Chapter 8: Identity and Access Management","num":18,"question":"Nina has recently left her organization. What should the organization do with her account?","options":{"A":"Transfer it to her replacement.","B":"Reprovision it for another user.","C":"Deprovision her account.","D":"Change the password and preserve the account."},"correct":["C"],"explanation":"Without other factors that would require the account to be retained, deprovisioning accounts that belonged to users who have left the organization is a best practice. Transferring accounts or reprovisioning them may expose data to new users or provide them with rights that they should not have."},{"chapter":"ch8","chapter_name":"Chapter 8: Identity and Access Management","num":19,"question":"A person's name, age, location, or job title are all examples of what?","options":{"A":"Biometric factors","B":"Identity factors","C":"Attributes","D":"Account permissions"},"correct":["C"],"explanation":"A person's name, age, location, job title, and even things like their height or their hair color are all attributes that may be associated with a person's identity. None of these describe biometric factors used for authentication, and identity factors are something you are, something you have, or somewhere you are. Account permissions determine what you can do, not attributes like these."},{"chapter":"ch8","chapter_name":"Chapter 8: Identity and Access Management","num":20,"question":"What type of access control scheme best describes the Linux filesystem?","options":{"A":"MAC","B":"RBAC","C":"DAC","D":"ABAC"},"correct":["C"],"explanation":"Linux users can change who can read, write, or execute files and directories they own, which is discretionary access control (DAC). Mandatory access control (MAC) would enforce settings set by the systems administrator without users having the rights to make their own decisions. While role-based access control is involved, DAC best describes the access control scheme. ABAC is not a default method for setting rights for the Linux filesystem."},{"chapter":"ch9","chapter_name":"Chapter 9: Resilience and Physical Security","num":1,"question":"Naomi wants to handle increasing load by scaling cloud-hosted resources as needed while having the change remain transparent to users. She also wants to allow for upgrades and system replacements transparently. What solution should she select?","options":{"A":"Load balancing","B":"Clustering","C":"Geographic diversity","D":"A hot site"},"correct":["A"],"explanation":"Naomi should select a load balancing solution. Load balancers allow multiple systems or services to appear like a single resource and can take systems out of the load-balanced pool to allow for upgrades or changes in resources required. Clustering is used to allow groups of computers to perform the same task, but without a load balancer cannot provide the same transparent service appearing as the same system. Geographic diversity and hot sites are concepts used to provide resilience but don't provide this capability."},{"chapter":"ch9","chapter_name":"Chapter 9: Resilience and Physical Security","num":2,"question":"Rick performs a backup that captures the changes since the last full backup. What type of backup has he performed?","options":{"A":"A new full backup","B":"A snapshot","C":"An incremental backup","D":"A differential backup"},"correct":["D"],"explanation":"Differential backups back up the changes since the last full backup. Incremental backups back up changes since the last backup, and snapshots are a live copy of a system. This is not a full backup, because it is capturing changes since a full backup."},{"chapter":"ch9","chapter_name":"Chapter 9: Resilience and Physical Security","num":3,"question":"What type of recovery site has some or most systems in place but does not have the data needed to take over operations?","options":{"A":"A hot site","B":"A warm site","C":"A cloud site","D":"A cold site"},"correct":["B"],"explanation":"Warm sites have systems, connectivity, and power but do not have the live or current data to immediately take over operations. A hot site can immediately take over operations, whereas a cold site has space and power, and likely connectivity, but will require that systems and data be put in place to be used. Cloud sites are not one of the three common types of recovery sites."},{"chapter":"ch9","chapter_name":"Chapter 9: Resilience and Physical Security","num":4,"question":"Ben wants to test his warm site to verify that it will take over operations successfully. What type of testing is this?","options":{"A":"Parallel processing","B":"Simulation","C":"Failover","D":"A tabletop exercise"},"correct":["C"],"explanation":"Testing that involves an actual failover to another site or service is failover testing. Parallel processing runs both sites or services at the same time; simulation and tabletops both review what would happen without making the actual change."},{"chapter":"ch9","chapter_name":"Chapter 9: Resilience and Physical Security","num":5,"question":"Felix wants to clone a virtual machine. What should he do to capture a live machine, including the machine state?","options":{"A":"A full backup","B":"A snapshot","C":"A differential backup","D":"Live boot media"},"correct":["B"],"explanation":"Virtual machine snapshots capture the machine state at a point in time and will allow Felix to clone the system. A full backup and a differential backup can be used to capture the disk for the machine but typically will not capture the memory state and other details of the system state. Live boot media allows you to boot and run a nonpersistent system from trusted media."},{"chapter":"ch9","chapter_name":"Chapter 9: Resilience and Physical Security","num":6,"question":"Sally is working to restore her organization's operations after a disaster took her datacenter offline. What critical document should she refer to as she restarts systems?","options":{"A":"The restoration order documentation","B":"The TOTP documentation","C":"The HOTP documentation","D":"The last-known good configuration documentation"},"correct":["A"],"explanation":"A documented restoration order helps ensure that systems and services that have dependencies start in the right order and that high- priority or mission-critical services are restored first. TOTP and HOTP are types of one-time password technology, and last-known good configurations are often preserved with a snapshot or other technology that can allow a system to return to a known good status after an issue such as a bad patch or configuration change."},{"chapter":"ch9","chapter_name":"Chapter 9: Resilience and Physical Security","num":7,"question":"Mike wants to stop vehicles from traveling toward the entrance of his building. What physical security control should he implement?","options":{"A":"An air gap","B":"A hot aisle","C":"A robotic sentry","D":"A bollard"},"correct":["D"],"explanation":"Bollards are physical security controls that prevent vehicles from accessing or ramming doors or other areas. They may look like pillars, planters, or other innocuous objects. An air gap is a physical separation of technology environments; a hot aisle is the aisle where systems in a datacenter exhaust warm air; and unlike in movies, robotic sentries are not commonly deployed and aren't ready to stop vehicles in most current circumstances."},{"chapter":"ch9","chapter_name":"Chapter 9: Resilience and Physical Security","num":8,"question":"Alecia wants to ensure that her backups cannot be accessed by third parties while stored in an offsite storage location. What should she do to secure her backups?","options":{"A":"Hash the backup data.","B":"Avoid the use of offsite storage locations.","C":"Employ security guards.","D":"Encrypt the backup data."},"correct":["D"],"explanation":"Encryption is commonly used to ensure that backup media or data that is exposed is not accessible to third parties. This does mean that Alecia must carefully secure the encryption keys for the backup. Hashing that data would not keep it secure, and if only hashes were stored the data would be unrecoverable. Security guards are expensive and not a complete solution if data is inadvertently exposed, and offsite, secure storage locations are a useful and common solution for organizations that want to have remote backups."},{"chapter":"ch9","chapter_name":"Chapter 9: Resilience and Physical Security","num":9,"question":"Fred wants to be able to recover his database transactions at any point in time if a physical disaster occurs involving his datacenter. His organization uses daily backups. What additional solution should he select to support this need?","options":{"A":"Onsite journaling","B":"Onsite snapshots","C":"Offsite journaling","D":"Offsite snapshots"},"correct":["C"],"explanation":"Offsite journaling will allow transactions to be recorded and to remain available if a significant event occurred that involved his datacenter. Snapshots are useful at a point in time but do not retain a transaction log between snapshots."},{"chapter":"ch9","chapter_name":"Chapter 9: Resilience and Physical Security","num":10,"question":"Ellen is concerned about her company's resilience and wants to ensure it can handle either changing loads or support disaster recovery and business continuity efforts if a primary location or datacenter were taken offline. Which of the following should she primarily focus on during her capacity planning?","options":{"A":"People, technology, and infrastructure","B":"A generator and a UPS","C":"RAID 0, 1, 5, and 10","D":"Incremental, differential, and full backups"},"correct":["A"],"explanation":"Resilience requires capacity planning to ensure that capacity— including staff, technology, and infrastructure—is available when is needed. Although a generator, UPS, various RAID levels, and backups have their place in disaster recovery and contingency planning, they are not the primary focus of resiliency and capacity planning."},{"chapter":"ch9","chapter_name":"Chapter 9: Resilience and Physical Security","num":11,"question":"Madhuri has deployed a replication tool that copies data over to a secondary hot site in real time. What type of replication has she deployed?","options":{"A":"Synchronous replication","B":"Journaled replication","C":"Asynchronous replication","D":"Snapshot-based replication"},"correct":["A"],"explanation":"Synchronous replication occurs in real time, whereas asynchronous replication occurs after the fact but more regularly than a backup. Journaled and snapshot-based replication are not specific types of replication."},{"chapter":"ch9","chapter_name":"Chapter 9: Resilience and Physical Security","num":12,"question":"What factor is a major reason organizations do not use security guards?","options":{"A":"Reliability","B":"Training","C":"Cost","D":"Social engineering"},"correct":["C"],"explanation":"Security guards can be one of the costliest physical security controls over time, making the cost of guards one of the most important deciding factors guiding when and where they will be employed. Reliability, training, and the potential for social engineering are all possible issues with security guards, but none of these is the major driver in the decision process."},{"chapter":"ch9","chapter_name":"Chapter 9: Resilience and Physical Security","num":13,"question":"Megan wants to deploy a sensor that is inexpensive, yet will allow her to detect humans entering and moving in a secured room. Which of the following should she select?","options":{"A":"An infrared sensor","B":"A microwave sensor","C":"An ultrasonic sensor","D":"A pressure sensor"},"correct":["A"],"explanation":"Infrared sensors balance lower cost with the ability to detect humans entering and moving in a space. Microwave sensors are more expensive but can provide better coverage, including traveling through some barriers. Ultrasonic sensors are rarely used for this purpose, and pressure sensors are limited to the pad where they are deployed, making them expensive and challenging to use for rooms or larger spaces."},{"chapter":"ch9","chapter_name":"Chapter 9: Resilience and Physical Security","num":14,"question":"Kathleen wants to discourage potential attackers from entering the facility she is responsible for. Which of the following is not a common control used for this type of preventive defense?","options":{"A":"Fences","B":"Lighting","C":"Platform diversity","D":"Video surveillance"},"correct":["C"],"explanation":"Fences, lighting, and video surveillance can all help discourage potential malicious actors from entering an area, although a determined adversary will ignore or bypass all three. Platform diversity can help make it harder for attackers to succeed, but this is primarily a resilience tactic, and remains more costly to maintain and implement."},{"chapter":"ch9","chapter_name":"Chapter 9: Resilience and Physical Security","num":15,"question":"How does technology diversity help ensure cybersecurity resilience?","options":{"A":"It ensures that a vulnerability in a single company's product will not impact the entire infrastructure.","B":"If a single vendor goes out of business, the company does not need to replace its entire infrastructure.","C":"It means that a misconfiguration will not impact the company's entire infrastructure.","D":"All of the above."},"correct":["D"],"explanation":"Technology diversity helps ensure that a single failure—due to a vendor, vulnerability, or misconfiguration—will not impact an entire organization. Technology diversity does have additional costs, including training, patch management, and configuration management."},{"chapter":"ch9","chapter_name":"Chapter 9: Resilience and Physical Security","num":16,"question":"Scott sends his backups to a company that keeps them in a secure vault. What type of backup solution has he implemented?","options":{"A":"Nearline","B":"Safe","C":"Onsite","D":"Offsite"},"correct":["D"],"explanation":"Scott has implemented an offsite backup scheme. His backups will take longer to retrieve because they are at a remote facility and will have to be sent back to him, but they are likely to survive any disaster that occurs in his facility or datacenter. Onsite backups are kept immediately accessible, whereas nearline backups can be retrieved somewhat more slowly than online backups but faster than offline backups. “Safe backups” is not an industry term."},{"chapter":"ch9","chapter_name":"Chapter 9: Resilience and Physical Security","num":17,"question":"Gabby wants to detect physical brute-force attempts against her organization. What solution is best suited to this?","options":{"A":"Security guards","B":"Locks","C":"Access badges","D":"An intrusion detection system (IDS)"},"correct":["A"],"explanation":"Security guards who can monitor for and understand the signs of a physical brute-force attempt are the most useful control listed. Locks may show signs of attempts but require careful inspection, access badges would require log review and additional information to detect brute-force attacks, and an IDS is useful for network attacks."},{"chapter":"ch9","chapter_name":"Chapter 9: Resilience and Physical Security","num":18,"question":"Florian wants to test his high-availability designs but does not want to interrupt his organization's normal work. Which of the following is the least disruptive testing scenario?","options":{"A":"A failover exercise","B":"A tabletop exercise","C":"A partial failover exercise","D":"A simulation"},"correct":["B"],"explanation":"A tabletop exercise is the least disruptive form of exercise. Even simulations have some risk if an employee does not fully realize that the scenario is simulated and takes action. Failover, even partial, involves the potential for disruption."},{"chapter":"ch9","chapter_name":"Chapter 9: Resilience and Physical Security","num":19,"question":"What type of physical security control is shown here?","options":{"A":"A Faraday cage","B":"An access control vestibule","C":"A bollard","D":"An air gap"},"correct":["B"],"explanation":"An access control vestibule uses a pair of doors. When an individual enters, the first door must be closed and secured before the second door can be opened. This helps prevent tailgating, since the person entering will notice anybody following them through the secured area. A Faraday cage is used to stop electromagnetic interference (EMI), a bollard prevents vehicular traffic, and an air gap is a physical separation of networks or devices."},{"chapter":"ch9","chapter_name":"Chapter 9: Resilience and Physical Security","num":20,"question":"Gurvinder identifies a third-party datacenter provider over 90 miles away to run his redundant datacenter operations. Why has he placed the datacenter that far away?","options":{"A":"Because it is required by law","B":"Network traffic latency concerns","C":"Geographic dispersion","D":"Geographic tax reasons"},"correct":["C"],"explanation":"Geographic dispersion helps ensure that a single natural or human- made disaster does not disable multiple facilities. This distance is not required by law; latency increases with distance; and though there may be tax reasons in some cases, this is not a typical concern for a security professional."},{"chapter":"ch10","chapter_name":"Chapter 10: Cloud and Virtualization Security","num":1,"question":"Kevin discovered that his web server was being overwhelmed by traffic, causing a CPU bottleneck. Using the interface offered by his cloud service provider, he added another CPU to the server. What term best describes Kevin's action?","options":{"A":"Elasticity","B":"Horizontal scaling","C":"Vertical scaling","D":"High availability"},"correct":["C"],"explanation":"This is an example of adding additional capacity to an existing server, which is also known as vertical scaling. Kevin could also have used horizontal scaling by adding additional web servers. Elasticity involves the ability to both add and remove capacity on demand, and though it does describe this scenario, it's not as good a description as vertical scaling. There is no mention of increasing the server's availability."},{"chapter":"ch10","chapter_name":"Chapter 10: Cloud and Virtualization Security","num":2,"question":"Fran's organization uses a Type I hypervisor to implement an IaaS offering that it sells to customers. Which one of the following security controls is least applicable to this environment?","options":{"A":"Customers must maintain security patches on guest operating systems.","B":"The provider must maintain security patches on the hypervisor.","C":"The provider must maintain security patches on the host operating system.","D":"Customers must manage security groups to mediate network access to guest operating systems."},"correct":["C"],"explanation":"Type I hypervisors, also known as bare-metal hypervisors, run directly on top of the physical hardware and, therefore, do not require a host operating system."},{"chapter":"ch10","chapter_name":"Chapter 10: Cloud and Virtualization Security","num":3,"question":"In what cloud security model does the cloud service provider bear the most responsibility for implementing security controls?","options":{"A":"IaaS","B":"FaaS","C":"PaaS","D":"SaaS"},"correct":["D"],"explanation":"The cloud service provider bears the most responsibility for implementing security controls in an SaaS environment and the least responsibility in an IaaS environment. This is due to the division of responsibilities under the cloud computing shared responsibility model."},{"chapter":"ch10","chapter_name":"Chapter 10: Cloud and Virtualization Security","num":4,"question":"Greg would like to find a reference document that describes how to map cloud security controls to different regulatory standards. What document would best assist with this task?","options":{"A":"CSA CCM","B":"NIST SP 500-292","C":"ISO 27001","D":"PCI DSS"},"correct":["A"],"explanation":"The Cloud Security Alliance (CSA) Cloud Controls Matrix (CCM) is a reference document designed to help organizations understand the appropriate use of cloud security controls and map those controls to various regulatory standards. NIST SP 500-292 is a reference model for cloud computing and operates at a high level. ISO 27001 is a general standard for cybersecurity, and PCI DSS is a regulatory requirement for organizations involved in processing credit card transactions."},{"chapter":"ch10","chapter_name":"Chapter 10: Cloud and Virtualization Security","num":5,"question":"Wanda is responsible for a series of seismic sensors placed at remote locations. These sensors have low-bandwidth connections, and she would like to place computing power on the sensors to allow them to preprocess data before it is sent back to the cloud. What term best describes this approach?","options":{"A":"Edge computing","B":"Client-server computing","C":"Fog computing","D":"Thin client computing"},"correct":["A"],"explanation":"This approach may be described as client-server computing, but that is a general term that describes many different operating environments. The better term to use here is edge computing, which involves placing compute power at the client to allow it to perform preprocessing before sending data back to the cloud. Fog computing is a related concept that uses IoT gateway devices that are located in close physical proximity to the sensors."},{"chapter":"ch10","chapter_name":"Chapter 10: Cloud and Virtualization Security","num":6,"question":"Which one of the following statements about cloud computing is incorrect?","options":{"A":"Cloud computing offers ubiquitous, convenient access.","B":"Cloud computing customers store data on hardware that is shared with other customers.","C":"Cloud computing customers provision resources through the service provider's sales team.","D":"Cloud computing resources are accessed over a network."},"correct":["C"],"explanation":"One of the key characteristics of cloud computing is that customers can access resources on-demand with minimal service provider interaction. Cloud customers do not need to contact a sales representative each time they wish to provision a resource but can normally do so on a self-service basis."},{"chapter":"ch10","chapter_name":"Chapter 10: Cloud and Virtualization Security","num":7,"question":"Helen designed a new payroll system that she offers to her customers. She hosts the payroll system in AWS and her customers access it through the web. What tier of cloud computing best describes Helen's service?","options":{"A":"PaaS","B":"SaaS","C":"FaaS","D":"IaaS"},"correct":["B"],"explanation":"Helen is using IaaS services to create her payroll product. She is then offering that payroll service to her customers as a SaaS solution."},{"chapter":"ch10","chapter_name":"Chapter 10: Cloud and Virtualization Security","num":8,"question":"Which cloud computing deployment model requires the use of a unifying technology platform to tie together components from different providers?","options":{"A":"Public cloud","B":"Private cloud","C":"Community cloud","D":"Hybrid cloud"},"correct":["D"],"explanation":"Hybrid cloud environments blend elements of public, private, and/or community cloud solutions. A hybrid cloud requires the use of technology that unifies the different cloud offerings into a single, coherent platform."},{"chapter":"ch10","chapter_name":"Chapter 10: Cloud and Virtualization Security","num":9,"question":"Which one of the following would not commonly be available as an IaaS service offering?","options":{"A":"CRM","B":"Storage","C":"Networking","D":"Computing"},"correct":["A"],"explanation":"Customer relationship management (CRM) packages offered in the cloud would be classified as software-as-a-service (SaaS), since they are not infrastructure components. Storage, networking, and computing resources are all common IaaS offerings."},{"chapter":"ch10","chapter_name":"Chapter 10: Cloud and Virtualization Security","num":10,"question":"Which one of the following is not an example of infrastructure as code?","options":{"A":"Defining infrastructure in JSON","B":"Writing code to interact with a cloud provider's API","C":"Using a cloud provider's web interface to provision resources","D":"Defining infrastructure in YAML"},"correct":["C"],"explanation":"Infrastructure as code (IaC) is any approach that automates the provisioning, management, and deprovisioning of cloud resources. Defining resources through JSON or YAML is IaC, as is writing code that interacts with an API. Provisioning resources through a web interface is manual, not automated, and therefore does not qualify as IaC."},{"chapter":"ch10","chapter_name":"Chapter 10: Cloud and Virtualization Security","num":11,"question":"Brian is selecting a CASB for his organization, and he would like to use an approach that interacts with the cloud provider directly. Which CASB approach is most appropriate for his needs?","options":{"A":"Inline CASB","B":"Outsider CASB","C":"Comprehensive CASB","D":"API-based CASB"},"correct":["D"],"explanation":"API-based CASB solutions interact directly with the cloud provider through the provider's API. Inline CASB solutions intercept requests between the user and the provider. Outsider and comprehensive are not categories of CASB solutions."},{"chapter":"ch10","chapter_name":"Chapter 10: Cloud and Virtualization Security","num":12,"question":"In which of the following cloud categories are customers typically charged based on the number of virtual server instances dedicated to their use?","options":{"A":"IaaS only","B":"SaaS only","C":"IaaS and PaaS","D":"IaaS, SaaS, and PaaS"},"correct":["C"],"explanation":"Customers are typically charged for server instances in both IaaS environments, where they directly provision those instances, and PaaS environments, where they request the number of servers needed to support their applications. In an SaaS environment, the customer typically has no knowledge of the number of server instances supporting their use."},{"chapter":"ch10","chapter_name":"Chapter 10: Cloud and Virtualization Security","num":13,"question":"Brian would like to limit the ability of users inside his organization to provision expensive cloud server instances without permission. What type of control would best help him achieve this goal?","options":{"A":"Resource policy","B":"Security group","C":"Multifactor authentication","D":"Secure web gateway"},"correct":["A"],"explanation":"Cloud providers offer resource policies that customers may use to limit the actions that users of their accounts may take. Implementing resource policies is a good security practice to limit the damage caused by an accidental command, a compromised account, or a malicious insider."},{"chapter":"ch10","chapter_name":"Chapter 10: Cloud and Virtualization Security","num":14,"question":"Ursula would like to link the networks in her on-premises datacenter with cloud VPCs in a secure manner. What technology would help her best achieve this goal?","options":{"A":"Transit gateway","B":"HSM","C":"VPC endpoint","D":"SWG"},"correct":["A"],"explanation":"Cloud providers offer VPC endpoints that allow connections of VPCs to each other using the cloud provider’s secure network. Cloud transit gateways extend this model even further, allowing the direct interconnection of cloud VPCs with on-premises VLANs for hybrid cloud operations. Secure web gateways (SWGs) provide a layer of application security for cloud-dependent organizations. Hardware security modules (HSMs) are special-purpose computing devices that manage encryption keys and also perform cryptographic operations in a highly efficient manner."},{"chapter":"ch10","chapter_name":"Chapter 10: Cloud and Virtualization Security","num":15,"question":"What component of a virtualization platform is primarily responsible for preventing VM escape attacks?","options":{"A":"Administrator","B":"Guest operating system","C":"Host operating system","D":"Hypervisor"},"correct":["D"],"explanation":"Virtual machine (VM) escape vulnerabilities are the most serious issue that can exist in a virtualized environment, particularly when a virtual host runs systems of differing security levels. In an escape attack, the attacker has access to a single virtual host and then manages to leverage that access to intrude upon the resources assigned to a different virtual machine. The hypervisor is supposed to prevent this type of access by restricting a virtual machine's access to only those resources assigned to that machine."},{"chapter":"ch10","chapter_name":"Chapter 10: Cloud and Virtualization Security","num":16,"question":"Ryan is selecting a new security control to meet his organization's objectives. He would like to use it in their multicloud environment and would like to minimize the administrative work required from his fellow technologists. What approach would best meet his needs?","options":{"A":"Third-party control","B":"Internally developed control","C":"Cloud-native control","D":"Any of the above"},"correct":["A"],"explanation":"Controls offered by cloud service providers have the advantage of direct integration with the provider's offerings, often making them cost-effective and user-friendly. Third-party solutions are often more costly, but they bring the advantage of integrating with a variety of cloud providers, facilitating the management of multicloud environments."},{"chapter":"ch10","chapter_name":"Chapter 10: Cloud and Virtualization Security","num":17,"question":"Kira would like to implement a security control that can implement access restrictions across all of the SaaS solutions used by her organization. What control would best meet her needs?","options":{"A":"Security group","B":"Resource policy","C":"CASB","D":"SWG"},"correct":["C"],"explanation":"Cloud access security brokers (CASBs) are designed specifically for this situation: enforcing security controls across cloud providers. A secure web gateway (SWG) may be able to achieve Kira's goal, but it would be more difficult to do so. Security groups and resource policies are controls used in IaaS environments."},{"chapter":"ch10","chapter_name":"Chapter 10: Cloud and Virtualization Security","num":18,"question":"Howard is assessing the legal risks to his organization based on its handling of PII. The organization is based in the United States, handles the data of customers located in Europe, and stores information in Japanese datacenters. What law would be most important to Howard during his assessment?","options":{"A":"Japanese law","B":"European Union law","C":"U.S. law","D":"All should have equal weight."},"correct":["D"],"explanation":"The principle of data sovereignty states that data is subject to the legal restrictions of any jurisdiction where it is collected, stored, or processed. In this case, Howard needs to assess the laws of all three jurisdictions."},{"chapter":"ch10","chapter_name":"Chapter 10: Cloud and Virtualization Security","num":19,"question":"Brenda's company provides a managed incident response service to its customers. What term best describes this type of service offering?","options":{"A":"MSP","B":"PaaS","C":"SaaS","D":"MSSP"},"correct":["D"],"explanation":"Brenda's company is offering a technology service to customers on a managed basis, making it a managed service provider (MSP). However, this service is a security service, so the term managed security service provider (MSSP) is a better description of the situation."},{"chapter":"ch10","chapter_name":"Chapter 10: Cloud and Virtualization Security","num":20,"question":"Tony purchases virtual machines from Microsoft Azure exclusively for use by his organization. What model of cloud computing is this?","options":{"A":"Public cloud","B":"Private cloud","C":"Hybrid cloud","D":"Community cloud"},"correct":["A"],"explanation":"This is an example of public cloud computing because Tony is using a public cloud provider, Microsoft Azure. The fact that Tony is limiting access to virtual machines to his own organization is not relevant because the determining factor for the cloud model is whether the underlying infrastructure is shared, not whether virtualized resources are shared."},{"chapter":"ch11","chapter_name":"Chapter 11: Endpoint Security","num":1,"question":"Lin's hardware manufacturer has stopped selling the model of device that Lin's organization uses and has also stopped providing security or other updates. What phase of the hardware life cycle is the device in?","options":{"A":"End-of-life","B":"Legacy","C":"End-of-sales","D":"Senescence"},"correct":["B"],"explanation":"Legacy hardware is unsupported and no longer sold. End-of-life typically means that the device is no longer being made but is likely to still have support for a period of time. End-of-sales means the device is no longer being sold, but again, may have support for some time. Senescence is not a term typically used in hardware life cycles."},{"chapter":"ch11","chapter_name":"Chapter 11: Endpoint Security","num":2,"question":"Naomi has discovered the following TCP ports open on a system she wants to harden. Which ports are used for unsecure services and thus should be disabled to allow their secure equivalents to continue to be used?","options":{"A":"21, 22, and 80","B":"21 and 80","C":"21, 23, and 80","D":"22 and 443"},"correct":["C"],"explanation":"The services listed are: 21—FTP 22—SSH 23—Telnet 80—HTTP 443—HTTPS Of these services, SSH (Port 22) and HTTPS (port 443) are secure options for remote shell access and HTTP. Although secure mode FTP (FTP/S) may run on TCP 21, there is not enough information to know for sure, and HTTPS can be used for secure file transfer if necessary. Thus, Naomi's best option is to disable all three likely unsecure protocols: FTP (port 21), Telnet (port 23), and HTTP (port 80)."},{"chapter":"ch11","chapter_name":"Chapter 11: Endpoint Security","num":3,"question":"Frank's organization is preparing to deploy a data loss prevention (DLP) system. What key process should they undertake before they deploy it?","options":{"A":"Define data life cycles for all nonsensitive data.","B":"Encrypt all sensitive data.","C":"Implement and use a data classification scheme.","D":"Tag all data by creator or owner."},"correct":["C"],"explanation":"Protecting data using a DLP requires data classification so that the DLP knows which data should be protected and what policies to apply to it. Defining data life cycles can help prevent data from being kept longer than it should be and improves data security by limiting the data that needs to be secured, but it isn't necessary as part of a DLP deployment. Encrypting all sensitive data may mean the DLP cannot recognize it and may not be appropriate for how it is used. Tagging all data with a creator or owner can be useful but is not required for a DLP rollout—instead, knowing the classification of the data is more important."},{"chapter":"ch11","chapter_name":"Chapter 11: Endpoint Security","num":4,"question":"Oliver wants to store and manage secrets in his cloud service provider's environment. What type of solution should he look for as part of their offerings?","options":{"A":"A TPM","B":"A secure enclave","C":"A KMS","D":"A Titan M"},"correct":["C"],"explanation":"Oliver should look for a key management system, or KMS, which will allow him to securely create, store, and manage keys in a cloud environment. TPMs, secure enclaves, and Google's Titan M are all local hardware solutions."},{"chapter":"ch11","chapter_name":"Chapter 11: Endpoint Security","num":5,"question":"What is the key difference between EDR and XDR solutions?","options":{"A":"The variety of malware it can detect","B":"The number of threat feeds that are used","C":"The breadth of the technology stack that is covered","D":"The volume of logs that can be processed"},"correct":["C"],"explanation":"XDR is similar to EDR but has a broader perspective covering not only endpoints but also cloud services, security platforms, and other components. Thus, the breadth of coverage of the technology stack is broader for XDR solutions."},{"chapter":"ch11","chapter_name":"Chapter 11: Endpoint Security","num":6,"question":"Michelle wants to prevent unauthorized applications from being installed on a Windows system. What type of tool can she use to stop applications from being installed?","options":{"A":"Antivirus","B":"A GPO","C":"An EDR","D":"A HIPS"},"correct":["B"],"explanation":"A Windows Group Policy Object (GPO) can be used to control whether users are able to install software. Antivirus will not stop this, nor will EDR or a HIPS."},{"chapter":"ch11","chapter_name":"Chapter 11: Endpoint Security","num":7,"question":"What term is used to describe tools focused on detecting and responding to suspicious activities occurring on endpoints like desktops, laptops, and mobile devices?","options":{"A":"EDR","B":"IAM","C":"FDE","D":"ESC"},"correct":["A"],"explanation":"Endpoint detection and response (EDR) systems provide monitoring, detection, and response capabilities for systems. EDR systems capture data from endpoints and send it to a central repository, where it can be analyzed for issues and indicators of compromise or used for incident response activities. IA
