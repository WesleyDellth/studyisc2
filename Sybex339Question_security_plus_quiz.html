aluate changes to identify any security impacts before personnel deploy the changes in a production environment. A backout plan allows personnel to undo the change and return the system to its previous state if necessary. Version control ensures that developers and users have access to the latest versions of software and that changes are carefully managed throughout the release process."},{"chapter":"ch16","chapter_name":"Chapter 16: Security Governance and Compliance","num":10,"question":"Which one of the following would not normally be found in an organization's information security policy?","options":{"A":"Statement of the importance of cybersecurity","B":"Requirement to use AES-256 encryption","C":"Delegation of authority","D":"Designation of responsible executive"},"correct":["B"],"explanation":"Security policies do not normally contain prescriptive technical guidance, such as a requirement to use a specific encryption algorithm. This type of detail would normally be found in a security standard."},{"chapter":"ch16","chapter_name":"Chapter 16: Security Governance and Compliance","num":11,"question":"Alice, an IT security manager at Acme Corporation, decides to conduct an exercise to test the employees' ability to recognize phishing emails. She creates fake phishing messages and sends them to the employees. When employees click on the links in the fake messages, they are redirected to a training program. What is the primary purpose of the exercise that Alice is conducting?","options":{"A":"To penalize the employees who click on the phishing links","B":"To reward employees who identify the fake phishing messages","C":"To test employees' ability to recognize phishing messages and help them improve","D":"To gather data for a report on the most gullible departments"},"correct":["C"],"explanation":"Alice's exercise is designed to evaluate how well employees can identify phishing messages and, if they fail to do so, redirect them to a training program that is meant to help them get better at recognizing such messages. The exercise is meant for educational purposes and not for penalizing employees. It is intended to help them improve their skills in recognizing phishing emails. While rewarding employees for identifying phishing emails could be a component of a security awareness program, the exercise described is primarily educational and is focused on helping those who fail to recognize the phishing messages. While data might be collected for analysis and understanding areas where improvement is needed, the intention is not to label departments as gullible."},{"chapter":"ch16","chapter_name":"Chapter 16: Security Governance and Compliance","num":12,"question":"Tonya discovers that an employee is running a side business from his office, using company technology resources. What policy would most likely contain information relevant to this situation?","options":{"A":"NDA","B":"AUP","C":"Data ownership","D":"Data classification"},"correct":["B"],"explanation":"An organization's acceptable use policy (AUP) should contain information on what constitutes allowable and unallowable use of company resources. This policy should contain information to help guide Tonya's next steps."},{"chapter":"ch16","chapter_name":"Chapter 16: Security Governance and Compliance","num":13,"question":"What compliance obligation applies to merchants and service providers who work with credit card information?","options":{"A":"FERPA","B":"SOX","C":"HIPAA","D":"PCI DSS"},"correct":["D"],"explanation":"The Payment Card Industry Data Security Standard (PCI DSS) provides detailed rules about the storage, processing, and transmission of credit and debit card information. PCI DSS is not a law but rather a contractual obligation that applies to credit card merchants and service providers."},{"chapter":"ch16","chapter_name":"Chapter 16: Security Governance and Compliance","num":14,"question":"Mike is an information security manager at TechRise Solutions. The company has been experiencing an increase in security incidents, and senior management is concerned about the security posture of the organization. They have asked Mike to take proactive measures to strengthen the company's security culture. What should be Mike's primary role in enhancing the security awareness and training at TechRise Solutions?","options":{"A":"To delegate all security responsibilities to the HR department","B":"To establish, promote, and maintain security training and awareness programs","C":"To create and distribute security awareness posters","D":"To personally conduct security training sessions for all employees"},"correct":["B"],"explanation":"As an information security manager, Mike's primary role would be to establish an effective security training and awareness program, promote it within the organization, and ensure it is maintained effectively to foster a security-conscious culture among employees. This aligns with a proactive approach to reducing security incidents. Mike should take an active role in security training and awareness, rather than delegating all responsibilities to another department. While HR may be involved, Mike's expertise is crucial in establishing effective programs. Although security awareness posters and training sessions are two components of security awareness efforts, Mike's role should be much broader, encompassing the establishment, promotion, and maintenance of comprehensive training and awareness programs."},{"chapter":"ch16","chapter_name":"Chapter 16: Security Governance and Compliance","num":15,"question":"Colin would like to implement a security control in his accounting department that is specifically designed to detect cases of fraud that are able to occur despite the presence of other security controls. Which one of the following controls is best suited to meet Colin's need?","options":{"A":"Separation of duties","B":"Least privilege","C":"Dual control","D":"Mandatory vacations"},"correct":["D"],"explanation":"Mandatory vacations are designed to force individuals to take time away from the office to allow fraudulent activity to come to light in their absence. The other controls listed here (separation of duties, least privilege, and dual control) are all designed to prevent, rather than detect, fraud."},{"chapter":"ch16","chapter_name":"Chapter 16: Security Governance and Compliance","num":16,"question":"Which one of the following security policy framework components does not contain mandatory guidance for individuals in the organization?","options":{"A":"Policy","B":"Standard","C":"Procedure","D":"Guideline"},"correct":["D"],"explanation":"Guidelines are the only element of the security policy framework that is optional. Compliance with policies, standards, and procedures is mandatory."},{"chapter":"ch16","chapter_name":"Chapter 16: Security Governance and Compliance","num":17,"question":"Rachel is the Head of Security at WebCraft Inc. She wants to create both security training and awareness programs. Which statement best captures the difference between these programs?","options":{"A":"Security training requires time to learn new material, whereas awareness efforts use techniques like posters and emails to remind employees of security lessons.","B":"Security training involves giving rewards to employees, whereas awareness efforts involve punishments.","C":"There is no difference; both terms can be used interchangeably.","D":"Security training is for security team members only, whereas security awareness is for all employees."},"correct":["A"],"explanation":"Security training typically involves structured and formal programs where employees learn new security concepts and practices. In contrast, security awareness efforts are more informal and aim to keep security principles top-of-mind for employees through reminders, without requiring them to engage in formal learning. The idea that security training involves giving rewards to employees and awareness efforts involve punishments is not accurate. Security training is meant to educate employees on security concepts and practices, not to serve as a platform for rewards. Similarly, awareness efforts are not punitive; they serve to remind and reinforce security principles among employees. The statement that there is no difference between security training and awareness efforts and that both terms can be used interchangeably is also incorrect. There is a distinct difference between the two in terms of their structure and purpose, as explained in the correct answer. Lastly, the notion that security training is only for security team members while security awareness is for all employees is not true. Security training is important for all employees, depending on their roles and responsibilities, to ensure they understand the security protocols and policies. Security awareness, on the other hand, is a continual reminder for all employees, including the security team, to stay vigilant and informed about security practices."},{"chapter":"ch16","chapter_name":"Chapter 16: Security Governance and Compliance","num":18,"question":"Allan is developing a document that lists the acceptable mechanisms for securely obtaining remote administrative access to servers in his organization. What type of document is Allan writing?","options":{"A":"Policy","B":"Standard","C":"Guideline","D":"Procedure"},"correct":["B"],"explanation":"Standards describe specific security controls that must be in place for an organization. Allan would not include acceptable mechanisms in a high-level policy document, and this information is too general to be useful as a procedure. Guidelines are not mandatory, so they would not be applicable in this scenario."},{"chapter":"ch16","chapter_name":"Chapter 16: Security Governance and Compliance","num":19,"question":"Which one of the following is not a common use of the NIST Cybersecurity Framework?","options":{"A":"Describe the current cybersecurity posture of an organization.","B":"Describe the target future cybersecurity posture of an organization.","C":"Communicate with stakeholders about cybersecurity risk.","D":"Create specific technology requirements for an organization."},"correct":["D"],"explanation":"The NIST Cybersecurity Framework is designed to help organizations describe their current cybersecurity posture, describe their target state for cybersecurity, identify and prioritize opportunities for improvement, assess progress, and communicate with stakeholders about risk. It does not create specific technology requirements."},{"chapter":"ch16","chapter_name":"Chapter 16: Security Governance and Compliance","num":20,"question":"Which one of the following items is not normally included in a request for an exception to security policy?","options":{"A":"Description of a compensating control","B":"Description of the risks associated with the exception","C":"Proposed revision to the security policy","D":"Business justification for the exception"},"correct":["C"],"explanation":"Requests for an exception to a security policy would not normally include a proposed revision to the policy. Exceptions are documented variances from the policy because of specific technical and/or business requirements. They do not alter the original policy, which remains in force for systems not covered by the exception."},{"chapter":"ch17","chapter_name":"Chapter 17: Risk Management and Privacy","num":1,"question":"Jen identified a missing patch on a Windows server that might allow an attacker to gain remote control of the system. After consulting with her manager, she applied the patch. From a risk management perspective, what has she done?","options":{"A":"Removed the threat","B":"Reduced the threat","C":"Removed the vulnerability","D":"Reduced the vulnerability"},"correct":["C"],"explanation":"By applying the patch, Jen has removed the vulnerability from her server. This also has the effect of eliminating this particular risk. Jen cannot control the external threat of an attacker attempting to gain access to her server."},{"chapter":"ch17","chapter_name":"Chapter 17: Risk Management and Privacy","num":2,"question":"You notice a high number of SQL injection attacks against a web application run by your organization, so you install a web application firewall to block many of these attacks before they reach the server. How have you altered the severity of this risk?","options":{"A":"Reduced the magnitude","B":"Eliminated the vulnerability","C":"Reduced the probability","D":"Eliminated the threat"},"correct":["C"],"explanation":"Installing a web application firewall reduces the probability that an attack will reach the web server. Vulnerabilities may still exist in the web application and the threat of an external attack is unchanged. The impact of a successful SQL injection attack is also unchanged by a web application firewall."},{"chapter":"ch17","chapter_name":"Chapter 17: Risk Management and Privacy","num":3,"question":"Questions 3–7 refer to the following scenario: Aziz is responsible for the administration of an e-commerce website that generates $100,000 per day in revenue for his firm. The website uses a database that contains sensitive information about the firm’s customers. He expects that a compromise of that database would result in $500,000 of fines against his firm. Aziz is assessing the risk of a SQL injection attack against the database where the attacker would steal all of the customer personally identifiable information (PII) from the database. After consulting threat intelligence, he believes that there is a 5 percent chance of a successful attack in any given year. What is the asset value (AV)?","options":{"A":"$5,000","B":"$100,000","C":"$500,000","D":"$600,000"},"correct":["C"],"explanation":"The asset at risk in this case is the customer database. Losing control of the database would result in a $500,000 fine, so the asset value (AV) is $500,000."},{"chapter":"ch17","chapter_name":"Chapter 17: Risk Management and Privacy","num":4,"question":"What is the exposure factor (EF)?","options":{"A":"5%","B":"20%","C":"50%","D":"100%"},"correct":["D"],"explanation":"The attack would result in the total loss of customer data stored in the database, making the exposure factor (EF) 100 percent."},{"chapter":"ch17","chapter_name":"Chapter 17: Risk Management and Privacy","num":5,"question":"What is the single loss expectancy (SLE)?","options":{"A":"$5,000","B":"$100,000","C":"$500,000","D":"$600,000"},"correct":["C"],"explanation":"We compute the single loss expectancy (SLE) by multiplying the asset value (AV) ($500,000) and the exposure factor (EF) (100%) to get an SLE of $500,000."},{"chapter":"ch17","chapter_name":"Chapter 17: Risk Management and Privacy","num":6,"question":"What is the annualized rate of occurrence (ARO)?","options":{"A":"0.05","B":"0.20","C":"2.00","D":"5.00"},"correct":["A"],"explanation":"Aziz's threat intelligence research determined that the threat has a 5 percent likelihood of occurrence each year. This is an ARO of 0.05."},{"chapter":"ch17","chapter_name":"Chapter 17: Risk Management and Privacy","num":7,"question":"What is the annualized loss expectancy (ALE)?","options":{"A":"$5,000","B":"$25,000","C":"$100,000","D":"$500,000"},"correct":["B"],"explanation":"We compute the annualized loss expectancy (ALE) by multiplying the SLE ($500,000) and the ARO (0.05) to get an ALE of $25,000."},{"chapter":"ch17","chapter_name":"Chapter 17: Risk Management and Privacy","num":8,"question":"Questions 8–11 refer to the following scenario: Grace recently completed a risk assessment of her organization’s exposure to data breaches and determined that there is a high level of risk related to the loss of sensitive personal information. She is considering a variety of approaches to managing this risk. Grace's first idea is to add a web application firewall to protect her organization against SQL injection attacks. What risk management strategy does this approach adopt?","options":{"A":"Risk acceptance","B":"Risk avoidance","C":"Risk mitigation","D":"Risk transference"},"correct":["C"],"explanation":"Installing new controls or upgrading existing controls is an effort to reduce the probability or magnitude of a risk. This is an example of a risk mitigation activity."},{"chapter":"ch17","chapter_name":"Chapter 17: Risk Management and Privacy","num":9,"question":"Business leaders are considering dropping the customer activities that collect and store sensitive personal information. What risk management strategy would this approach use?","options":{"A":"Risk acceptance","B":"Risk avoidance","C":"Risk mitigation","D":"Risk transference"},"correct":["B"],"explanation":"Changing business processes or activities to eliminate a risk is an example of risk avoidance."},{"chapter":"ch17","chapter_name":"Chapter 17: Risk Management and Privacy","num":10,"question":"Grace's company decided to install the web application firewall and continue doing business. They are still worried about other risks to the information that were not addressed by the firewall and are considering purchasing an insurance policy to cover those risks. What strategy does this use?","options":{"A":"Risk acceptance","B":"Risk avoidance","C":"Risk mitigation","D":"Risk transference"},"correct":["D"],"explanation":"Insurance policies use a risk transference strategy by shifting some or all of the financial risk from the organization to an insurance company."},{"chapter":"ch17","chapter_name":"Chapter 17: Risk Management and Privacy","num":11,"question":"In the end, Grace's risk managers found that the insurance policy was too expensive and opted not to purchase it. They are taking no additional action. What risk management strategy is being used in this situation?","options":{"A":"Risk acceptance","B":"Risk avoidance","C":"Risk mitigation","D":"Risk transference"},"correct":["A"],"explanation":"When an organization decides to take no further action to address remaining risk, they are choosing a strategy of risk acceptance."},{"chapter":"ch17","chapter_name":"Chapter 17: Risk Management and Privacy","num":12,"question":"Under the European Union's GDPR, what term is assigned to the individual who leads an organization's privacy efforts?","options":{"A":"Data protection officer","B":"Data controller","C":"Data steward","D":"Data processor"},"correct":["A"],"explanation":"Under the GDPR, the data protection officer (DPO) is an individual assigned direct responsibility for carrying out an organization's privacy program."},{"chapter":"ch17","chapter_name":"Chapter 17: Risk Management and Privacy","num":13,"question":"Helen's organization maintains medical records on behalf of its customers, who are individual physicians. What term best describes the role of Helen's organization?","options":{"A":"Data processor","B":"Data controller","C":"Data owner","D":"Data steward"},"correct":["A"],"explanation":"In this case, the physicians maintain the data ownership role. They have chosen to outsource data processing to Helen's organization, making that organization a data processor."},{"chapter":"ch17","chapter_name":"Chapter 17: Risk Management and Privacy","num":14,"question":"Gene recently conducted an assessment and determined that his organization can be without its main transaction database for a maximum of two hours before unacceptable damage occurs to the business. What metric has Gene identified?","options":{"A":"MTBF","B":"MTTR","C":"RTO","D":"RPO"},"correct":["C"],"explanation":"The Recovery Time Objective (RTO) is the amount of time that the organization can tolerate a system being down before it is repaired. That is the metric that Gene has identified in this scenario."},{"chapter":"ch17","chapter_name":"Chapter 17: Risk Management and Privacy","num":15,"question":"Tina works for a hospital system and manages the system's patient records. What category of personal information best describes the information that is likely to be found in those records?","options":{"A":"PCI","B":"PHI","C":"PFI","D":"PII"},"correct":["B"],"explanation":"This is a tricky question, as it is possible that all of these categories of information may be found in patient records. However, they are most likely to contain protected health information (PHI). PHI could also be described as a subcategory of personally identifiable information (PII), but PHI is a better description. It is also possible that the records might contain payment card information (PCI) or personal financial information (PFI), but that is less likely than PHI."},{"chapter":"ch17","chapter_name":"Chapter 17: Risk Management and Privacy","num":16,"question":"Asa believes that her organization is taking data collected from customers for technical support and using it for marketing without their permission. What principle is most likely being violated?","options":{"A":"Data minimization","B":"Data retention","C":"Purpose limitation","D":"Data sovereignty"},"correct":["C"],"explanation":"Organizations should only use data for the purposes disclosed during the collection of that data. In this case, the organization collected data for technical support purposes and is now using it for marketing purposes. That violates the principle of purpose limitation."},{"chapter":"ch17","chapter_name":"Chapter 17: Risk Management and Privacy","num":17,"question":"Which one of the following U.S. government classification levels requires the highest degree of security control?","options":{"A":"Secret","B":"Confidential","C":"Top Secret","D":"Unclassified"},"correct":["C"],"explanation":"Top Secret is the highest level of classification under the U.S. system and, therefore, requires the highest level of security control."},{"chapter":"ch17","chapter_name":"Chapter 17: Risk Management and Privacy","num":18,"question":"Which type of analysis uses numeric data in the analysis, resulting in assessments that allow the very straightforward prioritization of risk?","options":{"A":"Qualitative","B":"One-time","C":"Recurring","D":"Quantitative"},"correct":["D"],"explanation":"Quantitative risk analysis uses numeric data in the analysis, resulting in assessments that allow the very straightforward prioritization of risks. Qualitative risk analysis substitutes subjective judgments and categories for strict numerical analysis, allowing the assessment of risks that are difficult to quantify. A one-time risk assessment offers the organization a point-in-time view of its current risk state. Recurring risk assessments are performed at regular intervals, such as annually or quarterly."},{"chapter":"ch17","chapter_name":"Chapter 17: Risk Management and Privacy","num":19,"question":"What term is given to an individual or organization who determines the reasons for processing personal information?","options":{"A":"Data steward","B":"Data controller","C":"Data processor","D":"Data custodian"},"correct":["B"],"explanation":"Data controllers are the entities who determine the reasons for processing personal information and direct the methods of processing that data. This term is used primarily in European law, and it serves as a substitute for the term data owner to avoid a presumption that anyone who collects data has an ownership interest in that data."},{"chapter":"ch17","chapter_name":"Chapter 17: Risk Management and Privacy","num":20,"question":"Brian recently conducted a risk mitigation exercise and has determined the level of risk that remains after implementing a series of controls. What term best describes this risk?","options":{"A":"Inherent risk","B":"Control risk","C":"Risk appetite","D":"Residual risk"},"correct":["D"],"explanation":"The residual risk is the risk that remains after an organization implements controls designed to mitigate, avoid, and/or transfer the inherent risk. OceanofPDF.com I n d e x 3DES (Triple DES), 208 802.1X, 241 A AAA (authentication, authorization, accounting) systems, 241–242 ABAC (attribute-based access control), 260 access badges, 287 access control schemes ABAC (attribute-based access control), 260 DAC (discretionary access control), 259 filesystem permissions, 260–261 least privilege, 260 MAC (mandatory access control), 259 MIC (Mandatory Integrity Control), 259 RBAC (role-based access control), 259 RuBAC/RBAC (rule-based access control), 260 time-of-day restrictions, 260 access controls, OWASP proactive controls and, 148 access restrictions, 13 accounts administrative accounts, 256 credentials, 256 deprovisioning, 257–258 generic accounts, 256 guest accounts, 257 PAM (privileged access management), 258 permission creep, 257 privileged accounts, 256 provisioning, 257–258 service accounts, 257 shared, 256 user accounts, 256 ACLs (access control lists), 399 administrative accounts, 256 AES (Advanced Encryption Standard), 209 AH (authentication header), 410 AI (artificial intelligence), 345 alarms/alarm systems, 288 algorithms, 201 MD5, 216 SHA (Secure Hash Algorithm), 215 alteration (DAD triad), 4"}];
const CHAPTERS=[{"id":"ch1","name":"Chapter 1: Today's Security Professional","count":20},{"id":"ch2","name":"Chapter 2: Cybersecurity Threat Landscape","count":20},{"id":"ch3","name":"Chapter 3: Malicious Code","count":20},{"id":"ch4","name":"Chapter 4: Social Engineering and Password Attacks","count":20},{"id":"ch5","name":"Chapter 5: Security Assessment and Testing","count":20},{"id":"ch6","name":"Chapter 6: Application Security","count":20},{"id":"ch7","name":"Chapter 7: Cryptography and the PKI","count":20},{"id":"ch8","name":"Chapter 8: Identity and Access Management","count":19},{"id":"ch9","name":"Chapter 9: Resilience and Physical Security","count":20},{"id":"ch10","name":"Chapter 10: Cloud and Virtualization Security","count":20},{"id":"ch11","name":"Chapter 11: Endpoint Security","count":20},{"id":"ch12","name":"Chapter 12: Network Security","count":20},{"id":"ch13","name":"Chapter 13: Wireless and Mobile Security","count":20},{"id":"ch14","name":"Chapter 14: Monitoring and Incident Response","count":20},{"id":"ch15","name":"Chapter 15: Digital Forensics","count":20},{"id":"ch16","name":"Chapter 16: Security Governance and Compliance","count":20},{"id":"ch17","name":"Chapter 17: Risk Management and Privacy","count":20}];

</script>
<script>
// ===== APP LOGIC =====
let mode = 'practice';
let selectedChapters = new Set();
let quizQuestions = [];
let currentIndex = 0;
let answers = {}; // {index: selectedLetter}
let revealed = {}; // {index: true} for practice mode
let correctCount = 0;
let wrongCount = 0;

// Thai translations cache
const thaiCache = {};

// Initialize
function init() {
  const grid = document.getElementById('ch-grid');
  CHAPTERS.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'ch-btn selected';
    btn.dataset.ch = ch.id;
    btn.innerHTML = `<span>${ch.name}</span><span class="ch-count">${ch.count} ข้อ</span>`;
    btn.onclick = () => toggleChapter(ch.id, btn);
    grid.appendChild(btn);
    selectedChapters.add(ch.id);
  });
  updateCount();
}

function selectMode(m) {
  mode = m;
  document.querySelectorAll('.mode-card').forEach(c => {
    c.classList.toggle('selected', c.dataset.mode === m);
  });
}

function toggleChapter(id, btn) {
  if (selectedChapters.has(id)) {
    selectedChapters.delete(id);
    btn.classList.remove('selected');
  } else {
    selectedChapters.add(id);
    btn.classList.add('selected');
  }
  updateCount();
}

function toggleAll(select) {
  document.querySelectorAll('.ch-btn').forEach(btn => {
    const id = btn.dataset.ch;
    if (select) { selectedChapters.add(id); btn.classList.add('selected'); }
    else { selectedChapters.delete(id); btn.classList.remove('selected'); }
  });
  updateCount();
}

function updateCount() {
  const count = QUESTIONS.filter(q => selectedChapters.has(q.chapter)).length;
  document.getElementById('q-count-label').textContent = `${count} ข้อที่เลือก`;
  document.getElementById('start-btn').disabled = count === 0;
}

function startQuiz() {
  quizQuestions = QUESTIONS.filter(q => selectedChapters.has(q.chapter));
  // Shuffle
  for (let i = quizQuestions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [quizQuestions[i], quizQuestions[j]] = [quizQuestions[j], quizQuestions[i]];
  }
  currentIndex = 0;
  answers = {};
  revealed = {};
  correctCount = 0;
  wrongCount = 0;
  showScreen('quiz-screen');
  buildNav();
  renderQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function buildNav() {
  const grid = document.getElementById('nav-grid');
  grid.innerHTML = '';
  quizQuestions.forEach((_, i) => {
    const cell = document.createElement('button');
    cell.className = 'nav-cell';
    cell.textContent = i + 1;
    cell.onclick = () => { currentIndex = i; renderQuestion(); };
    grid.appendChild(cell);
  });
}

function toggleNav() {
  document.getElementById('nav-grid').classList.toggle('open');
}

function updateNav() {
  const cells = document.querySelectorAll('.nav-cell');
  cells.forEach((cell, i) => {
    cell.className = 'nav-cell';
    if (i === currentIndex) cell.classList.add('current');
    if (answers[i] !== undefined) {
      if (mode === 'practice' && revealed[i]) {
        const q = quizQuestions[i];
        const isCorrect = q.correct.length === 1 && answers[i] === q.correct[0];
        cell.classList.add(isCorrect ? 'answered' : 'wrong-ans');
      } else {
        cell.classList.add('answered');
      }
    }
  });
}

function updateStats() {
  const total = quizQuestions.length;
  const answered = Object.keys(answers).length;
  const pct = total > 0 ? (answered / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${answered} / ${total} (${Math.round(pct)}%)`;
  document.getElementById('stat-correct').textContent = '✓ ' + correctCount;
  document.getElementById('stat-wrong').textContent = '✗ ' + wrongCount;
  document.getElementById('stat-unanswered').textContent = '○ ' + (total - answered);

  // Nav buttons
  document.getElementById('btn-prev').style.visibility = currentIndex > 0 ? 'visible' : 'hidden';
  const isLast = currentIndex === total - 1;
  const btnNext = document.getElementById('btn-next');
  if (isLast) {
    btnNext.textContent = '🏁 ส่งข้อสอบ';
    btnNext.className = 'nav-btn nav-finish';
    btnNext.onclick = () => finishQuiz();
  } else {
    btnNext.textContent = 'ถัดไป →';
    btnNext.className = 'nav-btn nav-next';
    btnNext.onclick = () => goQ(1);
  }
}

function renderQuestion() {
  const q = quizQuestions[currentIndex];
  const isAnswered = answers[currentIndex] !== undefined;
  const isRevealed = revealed[currentIndex];
  const showResult = mode === 'practice' && isRevealed;

  // Build Thai translation placeholder
  const thKey = q.chapter + '_' + q.num;
  const thaiQ = thaiCache[thKey] || '';

  let html = `<div class="q-card">
    <div class="q-number">
      <span>Question ${currentIndex + 1} / ${quizQuestions.length}</span>
      <span class="q-chapter">${q.chapter_name.replace('Chapter ','Ch.')}</span>
    </div>
    <div class="q-text">${escHtml(q.question)}</div>`;
  if (thaiQ) html += `<div class="q-text-th">${escHtml(thaiQ)}</div>`;
  html += `<div class="options-list">`;

  const optKeys = Object.keys(q.options).sort();
  for (const k of optKeys) {
    let cls = 'opt-btn';
    if (isAnswered) {
      if (showResult) {
        cls += ' locked';
        if (q.correct.includes(k)) cls += ' correct';
        else if (answers[currentIndex] === k) cls += ' wrong';
      } else if (mode === 'exam') {
        cls += (answers[currentIndex] === k) ? ' selected' : '';
      }
    }
    html += `<button class="${cls}" onclick="selectAnswer('${k}', this)" ${showResult ? 'disabled' : ''}>
      <span class="opt-letter">${k}.</span>
      <span>${escHtml(q.options[k])}</span>
    </button>`;
  }
  html += `</div>`;

  if (showResult) {
    html += `<div class="explanation-box">
      <h4>📘 Explanation</h4>
      <div>${escHtml(q.explanation)}</div>
    </div>`;
  }
  html += `</div>`;

  document.getElementById('question-area').innerHTML = html;
  updateStats();
  updateNav();

  // Translate if not cached
  if (!thaiQ && !thaiCache['_loading_' + thKey]) {
    translateQuestion(q, thKey);
  }
}

async function translateQuestion(q, thKey) {
  thaiCache['_loading_' + thKey] = true;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: `Translate this CompTIA Security+ question to Thai. Keep technical terms in English. Return ONLY the Thai translation, nothing else:\n\n"${q.question}"` }]
      })
    });
    const data = await res.json();
    const text = data.content?.find(c => c.type === 'text')?.text || '';
    if (text) {
      thaiCache[thKey] = text.replace(/^["']|["']$/g, '');
      // Re-render if still on same question
      if (quizQuestions[currentIndex] && (quizQuestions[currentIndex].chapter + '_' + quizQuestions[currentIndex].num) === thKey) {
        renderQuestion();
      }
    }
  } catch(e) { /* silent fail for translation */ }
}

function selectAnswer(letter, el) {
  const q = quizQuestions[currentIndex];
  if (mode === 'practice' && revealed[currentIndex]) return;
  
  answers[currentIndex] = letter;
  
  if (mode === 'practice') {
    revealed[currentIndex] = true;
    const isCorrect = q.correct.includes(letter);
    if (isCorrect) correctCount++;
    else wrongCount++;
    renderQuestion();
  } else {
    // Exam mode - just highlight selection
    document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    updateStats();
    updateNav();
  }
}

function goQ(dir) {
  const next = currentIndex + dir;
  if (next >= 0 && next < quizQuestions.length) {
    currentIndex = next;
    renderQuestion();
    window.scrollTo(0, 0);
  }
}

function finishQuiz() {
  if (mode === 'exam') {
    const unanswered = quizQuestions.length - Object.keys(answers).length;
    if (unanswered > 0 && !confirm(`ยังมี ${unanswered} ข้อที่ยังไม่ตอบ ต้องการส่งข้อสอบหรือไม่?`)) return;
    // Calculate score
    correctCount = 0; wrongCount = 0;
    quizQuestions.forEach((q, i) => {
      if (answers[i] !== undefined) {
        if (q.correct.includes(answers[i])) correctCount++;
        else wrongCount++;
      }
    });
  }
  showResults();
}

function showResults() {
  const total = quizQuestions.length;
  const answered = Object.keys(answers).length;
  const pct = total > 0 ? Math.round(correctCount / total * 100) : 0;
  const passed = pct >= 70;

  let html = `<div class="result-card">
    <div class="result-badge ${passed ? 'pass' : 'fail'}">${passed ? '🎉 PASSED' : '❌ FAILED'}</div>
    <div class="result-score ${passed ? 'pass' : 'fail'}">${pct}%</div>
    <div class="result-details">
      ${passed ? 'ยินดีด้วย! คุณผ่านเกณฑ์ 70%' : 'ไม่ผ่านเกณฑ์ 70% ลองทบทวนและทำใหม่อีกครั้ง'}
    </div>
  </div>
  <div class="result-breakdown">
    <div class="rb-item"><div class="rb-num" style="color:var(--accent)">${correctCount}</div><div class="rb-label">ถูก (Correct)</div></div>
    <div class="rb-item"><div class="rb-num" style="color:var(--red)">${wrongCount}</div><div class="rb-label">ผิด (Wrong)</div></div>
    <div class="rb-item"><div class="rb-num" style="color:var(--text2)">${total - answered}</div><div class="rb-label">ไม่ตอบ (Skipped)</div></div>
  </div>
  <div class="result-actions">
    <button onclick="reviewWrong()" style="background:var(--surface);color:var(--text)">🔍 ทบทวนข้อที่ผิด</button>
    <button onclick="reviewAll()" style="background:var(--surface);color:var(--text)">📋 ดูทั้งหมด</button>
    <button onclick="location.reload()" style="background:var(--accent);color:var(--bg)">🔄 เริ่มใหม่</button>
  </div>
  <div id="review-area" style="margin-top:24px"></div>`;

  document.getElementById('results-screen').innerHTML = html;
  showScreen('results-screen');
}

function reviewWrong() { showReview('wrong'); }
function reviewAll() { showReview('all'); }

function showReview(filter) {
  const area = document.getElementById('review-area');
  let html = `<div class="review-section">
    <h3>${filter === 'wrong' ? '❌ ข้อที่ตอบผิด' : '📋 ทุกข้อ'}</h3>
    <div class="filter-btns">
      <button class="${filter==='all'?'active':''}" onclick="showReview('all')">ทั้งหมด</button>
      <button class="${filter==='wrong'?'active':''}" onclick="showReview('wrong')">ผิดเท่านั้น</button>
      <button class="${filter==='correct'?'active':''}" onclick="showReview('correct')">ถูกเท่านั้น</button>
    </div>`;

  quizQuestions.forEach((q, i) => {
    const userAns = answers[i];
    const isCorrect = userAns !== undefined && q.correct.includes(userAns);
    const isWrong = userAns !== undefined && !isCorrect;
    const isSkipped = userAns === undefined;

    if (filter === 'wrong' && !isWrong && !isSkipped) return;
    if (filter === 'correct' && !isCorrect) return;

    const resultClass = isCorrect ? 'correct-review' : '';
    const resultBadge = isCorrect
      ? '<span class="review-q-result correct-r">✓ ถูก</span>'
      : isSkipped
        ? '<span class="review-q-result wrong-r">— ข้าม</span>'
        : '<span class="review-q-result wrong-r">✗ ผิด</span>';

    html += `<div class="review-q ${resultClass}">
      <div class="review-q-header">
        <span class="review-q-num">Q${i+1} · ${q.chapter_name.replace('Chapter ','Ch.')}</span>
        ${resultBadge}
      </div>
      <div class="review-q-text">${escHtml(q.question)}</div>
      <div class="review-answer">
        ${userAns ? `คำตอบของคุณ: <strong>${userAns}. ${escHtml(q.options[userAns] || '')}</strong>` : '<em>ไม่ได้ตอบ</em>'}
        <br>เฉลย: <strong style="color:var(--accent)">${q.correct.join(', ')}. ${q.correct.map(c => escHtml(q.options[c] || '')).join(', ')}</strong>
      </div>
      <div class="explanation-box" style="margin-top:10px">
        <h4>📘 Explanation</h4>
        <div>${escHtml(q.explanation)}</div>
      </div>
    </div>`;
  });

  html += `</div>`;
  area.innerHTML = html;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Init on load
init();
</script>
