<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompTIA Security+ SY0-701 Quiz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--card:#161b22;--card2:#1c2333;--accent:#7c6cf0;--accentL:#a59bfe;--ok:#2dd4a8;--okBg:rgba(45,212,168,.12);--err:#f07055;--errBg:rgba(240,112,85,.12);--txt:#d1d9e6;--dim:#6b7a90;--bdr:#2a3142;--font:system-ui,-apple-system,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--txt);min-height:100vh;line-height:1.5}
.ctr{max-width:920px;margin:0 auto;padding:14px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bdr);margin-bottom:16px;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:1.15rem;color:var(--accentL)}
.hdr-b{display:flex;gap:6px;flex-wrap:wrap}
.b{padding:7px 14px;border:1px solid var(--bdr);background:var(--card);color:var(--txt);border-radius:7px;cursor:pointer;font-size:.82rem;transition:.2s}
.b:hover{border-color:var(--accent);background:var(--card2)}
.b.on{background:var(--accent);border-color:var(--accent);color:#fff}
.b:disabled{opacity:.4;cursor:default}
.stats{display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap;font-size:.82rem;color:var(--dim)}
.stats b{color:var(--txt)}
.pbar{width:100%;height:7px;background:var(--bdr);border-radius:4px;margin-bottom:16px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accentL));border-radius:4px;transition:width .3s}
.qnav{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:16px;max-height:110px;overflow-y:auto;padding:8px;background:var(--card);border-radius:8px}
.qnb{width:34px;height:34px;border:1px solid var(--bdr);background:transparent;color:var(--dim);border-radius:5px;cursor:pointer;font-size:.72rem;transition:.2s}
.qnb:hover{border-color:var(--accent)}
.qnb.cur{background:var(--accent);color:#fff;border-color:var(--accent)}
.qnb.ans{background:var(--card2);color:var(--txt)}
.qnb.cok{background:var(--ok);color:#fff;border-color:var(--ok)}
.qnb.cerr{background:var(--err);color:#fff;border-color:var(--err)}
.qc{background:var(--card);border-radius:11px;padding:22px;margin-bottom:14px;border:1px solid var(--bdr)}
.qn{font-size:.78rem;color:var(--accentL);margin-bottom:6px;font-weight:600}
.qt{font-size:.95rem;line-height:1.55;margin-bottom:5px}
.qth{font-size:.88rem;color:var(--dim);line-height:1.45;margin-bottom:14px;font-style:italic}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border:1px solid var(--bdr);border-radius:7px;cursor:pointer;transition:.2s}
.opt:hover{border-color:var(--accent);background:rgba(124,108,240,.04)}
.opt.sel{border-color:var(--accent);background:rgba(124,108,240,.1)}
.opt.cok{border-color:var(--ok);background:var(--okBg)}
.opt.cerr{border-color:var(--err);background:var(--errBg)}
.opt.dis{pointer-events:none;opacity:.85}
.ol{min-width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:5px;background:var(--bdr);font-size:.78rem;font-weight:600;flex-shrink:0}
.opt.sel .ol{background:var(--accent);color:#fff}
.opt.cok .ol{background:var(--ok);color:#fff}
.opt.cerr .ol{background:var(--err);color:#fff}
.ot{font-size:.87rem;line-height:1.4;padding-top:2px}
.mn{font-size:.78rem;color:var(--accentL);margin-bottom:6px}
.exp{margin-top:14px;padding:14px;background:rgba(124,108,240,.07);border-radius:7px;border-left:3px solid var(--accent);display:none}
.exp.sh{display:block}
.et{font-size:.82rem;font-weight:600;color:var(--accentL);margin-bottom:6px}
.ee,.eth{font-size:.83rem;line-height:1.45;margin-bottom:6px}
.eth{color:var(--dim)}
.nb{display:flex;justify-content:space-between;margin-top:14px;gap:8px}
.ss{text-align:center;padding:50px 16px}
.ss h2{font-size:1.6rem;color:var(--accentL);margin-bottom:10px}
.ss p{color:var(--dim);margin-bottom:18px;font-size:.95rem}
.mc{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.mcd{background:var(--card);border:1px solid var(--bdr);border-radius:11px;padding:22px;width:270px;cursor:pointer;transition:.2s;text-align:left}
.mcd:hover{border-color:var(--accent);transform:translateY(-2px)}
.mcd h3{color:var(--accentL);margin-bottom:6px;font-size:1rem}
.mcd p{font-size:.82rem;color:var(--dim)}
.rs{padding:16px 0}
.rh{text-align:center;margin-bottom:24px}
.sc{width:130px;height:130px;border-radius:50%;border:4px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 14px}
.sp{font-size:2rem;font-weight:700;color:var(--accentL)}
.sl{font-size:.78rem;color:var(--dim)}
.rss{display:flex;gap:16px;justify-content:center;margin:12px 0;flex-wrap:wrap}
.rst{text-align:center}
.rst .n{font-size:1.3rem;font-weight:700}
.rst .l{font-size:.72rem;color:var(--dim)}
.rst.g .n{color:var(--ok)}
.rst.r .n{color:var(--err)}
.rvt{font-size:1rem;margin:20px 0 14px;color:var(--err)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
@media(max-width:600px){.ctr{padding:8px}.qc{padding:14px}.mcd{width:100%}.qnb{width:30px;height:30px;font-size:.68rem}}
</style>
</head>
<body>
<div class="ctr" id="app"></div>
<script>
const Q=[];
</script>
<script>
Q.push(
{q:"An organization is moving away from the use of client-side and server-side certificates for EAP. The company would like for the new EAP solution to have the ability to detect rogue access points. Which of the following would accomplish these requirements?",qth:"องค์กรกำลังเลิกใช้ certificates ทั้งฝั่ง client และ server สำหรับ EAP โดยต้องการให้โซลูชัน EAP ใหม่สามารถตรวจจับ rogue access points ได้ ข้อใดตรงตามความต้องการ?",o:["PEAP","EAP-FAST","EAP-TLS","EAP-TTLS"],a:[1],m:false,e:"EAP-FAST supports mutual authentication and is designed to simplify strong, password-based authentication. It includes a mechanism for detecting rogue access points without requiring certificates.",eth:"EAP-FAST รองรับ mutual authentication ออกแบบมาเพื่อ authentication แบบ password ที่แข็งแกร่ง มีกลไกตรวจจับ rogue access points โดยไม่ต้องใช้ certificates"},
{q:"A store receives reports that shoppers' credit card information is being stolen. Those same shoppers also withdrew money from an ATM in that store. Attackers use the stolen info for online purchases. Which attack is the MOST probable cause?",qth:"ร้านค้าได้รับรายงานว่าข้อมูลบัตรเครดิตลูกค้าถูกขโมย ลูกค้าเหล่านั้นเคยกดเงิน ATM ในร้าน ผู้โจมตีใช้ข้อมูลซื้อของออนไลน์ การโจมตีแบบใดน่าจะเป็นสาเหตุ?",o:["Identity theft","RFID cloning","Shoulder surfing","Card skimming"],a:[3],m:false,e:"Card skimming involves placing a device on an ATM or card reader to steal credit card data when swiped or inserted.",eth:"Card skimming คือการติดตั้งอุปกรณ์บนตู้ ATM หรือเครื่องอ่านบัตร เพื่อขโมยข้อมูลเมื่อรูดหรือเสียบบัตร"},
{q:"A retail company launching a new website with multiple subdomains (www, shop, about-us, contact-us, secure-logon). Which certificate should be used if concerned with convenience and cost?",qth:"บริษัทค้าปลีกเปิดเว็บไซต์ใหม่ที่มีหลาย subdomain ควรใช้ certificate แบบใดหากต้องการความสะดวกและประหยัด?",o:["A self-signed certificate","A root certificate","A code-signing certificate","A wildcard certificate","An extended validation certificate"],a:[3],m:false,e:"A wildcard certificate secures multiple subdomains of a primary domain with a single certificate, making it cost-effective and convenient.",eth:"Wildcard certificate รักษาความปลอดภัยหลาย subdomain ด้วย certificate เดียว ประหยัดและสะดวก"},
{q:"Which environment would MOST likely be used to assess execution of component parts at both hardware and software levels and measure performance characteristics?",qth:"สภาพแวดล้อมแบบใดน่าจะใช้ประเมินการทำงานของส่วนประกอบทั้งระดับ hardware และ software และวัดประสิทธิภาพ?",o:["Test","Staging","Development","Production"],a:[0],m:false,e:"The test environment is used for assessing system components at hardware/software levels and measuring performance.",eth:"สภาพแวดล้อม test ใช้ประเมินส่วนประกอบระบบทั้งระดับ hardware/software และวัดประสิทธิภาพ"},
{q:"A CIO is concerned about employees using company-issued laptops to steal data when accessing network shares. Which should the company implement?",qth:"CIO กังวลเรื่องพนักงานใช้ laptop บริษัทขโมยข้อมูลจาก network shares ควรติดตั้งอะไร?",o:["DLP","CASB","HIDS","EDR","UEFI"],a:[0],m:false,e:"Data Loss Prevention (DLP) monitors and controls data transfers, preventing employees from stealing data from endpoints.",eth:"DLP ตรวจสอบและควบคุมการถ่ายโอนข้อมูล ป้องกันพนักงานขโมยข้อมูลจาก endpoint"},
{q:"Developers write code and merge it into shared repositories several times a day, where it is tested automatically. Which concept does this BEST represent?",qth:"นักพัฒนาเขียนโค้ดและ merge เข้า shared repository หลายครั้งต่อวัน โดยมีการทดสอบอัตโนมัติ แนวคิดนี้คือข้อใด?",o:["Functional testing","Stored procedures","Elasticity","Continuous integration"],a:[3],m:false,e:"Continuous integration is when developers merge code frequently into a shared repository with automatic testing.",eth:"Continuous integration คือการ merge code บ่อยๆ เข้า shared repository พร้อมทดสอบอัตโนมัติ"},
{q:"A cybersecurity administrator needs to implement a Layer 7 security control on a network and block potential attacks. Which can block an attack at Layer 7? (Select TWO)",qth:"ผู้ดูแล cybersecurity ต้องติดตั้ง security control ที่ Layer 7 และบล็อกการโจมตี ข้อใดบล็อกที่ Layer 7 ได้? (เลือก 2 ข้อ)",o:["HIDS","NIPS","HSM","WAF","NAC","NIDS","Stateless firewall"],a:[3,5],m:true,e:"WAF filters traffic at application layer (Layer 7). NIDS monitors network traffic at Layer 7 for suspicious patterns.",eth:"WAF กรอง traffic ที่ application layer (Layer 7) NIDS ตรวจสอบ traffic ที่ Layer 7 หาพฤติกรรมน่าสงสัย"},
{q:"A security analyst found the input 'admin' or 1=1--' in a website's username field. Which BEST explains this attack?",qth:"นักวิเคราะห์พบ input 'admin' or 1=1--' ในช่อง username ของเว็บไซต์ การโจมตีนี้คือแบบใด?",o:["DLL injection to hijack administrator services","SQLi on the field to bypass authentication","Execution of a stored XSS on the website","Code to execute a race condition on the server"],a:[1],m:false,e:"The input 'admin' or 1=1--' is a classic SQL injection (SQLi) attack attempting to bypass authentication by making the SQL query always return true.",eth:"Input 'admin' or 1=1--' เป็นการโจมตี SQL injection (SQLi) แบบคลาสสิก พยายาม bypass authentication โดยทำให้ query คืนค่า true เสมอ"},
{q:"Logs show a successful FTP brute force attack with multiple password attempts (p@55w0rd, AcCe55, A1l0w!, FTPL0gin!, L3tM31N!). Which control would BEST prevent such a breach?",qth:"Log แสดง brute force สำเร็จผ่าน FTP ด้วยรหัสผ่านหลายตัว ควรใช้มาตรการใดป้องกัน?",o:["Password history","Account expiration","Password complexity","Account lockout"],a:[2],m:false,e:"Password complexity requires strong passwords with mixed characters (upper/lowercase, numbers, special), making dictionary attacks harder.",eth:"Password complexity กำหนดรหัสผ่านที่แข็งแกร่ง ผสมตัวอักษรหลายแบบ ทำให้ dictionary attack ยากขึ้น"},
{q:"An analyst is working on an email security incident where a worm was opened from an attachment. To prevent further spread, what is the BEST course of action?",qth:"นักวิเคราะห์จัดการ incident ที่ worm ถูกเปิดจาก attachment ต้องการป้องกันการแพร่กระจาย ควรทำอย่างไร?",o:["Apply a DLP solution","Implement network segmentation","Utilize email content filtering","Isolate the infected attachment"],a:[1],m:false,e:"Network segmentation divides the network into smaller segments, isolating infected areas and preventing the worm from spreading to other devices.",eth:"Network segmentation แบ่งเครือข่ายเป็นส่วนย่อย แยกพื้นที่ติดเชื้อ ป้องกัน worm แพร่กระจาย"},
{q:"A systems analyst finds high connections to a web server from ten IP addresses in a specific country's network block. Which technique should be implemented?",qth:"นักวิเคราะห์พบ connection จำนวนมากจาก 10 IP ในประเทศหนึ่ง ควรใช้เทคนิคใด?",o:["Content filter","SIEM","Firewall rules","DLP"],a:[2],m:false,e:"Firewall rules can block connections from specific IP addresses or network blocks quickly and effectively.",eth:"Firewall rules บล็อก connection จาก IP address หรือ network block ที่ระบุได้อย่างรวดเร็วและมีประสิทธิภาพ"},
{q:"Which is the MOST secure but LEAST expensive data destruction method for data stored on hard drives?",qth:"วิธีทำลายข้อมูลใดปลอดภัยที่สุดแต่ประหยัดที่สุดสำหรับข้อมูลบน hard drive?",o:["Pulverizing","Shredding","Incinerating","Degaussing"],a:[1],m:false,e:"Shredding is secure and cost-effective, reducing electronic devices to pieces no larger than 2 millimeters.",eth:"Shredding ปลอดภัยและคุ้มค่า ทำลายอุปกรณ์ให้เป็นชิ้นเล็กไม่เกิน 2 มม."},
{q:"When selecting an encryption method for data that needs to remain confidential for a specific length of time, which should a technician consider?",qth:"เมื่อเลือกวิธีเข้ารหัสสำหรับข้อมูลที่ต้องเก็บเป็นความลับในระยะเวลาหนึ่ง ควรพิจารณาอะไร?",o:["The key length of the encryption algorithm","The encryption algorithm's longevity","A method of introducing entropy into key calculations","The computational overhead of calculating the encryption key"],a:[1],m:false,e:"The longevity of the encryption algorithm ensures the data remains secure for the required time period.",eth:"ความยืนยาวของ algorithm เข้ารหัสช่วยให้ข้อมูลปลอดภัยตลอดระยะเวลาที่กำหนด"},
{q:"A security analyst is running a vulnerability scan during a suspected security incident. During which phase of incident response is this MOST likely occurring?",qth:"นักวิเคราะห์กำลังสแกนช่องโหว่ระหว่าง incident ที่น่าสงสัย อยู่ในขั้นตอนใดของ incident response?",o:["Containment","Identification","Recovery","Preparation"],a:[1],m:false,e:"Vulnerability scanning during an incident is part of the Identification phase — identifying the nature and scope of the incident.",eth:"การสแกนช่องโหว่ระหว่าง incident เป็นส่วนของขั้นตอน Identification — ระบุลักษณะและขอบเขตของ incident"},
{q:"Which BEST describes data streams compiled through AI that provides insight on current cyber intrusions, phishing, and other malicious activity?",qth:"ข้อใดอธิบายกระแสข้อมูลที่รวบรวมผ่าน AI เพื่อให้ข้อมูลเชิงลึกเกี่ยวกับการบุกรุกทางไซเบอร์ phishing และกิจกรรมอันตราย?",o:["Intelligence fusion","Review reports","Log reviews","Threat feeds"],a:[0],m:false,e:"Intelligence fusion aggregates and analyzes data from multiple sources including AI to provide insight on current cyber threats.",eth:"Intelligence fusion รวบรวมและวิเคราะห์ข้อมูลจากหลายแหล่งรวมถึง AI เพื่อให้ข้อมูลเชิงลึกเกี่ยวกับภัยคุกคาม"},
{q:"A security engineer is installing a WAF to protect the website from malicious web requests over SSL. Which is needed to meet the objective?",qth:"วิศวกรติดตั้ง WAF ปกป้องเว็บไซต์จาก request อันตรายผ่าน SSL ต้องการอะไร?",o:["A reverse proxy","A decryption certificate","A split-tunnel VPN","Load-balanced servers"],a:[1],m:false,e:"A decryption certificate is needed to decrypt SSL traffic before it reaches the WAF, allowing inspection and filtering.",eth:"ต้องใช้ decryption certificate ถอดรหัส SSL traffic ก่อนถึง WAF เพื่อตรวจสอบและกรอง request"},
{q:"A security researcher uses an adversary's infrastructure and TTPs, creating a named group to track those targeted. Which framework is MOST likely being used?",qth:"นักวิจัยใช้โครงสร้างพื้นฐานและ TTPs ของผู้โจมตี สร้าง named group ติดตามเป้าหมาย ใช้ framework ใด?",o:["The Cyber Kill Chain","The incident response process","The Diamond Model of Intrusion Analysis","MITRE ATT&CK"],a:[3],m:false,e:"MITRE ATT&CK is a knowledge base of adversary TTPs that allows creating named threat groups for tracking.",eth:"MITRE ATT&CK เป็นฐานข้อมูล TTPs ของผู้โจมตี ให้สร้าง named threat groups สำหรับติดตาม"},
{q:"A security engineer is hardening existing solutions to reduce application vulnerabilities. Which should be implemented FIRST? (Select TWO)",qth:"วิศวกร hardening ระบบเพื่อลดช่องโหว่แอปพลิเคชัน ควรติดตั้งอะไรก่อน? (เลือก 2 ข้อ)",o:["Auto-update","HTTP headers","Secure cookies","Third-party updates","Full disk encryption","Sandboxing","Hardware encryption"],a:[0,5],m:true,e:"Auto-update keeps apps patched with latest security fixes. Sandboxing isolates apps, limiting access and containing potential breaches.",eth:"Auto-update อัปเดต patch ล่าสุด Sandboxing แยกแอป จำกัดการเข้าถึงและควบคุมความเสียหาย"},
{q:"Which uses six initial steps providing basic control over system security including hardware/software inventory, vulnerability management, and continuous monitoring?",qth:"ข้อใดใช้ 6 ขั้นตอนเริ่มต้นควบคุมความปลอดภัยระบบ รวมถึง inventory, vulnerability management และ continuous monitoring?",o:["ISO 27701","The Center for Internet Security","SSAE SOC 2","NIST Risk Management Framework"],a:[1],m:false,e:"The Center for Internet Security (CIS) uses six initial steps for basic system security control.",eth:"CIS ใช้ 6 ขั้นตอนเริ่มต้นสำหรับการควบคุมความปลอดภัยระบบขั้นพื้นฐาน"},
{q:"A systems administrator wants a backup solution with fastest recovery time while saving the most storage. Which is the BEST option?",qth:"ผู้ดูแลระบบต้องการ backup ที่กู้คืนเร็วที่สุดและประหยัดพื้นที่ ข้อใดดีที่สุด?",o:["Snapshot","Differential","Full","Tape"],a:[1],m:false,e:"Differential backup backs up changes since the last full backup — faster recovery than full and uses less storage.",eth:"Differential backup สำรองเฉพาะข้อมูลที่เปลี่ยนตั้งแต่ full backup ล่าสุด กู้คืนเร็วกว่าและใช้พื้นที่น้อยกว่า"},
{q:"Customer credit card data was stolen and exfiltrated through a dedicated business partner connection to a vendor not held to the same security standards. Which is the MOST likely source of the breach?",qth:"ข้อมูลบัตรเครดิตถูกขโมยผ่านการเชื่อมต่อกับ vendor ที่มาตรฐานความปลอดภัยต่ำกว่า สาเหตุน่าจะเป็นอะไร?",o:["Side channel","Supply chain","Cryptographic downgrade","Malware"],a:[1],m:false,e:"A supply chain attack occurs when a third-party supplier or business partner is compromised, allowing unauthorized access to the target organization.",eth:"Supply chain attack เกิดเมื่อ supplier หรือ partner ถูก compromise ให้ผู้โจมตีเข้าถึงองค์กรเป้าหมาย"},
{q:"Which environment utilizes dummy data and is MOST likely installed locally, allowing code to be assessed directly and modified easily with each build?",qth:"สภาพแวดล้อมใดใช้ dummy data ติดตั้งในเครื่อง local ประเมินโค้ดได้ตรงและแก้ไขง่าย?",o:["Production","Test","Staging","Development"],a:[3],m:false,e:"The development environment uses dummy data, is installed locally, and allows easy code modification with each build.",eth:"Development environment ใช้ dummy data ติดตั้ง local แก้ไขโค้ดง่ายในแต่ละ build"},
{q:"Which incident response step occurs before containment?",qth:"ขั้นตอนใดของ incident response เกิดก่อน containment?",o:["Eradication","Recovery","Lessons learned","Identification"],a:[3],m:false,e:"Identification is the first step — recognizing an incident has occurred — before containment, eradication, recovery, and lessons learned.",eth:"Identification เป็นขั้นตอนแรก — รับรู้ว่าเกิด incident — ก่อน containment, eradication, recovery และ lessons learned"},
{q:"Which cryptographic concepts would a security engineer utilize while implementing non-repudiation? (Select TWO)",qth:"แนวคิดการเข้ารหัสใดที่ใช้ implement non-repudiation? (เลือก 2 ข้อ)",o:["Block cipher","Hashing","Private key","Perfect forward secrecy","Salting","Symmetric keys"],a:[1,2],m:true,e:"Hashing ensures message integrity. Private keys create digital signatures. Together they provide non-repudiation.",eth:"Hashing รับรองความสมบูรณ์ของข้อความ Private key สร้าง digital signature ทั้งคู่ให้ non-repudiation"},
{q:"A company wants flexibility for employees on device preference but is concerned about supporting too many hardware types. Which deployment model provides the GREATEST control and security?",qth:"บริษัทต้องการความยืดหยุ่นในการเลือกอุปกรณ์แต่กังวลเรื่อง hardware หลากหลาย deployment model ใดให้การควบคุมสูงสุด?",o:["BYOD","VDI","COPE","CYOD"],a:[3],m:false,e:"CYOD (Choose Your Own Device) lets employees select from a predefined list, balancing flexibility with control.",eth:"CYOD ให้พนักงานเลือกจากรายการที่กำหนด สมดุลระหว่างความยืดหยุ่นกับการควบคุม"},
{q:"A grocery store is concerned about physical security of backup media and durability of data. Which is a cost-effective approach?",qth:"ร้านค้ากังวลเรื่องความปลอดภัยทางกายภาพของสื่อ backup และความทนทานข้อมูล แนวทางใดคุ้มค่า?",o:["Enhance resiliency with hardware RAID","Move to tape library and store off-site","Install local NAS","Migrate to cloud backup solution"],a:[3],m:false,e:"Cloud backup provides enhanced physical security, durability through replication, reduced costs, and scalability.",eth:"Cloud backup ให้ความปลอดภัยทางกายภาพ ความทนทานผ่าน replication ลดค่าใช้จ่าย ขยายได้ง่าย"},
{q:"While reviewing pcap data, a network analyst finds plaintext usernames and passwords being sent from workstations. Which is MOST likely being observed?",qth:"เมื่อตรวจสอบ pcap data พบ username และ password แบบ plaintext จาก workstation สังเกตเห็นอะไร?",o:["SNMP traps","A Telnet session","An SSH connection","SFTP traffic"],a:[1],m:false,e:"Telnet transmits data including credentials in plain text, making them visible in packet captures.",eth:"Telnet ส่งข้อมูลรวมถึง credentials เป็น plain text มองเห็นได้ใน packet capture"},
{q:"A third party asked a user to share a public key for secure communication. Which file format should be used?",qth:"บุคคลที่สามขอแชร์ public key สำหรับการสื่อสารปลอดภัย ใช้ไฟล์รูปแบบใด?",o:[".pfx",".csr",".pvk",".cer"],a:[3],m:false,e:"A .cer file contains a public key certificate that can be shared with third parties for secure communication.",eth:"ไฟล์ .cer มี public key certificate ที่แชร์กับบุคคลที่สามเพื่อการสื่อสารปลอดภัย"},
{q:"A security manager needs to assess a vendor's security posture but the contract doesn't allow auditing. What should be requested?",qth:"ผู้จัดการความปลอดภัยต้องประเมิน vendor แต่สัญญาไม่อนุญาตให้ audit ควรขออะไร?",o:["A service-level agreement","A business partnership agreement","A SOC 2 Type 2 report","A memorandum of understanding"],a:[2],m:false,e:"SOC 2 Type 2 report evaluates controls effectiveness over time, providing evidence of vendor's security posture.",eth:"SOC 2 Type 2 report ประเมินประสิทธิภาพ controls ตลอดเวลา ให้หลักฐาน security posture ของ vendor"},
{q:"Which items in a forensic investigation should be priorities based on order of volatility? (Select TWO)",qth:"ในการสืบสวนทางนิติวิทยาศาสตร์ ข้อใดควรจัดลำดับตาม volatility? (เลือก 2 ข้อ)",o:["Page files","Event logs","RAM","Cache","Stored files","HDD"],a:[2,3],m:true,e:"RAM and Cache are the most volatile — they lose data when power is off and should be collected first.",eth:"RAM และ Cache มี volatility สูงสุด — ข้อมูลหายเมื่อปิดเครื่อง ควรเก็บก่อน"},
{q:"A security analyst finds a file with overly permissive permissions. Which tool will reduce permissions and remove the set-user-ID?",qth:"นักวิเคราะห์พบไฟล์ที่มีสิทธิ์เกินไป เครื่องมือใดลดสิทธิ์และลบ set-user-ID?",o:["ls","chflags","chmod","lsof","setuid"],a:[2],m:false,e:"chmod changes file/directory permissions and can remove the set-user-ID bit.",eth:"chmod เปลี่ยนสิทธิ์ไฟล์/ไดเรกทอรี และลบ set-user-ID bit ได้"},
{q:"Which maintenance metric measures the average time required to troubleshoot and restore failed equipment?",qth:"ค่าวัดการบำรุงรักษาใดวัดเวลาเฉลี่ยในการแก้ไขและกู้คืนอุปกรณ์ที่เสียหาย?",o:["RTO","MTBF","MTTR","RPO"],a:[2],m:false,e:"Mean Time To Repair (MTTR) measures the average time to troubleshoot and restore failed equipment.",eth:"MTTR วัดเวลาเฉลี่ยในการแก้ไขปัญหาและกู้คืนอุปกรณ์ที่เสียหาย"},
{q:"A SAML application with MFA shows successful logins without MFA from traveling users. The app uses time-based tokens. What explains the issue?",qth:"แอป SAML+MFA แสดง login สำเร็จโดยไม่ผ่าน MFA จากผู้ใช้ที่เดินทาง แอปใช้ time-based token อธิบายปัญหาอย่างไร?",o:["OpenID is mandatory for MFA","Incorrect browser detected","Trusted certificate overwriting session token","User's IP changing but app not invalidating the token"],a:[3],m:false,e:"The application is not invalidating the token when the user's IP changes between logins, allowing MFA bypass.",eth:"แอปไม่ invalidate token เมื่อ IP เปลี่ยนระหว่าง login ทำให้ bypass MFA ได้"},
{q:"A new SMB vulnerability was discovered with no patches available. Which TCP ports should be blocked for external inbound connections to the DMZ? (Select TWO)",qth:"พบช่องโหว่ SMB ใหม่แต่ไม่มี patch ควรบล็อก TCP port ใดสำหรับ connection ขาเข้าจากภายนอก? (เลือก 2 ข้อ)",o:["135","139","143","161","443","445"],a:[1,5],m:true,e:"SMB uses TCP ports 139 and 445. Blocking these prevents external exploitation of the SMB vulnerability.",eth:"SMB ใช้ TCP port 139 และ 445 การบล็อกป้องกันการใช้ช่องโหว่ SMB จากภายนอก"}
);
Q.push(
{q:"A large enterprise moved all data to the cloud. A sales director's laptop was stolen, and data was compromised from a local database. What was the MOST likely cause?",qth:"องค์กรย้ายข้อมูลไป cloud laptop ผู้อำนวยการฝ่ายขายถูกขโมย ข้อมูล compromise จาก local database สาเหตุคืออะไร?",o:["Shadow IT","Credential stuffing","SQL injection","Man in the browser","Bluejacking"],a:[0],m:false,e:"Shadow IT — the use of unauthorized applications or devices — meant a local database existed outside security controls.",eth:"Shadow IT คือการใช้แอปหรืออุปกรณ์ที่ไม่ได้รับอนุญาต ทำให้มี local database นอกเหนือการควบคุม"},
{q:"A CIO receives an email stating a database will be encrypted within 24 hours unless $20,000 is paid. This BEST describes:",qth:"CIO ได้รับอีเมลว่า database จะถูกเข้ารหัสใน 24 ชม. หากไม่จ่าย $20,000 นี่คือ:",o:["Whaling","Smishing","Spear phishing","Vishing"],a:[2],m:false,e:"Spear phishing targets specific individuals with personalized content, often containing threats or demands.",eth:"Spear phishing เจาะจงบุคคลด้วยเนื้อหาเฉพาะ มักมีการข่มขู่หรือเรียกร้อง"},
{q:"A security analyst is creating a new WiFi network requiring: differentiate users, auto key rotation, RADIUS integration, no open SSIDs. Which BEST accommodates these?",qth:"สร้าง WiFi ใหม่ที่ต้อง: แยกผู้ใช้ เปลี่ยน key อัตโนมัติ ใช้ RADIUS ไม่มี open SSID ข้อใดตอบโจทย์?",o:["WPA2-Enterprise","WPA3-PSK","802.11n","WPS"],a:[0],m:false,e:"WPA2-Enterprise uses 802.1X authentication, supports RADIUS, dynamic encryption keys, and no open SSIDs.",eth:"WPA2-Enterprise ใช้ 802.1X รองรับ RADIUS มี dynamic keys และไม่อนุญาต open SSID"},
{q:"A company's website IP is 166.18.75.6 but nslookup shows it pointing to 151.191.122.115 with incorrect homepage. What is occurring?",qth:"เว็บไซต์มี IP 166.18.75.6 แต่ nslookup ชี้ไป 151.191.122.115 หน้าแรกไม่ถูกต้อง เกิดอะไรขึ้น?",o:["DoS attack","ARP poisoning","DNS spoofing","NXDOMAIN attack"],a:[2],m:false,e:"DNS spoofing compromises DNS resolution, pointing the domain to a malicious IP address.",eth:"DNS spoofing ปลอมแปลง DNS resolution ทำให้ domain ชี้ไปยัง IP อันตราย"},
{q:"Employees receive unsolicited text messages containing password reset links on corporate cell phones. Which attack is being used?",qth:"พนักงานได้รับ SMS ไม่พึงประสงค์พร้อมลิงก์รีเซ็ตรหัสผ่านบนโทรศัพท์บริษัท การโจมตีแบบใด?",o:["Phishing","Vishing","Smishing","Spam"],a:[2],m:false,e:"Smishing is phishing via text message (SMS) containing malicious links or social engineering tactics.",eth:"Smishing คือ phishing ผ่าน SMS ที่มีลิงก์อันตรายหรือ social engineering"},
{q:"Which should be reviewed to determine the total risk an organization can bear when assessing a 'cloud-first' strategy?",qth:"ควรตรวจสอบอะไรเพื่อกำหนดความเสี่ยงรวมที่องค์กรรับได้เมื่อประเมินกลยุทธ์ 'cloud-first'?",o:["Risk matrix","Risk tolerance","Risk register","Risk appetite"],a:[1],m:false,e:"Risk tolerance is the amount of risk an organization is willing to accept.",eth:"Risk tolerance คือระดับความเสี่ยงที่องค์กรยอมรับได้"},
{q:"A company is concerned about individuals driving a car into the building. Which security control would work BEST?",qth:"บริษัทกังวลเรื่องคนขับรถเข้ามาในอาคาร ควรใช้ security control ใด?",o:["Bollard","Camera","Alarms","Signage","Access control vestibule"],a:[0],m:false,e:"A bollard is a short vertical post designed to block vehicles from entering designated areas.",eth:"Bollard คือเสาสั้นตั้งตรง ออกแบบกั้นยานพาหนะไม่ให้เข้าพื้นที่"},
{q:"The CISO wants to outsource outbound URL filtering with protection for off-campus devices. Which solution?",qth:"CISO ต้องการ outsource URL filtering พร้อมป้องกันอุปกรณ์นอกสำนักงาน เลือกข้อใด?",o:["CASB","Next-generation SWG","NGFW","Web-application firewall"],a:[1],m:false,e:"Next-generation Secure Web Gateway (SWG) provides URL filtering and categorization even when users are away from the office.",eth:"Next-generation SWG ให้ URL filtering และ categorization แม้ผู้ใช้อยู่นอกสำนักงาน"},
{q:"Users log in twice on an internal web app. The gateway ARP table shows duplicate MAC addresses for different IPs. Which attack is this?",qth:"ผู้ใช้ต้อง login สองครั้ง ARP table แสดง MAC ซ้ำสำหรับ IP ต่างกัน การโจมตีแบบใด?",o:["MAC flooding","URL redirection","ARP poisoning","DNS hijacking"],a:[2],m:false,e:"ARP poisoning sends fake ARP messages to associate the attacker's MAC with another device's IP, intercepting traffic.",eth:"ARP poisoning ส่ง ARP ปลอมเพื่อเชื่อมโยง MAC ผู้โจมตีกับ IP อุปกรณ์อื่น ดักจับ traffic"},
{q:"HTTPS requests are reverting to HTTP with connection delays. What BEST describes what is happening?",qth:"HTTPS ถูกเปลี่ยนกลับเป็น HTTP มีความล่าช้า อะไรกำลังเกิดขึ้น?",o:["Birthday collision on certificate key","DNS hacking to reroute traffic","Brute force to the access point","A SSL/TLS downgrade"],a:[3],m:false,e:"SSL/TLS downgrade (stripping) attack intercepts and downgrades secure HTTPS to insecure HTTP.",eth:"SSL/TLS downgrade (stripping) attack ดักจับและลดระดับจาก HTTPS เป็น HTTP"},
{q:"SIEM detected suspicious traffic from a workstation with botnet malware and escalated privileges. Which group should receive the report?",qth:"SIEM ตรวจพบ traffic น่าสงสัยจาก workstation ที่มี botnet และ privilege ถูกยกระดับ ควรรายงานกลุ่มใด?",o:["The NOC team","The vulnerability management team","The CIRT","The red team"],a:[2],m:false,e:"The Computer Incident Response Team (CIRT) is responsible for handling incidents and following the incident response plan.",eth:"CIRT รับผิดชอบจัดการ incident และปฏิบัติตามแผน incident response"},
{q:"An enterprise hired an outside firm for penetration testing, paying for each vulnerability found. Which type of testing?",qth:"องค์กรจ้างบริษัทนอกทำ penetration testing จ่ายต่อช่องโหว่ที่พบ การทดสอบแบบใด?",o:["White-box","Red-team","Bug bounty","Gray-box","Black-box"],a:[2],m:false,e:"Bug bounty programs offer rewards for each vulnerability found by external security researchers.",eth:"Bug bounty ให้รางวัลสำหรับแต่ละช่องโหว่ที่นักวิจัยภายนอกค้นพบ"},
{q:"A financial institution joined a bug bounty program to identify security issues. Who is the institution working with?",qth:"สถาบันการเงินเข้าร่วม bug bounty เพื่อหาปัญหาความปลอดภัย กำลังทำงานกับใคร?",o:["Script kiddie","Insider threats","Malicious actor","Authorized hacker"],a:[3],m:false,e:"An authorized hacker (ethical/white hat hacker) finds and reports security issues with permission.",eth:"Authorized hacker (ethical/white hat hacker) ค้นหาและรายงานปัญหาความปลอดภัยโดยได้รับอนุญาต"},
{q:"Multiple beaconing activities to a malicious domain from various endpoints. Which technology BEST correlates activities between endpoints?",qth:"มี beaconing จาก endpoint หลายตัวไปยัง domain อันตราย เทคโนโลยีใดเชื่อมโยงกิจกรรมได้ดีที่สุด?",o:["Firewall","SIEM","IPS","Protocol analyzer"],a:[1],m:false,e:"SIEM collects, analyzes, and correlates data from multiple sources to detect threats across endpoints.",eth:"SIEM รวบรวม วิเคราะห์ และเชื่อมโยงข้อมูลจากหลายแหล่งเพื่อตรวจจับภัยคุกคามข้าม endpoint"},
{q:"A security architect needs centralized key management in a multi-cloud environment with reduced latency. Which solution?",qth:"สถาปนิกต้องการจัดการ key แบบรวมศูนย์ใน multi-cloud ที่ latency ต่ำ ข้อใดดีที่สุด?",o:["Trusted Platform Module","IaaS","HSMaaS","PaaS"],a:[2],m:false,e:"HSMaaS provides secure, scalable cloud-based key management and cryptographic operations across multiple cloud providers.",eth:"HSMaaS ให้จัดการ key บน cloud ที่ปลอดภัย ขยายได้ ข้าม cloud provider หลายราย"},
{q:"An email worm was opened from an attachment. The analyst wants to prevent further spread. What is the BEST action?",qth:"Worm จากอีเมลถูกเปิด ต้องการป้องกันการแพร่กระจาย ควรทำอะไร?",o:["Apply DLP","Implement network segmentation","Email content filtering","Isolate the infected attachment"],a:[3],m:false,e:"Isolating the infected attachment prevents the worm from spreading via email, file-sharing, or other channels.",eth:"การแยก attachment ที่ติดเชื้อป้องกัน worm จากการแพร่กระจายผ่านอีเมลหรือช่องทางอื่น"},
{q:"An attacker eavesdropped on an online shopper and spoofed the shopping site's IP address. Which attack took place?",qth:"ผู้โจมตีดักฟังผู้ซื้อออนไลน์และปลอม IP ของเว็บช็อปปิ้ง การโจมตีแบบใด?",o:["On-path attack","Protocol poisoning","Domain hijacking","Bluejacking"],a:[0],m:false,e:"An on-path (man-in-the-middle) attack intercepts traffic between two parties to steal information.",eth:"On-path (MitM) attack ดักจับ traffic ระหว่างสองฝ่ายเพื่อขโมยข้อมูล"},
{q:"Malicious software was installed using server admin credentials. The admin regularly used Telnet. What MOST likely occurred?",qth:"ซอฟต์แวร์อันตรายติดตั้งด้วย credentials ของ admin ที่ใช้ Telnet เป็นประจำ อะไรเกิดขึ้น?",o:["Spraying attack","Packet capture tool stole the password","Remote-access Trojan","Directory attack"],a:[1],m:false,e:"Telnet transmits in cleartext, so a packet capture tool could intercept the admin password on the network.",eth:"Telnet ส่งข้อมูลเป็น cleartext packet capture tool สามารถดักจับรหัสผ่าน admin ได้"},
{q:"A company wants to deploy decoy systems alongside production to learn about attackers. What BEST describes these?",qth:"บริษัทวางระบบล่อร่วมกับ production เพื่อเรียนรู้เกี่ยวกับผู้โจมตี เรียกว่าอะไร?",o:["DNS sinkholes","Honeypots","Virtual machines","Neural networks"],a:[1],m:false,e:"Honeypots are decoy systems designed to attract threat actors and collect information about attacker behavior.",eth:"Honeypots คือระบบล่อที่ดึงดูดผู้คุกคามและรวบรวมข้อมูลพฤติกรรมผู้โจมตี"},
{q:"Which describes software on network hardware that needs routine updates to address possible vulnerabilities?",qth:"ข้อใดอธิบายซอฟต์แวร์บน hardware เครือข่ายที่ต้องอัปเดตเป็นประจำเพื่อแก้ช่องโหว่?",o:["Vendor management","API","Vanishing","Encryption strength","Firmware"],a:[4],m:false,e:"Firmware is embedded software on network hardware that needs regular updates to fix bugs and patch vulnerabilities.",eth:"Firmware คือซอฟต์แวร์ฝังตัวใน hardware ต้องอัปเดตเป็นประจำเพื่อแก้ bug และ patch ช่องโหว่"}
);
Q.push(
{q:"Which would BEST ensure data is saved to a server, easily scaled, and centrally monitored?",qth:"ข้อใดดีที่สุดเพื่อให้ข้อมูลบันทึกบน server ขยายได้ง่าย และตรวจสอบจากส่วนกลาง?",o:["Edge computing","Microservices","Containers","Thin client"],a:[2],m:false,e:"Containers are lightweight, portable, scalable, and enable centralized monitoring with tools like Docker/Kubernetes.",eth:"Containers เบา พกพาได้ ขยายง่าย รองรับการตรวจสอบจากส่วนกลางด้วย Docker/Kubernetes"},
{q:"A security analyst receives an alert about anomalous device behavior. The device might be compromised. What should be done FIRST?",qth:"นักวิเคราะห์ได้รับแจ้งเตือนพฤติกรรมผิดปกติ อุปกรณ์อาจถูก compromise ควรทำอะไรก่อน?",o:["Reboot the device","Set host-based firewall to deny incoming","Update antivirus definitions","Isolate the device"],a:[3],m:false,e:"Isolating the device prevents further communication with attackers, contains the incident, and preserves evidence.",eth:"แยกอุปกรณ์ป้องกันการสื่อสารกับผู้โจมตี ควบคุม incident และรักษาหลักฐาน"},
{q:"After the first code scan, over 2,000 findings were reported. What is the MOST likely cause?",qth:"หลังสแกนโค้ดครั้งแรก มีผลกว่า 2,000 รายการ สาเหตุน่าจะเป็นอะไร?",o:["Scanner not properly configured — false positives","Third-party libraries in repository","Memory leaks causing duplicates","Scanner not loaded with correct benchmarks"],a:[0],m:false,e:"An improperly configured scanner generates many false positives from over-sensitive rules or outdated scan databases.",eth:"Scanner ที่ตั้งค่าไม่ถูกสร้าง false positive จำนวนมากจาก rule ที่ sensitive เกินหรือ database ล้าสมัย"},
{q:"Common vulnerabilities appear on almost all applications by the development team. Which approach is MOST effective?",qth:"พบช่องโหว่ชุดเดิมในแอปเกือบทุกตัว แนวทางใดมีประสิทธิภาพสูงสุด?",o:["Tune fuzz testing","Invest in secure coding training and guidelines","Increase dynamic scan frequency","Implement code signing"],a:[1],m:false,e:"Secure coding training teaches developers security best practices, reducing vulnerabilities at the source.",eth:"การอบรม secure coding สอนนักพัฒนาให้ใช้ best practice ลดช่องโหว่ตั้งแต่ต้นทาง"},
{q:"Which would be MOST effective to contain a rapidly spreading attack affecting many organizations?",qth:"ข้อใดมีประสิทธิภาพสูงสุดในการควบคุมการโจมตีที่แพร่เร็วกระทบหลายองค์กร?",o:["Machine learning","DNS sinkhole","Blocklist","Honeypot"],a:[1],m:false,e:"DNS sinkhole redirects malicious domain traffic, disrupting C&C communications and containing the spread.",eth:"DNS sinkhole เปลี่ยนเส้นทาง traffic domain อันตราย ขัดขวางการสื่อสาร C&C และควบคุมการแพร่กระจาย"},
{q:"Malicious code downloaded over HTTPS was running in memory but never saved to disk. How to obtain the malware binary?",qth:"โค้ดอันตรายดาวน์โหลดผ่าน HTTPS ทำงานใน memory ไม่เคยบันทึกลง disk จะได้ binary อย่างไร?",o:["pcap reassembly","SSD snapshot","Image volatile memory","Extract from checksums"],a:[2],m:false,e:"Imaging volatile memory captures a snapshot of RAM contents including active malware running only in memory.",eth:"Image volatile memory จับ snapshot ของ RAM ซึ่งรวม malware ที่ทำงานใน memory เท่านั้น"},
{q:"OS-level configurations are not in compliance due to outdated hardening standards. What should be used to update and reconfigure?",qth:"การตั้งค่า OS ไม่เป็นไปตามข้อกำหนดเพราะมาตรฐาน hardening ล้าสมัย ควรใช้อะไรอัปเดต?",o:["CIS benchmarks","GDPR guidance","Regional regulations","ISO 27001 standards"],a:[0],m:false,e:"CIS benchmarks provide current best practices for securing OS configurations, updated regularly by experts.",eth:"CIS benchmarks ให้ best practice ปัจจุบันสำหรับ OS security อัปเดตเป็นประจำโดยผู้เชี่ยวชาญ"},
{q:"During onboarding, a complex password grants access to multiple company sites. Which TWO access management concepts are used?",qth:"ระหว่าง onboarding รหัสผ่านซับซ้อนให้สิทธิ์เข้าหลายเว็บไซต์บริษัท ใช้แนวคิดใด 2 ข้อ?",o:["Federation","Identity proofing","Password complexity","Default password changes","Password manager","Open authentication"],a:[0,5],m:true,e:"Federation allows single authentication for multiple services. Open authentication enables cross-service credential use.",eth:"Federation authenticate ครั้งเดียวเข้าหลายบริการ Open authentication ใช้ credentials ข้ามบริการ"},
{q:"A security analyst wants to defend against SQL injection. Which should be recommended FIRST?",qth:"นักวิเคราะห์ต้องการป้องกัน SQL injection ควรแนะนำอะไรก่อน?",o:["Tokenization","Input validation","Code signing","Secure cookies"],a:[1],m:false,e:"Input validation checks user input for malicious characters, ensuring only valid input reaches database queries.",eth:"Input validation ตรวจสอบ input หา characters อันตราย ให้เฉพาะ input ที่ถูกต้องส่งไปยัง database"},
{q:"A new access control system needs to connect to the AD server. Which protocol is MOST secure?",qth:"ระบบ access control ใหม่ต้องเชื่อมต่อ AD server ใช้ protocol ใดปลอดภัยที่สุด?",o:["HTTPS","SSH","SFTP","LDAPS"],a:[3],m:false,e:"LDAPS encrypts communication between client and AD server using SSL/TLS, preventing eavesdropping.",eth:"LDAPS เข้ารหัสการสื่อสารระหว่าง client กับ AD server ด้วย SSL/TLS ป้องกันการดักฟัง"},
{q:"All traffic routes through a VPN. A firewall, DLP appliance, VPN server, and data center are in the path. Which is the weakest design element?",qth:"Traffic ทั้งหมดผ่าน VPN มี firewall, DLP, VPN server ข้อใดเป็นจุดอ่อนที่สุด?",o:["DLP should integrate into NGFW","Split-tunnel impacts DLP","Encrypted VPN traffic won't be inspected","Adding hops slows connections"],a:[2],m:false,e:"Encrypted VPN traffic cannot be inspected by security devices unless decrypted first, creating a security blind spot.",eth:"VPN traffic ที่เข้ารหัสตรวจสอบไม่ได้โดยอุปกรณ์ security หากไม่ถอดรหัสก่อน สร้างจุดบอด"},
{q:"User credentials could be exfiltrated and users choose the same credentials across systems. Which policy prevents using exfiltrated credentials?",qth:"Credentials อาจถูกขโมย ผู้ใช้ใช้ credentials เดียวกันหลายระบบ ใช้ policy ใดป้องกัน?",o:["MFA","Lockout","Time-based logins","Password history"],a:[0],m:false,e:"MFA requires additional verification beyond password, preventing use of stolen credentials alone.",eth:"MFA ต้องการยืนยันตัวตนเพิ่มเติมนอกเหนือรหัสผ่าน ป้องกันการใช้ credentials ที่ถูกขโมย"},
{q:"Designing a secondary data center. Which TWO should the security team recommend?",qth:"ออกแบบ data center สำรอง ทีมความปลอดภัยควรแนะนำ 2 ข้อใด?",o:["Replicate web servers to offline storage","Geographically disperse location","Load balancers at primary site","Installing generators","Differential backups at secondary","Hot and cold aisles"],a:[1,3],m:true,e:"Geographic diversity protects against regional disasters. Generators provide backup power for availability.",eth:"ที่ตั้งที่แยกทางภูมิศาสตร์ป้องกันภัยในพื้นที่ เครื่องปั่นไฟให้พลังงานสำรองเพื่อความพร้อมใช้งาน"},
{q:"A security analyst is creating baselines for server hardening. What is being created?",qth:"นักวิเคราะห์สร้าง baseline สำหรับ hardening เซิร์ฟเวอร์ กำลังสร้างอะไร?",o:["Change management procedure","Information security policy","Cybersecurity framework","Secure configuration guide"],a:[3],m:false,e:"A secure configuration guide provides security best practices for specific systems.",eth:"Secure configuration guide ให้ best practice ด้านความปลอดภัยสำหรับระบบเฉพาะ"},
{q:"A security team outsources functions requiring audits, attestations several times a year, and monthly reports. Which document defines these?",qth:"ทีม outsource งานที่ต้อง audit attestation หลายครั้งต่อปี และรายงานรายเดือน เอกสารใดกำหนด?",o:["MOU","AUP","SLA","MSA"],a:[2],m:false,e:"A Service Level Agreement (SLA) defines service requirements, performance levels, and reporting obligations.",eth:"SLA กำหนดข้อกำหนดบริการ ระดับประสิทธิภาพ และหน้าที่รายงาน"},
{q:"Security analysts notice a server login from a user on vacation for two weeks. Packet capture shows NTLM authentication. Which attack?",qth:"นักวิเคราะห์พบ login จากผู้ใช้ที่ลาพัก 2 สัปดาห์ packet capture แสดง NTLM authentication การโจมตีแบบใด?",o:["Buffer overflow","Account compromised with changed credentials","Pass-the-hash attack","Insider threat"],a:[2],m:false,e:"Pass-the-hash captures and uses the password hash to authenticate without knowing the actual password. NTLM is vulnerable to this.",eth:"Pass-the-hash ดักจับและใช้ hash ของรหัสผ่านเพื่อ authenticate โดยไม่ต้องรู้รหัสผ่านจริง NTLM เปราะต่อการโจมตีนี้"},
{q:"A security administrator is sending syslog via UDP 514 through an unsecure network. How to improve?",qth:"ผู้ดูแลส่ง syslog ผ่าน UDP 514 บนเครือข่ายไม่ปลอดภัย ปรับปรุงอย่างไร?",o:["Change to TCP","Add LDAP authentication to SIEM","Use VPN with DLP","Add SSL/TLS encryption and use TCP 6514"],a:[3],m:false,e:"SSL/TLS on TCP 6514 (RFC 5425) encrypts and authenticates syslog traffic, preventing eavesdropping and tampering.",eth:"SSL/TLS บน TCP 6514 (RFC 5425) เข้ารหัสและ authenticate syslog traffic ป้องกันการดักฟังและแก้ไข"},
{q:"Web server logs show login attempts with username=admin and sequential PIN numbers (0000, 0001, 0002, 0003). Which password attack?",qth:"Log แสดงการ login ด้วย username=admin และ PIN ตามลำดับ (0000-0003) การโจมตีแบบใด?",o:["Dictionary","Brute-force","Rainbow table","Spraying"],a:[3],m:false,e:"Password spraying tries common passwords against many accounts to avoid lockout policies.",eth:"Password spraying ลองรหัสผ่านทั่วไปกับหลาย account เพื่อหลีกเลี่ยง lockout policy"},
{q:"SSH was disabled during hardening but users can't use SCP to transfer files. What is the MOST likely cause?",qth:"SSH ถูกปิดระหว่าง hardening แต่ผู้ใช้ใช้ SCP ไม่ได้ สาเหตุคืออะไร?",o:["TFTP disabled on local hosts","SSH turned off instead of modifying config","Remote login disabled in wrong config","Network services not running on NAS"],a:[1],m:false,e:"SCP requires SSH. Turning SSH off entirely (rather than just configuring it) prevents SCP file transfers.",eth:"SCP ต้องใช้ SSH การปิด SSH ทั้งหมด (แทนที่จะแค่ปรับ config) ทำให้ SCP โอนไฟล์ไม่ได้"},
{q:"802.1X implementation requires minimal interruption and mutual certificate validation. Which authentication protocol?",qth:"Implement 802.1X ต้องรบกวนน้อย มี mutual certificate validation ใช้ protocol ใด?",o:["EAP-FAST","PSK","EAP-TTLS","EAP-TLS"],a:[3],m:false,e:"EAP-TLS uses certificates for mutual authentication between client and server with minimal user disruption.",eth:"EAP-TLS ใช้ certificate สำหรับ mutual authentication ระหว่าง client และ server โดยรบกวนน้อย"},
{q:"Only CEO and COO know about a security assessment with very little information given to assessors. What type of test?",qth:"เฉพาะ CEO และ COO รู้เกี่ยวกับการประเมิน ให้ข้อมูลน้อยแก่ผู้ประเมิน การทดสอบแบบใด?",o:["Red-team test","White-team test","Purple-team test","Blue-team test"],a:[0],m:false,e:"A red-team test simulates real-world attacks without most staff knowing, testing detection and response.",eth:"Red-team test จำลองการโจมตีจริงโดยพนักงานส่วนใหญ่ไม่รู้ ทดสอบการตรวจจับและตอบสนอง"}
);

{q:"ARP table shows the same MAC address associated with two different IPs on the same port. Which attack is occurring?",qth:"ARP table แสดง MAC เดียวกันสำหรับ IP สองตัวบน port เดียว กำลังเกิดการโจมตีแบบใด?",o:["DDoS","MAC flooding","ARP poisoning","DNS poisoning"],a:[2],m:false,e:"ARP poisoning associates a malicious MAC with legitimate IP addresses, redirecting traffic to the attacker.",eth:"ARP poisoning เชื่อมโยง MAC อันตรายกับ IP ที่ถูกต้อง เปลี่ยนเส้นทาง traffic ไปยังผู้โจมตี"},
{q:"A company wants to protect credit card data in a database. The POS system doesn't support encryption. Which is BEST?",qth:"บริษัทปกป้องข้อมูลบัตรเครดิตใน database แต่ POS ไม่รองรับ encryption ข้อใดดีที่สุด?",o:["Masking","Tokenization","DLP","SSL/TLS"],a:[1],m:false,e:"Tokenization replaces sensitive data with non-sensitive tokens while keeping the original data secure elsewhere.",eth:"Tokenization แทนที่ข้อมูล sensitive ด้วย token ที่ไม่ sensitive โดยเก็บข้อมูลจริงอย่างปลอดภัยที่อื่น"},
{q:"Which is the BEST method for ensuring non-repudiation?",qth:"วิธีใดดีที่สุดในการรับรอง non-repudiation?",o:["SSO","Digital certificate","Token","SSH key"],a:[1],m:false,e:"A digital certificate binds a public key to an identity, proving authorship and providing non-repudiation.",eth:"Digital certificate ผูก public key กับตัวตน พิสูจน์ผู้เขียนและให้ non-repudiation"},
{q:"An internal CA certificate causes 'Your connection is not private' on a public application. What is the BEST fix?",qth:"Certificate จาก internal CA ทำให้เกิด 'Your connection is not private' บนแอป public แก้อย่างไร?",o:["Ignore the warning","Install certificate on each endpoint","Send certificate to users","Send CSR to known CA and install signed certificate"],a:[3],m:false,e:"Using a certificate signed by a public CA ensures all browsers and OS trust the connection by default.",eth:"Certificate จาก public CA ทำให้ browser และ OS ทั้งหมดเชื่อถือการเชื่อมต่อโดยอัตโนมัติ"},
{q:"Multiple LAN devices on the same switch experience speed/latency issues. MAC table shows duplicate MACs on different ports. Which attack?",qth:"อุปกรณ์ LAN หลายตัวบน switch เดียวกันมีปัญหาความเร็ว MAC table แสดง MAC ซ้ำ การโจมตีแบบใด?",o:["MAC flooding","Evil twin","ARP poisoning","DHCP spoofing"],a:[2],m:false,e:"ARP poisoning sends spoofed ARP replies to redirect traffic, causing duplicate MAC entries and network issues.",eth:"ARP poisoning ส่ง ARP reply ปลอมเปลี่ยนเส้นทาง traffic ทำให้ MAC ซ้ำและเครือข่ายมีปัญหา"},
{q:"Adding 'deny any' to the bottom of an ACL caused servers to become unreachable. Which action would prevent this?",qth:"เพิ่ม 'deny any' ที่ท้าย ACL ทำให้เข้า server ไม่ได้ ทำอย่างไรป้องกัน?",o:["Document in change request","Test in non-production environment first","Disable IPS signatures","Add 'allow any' above deny"],a:[1],m:false,e:"Testing in a non-production environment verifies policy impact without affecting the production network.",eth:"ทดสอบใน non-production environment ตรวจสอบผลกระทบโดยไม่กระทบเครือข่ายจริง"},
{q:"A file transfer solution needs to send files securely over the internet to a business partner. Which can be used?",qth:"ต้องส่งไฟล์อย่างปลอดภัยผ่านอินเทอร์เน็ตให้ partner ใช้อะไร?",o:["S/MIME","LDAPS","SSH","SRTP"],a:[2],m:false,e:"SSH provides encryption and authentication for secure file transfer (via SCP or SFTP) over the internet.",eth:"SSH ให้ encryption และ authentication สำหรับโอนไฟล์ปลอดภัย (ผ่าน SCP/SFTP) ผ่านอินเทอร์เน็ต"},
{q:"Implementing a zero-trust policy. What is the FIRST step?",qth:"Implement zero-trust policy ขั้นตอนแรกคืออะไร?",o:["Determine CASB solution","Configure DLP by user groups","Implement agentless NAC","Classify all data on file servers"],a:[3],m:false,e:"Classifying data determines sensitivity and risk levels, enabling appropriate access controls in zero-trust.",eth:"จำแนกข้อมูลกำหนดระดับความ sensitive และความเสี่ยง เพื่อตั้ง access control ที่เหมาะสมใน zero-trust"},
{q:"A security administrator suspects unnecessary services on a server. Which tool confirms this?",qth:"ผู้ดูแลสงสัยมีบริการไม่จำเป็นบน server เครื่องมือใดยืนยัน?",o:["Nmap","Wireshark","Autopsy","DNSEnum"],a:[0],m:false,e:"Nmap scans ports and detects running services and applications on a server.",eth:"Nmap สแกน port ตรวจหาบริการและแอปที่ทำงานบน server"},
{q:"Which allows access to remote computing resources, an operating system, and centralized configuration and data?",qth:"ข้อใดให้เข้าถึง computing resource จากระยะไกล ระบบปฏิบัติการ และการตั้งค่าจากส่วนกลาง?",o:["Containers","Edge computing","Thin client","Infrastructure as a service"],a:[2],m:false,e:"Thin clients rely on remote servers for computing resources, OS, and centralized configuration.",eth:"Thin client พึ่งพา server ระยะไกลสำหรับ computing resource, OS และการตั้งค่าจากส่วนกลาง"},
{q:"A compromised non-critical app includes a malicious reverse proxy. How to quickly contain with least impact?",qth:"แอปที่ถูก compromise มี reverse proxy อันตราย ควบคุมอย่างรวดเร็วส่งผลน้อยที่สุดอย่างไร?",o:["Configure firewall rules","Manually uninstall the update","Add application hash to blocklist","Turn off all computers with the app"],a:[2],m:false,e:"Adding the application hash to a blocklist prevents the malicious app from running across all systems immediately.",eth:"เพิ่ม hash ของแอปเข้า blocklist ป้องกันแอปอันตรายจากการทำงานในทุกระบบทันที"},
{q:"To harden mobile devices with controls that: limit sites, allow internal resources only on campus, restrict image downloads from email. Which TWO?",qth:"Harden อุปกรณ์มือถือ: จำกัดเว็บ ทรัพยากรภายในเฉพาะในวิทยาเขต จำกัดดาวน์โหลดรูปจากอีเมล ใช้ control ใด 2 ข้อ?",o:["MFA","GPS tagging","Biometric authentication","Content management","Geofencing","Screen lock and PIN"],a:[3,4],m:true,e:"Content management limits sites and downloads. Geofencing restricts internal access to on-campus only via GPS.",eth:"Content management จำกัดเว็บและดาวน์โหลด Geofencing จำกัดการเข้าถึงภายในเฉพาะในวิทยาเขตด้วย GPS"},
{q:"Wireless issues near the parking lot — slow speeds, can't connect to drives, credential prompts on web pages. What is the MOST likely cause?",qth:"ปัญหา WiFi ใกล้ลานจอดรถ — ช้า เชื่อมต่อ drive ไม่ได้ ถูกขอ credentials บนเว็บ สาเหตุคืออะไร?",o:["External AP engaging in evil-twin attack","WAP signal needs increasing","Expired certificates","Users on blocked VLAN"],a:[0],m:false,e:"An evil-twin attack uses a rogue AP near the parking lot to mimic legitimate WiFi, intercepting traffic and stealing credentials.",eth:"Evil-twin attack ใช้ rogue AP ใกล้ลานจอดรถเลียนแบบ WiFi ที่ถูกต้อง ดักจับ traffic และขโมย credentials"},
{q:"An organization is repairing damage after an incident. Which type of control is being implemented?",qth:"องค์กรกำลังซ่อมแซมความเสียหายหลัง incident เป็น control ประเภทใด?",o:["Detective","Preventive","Corrective","Compensating"],a:[2],m:false,e:"Corrective controls are applied after an incident to repair damage and restore normal operations.",eth:"Corrective controls ใช้หลัง incident เพื่อซ่อมแซมความเสียหายและกู้คืนการทำงานปกติ"},
{q:"MDM policy requires: patched OS, screen lock enabled, corporate data removal if lost/stolen. Which TWO controls?",qth:"MDM policy ต้อง: OS ที่ patch screen lock ลบข้อมูลหากหาย/ถูกขโมย ใช้ control ใด 2 ข้อ?",o:["Disable firmware OTA","Storage segmentation","Posture checking","Remote wipe","Full device encryption","Geofencing"],a:[2,3],m:true,e:"Posture checking verifies device compliance (patches, screen lock). Remote wipe erases data from lost/stolen devices.",eth:"Posture checking ตรวจสอบความสอดคล้อง (patch, screen lock) Remote wipe ลบข้อมูลจากอุปกรณ์ที่หาย"},
{q:"Packet capture from a compromised host shows packets with large amounts of text. What is MOST likely installed?",qth:"Packet capture จาก host ที่ถูก compromise แสดง packet ที่มีข้อความมาก น่าจะติดตั้งอะไร?",o:["Keylogger","Spyware","Trojan","Ransomware"],a:[0],m:false,e:"A keylogger records keystrokes and transmits them as text data to the attacker, explaining the large text packets.",eth:"Keylogger บันทึกการกดแป้นพิมพ์และส่งเป็นข้อมูลข้อความไปยังผู้โจมตี อธิบาย packet ข้อความจำนวนมาก"},
{q:"Multiple suspicious access attempts were not detected by the company. What should be implemented?",qth:"ความพยายามเข้าถึงที่น่าสงสัยไม่ถูกตรวจจับ ควร implement อะไร?",o:["Intrusion prevention system","Proxy server","Jump server","Security zones"],a:[0],m:false,e:"An IPS continuously monitors network traffic and takes automated actions to block or mitigate threats.",eth:"IPS ตรวจสอบ traffic ตลอดเวลาและดำเนินการอัตโนมัติเพื่อบล็อกหรือลดภัยคุกคาม"},
{q:"A solution is needed for AD accounts and groups on both network and remote-access devices. Which TWO?",qth:"ต้องการโซลูชันสำหรับ AD account และ group บนอุปกรณ์เครือข่ายและ remote-access ข้อใด 2 ข้อ?",o:["TACACS+","RADIUS","OAuth","OpenID","Kerberos","CHAP"],a:[1,4],m:true,e:"RADIUS provides centralized AAA for network access. Kerberos is AD's default authentication protocol.",eth:"RADIUS ให้ AAA รวมศูนย์สำหรับ network access Kerberos เป็น protocol authentication เริ่มต้นของ AD"},
{q:"To secure the wireless perimeter to ensure only authorized users access corporate resources. What should the team do?",qth:"รักษาความปลอดภัยขอบเขต wireless ให้เฉพาะผู้มีสิทธิ์เข้าถึง ควรทำอะไร?",o:["Identify rogue access points","Check channel overlaps","Create heat maps","Implement domain hijacking"],a:[0],m:false,e:"Identifying rogue access points ensures only authorized APs are on the network, preventing unauthorized access.",eth:"ระบุ rogue access point ให้มีเฉพาะ AP ที่ได้รับอนุญาต ป้องกันการเข้าถึงที่ไม่ได้รับอนุญาต"},
{q:"Pen testers downloaded sensitive data from an API that should only be available from the mobile app. What caused the bypass?",qth:"Pen tester ดาวน์โหลดข้อมูล sensitive จาก API ที่ควรเข้าได้จากแอปมือถือเท่านั้น สาเหตุคืออะไร?",o:["IP address allow list","User-agent spoofing","WAF bypass","Referrer manipulation"],a:[1],m:false,e:"User-agent spoofing changes the user-agent string to impersonate the mobile app, bypassing user-agent based controls.",eth:"User-agent spoofing เปลี่ยน user-agent string เลียนแบบแอปมือถือ bypass controls ที่ตรวจ user-agent"},
{q:"An organization wants to protect laptop hard drives with low user inconvenience. Which is MOST acceptable?",qth:"องค์กรปกป้อง hard drive laptop โดยรบกวนผู้ใช้น้อย ข้อใดเหมาะสมที่สุด?",o:["SED","HSM","DLP","TPM"],a:[0],m:false,e:"Self-Encrypting Drives (SED) automatically encrypt/decrypt using built-in hardware with zero user interaction.",eth:"SED เข้ารหัส/ถอดรหัสอัตโนมัติด้วย hardware ในตัว ไม่ต้องให้ผู้ใช้ทำอะไร"},
{q:"Which tool can detect an employee accidentally emailing a file containing customer PII?",qth:"เครื่องมือใดตรวจจับพนักงานส่งอีเมลไฟล์ที่มี PII ของลูกค้าโดยไม่ตั้งใจ?",o:["SCAP","NetFlow","Antivirus","DLP"],a:[3],m:false,e:"DLP monitors data transfers, scanning email content and attachments for sensitive information like PII.",eth:"DLP ตรวจสอบการถ่ายโอนข้อมูล สแกนเนื้อหาอีเมลและไฟล์แนบหาข้อมูล sensitive เช่น PII"},
{q:"A help desk technician receives a call from someone claiming to be on the incident response team asking for the internal firewall IP. What should the technician do?",qth:"ช่างเทคนิคได้รับโทรจากคนอ้างว่าอยู่ทีม incident response ขอ IP ของ internal firewall ควรทำอย่างไร?",o:["Direct to stop by in person","Verify identity and provide info by phone","Write down info, hang up, notify cybersecurity officer","Request email verification"],a:[2],m:false,e:"Document the caller info, hang up, and notify the cybersecurity officer to prevent social engineering.",eth:"บันทึกข้อมูลผู้โทร วางสาย แจ้งเจ้าหน้าที่ cybersecurity เพื่อป้องกัน social engineering"},
{q:"Which formula calculates total loss expected per year due to a threat targeting an asset?",qth:"สูตรใดคำนวณความสูญเสียรวมต่อปีจากภัยคุกคามต่อทรัพย์สิน?",o:["EF x asset value","ALE / SLE","MTBF x impact","SLE x ARO"],a:[3],m:false,e:"ALE (Annualized Loss Expectancy) = SLE (Single Loss Expectancy) × ARO (Annualized Rate of Occurrence).",eth:"ALE = SLE × ARO คือ ความสูญเสียคาดการณ์ต่อปี = ความสูญเสียต่อเหตุการณ์ × อัตราการเกิดต่อปี"},
{q:"Two organizations want to share payroll data for comparison while protecting employee data. Which technique?",qth:"สององค์กรต้องการแชร์ข้อมูลเงินเดือนเปรียบเทียบโดยปกป้องข้อมูลพนักงาน ใช้เทคนิคใด?",o:["Pseudo-anonymization","Tokenization","Data masking","Encryption"],a:[0],m:false,e:"Pseudo-anonymization replaces direct identifiers with pseudonyms while preserving attributes for comparison.",eth:"Pseudo-anonymization แทนที่ตัวระบุตัวตนด้วยนามแฝง คง attribute ที่จำเป็นสำหรับเปรียบเทียบ"},
{q:"Which BEST reduces security risks of systems with expired vendor support and no immediate replacement?",qth:"ข้อใดลดความเสี่ยงจากระบบที่หมดการสนับสนุนจาก vendor โดยไม่มีทดแทนทันที?",o:["Implement network access restrictions","Initiate bug bounty program","Classify as shadow IT","Increase vulnerability scan frequency"],a:[0],m:false,e:"Network access restrictions limit exposure through firewalls and segmentation, isolating unsupported systems.",eth:"การจำกัดการเข้าถึงเครือข่ายจำกัดความเสี่ยงด้วย firewall และ segmentation แยกระบบที่ไม่ได้รับการสนับสนุน"},
{q:"An organization needs to improve server-data fault tolerance and site availability during holiday sales. Which TWO?",qth:"ปรับปรุง fault tolerance และ availability ระหว่างช่วงขาย ข้อใด 2 ข้อ?",o:["Load balancing","Incremental backups","UPS","RAID","Dual power supply","VLAN"],a:[0,3],m:true,e:"Load balancing distributes traffic for availability. RAID provides data redundancy for fault tolerance.",eth:"Load balancing กระจาย traffic เพื่อ availability RAID ให้ data redundancy เพื่อ fault tolerance"},
{q:"A web server log has 2 million lines. To get lines 4601-5100, which command?",qth:"Log มี 2 ล้านบรรทัด ดึงบรรทัด 4601-5100 ใช้คำสั่งใด?",o:["cat log | head -4600 | tail +500","cat log | tail -1995400 | tail -500","cat log | tail -4600 | head -500","cat log | head -5100 | tail -500"],a:[3],m:false,e:"head -5100 gets first 5100 lines, then tail -500 takes the last 500 (lines 4601-5100).",eth:"head -5100 ดึง 5100 บรรทัดแรก tail -500 ดึง 500 บรรทัดสุดท้ายของชุด (บรรทัด 4601-5100)"},
{q:"A user received an SMS on a mobile phone asking for bank details. Which social engineering technique?",qth:"ผู้ใช้ได้รับ SMS ขอข้อมูลธนาคาร ใช้เทคนิค social engineering แบบใด?",o:["SPIM","Vishing","Spear phishing","Smishing"],a:[3],m:false,e:"Smishing uses fraudulent SMS messages to trick users into revealing personal or financial information.",eth:"Smishing ใช้ SMS หลอกลวงเพื่อหลอกให้ผู้ใช้เปิดเผยข้อมูลส่วนตัวหรือการเงิน"}
);

</script>
<script>
let mode=null,cur=0,ans={},showN=false,sub=false,showR=false,ord=[];
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function go(m){mode=m;cur=0;ans={};sub=false;showR=false;ord=shuf(Q.map((_,i)=>i));ren()}
function sel(qi,oi){const q=Q[ord[qi]];if(mode==='practice'&&ans[qi]?.ck)return;if(mode==='exam'&&sub)return;if(!ans[qi])ans[qi]={s:[],ck:false};if(q.m){const x=ans[qi].s.indexOf(oi);if(x>-1)ans[qi].s.splice(x,1);else ans[qi].s.push(oi)}else{ans[qi].s=[oi]}ren()}
function chk(qi){if(!ans[qi])return;ans[qi].ck=true;ren()}
function isOk(qi){const q=Q[ord[qi]],a=ans[qi];if(!a||!a.s.length)return false;if(a.s.length!==q.a.length)return false;return q.a.every(x=>a.s.includes(x))&&a.s.every(x=>q.a.includes(x))}
function subE(){sub=true;for(let i=0;i<Q.length;i++)if(ans[i])ans[i].ck=true;showR=true;ren();scrollTo(0,0)}
function goQ(i){cur=i;showR=false;ren();scrollTo(0,0)}
function rSt(){return`<div class="ss"><h2>🛡️ CompTIA Security+ SY0-701</h2><p>แบบทดสอบ ${Q.length} ข้อ พร้อมคำแปลไทย + คำอธิบาย EN/TH</p><p style="font-size:.83rem;color:var(--dim)">เลือกโหมด / Select mode</p><div class="mc"><div class="mcd" onclick="go('practice')"><h3>📖 Practice Mode</h3><p>โหมดฝึกซ้อม — ตรวจคำตอบทีละข้อพร้อมคำอธิบาย</p><p style="margin-top:6px;font-size:.78rem;color:var(--accentL)">Check each answer with explanation</p></div><div class="mcd" onclick="go('exam')"><h3>📝 Exam Mode</h3><p>โหมดสอบ — ตอบทุกข้อแล้วดูผลรวมตอนจบ</p><p style="margin-top:6px;font-size:.78rem;color:var(--accentL)">Answer all, see results at the end</p></div></div></div>`}
function rQ(qi){const q=Q[ord[qi]],a=ans[qi]||{s:[],ck:false},ck=a.ck,L='ABCDEFGH';let o='';if(q.m)o+=`<div class="mn">⚡ เลือกหลายข้อ / Select multiple</div>`;q.o.forEach((t,i)=>{let c='opt';if(a.s.includes(i))c+=' sel';if(ck){c+=' dis';if(q.a.includes(i))c+=' cok';else if(a.s.includes(i))c+=' cerr'}o+=`<div class="${c}" onclick="sel(${qi},${i})"><div class="ol">${L[i]}</div><div class="ot">${t}</div></div>`});let e='';if(ck){const ok=isOk(qi);e=`<div class="exp sh"><div class="et">${ok?'✅ ถูกต้อง! Correct!':'❌ ไม่ถูกต้อง Incorrect'} — Answer: ${q.a.map(i=>L[i]).join(', ')}</div><div class="ee">${q.e}</div><div class="eth">${q.eth}</div></div>`}let ab='';if(mode==='practice'&&!ck&&a.s.length)ab=`<div style="margin-top:10px"><button class="b on" onclick="chk(${qi})">✔ Check / ตรวจ</button></div>`;return`<div class="qc"><div class="qn">Q${qi+1}/${Q.length}</div><div class="qt">${q.q}</div><div class="qth">${q.qth}</div><div class="opts">${o}</div>${ab}${e}</div>`}
function rNv(){let b='';for(let i=0;i<Q.length;i++){let c='qnb';if(i===cur&&!showR)c+=' cur';if(ans[i]){if(ans[i].ck)c+=isOk(i)?' cok':' cerr';else c+=' ans'}b+=`<button class="${c}" onclick="goQ(${i})">${i+1}</button>`}return`<div class="qnav">${b}</div>`}
function rRs(){const t=Q.length;let ok=0,wr=0,sk=0;for(let i=0;i<t;i++){if(!ans[i]||!ans[i].s.length)sk++;else if(isOk(i))ok++;else wr++}const p=Math.round(ok/t*100),ps=p>=75;let wl='';for(let i=0;i<t;i++)if(ans[i]&&ans[i].s.length&&!isOk(i))wl+=rQ(i);return`<div class="rs"><div class="rh"><div class="sc" style="border-color:${ps?'var(--ok)':'var(--err)'}"><div class="sp" style="color:${ps?'var(--ok)':'var(--err)'}">${p}%</div><div class="sl">${ps?'PASSED ผ่าน':'FAILED ไม่ผ่าน'}</div></div><div class="rss"><div class="rst g"><div class="n">${ok}</div><div class="l">Correct ถูก</div></div><div class="rst r"><div class="n">${wr}</div><div class="l">Wrong ผิด</div></div><div class="rst"><div class="n">${sk}</div><div class="l">Skip ข้าม</div></div><div class="rst"><div class="n">${t}</div><div class="l">Total รวม</div></div></div><button class="b on" onclick="mode=null;ren()" style="margin:6px">🏠 Home</button> <button class="b" onclick="go(mode)" style="margin:6px">🔄 Retry</button></div>${wr?`<div class="rvt">❌ ทบทวนข้อที่ผิด / Review Wrong (${wr})</div>${wl}`:'<p style="text-align:center;color:var(--ok);margin-top:18px">🎉 Perfect! ตอบถูกทุกข้อ!</p>'}</div>`}
function ren(){const ap=document.getElementById('app');if(!mode){ap.innerHTML=rSt();return}const t=Q.length,ad=Object.keys(ans).filter(k=>ans[k].s.length).length,pg=((cur+1)/t*100).toFixed(1);let ok=0;Object.keys(ans).forEach(k=>{if(ans[k].ck&&isOk(+k))ok++});let h=`<div class="hdr"><h1>🛡️ SY0-701 ${mode==='practice'?'Practice':'Exam'}</h1><div class="hdr-b"><button class="b" onclick="showN=!showN;ren()">📋 ${showN?'Hide':'Nav'}</button>${mode==='exam'&&!sub?`<button class="b on" onclick="if(confirm('Submit? ส่ง?'))subE()">📤 Submit</button>`:''}${sub?`<button class="b" onclick="showR=true;ren();scrollTo(0,0)">📊 Results</button>`:''}  <button class="b" onclick="if(confirm('Quit?')){mode=null;ren()}">✕</button></div></div>`;h+=`<div class="stats"><span>📝 <b>${ad}</b>/${t}</span>${mode==='practice'?`<span>✅ <b>${ok}</b></span>`:''}<span>Q<b>${cur+1}</b></span></div>`;h+=`<div class="pbar"><div class="pfill" style="width:${pg}%"></div></div>`;if(showN)h+=rNv();if(showR){h+=rRs()}else{h+=rQ(cur);h+=`<div class="nb"><button class="b" ${cur===0?'disabled':''}onclick="goQ(${cur-1})">← ก่อนหน้า</button>${cur<t-1?`<button class="b on" onclick="goQ(${cur+1})">ถัดไป →</button>`:mode==='exam'&&!sub?`<button class="b on" onclick="if(confirm('Submit?'))subE()">📤 Submit</button>`:mode==='practice'?`<button class="b on" onclick="showR=true;ren();scrollTo(0,0)">📊 Results</button>`:''}</div>`}ap.innerHTML=h}
window.addEventListener('DOMContentLoaded',()=>ren());
</script>
</body>
